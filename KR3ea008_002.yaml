body:
  text: 卷二陰陽應象大論篇第五此篇言天地水火四時五行寒熱氣味合人之臟腑形身清濁氣血表裡上下成象成形者莫不合乎陰陽之道致於診脈察色治療針砭亦皆取法於陰陽故曰陰陽應象大論黃帝曰陰陽者天地之道也道者陰陽之理也太極靜而生陰動而生陽天生於動地生於靜故陰陽為天地之道萬物之綱紀總之曰綱周之曰紀萬物得是陰陽而統之為綱散之為紀變化之父母天元紀大論曰物生謂之化物極謂之變易曰在天成象在地成形變化見矣朱子曰變者化之漸化者變之成陰可變為陽陽可化為陰變化之道由陰陽之所生故謂之父母王子方曰乾為父坤為母剛主化柔主變生殺之本始天以陽生陰長地以陽殺陰藏神明之府也陰陽不測之謂神明者陰陽合而靈顯昭著也神化天之五氣地之五行以生萬物故為神明之府治病必求於本本者本於陰陽也人之臟腑氣血表裡上下皆本乎陰陽而外淫之風寒暑濕四時五行亦總屬陰陽之二氣致於治病之氣味用針之左右診別色脈引越高下皆不出乎陰陽之理故曰治病必求其本謂求其病之本於陽邪本於陰邪也求其病之在陽分陰分氣分血分也審其湯藥之宜用氣之升味之降溫之補苦之泄也此篇論治道當取法乎陰陽故首提曰治病必求於本後節曰治不法天之紀用地之理則災害並至天地者陰陽之道也故積陽為天積陰為地積陽至高而為天積陰至厚而為地承上文而言治病者當法天地陰陽之理陰靜陽躁地之陰主靜而有常天之陽主動而不息陽生陰長陽殺陰藏春夏者天之陰陽也故主陽生陰長秋冬者地之陰陽也故主陽殺陰藏陽化氣陰成形天主生物地主成物故陽化萬物之氣而吾人之氣由陽化之陰成萬物之形而吾人之形由陰成之寒極生熱熱極生寒陰寒陽熱乃陰陽之正氣寒極生熱陰變為陽也熱極生寒陽變為陰也邵子曰動之始則陽生動之極則陰生靜之始則柔生靜之極則剛生此周易老變而少不變之義故陰陽之理極則變生人之病亦然如熱甚則發寒寒甚則反熱治病之道亦然如久服苦寒之味則反化火矣寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之從逆也寒氣下凝故生濁陰熱氣上散故生清陽如清氣在下則反上而下降故生飧泄濁氣在上是反下而上凝故生䐜脹此吾身之陰陽反作氣之逆從而為病也此論陰陽之體位各有上下故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣此承上文而言陰陽之位各有上下而陰陽之氣上下相交然後雲行雨施而化生萬物也清陽為天濁陰為地地雖在下而地氣上升為云天雖在上而天氣下降為雨夫由云而後有雨是雨雖天降而實本地氣所升之云故雨出地氣由雨之降而後有云之升是云雖地升而實本天氣所降之雨故云出天氣此陰陽交互之道也而人亦應之此篇言天地之陰陽與人之陰陽相合是以一節言天地陰陽水火一節言清濁臟腑精形以天人相間而言也故清陽出上竅濁陰出下竅人之清陽本乎天而出上竅人之濁陰本乎地而出下竅言人之陰陽猶云之升雨之降通乎天地之氣也清陽發腠理濁陰走五臟腠者三焦通會元真之處理者皮膚臟腑之紋理言清陽之氣通會於腠理而陰濁之精血走於五臟五臟主藏精者也清陽實四肢濁陰歸六腑四肢為諸陽之本六腑者傳化物而不藏此言飲食所生之清陽充實於四肢而渾濁者歸於六腑也夫脾主四肢又曰手太陰獨受其濁蓋濁中之清者由脾之轉輸而充實於四肢濁中之濁者歸於六腑也首言清陽之在上次言發於外內之腠理此言充實於四旁蓋陽氣者若天與日位居尊高而運用於六合九州之外內者也水為陰火為陽陽為氣陰為味水性潤下故為陰火性炎上故為陽清陽上升故為氣濁陰下降故為味蓋以水火而徵兆氣味之陰陽也味歸形形歸氣氣歸精精歸化陰為味陰成形地食人以五味以養此形故味歸形陽化氣諸陽之氣通會於皮膚肌腠之間以生此形故形歸氣陽氣生於陰精故氣歸於精水穀之精氣以化生此精故精歸於化也精食氣形食味水穀之精氣以生此精精食氣也五味入胃以養此形形食味也化生精氣生形水穀之精氣以化生此精諸陽之神氣以生養此形蓋天食人以五氣地食人以五味氣味化生此精氣以生養此形也味傷形氣傷精夫形食味精食氣如飲食之氣味太過則反傷其精形矣精化為氣氣傷於味精為元氣之本氣乃精之化也形食味而味歸形味傷形則及於氣矣此節論飲食之陰陽氣味以生精氣之陰陽而養此形陰味出下竅陽氣出上竅王氏曰味有實故下流於便溺之竅氣無形故上出於呼吸之門味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味為陰而味厚者為純陰薄者為陰中之陽氣為陽而氣厚者為純陽薄者為陽中之陰此陰陽之中而又分陰陽也味厚則泄薄則通氣薄則發泄厚則發熱味厚為陰中之陰降也故主下泄味薄為陰中之陽升也故主宣通氣薄為陽中之陰降也故主發泄氣厚為陽中之陽升也故主發熱此節論氣味之陰陽升降壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣夫氣為陽火為陽合而言之氣即火也少陽三焦之氣生於命門遊行於外內合於包絡而為相火然即少陽初生之氣也歸於上焦而主納歸於中焦而主化納化水穀之精微而生此精以養此形故承上文而言五味太過則有傷於氣而陰火太過亦有傷於氣矣蓋氣生於精而精之所生由氣之所化形食其味而味之入胃亦由氣化以養此形是氣之不可有傷者也故曰壯火之氣衰少火之氣壯蓋陽亢則火壯而生氣反衰陽和則火平而氣壯盛矣如火壯於內則食氣氣盛於內則食火食猶入也言火壯則氣並於火氣盛則火歸於氣氣火之合一也如火壯於外則散氣火平於外則生氣故曰相火為元氣之賊欲養此精氣形者又當平息其火焉王子方曰壯火之氣少火之氣是氣即火之氣也氣味辛甘發散為陽酸苦湧泄為陰言氣味固分陰陽而味中復有陰陽之別辛走氣而性散甘乃中央之味而能灌溉四旁故辛甘主發散為陽也苦主泄下而又炎上作苦酸主收降而又屬春生之木味皆能上湧而下泄故酸苦湧泄為陰也陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒馬氏曰用酸苦之味至於太過則陰勝矣陰勝則吾人之陽分不能敵陰寒而陽斯病也用辛甘之味至於太過則陽勝矣陽勝則吾人之陰分不能敵陽熱而陰斯病也所謂陽勝則陰病者何也以陽勝則太熱彼陰分安得不病乎所謂陰勝則陽病者何也以陰勝則太寒彼陽分安得不病乎重寒則熱重熱則寒苦化火酸化木久服酸苦之味則反有木火之熱化矣辛化金甘化土久服辛甘之味則反有陰濕之寒化矣所謂久而增氣物化之常也氣增而久夭之由也寒傷形熱傷氣氣傷痛形傷腫陽化氣陰成形寒則陰盛故傷形熱則陽盛故傷氣氣無形故痛陰有形故腫也故先痛而後腫者氣傷形也先腫而後痛者形傷氣也夫形歸氣而氣生形陰陽形氣之相合也故氣傷則轉及於形形傷則病及於氣矣以上論氣味陰陽寒熱偏勝之為病風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡瀉此以下論天之四時五行人之五臟五氣外感六淫內傷五志亦有陰陽寒熱之為病也風性動搖故風勝則動熱氣傷陰故熱勝則腫燥傷津液故燥勝則乾寒氣傷陽故神氣乃浮也濕淫所勝則脾土受傷而為濡瀉之病矣風熱天之陽氣也寒燥濕天之陰氣也乃四時五行之陰陽偏勝而為病也天有四時五行以生長收藏以生寒暑燥濕風天之十干化生地之五行地之五行上呈天之六氣故在地為水在天為寒在地為火在天為暑在地為金在天為燥在地為土在天為濕在地為木在天為風天有四時五行之生長收藏而化生陰陽之六氣也此言天之四時五行成象成形者而應乎陰陽也人有五臟化五氣以生喜怒悲憂恐化五氣者化五行之氣也肝志為怒心志為喜脾志為悲肺志為憂腎志為恐以五氣而生五臟之志也此言人之五臟化生五氣五志有形無形者而應乎陰陽也故喜怒傷氣寒暑傷形喜怒由內發故傷陰陽之氣外淫之邪由皮毛而入於肌絡臟腑故寒暑傷形馬氏曰舉喜怒而凡憂思恐可知矣舉寒暑而凡燥濕風可知矣王子方曰四時之氣總屬寒暑之往來五志內傷亦歸重陰陽之二氣故下文曰暴怒傷陰暴喜傷陽本神篇曰順四時而適寒暑和喜怒而安居處是以五行五氣論陰陽可也以寒暑喜怒論陰陽亦可也若膠執於文字以論陰陽則固矣暴怒傷陰暴喜傷陽厥氣上行滿脈去形多陽者多喜多陰者多怒喜屬陽而怒屬陰也是以卒暴而怒則有傷於陰矣卒暴之喜則有傷於陽矣陰陽之氣厥逆上行則五臟之氣滿於脈而離脫於真藏之形矣此言寒暑傷在外形身之陰陽喜怒傷於內藏氣之陰陽也張兆璜曰傷陽則氣厥於上傷陰則血滿於脈喜怒不節寒暑過度生乃不固經曰智者之養生也必順四時而適寒暑和喜怒而安居處若喜怒不恆寒暑過度則表裡陰陽俱損生何可以固久乎此總結上章之意故重陰必陽重陽必陰承上文而言天有四時之寒暑人有五氣之陰陽合而論之在天陰陽之邪又由吾人之陰陽氣化也是以受天之陰邪而必陽受陽邪而必陰王子方曰此篇論天之四時五行合人之五臟五氣是以有言天節有言人節有分而論者有合而論者故曰冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽秋冬時之陰也寒濕氣之陰也冬傷寒秋傷濕謂之重陰冬傷寒而春必溫秋傷濕而冬咳嗽乃重陰而變陽病也春夏時之陽也風暑氣之陽也春傷風而夏傷暑謂之重陽春傷風而飧泄夏傷暑而秋病痎瘧乃重陽而變陰病也夫寒邪伏藏春時陽氣外出化寒而為溫熱也暑氣伏藏秋時陰氣外出化熱而為陰瘧也此天之陰陽又由吾身之陰陽而變化也傷於風者上先受之傷於濕者下先受之陽病者上行極而下故變為飧泄之陰病矣陰病者下行極而上故變為咳嗽之陽證矣此四時之陰陽又由吾身之陰陽而升降也痎瘧三陰瘧也王子方曰故曰者引生氣篇之文以證明之也帝曰余聞上古聖人論理人形列別臟腑端絡經脈會通六合各從其經氣穴所發各有處名溪谷屬骨皆有所起分部逆從各有條理四時陰陽盡有經紀外內之應皆有表裡有信然乎帝言人之臟腑形身與天之四時陰陽外內相應惟上古聖人能論理人形與天地參合是以岐伯論天之五方五氣五色五音地之五行五味以應人之五體五臟五竅五志也六合謂十二經脈之合也足太陽與足少陰為一合足少陽與足厥陰為二合足陽明與足太陰為三合手太陽與手少陰為四合手少陽與手厥陰為五合手陽明與手太陰為六合各從其經正而相通也氣穴者經氣所注之穴有三百六十五穴以應一歲而各有定處各有定名也溪谷者大小之分肉連於骨而生起也分部者皮之分部也皮部中之浮絡分三陰三陽有順有逆各有條理也言天地之四時陰陽盡有經緯紀綱應人形之外內皆有表有里也岐伯對曰東方生風風乃東方春生之氣故主生風風生木寅卯屬木春氣之所生也木生酸地之五行生陰之五味酸生肝陰之所生本在五味故酸生肝此言內之五臟外之筋骨皮肉皆收受四時五行之氣味而相生故曰外內之應皆有表裡也肝生筋筋生心肝之精氣生筋筋之精氣生心內之五臟合五行之氣而自相資生也肝主目肝氣通於目肝和則目能辨五色故目為肝所主其在天為玄在人為道在地為化化生五味道生智玄生神承上文而言在天之五方五氣在人之五臟五體在地之五味五行皆陰陽變化之為用也陰陽變化之道其在天為玄玄幽遠也玄生神神者陰陽不測之謂是以在天為六氣而在地為五行也其在人為道道者陰陽五行不易之理也道生智智者五臟之神志魂魄因思慮而處物是以人之五臟生五神化五志也其在地為化物生謂之化化生萬物而五味之美不可勝極也神在天為風在地為木在體為筋在臟為肝按天元紀大論曰陰陽不測謂之神神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水故在天為氣在地成形形氣相感而化生萬物矣此陰陽不測之變化是以在天則為風為熱為濕為燥為寒在地則為木為火為土為金為水在體則為筋為脈為肉為皮毛為骨在臟則為肝為心為脾為肺為腎在聲則為呼為笑為歌為哭為呻在變動則為握為憂為噦為咳為慄在竅則為目為舌為口為鼻為耳在色則為蒼黃赤白黑在味則為酸苦甘辛鹹在音則為宮商角徵羽在志則為喜怒憂思恐此皆陰陽應象之神化也在色為蒼薄青色東方木色也在音為角角為木音和而長也在聲為呼呼叫呼也在志為怒故發聲為呼在變動為握變動臟氣變動於經俞也握者拘急之象筋之證也在竅為目目者肝之官也在味為酸木之味也在志為怒肝者將軍之官故其志在怒怒傷肝用志太過則反傷其體矣悲勝怒悲為肺志以情勝情也風傷筋能生我者亦所能害我也燥勝風燥屬西方之金氣四時五行之氣有相生而有相制也酸傷筋能養我者亦能傷我也辛勝酸辛為金味故能勝酸金勝木也南方生熱南方主夏令故生熱熱生火夫火生熱今以在天之熱而生火正陰陽不測之變化火生苦炎上作苦火生苦味也苦生心苦心之味也味為陰臟亦為陰故味生臟心生血血乃中焦之汁奉心神而化赤故血者神氣也血生脾由本臟之所生而生及相生之臟心主舌心氣通於舌心和則能知五味故舌乃心之主其在天為熱在地為火在體為脈在臟為心風寒暑濕燥火天之陰陽也木火土金水火地之陰陽也人有五臟化五氣以生喜怒悲憂恐人之陰陽也在天成象在地成形人則參天兩地者也先言體而後言臟者人秉天地之生氣自外而內也在色為赤南方之火色也在音為徵徵為火音和而美也在聲為笑心志喜故發聲為笑在變動為憂心獨無俞故變動在志心氣並於肺則憂在竅為舌舌者心之官也在味為苦火之味也在志為喜心中和樂則喜喜傷心過於喜則心志自傷恐勝喜恐為腎志水勝火也熱傷氣熱則氣泄故熱傷氣寒勝熱有亢害則有承製陰陽五行之自然也苦傷氣苦乃火味故亦傷氣也咸勝苦咸為水味故勝苦中央生濕中央主土而灌溉四旁故生濕濕生土在天為氣在地成形以氣而生形也土生甘土主稼穡稼穡作甘甘生脾地食人以五味甘先入脾故主生脾脾生肉脾之精氣主生肌肉肉生肺五行之相生者以所生之氣而相生也脾主口脾氣通於口脾和則能知穀味故脾主口其在天為濕在地為土在體為肉在臟為脾人之形身臟腑由五行五氣而生五氣五行又歸於神化在色為黃中央土色也在音為宮宮為土音大而和也在聲為歌脾志思思而得之則發聲為歌在變動為噦氣逆於肺胃之間則為噦胃之上肺之下脾之分也故脾氣變動則為噦在竅為口脾者主為衛使之迎糧故脾竅在口在味為甘土之味也在志為思因志而任變謂之思脾主運用故所志在思思傷脾五臟化五氣以生五志用志則傷氣氣傷則臟傷怒勝思怒為肝志故能勝思濕傷肉脾主肉而惡濕故濕勝則傷肉風勝濕風乃木氣故勝土濕甘傷肉味傷形也酸勝甘酸乃木味故勝土之甘西方生燥西方主秋金之令故其氣生燥燥生金因氣而生形金生辛因形而成味辛生肺因味而生臟肺生皮毛因臟而生形皮毛生腎肺氣主於皮毛因金氣而生腎肺主鼻肺氣通於鼻肺和則鼻能知香臭故肺主開竅在鼻其在天為燥在地為金在體為皮毛在臟為肺在天為氣在地成形形氣相感而化生萬物人為萬物之靈在體為皮毛在臟為肺者感天地之形氣而化生也在色為白肺金之色也在音為商西方之音輕而勁也在聲為哭肺志在悲故發聲為哭在變動為咳臟氣變動則及於喉而為咳在竅為鼻鼻者肺之竅也在味為辛金之味也在志為憂精氣並於肺則憂憂傷肺過則損也喜勝憂喜則氣散故能勝憂鬱熱傷皮毛秋令燥熱反傷皮毛寒勝熱嚴肅之令復則炎爍之氣消辛傷皮毛氣主皮毛辛散氣故傷皮毛苦勝辛火味勝金也北方生寒北方主水故生寒寒生水形生氣而氣生形也水生咸水味鹹故咸生於水咸生腎味之咸者主生養腎腎生骨髓腎之精氣生長骨髓髓生肝腎之精髓復生肝木言五臟之相生由天之五氣地之五味之所生也腎主耳腎氣通於耳腎和則耳能聞五音故腎氣所主在耳其在天為寒在地為水在體為骨在臟為腎五方生五氣五氣生五行五行生五味五味生五體五臟者言人本天地之形氣而生成也其在天為寒在地為水在體為骨在臟為腎者言天地人之成象成形者皆本於陰陽不測之變化在色為黑色有陰陽也在音為羽聲有陰陽也在聲為呻呻者伸也腎氣在下故聲欲太息而伸出之在變動為慄慄戰慄貌寒水之氣變也在竅為耳腎開竅於耳在味為咸水之味也在志為恐腎藏志而為作強之官故慮事而時懷惕厲也恐傷腎靈樞經曰恐懼而不解則傷精明感腎也思勝恐思慮深則處事精詳故勝恐寒傷血寒甚則血凝泣故傷血王子方問曰風傷筋濕傷肉以本氣而傷本體也在心則曰熱傷氣在腎則曰寒傷血者何也曰氣為陽血為陰火為陽水為陰心主火而為熱腎主水而為寒是以熱傷氣而寒傷血者同氣相感也下文曰陰陽者血氣之男女也水火者陰陽之兆徵也心腎為水火陰陽之主宰故所論雖與別臟不同而亦是本氣自傷之意燥勝寒燥主秋熱之令故能勝寒咸傷血咸走血故食鹹則傷血矣甘勝咸甘為土味故能勝咸莫子晉問曰五方註釋曷多不同曰陰陽之道變化無窮是以五方之經文亦少有差別愚故引經注經各盡其義學者引而伸之總不外乎陰陽之大道也故曰天地者萬物之上下也天覆於上地載於下天地位而萬物化生於其間陰陽者血氣之男女也陰陽之道其在人則為男為女在體則為氣為血左右者陰陽之道路也在天地六合東南為左西北為右陰陽二氣於上下四旁晝夜環轉而人之陰陽亦同天地之氣晝夜循環故左右為陰陽之道路水火者陰陽之兆徵也天一生水地二生火火為陽水為陰水火有形故為陰陽之徵兆陰陽者萬物之能始也乾知大始坤以簡能而生萬物故曰陰在內陽之守也陽在外陰之使也陰靜於內陽動於外陰陽動靜而萬物化生上文論天地陰陽之氣運用於上下四旁此復言陰陽之氣又有外內之所主也在天地則天包乎地之外其在人則陽為陰之衛也帝曰法陰陽奈何帝言何以取法天地陰陽之氣而為調治之法也高士宗曰按以下岐伯所答如陽勝則身熱陰勝則身寒乃陰陽偏勝之為害也如能知七損八益是能調養吾身中之陰陽損益而不為邪所傷也如人之右耳目不如左明左手足不如右強乃法象天地四方之盛虛也如賢人上配天以養頭下象地以養足中旁人事以養五臟乃取法天地以養人也如天氣通於肺地氣通於嗌風氣通於肝雷氣通於心是天地之氣而應象於人如暴氣象雷逆氣象陽是人之氣而應象於天地也如善用針者從陰引陽從陽引陰是取法陰陽之道而為用針之法如善診者察色以脈先別陰陽是取法陰陽之理而為診視之法也其高者因而越之其下者引而竭之陽病治陰陰病治陽是審別陰陽而為救治之法也此篇論天地陰陽五方五行之氣以應人之形身臟腑至於診治調養亦皆取法乎陰陽故曰陰陽應象大論岐伯曰陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陽勝乃火熱用事故身熱熱在表則腠理閉熱在裡則喘粗陰勝在腹則為之俯陽勝在背則為之仰陽勝於周身則汗不出而熱也腎主精液齒乾精液竭矣心主血液煩冤血液枯矣腹滿中焦之生氣絕矣此陽熱偏勝之死證然能苟延於冬則不能倖免於夏蓋言人之陰陽又配合天地四時之陰陽而為生死也陰勝則身寒汗出身常清數慄而寒寒則厥厥則腹滿死能夏不能冬此陰陽更勝之變病之形能也陰勝則陽虛故汗出陰寒在表則身常清在裡則數慄而寒也四肢為諸陽之本表裡俱寒則四肢厥冷四肢厥逆則腹虛滿矣乃陰寒偏勝之死證得夏月之陽熱尚可救其陰寒此陰陽之變能為形身作病也帝曰調此二者奈何岐伯曰能知七損八益則二者可調不知用此則早衰之節也女子以七為紀男子以八為紀七損八益者言陽常有餘而陰常不足也然陽氣生於陰精知陰精之不足而無使其虧損則二者可調不知陰陽相生之道而用此調養之法則年未半百而早衰矣年四十而陰氣自半也起居衰矣男子以八為期故四十而居半陰氣腎氣精氣也陰氣漸虛則起居自倦矣年五十體重耳目不聰明矣經曰腎虛肝虛脾虛皆令人體重煩冤又曰液脫者骨肉屈伸不利年五十而精液血液皆虛是以體重而不輕便也精氣虛而不能並於上則耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣人年六十已逾七八之期天癸竭腎氣大衰而陰事痿矣九竅為水注之氣精水竭而精氣衰則九竅為之不利也精竭於下水泛於上而涕泣俱出矣解精微論曰精神去目涕泣出王子方曰調此二者重在七損故曰陰氣自半曰體重曰陰痿夫起居動作為陽耳目九竅為陽曰起居衰矣曰耳目不聰明九竅不利自陰虛而衰及於陽也故曰知之則強不知則老知七損八益而能固守其精則陰陽俱盛而筋骨壯強不知陰陽所生之原以欲竭其精以耗散其真至半百而衰老矣故同出而名異耳神氣生於陰精故同出於天乙之真而有精氣神三者之異名耳智者察同愚者察異愚者不足智者有餘察知也省也智者省察其陰陽同出於天真不妄作勞則陽完而陰亦固矣精神內守則陰盛而氣亦外強知陰陽之交相生固則精氣常為有餘愚者止知名之有異如煩勞則陽氣外張而不知精亦內絕如逆之傷腎則春陽之氣亦無所資生不知陽為陰之固陰為陽之根而精氣恆不足矣有餘則耳目聰明身體輕強老者復壯壯者益治有餘則陽氣充而耳目聰明精血足而身體強健精神完固能卻老而全形壯者益充滿而平治也王子方曰上文曰體重耳目不聰明此節曰耳目聰明身體強健又見其陰陽互相資益之妙是以聖人為無為之事樂恬憺之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也此言治世之聖人與逸世之真人至人不同壽僅可以百數然亦有修身之道而壽命無窮與天地終始行所無事則外不勞形內無思想恬憺虛無則精神內守真氣從之其知道者亦歸於真人高士宗曰此節照應首篇之聖人外不勞形於事內無思想之患以恬愉為務以自得為功精神不散亦能壽敝天地無有終時天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也此言天地陰陽之所不能全惟其陰陽精氣運行故能生長收藏化生萬物其在人亦當配天地以養頭足勿使邪氣居之天不足西北者陽中之陰不足也故西北方陰也而人之右耳目不如左明也左為陽而右為陰陰不足於上也地不滿東南者陰中之陽不足也故東南方陽也而人左手足不如右強也右為陰而左為陽陽不足於下也帝曰何以然岐伯曰東方陽也陽者其精並於上並於上則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也天有精地有形東方陽也其精氣上升而並於上並於上則上盛而下虛故使人之耳目聰明而手足不便也西方陰也其精氣下降而並於下並於下則下盛而上虛故其人之耳目不聰明而手足便也此以天地之左右而言也王子方曰上篇論陽氣生於陰精此復言天有精而精氣上下交併是陰精又生於天也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之此以形身論之其在上則右虛在下則左虛是天地陰陽之所不能全而人身亦有左右之不足也上文言天地左右之上下此言人身上下之左右王子方曰俱感於邪然後知虛處之病甚故天有精地有形天有八紀地有五里故能為萬物之父母天有所生之精地有所成之形天有八方之紀綱地有五行之道理其精氣交通於九州八方之外故能為萬物生長之父母又非止於上下之交併而已清陽上天濁陰歸地是故天地之動靜神明為之綱紀故能以生長收藏終而復始言天地之體位雖有東西南北之不足而神明為之綱紀故能以生長收藏終而復始化生萬物神明者生五氣化五行者也惟賢人上配天以養頭下象地以養足中旁人事以養五臟上配天以養耳目之聰明下象地以養腰以下之不足節五味適五志以養五臟之太和雖有賊邪而勿能居之矣此篇曰聖人曰賢人謂惟賢聖能法則天地逆從陰陽恬憺虛無精神內守可使益壽無有終極之時而皆歸於真人也天氣通於肺肺臟屬乎乾金位居至高而主周身之氣故與天氣相通此復言非惟頭之上竅通乎天從腰以下以象地而五臟六腑九竅六經皆與天地之氣相通惟賢人能法天之紀用地之理以治身故災害不能及也地氣通於嗌嗌乃胃腑之門主受濕濁之氣以入胃故與地氣相通太陰陽明篇曰喉主天氣嗌主地氣風氣通於肝風生木木生肝外內之氣相通也雷氣通於心雷火之發聲也心為火臟氣相感召故與心相通穀氣通於脾脾為土臟而主司轉運穀氣山谷之通氣也故與脾氣相通雨氣通於腎腎為水臟雨氣寒水之氣也六經為川六經手足三陰三陽之經脈也外內環轉如川流之不息腸胃為海腸胃受盛水穀如海之無所不容又胃為水穀之海而外合海水腸為受盛之官九竅為水注之氣精氣通上竅水濁出下竅以天地為之陰陽陰陽者天地之道也以天地之道通乎身之陰陽陽之汗以天地之雨名之汗出於陰液由陽氣之宣發故曰陽加於陰謂之汗雨乃地之陰濕亦由天氣之所化施故可方人之汗陽之氣以天地之疾風名之風出於地之隧谷陽氣發於里陰以疾風名之者言陽氣之行身有道無少逆滯者也暴氣象雷逆氣象陽氣暴如雷火之發氣逆如陽熱之勝此復言陽氣之如風行於上下四旁無暴無逆也故治不法天之紀不用地之理則災害至矣人之陰陽通乎天地天有八紀地有五里為治不取法天地之陰陽則災害至矣故邪風之至疾如風雨天之邪氣始傷皮毛由皮毛而至肌肉筋脈由經脈而入於臟腑故如風雨之驟至而易入於內也獨言風者風為百病之長而能開發皮腠故善治者治皮毛陽氣者衛外而為固也天之陽邪始傷皮毛氣分故善治者助陽氣以宣散其邪不使內入於陰也其次治肌膚邪在皮毛留而不去則入於肌膚矣肌膚尚屬外之氣分亦可使邪從外解故其治之次也其次治筋脈邪在肌膚留而不去則入於經絡矣經脈內連臟腑外絡形身善治者知邪入於經即從經而外解不使內干臟腑此為治之法又其次也靈樞經曰邪留而不去或著經脈或著於膂筋其次治六腑金匱要略曰經絡受邪入臟腑為內所因邪入於經留而勿治則入於裡矣故止可從腑而解其次治五臟治五臟者半死半生也六臟之脈屬臟絡腑六腑之脈屬腑絡臟臟腑經氣連絡相通邪入於內而又不從腑解則干及於臟矣邪在五臟經氣之間尚可救治而生如干臟則死矣故曰半死半生也夫皮膚氣分為陽經絡血分為陰外為陽內為陰腑為陽臟為陰邪在陽分為易治邪在陰分為難治以上論為治之道當取法乎陰陽故天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈天之邪氣由形層而入於裡陰故感則害人五臟水穀入胃寒溫不適飲食不節而病生於腸胃故害於六腑清濕地氣之中人也必從足始故感則害皮肉筋脈夫臟為陰腑為陽經脈血分為陰皮肉氣分為陽天地之邪有陰有陽水穀之氣有熱有寒而病人之形身臟腑亦有陰陽之別也故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微得過用之不殆此言用針者當取法乎陰陽也夫陰陽氣血外內左右交相貫通故善用針者從陰而引陽分之邪從陽而引陰分之氣病在左者取之右病在右者取之左以我之神得彼之情以表之證知里之病觀邪正虛實之理而補瀉之見病之微萌而得其過之所在以此法用之而不致於危殆矣善診者察色按脈先別陰陽此言善診者宜審別其陰陽也夫色為陽血為陰然色有陰陽而脈有陰陽故善診者察色按脈當先審別其陰陽審清濁而知部分夫色有清明有濁暗五色之見於面也各有部分審清濁則知病之從來知部分則知病之所在視喘息聽音聲而知所苦金匱要略曰息搖肩者心中堅息引心中上氣者咳息張口短氣者肺痿唾沫又曰吸而微數其病在中焦實也當下之則愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治又曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病平脈篇曰病人欠者無病也脈之而呻者病也言遲者風也搖頭者里痛也裡實護腹如懷卵物者心痛也此以望聞而知其病之所苦也觀權衡規矩而知病所主觀四時所應之脈而知病之所主者何臟按尺寸觀浮沉滑澀而知病所生以治寸主在上為陽尺主在下為陰浮為在表為陽沉為在裡為陰滑主氣為陽澀主血為陰審察脈之上下表裡氣血而知病之生於陰生於陽而以法治之也無過以診則不失矣夫診有五過診無差誤則治之不失矣故曰病之始起也可刺而已其盛可待衰而已此以下言治病者亦當取法於陰陽也夫針石所以治外者也病之始起尚在於外故可刺而已其病盛者勿去其針待其衰而後已言始起在外在陽盛則在裡在陰也故因其輕而揚之因其重而減之因其衰而彰之病之始起則輕而淺久則重而深故因其輕而發揚之因其重而少減之因其病勢少衰而彰逐之蓋病之盛者不可急逆經曰微者逆之盛者從之避其來銳擊其惰歸此之謂也形不足者溫之以氣精不足者補之以味形謂形體肌肉精謂五臟之陰精夫形歸氣氣生形溫熱氣勝者主補陽氣故形不足者當溫之以氣五臟主藏精者也五味入口各歸所喜津液各走其道故五味以補五臟之精靈樞經曰諸部脈小者血氣皆少其陰陽形氣俱不足勿以針而當調以甘和之藥可也是不足者不可妄用其針又當溫補其氣味其高者因而越之其下者引而竭之中滿者瀉之於內人有三部在上為陽在下為陰病在胸膈之上者因其上而發越之其在胸腹之下者因其下而引去之其在中者宜從內而瀉泄之此言病之有上下陰陽而治之有法也其有邪者漬形以為汗漬浸也古者用湯液浸漬取汗以去其邪此言有邪之在表也其在皮者汗而發之邪在皮毛取汗而發散之其慓悍者按而收之氣之悍利者宜按摩而收引其實者散而瀉之陽實者宜散之陰實者宜瀉之此言病之有表裡陰陽而治之亦有法也審其陰陽以別柔剛陰陽者天之道也剛柔者地之道也參合天地之氣者人之道也陽病治陰陰病治陽治平治也如感天之陽邪則當治人之陰氣陰氣盛而陽熱之邪自解矣如感天之陰邪則當治人之陽氣陽氣盛而陰寒之邪自散矣此邪正陰陽之各有對待而善治者之有法也定其血氣各守其鄉承上文而言如邪在氣分則當守其陰血而勿使邪入於陰如邪在血分則當守其陽氣而勿使陰邪傷陽定其血分氣分之邪而各守其部署蓋陽邪傷氣陰邪傷血氣血內守則邪不敢妄侵此即上文對待之意血實宜決之氣虛宜掣引之經曰邪之所湊其正必虛實者邪氣實而虛者正氣虛也血實者決之使行氣虛者掣之使升蓋陽氣發原於下也上節言各守其陰陽氣血使邪之不敢妄傳此復言其在血分而血實者宜行血以驅邪邪在氣分而氣虛者宜提掣陽氣以助正此又邪正對待之一法也按此篇論天地人之陰陽相應而針石診治亦皆法乎陰陽故曰天地者萬物之上下也陰陽者血氣之男女也蓋陰陽之在人為男為女在身為氣為血故末結其氣血焉陰陽離合論篇第六黃帝問曰余聞天為陽地為陰日為陽月為陰大小月三百六十日成一歲人亦應之今三陰三陽不應陰陽其故何也按此篇論三陰三陽之氣皆出於地之陰出則為陽合則歸陰與天地定位日月呈象之陰陽不同故帝設此問而名曰陰陽離合論也陰陽系日月論曰天為陽地為陰日為陽月為陰其合之於人腰以上為天腰以下為地故足之十二經脈以應十二月月生於水故在下者為陰手之十指以應十日日主火故在上者為陽曰大小月三百六十日成一歲人亦應之與日月論文義相同岐伯對曰陰陽者數之可十推之可百數之可千推之可萬萬之大不可勝數然其要一也數上聲陰陽者有名而無形不可勝數然其要道歸於一也易曰一陰一陽之謂道莫子晉曰天地定位日月運行寒暑往來陰陽出入總歸於太極一氣之所生天覆地載萬物方生未出地者命曰陰處名曰陰中之陰則出地者命曰陰中之陽天覆地載萬物方生言有天地然後萬物生焉然天地之化育萬物由四時之陰陽出入而能生長收藏為萬物之終始未出地者命曰陰處言處於陰中而為陰中之陰則出地者為陽其名曰陰中之陽言從陰中所出而為陽也陽予之正陰為之主嚮明處曰正予我也言在地之氣乃陰中之陰故陰為之主以我所主之氣而嚮明處欲出者為陽故曰陽予之正也如聖人南面而立前曰廣明乃室之嚮明處也後曰太衝乃陰為之主也是以三陽皆根起於陰故生因春長因夏收因秋藏因冬失常則天地四塞生長收藏者地之陰陽也春夏秋冬者天之陰陽也此復言地氣之出入又因天氣之四時而為之生長收藏此天地陰陽離合之常理失常則天地四時之氣皆閉塞矣夫天有陰陽地有陰陽三陰三陽之氣雖出於地而又當於天之陰陽相交陰陽之變其在人者亦數之可數天地之陰陽數之可十可百推之可千可萬陰陽之變其在人者亦不可勝數也如人之身半以上為陽身半以下為陰手之十指為陽足之十二經脈為陰背為陽腹為陰左為陽右為陰外為陽內為陰腑為陽臟為陰與三陰三陽不相應也帝曰願聞三陰三陽之離合也離則為三陰三陽合則為一陰一陽岐伯曰聖人南面而立前曰廣明後曰太衝南面者人君聽治之位故曰聖人然人皆面南而背北左東而右西以聖人而推及於萬民也南面為陽故曰廣明背北為陰而曰太衝太衝乃陰血之原位處下焦上循背裡是以三陰以太衝為主太衝之地名曰少陰太衝所起之地為足少陰之處少陰之上名曰太陽少陰與太陽合陽出於陰故在陰之上太陽根起於至陰結於命門名曰陰中之陽至陰穴名在足小指外側太陽經脈之根起於此也結交結也按靈樞根結篇曰太陽結於命門命門者目也陽明結於顙大顙大者鉗耳也少陽結於蔥籠蔥籠者耳中也太陰結於太倉少陰結於廉泉厥陰結於玉英中身而上名曰廣明身半以上天氣主之身半以下地氣主之陽出於陰從下而上故中身而上名曰廣明先以前面為陽此復以中身而上為陽廣明之下名曰太陰太陰主中土而為陰中之至陰故位居廣明之下太陰之前名曰陽明太陰與陽明合並主中土故位居太陰之前陽明根起於厲兌名曰陰中之陽厲兌穴名在足大指次指之端乃足陽明經脈之所起厥陰之表名曰少陽太陽之氣在上故曰少陰之上兩陽合明曰陽明在二陽之間而居中土故曰太陰之前厥陰處陰之極陰極於裡則生表出之陽故曰厥陰之表蓋以前為陽上為陽表為陽也曰上曰前曰表者言三陽之氣也曰至陰厲兌竅陰者言三陽之經脈也手足十二經脈主三陰三陽之氣在經脈則分為三陰三陽在氣相搏命曰一陰一陽耳少陽根起於竅陰名曰陰中之少陽竅陰穴名在足小指次指之端少陽主初生之氣故名陰中之少陽三陽之氣皆出於陰故曰陰中之陽而只論足之三經也是故三陽之離合也太陽為開陽明為闔少陽為樞陰陽之氣分而為三陰三陽故有開闔樞也太陽者巨陽也為盛陽之氣故主開陽明合於二陽之間故主闔少陽乃初出之氣故主樞三經者不得相失也摶而勿浮命曰一陽開闔者如戶之扉樞者扉之轉牡也舍樞不能開闔舍開闔不能轉樞是以三經者不得相失也開主外出闔主內入樞主外內之間若摶於中而勿浮則合而為一陽矣帝曰願聞三陰岐伯曰外者為陽內者為陰陽氣出而主外陰氣升而主內然則中為陰其衝在下名曰太陰陰陽二氣皆出於下陰氣出而在內是以中為陰其所出之太衝在下而沖之上名曰太陰衝脈為十二經脈之原故三陰三陽皆以太衝為主太陰根起於隱白名曰陰中之陰隱白穴名在足大指端太陰為陰中之至陰太陰之後名曰少陰中為陰故曰後曰前言陰氣出於下而並處於裡之中也少陰根起於湧泉名曰陰中之少陰湧泉穴名在足心下蜷指宛宛中少陰乃一陰初生之氣故為陰中之少陰少陰之前名曰厥陰少陰主水厥陰主水生之木故在少陰之前厥陰根起於大敦陰之絕陽名曰陰之絕陰大敦穴名在足大指三毛中足厥陰肝經所出之井穴陰在下故論足之三陰也十一月一陽初生厥陰主十月為陽之盡故曰陰之絕陽兩陰交盡名曰厥陰故為陰之絕陰是故三陰之離合也太陰為開厥陰為闔少陰為樞太陰者三陰也為陰之盛故主開厥陰為兩陰之交盡故主闔少陰為一陰之初生故主樞三經者不得相失也摶而勿沉命曰一陰陰氣從下而出在內之中摶聚而勿沉命為一陰也陽氣主浮故曰勿浮陰氣主沉故曰勿沉蓋三陽之氣開闔於形身之外內三陰之氣開闔於內之前後故曰陽在外陰之使也陰在內陽之守也陰陽𩅞𩅞積傳為一周氣里形表而為相成也𩅞𩅞氣之往來也陰氣積於內陽氣傳於外日出而陽氣始生日中而陽氣隆日晡而陽氣衰日入而陽氣內歸於陰一晝夜而為之一周陰氣開闔於裡陽氣出入於形表而為陰陽離合之相成也陰陽別論篇第七黃帝問曰人有四經十二從何謂岐伯對曰四經應四時十二從應十二月十二月應十二脈四經者春脈弦夏脈鉤秋脈毛冬脈石四時之經脈以應四時之氣也十二從者手足三陰三陽之氣從手太陰順行至足厥陰也應十二月者手太陰應正月寅手陽明應二月卯足陽明應三月辰足太陰應四月巳手少陰應五月午手太陽應六月未足膀胱應七月申足少陰應八月酉手厥陰應九月戌手少陽應十月亥足少陽應十一月子足太陰應十二月醜十二脈者六腑六臟之經脈也三陰三陽之氣以應歲之十二月十二月復應有形之十二脈也此篇論分別陰陽以知死生故曰陰陽別論脈有陰陽知陽者知陰知陰者知陽十二經脈乃臟腑陰陽配合故知陽者可以知陰知陰者可以知陽能知陰陽可別死生方盛衰論曰持雌失雄棄陰附陽不知併合診故不明凡陽有五五五二十五陽此節以胃臟藏真而分別其陰陽也胃脘之陽資養五臟五臟相生而各有五是以五五二十五陽也所謂陰者真臟也見則為敗敗必死也五臟為陰臟者藏也神藏而不外見者也如無陽和之胃氣而真臟之脈見見則臟氣為敗敗必死也所謂陽者胃脘之陽也所謂二十五陽者乃胃脘所生之陽氣也胃脘者中焦之分主化水穀之精氣以資養五臟者也夫四時之脈春弦夏洪秋浮冬沉長夏和緩五臟之脈肝弦心洪脾緩肺澀腎沉如春時之肝脈微弦而長心脈微弦而洪脾脈微弦而緩肺脈微弦而澀腎脈微弦而沉夏時之肝脈微洪而弦心脈微洪而大脾脈微洪而緩肺脈微洪而澀腎脈微洪而沉四時五臟皆得微和之胃氣故為二十五陽也別於陽者知病處也別於陰者知死生之期能別陽和之胃氣則一有不和便可知病處能別真臟之陰脈則知肝脈至者期十八日死心脈至者九日死也此論真臟為陰胃氣為陽與上下二節論經脈之陰陽不同也三陽在頭三陰在手所謂一也此復論十二經脈之陰陽也手足三陽之脈手走頭而頭走足故曰三陽在頭手足三陰之脈足走腹而腹走手故曰三陰在手也十二經脈雖有手足陰陽之分然皆一以貫通手太陰肺脈交於手陽明大腸大腸交足陽明胃胃交足太陰脾脾交手少陰心心交手太陽小腸小腸交足太陽膀胱膀胱交足少陰腎腎交手厥陰心包絡包絡交手少陽三焦三焦交足少陽膽膽交足厥陰肝肝復交於手太陰肺故所謂一也別於陽者知病忌時別於陰者知死生之期能別於陽之脈證者知一陽二陽三陽之發病及陽結之為病也至於三陽搏鼓三日死二陽俱搏十日死忌死忌也言別於陽者知所病之證及死忌時也別於陰之脈者知一陰二陰三陰之發病及肝之心心之肺以至於陰搏之死證此論別手足三陰三陽之脈證也謹熟陰陽無與眾謀此總結上文之意所謂陰陽者胃脘之陽真臟之陰手足之三陽手足之三陰也言審別陰陽之脈謹熟之於心應之於手無與眾相謀論也所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽此審別十二經脈之陰陽也夫臟為陰腑為陽手足之陰陽乃六臟六腑之經脈故當以脈之來去動靜遲數而分別其陰陽凡持真脈之臟脈者肝至懸絕急十八日死心至懸絕九日死肺至懸絕十二日死腎至懸絕七日死脾至懸絕四日死此審別真臟胃脘之陰陽也懸絕者真臟脈懸而絕無胃氣之陽和也急者肝死脈來急益勁如張弓弦也六節藏象論天以六六為節地以九九制會計人亦有三百六十五節以為天地久矣此氣之數也木生於地故死於九九之數肺主天氣絕於六六之期水火本於先天故死於生成之數脾土寄於四季故絕於四日之周五臟死期總合大衍之數按王氏皆以天地生成之數論之馬氏論天干之五行相剋其間多有不合夫臟腑具五行之氣各有陰陽剛柔不同不必執一而論是以以下陰陽相搏亦止少陰太陽死於天地生成之數余皆不合也此節論真臟脈見之死期與後節陰陽相搏之死期又少有異同也王子方曰人秉天地之氣數而生故應天地之氣數而死氣數者天地五行之數也曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治此審別三陰三陽之發病也二陽者足陽明胃經也夫人之精血由胃腑水穀之所資生脾主為胃行其精液者也二陽病則中焦之汁竭無以奉心神而化赤則血虛矣水穀之精脾無轉輸於五臟則腎無所藏而精虛矣男子無精有不得為隱曲之事在女子無血則月事不得以時下矣此病本於二陽而發於心脾也精血兩虛則熱盛而生風風熱交熾則津液愈消竭矣火熱爍金而傳為喘急息肩者死不治蓋胃乃津液之生原肺乃津液之化原也按陰陽離合論只論足之三陰三陽此章亦先論足經至末章曰三陰俱搏三陽俱搏是兼手經而言故曰俱也高士宗曰不得隱曲女子不月病在腎也風消肝木病也息賁病在肺也二陽之病傳發於五臟而死曰三陽為病發寒熱下為癰腫及為痿厥腨㾓腨音善㾓音捐三陽者太陽之為病也太陽之氣主表邪之中人始於皮毛邪正相搏發為寒熱之病矣太陽主開病則開闔不得邪氣從之逆於肉理乃生癰腫太陽為諸陽主氣而主筋筋傷則為痿氣傷則為厥也腨膕股也㾓痠疼也此皆太陽筋脈之為病也太陽之氣主表而經脈發原於下是以始病寒熱之在上在表而漸為癰腫痿厥頹疝之在內在下也張兆璜曰太陽標陽而本寒故為寒熱之病謂其能為寒為熱故曰為其傳為索澤其傳為頹疝太陽之經氣生於膀胱膀胱者主藏津液氣化則出太陽之氣病熱於表傳入於裡則水津枯索而澤竭矣頹疝小腹控卵腫痛所謂膀胱疝也蓋始病標而及本始病氣而及經與筋也曰一陽發病少氣善咳善泄一陽者少陽之氣病也少陽主初生之氣病則生氣少矣足少陽相火主氣氣少則火壯矣火爍金故善咳木火之邪賊傷中土故善泄也其傳為心掣其傳為隔飲食於胃濁氣歸心脾胃受傷而為泄故心虛而掣痛矣靈樞經云脾脈微急為膈中又曰飲食不下隔塞不通邪在胃脘此皆少陽之木邪乾土亦始病氣而後及經與腑也二陽一陰發病主驚駭背痛善噫善欠名曰風厥二陽一陰者陽明厥陰之為病也東方肝木其病發驚駭足陽明之脈病聞木音則惕然而驚背為陽厥陰主春陽肝木故引背痛也邪氣客於胃厥逆從上下散復出於胃故為噫也欠者氣引而上也胃是動病善伸數欠此厥陰風木厥逆之為病也風木為病干及胃土故名風厥二陰一陽發病善脹心滿善氣二陰一陽者少陰少陽也少陽之氣生於腎臟水中經云腎氣實則脹三焦病者腹氣滿小腹尤堅此腎氣與生陽並逆故善脹心腎之氣不能相交故心滿善氣也善氣者太息也心系急則氣道約故太息以伸出之三焦氣也此一陽之氣病故引論於三焦三陽三陰發病為偏枯痿易四肢不舉三陽三陰者太陽三陰之為病也偏枯者半身不遂痿易者委棄而不能如常之動作也太陽為諸陽主氣而主筋陽氣虛則為偏枯陽虛而不能養筋則為痿脾屬四肢故不舉也此水腑為病而逆乘脾土也鼓一陽曰鉤鼓一陰曰毛鼓陽勝急曰弦鼓陽至而絕曰石陰陽相過曰溜鉤當作弦弦當作鉤此論四經之脈以應四時也鼓動也一陽之氣初升故其脈如弦之端直以應春生之氣也一陰之氣初升故其脈如毛之輕柔以應秋陰之氣也陽氣正盛故其脈來盛去悠如鉤之急以應夏熱之氣也至者為陽陽氣伏藏故脈雖鼓至而斷絕以應冬藏之氣也溜滑也陰陽相過其脈則滑長夏之時陽氣微下陰氣微上陰陽相過故脈滑也此言人有四經以應四時之氣也陰爭於內陽擾於外內為陰外為陽臟為陰腑為陽承上文而言人之經氣陰陽相貫外內循環如陰不得陽氣以和之則陰爭於內矣陽不得陰氣以和之則陽擾於外矣高士宗曰此言陰陽之氣不和則為陽結陰結之病若夫剛與剛是陽傳於陽陰傳於陰乃陰陽相絕之死候也魄汗未藏四逆而起起則熏肺使人喘鳴此言陰和於陽而陰液不宜外泄者也汗者血之液也魄汗肺之汗也夫經氣歸於肺肺朝百脈輸精於皮毛皮毛汗出而精血仍藏於陰如魄汗未藏是奪汗而傷其精血矣臟真高於肺主行榮衛陰陽肺臟之陰液外泄則四臟之陰並逆而起起則上熏於肺而使人喘急喉鳴蓋五臟主藏精者也精化而為血血化而為汗百脈雖朝於肺而五臟相通移皆有次四逆而起則失其次序旋轉之機矣陰之所生和本曰和此言陽和於陰而後謂之和也夫外脈為陽腑脈為陽然皆本於五臟五行而生故曰陰之所生也陰之所生之陽脈與所本之陰脈相和而始名曰和蓋陽予之正陰為之主既有所出當有所入是故剛與剛則陽散而陰亡矣是故剛與剛陽氣破散陰氣乃消亡剛與剛是陽不與陰和矣陽不歸陰則陽氣破散陽氣外散而孤陰亦內亡矣淖則剛柔不和經氣乃絕此言柔與柔而生氣絕也淖和也陰與陰和而剛柔不和則陰無所生之陽矣孤陰不生則經氣乃絕經氣已絕不過三日四日而死也死陰之屬不過三日而死生陽之屬不過四日而死五臟相剋而傳謂之死陰相生而傳謂之生陽屬類也如肝之心心之脾脾之肺肺之腎皆謂之生陽如心之肺肺之肝之類皆謂之死陰也以陽臟相生而傳故不過四日之偶數而死以陰臟相剋而傳故不過三日之奇數而死也莫子晉曰三日者不過天地之生數四日者不能盡五行之數終所謂生陽死陰者肝之心謂之生陽心之肺謂之死陰之往也傳也夫肝脈傳肺肺傳大腸大腸傳胃胃傳脾脾傳心心傳小腸小腸傳膀胱膀胱傳腎腎傳心包絡包絡傳三焦三焦傳膽膽傳肝一臟一腑一雌一雄陰陽相間循環無端如肝之心心之肺肺之腎腎之脾此皆經氣絕而死不治者也肺之腎謂之重陰腎之脾謂之闢陰死不治肺之腎亦生陽之屬因肺腎為牝臟以陰傳陰故名重陰闢偏闢也以水臟而反傳所不勝之脾土故謂之闢陰此皆不治之死候也結陽者腫四肢此言陰陽之氣不和自結而為病也四肢為諸陽之本氣歸形氣結故形腫也此概三陽而言也結陰者便血一升再結二升三結三升陰氣結於內而不得流行則水亦留聚而下泄矣一陰結便血一升二陰並結便血二升三陰俱結便血三升此概三陰而言也辨脈篇曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者名曰陽結也其脈沉而遲不能食身體重大便反硬名曰陰結也蓋欲審別陰陽之氣結者當以脈之去至動靜浮沉遲數以分陰陽以證之腫四肢知三陽並結便血三升知三陰並結也以證之消知結在二陽當以二陽之法治之證之隔知結在三陽當以三陽之法治之可也陰陽結斜多陰少陽曰石水少腹腫結斜者偏結於陰陽之間也夫外為陽內為陰胃為陽腎為陰此結於形身之內臟腑之外胃腎空廓之間而為腫也石水腎水也腎者胃之關關門不利故聚水而從其類也此多偏於腎臟故為多陰少陽而少腹腫也二陽結謂之消二陽陽明胃氣也消消渴也蓋陽明氣結則水穀之津液不生以致消渴而為病也按靈樞以五臟之脈微為消癉蓋水穀之津液不資則五臟之精氣俱微弱矣三陽結謂之隔三陽太陽也太陽為諸陽主氣太陽之氣生於膀胱從內膈而出於胸脅從胸脅而達於膚表陽氣結則膈氣不通內膈之前當胃脘賁門之處膈氣逆則飲食亦隔塞而不下矣三陰結謂之水三陰太陰脾土也脾為轉運之官脾氣結則入胃之水液不行而為水逆矣一陰一陽結謂之喉痹一陰一陽者厥陰少陽也厥陰風木主氣而得少陽之火化風火氣結則金氣受傷是以喉痛而為痹也痹者痛也閉也陰搏陽別謂之有子陰搏者尺脈滑利而搏擊應手也陽別者與寸口之陽似乎別出而不相貫此當主有妊蓋有諸內而是以尺脈滑利如珠也吳氏曰此以下論脈也陰陽虛腸澼死陰陽指尺寸而言腸澼澼積下利也夫榮衛氣血皆由水穀之所資生胃為受納之府腸為傳導之官陰陽兩虛而又失其所生之本故無望其生機矣此言陰陽由腸胃水穀之所生也陽加於陰謂之汗汗乃陰液由陽氣之宣發而後能充身澤毛若動數之陽脈加於尺部是謂之汗當知汗乃陽氣之加於陰液而脈亦陽脈之加於陰部也陰虛陽博謂之崩陰虛陽盛則迫血妄行三陰俱搏二十日夜半死搏俱音博三陰者太陰也俱搏者脾肺二部俱搏擊應手而無陽和之氣也二者偶之始十者陰之終夜半者陰盡而將一陽初生之時太陰者至陰也以至陰之氣而絕無生陽故死於陰極之數也董帷園曰陰結陽結者論陰陽之氣結也剛與剛者言腑脈傳腑臟脈傳臟也陰搏陽搏者言十二經脈之陰陽不和也二陰俱搏十三日夕時死二陰者少陰也俱搏者心腎二部俱搏擊應手也少陰主水火陰陽之氣天乙生水地六成之地二生火天七成之十三日者成數之終也夕時者日之終也以水火之陰臟故死於成數而終於日終也一陰俱搏十日死一陰者厥陰也俱搏者肝與心主二部俱搏擊應手也十日者陰之終也厥陰者陰之盡也以陰盡之氣而死於陰數之終也三陽俱搏且鼓三日死三陽者太陽也鼓動也俱搏且鼓者手足太陽之脈俱搏擊而且鼓動陽極而絕無陰之和也太陽與少陰為表裡並主水火之氣天乙生水地二生火以水火之陽腑故死於天地之生數也蓋天為陽地為陰天主生地主成故太陽死於生數而少陰死於成數也三陰三陽俱搏心滿腹發盡不得隱曲五日死三陰三陽者五行之氣也陰陽二氣俱搏擊而不和故盡五行之數終而死也心滿陽搏於上也不得隱曲陰搏於下也腹居身半之中陰陽相交者也腹發盡者陽盡發於上陰盡發於下而無陰陽中見之和也此言上下陰陽之病下文言寒熱陰陽之病二陽俱搏其病溫死不治不過三日死二陽者陽明也俱搏者手足陽明俱搏擊也病溫者病寒熱也夫人之陰陽由陽明水穀之所資生二陽俱搏則絕其陰陽所生之原矣陰不得陽則病寒陽不得陰則病熱陰陽俱絕不治之死證也九乃陽之終十乃陰之盡不過十日者死於陰陽之交盡也上節言三陽在頭三陰在手所謂一也陰陽二氣不能一以貫通而自相搏擊其為病死也若此此言胃脘之陽以生養陰陽五臟二陽俱搏則陰陽並絕其病死也如此故末二節獨表出其病證焉靈蘭秘典論篇第八黃帝問曰願聞十二臟之相使貴賤何如六臟藏神六腑臟物六臟六腑皆謂之臟故云十二臟也相使者六臟六腑相為傳使也受清者貴受濁者賤五臟之中惟足太陰獨受其濁故曰脾胃者倉廩之官岐伯對曰悉乎哉問也請遂言之上章論手足三陰三陽之經脈陰陽相間而傳然所本於六臟六腑故帝復問臟腑之相使貴賤而伯稱其詳悉焉王子方曰血者神氣也心藏神心主脈故十二臟腑經脈皆以心為主心者君主之官也神明出焉位居南面靈應萬機故為君主之官清靜虛靈而主藏神故神明出焉肺者相傅之官治節出焉位高近君猶之宰輔主行榮衛陰陽故治節由之肝者將軍之官謀慮出焉肝氣急而志怒故為將軍之官主春生之氣潛發未萌故謀慮出焉膽者中正之官決斷出焉膽秉剛果之氣故為中正之官有膽量則有果斷故決斷出焉膻中者臣使之官喜樂出焉膻中者心主之宮城心主包絡位居膻中而代君行令故為臣使之官心志喜心主代君宣布故喜樂出焉脾胃者倉廩之官五味出焉脾胃運納五穀故為倉廩之官五味入胃脾為轉輸以養五臟氣故五味出焉大腸者傳道之官變化出焉大腸居小腸之下小腸之受盛者賴以傳道濟泌別汁變化糟粕從是出焉小腸者受盛之官化物出焉小腸居胃之下胃之運化者賴以受盛而凡物之所化者從是出焉腎者作強之官伎巧出焉伎多能也巧精巧也腎藏志志立則強於作用能作用於內則伎巧施於外矣三焦者決瀆之官水道出焉決通也瀆水道也三焦下俞出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺三焦主氣氣化則水行故為決瀆之官也膀胱者州都之官津液藏焉氣化則能出矣膀胱為水腑乃水液都會之處故為州都之官水穀入胃濟泌別汁循下焦而滲入膀胱故為津液之所藏氣化則水液運行而下出矣凡此十二官者不得相失也十二官者經脈相通剛柔相應失則災害至矣故主明則下安以此養生則壽歿世不殆以為天下則大昌五臟六腑心為之主君主神明則十二官各安其職以此養生則壽終身而不至危殆蓋心正則身修也以此而及於治國平天下未有不大昌者矣主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之心者離也離也者明也心為一身之主即我之神明心主不明則十二官皆不安矣心主包絡為臣使之官代君行令而主脈脈者血脈也血者神氣也神明昏亂則血脈凝泣而使道閉塞矣血氣者充膚熱肉滲皮膚生毫毛濡筋骨利關節者也血脈不通而形乃大傷矣故以此養生則殃折不壽在治天下則其宗大危正心明德之道豈不重可戒哉此言心為一身之主主明即可以養生推而大之可以治國平天下如心不明即此身亦不可保矣至道在微變化無窮孰知其原承上文而言修身養生以及於為天下之至道始在於微蓋心之變化無窮苟正其心在養生則壽為天下則昌其心不正在此身則殃為天下則殆當知壽夭治亂之機在此心一念之發萌而人莫知其原也窘乎哉消者瞿瞿孰知其要閔閔之當孰者為良窘乎哉者嘆其至道之難明而窘極也消者消息其道之微瞿瞿驚顧貌視其道之要妙而孰能知之也閔憂也憂其理之切當而孰者為良也恍惚之數生於毫釐毫釐之數起於度量千之萬之可以益大推之大之其形乃制恍惚謂心神之萌動生於毫釐之間度量長短輕重也言毫釐之間而有邪正明昧之分以至於千之萬之不可勝極也制正也以毫釐之誠意推而大之其形乃正言其心正而後形正也黃帝曰善哉余聞精光之道大聖之業而宣明大道非齋戒擇吉日不敢受也精純粹也光光明也言正心明德之道也大聖之業者能正心修身以及於治國平天下也齋戒者誠意滌慮也擇吉者從善避惡也帝乃擇吉日良兆而藏靈蘭之室以傳保焉良善兆吉也靈蘭之室心之宮也乃擇其良善而藏之於心以傳保者保於無窮流於無極守而勿失也按靈樞經曰五臟六腑心為之主肺為之相肝為之將脾為之衛腎為之主外大腸者傳道之府小腸者受盛之府膽者中精之府胃者五穀之府膀胱者津液之府三焦者中瀆之府也吳氏曰靈臺蘭室黃帝藏書之所秘典秘密典籍也六節臟象論篇第九黃帝問曰余聞天以六六之節以成一歲人以九九制會計人亦有三百六十五節以為天地久矣不知其所謂也天以六六之節者十干主天六十日甲子一周而為一節六六三百六十日以成一歲也人以九九制會者人之九竅九藏以會合生五氣三之數也靈樞經曰歲有三百六十五日人有三百六十節言人亦有六六之節以應天六六之數也按下文曰地以九九制會蓋人有九竅九藏地有九州九野以合三而成天三而成地三而成人故先言人以九九制會而後言地以九九制會也按此篇乃論歲運之總綱天之十干成六六之節以應一歲而天之十干化生地之五行地之五行上呈天之六氣五運行大論云帝曰寒暑燥濕風火在人合之奈何岐伯曰東方生風風生木木生酸酸生肝是在天之六氣在地之五行五味而又化生人之五臟也然人之五臟地之五行皆由天之十干所化故曰六節臟象論也夫人之五臟又化生六氣六氣者即末章之所謂人迎一盛病在少陽二盛病在太陽是也蓋人之五臟應地之五行食地之五味人之六氣復應天之六氣氣亢害而無承製則為病矣夫先以九九制會以應六六之節者言地有九州人有九竅天有六節而皆合乎生五氣三之數岐伯對曰昭乎哉問也請遂言之夫六六之節九九制會者所以正天之度氣之數也昭明也遂因也言六六之節所以正天之度蓋歲有三百六十五日而天有三百六十五度也九九制會所以紀氣之數也天度者所以制日月之行也氣數者所以紀化生之用也制度也天度者周天三百六十五度日日行一度一歲而一周天月日行十三度一月而一周天蓋以天之度數以紀日月之行也氣數者生五氣三之數也化者陰陽之化在天而成六六在地在人而成九九皆陰陽氣化之為盛也天為陽地為陰日為陽月為陰行有分紀周有道理日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積餘氣而盈閏矣此復申明天度以紀日月之行也行有分紀者謂日月之行有分野紀度周有道理者謂日月之周天有南道北道之理路也按曆法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七故曰有奇也故日一歲而一周天月二十九日有奇而一周天以二十九日有奇故有大月小月也每歲朔虛五日有奇故止三百五十四日又氣盈五日有奇合氣盈朔虛而閏生焉故每歲連閏共計三百六十五日有奇也漢律志云日月五星從西而循天東行天道從東西行一晝一夜日月隨天西轉一周如蟻行磨上磨轉一回而日往東行止一度月從西而東行十三度故月行疾而一月與日一會而一周天是以每歲冬至夏至日行有南道北道之分每月上弦下弦而月有南道北道之分也立端於始表正於中推余於終而天度畢矣立端豎端正之木以正天表也上古樹八尺之臬度其日出入之影以正東西參日中之影與極星以正南北以周天三百六十五度之餘四分度之一推日月行度之有奇氣盈五日之有餘朔虛五日之有餘推而算之以終一歲之數以終天道之周而天度畢矣帝曰余以聞天度矣願聞氣數何以合之帝復以九九之數以合六六之數而為問也岐伯曰天以六六為節地以九九制會首言人之九九以應天之六六此言地之九九以應天之六六也天有十日日六竟而周甲甲六復而終歲三百六十日法也此言天以六六為節而成一歲也十干主天故曰天有十日夫自古通天者生之本本於陰陽其氣九州九竅皆通乎天氣此言地之九九人之九九而通乎天之六六者皆本於陰陽陰陽者五行所生之三氣也是以地之九州人之九竅皆通乎天氣蓋天有此三氣地有此三氣人有此三氣也故其生五其氣三生五者天之十干化生地之五行也氣三者五行所生三陰三陽之氣也承上文而言以五行所生之三氣而後能合六六九九之數也三而成天三而成地三而成人以此三氣三而三之以成天之六氣地之六氣人之六氣也天之六氣者以冬至後得甲子少陽王復得甲子陽明王復得甲子太陽王復得甲子厥陰王復得甲子少陰王復得甲子太陰王所謂天以六六之節以成一歲也地之六氣者顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之此地理之應六節氣位也人之六氣者臟腑三陰三陽之氣也是以人迎一盛病在少陽二盛病在太陽三盛病在陽明寸口一盛病在厥陰二盛病在少陰三盛病在太陰所謂亢則害承乃制害則敗亂生化大病也三而三之合則為九九分為九野九野為九藏再以天地人之六氣三而三之合則為九九九九分為地之九野人之九藏蓋以九州配九竅九野配九藏故曰九野為九藏也以地之九州通乎天氣天之三氣分為九野是地以九九制會而合天之六六也以人之九竅通乎天氣天之三氣分為九藏是人以九九制會而合天之六六也高士宗曰邑外謂之郊郊外謂之牧牧外謂之野野附城郭者也脹論曰胸腹腸胃之郭也膻中者心主之宮城也蓋以九野在內九州在八方之外九藏在內九竅在形身之外故曰九野為九藏也以九野之草生五色普遍於九州八荒是五色之變不可勝視矣五氣五味藏於心肺腸胃外使九竅之五色修明音聲能彰此五味之美不可勝極矣是人之九竅與天氣相通而九藏之又與地氣相通也故形臟四神臟五合為九藏以應之也形藏者藏有形之物也神藏者藏五臟之神也藏有形之物者胃與大腸小腸膀胱也藏五臟之神者心藏神肝藏魂脾藏意肺藏魄腎藏志也蓋五味入口藏於腸胃津液藏於膀胱以養五臟之神氣故以形藏神藏合而為九藏以配地之九野九州也按臟腑各六止五臟藏神腸胃膀胱受盛水穀膽乃奇恆之府不藏有形三焦雖主決瀆乃無形之氣而亦不藏有形者也故以九藏在內以應九野九竅在外以應九州而王氏諸賢妄以頭角耳目為形藏即三部九候論之所謂天以候頭角之氣者候足太陽膀胱之氣也地以候口齒之氣者候足陽明胃腑之氣也小腸之脈至目銳眥卻入耳中人以候耳目之氣者候手太陽小腸之氣也豈可以頭角耳目為形藏乎張兆璜曰若謂耳目口齒是屬九竅而非九藏矣帝曰余已聞六六九九之會也夫子言積氣盈閏願聞何謂氣請夫子發蒙解惑焉三五十五日為一氣每一氣盈二十一刻有奇合氣盈朔虛而生閏故曰積氣盈閏也此以下論五運之主歲主時各有太過不及故復設此問岐伯曰此上帝所秘先師傳之也上帝貴道而秘密師所以傳教者也莫子晉曰上帝天帝也天不言而四時代序惟師能闡明而傳道之帝曰請遂言之王氏曰遂盡也岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉月令曰立春節初五日東風解凍次五日蟄蟲始振後五日魚上冰故五日謂之候候物氣之生長變化也三五十五日而成一氣六氣九十日而為一時四時合二十四氣而成一歲以四時之氣而各從其主治焉五運相襲而皆治之終期之日周而復始時立氣布如環無端候亦同法此論五運之主歲也甲己之歲土運主之乙庚之歲金運主之丙辛之歲水運主之丁壬之歲木運主之戊癸之歲火運主之以五行之相生沿襲而各主一歲一歲之中所主之氣而皆治之終期年之三百六十日五歲一周而復始也時立氣布者一歲之中又分立五運所主之時而分布五行之氣五氣相傳而如環無端其候環轉之氣亦如五歲沿襲之法同也故曰不知年之所加氣之盛衰虛實之所起不可以為工矣每歲有六氣之加臨五運之太過不及氣有盛衰則虛實之乘侮勝復所由起也歲氣之盛虛主民病之生死故不知氣運者不可為良工也帝曰五運之始如環無端其太過不及何如五運之始始於甲己化土土生金金生水水生木木生火火復生土五歲而右遷如環無端五行所主之歲而各有太過不及岐伯曰五氣更立各有所勝盛虛之變此其常也五運之氣五歲更立太過之年則勝己所勝而侮所不勝不及之年則為己所不勝而勝之己所勝而侮之故各有所勝也所勝之氣不務其德則反虛其本位而復受其乘侮此盛虛之變理之常也帝曰平氣何如岐伯曰無過者也無太過不及之歲是為平氣故曰無過者謂不愆常候也帝曰太過不及奈何岐伯曰在經有也此篇乃歲運之提綱後天元紀五運行六微旨氣交變五常政至真要諸篇詳論天地有淫勝郁復之變生物有草木昆蟲之眚民病有胸脅腹背之災故曰在經有也帝曰何謂所勝岐伯曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得五行時之勝各以氣命其臟此言五運之所勝也春應木木勝土長夏應土土勝水冬應水水勝火夏應火火勝金秋應金金勝木所謂得五行之主時而為勝也春木合肝夏火合心長夏土合脾秋金合肺冬水合腎各以四時五行之氣以名其藏焉帝曰何以知其勝岐伯曰求其至也皆歸始春未至而至此謂太過則薄所不勝而乘所勝也命曰氣淫不分邪僻內生工不能禁此論歲運之氣至有太過不及而皆歸始於春蓋春為氣之始也六元正紀大論曰運太過則其至先運不及則其至後此天之道氣之常也運非有餘非不足是謂正歲其至當其時也是以春未至而天氣溫和此為至先運之太過也主歲之氣太過則薄己所不勝之氣而乘侮己所勝之氣也至真要大論曰氣至謂之至氣分謂之分至則氣同分則氣異所謂天地之正紀也如所主歲運之氣惟太過淫勝而不分則民之邪僻內生雖有良工不能禁也下經曰太過者暴不及者徐暴者為病甚徐者為病持是以太過之歲如木淫不政衝陽絕者死不治歲火太過太淵絕者死不治故不及之氣止云所生受病而不致於工不能禁也至而不至此謂不及則所勝妄行而所生受病所不勝薄之也命曰氣迫春已至而天未溫和是至而不至此謂氣之不及也主歲之運氣不及則所勝之氣妄行而所生受病所不勝薄之也如歲木不及則己所勝之土氣妄行而所生我之水氣受病矣木火之氣虛則己所不勝之金氣薄而侮之也名曰氣迫謂主氣不及而所勝所不勝之氣交相逼迫也所謂求其至者氣至之時也謹候其時氣可與期失時反候五治不分邪僻內生工不能禁也此復申明氣淫不分之義所謂求其至者求其四時之氣應至而至之時也謹候其春夏秋冬之時則春時之氣可期而溫夏時之氣可期而熱秋時之氣可期而涼冬時之氣可期而寒失時反候而五行所主之時氣不分以致邪僻內生而工不能禁也朱濟公曰此節添一也字有意帝曰有不襲乎襲承襲也木承水而王於春火承木而王於夏土承火而王於長夏金承土而王於秋水承金而王於冬五運之氣交相沿襲而主治也岐伯曰蒼天之氣不得無常也氣之不襲是謂非常非常則變矣言蒼天之氣四時代序自有經常然五運之氣有德化政令變異災眚之不同設有不襲是謂反常而變易矣變易則為民病之災眚矣帝曰非常而變奈何岐伯曰變至則病所勝則微所不勝則甚因而重感於邪則死矣故非其時則微當其時則甚也五運相襲氣之常也反常則為變易矣變常之氣至則為民病矣如春木主時其變為驟注是主氣為風木變氣為濕土變氣為主氣之所勝而民病則微如變為肅殺是主氣為風木變氣為燥金變氣為主氣之所不勝而民病則甚因而重感於邪則死矣故變易之氣至非其克我之時為病則微當其克我之時為病則甚帝曰善余聞氣合而有形因變以正名天地之運陰陽之化其於萬物孰少孰多可得聞乎此復言地氣與天氣相合而後化生萬物之有形也五常政大論曰氣始而生化氣散而有形氣布而蕃育氣終而象變然而五味所資生化有薄厚成熟有多少終始不同蓋在天為氣在地成形形氣相合而化生萬物物生謂之化物極謂之變物變已成而後定名此皆天地之運陰陽之化然生化有厚薄成熟有多少故帝設此問焉岐伯曰悉哉問也天至廣不可度地至大不可量大神靈問請陳其方所謂太虛遼廓肇基化元萬物資始五運終天布氣真靈總統坤元幽顯既位寒暑弛張生生化化萬物咸章故曰大神靈問神靈指天地陰陽而言言大哉天地陰陽之問也陳其方言其略也草生五色五色之變不可勝視草生五味五味之美不可勝極草者五穀五菜概及果木而言也蓋天三生木故先言草木而及於昆蟲萬物也草生五色者其色為蒼其化為榮其色為赤其化為茂其色為黃其化為盈其色為白其化為斂其色為黑其化為肅物極而象變不可勝視也草生五味者其味為酸其味為苦其味為甘其味為辛其味為咸以草生之五味而及於五菜五穀五果五畜之美不可勝極也嗜欲不同各有所通言人之嗜欲不同而五味各歸所喜如苦先入心酸先入肝五氣入鼻藏於心肺五味入口以養五氣故各有所通也天食人以五氣地食人以五味五氣臊焦香腥腐也在天為氣故食人以五氣在地為化化生五味故食人以五味也五氣入鼻藏於心肺上使五色修明音聲能彰天位居高而包乎地之外故五氣從外竅而內入於心肺心肺居上為陽也心榮色而華於面故使五色修明肺主聲故音聲能彰也五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生地位居下而處乎天之內故五味藏於腸胃以養五臟之氣氣得味養則陰陽和而相生矣水穀皆入於口其味有五津液各走其道氣和津成而五臟之神乃自生矣濟公曰神氣為陽故曰生津液為陰故曰成帝曰藏象何如象者像也論臟腑之形像以應天地之陰陽也岐伯曰心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣心主血中焦受氣取汁化赤而為血以奉生身莫貴於此故為生身之本心藏神而應變萬事故曰神之變也十二經脈三百六十五絡其氣血皆上於面心主血脈故其華在面也在體為脈故其充在血脈其類火而位居尊高故為陽中之太陽而通於夏氣夏主火也濟公曰榮為根衛為葉榮血為陰陽血氣所生之本肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣肺主氣而藏魄故為氣之本魄之處也肺主皮毛故華在毛充在皮也藏真居高而屬陰故為陽中之太陰而通於秋氣秋主肺也腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣冬令之時陽氣封閉蟄蟲深藏腎主冬藏故為蟄封藏之本蓋蟄乃生動之物以比生陽之氣至春一陽初生而蟄蟲復振矣腎為水臟受五臟之精液而藏之故為精之處也發乃血之餘血乃精之化故其華在發腎主骨故其充在骨也腎為陰臟而有坎中之陽故為陰中之少陰而通於冬氣冬主水也肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼此為陽中之少陽通於春氣動作勞甚謂之罷肝主筋人之運動皆由乎筋力故為罷極之本肝藏魂故為魂之居爪者筋之餘故其華在爪其充在筋肝屬木位居東方為發生之始故以生血氣酸者木之味蒼者木之色木旺於春陽氣始生故為陽中之少陽以通於春氣張令韶曰罷同羆書曰有熊罷之士不二心之臣肝乃將軍之官故為罷極之本脾胃大腸小腸三焦膀胱者倉廩之本榮之居也名曰器能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣足太陰獨受水穀之濁為轉輸之官腸胃主受傳水穀三焦主決瀆水道膀胱為水精之府故皆為倉廩之本脾藏榮故為榮之居器者生化之宇具升降出入之氣脾能運化糟粕轉味而入養五臟輸出腐穢於二陰故名之曰器也四白唇之四際白肉也口為脾竅而主肌故華在唇四白其充在肌甘者土之味黃者土之色也脾為陰中之至陰通於土氣此節指脾而言以腸胃三焦膀胱並受傳水穀之精粗故總為倉廩之本受濁者為陰故曰至陰之類凡十一臟取決於膽也五臟六腑共為十一臟膽主甲子為五運六氣之首膽氣升則十一臟腑之氣皆升故取決於膽也所謂求其至也皆歸始春故人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽此論臟腑之六氣以應天地之六六也左為人迎右為氣口蓋陽氣從左而行於右陰氣從右而行於左故以人迎以候三陽之氣故者承上文而言人之臟腑以應三陰三陽之六氣也一盛病在少陽少陽主春升之氣也太陽主夏陽明主秋四盛以上者言人之陰陽惟陽太盛名曰格陽蓋陽主在外陽格於外不得三陰中見之化以和之此三陽之太過也寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰寸口手太陰之兩脈口以候三陰之氣也厥陰主乙木春生之氣故寸口一盛病在厥陰二之氣少陰四之氣太陰四盛以上者人之陰陽惟陰太盛名曰關陰蓋陰氣主內關陰於內不得三陽中見之化以和之此三陰之太過也此論寸口人迎之病脈以應四時之三陰三陽即四時之六氣不平而亦為三陰三陽之民病也故六微旨大論曰至而不至來氣不及未至而至來氣有餘物生其應也氣脈其應也靈樞經曰持其脈口人迎以知陰陽有餘不足平與不平天道畢矣所謂平人者不病不病者脈口人迎應四時也上下相應而俱往來也上下相應者脈口與人迎平等所謂陰中有陽陽中有陰也此言天地之陰陽以應人之臟腑臟腑之六氣以應天地之陰陽也人迎與寸口俱盛四倍以上為關格關格之脈贏不能極於天地之精氣則死矣俱四倍以上者陰陽俱亢極也贏盈同極至也蓋天有陰陽地有陰陽陽盛之下陰精承之陰盛之下陽氣承之陰陽承製而交相生化者也人生於天地氣交之中陰陽和平是為無病如陰陽俱盛而不和是不能及於天地陰陽精氣之承製則死矣此即六微旨之所謂亢則害承乃制制則生化外列盛衰害則敗亂生化大病五臟生成篇第十夫色以應天脈以應地天主生地主成此篇無問答而直曰心之合脈似承上篇天地之陰陽而復應乎色脈也無問答故不曰論心之合脈也其榮色也心主血脈故合於脈經云脈出於氣口色見於明堂心之華在面故其榮在色其主腎也五臟合五行各有相生相制制則生化心主火而受制於腎水是腎乃心臟生化之主故其主腎也肺之合皮也其榮毛也其主心也肺主氣氣主表故合於皮傷寒論曰寸口脈緩而遲緩則陽氣長其聲商毛髮長毛附於皮氣長則毛榮肝之合筋也其榮爪也其主肺也髓生肝肝生筋故所合在筋爪乃筋之餘故其榮在爪脾之合肉也其榮唇也其主肝也脾主中央土乃倉廩之官主運化水穀之精以生養肌肉故合肉脾開竅於口故榮在唇腎之合骨也其榮發也其主脾也腎藏精而主髓故所合在骨發乃精血之餘故其榮在發五運行大論曰北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝肝生筋筋生心心生血血生脾脾生肉肉生肺肺生皮毛皮毛生腎此天乙生水而五臟之相生也六微旨大論云帝曰地理之應六節氣位何如岐伯曰相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之亢則害承乃制制則生化故曰心之合脈也肺之合皮也言五臟之相生也其主腎也其主心也言五臟之相成也朱濟公曰先心而肺肺而肝肝而脾脾而腎乃歸重於成與曰然是故多食鹹則脈凝泣而色變多食苦則皮槁而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落此五味之所傷也此承上文而言太過之為害也夫五行有相生相制不可偏廢者也如制之太過則又有克賊之害矣是故多食鹹則水味太過而傷心其脈凝泣而色變矣多食苦是火味太過而傷肺則皮槁而毛落矣多食辛是金味太過而傷肝則筋縮急而爪乾枯矣多食酸是木味太過而傷脾則肉胝䐢而唇掀揭矣多食甘是土味太過而傷腎則骨痛而發落矣五味所以養五臟者也臟有偏勝則所不勝之臟受傷此又承製之不可太過也故心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味之所合也五味入口藏於腸胃以養五臟氣故五味為五臟之所欲無有偏勝則津液相成而神自生矣五臟之氣五味藏於腸胃以養五臟之氣五臟內藏五神五氣外見五色此以下論五臟之經氣而見死生之色與生於心生於肺之色各有不同故首提曰五臟之氣故色見青如草茲者死故者承上文而言五臟之氣受傷則見五行之敗色矣茲蓐席也茲草者死草之色青而帶白也黃如枳實者死黃而帶青色也黑如炲者死炲音臺煙塵也黑而帶黃赤如衃血者死衃鋪杯切衃者敗惡凝聚之血色赤黑也白如枯骨者死死白而枯乾也此五色之見死也五色乾枯而兼有所勝之色故死青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也五色正而華彩光潤故生生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也此言五臟所生之榮色見於外也上節言五臟之氣見五色於外此復言藏真之榮隱見於皮膚之間有若縞裹者也縞素白也朱紅之深也紅淡白紅也紺青揚赤也栝蔞實紅黃色也紫赤黑之間色也此五行之色而俱兼紅者也蓋氣主白而榮主紅如以縞裹者五臟之氣包於外也五色之俱兼紅者五臟之榮隱見於內也上節言五臟之氣色此論五臟之血色王子方問曰氣色有死生血氣無死生耶曰外因之病由氣而經經而臟內因之病由臟而經經而氣內外二因俱傷五臟之氣而後死是以五色之見死者五臟之氣絕也色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸當承也值也謂色味之應五臟者色外而味內也故曰白當肺辛言辛生肺而肺生白也此復結五臟死生之色生於五臟之氣五臟之神氣生於五味也故白當皮赤當脈青當筋黃當肉黑當骨肺合皮心合脈肝合筋脾合肉腎合骨此言生於心生於肺之色承五臟之合而見於外也諸脈者皆屬於目五臟六腑之精十二經脈皆上注於目屬於腦後出於頂故曰諸脈皆屬於目此節論五臟經氣之所循行蓋臟而經經而氣氣而色也頭痛巔疾過在足少陰巨陽是氣而經經而臟也是以此節與頭痛巔疾節照應五臟之氣節故人臥血歸於肝節與赤脈之至節照應生於心如以縞裹朱節諸髓者皆屬於腦腦為精髓之海也諸筋者皆屬於節節骨節也筋生於骨連絡於骨節之間諸血者皆屬於心血者神氣也中焦之汁五臟之精奉心神化赤而為血故諸血皆屬於心諸氣者皆屬於肺上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣五穀入胃淫精於脈肺居上焦朝百脈而輸精於皮毛故主周身之氣也此四肢八溪之朝夕也四肢五臟經俞之所出也八溪即四肢股肱之肉五臟元真之所通會也此言五臟之經血總屬於心五臟之氣總屬於肺經氣循行於四肢八溪注於目會於腦濡筋骨利關節朝夕循行外內出入如環無端者也故善察色者當知五臟之氣善診脈者當以五脈為始也故人臥血歸於肝此復論血隨衛氣之行於脈外也夫血乃水穀之精流溢於中布散於外專精者行於經隧是行於經隧者經脈之榮血也流溢於中者流溢於衝任也衝任起於胞中上循背裡為經絡之海其浮而外者循腹右上行布散於外滲皮膚生毫毛寤則隨衛行於膚表臥則隨衛內入而歸於肝是衝任主發原而肝主受納是以傷寒熱入血室而刺肝之期門故者承上文而言經脈之血隨榮氣行於四肢之三陰三陽晝夜環轉衝任之血隨衛氣而日行於陽夜歸於陰也肝受血而能視肝開竅於目故肝受血而能視夫見色於明堂者五臟之氣色也五臟所生之外榮者血色而見於目也故曰五色之奇脈者奇經之血色也夫水穀入胃津液各走其道五臟主藏精者也五臟之精化赤而為血溢於衝任歸受於肝開竅於目是於五臟所生之色外榮於目而肝主色也足受血而能步掌受血而能握指受血而能攝血者所以濡筋骨利關節者也此言衝任之血亦循行於四肢滲於指掌而無處不到也臥出而風吹之血凝於膚者為痹金匱要略曰血痹病從何得之師曰重困疲勞汗出臥不時動搖加被微風遂得之汗出者言衛氣之虛於外也臥則衛歸於陰出則血行於外加被風吹則血凝於皮膚而為痹矣痹者痹閉而不遂也此言衛氣之留於陰也久不能為血之外衛故也凝於脈者為泣脈者見於皮膚之絡脈也衝任之血溢於皮膚滲於絡脈故凝於皮膚則為痹凝於絡脈則泣澀而不能流行矣凝於足者為厥厥者逆冷也夫陰陽氣不相順接則為厥下為陰血為陰如血凝於下則上下陰陽不相順接而為厥矣此言血隨衛行而陰陽之不相和者也諸生起躍曰榮衛之循行經旨似乎矛盾久為人所疑今夫子發明之始知血隨衛氣之日行於陽夜行於陰者皮膚之血也陰經行盡陽經繼之陽經行盡陰經繼之者十二臟腑之經榮也此三者血行而不得反其空故為痹厥也空骨空也骨空者節之交三百六十五穴會絡脈之滲灌諸節者也血行於皮膚不得反循於穴會故為痹厥也人有大谷十二分小溪三百五十四名少十二俞此皆衛氣之所留止邪氣之所客也針石緣而去之此言衛氣之行於溪谷也溪谷者分肉之交會處也氣穴論曰肉之大會為谷肉之小會為溪分肉之間溪谷之會以行榮衛以會大氣溪谷三百六十五穴會亦應一歲人有大谷十二分者肉之大分處也小溪三百五十四名者肉之小分處也分者肉分而有紋理也名穴名也蓋肉分之間而有交會交會之處而有穴名也溪谷之數以應一歲者歲止三百六十日內朔虛六日止三百五十四日以應小溪之數也少十二俞者言大谷十二分而有十二俞穴也氣盈五日九百四十分朔虛五日九百四十分共計十二日以應十二俞也以歲之三百五十四日合氣盈朔虛之十二日共三百六十五日有奇以成一歲故日期三百有六旬有六日以閏月定四時而成歲也衛氣者行於脈外溫分肉充皮膚肥腠理司開合者也此腠理分肉之間皆衛氣之所留止臥出而風吹之則血凝而為痹厥矣針石緣而去之者言分肉之間亦有三百六十五穴也楊君立問曰氣穴論云氣穴三百六十五以應一歲今則三百六十六矣曰歲緣三百六十六日而少有不足故合而論之則曰三百六十五日今分而論之則每歲有三百五十四日而又有氣盈朔虛之十二日也診病之始五決為紀欲知其始先建其母所謂五決者五脈也診視也始者言邪始在三陰三陽之氣分也五決者審別五臟陰陽之經氣以決其病也欲知其病之始在某經先分立五臟為根本審其邪病某經之氣某臟之經也夫五臟之體藏於內而五臟之經氣行於外故色見草茲者死青如翠羽者生是五臟死生之經氣發於外而成於色也診病之始五決為紀者復言邪之始病在氣氣而經經而臟也是以頭痛巔疾下虛上實過在足少陰巨陽甚則入腎少陰巨陽相為表裡陽氣生於水髒水腑之中而上出於巔頂實者邪實虛者正虛是以頭痛巔疾乃邪氣實於上而使正氣虛於下也蓋邪之中人始於皮毛氣分留而不去則轉入於經是以過在巨陽少陰之經而甚則入腎蓋經絡受邪則內干臟腑矣狥蒙招尤目冥耳聾下實上虛過在足少陽厥陰甚則入肝狥眴同蒙昏冒也招搖也尤甚也足少陽厥陰經脈布脅肋而下循足跗厥陰肝臟開竅於目少陽經脈上出於耳邪實於下而經氣不能上通是以目冥耳聾正氣虛於上致動視而昏冒搖掉之甚也此始傷氣而致正虛於上過在經而復邪實於下也上節論邪實為病此復論正虛為病蓋邪之所湊其正必虛王子方問曰五臟之邪只言甚則入腎入肝何也曰邪入於經則內干臟腑然干臟者半死半生故曰不必動臟邪入於陰經其臟氣實則溜於腑此章論五臟三陰三陽之經氣故曰甚則入腎入肝如不甚則或留於經或溜於腑是以首提二臟而不盡言之者欲使後學之不可執一而論也腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明腹者脾胃之郛郭也腹滿䐜脹邪薄於太陰陽明之氣分支支絡膈內膈也太陰陽明之支絡貫膈氣分之邪傳入於經是以連及支膈胠脅皆脹滿也咳嗽上氣厥在胸中過在手陽明太陰手太陰主氣而主皮毛邪傷皮毛氣分則咳嗽而氣上逆矣手太陰之脈起於中焦循胃上膈手陽明之脈入缺盆絡肺下膈屬腸邪過在經是以胸中厥逆也心煩頭痛病在膈中過在手巨陽少陰經曰心部於表君火之氣外受於邪則心煩於內矣太陽之氣受邪則頭痛於上矣手太陽之脈循咽下膈手少陰之脈出屬心系下膈絡小腸病在膈中是過在手太陽少陰之經矣此節以審證而知五臟之病蓋臟腑之經氣上下內外各有部分故曰診病之始五決為紀診視也夫脈之大小滑澀浮沉可以指別五臟之象可以類推五臟相音可以意識五色微診可以目察能合色脈可以萬全此以診脈察色而知五臟之病也小者正氣虛大者邪氣盛滑主血傷澀為少氣浮為在外在腑沉為在裡在臟此六者脈之提綱而可以指別也五臟在內而氣象見於外以五行之理可類而推之五臟之相合於五音發而為聲可以意識視五色之微見可以目內察之能審色脈之相應以辨病之死生則萬全而無失矣此與上節審證以決五脈之病又一法也赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之赤當脈脈合心故曰赤脈之至也喘急疾也堅牢堅也心脈之至急而牢堅主積氣於中當時害於食蓋食氣入胃濁氣歸心淫精於脈有積於中故害於食也名曰心痹積氣痹閉於心下也此得之外淫之邪因思慮而心虛故邪氣乘虛而留於內也經曰心怵惕思慮則傷神神傷則心虛矣此節照應生於心如以縞裹朱節故曰赤脈之至白脈之至也前論五臟之色生於臟而見於外此言五臟之病成於內而見於脈也頭痛巔疾過在足少陰巨陽言六淫之邪生於外也此言五臟之病成於內也白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也平脈篇曰呼吸者脈之頭也蓋呼吸急則脈亦急故以呼吸之喘急以形容脈之急疾也肺主氣而虛故脈浮病氣而不病血病上而不病下故脈上虛而下實也陽氣虛則善為驚駭矣胸中為氣之海上注於肺以司呼吸邪積於上則膻中之正氣反虛故為虛喘也藏真高於肺主行榮衛陰陽陰陽虛乘則為往來之寒熱矣酒者熟谷之液其氣慓悍入於胃中則胃脹氣上逆則滿於胸中醉而使內則氣上逆故有積氣在胸中也入房太過則傷腎腎為本肺為末本傷故肺虛也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛脈長而彈弦而急也弦則為減諸急為寒此得之寒濕而陽氣受傷故弦急也心下為膈脅下為胠內膈下連於兩胠邪在心下支胠間故脈左右彈也清濕地氣之中人也必從足始足厥陰之脈從足上膕入毛中過陰器抵小腹布脅肋故病證與疝痛相同而腰痛足冷也厥陰與督脈會於巔故頭痛也王子方曰清邪中上濁邪中下陽受風氣陰受濕氣陰病者下行極而上故頭痛也黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風腹中脾土之郛郭也脾屬四肢土灌四末四肢汗出當風則風濕內乘於脾而為積氣蓋風木之邪內干脾土濕與陰土同氣相感故留聚而為積也脾氣不能灌溉於四旁則逆於中而為厥氣矣名曰厥疝者氣逆而痛也夫男女氣血相同受病亦屬同法故於中央土臟而曰女子同法者欲類推於四臟也黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥尺以候腎黑脈之至上堅而大者腎臟有積而腎脈堅大也上堅者堅大在上而不沉也與陰者小腹而兼於前陰也清水冷水也腎臟寒水主氣亦同氣相感也經云積生於風雨寒暑清濕喜怒喜怒不節則傷臟臟傷則病起於陰陰既虛矣則風雨襲陰之虛病起於上而生積清濕襲陰之虛病起於下而成積夫風雨天之邪也清濕地之邪也言五臟之積由天生而地成也凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也奇脈奇經衝任之脈色也衝任為經血之海五臟之血皆歸於肝故外榮於目也面主氣色目主血色目之五色而俱見面黃者五臟之陰而俱得胃脘之陽也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也經云人無胃氣者死面無黃色無胃土之陽矣面之青黑赤色皆藏邪乘陽純陰無陽故皆死也夫生於心如心縞裹朱者論五臟之生色也察於目者論五臟病成之色也五臟別論篇第十一黃帝問曰余聞方士或以腦髓為臟或以腸胃為臟或以為腑敢問更相反皆自謂是不知其道願聞其說方士修煉方術之士道理也凡藏物者皆可名臟名腑故皆自以為是也按以上十篇首四篇論精神氣血後六篇論臟腑陰陽是以此篇申明藏精氣者名臟傳化物者為腑然又有腦髓骨脈膽女子胞亦所以藏精神氣血者也修養之士欲積精全神通玄牝養胎息結靈孕者不可不知也腦名泥丸宮為上丹田骨藏髓脈藏血諸髓血脈皆會於腦故腦為精髓之海舌下為華池有廉泉玉英二竅通於膽液黃庭經曰玉池清水灌靈根審能修之可常存女子玄母也胞者養胎息結靈胎者也胎息經曰胎從伏氣中結氣從有胎中息結精育胞化生身留胎止精可長生故曰腦髓骨脈膽女子胞此六者更當藏密而不可虛瀉者也岐伯對曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府地主閉藏而上升天主化施而下降言人之臟腑形骸應象天地陰陽之氣此六者與傳化之府不同故名曰奇恆之府夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也夫臟為陰地為陰地之濁氣升於天天受之而復降於下故名曰傳化之府天主化施也魄門亦為五臟使水穀不得久藏魄門肛門也上合於肺故名魄門五臟之濁從此而出故亦為五臟之下使腸胃之腐穢從此而瀉出故曰水穀不得久藏所謂五臟者藏精氣而不瀉也故滿而不能實王氏曰精氣為滿水穀為實但藏精氣故滿而不能實六腑者傳化物而不藏故實而不能滿也水穀充實於內而不得久留故實而不能滿所以然者水穀入口則胃實而腸虛食下則腸實而胃虛此復申明實而不滿之義故曰實而不滿滿而不實也此總結上文兩節之義帝曰氣口何以獨為五臟主氣口手太陰之兩脈口五臟之氣皆變見於氣口故為五臟主此論水穀入胃以養五臟五臟之精氣復榮於脈而見於氣口也蓋水穀之清者榮於五臟水穀之濁者出於六腑清中之清者榮於經脈清中之濁者復傳化於腸胃膀胱此節論飲食於胃有氣味清濁上下出入之分當知奇恆之府亦受清中之清者也岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口水穀入胃由足太陰脾臟轉輸以灌溉四臟然水入於胃又由手太陰肺藏之通調四布谷入於胃淫精於脈肺朝百脈輸精於皮毛毛脈合精行氣於臟腑是五臟六腑之氣味皆出於胃變見於氣口故曰氣口亦太陰也言足太陰轉輸水穀之精而手太陰亦為胃以養五臟氣是以五臟之氣皆見於氣口也故五氣入鼻藏於心肺心肺有病而鼻為之不利也心肺居上為陽肺乃心之蓋而主氣開竅於鼻故引臟象論而言味歸陰而氣歸陽也道書云鼻為天門口為地戶凡治病必察其下下謂腸胃水穀之所出也按玉機論曰五實死五虛死腹脹前後不通悶瞀此謂實泄利前後飲食不入此為虛漿粥入胃泄注止則虛者活身汗得後利則實者活又曰倉廩不藏者是門戶不要也得守者生失守者死是以凡病必察其下二便也適其脈調適其太陰氣口之脈以決臟腑之氣觀其志意與其病也志意者所以御精神收魂魄適寒溫和喜怒者也故當觀其志意與其所受之病焉拘於鬼神者不可與言至德拘於鬼神者欲其祝由而愈病也然祝由之道移精變氣以我之神而通神明若惟拘於鬼神之事不可與言至德矣惡於針石者不可與言至巧用針石者有至巧之妙道病不許治者病必不治治之無功矣不能藏此精神以通鬼神當以針石治其外湯藥治其內矣若惡於針石不許治以湯藥治之亦無功矣按以上七篇論陰陽臟腑而臟腑陰陽之病必須審證辨脈治以針石醪醴是以下篇論五方有五治之法病在外者治以針石病在內者治以醪醴湯液即欲祝由愈病亦須移精變氣而後能通於神明故此篇末結曰拘於鬼神者不可與言至德惡於針石者不可與言至巧乃承上起下之文也異法方宜論篇第十二治病之法各有異同五方之民居處衣食受病治療各有所宜黃帝問曰醫之治病也一病而治各不同皆愈何也不同謂針石灸焫毒藥導引也岐伯對曰地勢使然也夫九州八方皆通於天氣天有春夏秋冬之四時地有生長化收藏之五氣而人亦應之是以東方主春生之令而人氣亦發生於外故宜針石以治其外南方主夏長之令而人氣更發越於外故宜微針以治其皮毛西方主秋收之令人氣亦收藏於內故宜毒藥以治其內北方主冬藏之令而人之陽氣亦沉潛於下故宜艾焫以起陽氣於至陰中央濕土主生化之令而人氣亦守於中故宜導引按蹺使灌通於四末此地勢有生長收藏之不同而治法是亦有別也故東方之域天地之所始生也域區界也宇內也言天地始生之氣由東方之九野以及於宇內之九州也金西銘曰首言地勢使然繼言天地之所始生地氣通於天也魚鹽之地海濱旁水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍此言五方之生物所以養生如偏於嗜食皆能致病也地不滿東南故多旁水海濱之地利於魚鹽旁水故民多食魚近海故嗜咸得魚鹽之利故居安食美也魚性屬火故使人熱中心主血脈故咸勝血也嗜咸故色黑血弱致肉理空疏也五臟生成篇曰多食鹹則脈凝泣而色變靈樞經曰飲食不節陰氣不足陽氣有餘榮氣不行乃發為癰又曰血泣不通則衛氣歸之不得復反故癰腫也其治宜砭石故砭石者亦從東方來砭悲廉切葉邊砭石石針也山海經曰高氏之山有石如玉可以為針即此類也東方之地人氣發生於外故其治諸病宜於砭石也夫春生之氣從東方而普及於宇內故砭石之法亦從東方而來以施及於九州也西方者金玉之域砂石之處天地之所收引也地之剛在西方故多金玉砂石天地降收之氣從西北而及於東南其民陵居而多風水土剛強其民不衣而褐薦其民華實而脂肥故邪不能傷其形體其病生於內高平曰陸大陸曰阜大阜曰陵依山陵而居故多風金氣堅肅故水土剛強不衣不事服飾也褐毛布也薦茵褥也華濃厚也謂酥酪膏肉之類飲食華厚故人多脂而肥水土剛強膚腠肥厚是以外邪不能傷其形惟飲食七情之病生於內也其治宜毒藥故毒藥者亦從西方來毒藥有毒之藥也五常政大論曰大毒治病十去其六常毒治病十去其七小毒治病十去其九蓋上古以神農之上品無毒者謂可久服長生而中品下品有毒之藥以治病攻疾也邪不外入病從內生故宜毒藥治其內天地秋收之氣從西以及於九州故毒藥治病之法亦從西方來也北方者天地所閉藏之域也西北方陰也是以閉藏之氣惟北更甚其地高陵居風寒冰冽其民樂野處而乳食地高陵居西北之勢也風寒冰冽陰氣勝也野處乳食北人之性也臟寒生滿病其治宜艾焫故艾焫者亦從北方來夫秋收之氣收於內冬藏之氣直閉藏於至陰之下是以中土虛寒而胸腹之間生脹滿之病矣艾名冰臺削冰令圓舉而向日以艾承其影則得火夫陽生於陰火生於水艾能得水中之真陽者也北方陰寒獨盛陽氣閉藏用艾焫灸之能通接元陽於至陰之下是以灸焫之法亦從北方而來也夫人與天地參也天有寒暑之往來人有陰陽之出入經曰陷下則灸之即四方之民陽氣陷藏亦宜艾焫故曰艾焫之法亦從北方來董帷園曰故凡虛寒脹滿之病治宜溫補啟發元陽不可誤用寒涼克伐之劑南方者天地所長養陽之所盛處也南方主夏長之氣是以為陽熱所盛之處其地下水土弱霧露之所聚也地陷東南故其地下而水土弱低下則濕故霧露之所聚其民嗜酸而食胕故其民皆致理而赤色其病攣痹胕腐也如豉鮓醯醢之類物之腐者也致密也酸味收斂故肉理致密酸乃木味故外見赤色多霧露濕氣故其病攣痹也金西銘曰五方之民舉東方之嗜咸者則見本色之黑南方之嗜酸者則見所生之赤蓋色生於味也夫氣為陽味為陰東方主春生之氣而民嗜藏下之咸南方主浮長之氣而民嗜收斂之酸有若陽鹿之嗜陰龜潛龍之嗜飛燕皆出於天性之自然也其治宜微針故九針者亦從南方來南方之氣浮長於外故宜微針以刺其皮夫針有九式微針者其鋒微細淺刺之針也中央者其地平以濕天地所以生萬物也眾中央土之位也地平土之體也濕者土之氣也化生萬物土之德也位居中央而氣溉四方是以所生萬物之廣眾也其民食雜而不勞故其病多痿厥寒熱四方輻輳萬物會聚故民食紛雜化養於中故不勞其四體四肢為諸陽之本痿痹者手足之氣逆而痿弱不用也平脈篇曰陽脈不足陰脈乘之則灑淅惡寒陰脈不足陽往乘之則發熱寒熱者手足三陰三陽之脈病也蓋言中土之民不勞其四體而氣血不能灌溉於四旁是以多痿厥寒熱之病矣其治宜導引按蹺故導引按蹺者亦從中央出也導引者擎手而引欠也按蹺者喬足以按摩也蓋中央之化氣不能充達於四旁故宜導按其四肢以引血氣之流通也夫中央之化氣由中而及於四方故導引按蹺之法亦從中而四出也莫子晉曰由東南而及於西北由西北而及於東南故曰來由中央而及於四方故曰出故聖人雜合以治各得其所宜夫天有四時之氣地有五方之宜民有居處衣食之殊治有針灸藥餌之異故聖人或隨天之氣或合地之宜或隨人之病或用針灸毒藥或以導引按摩雜合以治各得其宜故治所以異而病皆愈者得病之情知治之大體也所謂病同而異治者如癰瘍之熱毒盛於外者治宜針砭毒未盡出者治以毒藥陰毒之內陷者又宜於艾焫也又如濕邪之在四肢而病痿厥者宜於針砭氣血之不能疏通者宜按蹺導引所以治異而病皆愈者得病之情者知病之因於天時或因於地氣或因於人之嗜欲得病之因情也或因五方之民而治以五方之法或因人氣之生長收藏而宜於針砭艾焫或宜於毒藥按蹺是知治之大體而又不必膠執於東方之治宜砭石西方之治宜毒藥也是以聖人雜合以治而皆得其所宜再按上古之民動作以避寒則陽氣不致陷藏而無脹滿之病矣陰居以避暑則元氣不致外弛而無攣痹之證矣形勞而不倦則氣血得以流通而無痿厥寒熱之疾矣是以毒藥不能治其內針石不能治其外此修養吾身中之精氣而能勝天地之陰陽者也移精變氣論篇第十三黃帝問曰余聞古之治病惟其移精變氣可祝由而已今世治病毒藥治其內針石治其外或愈或不愈何也移精變氣者移益其精傳變其氣也對神之辭曰祝由從也言通祝於神明病從而可愈已按此篇帝曰移精變氣伯曰得神者昌失神者亡言能養其精氣神者可祝由而愈病湯藥針石亦能治之如精神散失雖有靈丹無能為已故有愈有不愈也岐伯對曰往古人居禽獸之間動作以避寒陰居以避暑內無眷慕之累外無伸官之形此恬憺之世邪不能深入也故毒藥不能治其內針石不能治其外故可移精祝由而已伯言往古之人精神完固故可祝由而已蓋以神而後可通神明也居禽獸之間不懼於物也寒暑得宜四時之氣調矣無眷慕之累精得其養矣無伸官之形不勞其神矣居恬憺之世志意自適矣邪不入五臟骨髓是以毒藥不能治其內不外傷空竅肌膚是以針石不能治其外也故可移精變氣以通神明陰陽不測謂之神神用無方謂之聖精氣充足可通神明則陰陽和而神氣通暢又何患邪賊之為害乎當今之世不然憂患緣其內苦形傷其外又失四時之從逆寒暑之宜賊風數至虛邪朝夕內至五臟骨髓外傷空竅肌膚所以小病必甚大病必死故祝由不能已也帝曰善數音朔心志憂慮則傷神苦形煩勞則傷精逆其四時則傷氣賊風賊害之風虛邪虛鄉不正之邪也精神內虛故小病必甚無正氣以勝邪故大病必死也余欲臨病人觀死生決嫌疑欲知其要如日月光可得聞乎嫌疑者不能決其死生也要要道也色以應日脈以應月言色脈之要道如日月之光明顯而易識也岐伯曰色脈者上帝之所貴也先師之所傳也色脈之道上帝之所秘藏非其人弗教非其真弗授先師僦貸季也上古使僦貸季理色脈而通神明合之金木水火土四時八風六合不離其常八風者天有八風在人則有五經之風謂調理五脈之邪也六合天地四方也言上古之師經理色脈而通神明總不外乎天地陰陽四時五行之常理也變化相移以觀其妙以知其要欲知其要則色脈是矣色者氣之華脈乃精之液變化相移者移精變氣也觀其移精變氣以通神明之妙欲知其要道則色脈是矣蓋言理色脈而通神明則知精氣之盛衰矣色以應日脈以應月常求其要則其要也日月者天地陰陽之精也夫色為陽脈為陰常求其色脈之要總不外乎陰陽故知色以應日脈以應月則其要在是矣上節言色脈之道合於五行四時八風六合而其要又總歸於陰陽夫色之變化以應四時之脈此上帝之所貴以合於神明也所以遠死而近生生道以長命曰聖王此復言陰陽色脈之相合也色之變化五色以應四時之脈色生於脈也能貴重色脈以合於神明所以遠死而近生生道以長是謂聖王聖王者上古之聖能修其養生之道而亦歸於真人中古之治病至而治之湯液十日以去八風五痹之病此言中古之人不能移精變氣以通神明而治以湯藥亦有法也病至而治之言不能如恬憺虛無之世雖有賊邪不能為害設有病至而即以湯藥治之八風者八方之風觸五臟邪氣發病五痹者五臟之痹也以春甲乙傷於風者為肝痹以夏丙丁傷於風者為心痹以秋庚辛傷於風者為肺痹以冬壬癸傷於風者為腎痹以至陰戊己遇此者為脾痹人之五臟應地之五行天之十干化生五行是以湯液十日十干已周而五痹可去矣十日不已治以草蘇草荄之枝本末為助標本已得邪氣乃服荄音該此言病有標本而草有本末也蘇莖也荄根也草蘇之枝莖之旁枝也草荄之枝根之旁根也蓋以蘇荄為本而旁枝為末也五痹者五臟之痹也五臟有經俞之外榮有筋脈皮毛骨肉之外合是五臟為本而經俞筋骨為標也草生五味以養五臟氣是以五臟有病則以蘇荄治之如邪在經脈之外合者則以草蘇草荄之枝治之是以本治本而以末治標也心肺居上為陽而治以草蘇是本乎上者親上也肝腎居下為陰而治以草荄是本乎下者親下也以草之本末為助而病之標本以得又何有邪氣之不服者此中古用藥之有法也暮世之治病也則不然治不本四時不知日月不審逆從不本四時治不法五方五氣也不知日月不識陰陽色脈也不審逆從不別標本順逆也病形已成乃欲微針治其外湯液治其內粗工凶凶以為可攻故病未已新病復起上古聖人不治已病治未病今世之治病已成而後治之是猶渴而穿井不亦晚矣而粗工凶凶又妄攻之是故之邪病未去而妄攻之新病復起此今世之工不審色脈精氣之盛虛而為治亦不知標本之法也帝曰願聞要道岐伯曰治之要極無失色脈用之不惑治之大則色脈者陰陽之道也臨病人觀色脈知死生而無嫌疑治之大法盡於是矣此復結前節之義逆從到行標本不得亡神失國逆從到行者失四時之從逆寒暑之宜也標本不得者不知病之標本而以本末為助也言暮世之人既不能順時調養又不能治卻其邪是必神亡而形失矣夫心藏神而為一身之主主明則十二官皆安以為天下則大昌神亡則失國矣上古天真論曰能形與神俱而盡終其天年道書曰神行則氣行神住即氣住知神氣可以長生故此篇獨歸重於神焉去故就新乃得真人去其故染之病就其新變化之精神乃得真人之道而亦可歸於真人此言今世之人能修養其精氣將從上古合同於道亦可使益壽而有極時帝曰余聞其要於夫子矣夫子言不離色脈此余之所知也帝只知要道不離於色脈岐伯曰治之極於一伯因帝知其要在色脈故復曰治之要道原於至極總歸一而已矣一者神也得其神則色脈精氣皆得矣帝曰何謂一岐伯曰一者因得之因其情意而得之也帝曰奈何岐伯曰閉戶塞牖系之病者數問其情以從其意得神者昌失神者亡帝曰善數音朔閉戶塞牖無外其志也神舍於心心性之動處是謂情志意者所以御精神收魂魄適寒溫和喜怒是以無外其志數問其情以從其意則得其神之存亡矣失神者死得神者生首篇論上古真人呼吸精氣獨立守神此篇言往古之人能移精變氣以通神明命曰聖王當世之人去故就新乃得真人是精神完固皆可歸於真人如神氣散失雖有良工無能為已臨病之士可不察其色脈神氣而徒以針石湯液為事乎湯液醪醴論篇第十四黃帝問曰為五穀湯液及醪醴奈何此承上章而復問也五穀黍稷稻麥菽五行之谷以養五臟者也醪醴甘旨之酒熟谷之液也帝以五穀為問是五穀皆可為湯液醪醴以養五臟而伯答以中央之稻米稻薪蓋謂中谷之液可以灌養四臟故也岐伯對曰必以稻米炊之稻薪稻米者完稻薪者堅帝曰何以然岐伯曰此得天地之和高下之宜故能至完伐取得時故能至堅也夫天地有四時之陰陽五方之異域稻得春生夏長秋收冬藏之氣具天地陰陽之和者也為中央之土谷得五方高下之宜故能至完以養五臟天地之政令春生秋殺稻薪至秋而刈故伐取得時金曰堅成故能至堅也炊以稻薪者取丙辛化水之義以化生五臟之津上章云移精變氣以通神明論神氣生於先天之精也此章復論精氣又藉後天水穀之所資生蓋五穀之液以養五氣氣和津成神乃自生是以上古之人能完其天真者雖有湯液醪醴為而勿服以其神全故也中古之時道德稍衰邪氣時至服之萬全以稻米之液能生養精氣神也今世之人止知毒藥攻內針石治外不知精氣壞弛其功不立者以神去故也是以上章曰移精變氣得神者昌此章曰故精自生巨氣乃平凡治病心先求其本也帝曰上古聖人作湯液醪醴為而不用何也岐伯曰自古聖人之作湯液醪醴者以為備耳夫上古作湯液故為而弗服也伯言上古聖人之作湯液醪醴者恐為邪氣所傷故以為備耳然上古之人多能完其天真雖有賊邪勿之能害故雖為而勿服也中古之世道德稍衰邪氣時至服之萬全天真論曰夫道者能卻老而全形所以年度百歲而動作不衰者以其德全不危也言中古之人道德雖衰而不致於精神壞弛故服之萬全帝曰今之世不必已何也不能必其邪已而獲萬全也岐伯曰當今之世必齊毒藥攻其中鑱石針艾治其外也齊疾也鑱銳也針有九式一曰鑱針言當今之世止知攻疾而不知調養其正氣也帝曰形弊血盡而功不立者何岐伯曰神不使也經曰針石之道在皮肉筋脈骨各有所處病各有所宜各不同形各以任其所宜弊止也形弊者在皮肉筋骨刺已止矣血盡者在血脈亦已盡其疏通矣而不能奏功者用針之工神不使也靈樞經曰粗守形上守神神乎神客在門帝曰何謂神不使岐伯曰針石道也精神不進志意不治故病不可愈此申明工不守神也經曰神在秋毫屬意病者神屬勿去知病存亡又曰凡刺之真必先治神靜意治義觀適之義淺深在志遠近若一如臨深淵手如握虎神無營於眾物今粗環知針石之道精神不進志意不治故病不可愈也今精壞神去榮衛不可復收何者嗜欲無窮而憂患不止精氣弛壞榮泣衛除故神去之而病不愈也此論病者之精神壞弛而病不能愈也夫氣生於精精陽之氣化水穀之精微而後生此榮衛精壞神去故榮衛不可復收此論榮衛之生於精氣也或者嗜欲無窮則壞其精矣憂患不止則傷其氣矣精氣壞弛則榮血凝泣而衛氣除去矣故神去之而病不愈此言神由榮衛精氣之所生也生於精氣者先天所生之神也神生於榮衛者後天谷液之所生也帝曰夫病之始生也極微極精必先入結於皮膚今良工皆稱曰病成名曰逆則針石不能治良藥不能及也今良工皆得其法守其數親戚兄弟遠近音聲日聞於耳五色日見於目而病不愈者亦何暇不早乎岐伯曰病為本工為標標本不得邪氣不服此之謂也此節論湯液治病之當有法也夫察色聽聲問其情從其意此良工得其法矣如湯液不得其法而病亦不愈故詳設此問焉帝曰病之始生極微極細必先留結於皮膚如十日不已良工皆稱曰病已成名曰逆雖針石不能治而良藥不能及也今良工皆得其審證之法守其數問其情親戚兄弟或遠或近系之病者可謂從其意得其情矣音聲日聞於耳五色日見於目可謂察其色知其聲矣而病不愈者亦何暇不早治而使病成乎伯言病為本工為標蓋以工之治法為標也言不得草蘇草荄本末為助之法治之是以邪氣之不服也上節論針石治病重在得神此節論湯液治病貴在得法下節論湯液治病重在調復精氣此三者良工之不可缺一者也夫審證辨脈得病之情固良工之首務而治病之湯液又不可不得其法也金西銘曰此之謂也句乃引標本已得邪氣乃服而言也帝曰其有不從毫毛而生五臟陽已竭也津液充郭其魄獨居孤精於內氣耗於外形不可與衣相保此四極急而動中是氣拒於內而形施於外治之奈何此節論氣生於精精由氣化欲治病者當究其原原本既清則生機自盛精生氣平邪氣自服不可徒以攻疾為首務也夫陽氣主於皮毛不從毫毛而生五臟陽已竭者不因外邪傷於表陽而五臟之元真已竭於內也肺主氣而外主皮毛氣化則水津四布而下輸膀胱氣耗於外不能布化水液是以津液充溢於郛郭而肺藏之陰魄孤精獨居於內也水液充於皮膚則身體腫脹而不可與衣相保四肢為諸陽之本陽虛於外是以四極腫急喘而動中是氣逆於內而形腫施於外為治之法奈何岐伯曰平治以權衡去菀陳莝微動四極溫衣繆刺其處以復其形開鬼門潔淨府精以時服五陽已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平帝曰善此謂腐穢去而形復形復而氣布氣化而水行水行而精生精生而氣平所謂形歸氣氣歸精也平權衡者平治其脈即繆刺也肺朝百脈輸精於皮毛毛脈合精而後行氣於臟腑故先平治其權衡權衡已平則氣血和而水津散矣積者謂之菀久者謂之陳腐者為之莝夫脾主為胃行其津液灌於四臟行於四肢充於肌肉脾家實則不能行其津液而下輸膀胱是以腐穢當去而後形復也微動四肢運脾氣也溫衣暖肺氣也繆刺調氣血也肌肉血脈和調則腫滿消而復其舊日之形矣鬼門毛孔也開鬼門發表汗也潔淨府瀉膀胱也鬼門開則肺竅通而水津布所謂外竅開則里竅通上竅通則下竅泄矣膀胱者津液之所藏都府潔淨則精以時復矣巨陽為諸陽主氣而生於膀胱精已復則氣自生而五臟之陽和已布矣夫腸胃膀胱受五臟濁氣名傳化之府陳莝去都府潔則五臟之濁得以疏滌矣夫水穀入胃津液各走其道五臟疏滌故精自生而形自盛矣精主骨氣主肉精氣足則骨肉相保而巨氣乃平巨氣者太陽主氣也夫膀胱精復而五臟布陽者太陽為諸陽主氣也五臟精生而巨氣乃平者州都之精五臟之所生也此章言上古之聖能完其先天之真中古以來當養其後天之氣故曰必以稻米炊以稻薪蓋後天之精氣由中胃水穀之所生也高士宗曰腹者腸胃之郛郭足太陰脾土之所主也津液充郭者脹滿於腹也形不可與衣相保四急極而動中者腫脹於皮膚四肢也是以去菀陳莝消其腹滿也開鬼門潔淨府者行泄皮膚之水也先治其權衡者脾土之運輸必由肺氣之通調也金西銘曰四肢者井滎經輸之所出入十二經脈交相貫通胸中為氣之海宗氣積於胸中出喉嚨以司呼吸同榮氣行於十二經脈之中氣行則脈行氣拒於內則脈泣於外矣外內氣血交相拒逆是以四肢脹急而喘動於中矣此節為治脹滿水腫之要法王子方曰當知上古之法又非止於針石治外湯藥治內而已
