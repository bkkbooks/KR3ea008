body:
  text: 卷三玉版論要篇第十五黃帝問曰余聞揆度奇恆所指不同用之奈何病能篇曰揆者方切求之也言切求其脈理也度者得其病處以四時度之也奇恆者異於恆常也指示也言奇恆之道有色脈陰陽淺深順逆指示多有不同將用何法以得其要岐伯對曰揆度者度病之淺深也奇恆者言奇病也請言道之至數五色脈變揆度奇恆道在於一神轉不回回則不轉乃失其機此篇論脈因度數出入五臟之氣相生而傳一以貫通外內環轉如逆回則為病矣與脈要精微平人氣象諸論之脈病不同故曰奇病也夫脈始於足少陰腎生於足陽明胃輸於足太陰脾故太陰為之行氣於三陰灌溉於四臟至數者脈因出入之度數也五色脈變者五臟之脈變見於色也一者神也神者五臟血脈之神氣也蓋脾為孤臟中央土以灌四旁五臟受氣轉而不回者也如逆傳其所勝是回則不轉乃失其相生旋轉之機矣故曰五臟相通移皆有次五臟有病則各傳其所勝莫子晉問曰此篇章旨與辨脈篇趺陽脈浮而澀少陰脈如經也平脈篇之寸口脈弱而遲諸節同義與曰仲祖之傷寒論原本於靈素諸經而更闡發其未盡之旨子也知此可豫言會悟矣至數之要迫近以微言五臟經氣相通陰陽併合至切近而微故曰診合微之事追陰陽之變著之玉版命曰合玉機玉版玉機二篇名言脈行至數之要若板籍之有格有序故方盛衰論曰脈事因格玉機論曰五臟相通移皆有次合玉機者又如璇璣玉衡之旋轉也容色見上下左右各在其要容面也疏五過論曰上經下經揆度陰陽奇恆五中決以明堂審於終始可以橫行言奇恆之病發於五臟之中而五脈之氣色外見於明堂之上下左右各在其淺深順逆之要耳其色見淺者湯液主治十日已色見淺其病亦微故以湯液治之而十日可愈夫奇恆之道五臟皆稟氣於胃足太陰為之轉輸病則逆回而色見於面故用湯液治之蓋以稻米之液助土氣之資生十干已周俾五臟之氣復其見深者必齊主治二十一日已色見深其病亦深矣故必齊毒藥攻其中二十者偶數之終一者生陽之始以十干而再周復得甲而化土五臟為陰氣色為陽二十一日五臟之生氣已復轉矣其見大深者醪酒主治百日已色大深則病更深矣醪醴熟谷之液其氣慓悍飲酒者衛氣先行皮膚先充絡脈榮衛運行則所逆之色亦散矣因色大深至甲十復而後已也所謂色者因五臟之變而見於五色也色夭面脫不治百日盡已脈短氣絶死五臟之氣榮於脈五經之脈見於色氣血衰則面色脫而夭然不澤故至百日五臟之氣盡而已矣若脈短氣絶乃虛脫已極喪無日矣上節言回則不轉而見色之淺深此言氣血虛脫而為不治之死證下節言受外淫之邪而致榮衛內陷病溫虛甚死上節言脈氣之從內而外此論榮衛受邪反從外而內即下文所謂八風之勝終而復始玉機篇之所謂風寒客於人從毫毛皮膚傳於五臟是已溫病者外感風寒發為溫熱之病辨脈篇曰風則傷衛寒則傷榮又曰榮衛內陷其數先微蓋榮衛氣機從內達外風寒之邪從外內侵榮衛受傷則脈氣反陷然猶藉其根氣盛強則邪隨正而復出於外若正氣虛甚邪惟內侵邪盛正虛必死之候也色見上下左右各在其要上為逆下為從女子右為逆左為從男子左為逆右為從易重陽死重陰死此言色見上下左右各有男女順逆之要焉五色篇曰其色上行者病益甚其色下行如雲徹散者病方已女為陰右亦為陰故女子色見於右為逆見於左為從男為陽左亦為陽故男子色見於左為逆見於右為從易謂如男女之左右反易是為重陽者死重陰者死陰陽反他治在權衡相奪反他言男女陰陽之色反逆也權衡脈也相奪者奪其逆於右者從左逆於左者從右蓋色生於脈治其脈順則色亦順矣按方盛衰論曰陽從左陰從右蓋男子之血氣從左旋女子之血氣從右轉是以男子之色見於右而從左散者順也女子之色見於左而從右散者順也奇恆事也揆度事也承上文而言奇恆脈事也揆度度事也言揆度奇恆者度脈之事也方盛衰論曰度事上下脈事因格度事者度陰陽上下順逆之事也脈事者言脈因前後度數出入而有一定之格也搏脈痹躄寒熱之交此言脈不循度旋轉而反陰陽相搏則又為痹躄寒熱之病矣但臂不遂者名曰痹躄乃足之疾也蓋經脈五俞出於手足陰陽相貫上下循行如反相搏擊故為手足痹躄寒熱之病蓋陰乘於陽則為寒陽乘於陰則為熱陰陽相搏則為寒熱之交也脈孤為消氣虛泄為奪血孤為逆虛為從此言神轉不回者五臟之神氣也蓋血隨氣行神氣虛消則脈不能至於手太陰而脈孤弱矣此太陰陽明之生氣漸消乃危殆之逆證也如經虛下泄此為奪血非生氣消滅故為從平脈篇曰趺陽脈不出脾不上下身冷膚硬此脾胃之氣虛消而脈不能循經外轉致有身冷膚硬之危所謂逆者此也辨脈篇曰趺陽脈浮而澀故知脾氣不足胃氣虛也又曰少陰脈反滑而數者故知當屎膿也陽明脈微沉少陰脈微滑此為陰實其人必股內汗出陰下濕也金匱要略曰少陰脈滑而數者陰中即生瘡狼牙湯洗之又曰胃氣下泄陰吹而正喧膏發煎導之此皆虛陷之證治之即愈所謂順者此也行奇恆之法以太陰始五臟皆稟氣於胃而不得至經必因於脾乃得稟也脾為孤臟中央土以灌四旁五臟相通次序環轉是行奇恆之法從太陰始行所不勝曰逆逆則死行所勝曰從從則活行所不勝者五臟相剋而傳即回則不轉也行所勝者五臟相生而傳即神轉不回也故曰五臟相通移皆有次五臟有病則各傳其所勝八風四時之勝終而復始逆行一過不復可數論要畢矣八風八方之風也四時之勝者春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春也終而復始者言脈之逆行而亦循度環轉也前節論本氣虛消之逆傳此復論八風之邪四時之勝以致脈氣逆行榮衛內陷而亦循度回轉也逆行一過不復可數者言風寒客於人始傷皮毛而內舍於肺肺傳之肝肝傳之脾脾傳之腎腎傳之心逆行一過則死矣不復如順行之循環無端之可數也風之邪四時之勝逆行環轉一周不復可數奇恆之道盡於此矣診要經終論篇第十六診要者診度奇恆之要經終者六經之氣已終蓋奇恆之道論五臟之三陰陰陽合併而成六是其生五其終六也黃帝問曰診要何如此承上章而復問也岐伯對曰正月二月天氣始方地氣始發人氣在肝伯言春者天氣始開地氣始泄而人氣在肝肝主東方寅卯木也夫奇恆之勢乃六十首蓋以六十日而氣在一臟為首五臟相通而次序旋轉者也三月四月天氣正方地氣定發人氣在脾三月四月天地之氣正盛而人氣在脾辰巳二月足太陰陽明之所主也五月六月天氣盛地氣高人氣在頭生長之氣從地而升故肝而脾脾而直上於巔頂也歲六甲而以五月六月在頭者只論五臟也故曰奇恆五中又曰章五中之情按奇恆之道論五臟之神氣五臟者三陰之所主也人氣在頭者厥陰與督脈會於巔與五臟合而為三陰也三之氣乃少陽相火所主相火者即厥陰包絡之火也七月八月陰氣始殺人氣在肺始殺者氣始肅殺也申酉二月屬金而人氣在肺九月十月陰氣始冰地氣始閉人氣在心收藏之氣從天而降肺屬乾金而主天為心臟之蓋故秋冬之氣從肺而心心而腎也少陰主冬令故先從手少陰而至於足少陰王氏曰火墓於戌十一月十二月冰復地氣合人氣在腎冰復者一陽初復也地氣合者地出之陽復歸於地而與陰合也腎主冬藏之氣故人氣在腎故春刺散俞及與分理血出而止甚者傳氣間者環也此言五臟之氣外循於皮膚絡脈分肉而環轉也夫診有十度度人脈度臟度肉度筋度俞度陰陽氣盡度人脈者言人之脈氣從奇恆之勢而有陰陽順逆也度臟者度五臟之氣從內膈而外出不可逆刺以傷其臟也度肉度筋度俞者度五臟之氣外循於分肉俞絡之間各有淺深而四時之刺法不同也度陰陽氣盡者言五臟之氣合於三陰三陽而各有經終也散俞絡脈之俞穴也分理分肉之腠理也蓋春氣生升於外故當於散俞溪谷之間而淺刺之血出則脈氣通而病止矣如逆之甚者深取之而傳導其氣輕者不待傳氣而即環轉矣夫經俞絡脈溪谷各有三百六十五穴皆臟腑之氣所遊行是以四時之刺或在皮膚或在俞穴也針經曰刺之氣不至無問其數刺之而氣至乃去之勿復針刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣是以四時之刺必候其氣至之所在而刺之也夏刺絡俞見血而止盡氣閉環痛病必下絡俞者孫絡之俞見於皮膚之間蓋夏氣浮長於外而更宜淺刺者也若盡傳其氣則反閉其環轉之機而痛病於下矣蓋言經隨氣轉夏時之氣浮越於外氣至即止而不宜太過此反結上文之義也傷寒論曰臟腑相連其痛必下言經氣逆於上病必痛於下謂其經絡上下之相通也秋刺皮膚循理上下同法神變而止刺逆從論曰秋氣在皮膚蓋七月八月人氣在肺而肺主皮毛是以或上或下皆宜刺皮膚循於肉理神氣變轉而脈即循行矣神者五臟之神即轉而不回之神氣也冬刺俞竅於分理甚者直下間者散下俞竅諸俞之穴竅更深於散俞而近於筋骨者也分理者分肉之腠理乃溪谷之會溪谷屬骨而外連於皮膚是以春刺分理者外連皮膚之腠理也冬刺俞竅於分理者近筋骨之腠理也蓋冬氣閉藏而宜於深刺也直下者循經而下針欲深而留之也散下者循絡而下針言病之輕者不必太深也此四時之序氣之所處病之所舍藏之所宜也春夏秋冬各有所刺法其所在此總結上文而言四時之刺法各有淺深之所在也春刺夏分脈亂氣微入淫骨髓病不能愈令人不嗜食又且少氣厥陰心主主脈無故而損之故脈亂血氣外溢故令人氣微也少陽主骨厥陰不從標本從少陽中見之化故入淫骨髓也病不在夏分故病不能愈肝氣仍逆故令人不嗜食肝主春生之氣故又且少氣也春刺秋分筋攣逆氣環為咳嗽病不愈令人時驚又且哭臟真高於肺主行榮衛陰陽者也榮衛氣血所以濡筋骨利關節病在肝而反傷其肺是以筋攣血氣環逆故令人氣逆而轉為咳嗽也東方肝木其病發驚駭肝藏魂魂魄不安故使人邪哭也春刺冬分邪氣著臟令人脹病不愈又且欲言語春主生升冬主閉藏春刺冬分反導其血氣內著故令人腹脹肝主語故又且欲言語也病不愈者言四時所主之臟病不愈又且者言不惟病不愈而又有此證也夏刺春分病不愈令人懈惰三月四月人氣在脾脾病不愈故令人懈惰夏刺秋分病不愈令人心中欲無言惕惕如人將捕之五月六月人氣在心主包絡心主言心主不能代君行令故心中欲無言經曰所謂恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入陰陽相搏故恐也夏刺秋分則陽氣入而與陰相搏故如人將捕之夏刺冬分病不愈令人少氣時欲怒經曰所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出蓋夏月陽氣外張而反逆歸於冬分故不惟病不愈而更令人少氣善怒也秋刺春分病不已令人惕然欲有所為起而忘之秋主下降刺春分是反導其血氣上行故令人惕然欲有所為四時刺逆從論曰秋刺經脈血氣上逆令人善忘秋刺夏分病不已令人益嗜臥又且善夢秋氣在皮膚氣分刺夏分之絡脈則氣不外行故令人益嗜臥肺藏魄經云魂魄飛揚使人臥不安而喜夢秋刺冬分病不已令人灑灑時寒冬主閉藏而反傷之則血氣內散故令人寒栗也冬刺春分病不已令人欲臥不能眠眠而有見春令所以泄冬藏之氣也人臥則氣歸於陰而反泄之故令人欲臥不能眠氣行於陽則目張行於陰則目瞑眠有所見者目不得瞑也冬刺夏分病不愈氣上發為諸痹冬主閉藏夏令浮長氣應藏而使之外泄故發為諸痹痹者閉也氣留閉於外而為痛也冬刺秋分病不已令人善渴腎藏津液肺乃水之化原故善渴也此言五臟之氣隨時而升浮降沉非五臟經脈之謂也凡刺胸腹者必避五臟此言五臟之神氣從內膈而外達於胸脅從胸脅而環轉於形身故不可逆刺其膈以傷其臟焉內膈上連於胸中連於腹下連於脅臟氣從此而外出故曰刺避五臟者知逆從也所謂從者膈與脾腎之處不知者反之反之者逆刺其所出之神氣也中心者環死環者一周時也蓋日為陽心為陽中之太陽一晝一夜日環轉一周故至周轉而氣終也中脾者五日死五日者土數終也中腎者七日死天乙生水地六成之七日者生成之數終也中肺者五日死天數五地數五肺屬乾金而主天脾屬坤土而主地故皆死於五日也只言四臟而不及肝者或簡脫也楊元如曰五臟經脈俱不上循於頭惟厥陰與督脈會於巔故曰五月六月人氣在頭抑厥陰之氣不從胸脅外出而直上於頭與中膈者皆為傷中其病雖愈不過一歲必死五臟六腑之氣俱從內膈而外出於胸脅故刺中膈者皆為傷中一歲死者盡五行六氣之終而死也按內膈上連胸之鳩尾中兩分於腹上下連兩旁季脅後連脊之十一椎刺中膈者即不中臟速死其中臟腑之氣皆為所傷矣行針者慎諸莫子晉曰此復兼六腑之氣而言即陰陽合併之義蓋中臟氣者死之速中腑氣者死之遲刺避五臟者知逆從也所謂從者膈與脾腎之處不知者反之避五臟者避五臟神氣之所出也五臟之氣所從而出者膈與脾腎處也膈者胸膈之上鳩尾處也脾處者胸骨兩分之下交腹之處也腎處者兩脅之下也言五臟之氣從膈外出旋轉不回若反刺之是逆其氣而傷其臟矣刺胸腹者必以布憿著之乃從單布上刺刺之不愈復刺刺針必肅刺腫搖針經刺勿搖此刺之道也憿音激此言刺胸腹者宜微針而淺刺之勿使有傷膈氣也憿定也以布定著於胸腹乃從單布上刺之蓋欲其極淺也不愈而復刺者言其至淺而或不得其氣也肅靜也言氣之難得宜肅靜其針以候焉搖針者刺之瀉法也腫乃邪實故宜搖針以瀉其邪經刺勿搖守其正也此補瀉之法刺之要道也帝曰願聞十二經脈之終奈何此論臟腑陰陽之合併也所論五臟之氣者三陰之所主也三陰之氣與三陽交併陽氣先至陰氣後至合於十二經脈內絡臟腑外絡形身外內出入循環無端故曰診合微之事追陰陽之變不知併合診故不明陰陽並交至人之所行當知五行而生三氣三而三之合為六氣六六之氣以應十二經脈一經之氣已終是不復陰陽相貫而環轉無端矣岐伯曰太陽之脈其終也戴眼皮折瘈瘲其色白絶汗乃出出則死矣瘈音契瘲音縱戴眼目上視也反折背反張也瘈瘲手足屈伸也足太陽之脈起於目內眥挾脊抵腰中手太陽之脈循臂上肩至目外眥太陽主筋而為諸陽主氣陽氣者柔則養筋太陽之經氣已絶是以筋脈急而戴眼反折手足牽引也手太陽主液膀胱者津液之所藏絶汗者津液外亡也色白者亡血也津液外脫則血內亡矣少陽終者耳聾百節皆縱目睘絶系絶系一日半死其死也色先青白乃死矣睘音瓊手足少陽經脈皆循於耳經氣絶故耳聾也少陽主骨諸節皆屬於骨少陽氣終故百節皆縱經絡篇曰少陽是主骨所生病者諸節皆痛睘目驚貌手足少陽之脈皆至目鋭眥終則牽引於目故目如驚而邪視也絶系目系絶也少陽屬腎腎藏志系絶則志先絶故一日半死也青者甲木之氣外脫也白者三焦之榮內亡也夫陽生於陰色生於氣是以六經之氣終而先見於色陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣手足陽明之脈皆挾口承目故口目動作而牽引歪邪也聞木音則惕然而驚是陽明之善驚也罵詈不避親疏是陽明之妄言也色黃陽明之土氣外脫也上下經盛胃氣絶而無柔和之象也榮衛者中焦水穀之所生肌膚不仁者榮衛之氣絶也少陰終者面黑齒長而垢腹脹閉上下不通而終矣心之華在面面黑者水氣上乘火氣滅而水氣脫矣齒長而垢骨氣泄也腹脹閉而上下不通者心腎水火之氣並絶而不能上下交通矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣足太陰脈入腹屬脾故為腹脹手太陰脈上膈屬肺而主呼吸故為不得息脹滿則升降難不得息則氣道滯故為噫為嘔嘔則氣逆於上故為面赤不逆則痞塞於中故為上下不通脾氣敗則無以制水故黑色見於面肺氣敗則治節不行故皮毛焦厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣此十二經之所敗也手厥陰心主之脈起於胸中出屬心包絡足厥陰肝脈循喉嚨入頏顙其下者循陰股入毛中過陰器厥陰木火之氣欲絶故中熱嗌乾也肝所生病者遺溺善溺者肝氣下泄也心煩者包絡之氣上炎也肝者筋之合筋者聚於陰器而脈絡於舌本甚則舌卷囊縮而終矣此十二經之所敗三陰三陽之氣終也按天之十干化生地之五行地之五行化生天之六氣五行生五臟六氣合六經是六經之氣五臟之所生也故曰診要者診五行相生之要經終者陰陽之氣有終蓋言人之生於五行而終於六氣也莫子晉曰地之五行合天之十干天之六氣合地之十二支此皆天地陰陽互相生化之道脈要精微論篇第十七黃帝問曰診法何如岐伯對曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈此篇首論診脈之法夫色脈之道至精至微然本於陰陽氣血陰靜而陽動有所動作則靜者動而動者散亂矣故診法當以平旦夫飲食於胃淫精於脈脈氣流經經脈盛則絡脈虛是以飲食未進則經絡調勻血氣未亂故可診有過之脈蓋言平旦之時知有過在病而不在陰陽之正氣耳以下四篇皆論診脈之法而各有不同焉楊元如曰經脈屬臟則絡脈絡腑經脈屬腑則絡脈絡臟經絡不調則臟腑之氣不和矣切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分動靜者陰陽動靜也精明五臟之精神見於聲色也切脈觀色以審臟腑之強弱虛實兼視形體之盛衰以此參伍錯綜而斟酌之以決其死生之分焉此篇論切脈察色聽音聲觀臟腑審形體四診咸備斯成脈要之精微夫脈者血之府也長則氣治短則氣病數則煩心大則病進此言脈所以候陰陽氣血也血行脈中故為血之府榮氣宗氣行於脈中衛氣行於脈外脈隨氣行是以脈長則氣平脈短則氣病矣心主血脈數乃熱迫所生則煩心大則病進於脈內上二句辨脈氣下二句審血脈上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛上盛謂寸口脈盛主氣上升而氣高下盛謂尺中脈盛主氣下逆而為脹代脈者動而中止不能自還主氣之衰敗也辨脈篇曰脈縈縈如蜘蛛絲者陽氣衰也言脈中之榮氣宗氣不足是以脈細如絲澀主少血則心虛而為痛矣莫子晉曰代則氣衰陽氣衰也細則氣少陰氣少也渾渾革至如湧泉病進而色弊綿綿其去如弦絶死此復形容病進之脈象邪甚血亡而為死證也渾渾濁亂疾流之貌革至者迥異於平常也此血脈受邪而內亂如湧泉也夫色生於血病進於脈而色亦敗惡矣辨脈篇曰脈綿綿如瀉漆之絶者亡其血也綿綿其去如弦細而欲絶者形容其脈去之象也病進而脈至如此之盛血亡而脈去如此之衰血者神氣也邪盛正亡不治之死證矣以上論切脈之大概以別陰陽氣血之盛衰王芳侯曰上盛則氣高至細則氣少即長則氣治短則氣病之義澀則心痛至綿綿其去如弦絶乃復形容數則煩心大則病進也夫精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如藍青欲如蒼璧之澤不欲如鹽黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微象見矣其壽不久也此言色生於氣氣生於臟欲其氣華於色而不欲臟象見於外也赤如白裹朱白如鵝羽青如蒼碧黃如羅裹雄黃黑如重漆乃五臟之氣章華於色也赤如赭白如鹽青如藍黃如土黑如地蒼此五臟之精象見於外也夫臟者藏也如五臟之真色見而不藏則其壽不久矣夫精明者所以視萬物別白黑審短長以長為短以白為黑如是則精衰矣五臟主藏精者也精有所藏而後能視萬物審短長如精微象見於外則精氣內衰視物昏瞶而壽不久矣此反結上文之義而言視精明者由藏精之所資也以上論察色五臟者中之守也此論五臟之精氣而發於音聲也五臟守於中而外發於音聲者藏精之所發也蓋言聲色見於外而五臟之精守而不溢者也中盛臟滿氣勝傷恐者聲如從室中言是中氣之濕也經云五臟主藏精者也故曰五臟者中之守也腎為水臟受五臟之精而藏之如腎不受藏則中盛臟滿矣恐為腎志如腎氣不藏而反勝於中則傷動其腎志矣氣勝傷恐則精亦外溢故曰此中氣之濕也聲如從室中言者音不響亮而聲不外出也此言腎為生氣之原音聲由腎氣之所發如腎臟之精氣不藏則發聲之如是也言而微終日乃復言者此奪氣也此言五臟之精氣虛而發聲之如是也微者聲氣衰微也終日復言者氣不接續也傷寒論曰實則譫語虛則鄭聲鄭聲者重語也重平聲衣被不斂言語善惡不避親疏者此神明之亂也神明者五臟之神氣也語言善惡不避親疏者神亂而譫語也上節論正氣之盛衰此論邪氣盛而正氣昏亂倉廩不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死此承上文而言五臟之精氣由中焦水穀之所資生藏於腎臟膀胱之府脾胃為倉廩之官主運化水穀如倉廩不藏則穀精下泄而魄門幽戶之不能禁也膀胱者州都之官津液藏焉氣化則出水泉不止是水惟下泄而津液不藏也如泄注止而得守者生失守則死矣此蓋言視精明發音聲皆由腎臟所藏之精如精盛臟滿則精液上溢而聲如從室中言如倉廩不固則精氣奪而生氣漸絶矣膀胱主下焦之決瀆津液雖藏而氣化則出然有行有止有闔有開而又不可過泄者也楊元如曰按傷寒論云陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此必大便硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久當大便也以此論之是膀胱之精藏而不瀉亦還養五臟故得守者生失守者死夫五臟者身之強也此言四體百骸髓精筋骨亦皆由藏精之所資也靈樞經脈篇曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長谷入於胃脈道以通血氣乃行蓋言人之氣血聲色筋骨肌肉糜不由先天始生之精後天水穀之液所資生而資養者也頭者精明之府頭傾視深精神將奪矣諸陽之神氣上會於頭諸髓之精上聚於腦故頭為精髓神明之府髓海不足則頭為之傾神氣衰微則視深目陷也背者胸中之府背曲肩隨腑將壞矣肩背為陽胸腹為陰陽為腑陰為臟心肺居於胸中而俞在肩背故背為胸之府腰者腎之府轉搖不能腎將憊矣兩腎在於腰內故腰為腎之外府膝者筋之府屈伸不能行則僂附筋將憊矣筋會陽陵泉膝乃筋之會府也僂曲其身附依附而行也筋乃肝之合筋將憊者肝臟之精氣衰也骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死髓藏於骨故骨為髓之府不能久立髓竭於內也髓竭則骨將憊矣此五者得腑氣之強則生失強則腑壞而臟將絶矣以上論觀五臟有餘不足六腑強弱形之盛衰楊元如曰強者六腑之氣強也腑者臟之合腑陽而臟陰陽外而陰內是以頭背腰膝將憊猶藉腑氣之強故曰觀六腑之強弱莫子晉曰六腑之氣強由五臟之有餘五臟之不足又藉腑氣之盛強故曰腰者腎之府轉搖不能腎將憊矣陰陽臟腑之互相資生者也岐伯曰反四時者有餘為精不足為消應太過不足為精應不足有餘為消陰陽不相應病名曰關格此總結上文而言視精明亮音聲強筋骨健形體皆由精之所資而臟腑之精氣與四時之氣相反者也蓋臟為陰腑為陽秋冬為陰春夏為陽腎主冬令閉藏之氣而反中盛臟滿是有餘者為腎藏之精膀胱主太陽夏盛之氣而反水泉下泄是不足者為膀胱之消是與四時相反者矣若應太過而反不足為精是腎藏之精反泄於外矣應不足而反有餘為消是膀胱之水反蓄於內矣此臟腑陰陽之不相應病名曰關格關則不得小便也此蓋言州都之津氣化則出而視精明發音聲資神明堅筋骨皆由腎臟所藏之精而氣血亦由此精之所生化也子晉問曰反四時而只言冬夏病關格而只曰不得尿恐與經旨不合與曰日月運行一寒一暑故下文曰彼春之暖為夏之暑彼秋之忿成冬之怒雖四時成歲而總屬寒暑之往來平脈篇曰下微本大者則為關格不通不得尿又曰趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格是不得小便者病名關格吐逆者亦名關格也帝曰脈其四時動奈何知病之所在奈何知病之所變奈何知病乍在內奈何知病乍在外奈何請問此五者可得聞乎以上論切脈氣察精明聽音聲審臟腑之有餘不足觀形體之盛衰參伍錯綜以決死生之分此以下復論脈合陰陽四時診脈而知病之所在病成而變為他病候尺寸以分別臟腑之外內上下左右曲盡其脈要精微之理故復設此問焉岐伯曰請言其與天運轉大也言人之陰陽出入與天道運轉之大相合萬物之外六合之內天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下寒暑相推而歲成一陰一陽之謂道言四時之氣總屬寒暑之往來脈應四時之變亦與陰陽之上下耳天氣包乎萬物之外運轉於六合之內其變動之應彼春之暖為夏之暑言陽氣從生升而至於盛長也彼秋之忿為冬之怒言陰氣自清肅而至於凜冽也此四時陰陽之變動而脈亦與之上下浮沉以春應中規夏應中矩秋應中衡冬應中權此論脈應四時之變也規者所以為圓之器春時天氣始生其脈耎弱輕虛而滑如規之圓轉而動也矩者所以為方之器夏時天氣正方其脈洪大如矩之方正而盛也秋時天氣始降其脈浮平有如衡之平準也冬時天氣閉藏其脈沉石有如權之下垂也是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失知脈所分分之有期故知死時此言四變之動總屬陰陽之出入而脈與之上下也四十五日者從冬至而至立春從夏至而至立秋冬至一陽初生陽氣微上陰氣微下至春而陽氣始方至夏盛長而陰氣下藏矣夏至一陰初生陰氣微上陽氣微下至秋而陰氣清涼至冬凜冽而陽氣伏藏矣陰陽升降出入離合有期而脈亦與之相應如期而脈氣相失則知脈之所分分之有期故知死時也平脈篇曰寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計其餘命生死之期期以月節克之也即所謂分之有期而知死時也如冬至四十五日陽氣微上夏至四十五日陰氣微上而尺脈上不至關為陰絶於下矣夏至四十五日陽氣微下冬至四十五日陰氣微下而寸脈下不至關為陽絶於上矣此上下陰陽不相交合而反分離與四時之期相失故知脈之所分而知死時也知死時者期以四離四絶之月節克之而死也微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜承上文而言脈應陰陽四時之微妙不可不細察焉紀綱也察脈之綱領當從陰陽始即冬至陽氣微上夏至陰氣微上陰陽上下自有經常之理然又從五行而生如春木生夏火火生長夏土土生秋金金生冬水水生春木生之有度而四時為五行相生之宜補瀉勿失與天地如一得一之情以知死生夫四時有未至而至至而不至至而太過至而不及而人亦應之是以脈之不及則補之太過則瀉之與天地四時之太過不及治之如一與天地陰陽之道合之如一焉得一之情可以知死生矣如臟象論之所謂謹候其時氣可與期失時反候五治不分邪僻內生工不能禁此因天地四時之氣而為人之死生也如平脈篇之所謂寸脈下不至關為陽絶尺脈上不至關為陰絶此脈與天地四時之氣期而相失而為死生也是故聲合五音色合五行脈合陰陽聲合天地之五音色合天地之五行脈合天地之陰陽而始能得一之情以知死生是知陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷此言天地之陰陽五行而合於人之陰陽臟腑也夢者魂魄神氣之所遊行肝主血而藏魂肺主氣而藏魄心主火而為陽腎主水而為陰是以陰盛則夢大水陽盛則夢大火陰陽俱盛兩不相降故夢相殺毀傷也上盛則夢飛下盛則夢墮王氏曰氣上則夢上故飛氣下則夢下故墮甚飽則夢豫甚飢則夢取豫與同有餘故夢豫不足故夢取此言中焦脾胃之氣有虛有實而形諸夢也肝氣盛則夢怒肺氣盛則夢哭氣並於肝則怒並於肺則悲故與夢相合短蟲多則夢聚衆長蟲多則夢相擊毀傷此言腑氣實而徵之於夢也長蟲短蟲腸胃之所生也是故持脈有道虛靜為保欲知四時五行陰陽外內在診脈之精微故當虛靜其心志守而勿失焉春日浮如魚之遊在波魚在波雖出而未浮如春升初出之象夏日在膚泛泛乎萬物有餘在於皮膚浮在外也泛泛充滿之象萬物有餘盛長之極也秋日下膚蟄蟲將去秋氣降收如蟄蟲之將去外而內藏之象冬日在骨蟄蟲周密君子居室冬令閉藏故脈沉在骨如蟄蟲之封閉如君子之居室藏而勿出也此言人與昆蟲萬物生於天地之間同順生長收藏之氣是以脈象如之莫子晉曰君子居室者言修養精氣之賢人順四時之氣行藏出入與萬物同歸於生長之門故曰知內者按而紀之知外者終而始之此六者持脈之大法欲知在內臟腑陰陽之虛實者按其脈而記之欲知外之四時陰陽者終而始之蓋陽氣之始者陰氣之將終陰氣之始者陽氣之將終也以陰陽之出入而應四時之脈也此以上答帝問脈其四時動奈何心脈搏堅而長當病舌卷不能言其耎而散者當消環自已此言按其脈而知臟腑虛實之病搏堅而長者搏擊應手有力而長此為太過之脈心火太過故當病舌卷心主言故不能言也其耎而散者此為不足之脈靈樞經曰心脈微小為消疸蓋心液不足則火鬱而為消渴之病心藏神得神機環轉而病自已也此以下答帝問知病之所在奈何張兆璜曰先心而肺肺而肝蓋亦逆傳之為病也故曰消環自已與上篇之間者環也盡氣閉環同義按甲乙經環作渴肺脈搏堅而長當病唾血其耎而散者當病灌汗至令不復散發也靈樞經云肺脈微急為唾血蓋肺主氣而主行營衛陰陽氣盛太過則血隨而上逆矣其不及當病灌汗灌者脾土灌溉之汗蓋脾氣散津上歸於肺肺氣通調而後水津四布今肺氣虛而不能輸布水液脾氣自灌於肌腠皮膚至令肺氣不復通調而散發也肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其耎而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也肝主血而主色脈盛而色不見者血蓄於下也當病墜傷或為手搏所傷因血凝脅下故令人喘逆蓋肝脈貫膈上注肺血積於下則經氣上逆而為喘也其不及而色澤者當病溢飲金匱要略云夫病水人面目鮮澤蓋水溢於皮膚故其色潤澤也肝主疏泄肝氣虛而渴暴多飲以致溢於皮膚腸胃之外而為飲也胃脈搏堅而長其色赤當病折髀其耎而散者當病食痹足陽明之脈從氣衝下髀抵伏兔下足趺髀傷故脈盛而色赤也飲食於胃由中焦之腐化胃氣不足故當病食痹脾脈搏堅而長其色黃當病少氣其耎而散色不澤者當病足䯒腫若水狀也五臟元真之氣脾所主也濕熱太過則色黃脈盛而少氣矣其不及當病足脛腫脾氣虛故足腫也若水狀而非水病故其色不澤腎脈搏堅而長其色黃而赤者當病折腰其耎而散者當病少血至令不復也腰者腎之府腰傷故腎脈盛也傷於骨者其色赤黃則外應於肌肉間也其不及當病少血蓋腎為牝臟受五臟之精而藏之腎之精液復上入心而為血精虛至令不復化赤而為血也帝曰診得心脈而急此為何病病形何如岐伯曰病名心疝少腹當有形也帝曰何以言之岐伯曰心為牡臟小腸為之使故曰少腹當有形也此論診得臟脈而病在於腑也病形病氣見於形證也蓋臟腑經絡相連陰陽相應是以脈見於臟而形見於腑也經曰諸急為寒心為陽臟而畏寒故脈急心為君主之官而不受邪故形見於少腹也帝曰診得胃脈病形何如岐伯曰胃脈實則脹虛則泄此論診得腑脈而病在於臟也經曰脾氣實則腹脹不足則為溏泄蓋脾與胃以膜相運耳胃為陽脾為陰陽病者上行極而下是以脈見於胃而病見於脾也此皆陰陽表裡上下雌雄相輸應也以上答帝問知病之所在奈何子晉問曰臟腑相通只心脾耶曰此蓋舉二臟以俟人之類推耳帝曰病成而變何謂此復問知病之變奈何也變者言病已成而又變為別病岐伯曰風成為寒熱風者善行而數變腠理開則灑然寒閉則熱而悶此風病已成而變為寒熱也疸成為消中疸濕熱病也濕熱已成則中土受傷久則津液不生變成中消之證厥成為巔疾厥者氣上逆而手足厥冷也氣惟上逆則變為巔頂之病方盛衰論曰氣上不下頭痛巔疾久風為飧泄風乃木邪久則內干脾土而成飧泄矣故曰春傷於風邪氣留連乃為洞泄脈風成為厲厲者麻癜惡癘之疾風乃陽熱之邪血乃陰濕之液濕熱生蟲是以風入於脈久則變為蟲癩之癘瘍病之變化不可勝數言病之變化不可勝數舉此數者以類推之帝曰諸癰腫筋攣骨痛此皆安生岐伯曰此寒氣之腫八風之變也此復言四時風寒之邪變為癰腫攣痛之熱病帝曰治之奈何岐伯曰此四時之病以其勝治之愈也以勝治之者以五行氣味之勝治之而愈也如寒淫於內治以甘熱如東方生風風生木木生酸辛勝酸之類帝曰有故病五臟發動因傷脈色各何以知其久暴至之病乎有故病而因傷五臟之色脈復感暴至之病有似乎病成而變故帝有此問而伯嘉其詳悉焉岐伯曰悉乎哉問也徵其脈小色不奪者新病也徵驗也病久則色脈傷脈小而色不奪故知其為新病徵其脈不奪其色奪者此久病也此言病者由五臟而見於脈由五脈而見於色至於色脈之敗傷又由色而脈脈而臟也徵其脈與五色俱奪者此久病也血氣俱傷故為久病徵其脈與五色俱不奪者新病也暴至之病自外而內色脈之傷從內而外故有病而色脈俱不奪者知其為新感之病也此言有故久之病至五臟之氣發作而後見於色脈也肝與腎脈並至其色蒼赤當病毀傷不見血已見血濕若中水也此言毀傷形身之暴病而即見於色脈也金匱要略云寸口脈沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節黃汗出此言毀傷筋骨故肝與腎脈並至而其色蒼赤不見血者謂筋骨傷而血不傷也如已見血而血傷則又若中水傷心而心脈亦並至矣蓋言筋即為肝骨即為腎血即為心毀傷筋骨而即見肝腎之脈又非見肝腎之脈而期病之必生於肝腎也此篇首論診脈之要極精極微有病在五臟而外見五色五脈者有診得臟腑外內出入交相貫通故善診者揆陰度陽持雌守雄審察外內明於始終診道始備斯為上工尺內兩旁則季脅也此審別形身臟腑外內之法也尺內尺中也兩旁兩尺部之外旁也季脅兩脅之下杪也此節首言兩旁次言前後次言上下蓋以左右三部之脈兼候形身之上下四旁是關部之兩旁即形身之兩脅寸部之兩旁即形身之兩腋書不盡言欲後學之引伸也此答帝問乍在內乍在外奈何楊元如曰此節照應推而內之外而不內後內以候膈內以候胸中照應推而外之內而不外尺外以候腎尺裡以候腹尺以候腎以左右兩尺而候兩腎也兩腎附於季脅是季脅之內乃是兩腎兩腎之內乃是腹中故以尺內候腹中尺外以候腎尺之兩旁以候季脅是兩旁更出於外也所謂外內者脈體本圓用指向外以候內向內以候外候脈之兩側也平按以候中乃五臟之本位也夫五臟之氣行於脈中出於脈外如脈氣之向內數急則在內之皮膚亦急脈氣之向外數急則在外之皮膚亦急故所謂季脅者即腎氣之出於季脅也而以尺部向外之兩旁以候之所謂腹中者即兩腎之中也故以尺部之向里以候之即如胸中膻中者肺臟與中氣相通膻中乃心主之相位楊元如曰所謂外者乃六脈之本位蓋脈居歧骨之外故以本位為外而偏於里者為內也上節內字訓作部字此之裡字即是內字中附上左外以候肝內以候膈中附上者附左尺而上左手之關脈也心肝居左故左以候肝膈者胸脅內之膈也肝居脅內故以關候肝膈氣在中故以內候膈楊元如曰膈者謂膈肉之下肝脾所居之郛郭也莫子晉曰胸中在上腹中在下膈居中央故分寸關尺內以候之右附上以候脾胃則肺與大腸心與小腸不言而可知矣右外以候胃內以候脾右外者附右尺而上右手之關脈也脾主中土故以肝內候脾陰內而陽外故以關外候胃張兆璜曰此章以形身配天地之上下四旁以土居中央故以關內候脾莫子晉問曰六腑只候胃而別腑何以候之曰五臟之血氣皆胃腑之所生故臟氣不能自至於手太陰必因於胃氣乃至於手太陰也是以本經凡論五臟必及於胃而余腑多不與焉然而臟腑雌雄各有併合故曰診合微之事追陰陽之變知陰者知陽知陽者知陰會心者自明也莫仲超曰診候之法各有不同如此篇之法以左右之前後兩旁上下以候形身之外內上下者也如三部九候之法以脈之上中下而候形身臟腑之上中下也有以心肝居左脾肺居右浮為在腑沉為在臟蓋以臟腑之經氣相舉按輕重而候五臟之氣者也診法不同各具其理善診者俱宜明瞭於心中隨機應變於指下上附上右外以候肺內以候胸中上附上右者從右關而上右寸口也心肺居上為陽故以兩寸候氣胸中者宗氣之所居也經曰宗氣積於胸中命曰氣海上出於肺循喉嚨而行呼吸左外以候心內以候膻中左外左寸口也膻中者臣使之官心主之相位也張兆璜問曰經言心肝居左脾肺居右是臟氣之出於左右抑臟體之偏與曰天為陽地為陰東南為陽西北為陰聖人南面而立左為陽右為陰天乙生水水生木木生火是以心肝居左也地二生火火生土土生金是以脾肺居右也此先天之五行本於陰陽水火分而上生非臟體之謂也又心主脈肝主血血脈生於水精是以左手三部俱主血肺主周身之氣脾主元真之氣氣生於火是以右手三部皆主氣此皆陰陽互換之妙善診者不可不知前以候前後以候後前曰廣明後曰太衝寸為陽尺為陰故以兩手關前以候形身之前關後以候形身之後上竟上者胸喉中事也下竟上者少腹腰股膝脛足中事也上竟上者從尺關而直上於魚也下竟下者從寸關而直下於尺也夫身半以上為天身半以下為地此又以陰陽之氣竟上竟下而候形身之上下也張兆璜曰前後上下在竟字中分別前後者以寸尺定位也上下者從下而上從上而下也首言兩旁次言前後蓋以兩手之脈平以分之有如文王之卦離南坎北震東兌西以候形身之四旁上竟上下竟下者有如伏羲之卦豎以觀之而天地定位也此章以人身配天地之六合三部九候之法配天地人三才人與天地參也粗大者陰不足陽有餘為熱中也上章以脈體而候形身臟腑之定位此下以脈象而候陰陽邪正之盛虛脈者陰陽血氣之榮行粗大者陽乘於陰也陽在外陰在內陽乘於陰故熱中也來疾去徐上實下虛為厥巔疾來徐去疾上虛下實為惡風也此以脈之來去上下以候陰陽上下外內之虛實來疾去徐者來盛去悠也上實下虛者寸實尺虛也此氣惟上逆陽盛陰虛所謂一上不下寒厥到膝氣上不下頭痛癲疾是也來徐去疾者來微去盛也上虛下實者寸虛尺實也此陽虛陰盛為惡風也蓋風為陽邪傷人陽氣在於皮膚之間風之惡癘者從陽而直入於裡陰是以去疾下實也此言內因之病從內而外自下而上外因之邪從外而內自上而下也故中惡風者陽氣受也此復申明外淫之邪從陽而陰自表而里也陽氣受邪則正氣虛傷故來徐上虛邪氣內陷故去疾下實有脈俱沉細數者少陰厥也沉細數散者寒熱也浮而散者為眴僕此論脈因度數出入之有順逆也有脈者言又有厥脈之因厥脈之象與上文之上盛下虛之厥脈厥因不同也夫脈始於足少陰腎生於足陽明胃輸於足太陰脾轉而不回者也如脈俱沉細而數者此少陰厥也少陰之氣不上合於陽明轉輸於臟腑故惟見少陰本脈之沉細也陽明之熱反下入於陰中故數也若沉細數散者此陰中所陷之陽散而陰陽相乘故為寒熱也如浮而散者此復上逆於陽分故為眴僕經曰清濁之氣相干亂於頭則為厥逆眩僕此言陰陽之氣不能上下和平循度環轉如陽陷於陰中則為沉細而數如陰陽相乘則為數散寒熱如陰反上逆於陽則為浮散而眴僕矣諸浮不躁者皆在陽則為熱其有躁者在手諸細而沉者皆在陰則為骨痛其有靜者在足此以浮沉躁靜而分手足之陰陽也諸浮者無論左右三部之浮而皆在於陽分其浮而躁者在手之三陽也終始篇曰人迎一盛在足少陽一盛而躁在手少陽即此意也無論左右三部之細而沉者皆在於陰分其沉細而有靜者在足之三陰也手之十指以應天之十干足之十二經脈以應地之十二支故其有靜者知在足也太陽少陰為水火陰陽之主故為熱為骨痛也數動一代者病在陽之脈也泄及便膿血此申明浮沉之在氣而不在經也所謂諸浮在陽諸沉在陰者在陰陽之氣也故為熱為骨痛如在陽之脈則脈見數動而為便膿血之經證矣陽熱在經故脈數動熱傷血分故便膿血經血下泄故一代也諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒此論外淫之邪而致陰陽氣之為病者脈證各有別也諸過者謂諸邪所傷而為有過之脈也有餘者邪氣之有餘也陽氣有餘則陽氣受傷故脈澀如邪入於陰則經血沸騰故脈滑也邪在陽分故身熱無汗邪在陰分故多汗身寒陰陽並受其邪則無汗而寒也推而外之內而不外有心腹積也推而內之外而不內身有熱也推而上之上而不下腰足清也推而下之下而不上頭項痛也推葉吹此復結首章之義首章以脈體而定形身臟腑之外內上下此以邪病於形身臟腑之外內上下而以脈象證之推詳也推詳其脈氣之偏於外內上下也推而外之者以左右之三指向外以按之脈偏盛向內而不外者此邪在心腹之間而成積也推而內之者以左右三指向內以候之脈偏盛於外而不內者邪在外而身有熱也推而上之者以三指平按而審之上而不下者其氣上盛下虛當主腰足清冷也推而下之下而不上者其氣下盛上虛當主頭項痛也外內論邪病之有餘上下論正氣之不足張兆璜曰吹推二義皆可推而外之內而不外推而內之外而不內者此邪病偏盛於外內故即推之而不移推而上之上而不下推而下之下而不上此推詳其正氣之虛於上下故推而上之不曰下而不上而曰上而不下推而下之不曰上而不下而曰下而不上莫子晉曰書不盡言言不盡意邪病正氣又當互換外存參按之至骨脈氣少者腰脊痛而身有痹也此反結上文而言所謂外內上下者非浮沉舉按之法也若謂浮為在外沉為在內病腰脊痛而身有痹者直按之至骨如心腹之積又當何如而按之聖賢反復辨論曲盡婆心楊元如曰病在陰者名曰痹故當按之至骨此復以浮沉舉復以候皮肉筋骨之淺深類而推之亦可內合於五臟然又一法也平人氣象論篇第十八黃帝問曰平人何如平人平常無病之人無病之人自有平常之脈反常則為病矣故曰平人氣象論氣者經脈之氣象者脈之形象也岐伯對曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也出氣曰呼入氣曰吸一呼一吸為一息平人之脈一呼再動一息再動呼吸定息脈計五動蓋閏以太息故五動也閏余也太息者呼吸定息之時有餘不盡而脈又一動如歲余之有閏也蓋人之呼吸乃陰陽之氣出入循環有若寒暑往來而成歲故宜閏以太息之有餘當以不病調病人醫不病故為病人平息以調之為法不病者其息平病者其息亂醫者不病故為病人平息以調之是為候診之法人一呼脈一動一吸脈一動曰少氣榮氣宗氣行於脈外衛氣行於脈中榮衛相將脈隨氣轉人一呼一動一吸一動減於平人過半故主氣之衰微人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹一息之中脈六動者氣之太過也躁急也吸而躁者有餘之邪從外而內也溫病者冬傷於寒至春發為溫病冬傷於風至春發為風溫此皆伏匿之邪由內而外從陰而陽故尺中熱也風為陽邪傷人陽氣故尺不熱氣分之邪留而不去則迫於經故脈滑也痹者閉也邪積而不行故脈澀泣也蓋言從內而外者為溫病從外而內者為風邪留著於外內之間者為痹也上節言不及者緣正氣衰少此言太過者乃邪氣有餘而有餘之邪又有陰陽外內出入之別人一呼吸四動以上曰死脈絶不至曰死乍疏乍數曰死四動以上太過之極也脈絶不至不及之極也乍疏乍數或太過或不及氣之亂也此皆不平之甚故為死脈以上論脈平者命曰平人太過不及則病劇者死矣平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死此論四時之脈當以胃氣為本也平人之常受氣於谷谷入於胃五臟六腑皆以受氣故胃者平人之常氣也人無胃氣是生機已絶絶則死矣春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃氣者中土柔和之氣也弦乃東方春木之象微乃胃氣之和故春得胃氣而脈微弦曰平弦多而少柔和之氣曰肝病但弦無胃曰死楊元如曰春胃微弦者言四時之中有此胃氣由胃氣而養此五臟之真此節以四時而合於五臟末節以五臟之氣而合於四時胃而有毛曰秋病毛甚曰今病毛為秋脈屬金如春雖得微弦之平脈而兼有輕浮之毛此金來剋木至秋金令之時則當病矣如毛脈過甚此木受金刑當主即病此復言四時之脈各有所主之氣如見克賊之脈雖有胃氣而亦能為病也臟真散於肝肝藏筋膜之氣也上臟葉臟下臟葉髒髒真者真臟所藏之神也神在臟為肝在體為筋言真臟之神散於肝而主藏筋膜之氣如春木微弦之脈乃因胃氣而至於手太陰故曰脈不得胃氣肝不弦腎不石是弦鉤毛石之脈亦皆胃氣之所生夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死鉤乃南方夏火之象微則柔和之胃氣也夏得胃氣而脈微鉤曰平鉤甚而少微和之氣曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病石乃冬令之脈微鉤而帶石乃火中有水至冬水氣所主之時而為病矣如水氣太甚此火受水克當即病矣臟真通於心心藏血脈之氣也夏臟之元真通於心而主藏血脈之氣長夏胃微耎弱曰平弱多胃少曰脾病但代無胃曰死耎葉軟長夏濕土主氣微耎弱者中土柔和之氣也代者相離之脈蓋脾主四季四時有交相更代之氣是以柔和相離脾之平脈也如但代而無微耎之和此胃氣已絶故為死脈蓋脾之得以灌溉於四臟者由胃氣之所生故但代無胃曰死耎弱有石曰冬病弱甚曰今病耎弱有石是所不勝之水氣反來侮土至冬時水氣反虛而為病矣弱甚者脾氣太弱當主即病蓋言乘侮太甚者即病而本氣虛者亦即病也臟真濡於脾脾藏肌肉之氣也土藏之元真濡於脾而主藏肌肉之氣楊元如曰肝主疏泄故曰散心主血脈故曰通脾主灌溉故曰濡肺臟居尊故曰高腎為水臟故曰下秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛乃秋金之脈微則柔和之胃氣也秋得胃氣而脈微毛曰平毛多而少柔和之氣曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病毛而有弦是所不勝之木氣反來侮金則木虛其本位矣至春當木旺之時而木氣反虛是以為病所謂侮反受邪寡於畏也弦甚者乘侮太過而金氣當即病矣按平脈篇曰脈有相乘有縱有橫水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫是四時之中皆有縱有橫縱者雖得胃氣而所不勝乘之故曰胃而有毛胃而有石橫者臟氣不足而所勝妄行故曰毛而有弦石而有鉤此臟氣橫行是以本位虛而反招仇復按四季長夏之中文義三換當知四時之氣皆有縱有橫有客氣甚而有本氣虛也臟真高於肺以行榮衛陰陽也金藏之元真高居於肺而主行榮衛陰陽肺主周身之氣而朝百脈也元如曰相傳之官燮理陰陽宣布政令冬胃微石曰平石多胃少曰腎病但石無胃曰死石乃冬藏之脈微則柔和之胃氣也腎得胃氣而脈微石曰平石多而少柔和之氣曰腎病但石而無胃氣曰死石而有鉤曰夏病鉤甚曰今病石而有鉤火侮水也立夏火氣反虛而為病矣若乘侮太甚當主今病臟真下於腎腎藏骨髓之氣也水藏之元真下藏於腎而主藏骨髓之氣五運行大論曰腎生骨髓髓生肝胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也此言五臟之脈資生於胃而胃氣之通於五臟者乃宗氣也宗氣者胃腑水穀之所生積於胸中上出喉嚨以司呼吸行於十二經隧之中為臟腑經脈之宗故曰宗氣胃之大絡貫膈絡肺出於左乳下而動應衣者乃胃腑宗氣之所出此脈以候宗氣者也楊元如曰首句之其動應衣跟著脈宗氣而言言乳下之應衣而動者此宗氣所出之脈也後句之其動應衣跟著宗氣泄也而言言動而應衣此宗氣外泄蓋動之甚矣盛喘數絶者則病在中結而橫有積矣絶不至曰死乳之下其動應衣宗氣泄也此言四時胃少曰病者宗氣之為病也五臟無胃氣曰死者宗氣或絶於內而或泄於外也宗脈貫膈絡肺如喘盛而乳下之脈數絶者宗氣病於膻中也如脈結而有止者虛里之橫絡有積滯也是胃氣少而為五臟之病者宗氣之有虛有實也如虛里之脈絶不至者胃腑之生氣絶於內也乳之下其動甚而應衣者宗氣欲泄於外也此無胃氣而為五臟之死脈也欲知寸口太過與不及寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈中手促上擊者曰肩背痛寸口脈沉而堅者曰病在中寸口脈浮而盛者曰病在外寸口脈沉而弱曰寒熱及疝瘕少腹痛寸口脈沉而橫曰脅下有積腹中有橫積痛寸口脈沉而喘曰寒熱此以寸口而候外因之病也夫寸為陽尺為陰外為陽內為陰皮肉筋骨為陽腹中脅內為陰蓋天地四時之氣從外而內由陽而陰故以寸口之浮沉以候外因之外內也寸口之脈中手短者此惟在寸之陽部故主頭痛諸陽氣之在上也寸口脈中手長者寸脈直下於尺中此陽邪直行於下部故主足脛痛也中手促上擊者浮而搏擊應手此陽邪不上不下故主在肩背之中也此以外邪在於形身之外而有上中下之分也沉為在裡浮主在外寸口脈沉而堅主病邪堅積在裡若浮而盛主邪病在外此以寸口之浮沉而別外邪之在形身之外內也寸為陽沉為陰寸口脈沉而弱此正氣虛而陽邪直入於裡陰陰陽相乘故主寒熱陽邪入里故又主疝瘕而少腹痛也此緣正氣弱而陽邪直入於裡陰之下也脅下主身半之中腹中為形身之裡寸口脈沉而橫是外邪入於裡陰之中故主脅下腹中有橫積也邪氣上逆則喘寸口脈沉而喘此外因之陽邪入於裡陰而上逆陰陽相搏故為寒熱此又以寸口之沉候外因之邪入於裡陰而亦有上中下之別也莫子晉曰春胃微弦夏胃微鉤乃天地四時之氣而合於人之五臟也是以天地四時之邪亦從外而內故當以寸口之浮沉別之脈盛滑堅者曰病在外脈小實而堅者曰病在內脈小弱以澀謂之久病脈滑浮而疾者謂之新病脈急者曰疝瘕少腹痛脈滑曰風脈澀曰痹緩而滑曰熱中盛而緊曰脹此復以寸關尺之三部而候病之外內新故也曰脈盛脈小者概左右三部而言也夫以寸口之浮沉以候病之外內上下者候表裡陰陽之氣也蓋天地四時之邪始傷氣分留而不去則入於經然亦有始終留於氣分者有即轉入於經者邪之中人變幻不一故當以脈徵之是以氣分之邪只見寸口之浮沉長短如入於經則有滑澀緊急之形象矣夫脈乃陰血氣分之陽邪入經陰陽相搏其脈則滑是以脈盛滑者病在外有餘之病故堅而有力也夫經脈外絡形身內連臟腑病在內者故小實而堅也此以三部之盛滑小實而分別邪正之在外在內也始受之病邪正相持故滑浮而疾久則血脈已傷故小弱以澀也諸急為寒故主疝瘕在內滑主陽熱故主風邪在陽此又以三部之急滑以別邪病之在陽絡陰絡也痹者閉也風寒濕邪皆能為痹或在於皮肉筋骨之間或內舍於五臟六腑故痹病於外內之間者其脈皆主澀也緩為脾脈滑則熱盛於中緊則為寒故主腹脹也此外因之邪入於腹中而有寒熱之分也脈從陰陽病易已脈逆陰陽病難已脈得四時之順曰病無他脈反四時及不間臟曰難已所謂陰陽者氣血外內上下也言臟腑之脈陰陽並交雌雄相應內外循環此為順也如陰陽反逆其病為難愈脈得四時之順者春脈微弦夏脈微鉤此得四時生氣之順而無他變也反四時者春胃而有毛夏胃而有石也間臟者相生而傳也不間臟者相剋而傳也如外淫之邪始傷皮毛則內合於肺肺欲傳肝而腎間之腎欲傳心而肝間之肝欲傳脾而心間之心欲傳肺而脾間之脾欲傳腎而肺間之此節乃總結上文之義臂多青脈曰脫血此論內因之病自內而外從尺而寸由血而經經而氣也臂多青脈者臂內浮見之絡脈多青蓋因血脫而不華於色也靈樞經曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩故善調尺者不待於寸善調脈者不待於色能參合而行之可為上工尺脈緩澀謂之解㑊安臥脈盛謂之脫血尺澀脈滑謂之多汗尺寒脈細謂之後泄脈尺粗常熱者謂之熱中此以尺部而候五臟之病也緩為脾脈澀主臟氣不足解㑊懈惰也此脾臟之為病也尺屬陰而主血脈宜沉靜盛者肝臟之火盛而血不藏也靈樞診尺篇曰尺膚澀者風痹也夫邪迫於經其脈則滑以風之陽邪閉於皮膚之間而迫於經脈故主多汗所謂陽加於陰謂之汗汗乃陰之液也此以診尺而知肺合之表汗也診尺篇曰尺膚寒其脈小者泄少氣夫陽氣生於陰中尺膚寒生陽之氣少矣陽氣衰於下故主虛泄泄則亡陰故脈細也此以診尺而知腎藏之生陽下焦之虛泄也尺膚粗常熱者火熱下行故主熱中此診尺而知心火之下行也夫陰陽氣血由陰而陽從下而上是以診尺而知病之外內上下也肝見庚辛死心見壬癸死脾見甲乙死肺見丙丁死腎見戊己死是謂真臟見者死此論真臟脈見而死於勝克之時日也夫五臟之氣地之五行所生地之五行天之十干所化是以生於五行而死於十干也按此節當在篇末辟辟如彈石曰腎死之下誤脫在此者也楊元如曰此章引靈樞診尺篇之文以證診尺之義而靈樞篇內亦無此節文宜改正為是頸脈動喘疾咳曰水目內微腫如臥蠶起之狀曰水溺黃赤安臥者黃疸已食如飢者胃疸面腫曰風足脛腫曰水目黃者曰黃疸此以視疾而知其病也按此節引靈樞論疾診尺之文少加刪改以證診尺之義上節論診尺此節言論疾所謂無視色持脈獨調其尺以言其病從外知內也是以見頸脈動疾目內微腫足脛腫者知水病之在裡也溺赤安臥已食如飢者知為黃疸胃疸也面腫者知為風水也此又不待持脈而知其病也楊元如曰診尺而知解㑊多汗之病在外視疾而知水飲黃疸之病在內故曰論疾診尺謂論證視尺皆可以知病又曰此章論診尺若以手少陰心脈言之於二經之旨皆不合矣婦人手少陰脈動甚者妊子也此復言診尺之微妙非惟知病而婦人之妊子亦可以分別也子男子也以婦人之兩手尺部候之若左手之少陰腎脈動盛者當妊子以左男而右女也脈有逆從四時未有臟形春夏而脈瘦秋冬而脈浮大命曰逆四時也從順也後章論五臟之氣外合於四時故雖未有春弦夏鉤秋毛冬石之臟形而陰陽出入之大概不可逆也風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也夫天地有四時之寒暑而人之氣血有浮大沉瘦之陰陽即受病之脈氣亦有外內虛實之相應是以脈不應病者命曰反四時也如風熱之病氣應浮動而脈反靜泄脫之病氣應虛散而脈反實病在中者氣應沉實而脈反虛病在外者氣應升浮而脈反堅澀此脈證之不相應者正氣亂也故為難治高士宗曰此以脈病之虛實知反四時上章云反四時者有餘為精不足為消亦以精水之有餘不足為反四時是反逆二字有別矣故曰反四時有正應不在四脈氣論上人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也此言五臟元真之氣亦皆胃腑水穀之所生也五臟者皆稟氣於胃胃氣者水穀之所資生故人以水穀為本胃絶水穀則死脈無胃氣亦死也所謂無胃氣者真臟脈見而不得微和之氣也又非惟微和之為胃氣也即真臟之脈亦胃氣之所生也故曰臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自為而至於手太陰者春為弦夏為鉤秋為毛冬為石皆得胃氣而為之也故曰脈不得胃氣者肝不弦腎不石也是以前章論四時之脈得胃氣之和者命曰平人後章論五臟之真亦四時以胃氣為本也太陽脈至洪大以長少陽脈至乍數乍疏乍短乍長陽明脈至浮大而短此言陽明胃氣不獨行於五臟而亦行氣於三陽也夫脾與胃以膜相運耳是以胃氣之行於五臟者由脾氣之轉輸故太陰為之行氣於三陰陽明者表也五臟六腑之海也亦為之行氣於三陽是以臟腑各因其經而受氣於陽明焉故太陽之洪大陽氣之盛也少陽之乍忽初生之象也陽明之浮大而短者兩陽合明陽盛而間於二陽之間也此三陽之氣亦胃腑之所生也夫平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本此言臟真之脈四時以胃氣為本也纍纍如連珠者滑利如珠連綿相貫心臟和平之象也琅玕美石之似珠者取其溫潤而柔滑也此臟真之脈柔耎和平者得四時之胃氣也前節以四時胃氣資於臟真故曰春胃微弦夏胃微鉤此節以五臟之真得四時胃氣故曰平心脈來夏以胃氣為本平肺脈來秋以胃氣為本是以脈象之少有不同也蓋弦鉤毛石者臟真之氣象也如連珠如榆莢者臟真之體象也楊元如曰前論四時之氣生五臟故肝而心心而脾序四時之相生此論五臟之真合四時故心而肺肺而肝序五行之相制制則生化也病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死喘喘急疾貌喘喘連屬心氣不安也曲者鉤之象其中微曲心氣虛也故當主心病居不動也曲而不動如操帶鉤無如珠生動之象矣平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本厭厭安靜貌聶聶輕小也落降收也如榆莢者輕薄而中不虛蓋肺脈雖主收降輕虛之象而資生於脾土是以有如榆莢之輕而中不虛也病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死不上不下往來澀滯也如循雞羽較之榆莢更屬輕虛其中又不得生我之土象而反有賊我之木體故主肺病如物之浮虛無根也如風吹毛散亂劇也平肝脈來耎弱招招如揭長竿末梢曰肝平春以胃氣為本耎弱初生柔和之氣也以手相呼曰招招招乍起乍伏之象形容其初生之脈象也長竿梢末長而耎也此皆本於胃氣故臟真之脈得以柔耎和平病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死盈實則非耎弱招招之象矣如循長竿非若梢末之耎弱矣滑脈如珠弦長帶滑如竿之有節矣辨脈篇曰纍纍如循長竿者名陰結也此肝氣病而阻結也急益徑如新張弓弦強徑之劇胃氣絶也平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本和柔中土柔和之氣也相離時一代也蓋脾為孤臟中央土以貫四旁故柔和之中而有相離之代散也雞足有四爪踐地極和緩形容脾土之灌溉四臟有如雞之踐地和緩而四散也病脾脈來實而盈數如雞舉足曰脾病實而盈數阜實而無柔和之氣也如雞舉足拳而收斂不能灌溉於四臟也死脾脈來鋭堅如烏之喙如鳥之距如屋之漏如水之流曰脾死喙音誨如烏之喙者堅止而無柔和相離之象也如鳥之距者較雞舉足更拳急也如屋之漏者點滴稀疏而不能灌溉也如水之流者濕土之氣四散也蓋言脾主中和之氣如太過不及之甚者皆為死脈也平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本喘喘纍纍沉石生動之象也如鉤者浮而中空水之體也按之堅石石之象也莫子晉曰琅玕石之美者鉤乃心之脈也心脈如循琅玕腎脈如鉤者心腎水火之氣互相交濟者也病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死如葛如索者木象也蓋沉石者腎之本體如引葛而按之益堅是腎氣不藏而外泄矣如奪索者如引葛而更堅徑矣如彈石者無喘纍生動之氣腎之死象也玉機真藏論篇第十九黃帝問曰春脈如弦何如而弦岐伯對曰春脈者肝也東方木也萬物之所以始生也故其氣來耎弱輕虛而滑端直以長故曰弦反此者病春弦夏鉤秋毛冬石臟真之神也此篇言真臟之脈資生於胃輸稟於脾合於四時行於五臟五臟相通移皆有次如璇璣玉衡轉而不回者也如五臟有病則各傳其所勝至其所不勝則死有為風寒外乘亦逆傳所勝而死者有為五志內傷交相乘傳而死者有春得肺脈夏得腎脈真臟之神為所不勝之氣乘之者皆奇恆之為病也故曰奇恆者言奇病也所謂奇者使奇病不得以四時死也恆者得以四時死也是以岐伯對曰春脈者肝也言春時之脈肝臟主氣而合於東方之木如萬物之始生故其氣來耎弱輕虛而滑端直以長蓋以臟真之氣而合於四時非四時之氣而為五臟之順逆也本卷五篇皆論脈理之精微診辨之要妙而各有不同學者宜潛心體會而詳悉其旨焉帝曰何如而反岐伯曰其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中實而強者盈實而如循長竿也不實而微無端長之體也言五臟之神氣由中而外環轉不息如氣盛強乃外出之太過如氣不足則衰微而在中太過不及皆臟真之氣不得其和平而為病也帝曰春脈太過與不及其病皆何如岐伯曰太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿夫五臟之脈行氣於其所生受氣於所生之母肝行氣於心受氣於腎春脈太過則氣並於上經曰氣並於上亂而喜忘氣上盛而與督脈會於巔故眩冒而巔疾也金匱要略曰胸痛引背陽虛而陰弦故也蓋春木之陽生於腎水之陰陰氣虛寒以致生陽不足故胸痛引背也脅胠乃肝腎之部分生氣虛而不能外達故逆滿於中也帝曰善夏脈如鉤何如而鉤岐伯曰夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病心脈通於夏氣如火之發焰如物之盛長其氣惟外出故脈來盛而去悠有如鉤象其本有力而肥其環轉則秒而微也帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中來盛者盛長之本氣也去亦盛者太過於外也來不盛者盛長之氣衰於內也去反盛者根本虛而末反盛也帝曰夏脈太過與不及其病皆何如岐伯曰太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄身熱膚痛者心火太過而淫氣於外也浸淫膚受之瘡火熱盛也其不及則反逆於內上熏肺而為咳唾下走腹而為氣泄矣夫心氣逆則為噫虛逆之氣不上出而為噫則下行而為氣泄氣泄者得後與氣快然如衰也帝曰善秋脈如浮何如而浮岐伯曰秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病秋氣降收外虛內實內實故脈來急外虛故浮而散也楊元如曰諸急為寒陰氣漸來故脈來急陽氣漸去故去散也帝曰何如而反岐伯曰其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中如榆莢而兩旁虛中央實此肺之平脈堅則為太過矣毛而微是中央兩旁皆虛此所生之母氣不足而致肺氣更衰微也帝曰秋脈太過與不及其病皆何如岐伯曰太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音肺主周身之氣太過則反逆於外而為背痛肺之俞在肩背也慍慍憂鬱不舒之貌經曰氣並於肺則憂其不及則令人氣虛而喘呼吸少氣而咳虛氣上逆則血隨而上行虛氣下逆則聞呻吟之病音蓋肺主氣而司呼吸開闔其太過則盛逆於外其不及則虛逆於內也帝曰善冬脈如營何如而營岐伯曰冬脈者腎也北方水也萬物之所以合臟故其氣來沉以搏故曰營反此者病營居也言冬氣之安居於內如萬物之所以合臟也也沉而搏者沉而有石也帝曰何如而反岐伯曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中如彈石者石而強也腎為生氣之原數則為虛生氣不足也帝曰冬脈太過與不及其病皆何如岐伯曰太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變帝曰善腎為生氣之原而主閉藏太過則氣外泄而根本反傷故為懈惰少氣生陽之氣不足故脊中痛心主言而發原於腎根氣傷故不欲言也其不及則心腎水火之氣不能交濟故令人心懸如病飢䏚中脅骨之杪當兩腎之處腎之生陽不足故䏚中冷也腎合膀胱腎虛而不能施化故小便變而少腹滿也帝曰四時之序逆從之變異也然脾脈獨何主總結上文而言臟真之氣合於四時有升降浮沉之序如逆其順序和平之氣則有變異之病矣然四時之脈止合四臟而脾臟之脈獨何所主乎岐伯曰脾脈者土也孤臟以灌四旁者也脾屬土而位居中央各王四季月十八日不得獨主於時故為孤臟帝曰然則脾善惡可得見之乎岐伯曰善者不可得見惡者可見此言脾灌四臟四臟受脾之氣而各見其善是脾之善在四臟而不自見其善耳帝曰惡者如何可見岐伯曰其來如水之流者此為太過病在外如烏之喙者此謂不及病在中如水之流者灌溉太過也如烏之喙者黔喙之屬艮止而不行也帝曰夫子言脾為孤臟中央土以灌四旁其太過與不及其病皆何如岐伯曰太過則令人四肢不舉其不及則令人九竅不通名曰重強經曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也脾為濕土主氣濕行太過故令人四肢不舉經曰五臟不和則九竅不通脾氣不足則五臟之氣皆不和矣夫胃為陽土而氣強脾為陰土而氣弱脾弱而不得稟水穀之氣則胃氣益強故名曰重強蓋言脾氣虛而不能為胃行其津液者胃強脾弱臟腑之剛柔不和也張兆璜曰九竅為水注之氣脾不得為胃行其津液故令人九竅不通帝瞿然而起再拜而稽首曰善吾得脈之大要天下至數五色脈變揆度奇恆道在於一神轉不回回則不轉乃失其機至數之要迫近以微著之玉版藏之臟腑每旦讀之名曰玉機此言五臟受氣於胃一以貫通次序環轉如璇璣玉衡合之玉板乃揆度奇恆之大要也瞿然驚悟貌至數者五脈之至數也蓋天地之間六合之內不離於五人亦應之故曰天下至數五色脈變揆度奇恆道在於一一者五臟之神轉而不回如逆回則失其旋轉之機矣五臟相通陰陽併合脈之至數迫近以微著之玉版者有格有序也藏之臟腑者陰陽雌雄之相應也每旦讀之者血氣未亂也名曰玉機者如璇璣玉衡也以上論真藏之神五臟相通外內環轉如太過不及則病若回而不轉乃失其機而死矣五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死此言氣之逆行也故死此言五臟之氣逆回失其旋轉之機而死也平脈篇曰水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也蓋神轉而不回者母行乘子也回則不轉者子行乘母也五臟受氣於所生之子而反舍氣於所生之母是生氣之逆行也傳之於其所勝是克賊相傳也是以至其所不勝而死此皆氣之逆行故也如肝受氣於心而肝氣反舍於腎則腎氣盛腎氣盛則火氣衰火氣衰則金無所畏而傷肝所謂舍氣於其所生死於其所不勝也病之且死必先傳行言必先克賊相傳而後病至其所不勝而後死故當先治其未病焉金匱要略曰上工治未病者何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之經曰虛虛實實補不足損有餘是其義也餘臟準此所謂病之且死必先傳行上工能治其未病則不至於死矣董帷園曰玉機章旨與金匱此篇理同義合學者宜互相參究大有裨於治道焉肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死生之早暮也此復申明五臟之氣逆傳至其所不勝而死昧旦主甲乙晝主丙丁日昃主戊己暮主庚辛夜主壬癸一日一夜而五分之如真臟脈見至肺而死死於薄暮至腎而死死於中夜至肝而死死於昧旦至心而死死於日中至脾而死死於日昃此所以占死生之早暮也夫逆傳至死有三歲有六歲有三月有六月有三日有六日當知日之早暮亦有三時有六時也黃帝曰五臟相通移皆有次五臟有病則各傳其所勝此總結上文而言五臟相通有順傳之次序如逆傳其所勝者蓋因其病而逆之也不治法三月若六月若三日若六日傳五臟而當死是順傳所勝之次此言逆傳所勝之死有時而有月有日也如見肝之病中工不曉傳脾而不治則脾傳之腎腎傳之心心傳之肺法三月而傳之所勝之次則死矣假如心病而欲傳之肺時值秋三月而金旺不受邪法當六月而傳之所勝之次則死矣所謂法三月若六月也如傳於值死之月假如肝病傳脾而戊日受之真臟之脈見則當庚日而死己日受之則當辛日而死此法當三日而死也如甲乙日受之真臟脈見亦當死於庚辛此法當六日而死所謂若三日若六日也五臟相傳而當死者是順傳所勝之次如甲乙肝木受病順傳至庚辛而死丙丁心火受病順傳至壬癸而死戊己脾土受病復傳至甲乙而死故曰順傳所勝之次而死也此五臟逆傳而知死之月死之日死之時所謂別於陰者知死生之期也故曰別於陽者知病從來別於陰者知死生之期言知至其所困而死此承上接下之文也別於陽者下文所謂風寒之邪從皮毛陽分而入故別於陽者知病所從來五臟為陰知五臟逆傳而死者上文之所謂肝病傳脾至肺而死脾病傳腎至肝而死故別於陰者知至所困而死也是故風者百病之長也此復言外因之邪亦逆傳於所勝而死是故者承上文之別於陽者而言也風為陽邪傷人陽氣為百病之長者言四時八方之邪風雖從陽分而入而善行數變乃為他病今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也氣主皮毛風寒之邪始傷陽氣故使人毫毛畢直太陽之氣主表而主開病則反閉而為熱矣言風寒之邪始傷表陽之時可發汗而愈也或痹不仁腫痛當是之時可湯尉及火灸刺而去之氣傷痛形傷腫痹不仁而腫痛者氣傷而病及於形也如在皮腠氣分者可用湯尉在經絡血分者可灸刺而去之弗治病入舍於肺名曰肺痹發咳上氣皮毛者肺之合邪在皮毛弗以汗解則邪氣乃從其合矣夫皮膚氣分為陽五臟為陰病在陽者名曰風病在陰者名曰痹病舍於肺名肺痹也痹者閉也邪閉於肺故咳而上氣弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食當是之時可按若刺耳失而弗治肺即傳其所勝而行之肝病名曰肝痹厥者逆也脅乃肝之分逆於脅下而為痛故一名厥脅痛蓋言痹乃厥逆之痛證也食氣入胃散精於肝肝氣逆故食反出也按者按摩導引也木鬱欲達故可按而導之肝主血故若可刺耳楊元如曰肺痹肝痹者非病在肝肺在肝肺之分耳弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃當此之時可按可藥可浴失而弗治肝因傳之脾病名曰脾風蓋肝乃風木之邪賊傷脾土故名脾風疸火疸也風淫濕土而成熱故濕熱而發疸也濕熱之氣上蒸於心則煩心火熱下淫則溺黃蓋熱在中土而變及於上下也夫病在形身者可按可浴病在內者可藥發疸濕熱發於外也腹中熱煩心出黃熱在內也是以當此之時可按可藥可浴而治之弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱當此之時可按可藥在脾弗治則土邪乘腎病名疝瘕邪聚下焦故少腹冤熱而痛溲出淫濁也蠱者言其陰邪居下而壞事之極也弗治腎傳之心病筋脈相引而急病名曰瘈當此之時可灸可藥弗治滿十日法當死瘈音翅靈樞經曰心脈急甚為瘈瘲蓋心主血脈而屬火火熱盛則筋脈燥縮而手足拘急也當此危急之證尚可灸可藥言不可以其危篤而棄之也失而弗治滿十日法當死五傳巳周當盡十干而死矣腎因傳之心心即復反傳而行之肺發寒熱法當三歲死此病之次也心主神明而多不受邪如腎傳之心心不受邪則反傳之肺是從肺而再傳矣邪復出於皮膚絡脈之間陰陽氣血相乘是以發往來之寒熱法當至三歲而死蓋心不受邪而復傳故又有三年之久此邪病復傳之次第也夫瘕痹之病不即傳行而亦不即速死是初傳而死者法當三歲如心不受邪而復再傳者是又當三歲矣所謂若三歲若六歲也夫病發於五臟之陰者若三月若六月若三日若六日病發於五臟之陽者若三歲若六歲所謂其生五其數三是五臟之氣生於五行而終於三數三而兩之則又為六數矣莫子晉曰此注與診要經終之義大略相同然其卒發者不必治其傳卒發者即仲景傷寒論之中風傷寒卒病三陰三陽之氣一時寒熱交作氣脈不通與病形藏之傳邪而為瘕痹之證者不同故不必以病傳之法治之或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣風則傷衛寒則傷榮榮衛內陷臟氣逆傳而五臟相移亦皆有次設不以次入者此又因五志內傷故令不得以次相傳致令人有大病矣張兆璜曰奇恆之病本於厥逆五臟逆傳其所勝一逆也風寒外客而致五臟內傳二逆也五志相乘三逆也故曰傳乘之名也謂一臟受乘而傳化於五臟亦傳其所勝與乘之名類相同因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣此其道也故病有五五五二十五變及其傳化傳乘之名也肝當作肺肺當作肝悲當作思喜為心志喜大則傷心如外因於邪始傷皮毛內舍於肺肺因傳之肝肝傳之脾脾傳之腎其間因而喜大則心氣虛而腎氣乘於心矣怒則肝氣傷而肺氣乘於肝矣思則脾氣傷而肝氣乘於脾矣恐則腎氣傷而脾氣乘於腎矣憂則肺氣傷而心氣乘於肺矣如一臟虛而受乘即相傳之五臟故病有五五臟有五變及其傳化則五五有二十五變矣如喜大而腎氣乘心心即傳之肺肺傳之肝肝傳之脾脾傳之腎是五臟傳化亦各乘其所勝故曰傳者乘之名也大骨枯稿大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見乃豫之期日此復申明五志內傷亦各傳其所勝察其形證審其臟脈而知死生之期也夫氣血發原於腎生於胃而輸於脾回則不轉而無相生之機是以大骨枯稿大肉陷下而令人有大病也大骨兩臂兩腿之骨大肉即兩臂腿之肉蓋腎主骨而脾胃主肌肉四肢也夫胃氣之資養於五臟者宗氣也宗氣積於胸中從虛里之大絡貫於十二經脈經脈逆行是以胸中氣滿陽明氣厥故喘息不便也其氣動形者心病而欲傳之於肺肺主氣故氣盛而呼吸動形也期以六月死者今心始傳於肺肺傳之肝肝傳之脾脾傳之腎而後死故有六月之久也真臟脈見堅而搏如循薏苡子纍纍然豫與同豫之期日者當死於壬癸日之中夜也大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟見乃豫之期日此言肝病至肺而死也內痛者肺受其傷肺之俞在肩背故痛引肩項也肝病而已傳及於所勝之臟故當期以本月之內而死也真臟脈見如循刀刃責責然如按琴瑟弦豫之期日當死於庚辛日之薄暮也大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十日之內死此言肺病至心而死肺病故痛引肩背傳及於心故身熱也夫心主血而生於腎藏之精血氣盛則充膚熱肉心腎傷而精血衰故曰脫肉破䐃破䐃脫肉也䐃音窘肉之標也真臟脈見大而虛如羽毛中人膚病傳於心故期以十日之內死蓋心不受邪故死之速也莫子晉曰天之十干化生五行地之五行化生五臟心乃君主之官為五臟六腑之主故盡五臟之氣終而死與上節腎傳之心滿十日法當死同義十月者乃傳之誤也大骨枯稿大肉陷下肩髓內消動作益衰真臟來見期一歲死見其真臟乃豫之期日此言脾病而終於一歲也脾主為胃行其津液津液者淖澤注於骨補益腦髓脾病而津液不行故肩髓先內消也肩髓者大椎之骨髓上會於腦是以項骨傾者死不治也脾主四肢脾病則四肢懈惰故動作益衰真臟來見者如水之流如烏之喙脾土王於四時脾氣灌於四臟故雖有真臟來見尚期有一歲之久蓋以四時五臟之氣終而後死也期死之月見其真臟之乍數乍疏乃與之期日謂當死於甲乙之昧旦也大骨枯稿大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫肉目眶陷真臟見目不見人立死其見人者至其所不勝之時則死此腎病而死於脾也本經曰腎病者大小腹痛腎傳之心故心中不便心傳之肺肺傳之肝故肩項身熱肝傳之脾故目眶陷也真臟脈見搏而絶如指彈石辟辟然如目不見人腎之精氣已絶故立死其見人者餘氣未盡至所不勝之時而死謂當死於日昃也夫腎為生氣之原生氣絶於下故死之更速也急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮溺不可為期此言卒發者不必治其傳也夫邪氣勝者精氣虛風寒之邪卒中於身精氣一時虛奪故急虛也此病三陰三陽之氣而不病於有形故五臟之氣一時絶閉脈道一時不通而氣不往來譬若墮溺乃倉卒一時之病而生死亦在於時日之間與風寒之病形臟勿治而為肺痹勿治而傳之肝肝傳之脾脾傳之腎腎傳之心期以三歲六歲死者不相同也故不可以為期其脈絶不來若人一息五六至其形肉不脫真臟雖不見猶死也此復言倉卒之病非但不可為期並不待形肉脫而真臟見也脈絶不來生氣絶於內也一息五六至邪氣盛於外也此邪氣盛而正氣絶不必真臟見而猶死也真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以羽毛中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死諸真臟脈見者皆死不治也此審別真臟之脈象乃可豫之期日也如循刀刃如按琴瑟弦肝木之象也如薏苡子如彈石心腎之象也皆堅徑之極而無柔和之氣也乍數乍疏欲灌不能脾氣欲絶之象也如羽毛中人膚肺氣虛散之象也蓋堅徑虛散皆不得胃氣之中和人無胃氣則死矣色青白不澤赤黑不澤皆兼克賊所勝之色色生於血脈氣將絶故不澤也夫脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精而後行氣於臟腑是臟腑之氣欲絶而毛必折焦也靈樞經曰血獨盛則淡滲皮膚生毫毛又曰經脈空虛血氣弱枯腸胃聶闢皮膚薄著毛腠夭焦豫之死期是皮毛夭折者血氣先絶也黃帝曰見真臟曰死何也岐伯曰五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自為而至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死帝曰善五臟之氣皆胃腑水穀之所資生故胃為五臟之本手太陰者兩脈口也臟氣者五臟之精氣也五臟之氣必因於胃氣乃至於手太陰也又非惟微和之為胃氣也即五臟之弦鉤毛石各以其時自為其象而至於手太陰者皆胃氣之所資生故邪氣勝者五臟之精氣已衰而不能為弦鉤毛石之象矣如令人有大病而病甚者胃氣絶而真臟見真臟見者病氣勝而臟氣絶也黃帝曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時帝以伯所言之五臟乘傳有淺有深而胃氣不資有虛有絶故當察其形氣色脈治病者宜急治之無後其時而致於死不治也張兆璜曰此總結上文而為審治之法言有五臟逆傳風寒久客之故病有急虛卒發之新病五臟得胃氣而有春弦夏鉤之神氣有春得肺脈夏得腎脈之逆乘故當審其形氣色脈以治之形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時形氣相得病之新也色澤以浮乘逆淺也脈從四時者五臟各以其時自為而至於手太陰也脈弱以滑者胃氣能與之俱至於手太陰也察此四易當急治之而無後其時取之以時者春刺散俞夏刺絡俞秋刺皮膚冬刺俞竅也形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之形氣相失病之久也色夭不澤乘傳深也脈實以堅無胃氣也脈逆四時克賊勝也察此四難而明告其病者焉所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時春得肺脈夏得腎脈者藏精衰而所不勝乘之也其至皆懸絶沉澀者無胃氣之資生也未有臟形於春夏而脈沉澀秋冬而脈浮大名曰逆四時也夫五臟各以其時自為而至於手太陰者藏真之神氣也如未有弦鉤毛石之象形而升降浮沉之氣不可逆蓋氣順則脈順氣逆則脈逆脈隨氣行者也病熱脈靜泄而脈大脫血而脈實病在中脈實堅病在外脈不實堅者皆難治脈病不相應者病勝臟也故皆為難治黃帝曰余聞虛實以決死生願聞其情岐伯曰五實死五虛死實者謂邪氣實虛者謂正氣虛啓玄子曰五實謂五臟之實五虛謂五臟之虛楊元如曰實者謂卒發之病虛者急虛也帝曰願聞五實五虛岐伯曰脈盛皮熱腹脹前後不通悶瞀此謂五實瞀音茂心主脈脈盛心氣實也肺主皮毛皮熱肺氣實也脾主腹腹脹脾氣實也腎開竅於二陰前後不通腎氣實也瞀目不明也肝開竅於目悶瞀肝氣實也脈細皮寒氣少泄利前後飲食不入此謂五虛脈細心氣虛也皮寒肺氣虛也肝主春生之氣氣少肝氣虛也泄利前後腎氣虛也飲食不入脾氣虛也蓋邪之所腠其正必虛是以邪氣盛者死正氣虛者亦死也帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也五臟之氣皆由胃氣之所資生漿粥入胃泄注止胃氣復也身汗外實之邪從表散也得後利裡實之邪從下出也此言卒發之病而有死有生也按此篇論藏真之神合於四時五行次序環轉如回則不轉乃失其機逆傳於所勝而死至於外感風寒內傷五志亦各乘其所勝學者當分作四段看然又當與玉板論方盛衰論病能論疏五過論諸篇合參
