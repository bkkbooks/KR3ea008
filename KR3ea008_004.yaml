body:
  text: 卷四三部九候論篇第二十黃帝問曰余聞九針於夫子衆多博大不可勝數余願聞要道以屬子孫傳之後世著之骨髓藏之肝肺歃血而受不敢妄泄離合真邪論曰余聞九針九篇夫子乃因而九之九九八十一篇余盡通其意矣此蓋言先立針經八十一篇論九針之道然衆多博大不可勝數故願聞要道要道者以神藏五合形藏四以應九候也故曰著之骨髓者藏之深隧也藏之肝肺者知血氣之診也歃血而受者藏之於心也不敢妄泄者藏之於中也蓋必先定五臟之神而後知死生之分察病之所在以調其虛實故曰凡刺之真必先治神五臟已定九候已備後乃存針令合天道必有終始上應天光星辰曆紀下副四時五行貴賤更互冬陰夏陽以人應之奈何願聞其方岐伯對曰妙乎哉問也此天地之至數此篇首論九針九候之道九針者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野夫聖人之起天地之數也一而九之故以立九野九而九之九九八十一以起黃鐘數焉以針應數也一者天也天者陽也五臟之應天者肺肺者五臟六腑之蓋也皮者肺之合也人之陽也二者地也人之所以應土者肉也三者人也人之所以成生者血脈也四者時也時者四時八風之氣也五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏也六者律也律者調陰陽四時而合於十二經脈也七者星也星者人之七竅也八者風也風者人之股肱八節八正之虛風八風之邪舍於骨節腠理之間也九者野也野者人之節解皮膚之間也此天地之至數上應天光星辰曆紀下副四時五行中合人之九臟九竅三部九候也貴賤更互者四時五行之氣以王者為貴而相者為賤也冬陰夏陽者下文之所謂沉細懸絶為陰主冬躁盛喘數為陽主夏也帝言九針之道以通其意於針經今願聞簡要之道是以伯答三部九候之法三部九候為之原九針之道不必存矣是以針解篇之人皮應天人肉應地人脈應人人筋應時人聲應音人陰陽合氣應律人齒面目應星人出入氣應風人九竅三百六十五絡應野與靈樞九針論之多有不同蓋靈樞論十二原本經以三部九候為原也帝曰願聞天地之至數合於人形血氣通決死生為之奈何六節藏象論曰夫自古通天者生之本本於陰陽其氣九州九竅皆通乎天氣岐伯曰天地之至數始於一終於九焉始於一終於九者天之數也曰天地之至數者言天包乎地地氣通於天也故曰令合天道一者天二者地三者人因而三之三三者九以應九野一者奇也陽也故應天二者偶也陰也故應地三者參也故應人因三才而三之則為九以應九野九野者九州分野上應天之二十八宿也朱永年曰天以應皮地以應肉人以應血脈一部之中有皮有肉有血脈有合於四時五音六律七星八風九野是為九九八十一也故人有三部部有三候以決死生以處百病以調虛實而除邪疾人有三部部有三候者三而成天三而成地三而成人也決死生者觀其形氣別其陰陽調其血脈察其腑臟以知死生之期也處百病者表裡陰陽寒熱虛實之為病也調虛實者實則瀉之虛則補之也除邪疾者去血脈除邪風也帝曰何謂三部岐伯曰有下部有中部有上部部各有三候三候者有天有地有人也必指而導之乃以為真夫人生於地懸命於天天地合氣命之曰人是以一身之中有三部一部之中而各有天地人不知三部者陰陽不別天地不分以實為虛以邪為真絶人長命豫人夭殃故必捫循三部九候之盛虛而調之乃以為刺法之真上部天兩額之動脈在額兩分上循於頂足太陽膀胱脈也太陽為諸陽主氣故主上部天上部地兩頰之動脈在鼻兩旁近於巨髎之分足陽明胃脈也二陽之氣而主土故為上部地上部人耳前之動脈在耳前麴車下陷中手太陽小腸脈也夫心主血而小腸為之使人之所以生成者血脈也故主上部人此陽氣之在上也朱永年曰天主氣足太陽為諸陽主氣也地應肉足陽明胃土之主肌肉也人主血脈手太陽與少陰相為表裡也中部天手太陰也兩手氣口之動脈手太陰脈也五臟之應天者肺然臟為陰故主中部天徐公遐曰中部天故能主周身之氣中部地手陽明也在大指次指歧骨間合谷之分動應於手手陽明大腸脈也陽明居中土故主中部地中部人手少陰也在鋭骨端之動脈手少陰心脈也三以應人人主血脈心藏血脈之氣故主中部人下部天足厥陰也在毛際外氣衝下五里之分動應於手足厥陰肝脈也厥陰為陰中之少陽主春生之氣故主下部天下部地足少陰也在足內踝後太溪之分動脈應手足少陰腎脈也腎為牝臟而居下故主下部地下部人足太陰也在魚腹上越筋間箕門之分動脈應手足太陰脾脈也脾為陰臟而居中故主下部人故下部之天以候肝地以候腎人以候脾胃之氣此以下部之三候以候膈下之三神臟焉徐公遐問曰上部地以候陽明之氣奚復以下部地而候胃氣耶曰所謂陽明者胃之悍氣上衝於頭循咽上走空竅下客主人合陽明並下人迎此胃氣別走於陽明者也所謂胃氣者乃水穀柔和之氣與陽熱慓悍之氣有別故以下部之脾脈候之細參本經及靈樞傷寒諸經其義自明矣然榮衛氣血皆由胃氣之所資生故復以脾脈兼候胃氣曰脾之本脈亦可候胃氣耶曰脾與胃以膜相運雌雄相應耳是以仲景以胃脈之趺陽而候脾氣岐伯以脾脈之箕門兼候胃氣先聖後聖其揆一也帝曰中部之候奈何岐伯曰亦有天亦有地亦有人天以候肺地以候胸中之氣人以候心肺屬乾金而主氣故天以候肺心主血脈而居肺之下故人以候心胸中膻中也宗氣之所聚也宗氣者陽明水穀之所資生故地以候胸中之氣此以中部之三候以候膈上之二神臟中土之二形臟焉張二中曰地以候胸中之氣者言中部之候亦兼候陽明之胃氣也今始知三部之中而皆有陽明之胃氣焉張兆璜曰太陽之脈下入缺盆絡肺貫膈故以候胸中帝曰上部以何候之岐伯曰亦有天亦有地亦有人天以候頭角之氣地以候口齒之氣人以候耳目之氣太陽為諸陽主氣其經脈上額交巔會於腦出於項故天以候頭角之氣足陽明之氣胃腑之所生也其經脈起於鼻交頝中上入齒中還出挾口環唇下故地以候口齒之氣手太陽者少陰心臟之府也其經脈上目鋭眥入耳中為聽宮故人以候耳目之氣此以膺喉頭首以候三形臟焉蓋陽藏之氣在上也朱永年曰陽明之脈起於鼻交頞中手太陽之脈抵鼻是上部之三候以候耳目口鼻之七竅者也所謂七者星也星者人之七竅也合腰尻下竅共為九竅故曰其氣九州九竅皆通乎天氣按針解篇曰人齒面目應星蓋謂人面有七孔以應七星也三部者各有天各有地各有人三部之中而有九候三而成天三而成地三而成人九候之中而各有三焉三而三之合則為九九分為九野九野為九藏兼三才而三之合則為九九分為九野九野者言身形之應九野也左足應立春左脅應春分左手應立夏膺喉頭首應夏至右手應立秋右脅應秋分右足應立冬腰尻下竅應冬至六腑膈下三臟應中州凡此九者以候臟腑陰陽之氣故九野為九藏按星書立春應天文箕尾分野禹貢冀州之域春分應天文心房分野禹貢徐州之域立夏應天文翼軫分野禹貢荊州之域夏至應天文井鬼分野禹貢雍州之域立秋應天文參井分野禹貢梁州之域秋分應天文奎婁分野禹貢兗州之域立冬應天文危室分野禹貢青州之域冬至應天文鬥牛分野禹貢揚州之域中州應天文張柳分理禹貢豫州之域故以身形應九野九野而合九藏九藏外通九竅九野外合九州而皆通乎天氣是以兼三才而三之為九九之數下經云人生有形不離陰陽天地合氣別為九野分為四時即此義也故神臟五形藏四合為九藏神藏者心藏神肝藏魂肺藏魄脾藏意腎藏志也形藏者胃與大腸小腸膀胱藏有形之物也夫五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生是五臟之神由腸胃津液之所生也胃主化水穀之津液大腸主津小腸主液膀胱者津液之所藏故以四腑為形臟而人之陰陽氣血肌肉經脈皆由此九藏之所生也五臟已敗其色必夭夭必死矣夭死色也言五臟之神氣由形藏之資生五色之外榮由五臟之所發此以九藏九候之氣而復歸重於五臟之神氣焉帝曰以候奈何岐伯曰必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去其血脈而後調之無問其病以平為期候者候三部九候之脈而刺之也肥人者血氣充盈膚革堅固其氣澀以遲刺此者宜深而留之瘦人者皮薄色少血清氣滑易脫於氣易損於血刺此者宜淺而疾之實者邪氣盛也虛者精氣奪也宜瀉者迎而奪之宜補者追而濟之去血脈者除菀陳也蓋凡治病必先去其血乃去其所苦然後瀉有餘補不足無問其病之可否必候其氣至和平而後乃出其針也帝曰決死生奈何岐伯曰形盛脈細少氣不足以息者危夫形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣形瘦脈大胸中多氣者死針經曰病而形肉脫氣勝形者死形勝氣者危蓋形瘦者正氣衰也脈大者病氣進也胸中多氣者氣勝形也氣勝形者邪氣盛而正氣脫也形氣相得者生天之生命所以立形定氣形氣和平是為相得參伍不調者病此即獨大獨小獨疾獨徐之意此總言其不調者病下節分言之以知病之所在三部九候皆相失者死皆相失者非止於參伍不調矣此臟腑陰陽之氣皆病故死上下左右之脈相應如參舂者病甚夫脈之來去隨氣降升是以九候之相應上下若一如參舂者言脈之上至下去左至右去有如舂者之參差彼上而此下也此因邪病甚而正為邪傷故也上下左右相失不可數者死如參舂者只言其來去之參差相失不可數者並其至數之錯亂此邪病更甚而正氣將脫故死中部之候雖獨調與衆臟相失者死中部天主氣中部人主血中部地主胸中之宗氣夫上下左右之脈交相應者血氣之循環也臟腑之脈得胃氣而至於手太陰者宗氣之所通也如中部之候雖獨調與衆藏相失者不得中焦之血氣以資養故死中部之候相減者死上節論失其旋轉相生之機此言中焦之生原化薄目內陷者死目者五臟六腑之精也上節言中焦之根本衰微此復言臟腑之精氣消滅帝曰何以知病之所在岐伯曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病夫九候之相應也上下若一不得相失如一部獨異即知病之所在而隨證治之大小者脈之體象也疾遲者脈之氣數也寒熱者三部皮膚之寒熱也陷下者沉陷而不起也針經曰上下左右知其寒溫何經所在審皮膚之寒溫滑澀知其所苦以左手足上上去踝五寸按之庶右手足當踝而彈之此候生陽之氣以知病之死生也諸陽氣者太陽之所主也根結篇曰太陽為開開折則肉節瀆而暴病起矣故暴病者取之足太陽視有餘不足瀆者皮膚宛焦而弱也是以知病之所在而又當候太陽之氣焉衛氣篇曰足太陽之本在跟上五寸中而氣在脛者止之於氣街與承山踝上以下必先按而在久應於手乃刺而豫之按承山乃足太陽穴在外踝上七寸故以左手於病者足上上去踝五寸按之是在承山之以下矣庶右手於病者足上當踝而彈之蓋以左手取脈庶右手得以在下而彈其應過五寸以上蠕蠕然者不病是更過踝上五寸而及於承山矣故曰踝上以下必先按而在久踝上者謂去踝五寸以上而及於承山以下者謂承山以下而至去踝五寸之間蓋以左手之三指於踝上五寸承山以下以候太陽之氣以察病之死生故下文曰足太陽氣絶者其足不可屈伸死必戴眼蓋九針之要候氣為先足太陽為諸陽主氣也其應過五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病應去聲蠕而宣切蠕蠕微動貌氣之和也其應疾而中手渾渾然者急疾而太過也徐徐然者氣之不及也故皆主病其應上不能至五寸彈之不應者死生氣絶於下故不能上應也是以脫肉身不去者死是以者承上文而言脫肉者皮肉宛焦而弱也身不去者開折而暴病留於身也言正氣虛而肉脫邪留於身而不去者死也中部乍疏乍數者死太陽之氣者論先天之少陽榮衛氣血者乃後天水穀之精氣中部乍數乍疏者中焦之生氣欲絶也其脈代而鉤者病在絡脈夫血脈生於心而輸於脾代乃脾脈鉤乃心脈此復申明候足上中部者候中下二焦之生氣如病在絡脈者其脈代而鉤也九候之相應也上下若一不得相失一候後則病二候後則病甚三候後則病危所謂後者應不俱也夫人生有形不離陰陽天地合氣別為九野是以九候之相應也上下若一不得相失一候不應是天地人之氣失其一矣故主病二候後不應是三部之中失其二矣故主病甚三候後不應是三者皆失故主病危察其腑臟以知死生之期腑為陽臟為陰知陽者知病之所從來知陰者知死生之期必先知經脈然後知病脈知經脈之死生出入而後知病脈之所從來詳經脈別論真臟脈見者勝死真臟脈見者至其所勝克之日時而死足太陽氣絶者其足不可屈伸死必戴眼此復結上文其應上不能至五寸彈之不應者足太陽之氣絶也足太陽主筋陽氣者柔則養筋是以太陽氣絶筋攣急而足不可屈伸太陽之脈起於目內眥為目上剛脈系絶故死必戴眼張二中雲足不可屈伸太陽之氣絶也死必戴眼太陽之脈絶也帝曰冬陰夏陽奈何岐伯曰九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死此復問冬陰夏陽以人應之奈何按九針論曰五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏蓋言冬至之子陰之極也陰極而一陽初生陰氣始下夏至之午陽之極也陽極而一陰初生陽氣始下是陰陽之氣分於子午也至春分之時陽氣直上陰氣直下秋分之時陰氣直上陽氣直下是陰陽離別也寒熱者陰陽之氣也陰陽分別而復有交合故寒與熱爭而兩氣相搏也此言三部九候之中有天地陰陽四時五行之氣若九候之脈皆沉細而絶無陽氣之和此為陰而主冬故死於夜半之子如盛躁喘數而無陰氣之和此為陽而主夏故死於日中之午皆陰陽偏絶之為害也是故寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍疏乍數乍遲乍疾者日乘四季死是故者承上文而言也寒熱病者陰陽相乘而為寒為熱也本經云因於露風乃生寒熱病風者亦為寒熱病也平旦日夕系陰陽兩分之時寒熱者乃陰陽兩傷之病是以應時而死熱中熱病者陽盛之極故死於日中之午病水者陰寒之邪故死於夜半之中土位中央王於四季其脈乍疏乍數乍疾乍遲乃土氣敗而不能灌溉四臟故死於辰戌丑未之時也形肉已脫九候雖調猶死形歸氣氣生形形氣已敗血脈雖調猶死意言七診之死因氣而見於脈非血脈之為病也故下文云其脈候亦敗者死七診雖見九候皆從者不死七診者謂沉細懸絶盛躁喘數寒熱熱中病風病水土絶於四季也九候皆從者謂上下若一無獨大獨小也所言不死者風氣之病及經月之病似七診之病而非也故言不死此言七診者乃陰陽之氣自相分離是以應時而死若因邪病而有似乎七診者不死也風氣之病病風也病風而陰陽相離期以日夕死如病風而陰陽和平九候若一不死也經月之病病水也病水而沉細懸絶期以夜半死病水而陰陽和平九候皆從不死也蓋言七診之死死於陰陽分離不因邪病而有應時之死也若有七診之病其脈候亦敗者死矣必發噦噫此復申明七診之病以脈候為憑蓋脈者病氣之見胃不輸精故胃敗而其脈亦敗者病氣而脈亦從之俱病也脈病則其胃敗者其聲噦胃氣逆而上也逆則九候必絶將死之脈也必審問其所始病與今之所方病而後各切循其脈視其經絡浮沉以上下逆從循之始病者病久而深也方病者新受之邪病之淺也各切循其脈者切其病之在陰在陽在臟在脈也夫病久者其脈沉而逆方病者其脈從而浮故當視其經絡浮沉以上下之逆從循之其脈疾者不病其脈遲者病脈不往來者死皮膚著者死夫邪傷經脈則脈數疾故其脈疾者知不病在七診也陰陽臟氣受傷則其脈遲故脈遲者知其病在七診也脈不往來者有七診之病而脈候亦敗也皮膚著者病久而肉脫也根結篇曰皮膚薄著毛腠夭焦豫之期死此言方病而傷於形身經絡者不死病久而傷五臟陰陽之氣者死故曰經病者治其經孫絡病者治其孫絡血若五臟陰陽之氣已絶於內而欲以針石治其外者未之有也帝曰其可治者奈何岐伯曰經病者治其經孫絡病者治其孫絡血靈樞經曰經脈為里支而橫者為絡絡之別者為孫絡言病在經者刺其經病在孫絡者去其孫絡血蓋病在孫絡其邪更淺故當出其血而瀉之血病身有痛者治其經絡血病者邪傳舍於絡脈在絡之時痛於肌肉故身有痛也蓋言病在經之深者治其經病在孫絡之淺者治其孫絡病在經絡淺深之間而痛及於肌肉者治其經與絡也其病者在奇邪奇邪之脈則繆刺之奇邪者邪不入於經流溢於大絡而生奇病也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞故宜繆刺之繆刺者以左取右以右取左也留瘦不移節而刺之留瘦不移者留淫日深著於骨髓故即於節而刺之蓋病在脈絡者取之脈病在骨節者治其節也上實下虛切而從之索其結絡脈刺出其血以見通之刺節真邪篇曰大經調者謂之不病雖病謂之自已也一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之此所謂解結也是以上實下虛者有橫絡盛加於經以致上下不通而有盛實也切而從之者切其某經之所阻而從治之也索其結絡者索其橫絡之結而刺出其血以見通之者視而瀉之也以上言病在經脈者為可治也瞳子高者太陽不足戴眼者太陽已絶此決死生之要不可不察也夫九針九候之道貴在神與氣心藏神而為陽中之太陽腎為生氣之原而膀胱為之表裡是以獨候手足之太陽者太陽主諸陽之氣也瞳子高者乃太陽之神氣不足蓋手太陽之脈上頰至敗者其音嘶手指及手外踝上五指留針此復申明瞳子高者太陽不足於上也手太陽之脈起於小指之端循手外側上腕出踝中外踝上者在手外側踝上也五趾者第五之小指也言太陽不足當於手指及外踝上之後溪五趾之少澤上留針以補之蓋候足太陽之氣者於足上去踝五寸而彈之補手太陽者當於手外踝上五趾而取之此手足之經氣交相貫通先不足於上而後絶於下也張二中曰瀉者出血補者留針經脈別論篇第二十一言經脈病脈之各有分別黃帝問曰人之居處動靜勇怯脈亦為之變乎按三部九候論至血氣形志篇與靈樞之九針論前後相符只此篇與臟氣發時論少有異別然此篇章旨乃九候論之所謂必先知經脈然後知病脈臟氣法時論章旨乃九候論之所謂察其腑臟以知死生之期蓋九針九篇九九八十一篇論在靈樞經內此復論三部九候之法故必先知經脈生始之原而後知九候之病脈知五臟生克之理而後知死生之期故設此二問岐伯對曰凡人之驚恐恚勞動靜皆為變也言人之居處安靜其氣和平自有經常之脈如動作過用則變而為病脈矣是以夜行則喘出於腎淫氣病肺腎屬亥子而氣主閉藏夜行則腎氣外泄故喘出於腎腎為本肺為末腎氣上逆故淫傷於肺也夫喘屬肺證又曰陽明厥則喘汗出於肺主之皮毛而生於胃腑之津液此章首論喘次論汗者言經脈榮衛生於胃腑水穀之津而通會於肺氣是有經常之理如勞動過傷則五臟氣逆而脈亦為之變故先論其變而後論其常焉有所墮恐喘出於肝淫氣害脾墮則傷筋筋即為肝故喘出於肝木勝土故淫氣害脾有所驚恐喘出於肺淫氣傷心驚則氣亂故喘出於肺肺者心之蓋故淫氣傷心度水跌僕喘出於腎與骨跌則傷骨骨即為腎故喘出焉徐公遐曰腎生骨髓髓生肝骨者腎之精氣所注末言骨者則五臟之生氣可類推之當是之時勇者氣行則已怯者則著而為病也言此數者皆傷五臟之氣勇者逆氣已過正氣復順怯者則留著為病而見病脈矣故曰診病之道觀人勇怯骨肉皮膚能知其情以為診法也夫氣有勇怯理有疏密皮膚有厚薄骨肉有堅脆能知其情以為診法之要故飲食飽甚汗出於胃汗者水穀之津液飽甚則胃滿故汗出焉驚而奪精汗出於心血乃心之精汗乃血之液驚傷心氣汗出於心故曰奪精經云奪汗者無血持重遠行汗出於腎持重遠行則傷骨故汗出於腎疾走恐懼汗出於肝疲罷傷筋故汗出於肝搖體勞苦汗出於脾勞傷四體故汗出於脾故春秋冬夏四時陰陽生病起於過用此為常也四時陰陽自有經常血氣循行各有調理如動作過傷則血氣妄逆而生病此自然之理也口問篇曰百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破散經絡厥絶脈道不通陰陽相逆衛氣稽留經脈空虛血氣不次乃失其常是以驚恐恚勞動作飲食以致喘汗出者皆使氣血不次脈道失常故欲知經度之循行先識變常之逆氣徐公遐曰喘汗之證乃經氣逆行故首提曰脈亦為之變又曰能知其情以為診法食氣入胃散精於肝淫氣於筋肝者土之勝制則生化故散精於肝肝者筋其應故淫氣於筋經曰谷入於胃脈道乃通血氣乃行是榮衛氣血皆水穀之所資生而水穀入胃各有淫散輸轉之道故又必先知經脈生始之原而後知病脈也食氣入胃濁氣歸心淫精於脈經曰受谷者濁胃之食氣故曰濁氣胃絡上通於心故入胃之食氣歸於心子令母實也心氣通於脈故淫精於脈伯高曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出而行榮衛之道其大氣之搏而不行者積於胸中命曰氣海出於肺循喉嚨而司呼吸又曰谷入於胃乃傳之肺五臟六腑皆以受氣所謂先出於胃之兩焦者入胃之穀氣先下淫於腑上歸於心肺以養五臟氣此章論經脈之道由水穀之精以養腑臟腑臟之精淫於經脈氣口成寸以決死生所謂五臟皆稟氣於胃而至於手太陰也其別出兩行之榮衛與宗氣又當別論同志者當細玩諸經體認明白脈氣流經經氣歸於肺肺朝百脈輸精於皮毛脈氣者水穀之精氣而行於經脈中也經大經也言入胃之穀氣先淫氣於脈百脈之經氣總歸於大經經氣歸於肺是以百脈之氣皆朝會於肺也肺會皮毛故復輸精於皮毛毛脈合精行氣於腑經云血獨盛則淡滲皮膚生毫毛夫皮膚主氣經脈主血毛脈合精者血氣相合也六腑為陽故先受氣張兆璜曰淡滲皮毛之血與經脈之血相合故曰毛脈合精腑精神明留於四臟腑精神明者六腑之津液相成而神乃自生也穀氣入胃淫精於脈乃傳之肺肺氣散精行氣於腑腑精留於四臟以養五臟之氣故曰谷入於胃乃傳之肺五臟六腑皆以受氣氣歸於權衡權衡以平氣口成寸以決死生權衡平也言脈之浮沉出入陰陽和平故曰權衡以平氣口手太陰之兩脈口成寸者分尺為寸也言五臟六腑受氣於谷浮精於脈變見於氣口以決其死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行入胃之飲精氣上輸於脾脾氣散精上歸於肺蓋脾主為胃行其津液者也肺應天而主氣故能通調水道而下輸膀胱所謂地氣升而為云天氣降而為雨也水精四布者氣化則水行故四布於皮毛五經並行者通灌於五臟之經脈也平脈篇曰谷入於胃脈道乃行水入於經其血乃成故先論食而後論其飲焉合於四時五臟陰陽揆度以為常也五臟五行之氣也揆度度數也總結上文而言經脈之道合於四時五行之次序陰陽出入之度數以為經脈之經常太陽臟獨至厥喘虛氣逆是陰不足陽有餘也表裡當俱瀉取之下俞此言臟腑經脈有陰陽相合之常度如偏陰偏陽之獨至則為厥喘諸病所謂先知經脈今識病脈也太陽臟獨至者太陽之經氣獨至而無陰氣之和也陽氣惟上故下厥上喘而虛氣上逆也是陰不足而陽有餘表裡俱當瀉蓋太陽經氣發原於下而上出於膚表故當表裡俱瀉而取之下俞陽明臟獨至是陽氣重並也當瀉陽補陰取之下俞陰陽系日月篇曰寅者正月之生陽也主左足之少陽未者六月主右足之少陽卯者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合於前故曰陽明陽明之獨至是太少重並於陽明陽盛故陰虛矣此言陰陽併合乃經脈之常如陽並於陽陰並於陰則為病脈矣故曰持雌守雄棄陰附陽不知併合診故不明少陽臟獨至是厥氣也蹺前卒大取之下俞少陽主初生之氣生氣厥逆於下以致臟脈之獨大於蹺前也蹺者奇經之蹺脈足少陽經脈在陽蹺之前故蹺前卒大朱衛公曰言蹺前卒大者釋明三陽之脈候足之三陽也蓋生陽之氣皆從下而上由陰而陽故俱取之下俞又申明三陰三陽之候候十二經之本脈也如蹺前少陽之脈卒大而厥陰之動脈微小者是為少陽獨至也所謂太陽少陽太陰少陰者論陰陽之經脈也經脈連於臟腑故曰臟所謂一陽二陽一陰二陰者論三陰三陽之氣也此節論有病經而及於無病之氣者有病氣而及於有形之經者蓋病在經者由臟而經由經而氣病在氣者由氣而經由經而臟也少陽獨至者一陽之過也此申明經氣之各有別也夫一陰一陽分而為三陰三陽三陰三陽合於手足十二經脈十二經脈合於十二臟腑所以藏物故亦名臟也所謂太陽陽明少陽臟獨至者言三陽經脈之獨盛也三陽經脈之獨盛者是三陽氣之太過也太陰臟搏者用心省真五脈氣少胃氣不平三陰也宜治其下俞補陽瀉陰此言三陰三陽之經氣皆有手有足也夫手之太陰足之太陰是為三陰是以太陰之臟脈相搏者須用心省察其為手之太陰足之太陰乎如五脈氣少者手太陰之過也蓋肺朝百脈而輸精於臟腑肺氣搏而不行則五脈之氣皆少是以五脈氣少者知在手之太陰也脾主為胃行其津液脾氣搏而不行是以胃氣不平胃氣不平者知在足之太陰也手之太陰足之太陰而後謂之三陰也足之三陰從足走腹手之三陰從腹走手手足經氣交相貫通故獨取之下俞徐公遐曰此復申明所謂三陰三陽者概手足而言也蓋陰陽之氣皆從下而上故獨取之下俞一陽獨嘯少陽厥也此言經厥而及於氣也夫氣激於喉中而濁謂之言氣激於舌端而清為之嘯蓋氣鬱而欲伸出之一陽之氣獨嘯者蓋因少陽之經氣厥逆也所謂少陽獨至一陽之過者言氣盛而及於經也一陽獨嘯少陽厥者言經逆而及於氣也分而論之有氣有經合而論之經氣之相關也朱衛公曰以太陰開於其間者當知三陰三陽之經氣皆若是也張兆璜曰少陽厥者木火之氣鬱也木鬱之發松吟高山虎嘯岩岫古之善嘯者聽溪中虎聲而瀉之一陽獨嘯之義蓋取諸此與陽並於上四脈爭張氣歸於腎宜治其經絡瀉陽補陰陽並者太陽陽明之氣相併也四脈者太陽之小腸膀胱陽明之胃與大腸即四形藏之脈也四脈爭張以致陽並於上亦經厥而及於氣也腎為生氣之原此三陽之氣虛陷於腎不能與陽相接故宜瀉其陽之絡補其陰之經陰陽平而經氣和矣四脈爭張四形藏之氣盛也氣歸真虛五神藏之氣虛也一陰至厥陰之治也真虛悁心厥氣留薄發為白汗調食和藥治在下俞悁音狷此言經氣逆而病及於臟也一陰者厥陰也是以一陰氣至當厥陰主治而反見臟真之虛心為痠痛蓋厥陰之氣發於命門為心主之包絡厥陰氣逆以至真虛而心痛也厥逆之氣留薄於心下則上迫於肺故發為白汗夫真虛痛心病在內也經氣厥逆病在外也病在內者治以藥食病在外者治以針砭故宜調食和藥治其下俞夫所謂一陽二陽三陽一陰二陰三陰者陰陽之二氣也所謂太陽陽明少陽太陰厥陰少陰者概臟腑經氣而言也人稟天地陰陽之氣而成此形是有有形之臟腑經脈有無形之陰陽六氣也雖然臟不離乎經經不離乎氣氣不離乎臟經氣貫通臟氣併合陰陽出入上下循環是以有論三陽之獨至者有論在手經足經者有論經病而及於氣氣病而及於經者有論陰陽之不相合者有論經氣逆而病及於臟者此皆陰陽之道可合可分書不盡言舉一以櫽十學者當知一經之氣若是則十二經可知能引而伸之進乎技矣厥陰之治謂當足厥陰之經脈主治也此言三陰三陽之氣可合於六經可通於臟腑當與末節合論三陰之氣而各有分別焉帝曰太陽臟何象太陽臟者謂小腸膀胱之經脈也象者效象形容此復論經氣之見於脈者各有別也此言三陰三陽之氣合於十二經而應於脈非氣之行於脈中也故太陽之脈象上三陽之氣盛而浮少陽之脈象上一陽氣之初生也若一陽之氣行於脈中則滑而不實矣此申明陽臟獨至陰臟相搏者乃因氣而見於脈故曰少陽獨至者一陽之過也岐伯曰象三陽而浮也象者像也三陽陽盛之氣也言太陽之臟脈象陽盛之氣而浮也帝曰少陽臟何象岐伯曰象一陽也少陽臟者三焦甲膽之經氣故象一陽初動之生陽一陽臟者滑而不實也所謂一陽二陽者乃三陽之氣也氣應脈外故以脈之浮沉以效象陰陽之氣如在一陽之臟脈則見脈體之滑象矣蓋陽氣搏於脈中其脈則滑陽欲外浮故不實也此反結上文而言一陽之臟脈與一陽之氣見於脈者之不同也帝曰陽明臟何象岐伯曰象大浮也陽明臟者胃與大腸之經脈也陽明者兩陽合明陽氣合併則陽熱盛故其象大浮象大浮者二陽之氣也太陰臟搏言伏鼓也二陰搏至腎沉不浮也此復結陰臟之經脈與陰氣之見於脈者之不同也太陰臟搏者乃太陰之經脈相搏故見脈象之伏鼓如二陰之氣相搏以至於少陰之腎只見乎沉而不浮蓋以脈象之浮沉以別陰陽之氣以脈體之滑動不實鼓動而伏以別陰陽之脈也此篇論欲識病脈先知經脈然欲知經脈又當體析其經與氣焉藏氣法時論篇第二十二黃帝問曰合人形以法四時五行而治何如而從何如而逆得失之意願聞其事此承上章而復問也經脈篇曰合於四時五臟陰陽揆度以為經脈之常故帝以臟腑陰陽合於人形法於四時五行而為救治之法何如而從何如而逆反逆為從謂之得反順為逆謂之失張兆璜曰合人形者以臟腑陰陽合於九竅九候岐伯對曰五行者金木水火土也更貴更賤以知死生以決成敗而定五臟之氣間甚之時死生之期也此篇論察其腑臟而知死生之期然須法於四時五行生剋之順逆而後死生可必故曰五行者金木水火土也言天之十干四時地之五穀五味人之五臟五氣皆合於此五者以此五者而合參之則成敗死生可決矣更貴更賤者貴賤更互也間者持愈之時甚者加甚之時也帝曰願卒聞之卒盡也岐伯曰肝主春肝主春木之氣足厥陰少陽主治足厥陰主乙木足少陽主甲木二者相為表裡而主治其經氣其日甲乙甲為陽木乙為陰木在時為春在日主甲乙肝苦急急食甘以緩之肝主春生怒發之氣故苦於太過之急宜食甘以緩之心主夏心主夏火之氣手少陰太陽主治手少陰主丁火手太陽主丙火二者相為表裡而主治其經氣其日丙丁丙為陽火丁為陰火在時主夏在日為丙丁心苦緩急食酸以收之吳氏曰心以長養為令志喜而緩緩則心氣散逸自傷其神矣急宜食酸以收之脾主長夏長夏六月也謂火土相生之時足太陰陽明主治足太陰主己土足陽明主戊土二經相為表裡而主治其經氣其日戊己戊為陽土己為陰土位居中央脾苦濕急食苦以燥之脾屬陰土喜燥惡濕苦乃火味故宜食苦以燥之張二中曰喜燥者喜母氣以資生苦濕者惡所勝之乘侮肺主秋主秋金之令手太陰陽明主治手太陰主辛金手陽明主庚金二經相為表裡而主治經氣其日庚辛庚為陽金辛為陰金在時主秋在日主庚辛肺苦氣上逆急食苦以泄之肺主收降之令故苦氣上逆宜食苦以泄下之腎主冬主冬水之令足少陰太陽主治足少陰主癸水足太陽主壬水二經相為表裡而主治經氣其日壬癸壬屬陽水癸屬陰水在時主冬在日為壬癸腎苦燥急食辛以潤之開腠理致津液通氣也腎者水臟喜潤而惡燥宜食辛以潤之謂辛能開腠理使津液行而能通氣故潤以上論五臟之本氣而合於四時五行五味也病在肝愈於夏此論邪氣之客於身而病在五臟者亦合於四時五行而有間甚之時日也病在肝愈於夏者子制其鬼賊而能令母實也夏不愈甚於秋子休而賊旺至其所不勝而甚也秋不死持於冬賊氣休而得母氣之養至其所生而持也起於春自得其位故復起也此論死生之月節也餘臟仿此禁當風風氣通於肝故禁而弗犯肝病者愈在丙丁至其所生而愈也丙丁不愈加於庚辛金剋木也庚辛不死持於壬癸得母氣之所生而持起於甲乙本氣復旺而起此論死生之期日也肝病者平旦慧下晡甚夜半靜平旦乃木氣生旺之時故爽慧下晡乃金旺之時故病甚夜半得母之生氣故安靜此論間甚之時也肝欲散急食辛以散之肝氣受邪則木鬱而欲散故急食辛以散之用辛補之酸瀉之按歲運厥陰之勝以酸瀉之少陰之勝以甘瀉之太陰之勝以苦瀉之又曰木位之主其瀉以酸其補以辛火位之主其瀉以咸其補以咸土位之主其瀉以苦其補以甘金位之主其瀉以辛其補以酸水位之主其瀉以甘其補以苦五味陰陽之用辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也夫肝病者厥陰之勝也邪盛則正虛故以辛之發散以散其木鬱以辛之潤以補其肝氣以酸之泄以瀉其有餘所謂以所利而行之調其氣使其平也餘臟準此病在心愈在長夏長夏不愈甚於冬冬不死持於春起於夏不死則能持能持則能愈矣禁溫食熱衣心惡熱也心病者愈在戊己戊己不愈加於壬癸壬癸不死持於甲乙起於丙丁當愈不愈故有所加值死不死故有所起心病者日中慧夜半甚平旦靜靈樞經曰春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬故自得其位而慧至其所不勝而甚至其所生而靜也心欲耎急食鹹以耎之耎葉軟心為火臟心病則剛燥矣故宜食鹹以耎之用鹹補之甘瀉之鹹味下泄上湧而從水化能泄心氣以下交湧水氣以上濟水火既濟則心氣自益火欲炎散以甘之發散而瀉之病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏禁溫食飽食濕地濡衣胃欲清飲故禁溫食飽食傷脾故禁飽食脾屬陰土而惡濕故濕地濡衣咸宜禁之脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊己天之十干化生地之五行地之五行化生人之五臟生於地懸命於天是以生於五行而歸命於十干也脾病者日昳慧日出甚下晡靜昳音迭昳日昃也應長夏之時故慧日出乃木旺之時故甚下晡乃申酉之分應秋金之令故靜脾欲緩急食甘以緩之土德和厚故欲緩病則失其中和之氣矣故宜食甘以緩之用苦瀉之甘補之脾病則土鬱矣故用苦味之湧泄以瀉奪之以甘之緩補之金匱要略曰五臟病各有所得者愈五臟病各有所惡各隨其所不喜者為病是以順其所欲之味為補也病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋禁寒飲食寒衣形寒飲冷則傷肺故皆禁之肺病者愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛始病則以歲月期之病重則以旬日期之垂死則以旦暮計之肺病者下晡慧日中甚夜半靜一日一夜五分之而各有生克間甚之時肺欲收急食酸以收之肺主秋收之令病則反其常矣故急食酸以收之用酸補之辛瀉之用酸收以補正辛散以瀉邪病在腎愈於春春不愈甚於長夏長夏不死持於秋起於冬禁犯焠㶼熱食溫炙衣焠音翠㶼音埃焠㶼瀑漬之熱食也溫炙衣烘焙之熱衣也腎惡燥故禁犯之腎病者愈在甲乙甲乙不愈甚於戊己戊己不死持於庚辛起於壬癸在四臟曰加者言所勝之氣加於我而使病加之是客勝也在腎臟曰甚於戊己乃至其所不勝而甚是主弱也本經凡論五臟多不一其辭蓋陰陽之道推之無窮腎病者夜半慧四季甚下晡靜四季辰戌丑未時也腎病者水王則慧土王則甚金王則靜腎欲堅急食苦以堅之腎體沉石德性堅凝病則失其常矣故宜食苦以堅之用苦補之咸瀉之用苦堅以補之咸泄以瀉之以上論五臟之病而宜於藥食者五味各有所宜夫邪氣之客於身也以勝相加邪氣者風寒暑濕外淫之邪也以勝相加者如肝病加於庚辛心病加於子癸所勝之氣加臨而病益重也至其所生而愈如肝病者愈於夏心病者愈於壬癸得所生之子氣而愈也至其所不勝而甚謂值其克賊之時而病益甚也至於所生而持得所生之母氣而能支持也自得其位而起位者本經所謂木位火位之類值本氣自旺之時故能復起而愈也必先定五臟之脈乃可言間甚之時死生之期也言必先定五臟之經脈知五臟之病脈乃可言病之間甚死生之期肝病者兩脅下痛引少腹令人善怒病者邪氣實也肝脈布脅肋抵少腹故兩脅下痛引少腹靈樞經曰肝氣實則怒蓋肝為將軍之官而志怒肝氣鬱而不舒故怒也虛則目䀮䀮無所見耳無所聞善恐如人將捕之䀮音荒虛者精氣奪也䀮不明也肝藏血而開竅於目肝虛故䀮䀮無所見少陽經脈入耳中故無所聞膽病者心下淡淡如人將捕之取其經厥陰與少陽經謂經脈也足少陽與厥陰為表裡故取二經以通其氣氣逆則頭痛耳聾不聰頰腫取血者厥陰與督脈會於巔肝氣逆故頭痛少陽氣逆故耳不聰而頰腫也取血者謂取其經之多血者而去之蓋足少陽與厥陰為表裡少陽常少血多氣厥陰常多血少氣臟腑經氣相通宜從厥陰之多血者而瀉之心病者胸中痛脅支滿脅下痛膺背肩甲間痛兩臂內痛手少陰心脈起心中上挾咽出脅下循臑內下肘中循臂內後廉手少陽小腸脈上手臂循臑內出肩解繞肩胛二經氣實故有是痛脅支滿者少陰之支絡滿痛於脅下也虛則胸腹大脅下與腰相引而痛心火氣虛則水濁上乘故胸腹大經云濁氣在上則生䐜脹心氣不能交於陰故脅下與陰相引而痛也取其經少陰太陽舌下血者心脈上循咽喉開竅於舌故取舌下血者蓋手足陰陽所苦必先去其血乃去其所苦然後瀉有餘補不足其變病刺郤中血者設有變病而邪不在經絡者亦取其郤中出血蓋臟腑經氣之相通也徐公遐問曰師言取經之多血者而去之少陰常少血奚獨取其舌下郤中曰處有常變用有經權少陰少血者言其常也病有所苦必先去其血而後瀉有餘補不足者言其變也蓋虛者亦不宜去血變病者又取於郤中此皆處變用權之法故獨舉少陰一經而曰舌下血曰變病蓋欲其類推於諸經也脾病者身重善肌肉痿足不收行善瘈腳下痛脾主肌肉主通會五臟元真之氣脾氣傷故身重而肌肉善痿痿者肌肉委棄不仁也足太陰經脈循脛膝邪在經絡故足不收氣傷故善瘈而痛用二善字者言經病而及於氣也虛則腹滿腸鳴飧泄食不化此因脾氣虛而不能轉輸水穀故也取其經太陰陽明少陰血者榮衛氣血始於足少陰腎生於足陽明胃輸於足太陰脾故取此三經以通經氣肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛此言肺腎之經氣相通也夫肺主氣而發原於腎腎為本肺為末母子之經氣相通是以足少陰之脈其直者從腎上貫膈入肺中循喉嚨挾舌本病則氣逆故喘咳也肺俞氣在肩背氣逆於上則肩背痛而汗出逆於下則尻陰胻膝皆痛也按五經之論各有不同俱當著眼虛則少氣不能報息耳聾嗌乾腎為生氣之原肺主周身之氣以司呼吸生氣衰於下不能報息於上耳腎氣衰則耳聾金水之氣不足則嗌乾也取其經太陰足太陽之外厥陰內血者太陰手太陰肺經之本脈也啓玄子曰足太陽之外厥陰內者正謂腨內側內踝後之直上則少陰脈也視左右足脈少陰部分有血滿異於常者即而取之腎病者腹大脛腫喘咳身重寢汗出憎風腎少陰脈起於足而上循腨挾臍循腹裡上行而入肺病在經絡故腹大脛腫水邪逆於上則喘咳生氣衰於下則身重也太陽之氣司表而下出於膀胱經氣逆則表氣虛故寢汗出而惡風虛則胸中痛大腹小腹痛清厥意不樂腎氣虛而不能上交於心故胸中痛少陰之氣上與陽明相合生氣虛於下故大腹小腹痛也清厥冷之輕者陽氣虛故手足逆冷也心有所憶謂之意膻中者臣使之官代君行令喜樂出焉胸中之心氣不足故意不樂也取其經少陰太陽血者少陰與太陽為表裡臟腑之經氣相通故臟病而兼及於腑經也以上論病生於經脈肌肉宜治之以針石者審察其臟腑經絡之虛實而取之肝色青宜食甘粳米牛肉棗葵皆甘夫精明五色者氣之華也肝色青則其氣苦急故宜食甘以緩之蓋五味所以養五臟之氣者也心色赤宜食酸小豆犬肉李韭皆酸心志喜喜則氣緩緩則心神懈弛故宜食小豆犬李之酸以收養心氣肺色白宜食苦麥羊肉杏薤皆苦肺色白其氣主秋金之降令而苦上逆故宜食羊麥杏薤之苦以收降其肺氣脾色黃宜食鹹大豆豕肉栗藿皆咸夫脾土之所以灌溉四臟者主上滲於心肺下泄於肝腎如脾苦濕則不能上滲矣土氣敦阜則不能下泄矣經曰酸苦湧泄為陰鹹味滲泄為陰故宜食苦者取其燥土氣以湧滲於上也宜食鹹者取其行土氣以滲泄於下也腎色黑宜食辛黃黍雞肉桃蔥皆辛腎色黑則其氣喜潤辛能開腠理致津液蓋從革作辛能通母之化原也辛散酸收甘緩苦堅咸耎此言發散湧泄之外而又有或收或緩或堅或耎之性善用者隨其所利而行之毒藥攻邪啓玄子曰藥謂金玉土石草木菜果蟲魚鳥獸之類皆可以怯邪養正者也然攻邪卻病惟毒乃能故曰毒藥攻邪再按本草云上藥為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥為臣主養性以應人無毒有毒斟酌其宜欲遏病補虛羸者本中經下藥為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經五穀為養謂黍稷稻麥菽以供養五臟之氣五果為助謂桃李杏棗栗以助其養五畜為益謂牛羊犬豕雞為補益五臟者也五菜為充謂葵藿蔥韭薤充實於臟腑者也按五常政大論曰大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九蓋毒藥所以攻邪穀肉果菜無使過傷能補精益氣精氣充足則邪病自除氣味合而服之以補精益氣此總結上文而言穀肉果菜皆有五氣五味宜和合而食之無使偏勝以補益精氣如偏食焦苦之氣味則增火化如偏食鹹腐之物則增寒化經曰久而增氣物化之常也氣增而久夭之由也故宜氣味和合而食之此五者有辛酸甘苦鹹各有所利或散或收或緩或急或堅或耎四時五臟病隨五味所宜也五者謂毒藥谷畜菜果也言此五者皆有辛甘之發散有酸苦鹹之湧泄又有辛散酸收苦堅咸耎或隨四時之宜散宜收或隨五臟之所苦所欲各隨其所利而行之此篇論察五臟以知間甚死生之期審貴賤以施針砭藥食之別蓋九候之病由五臟之所生宣明五氣篇第二十三天地之間六合之內不離於五人亦應之此篇承上章而宣明五氣五味五臟五邪故無問答之辭而不曰論五味所入伯高曰胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃五味各走其所喜酸先走肝苦先走心甘先走脾辛先走肺咸先走腎穀氣津液已行榮衛大通乃化糟粕以次傳下酸入肝東方生風風生木木生酸酸生肝故味之酸者入肝以養肝氣辛入肺西方生燥燥生金金生辛辛生肺故味之辛者入肺以養肺氣苦入心南方生熱熱生火火生苦苦生心故味之苦者入心以養心氣鹹入腎北方生寒寒生水水生咸咸生腎故味之咸者入腎以養腎氣甘入脾中央生濕濕生土土生甘甘生脾故味之甘者入脾以養脾氣是為五入五氣所病五臟氣逆而為病心為噫噫不平之氣也本經曰所謂上走心為噫者陰氣而上走於陽明陽明絡屬心故上走心為噫蓋此因胃氣上逆於心故為噫肺為咳陰陽應象大論曰肺在變動為咳肝為語肝為將軍之官在志為怒肝氣欲達則為語診要經終篇曰春刺冬分邪氣著臟病不愈又且欲言語此言春令之肝氣不舒故也脾為吞脾主為胃行其津液脾氣病而不能灌溉於四臟則津液反溢於脾竅之口故為吞咽之證腎為欠為嚏靈樞經曰陽者主上陰者主下陽引而上陰引而下陰陽相引故數欠當瀉足少陰補足太陽蓋少陰之氣在下病則反逆於上而欲引於下欲引於下則欠反逆於上則嚏蓋腎絡上通於胃也胃為氣逆為噦為恐按口問篇曰人之噦者谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦蓋谷入於胃乃傳之肺而肺反還入於胃胃受肺之寒氣所逆而欲復出於胃故為噦胃之逆氣下並於腎則為恐蓋腎於胃戊癸相合也噦厄逆也噦噦車鑾聲言厄聲之有輸序故曰噦大腸小腸為泄大腸小腸受盛水穀變化糟粕病則不能化物而為泄矣下焦溢為水下焦如瀆水道出焉病則反溢而為水病膀胱不利為癃不約為遺溺靈樞經曰三焦下俞出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則瀉之膽為怒膽為中正之官性秉剛決病則氣鬱而為怒是為五病謂病五臟五行之氣而六腑亦配合於五行五精所並謂五臟之精氣相併精氣並於心則喜多陽者多喜心為陽臟陰精並之故喜本經曰神余則笑不休並於肺則悲肝悲哀動中則傷魂肺虛而肝氣並於肺則悲並於肝則憂脾憂愁不解則傷意肝虛而脾氣並於肝則憂並於脾則畏恐懼不解則傷精脾虛而腎氣並於脾則畏並於腎則恐本經曰所謂恐如人將捕之者陰氣少陽氣入陰陰陽相搏故恐也蓋心腎為水火陰陽之主宰是以心虛而陰精並之則喜腎虛而陽氣並之則恐此水火二氣上下交併其餘三臟皆所勝之氣相併所謂氣不及則所勝妄行徐公遐曰有精相併者有氣相併者故首提曰精氣是謂五並虛而相併者也此申明並者因虛而相併也五臟所惡金木水火土五臟之本氣也風寒熱燥濕五行之所生也五臟之氣喜於生化故本氣自勝者惡之心惡熱心為火臟故惡熱肺惡寒肺屬清金故惡寒肝惡風肝主風木故惡風脾惡濕脾為陰土故惡濕腎惡燥腎為水臟故惡燥是謂五惡三臟惡本氣之勝肺惡腎之寒腎惡肺之燥此亦陰陽變換之道而肺腎子母之氣互為本末也五臟化液水穀入口其味有五津液各走其道五臟受水穀之津淖注於外竅而化為五液心為汗心主血汗乃血之液也肺為涕出於肺竅之鼻而為涕肝為淚出於肝竅之目而為淚脾為涎出於脾竅之口而為涎腎為唾腎絡上貫膈入肺上循喉嚨挾舌本舌下廉泉玉英上液之道也故腎為唾經曰液者所以灌精濡空竅者也是謂五液又曰五液者腎為水臟受五臟之精而藏之腎之液復入心而為血入肝為淚入肺為涕入脾為涎自入為唾是以五液皆咸五味所禁陰之所生本在五味陰之五宮傷在五味故禁多食辛走氣氣病無多食辛肺主氣辛入肺故走氣氣病而多食之反辛散而傷氣咸走血血病無多食鹹心主血潤下作咸咸走血者水氣上交於心也血病而多食之則水反勝火矣苦走骨骨病無多食苦腎主骨炎上作苦苦走骨者火氣下交於腎也骨病而多食之則火氣反勝矣此與並於心則喜並於腎則恐之義相同蓋心腎水火之氣時相既濟故所走互更其餘三臟是本臟之味而走本臟所主之筋肉也甘走肉肉病無多食甘脾主肌肉甘為土味脾病而多食之則反傷脾氣酸走筋筋病無多食酸肝合筋酸走肝筋病而多食之則反傷其肝氣是謂五禁無令多食五味所以養五臟之氣者也病則氣虛故無令多食蓋少則補多則反傷其氣五病所發承上文而言五臟之病各有所發陰病發於骨腎為陰臟在體為骨故腎陰之病而發於骨陽病發於血心為陽中之太陽在體為脈故心陽之病而發於血朱永年曰上節言咸走血苦走骨此節曰陰病發於骨陽病發於血正見其陰陽體用之妙陰病發於肉脾為陰中之至陰在體為肉是以太陰之病而發於所主之肌肉陽病發於冬肝為陰中之少陽逆冬氣則奉生者少春為痿厥故肝藏之陽病發於冬陰病發於夏肺為牝臟逆夏氣則奉收者少秋為痎瘧故肺藏之陰病而發於夏也夫所謂陽病發於骨陰病發於血者即調神論之所謂逆夏氣則太陽不長心氣內洞逆冬氣則少陰不藏腎氣獨沉之義此因本氣自傷而為病也曰陽病發於冬陰病發於夏者因所生之母氣逆而為病也陰陽之道推變無窮若膠執於心腎發於骨血肝肺發於冬夏又不可與論陰陽矣是為五發謂五臟皆有所發之處各有所發之因五邪所亂言正氣為邪氣所亂邪入於陽則狂邪入於陽則陽盛陰不勝其陽則脈流薄疾並乃狂又四肢為諸陽之本陽盛則四肢實實則能登高也熱盛於身則棄衣欲走也陽盛則使人罵詈不避親疏也邪入於陰則痹痹者閉也痛也邪入於陰閉而不行則留著而為痹痛之證故曰病在陽者名曰風病在陰者名曰痹搏陽則為巔疾方盛衰論曰氣上不下頭痛巔疾蓋邪氣與陽氣搏擊於上則為頭痛巔頂之疾搏陰則為喑足之少陰上繫於舌絡於橫骨終於會厭邪搏於陰則厭不能發發不能下至其開合不利故為喑陽入之陰則靜陽分之邪而入之陰則病者靜蓋陰盛則靜也陰出之陽則怒陰分之邪而出之陽則病者多怒蓋陽盛則怒也是為五亂謂邪氣亂於五臟之陰陽五邪所見夫五邪之亂於陰陽者亂五臟陰陽之氣也正氣為賊邪所傷則五邪之勝氣外見於脈矣春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈春弦夏鉤秋毛冬石五臟陰陽之正氣也反得所勝之脈者邪賊盛而見於脈也名曰陰出之陽病善怒不治夫內為陰外為陽在內五臟為陰在外皮肉絡脈為陽在內所傷之臟氣而外見於脈故名曰陰出之陽邪出於脈則血有餘經曰血有餘則怒此正氣為邪氣所勝故為不治是為五邪皆同命死不治此言上文之所謂不治者謂五脈皆為邪勝也如五臟之氣為邪所勝見四時相剋之脈皆為死不治矣五臟所藏臟者藏也主藏而不瀉也心藏神經曰兩精相搏謂之神是神乃陰精所生而藏於心臟朱永年曰所生之來謂之精又曰神者水穀之精氣也是先天所生之精與後天水穀之精而生此神故曰兩精相搏肺藏魄並精而出謂之魄魄乃陰精所生肺為陰臟故主藏魄肝藏魂隨神往來謂之魂肝為陽臟故主藏魂脾藏意所以任物謂之心心之所憶謂之意心生血脈血生脾故心所之之意而藏於脾也腎藏志心之所之謂之志神生於精志生於心亦心腎交濟之義是為五臟所藏為五臟所藏之神五臟所主五臟在內而各有所主之外合心主脈所主血故所主在脈肺主皮肺主氣氣主皮毛故肺合皮肝主筋肝生於腎筋生於骨故在臟為肝在體為筋脾主肉五臟元真之氣通會於肌肉腠理脾氣通於五臟故所主在肉腎主骨腎藏精髓而注於骨故所主在骨是為五主謂人身之皮腠形層各屬五臟之所主五勞所傷勞謂太過也上古之民形勞而不倦久視傷血久視損神故傷血久臥傷氣久臥則氣不行故傷氣久坐傷肉脾喜運動故久坐傷肉久立傷骨久立則傷腰腎膝脛故傷骨久行傷筋行走罷極則傷筋是為五勞所傷是五勞而傷五臟所主之血氣筋骨也五脈應象五臟之脈以應四時五行之象肝脈弦象本證之條達也心脈鉤象火炎盛而秒則環轉如鉤脾脈代象四時之更代也肺脈毛秋令清肅故象羽毛之清虛腎脈石象石之沉水也是為五臟之脈夫九候之道必先定五臟五脈審辨其五實五虛而後立五法調五味以治之故此篇宣明五臟之氣焉血氣形志篇第二十四夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數夫氣為陽血為陰腑為陽臟為陰臟腑陰陽雌雄相合而氣血之多少自有常數如太陽多血少氣則少陰少血多氣少陽少血多氣則厥陰多血少氣陽有餘則陰不足陰有餘則陽不足此天地盈虛之常數也惟陽明則氣血皆多蓋血氣皆生於陽明也足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足陰陽也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手之陰陽也夫手有三陰三陽足有三陰三陽以合十二經脈陰陽並交表裡相應是以聖人持診之道先後陰陽而持之診合微之事追陰陽之變章五中之情取虛實之要知此乃足以診如切陰不得陽診消亡得陽不得陰守學不湛是故臟腑陰陽相為表裡此皆診候之要不可不知今知手足陰陽所苦凡治病必先去其血乃去其所苦伺之所欲然後瀉有餘補不足知所苦者知邪病在手足之何經也先去其血除菀陳也菀陳去則無所苦矣伺之所欲者伺其欲散欲耎欲緩欲收蓋必先定五臟之病五臟已定九候已備而後乃存針有餘者邪氣盛也不足者精氣奪也有餘則瀉之不足則補之欲知背俞先度其兩乳間中折之更以他草度去半已即以兩隅相拄也乃舉以度其背令其一隅居上齊脊大椎兩隅在下當其下隅者肺之俞也俞音輸度音鐸拄音主此論取五俞之法五臟之俞皆在於背背者胸之府也故先量其兩乳而後定其背之俞焉度量也言以草量其乳間中折之更以他草度此草去半已使與中折之草拄為三隅以一隅上齊脊之大椎兩隅分而拄下當其下隅之盡處是肺俞也蓋九針九候之道先以五臟為主復下一度心之俞也復下一度左角肝之俞也右角脾之俞也復下一度腎之俞也是謂五臟之俞灸刺之度也度葉渡度度數也俞輸同五臟血氣輸轉傳布也吳鶴皋曰此取五臟俞法與甲乙經不合蓋古人別為一法者也形樂志苦病生於脈治之以灸刺形樂志苦形樂志樂貴人也形苦志樂形苦志苦常人也所謂更貴更賤以知死生以決成敗也金匱要略曰血痹病從何得之師曰夫尊榮人骨弱肌膚盛重困疲勞汗出臥不時動搖加被微風遂得之宜引針引陽氣令脈和緊去則愈蓋形樂則肌膚盛肌膚盛則陽氣留於陰也久陽不在表則邪直傷於陰志苦則傷神神傷則血脈虛而邪氣易入故病生於脈也宜灸以啓留陷之陽宜刺以去血脈之痹形樂志樂病生於肉治之以針石形樂志樂則過於安逸矣過於安樂則神機不轉氣血羈留故病生於肉宜治以針石引而通之形苦志樂病生於筋治之以尉引吳鶴皋曰勞苦其形則傷筋志逸而樂則血脈未嘗受病故治之以尉烙導引使血脈榮養於筋則就安矣形苦志苦病生咽嗌治之以甘藥百憂感其心萬事勞其形則陰陽氣血皆傷矣夫嗌主天氣咽主地氣天者陽氣地者陰氣此陰陽氣血皆傷故病生嗌咽是宜甘藥以調其脾胃焉終始篇曰陰陽俱不足補陽則陰竭瀉陰則陽脫如是者可將以甘藥不可飲以至劑如此者弗灸朱永年曰吭嗌喉也形數驚恐經絡不通病生於不仁治之以按摩醪藥驚則氣亂恐則氣下蓋血隨氣行氣數亂逆則經絡不通榮衛不行是以病生於不仁宜按摩醪藥以行其榮衛血氣焉朱永年曰酒者熟谷之液其性慓悍其氣先行於榮衛故宜於醪藥也是謂五形志也謂大人布衣有此五者之形志刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出氣惡血刺少陰出氣惡血刺厥陰出血惡氣也惡去聲此言六經之氣血各有多少宜從其多者而去之蓋邪在氣分者可從血出邪在血分者可從氣出也陽明氣血皆多故刺可出血出氣太陽多血少氣故刺宜出血而惡出氣少陽多氣少血故刺宜出氣而惡出血太陰多氣少血故刺宜出氣而惡出血少陰多氣少血故刺宜出氣而惡出血厥陰多血少氣故刺宜出血而惡出氣此氣血之常數針刺之常法也針經曰刺榮者出血刺衛者出氣按靈樞經水篇曰十二經之多血少氣與其少血多氣與其皆多血氣與其皆少血氣皆有大數其治以針艾各調其經氣固其常有合又曰足陽明五臟六腑之海也其脈大血多氣盛熱壯刺此者不深弗散不留不瀉也足陽明刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足太陰深三分留四呼足少陰深二分留三呼足厥陰深一分留二呼手之陰陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼其少長大少肥瘦以心撩之命曰法天之常灸之亦然灸而逾此者得惡火則骨枯脈澀刺而過此者則脫氣寶命全形論篇第二十五黃帝問曰天覆地載萬物悉備莫貴於人人以天地之氣生四時之法成王冰曰天以德流地以氣化德氣相合而乃生焉易曰天地絪縕萬物化醇此之謂也則假以溫涼寒暑生長收藏四時運行而方成立君王衆庶盡欲全形王冰曰貴賤雖殊然其寶命一矣故好生惡死者貴賤之常情也形之疾病莫知其情留淫日深著於骨髓心私慮之余欲針除其疾病為之奈何王冰曰虛邪之中人微先見於色不知於身有形無形故莫知其情狀也留而不去淫衍日深邪氣襲虛故著於骨髓帝矜不度故請行其針岐伯對曰夫鹽之味鹹者其氣令器津泄弦絶者其音嘶敗木敷者其葉發病深者其聲噦人有此三者是謂壞腑毒藥無治短針無取此皆絶皮傷肉血氣爭黑此言臟腑經絡皆由胃氣之所資生如胃氣已敗雖毒藥無所用其功針石無所施其力欲寶命全形者當先養其胃氣焉夫鹽之味鹹者性本潤下如置之器中其氣上升令津泄澤於器之上如弦欲絶者其音必先嘶敗如木氣敷散其葉早發生此三者以喻有諸內而形諸外以比噦之腑壞而後發於音聲夫噦有三因如因肺氣逆而欲復出於胃者橘皮竹茹湯主之此噦之逆證也如噦而腹滿當視其前後知何部不利利之而愈者此噦之實證也如有此三者之比而其聲噦者噦之敗證也此因病深而胃腑已壞雖毒藥無可治其內短針無可取其外此皆皮毛焦絶肌肉損傷而氣血爭為腐敗矣黑者腐之色也朱永言曰金匱要略云六腑氣絶於外者手足寒上氣腳縮五臟氣絶於內者利不禁手足不仁此噦之壞證也所謂壞腑者言病深而五臟六腑血氣皮肉俱已敗壞帝曰余念其痛心為之亂惑反甚其病不可更代百姓聞之以為殘賊為之奈何更代更易時月也殘賊殘忍其死而賊害不仁也岐伯曰夫人生於地懸命於天天地合氣命之曰人王冰曰形假物成故生於地命惟天賦故懸於天德氣同歸故謂之人也靈樞經曰天之在我者德地之在我者氣德流氣薄而生者也然德者道之用氣者生之母也人能應四時者天地為之父母王冰曰人能應四時和氣而養生者天地恆畜養之故為父母四氣調神大論曰夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物浮沉於生長之門知萬物者謂之天子吳昆曰知萬物則能參天地贊化育是謂天之子也天有陰陽人有十二節邪客篇曰歲有十二月人有十二節生氣通天論曰夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣十二節者手足之十二大節也蓋天有陰陽寒暑以成歲人有十二節以合手足之三陰三陽十二經脈以應天之十二月也天有寒暑人有虛實寒暑者天之陰陽消長也虛實者人之陰陽消長也能經天地陰陽之化者不失四時知十二節之理者聖智不能欺也言能經理天地陰陽之造化者不失四時之運行知十二經脈之理而合於天之陰陽惟聖智者能之又何欺之有能存八動之變五勝更立能達虛實之數者獨出獨入呿吟至微秋毫在目呿音區存存心也八動八風之變也五勝五行之勝克也更立者言五行之有勝制勝則賊害制則生化萬物盡然不可勝竭也獨出獨入者言能存心於八動五勝明達於虛實之數而出入補瀉之有獨見也呿臥聲口張而不合氣之虛也呻吟之聲氣之實也言其呿吟之至微而虛實之秋毫皆在吾目矣帝曰人生有形不離陰陽天地合氣別為九野分為四時月有小大日有短長萬物並至不可勝量虛實呿吟敢問其方人秉天地陰陽之氣而生此形是以與天地合氣而成九候也別為九野者以身形之應九野也分為四時者左足應立春左脅應春分左手應立夏膺喉頭首應夏至右手應立秋右脅應秋分右足應立冬腰尻下竅應冬至也月有小大日有短長言氣候之有盈虛人與天地萬物之氣皆然而不可勝量也虛實呿吟者以呿吟之至微而知其虛實也欲法天則地而為針刺之法敢問其方岐伯曰木得金而伐火得水而滅土得木而達金得火而缺水得土而絶萬物盡然不可勝竭伯言針石之道必先定五臟備九候而後乃存針然五臟五行之氣有相勝更立不可不知如木得金則伐火得水則滅金得火則缺水得土則絶此所勝之氣而為賊害也如土得木而達此得所勝之氣而為制化也萬物之理皆然而不可勝竭故針有懸布天下者五黔首共餘食莫之知也共供同黔首黎民也懸布天下者先立針經以示人而百姓只可力田以供租稅有餘粟以供養其於治針之道莫之知也針經曰餘子萬民養百姓而收其租稅余愍其不給而屬有疾病欲助微針通其經脈一曰治神神在秋毫屬意病者神屬勿去知病存亡二曰知養身以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟故當知日之寒溫月之虛盛四時氣之浮沉而調之於身工候救之勿能傷也三曰知毒藥為真毒藥所以攻邪者也如知之不真用之不當則反傷其正氣矣故帝曰余欲弗使被毒藥欲以微針通其經脈調其血氣四曰制砭石小大上古之世未有冶鑄以砭石為針制有大小隨病所宜其後始造九針以代鑱石經曰小之則無內大之則無外蓋治外者制小其針治內者制其大也五曰知腑臟血氣之診腑為陽臟為陰氣為陽血為陰人生有形不離陰陽故必先知臟腑氣血之虛實而後可以行針五法俱立各有所先言上古之世立此五法而各有所宜先者今末世之刺也虛者實之滿者泄之此皆衆工所共知也只知瀉有餘補不足此粗工之所共知若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨來獨往法天則地者必候日月星辰四時八正之氣隨氣應而用其針是因天地之時而調和氣血也迎之隨之以意和之如響應聲如影隨形得心應手取效若神而離合出入自有獨見不與衆聞徐公遐曰來者為陽往者為陰鬼神者陰陽之氣也言道在純一而若無鬼神矣朱子曰鬼神天地之功用造化之迹也帝曰願聞其道岐伯曰凡刺之真必先治神真者真一無妄神者陰陽不測之謂言刺之道雖有陰陽虛實之分而必先歸於治神五臟已定凡刺之道畢於終始明知終始五臟為紀陰陽定矣九候已備後乃存針知診三部九候之病脈處而後存針以治之衆脈不見衆凶弗聞外內相得無以形先按九針十二原篇曰皮肉筋脈各有所處病各有所宜各不同形各以任其所宜取五脈者死取三脈者恇故曰衆脈不見衆凶弗聞言不可以濫取也臟腑在內皮膚筋脈在外外內之相應者貴在得神而無以形先蓋言上守神粗守形也可玩往來乃施於人言知機之道而後乃施於人九針十二原篇曰粗守關上守機機之動不離其空空中之機清淨而微其來不可逢其往不可追知機之道者不可挂以發不知機道叩之不發知其往來為與之期人有虛實五虛弗近五實弗遠五虛者五臟之精氣奪也五實者五脈之邪氣盛也夫用針者觀察病人之態以知精神魂魄之存亡得失之意五者已傷針不可以治之故曰五虛弗近邪實者急取而瀉之故曰五實弗遠至其當發間不容瞚瞚音舜與瞬同刺之微在遲速知其可取有如發機間不容於瞬息也手動若務針耀而勻動用針也務專一也耀光淨也勻均勻也靜意視義觀適之變適至也靜己之意視針之義以觀氣至之變是謂冥冥莫知其形冥冥者視之無形也言形氣榮衛之不形於外而工獨知之見其烏烏見其稷稷從見其飛不知其誰張介賓曰此形容用針之象有如此者烏烏言氣至如烏之集也稷稷言氣盛如稷之繁也從見其飛言氣之或往或來如烏之飛也然此皆無中之有莫知其誰為之也伏如橫弩起如發機王冰曰血氣之未應針則伏如橫弩之安靜其應針也則起如機發之迅速帝曰何如而虛何如而實復問治虛實之法岐伯曰刺虛者須其實刺實者須其虛言刺虛者須俟其氣至而實刺實者須俟其氣泄而虛經氣已至慎守弗失深淺在志遠近若一如臨深淵手如握虎神無營於衆物按針解論云刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也經氣已至慎守弗失者勿變更也深淺在志者知病之內外也遠近如一者深淺其候等也如臨深淵者不敢墮也手如握虎者欲其壯也神無營於衆物者靜志觀病人無左右視也人正神明論篇第二十六黃帝問曰用針之服必有法則焉今何法何則服事也法方法則準則也岐伯對曰法天則地合以天光謂合天之寒暑日之寒溫月之盈虛星辰之行度帝曰願卒聞之岐伯曰凡刺之法必候日月星辰四時八正之氣氣定乃刺之候日月者謂日之寒溫月之空滿也星辰者先知二十八宿之分以紀日月之行也四時八正之氣者謂四時之氣八方之風也定安靜也氣定乃刺之者謹候其氣之安靜而刺之也是故天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉淖和也泣與澀同言天溫日明則陽氣盛人之血氣亦應之故血和潤而易瀉衛氣浮而易行天寒日陰則陰氣盛故人血凝泣而衛氣沉凝則難行沉則不應矣月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也精純至也月乃陰水之精故潮汐之消長應月之盈虧人之形體屬陰精血屬水故其虛實浮沉亦應於月是以天寒無刺血泣而衛沉也天溫無凝天氣溫和則血氣無凝滯而易行月生無瀉恐伐其生氣也月滿無補恐重實也月郭空無治正氣虛而邪氣不去也是謂得時而調之謂得天時而調其血氣也因天之序盛虛之時移光定位正立而待之因天氣之和月之盛滿候日遷移定氣所在南面正立待氣至而刺之故曰月生而瀉是謂臟虛臟陰也內也謂虛其里陰初生之血氣月滿而補血氣揚溢絡有留血命曰重實重平聲月滿則血氣充溢於形身之外若重補之則絡有留血是謂重實也月郭空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起用針之要在於知調陰陽月郭空則陰陽榮衛皆虛正不勝邪則邪留不去而正氣反錯亂矣帝曰星辰八正何候岐伯曰星辰者所以制日月之行也伯高曰歲有十二月日有十二辰子午為經卯酉為緯周天二十八宿而一面七星四七二十八星房昴為緯虛張為經是故房至畢為陽昴至心為陰蓋日月經天有南陸北陸之行有朔望虛盈之度故星辰者所以紀日月之行而人之榮衛亦有陰陽虛實之應也八正者所以候八風之虛邪以時至者也八正者八方之正位也八方之氣以時而至謂之八風風從其所居之鄉來為實風主生長養萬物如月建在子風從北方來冬氣之正也月建在卯風從東方來春氣之正也月建在午風從南方來夏氣之正也月建在酉風從西方來秋氣之正也如春夏之交風從東南來夏秋之交風從西南來秋冬之交風從西北來春冬之交風從東北來此四方四維之正氣主生長萬物者也從其沖後來為虛風傷人者也主殺主害沖後來者從衝犯之方而來如太一居子風從南方來火反衝水也太一居卯風從西方來金來犯木也故以八方之位以候八風之正氣候八節之風邪四時者所以分春秋冬夏之氣所在以時調之也四時之氣所在如春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓又如正月二月人氣在肝三月四月人氣在脾五月六月人氣在頭七月八月人氣在肺九月十月人氣在心十一月十二月人氣在腎此皆氣之所在以時而調之也八正之虛邪而避之勿犯也八方之虛邪主殺主害者謹候而避之故聖人日避虛邪之道如避矢石然邪勿能害也朱永年曰日避者候太一徙居中宮之日而避之也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟工候救之弗能傷也身之虛血氣虛也天之虛虛鄉之邪風也兩虛相感故邪氣至骨而入傷五臟上工調其九候而救之始勿能傷害其性命故曰天忌不可不知也天忌者謂太一徙居中宮乃天道所當避忌之日太一北極也斗杓所指之辰謂之月建即氣令所主之方如冬至四十六日月建在北太一居葉蟄之宮葉蟄坎宮也立春四十六日居天留天留艮宮也春分四十六日居倉門倉門震宮也立夏四十五日居陰洛陰洛巽宮也夏至四十六日居天宮天宮離宮也立秋四十六日居玄委玄委坤宮也秋分四十六日居倉果倉果兌宮也立冬四十五日居新洛新洛乾宮也明日復居葉蟄之宮曰冬至矣此太一一歲所居之宮也又太一日遊以冬至之日居葉蟄之宮數所在日從一處至九日復反於一常如是無已終而復始太一移日者始移宮之第一日也如太一徙立於中宮乃九日中之第五日也其日風從南方來名曰大弱風其傷人也內舍於心外在於脈氣主熱風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絶則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛病則為淋露寒熱犯其雨濕之地則為痿又身形之應九野左足應立春其日戊寅己丑左脅應春分其日乙卯左手應立夏其日戊辰己巳膺喉頭首應夏至其日丙午右手應立秋其日戊申己未右脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六腑膈下三臟應中州其大禁大禁太一所在日及諸戊己是謂天忌宜避針刺帝曰善其法星辰者余聞之矣願聞法往古者岐伯曰法往古者先知針經也按靈樞首篇黃帝問曰餘子萬民養百姓而收其租稅余哀其不給而屬有疾病余欲勿使被毒藥無用砭石欲以微針通其經脈調其血氣先立針經願聞其情故曰法往古者先取法乎針經也驗於來今者取驗於本經之論也是以三部九候諸篇皆補論針經未盡之旨再按官針篇曰用針者不知年之所加氣之盛衰虛實之所起不可以為工故本經補論歲運八篇立數萬余言亦詳悉靈樞之所未盡者驗於來今者先知日之寒溫月之虛盛以候氣之浮沉而調之於身觀其立有驗也驗於來今者言針經之所未發明也蓋人生於地懸命於天天地合氣命之曰人是以本卷九篇論三部九候而各有天各有地各有人以天之日月虛盈地之經水動靜以候氣之浮沉血之凝淖所謂法天則地調之於身故曰三部九候為之原九針之論不必存矣觀其冥冥者言形氣榮衛之不形於外而工獨知之以日之寒溫月之虛盛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉言上工取法天地先知日之寒溫月之虛盈四時氣之浮沉與人之形氣榮衛參伍相合而調之是雖形氣榮衛之不形於外而工已獨知之故曰觀於冥冥焉通於無窮者可以傳於後世也承上文而言通於天地陰陽無窮之道者可傳於萬世也是故工之所以異也然而不形見於外故俱不能見也視之無形嘗之無味故謂冥冥若神倣佛此復言觀於冥冥者不形見於外視之無形嘗之無味倣佛乎若神是以粗工之不能俱見也上工獨知之者先以日月四時之氣調之於身故常先見之是故工之所以有異也虛邪者八正之虛邪氣也所謂虛邪者乃八方虛鄉所來之邪氣其入於身也深正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形所謂正邪者八方之正氣也正氣者正風也從一方來非實風又非虛風也其中人也淺是以逢人之汗出腠理開而後入於肌腠絡脈之間然其中人也亦微故莫知其情莫見其形上工救其萌芽必先見三部九候之氣盡調不敗而救之故曰上工此言虛邪之始中人也亦起於毫毛發於腠理其入深則搏於筋骨傷人五臟故上工救其萌芽始發見其灑淅動形而即治之不使有傷三部九候之氣是為上工也朱永年曰虛鄉之邪逢人之虛則中人也深而入傷五臟如人之九候盡調者亦始傷毫毛故當救其萌芽勿使傷敗九候之氣下工救其已成救其已敗救其已成者言不知三部九候之相失因病而敗之也已成者入傷榮衛而病已成已敗者三部九候之氣已為邪所傷敗下工救其已成者言不知三部九候之相失者因邪病而敗之也此言上工救其萌芽不使邪傷正氣下工救其已成則正氣已敗不亦晚乎知其所在者知診三部九候之病脈處而治之故曰守其門戶焉莫知其情而見邪形也此言正邪之中人也微莫知其情莫見其形上工知診三部九候之病脈故能知其所在知其所在即於病脈處而治之故曰守其門戶焉言守其真氣而邪自去矣朱永年曰上工知診三部九候之病脈故能見其邪形下工不知所診則亦莫見其形矣帝曰余聞補瀉未得其意補正瀉邪各有其法岐伯曰瀉必用方方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而納針乃復候其方吸而轉針乃復候其方呼而徐引針故曰瀉必用方其氣而行焉內葉訥天包乎地圓者天之象也氣生於地方者地之象也蓋以天地陰陽四時之氣合人形之虛實而為補瀉之法故曰圓與方非針也氣方盛月方滿日方溫則人之真氣充而邪易瀉也身方定陰陽不相錯也息方吸而內針吸天地之氣以助其氣也故瀉必用方其氣盛而行焉補必用圓圓者行也行者移也補必用圓者圓活其氣之周行於外內也經氣周行則移其真氣之隆至矣刺必中其榮復以吸排針也必中榮者刺血脈也排推也候其吸而推運其針也蓋瀉者候其呼出而徐引針以瀉之補者候其吸入而推內以補之也故圓與方非針也方圓之道非用針之妙在得氣與神也故養神者必知形之肥瘦榮衛血氣之盛衰血氣者人之神不可不謹養知形之肥瘦則知用針之淺深知血氣之盛衰則知方圓之補瀉血氣者五臟之神氣也能知形之肥瘦氣之盛衰則針不妄用而神得其養矣帝曰妙乎哉論也合人形於陰陽四時虛實之應冥冥之期其非夫子孰能通之然夫子數言形與神何謂形何謂神願卒聞之形謂身形神謂神氣岐伯曰請言形形乎形目冥冥問其所病索之於經慧然在前按之不得不知其情故曰形所謂形者觀其冥冥而知病之所在也邪氣臟腑病形篇曰虛邪之中身也灑淅動形正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其情故曰按之不得不知其情帝曰何謂神岐伯曰請言神神乎神耳不聞目明心開而志先慧然獨悟口弗能言俱視獨見適若昏昭然獨明若風吹雲故曰神所謂神者謂氣至之若神也耳不聞者毋聞人聲以收其精也目明者觀於冥冥也志者心之所之也言心開而志先慧悟也口弗能言者得氣之妙不可以言語形容也俱視獨見者衆人之所共視而我獨知之也適至也言氣至若昏而我昭然獨明也氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣三部九候為之原九針之論不必存也原謂十二原也蓋言九針之論以十二原主治五臟六腑之病今法則天地而以天地人之三部九候為之原則九針之論不必存矣此言法往古者已先知其針經驗於來今者知三部九候之道今論三部九候之本原則九針之論不必存心而再問矣離合真邪論篇第二十七黃帝問曰余聞九針九篇夫子乃因而九之九九八十一篇余盡通其意矣此承上章而言九針之道備載針經八十一篇余已悉會其意經言氣之盛衰左右傾移以上調下以左調右有餘不足補瀉於榮腧余知之矣帝言針經之大略若此而余已知之此皆榮衛之傾移虛實之所生非邪氣從外入於經也余願聞邪氣之在經也其病人何如取之奈何言針經多論正氣之虛實未詳言邪氣之入經朱永年曰邪氣入於血脈之中真氣與邪氣有離有合故以名篇岐伯對曰夫聖人之起度數必應於天地故天有宿度地有經水人有經脈起度數者論身形之有三百六十五度也宿謂二十八宿度謂周天之度數經水謂清水渭水海水湖水汝水澠水淮水漯水江水河水濟水漳水以合人之十二經脈天之二十八宿房至畢為陽昴至心為陰地之十二經水漳以南為陽海以北為陰宿度經水之相應也上章論日月星辰四時八正之氣以應人之榮衛氣血此復論地之經水以應人之經脈斯天地合氣而為三部九候焉徐公遐曰身形之應天地陰陽也身半以上為天身半以下為地左為陽右為陰背為陽腹為陰天地溫和則經水安靜天寒地凍則經水之凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起此言人之經脈應地之經水經水之動靜隨天氣之寒溫所謂地之九州人之九臟皆通天氣隴隆同湧起貌夫邪之入於脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也經之動脈其至也亦時隴起其行於脈中循循然此言邪入於經寒則血如經水凝泣暑則氣如經水之沸溢而淖澤虛風虛鄉之邪風也經之動脈謂經血之動於脈也言虛風之邪因而入客於經亦如經水之得風其至於所在之處亦波湧而隴起循循次序貌言邪在於經雖有時隴起而次序循行無有常處其至寸口中手也時大時小大則邪至小則平此以寸口之脈而候邪之起伏也夫邪之入於脈也如經水之得風亦時隴起故有時而脈大有時而脈小大則邪至而隴起小則邪平而不起也其行無常處在陰與陽不可為度此即以寸口之脈而候其邪之在陰在陽也蓋邪在於經次序循行無有常處或在於陰或在於陽寸口者左右之兩脈口概寸尺而言也如邪在陽分則兩寸大而兩尺平邪在陰分則兩尺大而兩寸平然只可分其在陰與陽而不可為度數蓋言以寸口分其陰陽以九候而分其度數也從而察之三部九候卒然逢之早遏其路即從其邪之在陰在陽而察之則三部九候之中卒然逢之矣早遏其路者知氣之所在而守其門戶焉朱永年曰神臟為陰形臟為陽知在陽分即從陽之諸經而察之三部之中有獨大獨盛者病之所在矣知在陰分即從諸陰經而察之三部之中有獨大獨盛者病之所在矣即從所在之處迎而取之則遏其行路矣吸則納針無令氣忤納葉訥此以下論刺邪之法以息方吸而納針無令其氣逆也靜以久留無令邪布針解篇曰刺實須其虛者留針陰氣隆至乃去針也故當靜以久留以候氣至真陰之氣至則陽邪無能傳布矣吸則轉針以得氣為故蓋吸則氣入易於得氣故復候其方吸而轉針以欲其得氣故也候呼引針呼盡乃去大氣皆出故命曰瀉呼則氣出故復俟其方呼而徐引針俟呼盡乃去其針則大邪之氣隨氣而出故命曰瀉徐公遐曰風乃六氣之首為百病之長故曰大氣帝曰不足者補之奈何岐伯曰必先捫而循之先以手捫循其處欲令血氣循行也蓋邪之所湊其正必虛故又當補其真氣之不足切而散之次以指切捺其穴欲其氣之行散也推而按之再以指推按其肌膚欲針道之流利也彈而怒之以指彈其穴欲其意有所注則氣必隨之故絡脈填滿如怒起也抓而下之用法如前然後以左手爪甲掏其正穴而右手方下針也通而取之下針之後必令氣通以取其氣外引其門以閉其神門者氣至之門也外引其門者徐往徐來也以閉其神者閉其門戶以致其神焉呼盡納針靜以久留以氣至為故呼盡則氣出氣出納針追而濟之也故虛者可實所謂刺虛者刺其去也徐公遐曰故補曰隨之隨其氣去而追之追其陷下之陽復隨氣而隆至如待所貴不知日暮靜以久留以俟氣至如待貴人不敢厭忽其氣以至適而自護以已同適調適護愛護也寶命全形論曰經氣已至慎守勿失此之謂也候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補候吸引針則氣充於內推闔其門則氣固於外神存氣留故謂之補九針十二原篇曰外門已閉中氣乃實帝曰候氣奈何謂候邪氣之至岐伯曰夫邪去絡入於經也舍於血脈之中其寒溫未相得如湧波之起也時來時去故不常在邪氣由淺而深故自絡而後入於經脈寒溫欲相得者真邪未合也故邪氣波隴而起來去於經脈之中而無有常處徐公遐曰真邪已合如真氣虛寒則化而為寒真氣盛熱則化而為熱邪隨正氣所化故曰寒溫未相得故曰方其來也必按而止之止而取之方其來者三部九候卒然逢之即按而止之以針取之早遏其路無逢其沖而瀉之逢迎也沖者邪盛而隆起之時也兵法曰無迎逢逢之氣無擊堂堂之陳故曰方其盛也勿敢毀傷刺其已衰事必大昌真氣者經氣也經氣大虛故曰其來不可逢此之謂也真氣者榮衛血氣也邪盛於經則真氣大虛故曰其來不可逢言邪方盛雖經氣虛而不可刺也針經曰其來不可逢者氣盛不可補也言邪氣方盛雖正氣大虛而亦不可補故曰迎而奪之惡得無虛言迎奪其邪氣惡得不反虛其正氣乎故曰候邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也此言髮針之不可太遲也大氣風邪之氣也候邪而不詳審其至使邪氣已過其處而後瀉之則反傷其真氣矣真氣已脫而不能再復邪氣循序而復至正氣已虛則邪病益留蓄而不能去故曰其往不可追謂邪氣已過不可瀉也蓋言邪氣方來不可逢迎邪氣已過不可追迫不可挂以發者待邪之至時而髮針瀉矣挂挂同承上文而言待邪之至及時而髮針不可差遲於毫髮之間斯可謂之瀉矣若先若後者血氣已盡其病不可下若先者邪氣之盛也若後者邪氣之已過也若差之毫釐則反傷其血氣真氣虛則邪病益蓄而不可下故曰知其可取如發機不知其取如扣椎機弩機也知其可取者當其可取之時用針取之如發機之迅速不知其取者朴鈍如椎扣之不發故曰知機道者不可挂以發不知機者扣之不發此之謂也此甚言其知機之妙既無逢其沖又無使其過不可遲早於毫髮之間知機之道其神乎帝曰補瀉奈何夫邪氣盛則精氣奪將先固正氣而補之乎抑先攻邪氣而瀉之耶岐伯曰此攻邪也疾出以去盛血而復其真氣伯言此宜先攻其邪也疾出其針以去其盛滿之血則邪病自去邪病去而真氣即復矣此邪新客溶溶未有定處也推之則前引之則止逆而刺之溫血也此言若先補之則血不得散而邪不得出也溶溶流貌言邪之新客於經脈之中溶溶流轉未有定處推之則前引之則止蓋流動而易瀉者也若逆而刺之是謂內溫血不得散氣不得出刺出其血其病立已此甚言其瀉邪之妙刺出其血其病立已邪病已去而真氣即復矣同觀子曰此節可救時下名醫之病帝曰善然真邪已合波隴不起候之奈何此言真邪之有離合也真氣者所受於天與穀氣並而充於經脈者也虛邪者虛鄉之風邪賊傷人者也邪新客於經脈之中真邪未合則如波湧之起時來時去無有常處如真邪已合而波隴不起矣蓋邪正已合則正氣受傷榮衛內陷邪隨正而入深是以經脈無波隴之象而三部九候之脈相失而相減矣岐伯曰審捫循三部九候之盛虛而調之審者審其病捫者切其脈盛者邪氣盛虛者正氣虛調之者補其正而卻其邪也察其左右上下相失及相減者審其病臟以期之左右上下謂左右手足膺喉頭首腰尻以下也邪氣入深則傷五臟九候之脈九臟之神氣也臟氣受傷是以脈氣減失審其病在神臟形臟而以死生期之蓋在形臟者生在神臟者有生而有死期也朱衛公曰九候之相應也上下若一不得相失減者脈細也不知三部者陰陽不別天地不分地以候地天以候天人以候人經云用針之要在於知調陰與陽調陰與陽精氣乃光合神與氣使神內藏夫天為陽地為陰人則參天兩地者也故身半以上為天身半以下為地然陰中有陽陽中有陰是以上部有地下部有天不知三部者陰陽不別天地不分以上為天以下為地以中為人調之中腑以定三部中腑胃腑也蓋三部陰陽之脈皆陽明水穀之所資生太陰為之行氣於三陰陽明為之行氣於三陽陽者天氣陰者地氣陰氣從足上行至頭陽氣從頭下行至足陰陽異位外內逆從土者生萬物而法天地故當調之中腑以定三部之脈焉徐公遐曰是以三部之中皆有陽明之胃氣詳三部九候論故曰刺不知三部九候病脈之處雖有大過且至工不能禁也大過且至者歲運之氣至也蓋用針之道當知三部九候合之四時五行加臨相勝而各治之不知三才之合氣九候之交通雖有太過之氣且至而五治不分邪僻內生工不能禁也按帝問曰平氣何如伯曰無過者也蓋太過不及之歲皆勝氣妄行故曰太過平氣之歲為無過也誅罰無過命曰大惑反亂大經真不可復用實為虛以邪為真用針無義反為氣賊奪人正氣以從為逆榮衛散亂真氣已失邪獨內著絶人長命豫人夭殃不知三部九候故不能久長此言不知三部九候者不分真邪不知虛實不審逆從賊害真氣與人夭殃蓋用針之道有如用兵務在殺賊不害良民無義之兵征伐無過反亂大經因不知合之四時五行因加相勝釋邪攻正絶人長命此言不知三部九候者因而不知合於四時五行之道六氣之加臨五運之相勝邪反釋之正反攻之則絶人長命矣邪之新客來也未有定處推之則前引之則止逢而瀉之其病立已再言之者言乘風邪新客未定之時即當逢而瀉之慎勿使真邪之相合也通評虛實論篇第二十八黃帝問曰何謂虛實此亦承上章而復問也岐伯對曰邪氣盛則實精氣奪則虛邪氣者風寒暑濕之邪精氣者榮衛之氣也蓋邪氣有微盛故邪盛則實正氣有強弱故精奪則虛奪失也或為邪所奪也帝曰虛實何如岐伯曰氣虛者肺虛也氣逆者足寒也非其時則生當其時則死伯言虛實者皆從物類始如肺主氣其類金五行之氣先虛於外而後內傷五臟蓋邪從表入里在外之氣血骨肉先為邪病所虛是以骨肉滑利則邪不內侵而里亦實表氣虛則內傷五臟而里亦虛此表裡之虛實也如氣逆於上則下虛而足寒此上下之虛實也如值其生旺之時則生當其勝克之時則死此四時之虛實也餘臟皆如此夫肝主筋其類木心主血其類火脾主肉其類土肺主氣其類金腎主骨其類水蓋五臟之氣外合於五行五行之氣歲應於四時故皆有生旺克勝之氣而各有死生之分帝曰何謂重實岐伯曰所謂重實者言大熱病氣熱脈滿是謂重實重平聲大熱者邪氣盛也氣為陽血脈為陰邪盛而氣血皆傷故為重實此論血氣之陰陽虛實也徐公遐曰重實則其中有重虛故上文曰虛實何如下文曰夫虛實者帝曰經絡俱實何如何以治之此論經絡之陰陽虛實也夫膚腠氣分為陽經絡血分為陰然經絡又有深淺陰陽之別所謂陽中有陰陰中有陽也岐伯曰經絡皆實是寸脈急而尺緩也皆當治之邪盛於經則寸口脈急緩為內熱熱在於絡則尺脈緩也皆當以針取之此以寸尺而候血脈之陰陽也故曰滑則從澀則逆也滑主氣血皆盛故為從澀主血氣皆少故為逆朱聖公曰故曰者為陰陽血氣邪正而言也夫虛實者皆從其物類始故五臟骨肉滑利可以長久也五行者天地之陰陽也五臟者人之陰陽也易曰方以類聚物以群分皮肉筋骨五臟之外合也金木水火土五臟之外類也夫邪之中人始於皮膚次於肌肉留而不去則入於經脈以及於筋骨故邪之中人先從其物類始是以壯者之血氣盛其肌肉滑氣道通榮衛之行不失其常可以長久其天命如五臟不堅使道不長空外以張數中風寒血氣虛脈不通真邪相攻亂而相引故不壽而盡也徐公遐曰邪氣實則正氣虛故曰夫虛實者朱聖公曰此復結首章之義張兆璜曰此篇論邪實者先從外而內正虛者亦先外而內如木敗者先葉落而後枝枯故用診尺之法診尺之法先從外而內也帝曰絡氣不足經氣有餘何如不足者精氣奪有餘者邪氣盛此邪去絡而入於經也岐伯曰絡氣不足經氣有餘者脈口熱而尺寒也此論經絡之氣虛實也寒熱者尺寸之膚寒熱而應於經絡也絡脈外連皮膚為陽主外經脈內連臟腑為陰主內經云榮出中焦衛出下焦衛氣先行皮膚先充絡脈絡脈先盛衛氣已平營氣乃滿而經脈大盛經脈之虛實也以氣口知之故以尺膚候絡而以寸候經秋冬為逆春夏為從治主病者夫邪氣之從外而內猶藉正氣之從內而外以扞禦使邪仍從膚表而出秋冬之氣降沉不能使邪外散故為逆春夏之氣生浮故為從也邪病在經當從其經而取之此論外因之虛實也帝曰經虛絡滿何如此論內因之虛實也岐伯曰經虛絡滿者尺脈滿脈口寒澀也尺脈熱滿故主絡滿脈口寒澀故主經虛此春夏死秋冬生也春夏之氣生長於外氣惟外弛而根本虛脫故死秋冬之氣收藏於內故生蓋外因之病宜神機外運內因之病宜根本實堅帝曰治此者奈何岐伯曰絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽絡為陽經為陰刺者瀉其盛滿之氣灸者啓其陷下之陽蓋不足者病而太過者亦為病也帝曰何謂重虛此論脈氣皆虛也上節論經絡之實即可類推於虛此篇論氣分之虛亦可類推於實岐伯曰脈氣上虛尺虛是謂重虛血者神氣也榮氣宗氣行於脈中衛氣行於脈外故曰脈氣蓋以氣口之脈可以候血而可以候氣也上虛者寸口之脈氣虛也尺虛者脈氣虛於下也上下皆虛故曰重虛朱永年曰氣逆於上而足寒者上實下虛也此上下皆虛故謂重虛帝曰何以治之謂何以補其虛也岐伯曰所謂氣虛者言無常也尺虛者行步恇然恇音匡氣者謂陽明所生之榮衛宗氣也經曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行榮衛之道其大氣之搏而不行者積於胸中命曰氣海出於肺循喉嚨以司呼吸是陽氣者陽明之所生也言無常者宗氣虛而語言無接續也針經曰盡瀉三陽之氣令病人恇然恇虛怯也謂陽明之氣虛於上則言語無常陽明之氣虛於下則令人行步恇然蓋氣從太陰出注手陽明上行注足陽明下行至跗上故曰身半以上手太陰陽明皆主之身半以下足太陰陽明皆主之按帝問何以治之而伯答以所病之因蓋知陽氣生始之原則知所以治矣此論後天之主氣也針經曰用針之類在於調氣氣積於胃以通榮衛各經其道宗氣流於海其下者注於氣街其上者走於息道故厥在手足宗氣不下脈中之血凝而留止徐公遐曰此注當與九候論之地以候胸中之氣注合參脈虛者不象陰也氣為陽血脈為陰陽明之生氣為陽少陰之精氣為陰蓋言以寸尺之脈以候陽明之生氣而不效象其陰之虛也朱聖公問曰上節以尺膚而候絡脈之陰此以寸尺之脈而候氣分之陽豈以皮膚候血脈而反以脈候氣耶曰經言善調尺者不待於寸脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩蓋陰陽虛實之氣由臟腑而達於經脈由經脈而出於膚表以尺膚之緩急滑澀而候臟腑血氣之虛實者是猶以色診也上節以絡脈在皮之部故以尺膚審之此候脈氣之虛實故以寸尺之脈診也論疾診尺篇曰尺膚寒其脈小者泄少氣是尺膚尺診皆可以候氣候血也診候之道通變無窮不可執一而論惟會心者明之張兆璜曰此節論榮衛宗氣之生於陽明言氣虛之脈不象陰虛之少精血如此者滑則生澀則死也夫氣生於陽明而發原在腎少陰之氣上與陽明相合陰陽相搏其脈則滑搏則化水穀之精微而氣生矣故主生澀主少氣生原已絶故死帝曰寒氣暴上脈滿而實何如岐伯曰實而滑則生實而逆則死此承上文之意而復問也蓋脈氣生於胃腑而發原在於少陰是以上節論生氣之原此以下復論發原之始夫腎臟主水在氣為寒寒氣暴上者水寒之氣暴上而滿於脈也實而滑者得陽明之氣相和故生逆者少陰之生氣已絶故死蓋寒氣上乘則真氣反下逆矣平脈篇曰少陰脈弱而澀弱者微煩澀者厥逆謂少陰之氣不生而手足逆冷也王子方曰水寒之氣暴上曰脈滿而實少陰之氣暴上而曰脈實滿陰寒之氣皆實滿於脈而各有意存焉朱聖公曰水寒之氣暴上則少陰之真氣不升故先論其寒氣而後論其真氣後又復論其水氣也帝曰脈實滿手足寒頭熱何如岐伯曰春秋則生冬夏則死腎主生氣之原膀胱為太陽之府脈實滿者少陰之寒氣充於外也手足寒者少陰之生氣虛於內也頭熱者太陽之氣發越於上也腎與膀胱陰陽並交咸主生氣若盛於外則反虛於內矣春時陽氣微上陰氣微下秋時陰氣微上陽氣微下陰陽二氣交相資生故主生冬時陰氣盡出於外夏時陽氣盡虛於內故主死言陰陽之根氣不可虛脫者也徐公遐曰是以聖人春夏養陽秋冬養陰以從其根王芳侯曰少陰之氣上與陽明相合化生榮衛行於脈中若真陰之氣直溢於脈則反虛其根矣脈浮而澀澀而身有熱者死脈浮而澀陰越於外而虛於內也澀而身熱陽脫於內而弛於外也此復言陰陽之根氣脫者皆為死證非但冬夏死而春秋可生上節論無形之水氣溢於脈中故脈滿而實下節論有形之水邪溢於脈外故形盡滿水氣溢者少精血故宜脈滑水邪溢者生氣衰故宜手足溫此論下焦之生氣外脫帝曰其形盡滿何如腎為水臟在氣為寒上節論寒氣暴上此復論其水體泛溢故其形盡滿也形謂皮膚肌腠蓋經脈之內有有形之血是以無形之氣乘之肌腠之間主無形之氣是以有形之水乘之而為腫脹也岐伯曰其形盡滿者脈急大堅尺澀而不應也諸急為寒寒水充溢於形身故脈急而堅大水邪外溢則少陰之正氣不升故尺澀而不應也靈樞經曰脈堅大以澀者脹也如是者故從則生逆則死夫少陰之氣從下而上合於陽明戊癸合而化火火土之氣故有如是之證者得少陰之氣仍從下而上者生逆而下者死帝曰何謂從則生逆則死岐伯曰所謂從者手足溫也所謂逆者手足寒也手足溫者少陰之生氣復也生氣復則火土之氣漸旺水寒之邪漸消手足寒者少陰之生氣已絶故死以上論生陽之氣發原於下焦如寒水之邪實則真陰之氣虛帝曰乳子而病熱脈懸小者何如夫病熱者皆傷寒之類也凡傷於寒藉陽氣以化熱熱雖盛不死然陽氣生於精水之中男子八歲女子七歲腎氣始實乳子天癸未至腎氣未盛故帝復有此問焉夫心主脈而資生於腎心腎水火之氣上下時交腎氣不能上資於心則心懸如病飢而寸口之脈懸絶小者腎氣未盛也岐伯曰手足溫則生寒則死伯答乳子之生陽藉後天之氣也四肢皆稟氣於胃故陽受氣於四末是以手足溫者胃氣尚盛故生寒則胃氣已絶故死夫水穀入於胃津液各走其道腎為水臟受五臟之精而藏之是先天之精猶藉後天之所資益者也又別出兩行榮衛之道其大氣之搏而不行者名曰宗氣積於胸中上出於肺以司呼吸是四肢之原俞又受資於胃腑所生之榮衛宗氣是以手足溫者生寒者死朱永年曰當知少陰陽明之氣皆主手足之寒溫醫者不可不審帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死此復論後天所生之宗氣而亦不可傷也宗氣者五臟六腑十二經脈之宗始故曰宗氣肩息者呼吸搖肩也風熱之邪始傷皮毛喘鳴肩息是風熱盛而內干肺氣宗氣故脈實大也夫脈之所以和緩者得陽明之胃氣也急則胃氣已絶故死徐公遐曰水穀之精雖藉先天之氣以生化然先天之氣又藉水穀之精以相資是以天癸至腎氣盛齒髮長筋骨堅皆受後天之養非但於乳子也故復設此問焉上節論下焦之根氣此論上焦之生氣皆由中焦之所生帝曰腸澼便血何如岐伯曰身熱則死寒則生上節言氣之虛實此復論其血焉腸澼者邪僻積於腸間而為便利也經言陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則便血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則合併凝聚而積成矣是以腸澼便血者陰絡之血溢也腸澼下白沫者腸外之寒汁沫也腸澼下膿血者汁沫與血相搏併合而下者也夫便血陰泄於內也發熱陽脫於外也本經曰陰陽虛腸澼死此陰陽血氣之相離也朱聖公問曰靈樞經論恐為積聚而言也曰百病之生也皆起於內傷外感不外乎氣血陰陽如留蓄於腸外則為五積便痢則為下積矣帝曰腸澼下白沫何如岐伯曰脈沉則生脈浮則死下白沫者陰液下注故脈沉者為順如脈浮是經氣下泄脈氣上浮此經脈相離故為死證帝曰腸澼下膿血何如岐伯曰脈懸絶則死滑大則生夫血脈始於足少陰腎生於足陽明胃主於手少陰心輸於足太陰脾懸絶者足少陰之陰液絶也滑大者足少陰之生氣盛也帝曰腸澼之屬身不熱脈不懸絶何如岐伯曰滑大者曰生懸澀者曰死此復申明血氣之生原又重在陽明之胃氣也身不熱者陽不外脫也脈不懸絶陰不下絶也懸澀者陽明之生氣已脫故死辨脈篇曰趺陽脈浮而澀故知脾氣不足胃氣虛也懸則胃氣絶矣以臟期之胃氣已絶則真臟之脈見矣故當以臟期之肝至懸絶十八日死心至懸絶九日死肺至懸絶十二日死腎至懸絶七日死脾至懸絶四日死懸絶者絶無陽明之胃氣而真臟孤懸也帝曰癲疾何如岐伯曰脈搏大滑久自已脈小堅急死不治此論五臟之外合為病而有虛實也靈樞經曰肺脈急甚為癲疾腎脈急甚為骨癲疾又曰骨癲疾者顑齒諸俞分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治筋癲疾者身倦攣急嘔多沃沫氣下泄不治脈癲疾者暴僕四肢之脈皆脹而縱嘔多沃沫氣下泄不治是肺合之形腎合之骨心合之脈肝合之筋為病於外而有死生之分脈搏大者氣盛於外故生小堅急者氣泄於下故死帝曰癲疾之脈虛實何如岐伯曰虛則可治實則死經曰重陰則癲蓋癲乃血實之證故治癲疾者瀉出其血置於瓠壺之中是以脈堅實者死脈滑大者生上節之大小者論氣之虛實此言血脈之虛實蓋癲乃陰盛之病故宜氣盛而不宜血實也帝曰消疸虛實何如岐伯曰脈實大病久可治脈懸小堅病久不可治此論五臟之內因而有虛實也少俞曰五臟皆柔弱者善病消疸消疸者五臟之精氣皆虛轉而為熱熱則消肌肉故為消疸也脈實大者精血尚盛故為可治脈懸小者精氣漸衰故為難治上節論五臟之外實此論五臟之內虛靈樞病形篇五臟之脈微小為消疸朱永年曰癲疸之病皆曰久者蓋癲因久實疸因久虛之所致也帝曰形度骨度脈度筋度何以知其度也此言五臟之外合各有度數而應於四時者也經曰形寒飲冷則傷肺謂皮毛膚腠為形而內合於肺者也骨者腎之合脈者心之合筋者肝之合然皆有淺深俞穴之度數帝問何以知其度而刺之乎帝曰春亟治經絡夏亟治經俞秋亟治六腑冬則閉塞閉塞者用藥而少針石也伯言五臟之氣合於四時而刺度之各有淺深也亟急也春氣生升故亟取絡脈夏取分腠故宜治經俞蓋經俞隱於肌腠間也治六腑者取之於合也胃合於三里大腸合入於巨虛上廉小腸合入於巨虛下廉三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉蓋五臟內合於六腑六腑外合於原俞秋氣降收漸入於內故宜取其合以治六腑也冬時之氣閉藏於內故宜用藥而少針石蓋針石治外毒藥治內者也帝曰當作岐伯曰所謂少針石者非癰疽之謂也此論癰疽之虛實也言癰疽之患榮衛血氣並實皮肉筋骨皆傷非若四時之有淺深冬時之少針石也癰疽不得頃時回癰者擁也疽者阻也謂熱毒外壅內阻宜即刺之不得遲延時頃而使邪毒之回轉也癰不知所按之不應手乍來乍已刺手太陰旁三痏與纓脈各二痏音賄此言癰毒之在氣分者宜刺手太陰足陽明也毒在氣分故癰不知所毒氣流傳故脈按之不應手而乍來乍已也腋內動脈手太陰也名曰天府宜刺太陰動脈之旁各三痏手太陰之主氣也痏者皮膚腫起之象言刺在絡脈之旁皮膚之間氣隨針出而針眼微腫如小瘡故曰痏也蓋皮膚溪谷之間亦有三百六十五穴會毒在氣分故宜刺在皮膚而不刺經絡也纓脈結纓處兩旁之動脈人迎穴間乃衛氣別走陽明之道路也四時氣篇曰風㽷膚脹為五十七痏取皮膚之血者盡取之掖癰大熱刺足少陽五刺而熱不止刺手心主三刺手太陰經絡者大骨之會各三此言癰毒之在血分者宜刺足少陽手心主也掖癰者謂在兩旁之腋間足厥陰少陽之分也經云陽氣有餘榮氣不行乃發為癰陰陽不通兩熱相搏乃化為膿毒在血分故大熱也厥陰主血故從其所合而瀉之如刺之而熱不止者宜刺手心主之脈以瀉之心主主火而主血脈也本輸篇曰腋下三寸手心主也名曰天池蓋宜刺此也夫肺朝百脈而主行榮衛陰陽若欲刺手太陰之經絡者宜刺在大骨之會各三謂臂骨交會之處尺澤間也骨之大會曰谷絡脈之滲灌諸節者也暴癰筋緛隨分而痛魄汗不盡胞氣不足治在經俞緛軟同此言癰毒之在筋骨間者宜刺其經俞也暴癰者言毒氣更深為毒凶暴筋緛者筋為熱邪所傷也隨分而痛者在於分肉之處而痛謂不腫痛於外而隱然痛於內也熱毒在深故表汗不出骨傷髓消故胞氣不足也宜治在經俞者隨其所痛之處而深取之也夫癰毒之患或外因風寒之邪或內因喜怒不測五臟外合之皮肉筋骨胃腑所生之榮衛血氣皆為邪毒盛而正氣虛故當審其陰陽虛實以刺之也張兆璜曰皮肉筋骨皆傷故為暴癰皮傷故魄汗不盡骨傷故胞氣不足腹暴滿按之不下取手太陽經絡者胃之募也少陰俞去脊椎三寸旁五用圓利針此論中焦之虛實也經云胃病者腹脹滿腹暴滿而按之不下胃之實證也宜取手太陽之經絡太陽之絡乃胃之募也蓋小腸為受盛之府故從手太陽以瀉其胃焉又腎者胃之關也關門不利則聚水而為脹故曰當刺足少陰之俞焉手太陽之絡名曰支正在上腕五寸間足少陰之俞在脊下第十四椎兩旁各開一寸五分故曰三寸旁也圓利針者且圓且利以取暴氣者也或曰脊椎兩旁各開三寸名曰志室亦足少陰之俞也霍亂刺俞旁五足陽明及上旁三霍亂者胃為邪干胃氣虛逆也夫陽明胃土藉足少陰之氣以合化故宜刺少陰俞旁以補之五者追而濟之漸至於骨也又及上刺陽明俞旁三三者先淺刺絶皮以出陽邪後刺深之以出陰邪最後極深入於分肉之間以致穀氣邪氣出而穀氣至則胃氣和而霍亂止矣上節用瀉故曰圓利此法用補故不去針徐公遐曰取足少陰者當刺骨三刺而至分肉是五則至骨矣刺癇驚脈五此論刺五行之實證也癇驚者癇瘈筋攣或外感六氣或內傷七情或飲食生痰或大驚卒恐病涉五臟五行故當取其五脈徐公遐曰病涉五行故有作豬犬牛羊之鳴者針手太陰各五刺經太陽五刺手少陰經絡旁者一足陽明一上踝五寸刺三針按九針之制皆所以瀉邪者也此刺五脈之實故首句曰針手太陰末句曰刺三針謂當以針瀉之而不宜補之也針手太陰瀉金實也針太陽五瀉水實也針手少陰瀉火實也針足陽明瀉土實也上踝五寸乃足少陽光明穴刺三針以瀉木實蓋臟腑相連陰陽相合故或刺臟之經或瀉腑之絡朱永年曰心肺居上為陽故從臟肝胃脾居下為陰故從腑蓋五脈之陰邪宜從陽以瀉出朱聖公曰太陽不言手足知其為手乎為足乎曰上文曰手太陰下文曰手少陰則其為足也可知若接上句而為手太陽則下句不必復雲手矣五刺之中曰手曰足曰太陽曰足上宜細玩之正見其經言錯綜之妙凡治消疸僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也隔塞閉絶上下不通則暴憂之病也暴厥而聾偏塞閉不通內氣暴薄也不從內外中風之病故瘦留著也跖跛寒風濕之病也此言百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破散經絡厥絶脈道不通陰陽相逆衛氣稽留經脈空虛血氣不次乃失其常故有為消疸癲僕諸證然皆有表有里有實有虛更貴更賤或逆或從皆當詳審其臟腑經俞三部九候而治以補瀉也凡治消疸五臟之內虛也僕擊癲癇之外實也偏枯邪氣之在上也痿厥清氣之在下也氣滿發逆濁氣之在中也貴人者形樂而肌膚盛重在貴人則為膏粱之濁溜於腸胃以致氣滿而發逆也隔塞閉絶中焦之氣不通也上下不通上下之氣閉塞也憂郁也三焦不通五郁之為病也暴厥而聾厥氣上逆上竅不通也偏塞閉結厥氣下逆下竅不通也此內氣暴薄而為外竅之不通也如不從內之憂怒外之中風而多病夭者此緣形弱氣衰牆基卑薄故肌肉瘦而皮膚薄著也跖足也跛行不正而偏費也此風寒濕邪皆能為此疾也夫陽受風氣陰受濕氣傷於風者上先受之傷於濕者下先受之然陽病者上行極而下陰病者下行極而上是以跖跛之疾亦有因風邪之所致蓋言邪隨氣轉而外內上下之無常也此言百病之生皆有虛有實然總不外乎內因於七情飲食外因於暑濕風寒及不內外因之瘦留薄著也徐公遐曰跖跛為風寒濕之病者乃反結邪氣在上清氣在下之義知跖跛之有風邪則知偏枯之亦有濕邪矣黃帝曰黃疸暴痛癲疾厥狂久逆之所生也五臟不平六腑閉塞之所生也頭痛耳鳴九竅不利腸胃之所生也此言臟腑陰陽表裡上下交相輸應者也如黃疸者濕熱內鬱而色病見於外也暴痛者五臟之氣不平卒然而為痛也癲疾厥狂陰陽偏勝之為病也此皆陰陽五行之氣久逆不和之所生也夫五臟之氣久逆而不得和平者六腑閉塞之所生也六腑不和則九竅為之不利蓋臟腑陰陽表裡相應是以證見於外者病本於內閉塞於內者而外竅為之不通蓋言百病之生總不外乎表裡陰陽血氣虛實讀者無僅視為疸疸癲癇癰疽腸澼之虛實可也徐公遐曰此節照應首節氣虛者肺虛也之義首節論邪病之從外而內此節言凡病之從內而外張兆璜曰伯謂虛實皆從物類始帝言凡病由於內生君臣反復咨論各有其道此篇論血氣之生始出入外內虛實乃醫學之大綱學者宜細心體認太陰陽明論篇第二十九黃帝問曰太陰陽明為表裡脾胃脈也生病而異者何也按此篇乃總結三部九候十二經脈榮衛血氣皆陽明胃氣之所資生足太陰之所輸轉太陰為之行氣於三陰陽明為之行氣於三陽通於四時施於四體是以帝問其病而伯答以陰陽順逆之道焉岐伯對曰陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名也陰陽異位者謂太陰居上陽明居下也更虛更實者謂陽道實陰道虛然陽中有陰陰中有陽也更逆者謂喉主天氣咽主地氣陰氣至頭陽氣至足也更從者謂天氣主外地氣主內陽受風氣陰受濕氣也或從內者或因於飲食不節起居不時而為腹滿飧泄之病或從外者或因於賊風虛邪而為身熱喘呼故其病異名也蓋言陰陽二氣總屬陽明之所生一陰一陽分而為三陰三陽三陰三陽分而為十二經脈三部九候之中各有天各有地此皆陰陽互交上下相貫土生萬物而法天地者也帝曰願聞其異狀也狀形象也謂無形之氣象有形之形身岐伯曰陽者天氣也主外陰者地氣也主內天包乎地故陽外而陰內故陽道實陰道虛陽剛陰柔故陽道常實陰道常虛繫辭曰陰陽之義配日月白虎通曰日之為言實也常滿有節月之為言缺也有滿有缺也所以有缺何歸功於日也徐公遐曰太陰之所以灌溉於臟腑者著胃土之精也故犯賊風虛邪者陽受之食飲不節起居不時者陰受之賊風賊害之風虛邪不正之邪也陽氣主外故主受風邪言邪氣之在上也飲食勞倦則傷脾故陰受之言濁氣之在中也陽受之則入六腑陰受之則入五臟六腑為陽故陽受之邪入六腑五臟為陰故陰受之邪入五臟各從其類也入六腑則身熱不時臥上為喘呼入六腑者謂陽明為之行氣於三陽陽明病則六腑之氣皆為之病矣陽明主肉故身熱不時臥者謂不得以時臥也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其故道故不得臥也下經曰胃不和則臥不安此之謂也陽明氣厥則上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼䐜音嗔入五臟者謂太陰為之行氣於三陰太陰病則五臟之氣皆為之病矣䐜脹也脾氣逆則脹滿太陰為開開折則倉廩無所輸而為飧泄久則為腸澼矣故喉主天氣咽主地氣故者承上文而言臟腑陰陽之為病者總屬太陰陽明之所主也喉乃太陰呼吸之門主氣而屬天咽乃陽明水穀之道路屬胃而主地所謂陰陽異位是也公遐曰陰陽異位之道可得聞乎曰陰陽二氣總屬陽明水穀之所生清中之清者上出於喉以司呼吸所謂清陽出上竅也清中之濁者足太陰為之輸稟於四肢資養於五臟所謂清陽實四肢濁陰走五臟故經言足太陰獨受其濁陽明者土也位居中央故主地是在臟腑陰陽而言則太陰為陰陽明為陽在天地陰陽而言是受清者為天受濁者為地是以九候之中陽明與足太陰主地手太陰主天故陽受風氣陰受濕氣手太陰主氣而主皮毛故風氣乘之身半以下足太陰陽明皆主之故感地之濕氣故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足此言土者生萬物而法天地天氣下降地氣上升是以上下四旁無處不到蓋臟腑陰陽十二經脈之精神氣血皆中土之所生陰者注陰陽者注陽故曰陽病者上行極而下陰病者下行極而上此言邪隨氣轉也人之陰陽出入隨時升降是以陽病在上者久而隨氣下行陰病在下者久而隨氣上逆故傷於風者上先受之傷於濕者下先受之上先受之者言邪氣之中人也高故邪氣在上也下先受之者言清濕地氣之中人也必從足始故清氣在下也帝曰脾病而四肢不用何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也胃為陽土脾屬陰土暢於四肢坤之德也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉四肢者五臟六腑之經俞也經云人之所受氣者谷也谷之所注者胃也胃者水穀之海也海之所行雲氣者天下也胃之所出血氣者經隧也經隧者五臟六腑之大絡也蓋四肢受水穀之氣者由脾臟之轉輸脾之轉輸各因其臟腑之經隧而受氣於陽明是以脈道不利則筋骨肌肉皆無氣以生養矣帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也春夏秋冬肝心肺腎之所主也土位中央灌溉於四臟是以四季月中各王十八日是四時之中皆有土氣而不獨主於時也五臟之氣各主七十二日以成一歲脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也此言脾之所以長旺於四臟者得胃土之精也陰陽並交雌雄輸應故能生萬物而法則天地交會於上下分王於四時帝曰脾與胃以膜相連耳而能為之行其津液何也膜募原也言有形之津液不能以膜相通岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰伯言太陰之為胃行其津液者由經脈之相通也太陰者三陰也三陰者至陰也以其陰之至故能行氣於三陰也其脈貫胃屬脾上膈絡嗌臟腑之經絡相通故能為胃行其津液陽明者表也五臟六腑之海也亦為之行氣於三陽陽明者表陽也為五臟六腑之海亦為之行氣於三陽如海之行雲氣於天下也臟腑各因其經而受氣於陽明故為胃行其津液四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉此復言三陰三陽所以受氣於太陰陽明者氣也如臟腑四肢受水穀之津液者各因其經脈而通於太陰陽明也故反復以申明之朱衛公曰曰臟腑曰四肢蓋四肢之榮俞臟腑之經絡也陽明脈解篇第三十黃帝問曰足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而驚何也願聞其故此篇論陽明乃陽熱之經病則熱盛而為狂也陰陽系日月論曰寅者正月之生陽也主左足之少陽未者六月主右足之少陽卯者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合於前故曰陽明是陽明乃三陽合併陽熱獨盛之經矣夫三部九候之道總不外於臟腑陰陽血氣虛實是以通評虛實論曰癲疾曰厥狂曰癇驚蓋癲疾者三陰之實證也厥狂者三陽之熱狂也癇驚者陰陽五行之實邪也是以此篇復論其陽盛之狂焉朱永年曰五臟六腑十二經脈皆藉陽明水穀之所資生病則陽熱盛而津液竭矣岐伯對曰陽明者胃脈也胃者土也故聞木音而驚者土惡木也伯言陽明之所以熱盛者乃脈病也陽明之脈者乃胃之悍氣別走陽明悍熱之氣盛則胃腑之氣虛胃者土也故聞木音而驚者土惡木也帝曰善其惡火何也岐伯曰陽明主肉其脈血氣盛邪客之則熱熱甚則惡火此言三陽之氣主於皮膚肌腠之間邪客之而易於為熱也太陽之氣主皮毛陽明之氣主肌肉少陽之氣主胸脅言三陽之氣主於膚腠氣分之間者也夫邪之中人始於皮毛次於肌肉以及於經脈邪在肌腠則合於陽明氣分之陽入於經脈而陽明又多血多氣是以邪客之則熱熱甚則惡火也帝曰其惡人何也岐伯曰陽明厥則喘而惋惋則惡人此言胃絡之上通於心也惋驚恐貌厥氣上逆於肺則喘逆於心則驚經言陽氣入陰陰陽相搏則恐如人將捕之蓋陽明之熱上逆於少陰陰陽相搏則恐而惡人也帝曰或喘而死者或喘而生者何也岐伯曰厥逆連臟則死連經則生連謂臟腑經絡之相連也蓋手太陰之脈還循胃陽明之絡通於心如熱邪厥逆於上干於心肺之經而為喘惋者生干於心肺之臟則死矣帝曰善病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也此復問其病甚而為狂也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也經言陰者主臟陽者主腑陽受氣於四末陰受氣於五臟故四肢為諸陽之本陽盛則四肢實實則能登高矣蓋陽盛則升四旁俱盛故能升高帝曰其棄衣而走者何也岐伯曰熱盛於身故棄衣欲走也陽明之氣主肌肉故熱盛於身身熱故棄衣而走也傷寒論曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也蓋熱在外故不欲衣帝曰其妄言罵詈不避親疏而歌者何也岐伯曰陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也胃絡上通於心陽盛則心神昏亂故使人妄言罵詈不避親疏如熱盛於胃則不欲食不飲食故妄走蓋四肢稟氣於胃故也此言熱盛於形身之外內上下而見證之各有不同焉以上十一篇論三部九候之道各有天各有地各有人有寒熱陰陽有臟腑虛實故曰土者生萬物而法天地是以末結脾胃之陰陽並交雌雄輸應而並論陽明之實證焉
