body:
  text: 卷五熱論篇第三十一黃帝問曰今夫熱病者皆傷寒之類也此論熱病故篇曰熱論蓋論外因之熱病也太陽之氣主表陽明之氣主肌凡外淫之邪始傷表陽皆得陽氣以化熱故曰凡病熱者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也不知其解願聞其故六日氣周七日來復死於六七日之間者六經之氣已終而不能復也愈於十日以上者七日不作再經十三日六氣已復故愈岐伯對曰巨陽者諸陽之屬也巨大也屬會也謂太陽為諸陽之會其脈連於風府故為諸陽主氣也風府穴名在腦後髮際內一寸乃督脈陽維之會督脈者總督一身之陽與太陽之脈挾背下行言太陽之氣生於膀胱出於胸脅升於頭項主於膚表太陽之脈起於睛明會於風府挾督脈循行於背經氣皆陽故為諸陽主氣人之傷於寒也則為病熱熱雖甚不死為者謂太陽之氣為之也太陽標陽而本寒天之寒邪始病太陽之氣者同氣相感也得太陽標陽之化是以則為病熱所謂病反其本得標之病治反其本得標之方言本寒邪而反為熱病反以涼藥治之是病太陽之標熱而不病天之陰寒是以熱雖甚不死也其兩感於寒而病者必不免於死傷寒一日太陽受之二日陽明三日少陽是陰寒之邪得陽氣以化熱雖傳入於三陰而亦為熱病七日來復於太陽不作再經而其病自愈若兩感於寒者陰陽交逆榮衛不通故不免於死帝曰願聞其狀狀形象也傷寒之邪病三陰三陽之氣而兼涉於皮膚肌絡之形層故曰狀者謂無形之氣象有形之形層岐伯曰傷寒一日巨陽受之故頭項痛腰脊強太陽之氣主皮毛故傷寒一日太陽受之陽氣在上故頭項痛背為陽故腰脊強此言始病太陽之氣也傷寒一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰七日來復於太陽者此六氣之相傳不涉有形之經絡故首論太陽而不言太陽之經也然傷寒為病變幻無常有病在六氣而不涉六經者有經氣之兼病者有氣分之邪轉入於經者為病多有不同是以太陽只言氣而不言經陽明少陽兼經氣而言也倪沖之曰有云素問言其常而常中有變在焉二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也陽明之氣主肌肉身熱者病陽明之氣也病雖在氣而陽明之脈挾鼻絡目而屬胃故有目疼鼻乾之形證胃不和故不得臥也楊君立問曰六經傷寒既病在氣奚復見有形之證曰太陽曰陽明者謂無形之氣也以有形之病證無形之氣非實病於經也若邪在經則溜於腑不復再傳少陽及三陰矣三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾少陽之氣主樞主膽膽氣升則諸陽之氣皆升所謂因於寒欲如運樞也諸陽之氣從樞脅而出於膚表太陽主表陽明主肌少陽主胸脅胸脅痛而耳聾者病在氣而見有形之經證也三陽經絡皆受其病而未入於臟者故可汗而已臟者里也陰也言三陽之經絡皆受三陽邪熱之病然在形身之外而未入於裡陰可發汗而解也四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾六經之脈皆外絡形身內連臟腑三陰之脈言內而不言外者謂傷寒之邪隨陰氣而循於內也楊君立曰即此可見病在氣而見於經證也五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六氣相傳雖入於裡陰而皆為熱證故燥渴也六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮厥陰木火主氣故煩滿脈循陰器故囊縮也三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣夫經絡受邪則內干臟腑此言六氣相傳而經脈亦病是以榮衛不行臟腑皆傷而為死證也其不兩感於寒者七日巨陽病衰頭痛少愈此所謂兩感者承上文而言榮衛血氣皆傷以致臟腑俱病故不免於死若止於氣分相傳六日已周七日來復於表陽則太陽之病氣漸衰而頭痛少愈矣八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣傷寒之邪為毒最厲故曰大氣邪氣漸衰則正氣漸復矣帝曰治之奈何岐伯曰治之各通其臟脈病日衰已矣臟脈謂手足三陰三陽之經脈病傳六氣故當調其六經經氣相調則榮衛運行而不內干臟腑矣其未滿三日者可汗而已其滿三日者可泄而已前三日在陽分故當從汗解後三日在陰分故當從下解此言六氣相傳表裡陰陽之大概耳然傷寒有病傳者有不傳者有八九日仍在表陽而當汗者有二三日邪中於里陰而當急下者此又不在陰陽六氣之常法也帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺也傷寒論曰大病瘥後勞復者枳實梔子湯主之若有宿食者加大黃如博棋子五六枚蓋因傷寒熱甚之時而強食其食故有宿食之所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺也傷寒論曰病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈謂其餘熱未盡而強增穀食也此即復釋上文之意帝曰善治遺奈何岐伯曰視其虛實調其逆從可使必已矣夫邪之所湊其正必虛正氣虛者補其正氣餘熱未盡者清其餘邪傷寒論曰傷寒瘥已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉者以下解之此之謂調其逆從也帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也少愈者邪熱未盡也肉謂豕肉豕乃水畜其性躁善奔蓋天之寒邪即太陽寒水之氣邪未盡而食以豕肉是動吾身之寒以應病之餘熱似猶寒傷太陽而復病也此言天之六淫與人之六氣相合者也水畜之肉其性寒冷是以多食則遺帝曰其病兩感於寒者其脈應與其病形何如岐伯曰兩感於寒者病一日則巨陽與少陰俱病則頭痛口乾而煩滿此復論陰陽兩感之為病也太陽與少陰相為表裡一日而陰陽俱受其邪是以見太陽之頭痛少陰之煩滿咽乾二日則陽明與太陰俱病則腹滿身熱不欲食譫言陽明與太陰為表裡故見太陰之腹滿陽明之身熱不欲食譫語三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死少陽與厥陰為表裡故見少陽之耳聾厥陰之囊縮而厥水漿不入穀氣絕也不知人者神氣傷也此臟腑皆病榮衛不行故盡氣終而死也倪沖之曰傷寒重在胃氣神氣胃氣已絕則水漿不入邪傷神臟則昏不知人即病在三陽亦系危證如兩感於寒而胃氣尚存神氣清爽者即不致於死也帝曰五臟已傷六腑不通榮衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣此言榮衛血氣臟腑精神皆陽明之所資生如胃氣先絕者不待六氣之終三日乃即死矣凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止此復論邪氣留連之熱病也凡傷於寒則為病熱者此即病之傷寒也如邪氣留連而不即病者至春時陽氣外出邪隨正出而發為溫病蓋春溫夏暑隨氣而化亦隨時而命名也伏匿之邪與汗共並而出故不可止之諸弟子問曰本篇論三陰三陽之脈皆屬足經是以有傳足不傳手之說蓋本諸此乎曰傷寒相傳病在三陰三陽之六氣蓋以六經配合六氣經之所循即氣之所至故兼論其脈非病在有形之經而可以計日相傳者也夫天為陽地為陰風寒暑濕燥火天之陰陽也木火土金水火地之陰陽也天之十干化生地之五行地之五行上呈天之六氣故在地為水在天為寒在地為火在天為暑在地為木在天為風在地為金在天為燥在地為土在天為濕故在天為氣在地成形形氣相感而化生萬物是以東方生風風生木木生酸酸生肝肝生筋南方生熱熱生火火生苦苦生心心生血中央生濕濕生土土生甘甘生脾脾生肉西方生燥燥生金金生辛辛生肺肺生皮毛北方生寒寒生水水生咸咸生腎腎生骨是人之形骸臟腑感在天無形之六氣在地有形之五行而生長成形者也是以人身有無形之六氣以配三陰三陽之經脈有有形之臟腑骨肉經脈皮毛以應在地之五行而三陰三陽之經氣又由五臟五行之所生此亦陰陽形氣之相合也是以有病在無形之氣而涉於有形之經者有病在有形之皮毛肌脈筋骨臟腑而涉於無形之氣者此形氣之相感也若夫傷寒之邪系感天之六氣故當於吾身之六氣承之病在六氣而六經之經脈應之此人與天地之氣相參合者也按六微旨大論曰上下有位左右有紀少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之太陽為諸陽主氣故先受邪是以一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰六日經盡七日來復而病氣即衰如七日不愈又從太陽而當作再經此病在無形之六氣故能六經傳遍而來復於太陽若病在有形之經脈此係轉屬一經之病而不相傳於別經者也再按同篇曰太陽之上寒氣治之中見少陰陽明之上燥氣治之中見太陰少陽之上火氣治之中見厥陰太陰之上濕氣治之中見陽明少陰之上君火治之中見太陽厥陰之上風氣治之中見少陽又曰太陽少陰從本從標少陽太陰從本陽明厥陰不從標本從乎中也故從本者化生於本從標本者有標本之化從中者以中氣為化也蓋太陽標陽而本寒少陰標陰而本熱此皆有寒熱之化故曰從本從標如天之寒邪即太陽之本氣而病在太陽之標陽得太陽陽熱之氣而反化為熱病是反天之本寒而反病標陽之熱所謂病反其本得標之病既病太陽標陽之熱而反以涼藥治之所謂治反其病得標之方此太陽之從標也如病在太陽而不得標陽之熱化則太陽經中有四逆湯及諸附子湯以救太陽之本寒此太陽之從本也如少陰經中有急下之大熱證此少陰之從本也有急溫之大寒證此少陰之從標也故曰太陽少陰從本從標如陽明感陽熱之悍氣則為大下之熱病如得中見陰濕之化則為汗出和平之緩證如厥陰得中見少陽之火化則為便利膿血之熱證如病本氣之陰寒則為手足厥逆之危證此皆寒熱陰陽之氣化者也本篇論太陽為諸陽主氣先受天之寒邪得太陽標陽以化熱即六經傳遍熱雖甚而不死故篇名曰熱病論蓋專論病熱之傷寒而不論傷寒之變證以其得太陽陽熱之氣化故也至如其脈連於風府循脅絡嗌皆病在無形之六氣而見有形之經證非太陽之脈可傳於陽明陽明之脈可傳於少陽少陽之脈可傳於三陰者也能明乎天地陰陽五行六氣之化庶可與論傷寒之為病諸生復問曰是傷寒之邪只病在足經而不病手經耶曰六臟六腑配合十二經脈十二經脈以應三陰三陽之氣然陰陽之氣皆從下而生自內而外故靈樞經云六腑皆出於足之三陽上合於手者也是以本經以三陰三陽之氣始應足之六經足之六經復上與手經相合刺熱篇第三十二肝熱病者小便先黃腹痛多臥身熱此論五臟之熱病夫五臟者五行之所生也天之十干化生地之五行人之十二經脈上應天之六氣傷寒之邪病三陰三陽之氣是以死於三日六日而愈以十二日也五臟之熱病病涉於五行是以死生皆繫於十干也病六氣者外因之邪病在肌形病五臟者內因之病傷五臟之神志靈樞經之所謂風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃病形也曰先者謂先有此內因之熱而先見是證也肝主疏泄故小便赤黃肝脈環陰器抵少腹而上故腹痛也肝藏魂魂傷故多臥木火主氣故身熱也此言內因之病始在氣分先下而上內而外也倪沖之曰先者謂先有此內熱之證而未與外熱交爭也熱爭則狂言及驚脅滿痛手足躁不得安臥熱爭者寒與熱爭也此言外淫之邪內干五臟與內因之熱交爭而為重病也外因之邪內干五臟者即陰陽應象論之所謂天之邪氣感則害人五臟是也蓋風寒之邪始傷皮毛留而不治則入於肌腠以及於經脈留而不治則內干五臟故曰治五臟者半死半生也與內因之熱交爭而為重病者即玉機論之所謂傳化有不以次入者憂恐悲喜怒令不得以其次故令人有大病者是也謂外感風寒之邪內傷五臟移皆有次又因五志內傷故令不得以次相傳致令人有大病也魂傷則狂言東方肝木其病發驚駭肝脈布脅肋故脅滿痛風木之熱甚故淫於四末也人臥則血歸於肝肝氣傷而不能納血故不得臥也王子方曰寒已化熱故曰熱爭庚辛甚甲乙大汗氣逆則庚辛死病在肝加於庚辛庚辛不死起於甲乙大汗者正勝邪而外出也氣逆者熱淫而反內逆也刺足厥陰少陽黃帝曰外因之病難易之治奈何伯高答曰形先病而未入臟者刺之半其日臟先病而形乃應者刺之倍其日此外內難易之治也夫形先病而未入臟者謂外因之邪未內入而與臟熱交爭也臟先病而形乃應者謂五臟之熱出於形身而與外熱相應也蓋邪並而逆於內者難治內熱出而外合於形身之間刺之易愈也楊元如曰此篇乃記述之書是當復引君臣問答以證之其逆則頭痛員員脈引沖頭也圓圓周轉也此言肝臟之熱發於外而與形熱相應熱甚而上逆於頭故頭痛而員轉也蓋三陽之脈上循於頭肝熱與少陽交爭因脈引而上衝於頭也當知病在氣者關於脈病在脈者關於氣脈氣之道大宜體會心熱病者先不樂數日乃熱心志在喜而恐勝之先不樂者為恐所傷也夫心為君主之官臟熱乃神志之病故獨舉心臟以申明五臟之熱乃五志之為病也熱爭則卒心痛煩悶善嘔頭痛面赤無汗外內交爭熱干神臟故卒然煩痛也少陰病者欲吐不吐故善嘔心為陽中之太陽故頭痛心之華在面故面赤心主血故無汗也董帷園曰論熱爭當在內因外因之證兼看壬癸甚丙丁大汗氣逆則壬癸死心病者加於壬癸壬癸不死起於丙丁逆則無起色矣刺手少陰太陽手少陰太陽相為表裡故宜刺二經以瀉其熱脾熱病者先頭重頰痛煩心顏青欲嘔身熱陰氣從足上行至頭故先頭重陽明之脈巡頰故頰痛也脾絡注心中故心煩而顏青熱邪干胃故欲嘔脾主肌肉故身熱也熱爭則腰痛不可用俯仰腹滿泄兩頷痛經云陽病者腰反折不能俯陰病者不能仰陽者天氣也主外陰者地氣也主內陰臟熱於內陽熱甚於外陰陽外內交爭故腰痛不可用俯仰也腹者脾土之郛郭故腹滿泄胃之悍氣上衝頭者循牙車下人迎故頷下痛也甲乙甚戊己大汗氣逆則甲乙死脾病者加於甲乙甲乙不死起於戊己如反逆而內干於臟則不能外出而汗解矣刺足太陰陽明足太陰陽明相為表裡肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱皮毛者肺之合臟氣熱於內故淅然寒慄於外而惡風寒蓋熱盛則寒也肺上連於喉嗌故舌黃臟真高於肺主行榮衛陰陽故身熱也熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒熱干肺臟故喘咳不得太息肺主胸中之氣氣傷故痛走胸背也五臟之應天者肺而手陽明之脈上循於頭故頭痛不堪熱爭於內故汗出而生寒也王冰曰肺之絡脈上會於耳中故頭痛不堪倪沖之曰肺臟居於胸中而俞在肩背丙丁甚庚辛大汗氣逆則丙丁死肺病者加於丙丁丙丁不死起於庚辛如氣逆則遇勝克之日即死矣刺手太陰陽明出血如大豆立已此言六經之刺皆宜瀉而不宜補者也肺乃五臟之長故舉肺以申明之腎熱病者先腰痛䯒痠苦渴數飲身熱腰者腎之府故先腰痛腎主骨故䯒痠腎為水臟津液不能上資故苦渴數飲也按五臟之熱病皆主身熱蓋內因之熱從內而外也五臟之熱爭多主內證蓋外淫之熱交爭於內也熱爭則項痛而強䯒寒且痠足下熱不欲言外熱在太陽則頭痛而強內熱在腎故䯒寒且痠足下熱者熱流陰股也不欲言者腎為生氣之原也其逆則項痛員員淡淡然其爭氣上逆則為項痛員員淡淡痛之微也膀胱者腎之府太陽為諸陽主氣其氣上升腎藏之熱隨太陽之氣而上衝於頭也此陰陽熱氣外內交爭一隨脈引一隨氣升皆陰出之陽故只頭痛而不死戊己甚壬癸大汗氣逆則戊己死腎病者加於戊己戊己不死起於壬癸從則外出於形身故汗出逆則內干於真臟故死刺足少陰太陽足少陰太陽相為表裡五臟六腑經氣之相通也諸汗者至其所勝日汗出也本氣旺日謂之所勝汗出則熱隨外泄而自愈矣所謂自得其位而起也按此節乃論經氣之兼證故曰大汗曰汗出蓋氣分之汗大經脈之汗微肝熱病者左頰先赤此言內因五志之熱病者必先見於色也五色之見各有其部肝屬木而位居東方故左頰先赤夫精明五色者氣之華也憂恐忿怒傷氣氣傷臟乃病臟今始見於色者尚在氣也故曰治未病未病者病未及於臟也心熱病者顏先赤五色篇曰闕者眉間也庭者顏也首面上於闕庭王宮在於下極心合火而位居南方故顏先赤顏額也脾熱病者鼻先赤土位中央故鼻先赤肺熱病者右頰先赤肺屬金而位居西方故右頰先赤腎熱病者頤先赤腮下謂之頤腎屬水而位居北方故頤先赤此後天之卦象也病雖未發見赤色者刺之名曰治未病臟氣熱於內必先見於色病雖未發者謂雖病而未與外熱交爭也見其色而即刺之名曰刺未病言臟氣病而形未應者當先刺之勿使榮交而為難治也熱病從部所起者至期而已此復申明五臟之熱先見於色者易愈也部面部也從部所起者如肝熱病左頰先赤至甲乙大汗而病已矣此病在五臟之本氣而不與外熱交爭故至期而愈如小便先黃腹痛身熱是涉於有形之形層將與外熱交爭而有反逆之危險矣其刺之反者三周而已重逆則死反者謂反逆為順也言不能治其未病以致外內交爭其氣反逆於內者急當以刺取之至三日而後已如再不急治使外內陰陽之熱重逆於內則死矣按伯高曰風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃應形此形氣外內之相應也帝曰刺之奈何伯高答曰病九日者三刺而已三刺者三周也九日者病久而外內交爭也諸當汗者至其所勝日汗大出也此言熱病從部所起者至期當自大汗而病已也勝日謂本氣勝旺之日如肝之甲乙心之丙丁諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也諸熱者謂表之三陽里之五臟外內之熱交爭也飲之寒水里之使寒也寒衣寒處表之使寒也以刺取之必俟其身寒而後止熱病先胸脅痛手足躁刺足少陽補足太陰此言外因之熱病在三陽者各有刺取之法也先胸脅痛者病發於少陽也足少陽主筋熱甚則筋急故手足躁擾靈樞經曰熱病手足躁取之筋間故當刺足少陽以瀉陽分之熱補足太陰以御外入之邪蓋邪在少陽三陽為晝太陰當受邪也病甚者為五十九刺病甚者陽熱甚而及於內也水熱穴論曰頭上五行行五者以越諸陽之熱也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也帝曰人傷於寒而傳為熱何也伯曰夫寒甚則生熱也此言凡傷於寒則為病熱熱甚於表陽而入於內者當為五十九刺也又按孔穴圓經無髃骨穴有肩髃穴又腰俞穴一名髓空熱病始手臂痛者刺手陽明太陰而汗出止身半以上手太陰陽明皆主之熱病始於手臂者病在上而發於陽也故當刺手陽明太陰手太陰之主表也熱病始於頭首者刺項太陽而汗出止始於頭首者太陽之為病也刺項者刺風池風府也太陽為諸陽主氣其脈連於風府故刺之而汗出乃止熱病始於足脛者刺足陽明而汗出止陽氣起於足五趾之表熱病始於足脛者發於陽而始於下也故當刺足陽明以取汗熱病身先重骨痛耳聾好瞑刺足少陰病甚為五十九刺此病發於陰而為熱病者當取足少陰也腎主骨而為生氣之原氣傷故身重腎開竅於耳故耳聾少陰病但欲寐故好瞑也病甚者亦當為五十九刺靈樞熱病篇曰熱病身重骨痛耳聾而好瞑取之骨以第四針五十九刺骨蓋足少陰主骨故取之骨也五十九刺骨者取骨空之穴也夫少陽少陰主樞熱在少陽者可入於裡陰熱在少陰者可樞轉而外出故在陰分陽分之病甚者皆當為五十九刺也張兆璜曰少陽之上火氣治之少陰之上熱氣治之故病在少陽少陰而皆為熱甚熱病先眩冒而熱胸脅滿刺足少陰少陽此言少陰少陽之二氣相通也夫陰陽出入皆從樞轉熱病先眩冒而熱病發於少陽也胸脅滿將入於裡陰矣故當刺足少陰少陽從樞轉而外出按以上三節用十六先字蓋言有先於內者有先於外者有先從氣分者有先見於色者皆當先治之勿使其外內之交爭也張兆璜曰首節論熱甚於少陽上節論熱甚於少陰此論少陰與少陽相合蓋君火與相火之相合也太陽之脈色榮顴骨熱病也榮未交日今且得汗待時而已與厥陰脈爭見者死期不過三日此言外病六氣之熱內有五臟之熱始在氣分而未及於經榮者當急取汗而解勿使外內相交而成不救也傷寒論曰太陽之為病脈浮見太陽之脈者乃六氣之病始在太陽之表陽此外因之熱病也榮華也謂赤色之榮於顴頰之間乃五臟之熱始病氣而見於色此內因之熱病也曰骨者謂尚在內而隱見於皮膚之間當此之時五臟之榮色尚未與表陽之氣相交表陽之熱尚未與五臟之榮氣相交故良工曰病在太陽者可從表汗而解熱在五臟者病雖未發見赤色者刺之名曰治未病今且得汗是可待時而已矣若不急從汗解則太陽之熱與臟熱相交而太陽與厥陰之脈爭見者死期不過三日矣按此節與玉機真藏論之所謂傳化有不以次入者憂恐悲喜怒令不得以其次故令人有大病之義相同蓋表陽之邪始病太陽六氣相傳移皆有次不以次入者因五志內傷而五臟內熱太陽之脈與厥陰脈爭見者是太陽之熱與肝熱相交矣蓋太陽為陽之始厥陰為陰之終舉太陽與厥陰交爭是表陽之邪不以次入而與五臟之熱隨所乘傳陽脈與陰脈爭見者皆為死證故不必備言五臟也當知表陽之熱先氣而經經而臟五臟之熱亦先從氣而經內而外也外內之熱交出於陽分者生重逆於陰臟者死首節論內熱與外熱交爭此論外熱與內熱交爭其熱內連腎少陽之脈色也此言表陽之熱與臟熱交爭不以次入惟少陽與腎脈相連耳本輸篇曰少陽屬腎蓋少陽之氣發原於腎故熱病內連腎者少陽之脈色也少陽之脈色榮頰前熱病也榮未交日今且得汗待時而已與少陰脈爭見者死期不過三日頰前頤也外見少陽之脈少陽之熱病也色榮頰前腎臟之熱病也熱病氣穴三椎下間主胸中熱四椎下間主膈中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱此言刺未病者當取之氣穴也氣穴者瀉五臟氣分之熱故曰三椎下間四椎下間乃溪谷之穴會與五臟之俞穴不同也胸中膈上乃心肺之宮城主胸中熱者瀉肺熱也膈中熱者瀉心熱也不曰心肺而曰胸中膈中者意言熱在氣分而不幹於臟真也榮在骶也項上三椎陷者中也此言五臟之熱入於經榮者當取之骨穴也脊背之盡處曰骶謂如取榮穴當在骶而至項上之三椎陷者中而取之蓋氣為陽榮血為陰故取氣穴在三椎至七椎之間從上而下也取榮俞之穴在骶骨之十四椎而上至項上之三椎陷者中而取之也靈樞經曰窮骨者骶骨也張兆璜曰此所謂刺之反者頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者膈上也此復結內病五臟之熱不重感於外邪者無外內之交爭而止於在內之臟腑自相乘傳也頰下為頤如頰下之色上逆於顴是腎熱乘肝當為大瘕泄如下於牙車是腎熱乘胃當主腹滿逆於顴後是熱邪乘膽當為脅痛如逆於頰上者是在膈上心肺之分也蓋言五臟之熱色見於面部而有外邪之熱者當治其未病交爭勿使外內相合而成不救之死證如五臟之熱見於面部而無外因之熱病者亦當治未病乘傳勿使其有瘕泄腹滿之病張兆璜曰此篇首言五臟之熱病末結五臟之熱色自相乘傳蓋五臟之熱有重感外邪者必有外因之交爭如止病在內而不感於外邪者只當於在內之臟腑中求之張應略曰有在外之熱病有在內之熱病有病在外而內不病者有病在內而外不病者不必定有外內之交爭故復以此證明之評熱病論篇第三十三黃帝問曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯對曰病名陰陽交交者死也溫病者冬傷於寒先夏至日發者為病溫也陰陽交者謂汗乃陰液外出於陽陽熱不從汗解復入之陰名曰陰陽交交者乃正不能勝邪而邪復傷正氣故為死證帝曰願聞其說岐伯曰人所以汗出者皆生於穀穀生於精汗生於水穀之精水穀之精由精氣之所化故曰穀生於精夫汗之發原有二一出於水穀之精一出於腎藏之精而曰皆生於穀者言腎藏之精亦水穀之所生也今邪氣交爭於骨肉而得汗者是邪卻而精勝也交爭於骨肉者邪氣伏匿於骨肉之間至春時與正氣交爭而發為溫病得汗是精氣勝而邪當共並而出矣倪沖之曰胃主肉腎主骨穀精之汗出於胃血液之汗原於腎邪在肉者得水穀之汗而解邪在骨者得腎精之汗而後解精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也此言水穀之精由腎藏精氣之所化所謂穀生於精也夫腎為水臟受水穀之精而藏之其精氣上與陽明相合戊癸合而化火火土之氣消水穀之精微而復生此精是先後二天互相資生者也今汗出而邪留不去則熱邪復傷其陰精矣精氣受傷則不能復與陽明合化而使之食是精氣之生原並絕其壽命可立而傾也董帷園曰互相生長之道旋轉如環且夫熱論曰汗出而脈尚躁盛者死此復引熱論以釋明汗生於穀穀生於精不能食而精無俾者之義靈樞熱論篇曰熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病者脈尚躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生夫汗者精氣也汗出而脈尚躁盛者是邪氣盛而精不勝也陰脈少陰之脈極終也此邪熱盛而少陰之氣終也脈尚躁而不得汗者是陽熱盛而胃氣絕也今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死脈不與汗相應者胃氣虛而不勝其邪正不勝邪是胃氣將絕其死明矣腎藏志狂言者是精氣傷而志先死志先死者不過一日半而死矣今見三死不見一生雖愈必死也病而留者一死也胃氣絕者一死也腎氣絕者一死也夫腎為生氣之原腎之精氣由水穀之所生水穀之精由腎氣之所化如汗不勝邪而腎藏之精氣尚在一生也如精氣受傷而陽明之生原未絕一生也愈者謂邪病去也邪雖去而生氣已絕必死之道也以上論邪正陰陽之理而歸重於正氣之生原不可傷也帝曰有病身熱汗出煩滿煩滿不為汗解此為何病按此篇評論陽熱之邪惟藉陰精以制勝汗者精氣也一出於水穀之精一出於腎藏之液水穀入胃津液四布汗出溱溱水穀之精氣也又腎為水臟受五臟之精而藏之所藏之精奉心化赤而為血血之液為汗此腎藏之精氣也是以上節論汗生於穀此以下復論風傷腎藏之精焉蓋風行則水渙水氣泛溢則精氣自虛此節論風動腎藏之精氣勞風節論風動腎藏之水氣腎風節論風動腎藏之水邪而總屬精氣皆虛岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥風為陽邪開發肌腠腠理之汗水穀之精也津液外泄風熱留之故身熱也風熱不去則傷動其腎氣而上逆逆於上則心煩乘於脾土則中滿病名曰風厥謂因風邪而使腎氣之厥逆也上節論病雖愈而正氣絕者死此以下論邪病雖留而根本不壞者不死邪正虛實大有死生之關係而學者不可不審帝曰願卒聞之岐伯曰巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也巨陽太陽也太陽之氣主表風為陽邪傷人陽氣兩陽相搏則為病熱少陰與太陽相為表裡陽熱在上則陰氣從之從之則為厥逆矣帝曰治之奈何岐伯曰表裡刺之飲之服湯表裡者陰陽也刺表以瀉風熱之陽邪刺里以下少陰之逆氣飲之服湯以助水津之汗帝曰勞風為病何如此論勞汗當風而傷其腎也煩勞則陽氣外張精氣內絕陽虛於外則易於受風精虛於內則反動其水氣矣岐伯曰勞風法在肺下伯言風動寒水之氣法當在肺下水熱穴論曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也其為病也使人強上冥視強上者頭項強也陽氣張而重感於風則使人強於上陰精竭而更受其傷故目肓不可以視也唾出若涕惡風而振寒此為勞風之病腎之水液入肺為涕自入為唾風動腎水注在肺下故唾出若涕肺主皮毛肺受風寒故惡風而振寒此為勇而勞甚則腎汗出腎汗出而逢於風也帝曰治之奈何岐伯曰以救俯仰金匱水氣篇曰氣強則為水難以俯仰此水寒之氣厥逆於上則有形之水將欲隨之故當急救其水邪勿使其上溢以致不能俯仰也巨陽引精者三日中年者五日不精者七日此言救俯仰之法當從小便而出也巨陽引精者謂太陽膀胱之府津液藏焉氣化則出巨陽氣盛能引腎精之邪水從小便而出者三日而愈中年精氣虛者五日老年精氣衰者七日三五七者陽之數也謂得陽氣之化而陰水自出矣咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也此言水寒之邪逆於肺下者又當從上竅以出之此上下分消之法也夫腎為水臟受五臟之精而藏之今腎藏之水氣反逆於上則四臟之津皆為之凝聚而不下矣青黃涕者肝脾之津也膿乃赤白之間色如膿狀者心肺之津也四臟之津不下歸於腎反凝聚於肺下故當咳而出之肺之下脾之上也或從脾而出之口或從肺而出之鼻皆涕唾所出之外竅也肺主氣而至清虛故邪濁傷之則死帝曰有病腎風者面胕痝然壅害於言可刺不胕音附痝音芒不否同腎風者因風而動腎藏之水故又名風水胕足胕也痝然腫貌言面足痝然而腫也少陰之脈貫腎系舌本水邪上逆故壅害於言岐伯曰虛不當刺不當刺而刺後五日其氣必至腎為風邪所傷則精氣已虛故不當刺虛反刺之後五日其逆氣必至平脈篇曰腎氣微少精血奔氣促迫上入胸膈謂精氣虛則水邪之氣反上逆矣五日者言風邪亦始病太陽五日則病及少陰而動其氣矣帝曰其至何如岐伯曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳病名曰風水論在刺法中病名風水者因風而動其水也在刺法中謂在本經水熱穴論中帝曰願聞其說岐伯曰邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也小便黃者少腹中有熱也風邪傷腎精氣必虛陰虛則陽往乘之故時時發熱腎為生氣之原故少氣也陽加於陰則汗出濕熱上蒸故從胸背而直上於頭熱在下焦故小便黃也倪沖之曰太陽與少陰標本相合風邪傷腎始病太陽甚則入腎今腎熱上蒸亦隨太陽之氣而上故從胸背而上至於頭不能正偃者胃中不和也正偃則咳甚上迫肺也此申明陽邪傷陰而動腎藏之水也正偃仰臥也水上乘於胃則胃中不和故不得正偃肺脈下絡大腸還循胃口故上迫肺也上節論陽熱傷其精氣此復論動其水焉倪沖之曰勞風注在肺下謂水氣迫於肺下而所出之涕乃是肺液非腎藏之水也蓋肺乃水之生原腎氣反逆則水源凝聚於上矣今正偃迫肺亦系胃氣上乘而非腎藏之水即目下微腫亦屬水邪在腹而腫見於目下當知腎虛水泛止至於腹耳諸有水氣者微腫先見於目下也帝曰何以言岐伯曰水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也太陰者至陰也水邪上乘於腹始傷胃而漸及於脾故微腫先見於目下脾主約束也倪沖之曰水止在腹腫見於目下者水氣也真氣上逆故口苦舌乾真氣者臟真之心氣也心屬火而惡水邪水氣上乘則迫其心氣上逆是以口苦舌乾臥不能正偃正偃則咳出清水也此言水氣上乘始胃而脾脾而心心而肺也腎為本肺為末金水子母之臟皆積水也是以水氣上逆於肺則咳出清水諸水病者故不得臥臥則驚驚則咳甚也此言腎邪上乘於胃則胃氣上薄於心胃氣薄於心則心氣迫於肺矣水邪乘胃故不得臥胃絡上通於心陽氣入陰陰陽相薄故驚恐也心氣上乘於肺金畏火熱故咳甚也上節論水氣從下而上此復論腑臟之氣亦從下而上也腹中鳴者病本於胃也薄脾則煩不能食食不下者胃脘隔也身重難以行者胃脈在足也此言水氣乘於經脈之中隨經環轉復從上而下也水病本於胃而隨經下泄故腹作雷鳴薄於脾則煩而不能食蓋脾絡上膈注心中故煩上焦主納故不能食也胃脘阻隔故食不下水氣隨經下流故身重難以行也倪沖之曰按經旨水邪止乘於胃其薄脾干肺迫心乃胃氣之轉乘非水邪直至於心下蓋腎者胃之關也水出於關則邪留在胃故曰病本於胃月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也帝曰善中焦之汁流溢於腎而為精奉心化赤而為血血之液為汗此節首論風傷腎藏之精末結不能奉心化赤蓋此篇評論陽熱之邪惟藉陰精汗液以制勝前章論穀精之汗不能勝邪者死此言腎藏之精為風邪所傷而又不得心氣下通以化赤是風邪亦不得從汗解矣再按榮氣之道納穀為實谷入於胃乃傳之肺流溢於中布散於外專精者榮於經隧常榮無已是血乃中焦水穀之汁而行於經脈滲於皮膚有二道焉夫中焦受氣取汁變化而赤此專精而行於經隧之血也流溢於中布散於外者是流溢於胞中布散於皮膚之血也胞脈屬心得心氣下通而為血衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛男子至唇口而長髭鬚女子至胸中而下為月事是血之液為汗者乃滲於皮膚之血非經脈之血也故舉女子之月事以申明之氣上迫肺者真氣上逆口苦舌乾驚則咳甚是心氣上炎而不下通也此篇雖曰評熱然皆論精血汗液之生原蓋知生始之原則知所以養正而勝邪矣水穀之精藉腎藏精氣之所化胞腎之精血由胃腑水穀之所生王芳侯曰出紅汗曰蔑此滲於皮膚之血而又不能化汗者矣逆調論篇第三十四調和也順也言人之陰陽水火榮衛氣血表裡上下皆當和調逆調則為病矣黃帝問曰人身非常溫也非常熱也為之熱而煩滿者何也此論上下陰陽之不和也非常溫者謂非常有溫熱之病在表也非常熱者謂非常有五臟之熱在裡也為之者乃陽熱之氣為之也岐伯對曰陰氣少而陽氣勝故熱而煩滿也火為陽而居上水為陰而居下陰氣少而陽氣勝故熱而煩滿於上也帝曰人身非衣寒也中非有寒氣也寒從中生者何身非衣寒表無寒也中非有寒氣里無寒也寒從中生者謂寒從陰中而生也岐伯曰是人多痹氣也陽氣少陰氣多故身寒如從水中出痹氣者氣閉也陽氣少而陰氣多者因是人多痹氣故也病在陰者名曰痹寒濕之氣閉於裡陰則火熱不得下交於陰而陰氣盛陰氣盛則陽氣漸衰陰寒之氣過多故身寒如從水中出蓋熱出於陽火故煩寒出於陰水故如從水中出此上下水火陰陽之不和也帝曰人有四肢熱逢風寒如灸如火者何也此論表裡陰陽之不和也四肢為諸陽主氣四肢熱者陽熱之氣在表也逢風寒而如灸如火者邪正相搏因表陽之熱而熱更盛極也此節論陽生於陰陰生於陽陰陽和調則陽生陰長逆則孤陰不生獨陽不長耳岐伯曰是人者陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳陰氣虛者里陰之氣虛也陽氣盛者表陽之氣盛也陽受氣於四末陰受氣於五臟四肢者陽明之所主也兩陽陽明也兩陽合明故曰陽明相得者自相得而為熱也陰氣少者少陰之氣少也少水者津液少也津液少而不能還入胃中則火盛而不能滅矣夫腎主藏精陽明之所生也腎之精氣復上與陽明相合戊癸合而化火火土之氣陰氣虛少則陽獨治矣然獨陽不生謂不能再生長其陽熱惟此獨勝而止矣張兆璜曰能滅盛火即是陰陽和調逢風而如灸如火者是人當肉爍也此釋明陽明之氣主於四肢而又所主肌肉也二陽之氣在於皮膚肌腠之間而又逢風熱之陽邪邪正相搏則火熱熾而銷鑠其肌肉矣帝曰人有身寒湯火不能熱厚衣不能溫然不凍慄是為何病身寒而湯火不能熱厚衣不能溫者太陽氣衰而寒在表也不凍慄者二陽火熱之在裡也岐伯曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也腎氣勝者腎水之氣勝也以水為事者膀胱之水勝也謂其人水寒之氣偏勝水寒偏勝則太陽氣衰太陽氣衰則孤陰不長矣水精水也腎藏之精枯不長而膀胱之一水不能勝二火矣夫腎生骨髓水生肝腎脂不生則髓不能滿於骨是以寒至骨也以上兼論陰陽水火互相生長之道高士宗曰一水不能勝二火句似為衍文所以不能凍慄者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍慄病名曰骨痹是人當攣節也肝者一陽初生之木火也心者地二所生之君火也腎為牝臟孤臟也孤臟之陰藉太陽標本以合化太陽氣衰則孤陰不長矣膀胱之津液不能勝二火故其人不能凍慄者二陽之火熱在內也病名曰骨痹病在髓枯而骨痛也故其人當骨節拘攣此論表裡陰陽之不調也帝曰人之肉苛者雖近衣絮猶尚苛也是謂何疾此論榮衛之氣不和也苛虐也謂雖近衣絮而苛虐如故也岐伯曰榮氣虛衛氣實也虛實者不和也言榮氣不得衛氣之和則榮氣虛衛氣不與榮氣相和則衛氣實也蓋陽道常實故曰實然則過猶不及也榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用肉如故也不仁者不知痛癢不用者痿而不勝蓋言榮衛不和則兩者皆虛矣榮衛兩虛者不仁且不用不仁不用而肉苛如故者不和而致虛也張兆璜曰此釋明上文之所謂虛實者乃不和也人身與志不相有曰死人身者榮衛之所循行也志者五臟之神志也本臟篇曰經脈者所以行氣血而榮陰陽濡筋骨利關節者也衛氣者所以溫分肉充皮膚肥腠理司開闔者也志意者所以御精神收魂魄適寒溫和喜怒者也是故血和則經脈流行榮覆陰陽筋骨勁強關節清利矣衛氣和則分肉解利皮膚調柔腠理致密矣志意和則精神專直魂魄不散悔怒不起五臟不受邪矣寒溫和則六腑化谷經脈通利肢節得安矣此人之常平也是三者之所當和調者也如三者皆相失而不相有則氣血不行魂魄離散而死矣此言榮氣當與衛氣和調榮衛之氣又當與神志和調者也帝曰人有逆氣不得臥而息有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥臥而喘者皆何臟使然願聞其故此論經氣上下之不調也經氣生於臟腑故曰何臟使然岐伯曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也一呼一吸曰息息有音者呼吸有聲氣逆之所致也足之三陽從頭走足故三陽者下行今反逆而上以致呼吸之有音也朱聖公曰是陽明之逆也句概上下二節而言陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安此之謂也按靈樞動輸篇黃帝曰經脈十二而手太陰足少陰陽明獨動不休何也岐伯曰是明胃脈也胃為五臟六腑之海其清氣上注於肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止黃帝曰氣之過於寸口也上十焉息下八焉伏何道從還不知其極岐伯曰氣之離臟卒然如弓弩之發如水之下岸蓋言十二經脈皆足陽明胃腑之所生胃氣上注於肺以司呼吸下注於腎以資十二經脈故曰陽明者胃脈也言胃者水穀血氣之海也胃之所出血氣者從大絡而上注於肺從胃脈而下注足少陰也如陽明逆不得從其道則為不得臥而息有音手太陰逆則為起居如故而息有音足少陰逆則為不得臥而喘也此論經脈呼吸之逆調也下經者即下文之所謂不得臥臥則喘者是水氣之客也蓋陽明之津液隨氣而下注於腎如陽明逆不得從其道而腎之水氣反上客於陽明是以胃不和而臥不安也再按上十焉息者謂陽明所生之榮衛宗氣如弓弩之發上注於肺以行呼吸以榮經脈居十分之十焉下八焉伏者謂陽明所生之津液下注於足少陰如水之下岸居十分之八焉蓋榮氣宗氣衛氣皆主上行是氣之十分皆上行也津液二分行於經隧八分流溢於腎故止八分而伏藏於下也何道從還者衝脈與少陰之大絡起於腎下出於氣街衝脈上循背裡為經絡之海氣街者氣之徑路也如絡絕則徑通是流溢於腎藏之精液從衝脈氣街之道路還循於十二經脈如環無端而莫知其極此血氣生始之根原經脈循行之道路學者所當用心理會者也張兆璜曰靈樞論經脈順行之道此篇論經脈逆調之因故當復引經語以證明之夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也此言手太陰之調逆也肺主呼吸肺之絡脈逆故呼吸不利而息有音也夫脈之循於裡曰經浮而外者為絡外內上下經絡相貫循環無端絡脈逆則氣留於經而不行於絡矣絡脈浮於皮膚之間其病輕微故止息有音而起居如故也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也帝曰善此言足少陰之逆調也夫津液者水穀之所生腎者胃之關也胃之水液從關而下入於腎者順也如陽明逆不得從其道而下入於腎則腎之水氣反循津液之道路而上乘於胃矣是以胃不和而臥不安也故曰腎者水臟主藏津液又主臥與喘也夫手太陰足少陰陽明主血氣生始之根原經脈呼吸之道路人之一身總不外乎水火陰陽榮衛氣血是以上章論水火陰陽之寒熱後章論呼吸經脈之逆調楊君立問曰帝問有不得臥而息無音者有得臥行而喘者有不得臥不能行而喘者岐伯皆未詳答後人有言簡脫者有增補其文者是耶非耶曰此節專論氣之呼吸脈之順逆蓋經脈者所以行氣血而榮陰陽濡筋骨利關節者也是以三陽之脈上行則氣逆而為息有音如三陽之脈順行而下止陽明不得從其道是當不得臥而息無音矣如病在經脈則陰陽不和而不得臥筋骨不利而不能行今病在絡脈故止息有音而起居如故也聖人立言渾然櫽栝或言在意中或意居言表奈何後學不細心體認而妄增臆論耶瘧論篇第三十五黃帝問曰夫痎瘧皆生於風其蓄作有時者何也痎音皆吳崐曰痎亦瘧也夜病者謂之痎晝病者謂之瘧方書言夜市謂之痎市蓋本乎此也蓄病息邪伏也盧子繇曰瘧者惟火沴金酷虐殆甚也岐伯對曰瘧之始發也先起於毫毛伸欠乃作寒慄鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲伸欠引伸而呵欠也衛氣同邪氣將入於陰表氣虛故先起於毫毛伸欠帝曰何氣使然願聞其道岐伯曰陰陽上下交爭虛實更作陰陽相移也邪正陰陽之氣上下出入故交爭於上下也病並於陰則陰實而陽虛並於陽則陽實而陰虛是虛實更作陰陽寒熱相移也陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷也巨陽虛則腰背頭項痛邪與衛氣內薄則三陽之氣同並於陰矣並於陰則陰實於內而陽虛於外陽明之氣主肌肉而經脈交於頷下是以寒慄鼓頷太陽之氣主表而上升於頭其經脈上會於腦出於項下循背膂故腰背頭項俱痛馬蒔曰陽氣陷則陰氣勝經云病痛者陰也三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也陽虛於外則陰勝於里矣經云二陰主裡是以骨寒而痛而寒生於內也陰氣逆極則復出之陽並於陽則陰虛而陽盛陽盛則外熱陰虛則內熱外內皆熱是以喘渴而欲冷飲也盧子繇曰不列少陽形證者以太陽為開陽明為闔少陽為樞而開之能開闔之能闔樞轉之也設舍樞則無開闔矣離開闔無從覓樞矣故開闔既陷樞機豈能獨留倘中見樞象即為開闔兩持所以持則俱持陷則俱陷也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也盧子繇曰以夏氣通於心心主榮血之故也經云以奉生身者莫貴於經隧故不注之經而溜之舍也舍即經隧所歷之界分每有界分必有其舍如行人之有傳舍也倪沖之曰天之暑熱與君火之氣相合心主榮血故邪藏於榮舍衛氣者陽明之悍氣也風木寒水乘侮土氣故風水之邪與衛氣並居此令人汗空疏腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作盧子繇曰暑令人汗出空疏腠理開者以暑性暄發致腠理但開不能旋闔耳不即病者時值夏氣之從內而外衛氣仗此猶可捍禦因遇秋氣機衡已轉自外而內矣其留舍之暑令汗出空疏腠理開風遂乘之以入或得之以沐浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於陰風與水氣亦得陽隨衛而外出得陰隨衛而內薄內外相薄是以日作也莫子晉問曰衛氣日行於陽奚先入於陰而致寒慄伸欠也曰邪得陰而內入得陽而外出邪氣與衛氣並居故同邪內陷非衛氣之行於陰也夫內為陰外為陽邪留於形身之外與衛應乃作衛氣日行於陽故發作於日也帝曰其間日而作者何也岐伯曰其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也間去聲言邪氣舍深內薄於裡陰之分陽氣獨發於外里陰之邪留著於內陰邪與陽氣交爭而不得皆出於外是以間日而作也按此節經文與薄於五臟募原之因不同帝曰善其作日晏與其日早者何氣使然岐伯曰邪氣客於風府循膂而下衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也此言邪從風府而客於脊背之間者發作有早晏也衛氣一日一夜行陰陽五十度而大會於風府其明日日下一節故其作也晏此邪先客於脊背而與衛氣相遇故也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也其出於風府日下一節二十一日下至骶骨此申明衛氣日下一節則上會於風府也亦晏故病作日晏也蓋衛氣每至於風府則腠理開開則客於脊背之邪還入風府而與衛氣相遇則病作其衛氣出於風府日下一節則上會與風府也稍晏故病作稍晏二十一日下至骶骨則上會於風府也益晏故病作益晏也二十二日入於脊內注於伏膂之脈其氣上行九日出於缺盆之中其氣日高故作日益早也伏膂伏沖膂筋也衛氣外循督脈而下內循衝脈而上其氣上行九日出於缺盆其氣日高則會於風府也日早故作日益早也其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也募原者橫連臟腑之膏膜即金匱所謂皮膚臟腑之紋理乃衛氣遊行之腠理也不得與衛氣皆出故間日也帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何帝問邪有不從風府而入其病亦以日作者何也岐伯曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病客於頭項者謂客於風府也伯言邪入於風府循膂而下留其處者有虛實之不同若邪中異所則無有早晏矣虛實者早晏也言衛氣虛而日下則其發日晏衛氣實而日上則其發日早此邪從風府而留於脊膂之間者也若邪中異所則不得當其風府矣如邪中於頭項衛氣行至頭項而病作中於腰背手足邪即舍於腰背手足之間衛氣行至腰背與腰背所舍之邪相遇而病作衛氣行至於手足與手足所舍之邪相遇而病作此或發於早者每日早發或發於晏者每日晏發非若客於風府之邪日晏而日早也張兆璜曰風府循督脈而下至脊內循衝脈而上乃衛氣之隧道故邪留於此內者遇衛氣之日上日下而病有早晏之分衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也衛氣之所在者謂衛氣行至邪氣所在之處與邪相合而病作故風邪或中於頭項或中於腰背手足無有常處非定客於風府也夫衛氣之行至於所在之處而發必開其腠理腠理開然後邪正相合邪與衛合之處即其府也帝曰善夫風之與瘧也相似同類而風獨常在瘧得有時而休者何也夫痎瘧皆生於風然病風者常在其處病瘧者休作有時故帝有此問岐伯曰風氣留其處故常在瘧氣隨經絡沉以內薄故衛氣應乃作風邪則傷衛故病風者留於肌腠筋骨之間而不移瘧氣舍於榮故隨經絡以內薄與衛氣相應乃作也帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則病成矣風寒曰淒水寒曰滄蓋夏時暑熱溽蒸腠理開發或汗濕從風或得之於沐浴水寒藏於腠理皮膚之中至秋時復傷於風風寒兩感是以寒熱之病成矣按此節所論先寒後熱與上節不同上節以夏傷之暑藏於榮之所舍秋受之風寒與衛氣並居蓋榮為陰衛為陽此氣得陰而內薄得陽而外出是以榮舍之邪先行於陰而為寒復行於陽而為熱此乃吾身中之陰陽寒熱也此節論夏受淒滄之水寒秋傷於風之陽邪此論天之陰陽寒熱也是以經旨少有不同學者亦宜體析夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧天之陰邪感吾身之陰寒天之陽邪感吾身之陽熱是以先受之寒先從陰而病寒後受之風復從陽而病熱病以時作者應時而作無早晏也帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧王冰曰以其先熱故謂之溫倪沖之曰此天之陰陽病人身之陰陽陰陽兩感是以寒熱交作雖有先後之感與故病新病不同學者亦宜體認其但熱而不寒者陰氣先絕陽氣獨發則少氣煩冤手足熱而欲嘔名曰癉瘧其者承上文而言上文之所謂溫瘧者邪氣藏於骨髓之中骨髓者腎藏之精氣所生故久而不去則與腎氣相合是以溫瘧之病氣藏於腎其氣先從內而出之外也從內出之外故陽病極而復反入之陰其但熱不寒者邪氣藏於骨髓之中而腎陰之氣先與骨氣相絕是外邪不及於里陰而獨發於陽也熱傷氣故少氣心惡熱故煩冤手足為諸陽之本故手足熱經云諸嘔吐酸皆屬於熱此溫瘧之不復寒者名曰癉瘧癉單也謂單發於陽而病熱也盧子繇曰癉瘧有二因此其一也帝曰夫經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧者之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也願聞其說岐伯曰經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗故其為病逆未可刺也熇音稿漉音鹿陽熱為有餘陰寒為不足經言引靈樞順逆篇而言熇熇熱甚貌渾渾邪盛而脈亂也漉漉汗大出也言當此之時邪病甚而正氣逆故未可刺也夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒慄也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故先熱而渴此言寒熱始盛之時乃陰陽之氣交併正氣錯亂未分故未可刺張兆璜曰此言熱為陽實而有餘寒為無氣而不足所謂有餘不足者陽氣邪氣也夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱上節論陽氣虛實之寒熱此論陰陽勝並之寒熱皆屬陰陽未和而邪氣方盛俱未可刺瘧者風寒之氣不常也病極則復至此復論在天陰陽之邪而為寒熱也風者陽邪也寒者陰邪也風寒之氣變幻不常如病風而為熱極則陰邪之寒氣復至病寒而為寒極則風邪之陽熱復至當如寒熱虛實之有三因也病之發也如火之熱如風雨不可當也故經言曰方其盛時必毀因其衰也事必大昌此之謂也上節論陰陽交併正氣未分故未可刺此承上文而言邪氣方盛未可刺也邪氣之發如火之烈如風雨之不可當故經言方其盛時而取之必毀傷其正氣因其衰也事必大昌此之謂也兵法云無迎逢逢之氣無擊堂堂之陣避其來銳擊其惰歸倪沖之曰如火之烈陽熱盛也如風雨不可當陰寒盛也夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也邪氣未發則正氣未亂因而調之真氣得安邪氣乃去所謂治未病也若待其已發雖良工弗能為為其氣逆故也上節論治其已衰此先治其未發帝曰善攻之奈何早晏何如早者謂病之未發晏者謂病之已衰岐伯曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得並者也此申明治未病之法也且者未定之辭言瘧之將發陰陽之將移必從四末始蓋三陰三陽之氣從手足之井滎而更移也如病在陽而陽已傷則陰經將從而受之故當先其未發之時堅束其四末令邪在此經者不得入於彼經彼經之經氣不得出而並於此經審其證而候其脈見其孫絡盛堅而血者皆取而去之此陰陽真氣往來和平而未得交併者也倪仲宣曰瘧氣舍於皮膚肌腠之間故病見於孫絡帝曰瘧不發其應何如言瘧病未發之時其脈候證候何如而應岐伯曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁在陰則寒而脈靜言瘧氣者有陰陽更並之盛虛皆當氣之所在也如病在陽則熱而脈躁在陰則寒而脈靜欲知脈與病之相應但審證之寒熱脈之躁靜則知病之在陰在陽矣極則陰陽俱衰衛氣相離故病得休衛氣集則復病也言陰陽之所以更盛更虛者衛氣行之也衛氣者行陰而行陽者也是以衛氣相離其病得休衛氣集則復病也帝曰時有間二日或至數日發或渴或不渴其故何也岐伯曰其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也六腑者謂六腑之募原也六腑之膜原者連於腸胃之脂膜也相失者不與衛氣相遇也蓋六腑之募原其道更遠氣有所不到故有時相失不能相得其邪故或間二日或數日乃作也倪沖之曰藏之膜原而間日發者乃胸中之膈膜其道近六腑之膜原更下而遠故有間二日或至於數日也張介賓曰按本經言瘧之間二日及數日發者以邪氣深客於六腑之間時與衛氣相失其理甚明丹溪以作於子午卯酉日者為少陰瘧作於寅申巳亥日者為厥陰瘧作於辰戌丑未日者為太陰瘧此不過以六氣司天之義為言然子午雖曰少陰而卯酉則陽明矣巳亥雖曰厥陰而寅申則少陽矣丑未雖曰太陰而辰戌則太陽矣如三日作者猶可藉此為言若四五日者又將何以辨之殊屬牽強倘按此施治未必無誤學者不可執以為訓馬玄臺曰本經言間日數日發者邪與衛氣不相值何丹溪乃以為三日一發者受病一年半間日一發者受病半年一日一發者受病一年不知何據為然董帷園曰看書當參討經義庶不為前人所欺瘧者陰陽更勝也或甚或不甚故或渴或不渴言陰陽更勝而有甚與不甚故陽熱甚則渴或不甚則不渴矣帝曰論言夏傷於暑秋必病瘧今瘧不必應者何也言有不必夏傷於暑而為病瘧者也岐伯曰此應四時者也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗伯言夏傷於暑秋必病瘧者此應四時者也應四時者隨四時陰陽之氣升降出入而為病也其病異形者反四時也反四時者非留蓄之邪乃感四時之氣而為病也秋時陽氣下降天氣新涼故感秋涼之氣而為病者寒甚冬時陽氣伏藏於內即受時行之寒得陽氣以化熱故寒不甚春時陽氣始出天氣尚寒故惡風夏時陽氣外泄腠理空疏故多汗此隨感四時之邪而即為病瘧也倪沖之曰春傷於風故惡風夏傷於暑故多汗秋傷於濕故寒甚冬傷於寒則為病熱故寒不甚蓋言風寒暑濕之邪在四時而皆能病瘧也帝曰夫病溫瘧與寒瘧而皆安舍舍於何臟此復問前節溫瘧之病因是以帝問溫瘧與寒瘧病皆安舍而伯只答其溫瘧焉蓋寒瘧之因已諭悉於前矣但前節以先傷於風後傷於寒為溫瘧此論先出於陽後入於陰為先熱後寒一論在天陰陽之邪一論形身中之陰陽出入文義雖殊而理則合一岐伯曰溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出後寒名曰溫瘧藏真下於腎腎藏骨髓之氣也冬氣通於腎故邪藏於骨髓之中而內與腎氣相合夫至春陽氣大發而邪不能自出者邪藏於骨髓之中而氣行骨外故也腦為精髓之海腦髓爍者暑氣盛而精髓爍熱也肌肉消者腠理開而肌肉消疏也汗乃腎藏精髓之所化或有所用力則傷動其腎氣是以所藏之邪得與汗共並而出矣夫骨氣與腎氣相合故病氣藏於腎其氣先從內出之外也從內出外則陰虛而陽盛陽盛則熱矣氣從內出之外故病復反入之陰張兆璜曰故先熱而後寒者名曰溫瘧其但熱而不寒者名曰癉瘧矣故字宜著眼帝曰癉瘧何如岐伯曰癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不反於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰癉瘧帝曰善此復論癉瘧之有因於內熱者也肺主周身之氣肺素有熱故氣盛於身其氣厥逆上衝故不泄於外而但實於中此外內皆實者矣氣止實於外則邪不能外侵故因有所用力腠理開而後邪舍於皮膚之內中氣實則邪不能內入故其氣不及於陰而單發於陽也心主血脈之氣氣內藏於心者謂邪藏於血脈之中而氣內通於心也內藏於血脈之裡外舍於分肉之間陽氣盛而無陰氣以和之是以陽熱不衰而令人消爍脫肉也前節論外因之癉瘧此論兼有內因之癉瘧也故金匱要略曰陰氣孤絕陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰癉瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消爍脫肉是陰氣絕而陽氣獨發者名曰癉瘧若但熱不寒者亦名癉瘧是癉瘧之有二證也張兆璜曰邪舍於血脈之中而氣內藏於心與邪藏於骨髓之中而病藏於腎者同義但腎為陰臟故邪復反入之陰心為陽臟故氣不及於陰而單發於陽也刺瘧篇第三十六此承上章以記刺瘧之法故不曰論足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已刺郄中出血暍音謁此論三陰三陽經氣之為病也太陽是動病者腰似折沖頭痛太陽標陽而本寒故先寒後熱背為陽故寒從背起也熇熇如火之熾暍暍暑熱氣也太陽乃日中之陽火故熇熇暍暍然也如熱在氣分者熱止汗出其病則愈此乃經氣之兼證故病難全已當刺郄中出血以瀉在經之邪焉按藏氣法時論曰心病者胸中痛取其經少陰太陽舌下血者其變病刺郄中血者謂取手少陰之陰郄穴也此所謂郄中出血是亦當取項上之絡郄腰下之浮郄矣王氏曰郄中委中也盧子繇曰此但詳足經而無手經者經云風寒暑火天之陰陽也張兆璜曰瘧之足經與傷寒同義蓋天之六淫傷人三陰三陽之氣皆從足而起也足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽㑊音亦解㑊懈惰也少陽主初生之氣病則生陽不升故身體懈惰少陽主樞寒不甚熱不甚樞象也膽病者心中憺憺恐人將捕之少陽相火主氣故熱多少陽所生病者汗出當取足少陽之俠谿在足小指次指歧骨間本節前之中刺入三分留三呼此足少陽之榮也足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺足陽明跗上陽明者兩陽合明陽熱光明之氣也病則反其本而灑淅寒甚熱去汗出則病氣去而喜見光明復其陽明之本氣也本氣復而仍取足陽明者經邪未去也故當取足跗上衝陽刺入三分留十呼此足陽明原也按三陰三陽之病論在六氣則不涉經絡之有形是以見太陽之先寒後熱少陽之寒熱從樞如少陰之標寒本熱此病無形之六氣也又如膽病之恐人將捕脾土之灌溉四旁少陰之嘔吐厥陰之腰痛是又涉於有形之經當知經不離乎氣氣不離乎經可分而可合者也能明乎經氣之理進乎道矣王芳侯曰日月光明也火氣陽熱也足太陰之瘧一令人不樂好太息不嗜食多寒熱一汗出病至則善嘔嘔已乃衰即取之足太陰脾土主氣主灌四臟心肺居上為陽肝腎居下為陰脾為孤臟中央土間於陰陽之間膻中者臣使之官喜樂出焉膻中乃宗氣之所居上出於肺以司呼吸經云心系急則氣道約約則不利故太息以伸出之一令人不樂好太息者足太陰病瘧而上及於心肺也腎病者寢汗出肝脈緩甚而善嘔所生病者為嘔逆一汗出病至則善嘔者下及於肝腎也病至者言病至於肝臟則善嘔嘔已則肝臟之病已衰而即當取之蓋言脾瘧而病至於四臟見四臟之病已衰而即當取之足太陰也不嗜食多寒熱太陰之本病也脾病而不能轉輸故不嗜食太陰居中土間於陰陽之間故多寒熱也足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已足少陰寒水主氣故嘔吐甚少陰標陰而本熱故多寒熱熱多寒少本氣勝也大凡病熱多而陽氣勝者易愈寒多而陰氣勝者難已欲閉戶牖而處者陰寒甚也故其病難已本經曰陽盡而陰盛故欲獨閉戶牖而居王芳侯曰陽熱甚者宜刺泄其邪陰盛故不言刺也足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒刺足厥陰腰痛小腹滿厥陰之經證也木乃水中之生陽故肝主疏泄水液如癃非癃而小便頻數不利者厥陰之氣不化也志意者所以御精神收魂魄經云肝氣虛則恐蓋肝藏之神魂不足故意恐懼也木主春生之氣厥陰受邪故生氣不足木鬱不達故腹中悒悒也宜刺足厥陰之太衝在足趾本節後二寸陷者中刺入三分留一呼朱聖公曰肝者將軍之官謀慮出焉氣虛則恐懼矣肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明肺者心之蓋故令人心寒熱心氣虛則善驚如有所見經云心者神之舍也神精亂而不轉卒然見非常物宜刺手太陰之列缺手陽明之合谷列缺在手腕後寸半刺入三分留三呼合谷在手大指次指歧骨間刺入三分留六呼盧之頤曰邪不幹臟列臟證者非真臟之藏乃臟募之氣化證也莫仲超曰邪入於五臟六腑募原之間不幹臟腑之氣則為間日之瘧干臟腑之氣則為五臟六腑之瘧涉於三陰三陽則為六經之瘧故曰瘧者風寒之氣不常也心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰心為火臟心氣熱故煩甚而欲得清水以自救熱極生寒故反寒多寒久則真火氣衰故不甚熱也宜刺手少陰之神門在掌後銳骨端陷者中刺三分留七呼肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血蒼乃東方之青色肝主色故令人色蒼蒼然膽病者善太息膽附於肝故肝病必及於膽肝膽主春生之氣膽氣升則臟腑之氣皆升生陽不升故其狀若死刺足厥陰中封見血在內踝前一寸半陷者中仰足取之伸足得之刺入四分留七呼脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰脾為陰中之至陰故令人寒腹乃脾土之郛郭故腹中痛濕熱下行則腸鳴上蒸則汗出也鳴已汗出者下行極而上也宜刺足太陰之商丘在足內踝下微前三寸陷者中刺入三分留七呼腎瘧者令人洒洒然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰眴同旬足少陰寒水主氣故令人洒洒然腰乃腎之府故腰脊痛而欲其宛轉也腎開竅於二陰故大便難眴眴目搖動而不明骨之精為瞳子故目眴眴然也腎主生氣之原手足為諸陽之本邪病則有傷生氣故手足寒也宜取足太陽之委中足少陰之大鐘太谿委中在膕約橫紋中央有動脈大鐘在內踝后街中刺入二分留七呼太谿在足內踝後跟骨上動脈陷者中刺入三分留七呼胃瘧者令人且病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血胃主受納水穀故胃瘧者令人病飢而不能食中焦受邪不能主化故支滿腹大橫脈脾胃之橫絡脈也瘧發身方熱刺跗上動脈開其空出其血立寒此言瘧之寒熱乃病在陰陽之氣分當取於陽明太陰焉夫三陽主表三陰主裡瘧發身方熱是邪將出於表陽陽明者兩陽合明間於二陽之間主行氣於周身陽盛之氣也故當取陽明之衝陽搖針以開其穴瀉出其血則陽熱去而立寒矣瘧方欲寒刺手陽明太陰足陽明太陰夫身半以上為天身半以下為地手太陰陽明主天足太陰陽明主地故從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之又陽者天氣也主外陰者地氣也主內瘧方欲寒是邪將入於裡陰故當刺手足陽明太陰使天地陰陽之氣上下外內和平而無偏陰之患矣瘧脈滿大急刺背俞用中針旁五胠俞各一適肥瘦出其血也旁去聲此言瘧病在經絡者當取其背俞焉蓋經脈內合五臟五行之氣五臟之俞在背故當取背俞以瀉之脈滿大急者邪盛於經脈中也胠脅也旁倚也胠俞者五臟俞之旁近於胠脅乃魄戶神堂魂門意舍志室也謂當旁五胠俞各刺其一肥者深而留之瘦者淺而疾之各適其當以出其血焉瘧脈小實急灸脛少陰刺指井此言經脈之氣虛陷者宜灸足少陰也蓋經脈之氣發原於少陰腎臟脈小者脈氣虛也經云諸急為寒小實急者脈氣虛寒而邪氣實也艾名冰臺能啟陷氣之陽故當灸少陰脛下之太谿以啟經脈之生氣刺足小指之井穴以瀉經脈之實邪此論攻邪又當審其正氣也瘧脈滿大急刺背俞五胠俞背俞各一適行至於血也俞俱音輸各篇皆同此復申明背俞與胠俞之經氣相通也曰背俞五胠俞背俞各一者言背俞旁之五胠俞與背俞各刺其一也背俞者離脊骨兩旁各一寸五分乃五臟之俞也胠俞者去脊骨兩旁各三寸近於胠脅乃五臟神氣之所舍故曰魄戶者謂肺藏魄也曰神堂者謂心藏神也曰魂門者謂肝藏魂也曰意舍者謂脾藏意也曰志室者謂腎藏志也此胠俞與背俞之氣相通故當各取之適其肥瘦以行其針而至於出血也此蓋言邪盛於血脈者取五胠俞甚而及於五臟者兼取背俞是以上節之灸脛此下之用藥亦少有別焉莫子晉曰血者神氣也故病在經脈而邪傷血者宜取臟神所舍之俞然經脈內合五臟故又當兼取其背俞也瘧脈緩大虛便宜用藥不宜用針便平聲此承上文而言五臟之經氣虛者便於用藥而不宜用針也脈緩大虛血氣兩虛也靈樞經云少氣者則陰陽俱不足補陽則陰竭瀉陰則陽脫如是者可將以甘藥不可飲以至劑如此者弗灸不已者因而瀉之則五臟氣壞矣上節論經脈生始之原本於足少陰腎此言經俞血氣又五臟五行之所生然有邪有正有實有虛而灸刺用藥各有所宜也凡治瘧先發如食頃乃可以治過之則失時也此論治瘧母先後其時先發如食頃者謂瘧未發前如一飯之頃正氣未亂因而調之所謂無刺熇熇之熱渾渾之脈也若待其已發邪方盛時而取之則失其時矣諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之此言邪在皮膚氣分者宜刺十指之井穴也瘧在氣分故不見於脈脈不見者謂不見滿大急之脈也當刺十指之井穴出血血去其病立已蓋所出為井乃經氣始相交會之處故刺之可泄氣分之邪身有赤如小豆者邪在膚表氣分有傷淡滲皮膚之血故赤如小豆當先取而去之此言邪在經脈之血與淡滲皮膚之血所見脈證不同而取刺亦各有別十二瘧者其發各不同時察其病形以知其何脈之病也此言邪在臟腑經脈者更有刺之之法也十二瘧者謂六經五臟胃瘧也其發各不同者言厥陰與肝瘧陽明與胃瘧太陰與脾瘧少陰與腎瘧各有臟腑經氣之不同也故當時察其病形或腰痛頭重或心寒善驚以知其何脈之病蓋經脈乃胃腑之所生五臟之所主故曰以知何脈之病先其發時如食頃而刺之一刺則衰二刺則知三刺則已先其發時如食頃者先於未發之前而刺之也刺之者以足太陽之瘧取郄中陽明之瘧取足胕肺瘧刺手太陰陽明心瘧刺手少陰也一刺則病衰二刺則知三刺則病已按上古以小便利腹中和為知楊元如曰邪在氣分者宜後其時以刺之蓋氣為陽其性銳故當避其來銳邪在血分者宜先其時以取之蓋血為陰其性柔故當迎而奪之不已刺舌下兩脈出血不已刺郄中盛經出血又刺項以下挾脊者必已舌下兩脈者廉泉也舌下兩脈任脈之廉泉穴也郄中王氏謂委中也盛經者謂血氣盛於此也項以下挾脊者胠俞背俞也蓋任脈統任一身之陰為經絡之海而臟腑之經俞皆屬於太陽故刺本經不愈而復取任脈及足太陽之郄中背俞其病立已也刺瘧者必先問其病之所先發者先刺之此言邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病必先問其所先發者先刺之倪沖之曰用三先字者謂邪或舍於頭項而又兼中於腰背或舍於腰背而又兼中於手足衛氣先至之處其病先發是一日之中或又有兩發之瘧也先頭痛及重者先刺頭上及兩額兩眉間出血先項背痛者先刺之先腰脊痛者先刺郄中出血先手臂痛者先刺手少陰陽明十指間先足脛痠痛者先刺足陽明十指間出血頭上謂上星百會兩額謂懸顱兩眉間為攢竹諸穴也項背痛者或刺風池風府或項背所痛之處隨其病而取之郄中王氏謂委中也手少陰陽明十指間者謂十指間之少衝商陽也足陽明十指間者足十指間之厲兌也蓋少陰心臟主血脈而手足井滎之血氣皆陽明之所生是以手足痛者獨取於少陰陽明張兆璜曰惟項背之瘧見證不一有邪入於風府隨衛氣上下而日作早晏者有邪留於項背而遇衛氣以日作晏者有邪留於項背之間而不與衛氣之日作晏者故概而言之曰先刺之風瘧瘧發則汗出惡風刺三陽經背俞之血者此言病風瘧者亦當取足太陽之經也瘧發則汗出惡風者表陽之氣虛也三陽太陽也背俞太陽之經俞也蓋太陽之氣主表邪傷太陽則表氣虛而惡風故宜瀉太陽之邪䯒痠痛甚按之不可名曰胕髓病以鑱針針絕骨出血立已䯒下敬切痠音酸胕音附鑱音讒此風邪深入於骨髓中者宜刺足少陽之絕骨穴蓋少陽之氣主骨也䯒足骨胕足面也風邪入傷骨髓故痠痛不可按鑱針九針之第一主瀉陽熱之氣者也絕骨在足外踝上三寸動脈中針二分留七呼倪仲宣曰足胕乃陽明之部分此風木之邪賊傷胃土故名曰胕髓病身體小痛刺至陰此言風瘧之病身體痛者宜取至陰之經也脾為陰中之至陰而外主四肢肌肉故經云脾絡實則一身盡痛是以身體小痛者宜刺脾臟之經蓋亦風木之邪賊傷脾土也諸陰之井無出血間日一刺此承上文而言手足三陰之井穴不宜出血蓋井穴乃經氣之交故邪在陽之氣分者宜瀉出其血病在陰之經而宜取陰之井者可間日一刺則邪氣自泄不必至於出血以泄真陰之氣張兆璜曰此申明上文之所謂刺至陰者當刺至陰之井穴並申明所謂至陰者非太陽之至陰也瘧不渴間日而作刺足太陽渴而間日作刺足少陽此言瘧之渴與不渴者又有水火寒熱之氣化也太陽之上寒水主之故不渴者取足太陽少陽之上相火主之故渴者取足少陽間日者邪入於裡也夫邪入於裡則渴是以間二日或間數日者有陰陽更勝之或甚或不甚若陽分之邪入里則有水火寒熱之或渴或不渴也溫瘧汗不出為五十九刺溫瘧者得之冬中於風寒病氣藏於腎若汗不出是邪不能出之於陽故當為五十九刺五十九刺者以第四針刺骨也氣厥論篇第三十七黃帝問曰五臟六腑寒熱相移者何帝突問臟腑寒熱相移則為何如之病蓋承上章而復論瘧氣之厥逆也寒熱者邪正陰陽之氣也如邪舍於臟腑募原之間陰陽外內相乘則為往來之寒熱如臟邪傳移於臟腑邪傳移於腑則為氣逆之變病矣是以此篇單論五臟六腑寒熱相移楊元如曰瘧邪不解多生變病者當知氣厥之所致倪沖之曰瘧不死人病瘧而有死者傳臟故也岐伯曰腎移寒於肝癰腫少氣按下文腎移熱於脾此移寒於肝亦當作脾脾主肌肉寒氣化熱則腐肉而為癰膿脾統攝元真之氣脾臟受邪故少氣也脾移寒於肝癰腫筋攣肝主血寒則血凝泣經曰榮氣不行乃發為癰肝主筋故筋攣也肝移寒於心狂隔中肝為陽臟而木火主氣陽並於陽故狂心居膈上肝處膈下母子之氣上下相通肝邪上移於心留於心下故為隔中蓋言臟不受邪五臟之寒熱相移留薄於臟外而干臟氣不傷臟真者也倪沖之曰治五臟者半死半生蓋病臟氣者生傷臟真者死心移寒於肺肺消肺消者飲一溲二死不治肺受心邪則不能通調水液而惟下泄矣肺為金水之原寒隨心火消爍肺精是以飲一溲二者肺液並消故為不治之死證肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也夫在地為水在天為寒腎為水臟肺主生原是以肺之寒邪下移於腎而腎之水氣反上湧於肺矣大腸乃肺之府肺居膈上故水氣客於大腸疾行則鳴濯濯有聲如以囊裹漿者水不沾流走於腸間也倪沖之曰肺移於腎肝移於心傳其我所生也腎移於脾脾移於肝侮其所不勝也心移於肺乘其己所勝也脾移熱於肝則為驚衄東方肝木其病發驚駭肝主血故熱甚則衄肝移熱於心則死心主君火而不受邪邪熱乘之故死心移熱於肺傳為膈消心肺居於膈上火熱淫於肺金則金水之液涸矣膈消者膈上之津液耗竭而為消渴也肺移熱於腎傳為柔痓腎者水也而生骨腎臟燥熱則髓精不生是以筋骨痿弱而為柔痓腎移熱於脾傳為虛腸澼死不可治太陰濕土主氣不能制水而反受濕熱相乘脾氣虛傷則不能磨運水穀而為腸澼下利穀氣已絕故為不治之死證胞移熱於膀胱則癃溺血膀胱者胞之室也衝任起於胞中為經血之海胞移熱於膀胱是經血之邪移於膀胱故溺血熱則水道燥涸故癃閉也張兆璜曰臟為陰腑為陽故臟邪相傳有寒有熱腑邪相傳但熱不寒蓋寒邪在腑亦化熱矣膀胱移熱於小腸膈腸不便上為口麋小腸之脈絡心循咽下膈屬小腸小腸之下名曰闌門濟泌別汁滲入膀胱膀胱反移熱於小腸是以膈腸不能下滲濕熱之氣反隨經上逆而口為之糜爛矣小腸移熱於大腸為虙瘕為沉虙音伏與伏同瘕者假也假津血而為聚汁也蓋小腸主液大腸主津小腸移熱於大腸則津液留聚而為伏瘕矣沉痔也小腸主火大腸主金火熱淫金則為腸痔邪氣臟腑篇曰腎脈微澀為不月沉痔曰沉者抑上古之省文或簡脫耶朱聖公曰諸家註釋皆以沉為伏瘕沉滯按經文用二為字是系二證不可並作一證論當以師注為是大腸移熱於胃善食而瘦又謂之食亦胃主受納水穀大腸為傳導之官大腸熱邪反逆乘於胃是以胃熱則消穀善食陽明燥熱則榮衛津液不生故雖能食而瘦亦解㑊也謂雖能食而身體懈惰故又謂之食㑊胃移熱於膽亦曰食亦五臟六腑之生氣皆取決於膽膽氣燥熱則生陽不升故身體懈惰胃氣熱則消穀善飢故亦曰食㑊張兆璜曰足少陽之瘧令人身體解㑊今胃移熱於少陽故亦名曰食㑊膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也頞音遏膽氣上升則熱隨入腦挾鼻兩旁曰頞辛頞者鼻頞辛酸也鼻淵者濁涕下不止也蓋腦為精髓之海髓者骨之充也腦者陰也故腦滲則為涕愚按胞膽腦髓奇恆之府也腸胃膀胱四形臟也論奇恆之府相傳者謂膽與腦胞與膀胱無經絡之相通乃熱邪在氣而氣相乘也至於腸胃之逆傳亦邪熱在氣而不在腑故為伏瘕食㑊之證而不得從下解楊元如曰腎主藏精而居下腦為精髓之海而居上膽者中精之府也三者並主藏精精氣相通故膽邪移入於腦倪沖之曰少陽屬腎膽氣通於腦腦髓通於腎是精氣之上下循環傳為衄蔑瞑目故得之氣厥也此總釋臟腑寒熱相移皆在氣而不在經故曰得之氣厥也夫熱氣上升迫於絡脈則為衄淡滲皮毛之血不能化液為汗則為蔑邪熱傷氣而陽氣虛則目瞑言邪出於腦則傳於氣分而為衄蔑瞑目之證並釋經脈內連臟腑如臟邪在經入臟則死腑邪在經則溜於腸胃而從下解此邪在臟腑氣分故外內相乘則為寒熱之往來臟腑相移則為寒熱之氣厥此在氣而不在經故篇名氣厥論而末結曰得之氣厥也咳論篇第三十八黃帝問曰肺之令人咳何也岐伯對曰五臟六腑皆令人咳非獨肺也肺主氣而位居尊高受百脈之朝會是咳雖肺證而五臟六腑之邪皆能上歸於肺而為咳帝曰願聞其狀岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳此首論咳屬肺臟之本病也肺為陰主秋金清肅之氣是以形寒飲冷則傷肺皮毛者肺之合天之寒邪始傷皮毛皮毛受邪則邪氣從其合而內傷肺矣手太陰之脈起於中焦還循胃口寒飲入胃則冷飲之邪從肺脈而上至於肺矣外內之邪合併因而客之則為肺咳矣五臟各以其時受病非其時各傳以與之次論五臟之邪上歸於肺而亦為咳也乘春則肝先受邪乘夏則心先受邪乘秋則肺先受邪是五臟各以所主之時而受病如非其秋時則五臟之邪各傳與之肺而為咳也人與天地相參故五臟各以治時感於寒則受病微則為咳甚則為泄為痛人與天地參也五臟之氣與四時五行之氣相合故五臟各以所主治之時而感於寒則受病微則上乘於肺而為咳甚則上行極而下為泄痛矣乘秋則肺先受邪乘春則肝先受邪乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之此申明五臟各以其時受病也曰先受之者謂次即傳及於肺而為咳也咳乃肺之本病故先言肺先受邪帝曰何以異之言何以明其五臟之不同也岐伯曰肺咳之狀咳而喘息有音甚則唾血狀形狀也肺司呼吸故咳則喘息有音肺主氣甚則隨氣上逆而唾血也心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹臟腑病形篇曰心脈大甚為喉吤蓋喉乃肺之竅心火淫金故喉中介然如梗狀手少陰心脈起於心中出屬心系上挾咽故咽喉皆腫痛也肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿肝脈布腰肋上注肺故咳則兩脅下痛不可轉者不可以俯仰也脅下謂之胠蓋肝邪上乘於肺則為咳甚則下逆於經而不可以轉轉則胠下滿也脾咳之狀咳則右脅下痛陰陽引肩背甚則不可以動動則咳劇脾臟居右故咳則右脅下痛脾氣上通於肺肺之俞在肩背故陰陰引於肩背也不可以動者不能動搖也經脈篇曰肝是動則病腰痛不可以俯仰脾病則身體皆重不能動搖蓋微則上乘於肺而為咳甚則病及於本經腎咳之狀咳則肩背相引而痛甚則咳涎腎脈貫膈入肺中故咳則肺俞相引而痛肺腎皆積水也故甚則咳涎帝曰六腑之咳奈何安所受病岐伯曰五臟之久咳乃移於六腑奈何者何狀也安所受病者病從安生也蓋五臟之氣與天地四時五行之氣相參合故各以時受病而六腑之病又從臟氣而轉移脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出脾與胃合脾病移於胃則胃氣反逆故嘔嘔甚則穀氣消谷消則蟲上入胃故甚則長蟲出長蟲蛔蟲也張兆璜曰胃之精氣上輸於脾脾病傳胃故胃氣反逆而為嘔肝咳不已則膽受之膽咳之狀咳嘔膽汁膽汁苦汁也邪在膽則逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽汁也肺咳不已則大腸受之大腸咳狀咳而遺失大腸者肺之府為傳道之官是以上逆則咳下逆則遺失當作矢廉頗傳曰坐頃三遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失失氣後氣也夫厥氣上逆則咳下逆則為失為遺氣與咳俱失者厥逆從上下散也張兆璜曰陰陽氣厥則為寒熱相移邪氣上逆則為咳下逆則為失為遺寒熱之氣客於形身則為痛當知百病皆生於氣也腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲腎合膀胱膀胱者津液之府水道出焉故咳而遺溺靈樞經曰少陽屬腎腎上連肺故將兩臟三焦者中瀆之府也水道出焉屬膀胱是孤腑也是六腑之所與合者是以腎咳不已膀胱受之久咳不已三焦受之是腎為兩臟而合於六腑者也三焦為中瀆之府故腹滿咳則上焦不能主納故不欲食飲也此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也此言膀胱三焦之咳皆邪聚於胃而上關於肺故也夫三焦為決瀆之府膀胱者津液之所藏關門不利則聚水而從其類矣水聚於胃則上關於肺而為咳咳則肺舉肺舉則液上溢故使人涕唾水氣上乘故面浮腫而氣厥也帝曰治之奈何岐伯曰治臟者治其俞治腑者治其合浮腫者治其經咳在五臟當治其俞五臟之俞皆在於背欲知背俞先度其兩乳間以草度其背是謂五臟之俞灸刺之度也合治內腑故咳在六腑者取之於合胃合於三里大腸合入於巨虛上廉小腸合入於巨虛下廉三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉浮腫者取肺胃之經脈以治之舉痛論篇第三十九黃帝問曰余聞善言天者必有驗於人善言古者必有合於今善言人者必有厭於己如此則道不惑而要數極所謂明也本經云氣傷痛蓋痛在有形之形身而傷於無形之氣分是病皆生於寒熱七情而證見於臟腑經脈舉痛而論百病皆然能會通此道庶明而不惑是以帝言知天道者苟能驗於人知往古者苟能合於今善言人者必有足於己如此則道不惑而知要數之極斯所謂之明道者也今余問於夫子令言而可知視而可見捫而可得冷驗於己而發明解惑可得而聞乎經云知一為工知二為上知三為神知斯三者望見其色按其脈問其病也是以帝欲聞此三者之應驗而開發於未明岐伯再拜稽首對曰何道之問也請示問端也帝曰願聞人之五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛泣音澀卒葉村入聲經氣流轉如環無端寒氣客之則凝泣而不行矣客於脈外則脈縮蜷而血少客於脈中則脈滿而氣不通故卒然而痛也張兆璜曰氣為陽血為陰氣無形血有形氣行脈外血行脈中客於脈外則血少客於脈中則氣不通正言其形氣交感之要道帝曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引而痛者或腹痛引陰股者或痛宿昔而成積者或卒然痛死不知人有少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者凡此諸痛各不同形別之奈何形證也言通證之各有不同將何以別之岐伯曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久矣絀音屈炅音炯重平聲絀猶屈也寒則血凝泣故脈縮蜷縮蜷則絀急而外引小絡夫經脈為里浮而外者為絡外內引急故卒然而痛也炅氣太陽之氣也脈寒而得陽熱之氣則縮絀即舒故其痛立止若復感於寒則陽氣受傷故痛久而不止莫子晉曰太陽日中之火也太陽主諸陽之氣陽熱之甚者也此受天之寒邪得吾身之陽氣以化熱故痛立止寒氣客於經脈之中與炅氣相搏則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而氣血亂故痛甚不可按也榮血行於脈中陽氣行於脈外寒邪在脈與陽相搏則血氣淖澤而脈滿矣脈滿故痛而不可按也寒氣稽留於脈中陽氣惟升而從上血氣不能相將而循行則亂矣寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止膜原者連於腸胃之脂膜亦氣分之腠理金匱要略云腠者是三焦通會元真之處理者皮膚臟腑之紋理也蓋在外則為皮膚肌肉之腠理在內則為橫連臟腑之膜原皆三焦通會元氣之處如寒氣客於腸胃膜原之間則內引小絡故痛也夫痛者陰也氣為陽經絡為陰是以本篇論痛皆邪傷於經脈如邪客於脈外之氣分而迫於經絡為痛者或得炅或按之則痛止蓋寒邪得氣而易散也如邪入於經絡而為痛者甚則不可按或雖按之無益蓋陰分之邪難散也此邪在膜原之氣分牽引小絡而痛故按之即止張兆璜曰邪在肌腠之脈外則外引小絡而痛邪在膜原之脈外則內引小絡而痛蓋膜原之間有血絡也寒氣客於挾脊之脈則深按之不能及故按之無益也挾脊之脈伏沖之脈也伏沖之脈上循背裡邪客之則深按之不能及故按之無益也倪沖之曰則深者謂邪客於挾脊之衝脈則深在於腹之衝脈則浮於外而淺矣寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣此言衝脈之循於腹者會於咽喉而散於脈外也夫衝脈之循於背者注於經其浮而外循於腹者至胸中而散於脈外之氣分故脈不通則氣因之而喘動應手謂脈逆於胸之下而氣因病於胸之上喘動應手者人迎氣口喘急應手也倪沖之曰分別衝脈之有挾脊循腹故曰隨腹直上則氣因之寒氣客於背俞之脈則脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣此言太陽為炅熱之氣雖寒客於經俞得氣至則痛止矣背俞之脈者足太陽之脈也太陽之脈循於背而五臟六腑之俞皆注於心故相引心而痛心為陽中之太陽蓋與太陽之氣標本相合是以按之則熱氣至而痛止矣寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣肝主血故寒氣客於厥陰之脈則血泣脈急肝脈布脅肋循陰器故脅肋與少腹相引而痛倪沖之曰五臟六腑之經俞榮血發原於衝脈而藏於厥陰之肝經寒傷榮故客於衝脈背俞厥陰也厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股此承上文而言寒氣在上厥氣在下上下相引而為痛也厥陰之脈上抵少腹下循陰股故腹痛引陰股蓋言經氣上下相通故邪正相引而為痛寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣此言膜原之間亦有血絡寒氣客於膜原之血絡不得入於大經而成積也百病始生篇曰虛邪之中人在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於腸胃之外膜原之間留著於脈稽留而不去息而成積蓋言脈在於外內之絡脈者必轉入於大經而後乃代謝如血氣稽留於絡脈則宿昔而成積矣宿昔稽留久也息止也大經臟腑之大絡也寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於五臟臟陰之氣厥逆於上而從上泄則陰氣內竭矣陽熱之氣又未入於內則裡氣虛傷故卒然痛死不知人得陰陽之氣復反於內則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於腸胃之間從胃上出故痛而嘔愚按在臟之邪溜腑而解在腸胃之邪從下泄而解今臟腑之邪皆從上逆而出者病氣而不入經也寒氣客於小腸小腸不得成聚故後泄腹痛矣此言寒氣客於小腸之間轉入於腸內故不成積聚而為後泄腹痛也楊元如曰邪在於膜原血絡之中轉註於大經則入於腸內蓋邪入於經則溜於腑熱氣留於小腸腸中痛癉熱焦渴則堅幹不得出故痛而閉不通矣此承上文而言小腸之邪不得後泄而為熱閉也熱氣者寒氣稽留而化熱也小腸為赤腸乃心臟之府故感火氣而化熱癉消癉也小腸主液腸中熱則液消而為癉熱矣焦者火之氣感火熱之氣而為焦渴也液消熱燥則受盛之物堅干而不得出故痛閉不通矣楊元如曰此篇論寒氣而末結熱氣一條者謂寒邪稽留不去得陽熱之氣而能化熱者也帝曰所謂言而可知者也視而可見奈何言而可知者言其病而知其處也視而可見者觀其色而見其病也岐伯曰五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也五臟六腑之氣色皆見於面而各有所主之部位視其五色而可見其病矣中有熱則色見黃赤寒則血凝泣故面白脫色也青黑乃陰寒凝滯之色故為痛帝曰捫而可得奈何謂按其脈而得其病也岐伯曰視其主病之脈堅而血及陷下者皆可捫而得也主病之脈者臟腑所主之病脈也堅而血者邪氣實也陷下者正氣虛也言邪正虛實皆可捫而得之帝曰善余知百病生於氣也夫寒暑運行天之陰陽也喜怒七情人之陰陽也是以舉痛而論陰陽寒熱知百病之皆生於氣焉董子繁露曰天有春夏秋冬人有喜怒哀樂張兆璜曰智者之養生順四時而適寒溫和喜怒而安居處則苛疾不起百病不生怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生問寒熱七情皆傷人氣而氣有上下消耗之不同是何病之所生也岐伯曰怒則氣逆甚則嘔血及飧泄故氣上矣怒為肝志肝主藏血怒則肝氣上逆故甚則嘔血木氣乘脾故及為飧泄脾位中州肝臟居下故嘔血飧泄皆為氣上喜則氣和志達榮衛通利故氣緩矣喜乃陽和之氣故志意和達榮衛疏通其氣舒徐而和緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣心氣並於肺則悲心悲氣並則心系急心系上連於肺心系急則肺布而葉舉矣肺主氣而位居上焦主行榮衛陰陽肺臟布大而肺葉上舉則上焦之氣不通而榮衛不能行散矣氣鬱於中則熱中氣不運行故潛消也恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣氣者水中之生陽也腎為水臟主藏精而為生氣之原恐傷腎是以精氣退卻而不能上升膻中為氣之海上出於肺以司呼吸然其原出於下焦故精氣卻則上焦閉閉則生升之氣還歸於下而下焦脹矣上下之氣不相交通故氣不行矣寒則腠理閉氣不行故氣收矣腠理者肌肉之紋理乃三焦通會元真之處寒氣客之則腠理閉而氣不通故氣收於內矣炅則腠理開榮衛通汗大泄故氣泄衛行脈外之腠理汗乃榮血之陰液夫氣為陰之固陰為陽之守炅則腠理開汗大泄則陽氣從而外泄矣驚則心無所倚神無所歸慮無所定故氣亂矣驚則心氣散而無所倚神志越而無所歸思慮惑而無所定故氣亂矣勞則喘息汗出外內皆越故氣耗矣勞則腎氣傷而喘息於內陽氣張而汗出於外外內皆越故氣耗散矣思則心有所存神有所歸正氣留而不行故氣結矣所以任物謂之心心之所之謂之志因志而在變謂之思故思則心神內存正氣留中而不行故氣結矣腹中論篇第四十黃帝問曰有病心腹滿旦食則不能暮食此為何病此篇論外不涉於形身內不關乎臟腑在於宮城空郭之中或氣或血或風或熱以至於女子之妊娠皆在於空腹之中故篇名腹中論帝曰心腹滿者謂胸膈間乃心主之宮城腹中乃臟腑之郛郭也岐伯對曰名為鼓脹鼓脹者如鼓革之空脹也此因脾土氣虛不能磨谷故旦食而不能暮食以致虛脹如鼓也帝曰治之奈何岐伯曰治之以雞矢醴一劑知二劑已雞矢取雞屎上之白色者雞之精也雞屬陽明秋金在卦配巽風木此乃脾土艱於運化以致脹滿不食風木製化土氣陽明燥合太陰醴乃熟谷之液釀以稻米炊之稻薪主補益中土而先行於榮衛者也故一劑則腹中溫和二劑其病則已張兆璜曰雞鳴於寅酉之時鳴則先鼓其翼風木之象也蓋木擊金而後鳴矣又說者曰羽蟲無肺故無前陰屎中之白者精也帝曰其時有復發者何也岐伯曰此飲食不節故時有病也雖然其病且已時故當病氣聚於腹也飲食不節則復傷其脾故時有復發也或雖非飲食不節值其病且已之時而即受其飲食故當病氣聚於腹此深戒其慎節於飲食也帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之上節論腹中氣虛其病在脾此論腹中血脫所傷在肝也夫血乃中焦水穀之汁專精者行於經隧為經脈之血其流溢於中者注於腎臟而為精復奉心化赤而為血從胞中而注於衝脈循腹上行至胸中而散充膚熱肉淡滲於皮膚而生毫毛臥則歸藏於肝寤則隨衛氣而復行於皮膚之氣分男子絡唇口而生髭鬚女子以時下為月事此流溢於中布散於外之血也是以此血虛脫則肝氣大傷有病胸脅支滿者肝虛而脹滿也食氣入胃散精於肝肝氣傷故妨於食也肝臭臊肺臭腥不能淡滲皮毛則肺虛無所歸藏於肝則肝虛肝肺兩虛是以病至則先聞腥臊臭也肺氣虛出清液肝臟虛先唾血也不能充膚熱肉則四肢冷肝開竅於目故目眩也肝主疏泄時時前後血者肝無所藏而虛泄矣岐伯曰病名曰血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也有所大脫血則傷肝肝傷在女子則月事衰少不來矣醉以入房在男子則傷精精傷則無從而化赤矣氣生於精血精血虛脫則氣竭矣楊元如曰傷寒論熱入血室刺肝經之期門本經曰肝傷故月事衰少是女子之月事發原於胞中上行於衝任布散於皮毛歸藏於肝臟而後下為月事者也帝曰治之奈何復以何術問治以何藥復以何法救之岐伯曰以四烏鰂骨一藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也鰂賊同藘茹當作茹藘烏鰂骨烏賊魚之骨也鰂魚狀若胞囊腹中有墨脊上只生一骨輕脆如通草蓋烏者腎之色骨乃腎所生主補益腎藏之精血者也茹藘一名茜草又名地血汁可染絳其色紫赤延蔓空通乃生血通經之草也夫魚乃水中動物屬陰中之陽血中之氣故用烏鰂骨四者以布散於四肢也血乃中焦所生用茹藘一者主生聚於中焦也夫飛者主氣潛者主血卵白主氣卵黃主血雀乃羽蟲丸以雀卵者因氣竭肝虛補血而補氣也豆乃腎之谷五者土之數氣血皆中焦所生故宜飯後而服五豆許也鮑魚味鹹氣臭主利下行故飲鮑魚汁以利腸中而後補及於肝之傷也又按甲乙經藘茹作䕡茹帝曰病有少腹盛上下左右皆有根此為何病可治不岐伯曰病名曰伏梁盛滿也少腹臍下也上下左右皆有根此病在血分有脈絡之連絡於上下四旁也伏梁如梁之橫伏於內也按上二節論氣血之虛脹此下二節論血氣之實脹也帝曰伏梁因何而得之岐伯曰裹大膿血居腸胃之外不可治治之每切按致死裹大如囊之裹物而大也居腸胃之外在空郭之間也不可治者不可治以按摩也如急切欲其解散而按摩之必致痛而欲死蓋有形之邪不易散也帝曰何以然岐伯曰此下則因陰必下膿血上則迫胃脘生膈挾胃脘內癰此下謂少腹陰前後二陰也衝脈起於胞中並足陽明挾臍左右循腹上行此因陰中必下膿血循經而上則迫及胃脘生膈挾胃脘內癰以致留積膿血於腸胃之外而如囊裹之大也張兆璜曰胃脘正當膈間曰膈挾胃脘內癰者謂癰生於膈胃之間乃在胃外之膜原而非胃上也朱聖公曰此係熱中之病故在陰則下膿血上則迫生胃癰此久病也難治居齊上為逆居齊下為從齊臍同久病者謂癰生於膈胃之間病者不覺故癰膿漸積於腹中而成裹大也臍上乃腹中之氣分故為逆臍下乃胞中之血分易於行泄故為從勿動亟奪論在刺法中勿動者不可按摩引動也亟急也言亟當迎而奪之以瀉之其刺取之法用圓利針微大其末反小其身令可深納以取癰痹此論在針經之刺法中帝曰人有身體髀股䯒皆腫環臍而痛是為何病岐伯曰病名伏梁此風根也此論邪留氣分而為伏梁也氣行於肌腠之間是以身體股䯒皆腫風為陽邪傷人陽氣此風邪傷氣而留於臍腹之間故曰此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也肓音荒大腸謂大腸之外空郭之間風邪之氣充溢於大腸之外而留著於肓肓乃膏肓即膜原之屬肓之原出於脖胦正在臍下故繞臍而痛也不可動之動之為水溺澀之病不可動者不可妄攻以動之也蓋風邪之根留於臍下動之則風氣淫佚而鼓動其水矣水溢於上則小便為之不利矣帝曰夫子數言熱中消中不可服膏粱芳草石藥石藥發癲芳草發狂熱中謂膿血風邪留中而為熱也消中謂氣虛血脫而為消中之虛滿也膏粱厚味也芳草芳香之草石藥金石之藥也芳草之氣升散為陽故令人發狂金石之藥沉重為陰故令人發癲也夫熱中消中者皆富貴人也今禁膏粱是不合其心禁芳草石藥是病不愈願聞其說富貴之人形樂而志苦華食而縱淫夫四體不勞則血氣留滯心志煩苦則中氣內傷膏粱華食則脾胃有虧放縱淫欲則精血耗竭是以熱中消中多生於富貴之人如不豐美其食是不合其心留中之病宜於上下分消若禁芳草石藥故病不能愈岐伯曰夫芳草之氣美石藥之氣悍二者其氣急疾堅勁故非緩心和人不可以服此二者芳草者其氣急疾於馨散石藥者其性堅勁於下沉故非中心和緩之人服之則中氣易於虛散也帝曰不可以服此二者何以然岐伯曰夫熱氣慓悍藥氣亦然二者相遇恐內傷脾脾者土也而惡木服此藥者至甲乙日更論此言腹中之氣脾所主也和柔敦化土之德也熱中消中有虛有實皆為熱氣留中若更服芳香悍熱之藥二者相遇則內傷中和之脾土矣脾病者加於甲乙至甲乙日恐有勝克之變故至期更當別論也帝曰善有病膺腫頸痛胸滿腹脹此為何病何以得之岐伯曰名厥逆以下三節復申明腹中之氣與血焉腹氣者脾氣也內主於腹外主於肌與手足三陰三陽之氣不同也腹中之血者起於胞中散於脈外與十二經脈之血不同也是以腹中之氣血虛脫則為消中之虛脹腹中之血裹氣傷皆為有餘之伏梁今復論腹中之氣反厥逆於上則為膺頸胸腹之腫痛滿脹下節論腹中之血氣和平則為懷子之且生末節論三陽之氣反下入於陰則為腹中之䐜脹當知血氣流行而又各有所主之部署也倪沖之曰胸腹脹滿者因中氣厥逆於上而虛脹也帝曰治之奈何岐伯曰灸之則喑石之則狂須其氣並乃可治也帝曰何以然岐伯曰陽氣重上有餘於上灸之則陽氣入陰入則喑石之則陽氣虛虛則狂須其氣並而治之可使全也夫諸陽之氣上升而腹氣又厥逆於上是陽氣重上而有餘於上矣夫陽氣陷下則灸之今陽盛於上而反灸之則陽熱之氣反入於經脈之陰則為喑若以石砭之則陽氣外泄而虛虛則狂矣氣並者血氣合併也須其厥逆之氣與血相併而後治之可使全也張兆璜曰脾氣主於腹中行於肌肉乃五臟元真之氣也衝脈之血亦從胸中而散於肌腠皮膚之間故與脾氣併合須其氣並者使氣歸於肌腠而與血交併如石之則泄於皮膚之外灸之則逆於經脈之中帝曰善何以知懷子之且生也岐伯曰身有病而無邪脈也此論腹中之血氣和平而有生成之造化也夫氣主生物血主成物懷子者血氣之相和也且生者謂血氣之所以成胎者虛繫於腹中而無經脈之牽帶故至十月之期可虛脫而出當知月事懷妊之血在氣分而不在經脈也身有病者月事不來也無邪脈者血氣和平也楊元如曰至哉坤元資生萬物腹中之氣坤土之氣也是以白朮補脾為養胎之聖藥衝任之血原於腎藏之精陽主施化陰主成形是以歸芎熟地乃胎產之神方帝曰病熱而有所痛者何也岐伯曰病熱者陽脈也以三陽之動也人迎一盛少陽二盛太陽三盛陽明入陰也夫陽入於陰故病在頭與腹乃䐜脹而頭痛也帝曰善此言三陽之氣主於形身之表如下入於陰中則為腹脹矣夫病熱者陽脈盛也陽脈盛者三陽之氣動之也是以人迎之脈一盛盛在少陽之氣二盛盛在太陽之氣三盛盛在陽明之氣三陽俱盛當主病熱頭疼腹為陰陰中之至陰脾也如陽入於陰又當病在頭與腹乃䐜脹而頭痛也蓋言表裡陰陽之氣各有所主之部署如陰氣厥逆於上則為膺頸腫痛陽氣下入於陰中則為腹中䐜脹也莫仲超曰伯言病熱者陽脈也以三陽之動也謂陽脈之盛乃三陽之氣動之兼申明陽入於陰乃是三陽之氣而非三陽之經脈也傷寒論曰臟腑相連邪高痛下此言經病於表陽之上而下連於里陰經脈上下相連故病在上而痛在下也當知病在經脈而隨經下入於裡陰者則痛而不脹此病在氣分而陽氣下入於腹中故脹而不痛也刺腰痛篇第四十一足太陽脈令人腰痛引項脊尻背如重狀按此篇承上章而復記病在形身之外經絡之間令人腰痛者有刺取之法也夫身半之中在內為腹在外為腰腹中之血氣不循經而灌於膜原郛郭之間是以為病則胸滿腹脹為治所不宜灸砭至於陰陽經脈皆從腰而循轉是以為病則痛於有形為治皆所當刺取此形身外內之各有別也所謂經脈者足之三陰三陽及奇經之八脈皆循腰而上惟足太陰之脈從膝股內廉入腹屬脾以主腹中故不論於外也張兆璜問曰足之三陰三陽及奇經八脈有從腰脊而上循於頭項有從胸腹而上屬於膺喉今獨主腰痛者何也曰腰以上為天腰以下為地而帶脈橫束於其間是以無病則天地交而經脈調病則經氣阻滯於其間而為痛故諸脈皆令人腰痛也刺其郄中太陽正經出血春無見血足太陽之脈從巔別下項挾脊抵腰中經脈阻滯於其間則腰痛上下不能疏通故引項脊尻背如重狀也王冰以委中為郄中在膝後屈處出血者瀉而疏之也春無見血者正月太陽寅故不宜出血以泄太陽方盛之氣按此篇記經脈為病而痛於腰之實證與內傷肝腎外病筋骨之虛痛者不同也少陽令人腰痛如以針刺其皮中循循然不可以俯仰不可以顧少陽之氣主夏而夏氣在皮膚故皮中如針刺循循漸次也少陽主樞循循不可以俯仰者經脈病而樞折也足少陽之脈從目銳眥循頸至肩故不可以回顧刺少陽成骨之端出血成骨在膝外廉之骨獨起者夏無見血膝外廉陽陵泉之下有獨起之骨為成骨蓋足少陽主骨至此筋骨交會之處為成骨也少陽為心之表主夏之三氣故夏無見血莫仲超曰太陽之氣生於水中故主正月寅而始盛少陽為君火之相故為心之所表夫少陽主初生之氣者少陽先天之所生也少陽為心之表者少陽之上相火主之也太陽正月寅者太陽從水中之所生也太陽主夏火之氣者太陽之後天也陰陽之道推散無窮學者當詳究其妙陽明令人腰痛不可以顧顧如有見者善悲顧回視也足陽明之脈循喉嚨入缺盆經脈強急於前故不可回顧於後夫血脈榮衛陽明之所生也血脈和則精神乃居故神者水穀之精氣也陽明脈病則神氣乃虛精神虛亂卒然見非常物神不足則悲也刺陽明於䯒前三痏上下和之出血秋無見血䯒前三痏者足之三里及上廉下廉也陽明居中土故當上下以和之陽明主秋令故秋無見血楊元如曰少陽太陽之氣生於下焦水中而合於上焦君相之火故有先後天之分陽明之氣生於中焦水穀而居中土故獨主於秋令也足少陰令人腰痛痛引脊內廉足少陰之脈上股內廉貫脊屬腎故痛引脊內廉也刺少陰於內踝上二痏春無見血出血太多不可復也內踝上二痏取左右之太谿也夫血乃精水之所生腎主閉藏以奉春生之氣春時出血則泄其所藏是以多則不可復矣厥陰之脈令人腰痛腰中如張弓弩弦足厥陰之脈抵少腹布脅肋故腰痛如張弓弦蓋耎弱端長肝之平脈也肝脈病故強急如弓弩弦刺厥陰之脈在腨踵魚腹之外循之累累然乃刺之腨腿肚也踵足跟也魚腹謂腨之形如魚腹也視腨踵之間魚腹之外循之有脈累累然者乃刺之其病令人善言默默然不慧刺之三痏肝主語故其病令人善言默默安靜貌謂雖善言而不狂妄也不慧語言之不明爽也其病若此者於腨踵之外刺之三痏三痏者取經外穴也按腰中如弓弦者所病在經也善言不慧者病厥陰之氣而有是證也三陰三陽之主腰痛有單病在經者有病經而及於氣者故以此筋分而論之解脈令人腰痛痛引肩目䀮䀮然時遺溲䀮音荒解脈者散行橫解之絡脈也蓋經脈為里浮而橫者為絡絡脈橫散於皮膚之間故名曰解脈諸絡脈者在皮之部皮主太陽之氣分故痛引肩目時遺溲而宜取太陽之郄也散上聲刺解脈在膝筋肉分間郄外廉之橫脈出血血變而止膝後筋肉分間太陽之委中穴也郄外廉之橫脈穴外之橫絡也針經云支而橫者為絡絡之別者為孫盛而血者疾誅之故宜瀉出其血黑變赤而止倪沖之曰邪在橫解之絡脈故亦取橫脈以瀉之解脈令人腰痛如引帶常如折腰狀善恐此復論橫絡盛加於大經令之不通是以令人腰痛如引帶腰似折者太陽之氣病也橫盛於中則上虛下實下實則氣並於陰故善恐也刺解脈在郄中結絡如黍米刺之血射以黑見赤血而已有結絡如黍米視而瀉之此所謂解結也同陰之脈令人腰痛痛如小錘居其中怫然腫此論陽蹺之脈而令人腰痛也蹺脈有陰陽男子數其陽女子數其陰當數者為經不當數者為絡是男女陰陽經絡交併故為同陰之脈其脈行健故名曰蹺有阻於中則不上行故痛如小錘居其中怫然怒意言腫突如怒起也按蹺脈為病少腹痛裡急腰及髖窌下相連陰中痛陰疝本經言痛如小錘居其中即裡急陰疝之證也刺同陰之脈在外踝上絕骨之端為三痏陽蹺者足太陽之別脈起於跟中出於外踝下足太陽申脈穴當踝後繞跟以僕參為本上外踝三寸以附陽為郄直上循役外廉故宜取外踝絕骨之處陽維之脈令人腰痛痛上怫然腫此論陽維之脈而令人腰痛也陽維總維一身之陽陽氣盛故痛上怫然腫刺陽維之脈脈與太陽合腨下間去地一尺所陽維起於諸陽之會其脈發於足太陽金門穴在足外踝下一寸五分上外踝七寸會足少陽於陽交為陽維之郄故當與太陽合腨下間而取之蓋取陽維之郄也郄上去踝七寸是離地一尺所矣衡絡之脈令人腰痛不可以俯仰仰則恐僕得之舉重傷腰衡絡絕惡血歸之此論帶脈為病而令人腰痛也衡橫也帶脈橫絡於腰間故曰橫絡之脈夫足之三陽循腰而下足之三陰及奇經之脈皆循腰而上病則上下不通陰陽間阻而為腰痛之證惟帶脈橫束於其間無上下之相貫故必因舉重傷腰以致橫絡之脈絕傷而惡血歸之令人腰痛不可以俯仰也刺之在郄陽筋之間上郄數寸橫居為二痏出血郄陽謂足太陽之浮郄在臀下腿筋之間上郄數寸是在腰尻之下矣橫居二痏者蓋隨帶脈之橫形而取之按靈樞經曰足少陽之正主膕中別走太陽而合上至腎當十四椎出屬帶脈是帶脈之下連於足少陰太陽故當從浮郄而上循太陽之絡以取之會陰之脈令人腰痛痛上漯漯然汗出汗乾令人慾飲飲已欲走此論任脈為病而令人腰痛也任脈起於至陰與督脈交會分而上行故名曰會陰任脈統任一身之陰汗乃陰液故漯漯然汗出也汗乾則液竭故令人慾飲走者陽象也任與督脈上下相交飲已欲走者陰液周而交於陽也刺直陽之脈上三痏在蹺上郄下五寸橫居視其盛者出血直陽之脈督脈也督脈總督一身之陽貫脊直上故曰直陽其原起於腎下胞中循陰器繞臀至少陰與太陽中絡者合故取蹺上郄下者循足太陽之絡以瀉之也按會陰節後當有刺條刺直陽前宜有腰痛或簡脫與抑督與任交病在陰而取之陽耶滑伯仁曰任督二脈一源而二歧一在於身之前一行於身之後又督脈別絡自長強走任脈者由小腹直上貫臍中央入喉上頤會太陽于晴明穴是任督二脈陰陽合併分而上行然其間又有交會之處張兆璜曰飲已欲走是陰入於陽故當從督以瀉任且任脈循於腹而其痛在腰是所病之因在任而所成之證在督也飛陽之脈令人腰痛痛上怫怫然甚則悲以恐此論陰維之脈而令人腰痛也足太陽之別名曰飛陽去踝七寸別走少陰陰維之脈起於足少陰築賓穴為陰維之郄故名飛陽者謂陰維之原從太陽之脈走少陰而起者也怫怫鬱怒貌腎病者意不樂氣並於腎則恐也朱永年曰任督二脈與陽維陰維陽蹺陰蹺皆陰陽互相交會而起刺飛陽之脈在內踝上五寸少陰之前與陰維之會陰維之脈在內踝上五寸腨肉分中上循股內廉上行入腹故於此取之蓋內踝上五寸少陰之前乃足少陰與陰維交會之處昌陽之脈令人腰痛痛引膺目䀮䀮然甚則反折舌卷不能言此論陰蹺之脈而令人腰痛也陰蹺者足少陰之別其脈起於跟中同足少陰上內踝之上二寸以交信為郄直上循陰股入陰上循胸裡出人迎之前至咽喉交目內眥合於太陽陽蹺是以痛引膺目䀮䀮然交足太陽故甚則反折循咽喉故舌卷不能言也馬蒔曰昌陽即足少陽穴名一名復溜又名伏白刺內筋為二痏在內踝上大筋前太陰後上踝二寸所內筋謂大筋之前分肉也太陰後大筋前上踝二寸所即陰蹺之郄交信穴也散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲此論衝脈為病而令人腰痛也衝脈者起於胞中上循背裡為經絡之海其浮而外者循腹右上行至胸中而散灌於皮膚滲於脈外故名散脈也衝脈為十二經脈之原心主血脈故痛而熱熱甚生煩其循於腹者出於氣街挾臍下兩旁各五分至橫骨一寸經脈阻滯於其間故腰下如有橫木居其中起於胞中故甚則遺溺刺散脈在膝前骨肉分間絡外廉束脈為三痏衝脈者其輸上在於大杼下出於巨虛之上下廉故取膝前外廉者取衝脈之下俞也以上論奇經之八脈皆循腰而上故並主腰痛肉裡之脈令人腰痛不可以咳咳則筋縮急此論肉裡之脈而令人腰痛也肉者分肉里者肌肉之紋理也經云肉之大會為谷肉之小會為溪分肉之間溪谷之會以行榮衛以會大氣其小痹淫溢循脈往來微針所及與法相同蓋謂溪谷分肉之間亦有穴會循脈往來邪氣淫溢用微針取之與取絡脈之法相同夫分肉起於筋骨屬於氣分咳則動氣故不可以咳咳則筋縮急也刺肉裡之脈為二痏在太陽之外少陽絕骨之後為二痏者取左右二足穴也足少陽陽輔穴又名分肉穴在太陽膀胱經之外少陽絕骨穴之後去足外踝四寸乃其脈也夫肌肉之紋理屬骨而生從筋而起足少陽屬骨主筋故取少陽之分肉穴也按分肉之間溪谷之會小痹淫溢循脈往來能令人腰痛也孫絡之脈別經者其血盛而當瀉者亦令人腰痛是以首論橫解之絡脈為痛末論肉裡之間亦循脈而為腰痛也腰痛挾脊而痛至頭𠘧𠘧然目䀮䀮欲僵仆刺足太陽郄中出血𠘧音除此論經俞為病而令人腰痛也夫五臟六腑之俞皆在太陽之經而足太陽之脈挾脊抵腰上至於頭目是以腰痛挾脊而上及於頭目者邪入於經俞也𠘧𠘧短羽之鳥背強欲舒之象陽盛者不能俯故欲僵仆也夫邪之傷於人也先客於皮膚傳入於孫絡孫絡滿則傳入於絡脈留而不去傳舍於經脈留而不去傳入於經俞邪中於人雖有淺深然皆在於形身上下之間故並主腰痛是以論肉裡之膚腠解脈之橫絡足之三陰三陽及奇經之經脈以至於太陽挾脊之經俞為痛之見證各有不同而取刺亦各有法也腰痛上寒刺足太陽陽明上熱刺足厥陰不可以俯仰刺足少陽中熱而喘刺足少陰刺郄中出血此論陰陽之氣不和而令人腰痛也痛上寒者腰以上寒也痛上熱者腰以上熱也夫陰陽二氣皆出於下焦陽氣不能上升則腰痛而上寒陰氣不能上升則腰痛而上熱蓋氣阻於陰陽上下之間故腰痛也太陽巨陽也為諸陽主氣陽明間於二陽之間為陽盛之經故上寒者當取此二經以疏三陽之氣少陽主樞故不可俯仰者當取足少陽也厥陰主一陰初生之氣故上熱者取足厥陰少陰之氣中合於陽明上合於肺臟陰氣逆於下故中熱而喘也郄隙也謂經穴之空隙為郄陰郄者足少陰之築賓穴也腰痛上寒不可顧刺足陽明按此以下至引脊內廉刺足少陰系衍文謹照王氏原注王冰曰上寒陰市主之在膝下三寸伏兔下陷者中足陽明脈氣所發不可顧三里主之在膝下三寸胻外廉兩筋肉分間足陽明脈之所入也上熱刺足太陰王冰曰地機主之在膝下五寸足太陰之郄也中熱而喘刺足少陰王冰曰湧泉大鐘悉主之湧泉在足心陷者中足少陰脈所出大鐘在足跟后街中動脈足少陰之經也大便難刺足少陰王冰曰湧泉主之少腹滿刺足厥陰王冰曰太衝主之在足大趾本節後內間動脈應手足厥陰脈之所主也如折不可以俯仰不可舉刺足太陽王冰曰如折束骨主之不可以俯仰京骨崑崙悉主之不可舉申脈僕參悉主之束骨在足小趾外側本節後赤白肉際陷者中足太陽脈之所注也京骨在足外側大骨下赤白肉際陷者中按而得之足太陽脈之所過也崑崙在足外踝後跟骨上陷者中細脈動應手足太陽脈之所行也申脈在外踝下五分容爪甲陽蹺之所生也僕參在跟骨下陷者中足太陽陽蹺二脈之會愚按王氏所取之穴不過承襲前人或彼時醫家任取非出於經旨也引脊內廉刺足少陰王冰曰復溜主之從腰痛上寒不可顧至此件經語除注併合朱書新校正云按全元起本及甲乙經並太素自腰痛上寒至此並無乃王氏所添也今注云從腰痛上寒至併合朱書十九字亦非王冰之語蓋後人所加也腰痛引少腹控䏚不可以仰此復結足太陰之絡而為腰痛也控引也䏚季脅空處也足太陰之絡從髀合陽明上貫尻骨中與厥陰少陽結於下髎而循尻內入腹上絡嗌故腰痛引少腹而控䏚也腹䏚拘急故不可以仰息按此篇承上章之論腹中而並記刺形身之腰痛足之三陰三陽皆循腰而上下而足太陰之脈從股內廉入腹屬脾以主腹中是以首節只論少陰厥陰而不及於足太陰也然太陰之支別從髀貫尻亦令人腰痛故復記於篇末以使後學知形身外內經絡之各有別也刺腰尻交者兩踝胂上以月生死為痏數髮針立已胂音申腰尻交者腰下胯骨間乃足太陰厥陰少陽三脈左右交結於其間故曰腰尻交也兩踝即腰下兩旁起骨胂即兩踝骨上隴起肉也以月生死為數者月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之蓋月生則人之血氣漸盛月虧則人之血氣漸衰用針者隨氣盛衰以為痏數蓋針過其日數則脫氣不及日數則氣不瀉故以月之生死為期張兆璜曰月晦始蘇曰朔每月朔日是月始生之一日也左取右右取左脈之大絡左注右右注左此邪客於大絡故當以左右兩間取之若在橫解之浮絡是又當總取郄外廉之橫脈矣風論篇第四十二黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異其名不同或內至五臟六腑不知其解願聞其說風乃陽動之邪而人之表裡陰陽血氣臟腑又有虛有實故其為氣也善行而數變因其善行數變是以或為寒熱或為偏枯或外在於形身或內至於臟腑其病各異其名不同岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢慄而不能食名曰寒熱此論風邪客於膚腠而為寒熱也皮膚肌腠之間乃三焦通會元真之處風邪客之則氣不內通邪不外泄風動之邪善行而數變動而腠理開則元氣弛而灑然寒變而腠理閉則邪熱留而胸膈悶其為寒也則三焦虛而食飲衰其為熱也則邪熱盛而肌肉鑠怢慄振寒貌蓋言邪之所腠其正必虛正氣為邪所傷故使人怢慄而不能食也名曰寒熱怢音秩風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出此論風邪客於脈中而為寒熱也夫血脈生於陽明胃腑如風傷陽明邪正之氣併入於胃則循脈而上至於目蓋諸脈皆繫於目也其人肥厚則熱留於脈中而目黃其人瘦薄則血脈之神氣外泄而為寒脈中寒則精神去而涕泣出風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也此論風邪傷衛而為腫瘍不仁也足太陽之脈從巔入絡腦還出別下項循背膂而絡臟腑之脈俞衛氣一日一夜大會於項之風府亦循背膂而日下一節是以風客太陽與太陽之氣俱入於項背之間行諸脈俞散於分肉轉幹衛氣以致衛氣所行之道不利故使肌肉憤然高起而有癰瘍衛氣凝滯於項背之間不能循行於周身之膚腠故其肌肉麻痹而不知痛癢也兆璜曰風傷陽明之氣入胃而循於脈中風行太陽之脈俞復散於肌肉而轉幹衛氣是太陽之氣主表陽明主肌而主脈也䐜音瞋起也引起也邪氣脹肉曰䐜太玄經股腳䐜如維身之疾注䐜大也枝大於干為疾也癘者有榮氣熱胕其氣不清故使其鼻柱壞而色敗皮膚瘍潰此論風傷榮氣而為癘瘍也胕肉也夫營衛皆精陽之氣浮氣之不循於經者為衛精氣之營於經者為營有營氣熱胕者言有因風傷營氣據而為熱熱出於胕肉之間則肌脈外內之氣不清矣鼻者肺之竅臟真高於肺主行榮衛陰陽風邪與榮熱搏於皮膚之外則榮衛之氣不清故使其鼻柱陷壞而色敗惡而皮膚潰癩也風寒客於脈而不去名曰癘風或名曰寒熱此承上文而言如風寒之邪客於脈中而不去者亦名曰癘也風寒寒風也風寒之邪客於脈中而不去則營氣受傷亦名曰癘風夫營之生病也寒熱少氣故或名曰寒熱蓋亦或為寒中熱中之病以上二節論風傷營風皆名曰癘如營熱搏於脈外者為敗壞之癘瘍風寒留於脈中者為寒熱之癘風故曰癘者有營氣熱胕言有一種癘者因營氣之熱外出於胕肉之間榮衛邪正之氣相搏陰陽清濁之氣不清以致鼻柱敗壞皮膚癩瘍此毒癘之甚者也有因風寒客於脈中久而不去或為紫雲白癜之癘風故為寒中熱中之營病此為癘之輕者也兆璜曰寒傷營故風寒客於脈中而不去風乃陽熱鼓動之邪故與營氣為熱而復出於胕肉之外應略曰前二節論風傷氣血後二節論風傷營衛營與血氣與衛各有分別故為病不同以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風此論風傷五臟之氣而為五臟之風也夫天之十干化生地之五行地之五行以生人之五臟是以人之臟氣合天地四時五行十干之氣化而各以時受病也風者虛鄉不正之邪風故曰風曰邪曰傷曰中蓋言不正之風或傷之輕或中之重也風中五臟六腑之俞亦為臟腑之風此論風中五臟六腑之俞而亦為臟腑之風也夫五臟之氣外合於四時故各以時受病者病五臟之氣也如風中於經俞則內連臟腑故亦為臟腑之風病五臟之經也以上答帝問臟腑之風有二因也愚按此二因與金匱之所謂邪入於腑即不識人邪入於臟舌即難言口吐涎之因證不同金匱之所謂中臟中腑者邪直中於臟腑而傷臟腑之元神本篇之論一因隨時而傷臟氣一因經絡受邪而內連於臟腑是以五臟之風狀只見色證而不致如傷臟神之危險者也各入其門戶所中則為偏風此論風邪偏客於形身而為偏風也門戶者血氣之門戶也夫上節之所謂風傷血氣者乃通體之皮膚脈絡也如各入其門戶而中其血氣者則為偏枯謂偏入於形身之半也風氣循風府而上則為腦風此論風氣循風府而上為腦風也風府穴名在項後中行乃督脈陽維之會上循於腦戶故風氣客於風府循脈而上則為腦風風入系頭則為目風眼寒此論風客於頭而為目風也係系同足太陽有通項入於腦者正屬目本名曰眼系風入於頭干太陽之目系則為目風足太陽寒水主氣故為眼寒也飲酒中風則為漏風此論飲酒中風而為漏風也酒者熟谷之液其性慄悍其氣先行於皮膚故飲酒中風則腠理開而為汗泄之漏風也入房汗出中風則為內風此論入房中風而為內風也夫內為陰外為陽精為陰氣為陽陽為陰之衛陰為陽之守入房則陰精內竭汗出則陽氣外弛是以中風則風氣直入於內而為內風矣新沐中風則為首風此論新沐中風而為首風也以水灌首曰沐新沐則首之毛腠開中風則風入於首之皮膚而為首風矣久風入中則為腸風飧泄外在腠理則為泄風此論久在肌腠之風入中則為腸風飧泄在外則為泄風蓋脾胃之氣外主肌腠內主腹中風邪久在肌腠而入於中則脾胃之氣受傷而為腸風飧泄蓋大腸小腸皆屬於胃也若久在外之腠理則陽氣外弛而為泄風泄風者腠理開而汗外泄也以上論風氣之善行數變所中不一其處而見證各有不同故風者百病之長也至其變化乃為他病也無常方然致有風氣也長上聲風乃東方之生氣為四時之首能生長萬物亦能害萬物如水能浮舟亦能覆舟故為百病之長至其變化無常故為病不一如春時之非東風夏時之非南風或從虛鄉來之剛風謀風之類皆其變化而為他病也方處也言風邪之客於人無有常處如風氣客於皮膚之間則為寒熱客於脈中則為寒中熱中客於臟腑則為臟腑之風循於風府則為腦風風入系頭則為目風無有常處而致有風氣也上三句言風氣之變化下二句論風客於人而無有常方王子方問曰按此篇岐伯所答詳於帝問後人乃疑之或言帝有所缺問者或有增補其問者果屬缺文與曰聖經安可改也夫帝曰或為風也其病各異其名不同則百般風證盡括三句之中故復曰風者百病之長也蓋言風之變化無常即此論中不能盡其變證豈可以膠執之識見而增改聖經乎帝曰五臟風之形狀不同者何願聞其診及其病能診視也驗也帝問五臟之風證見於形身之外其狀不同者所在何處願聞其診驗之法病能者謂臟氣受邪能為形身作病也岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則差暮則甚診在眉上其色白皏普梗切差瘥同風為陽邪開發腠理故多汗風氣傷陽邪正不合故惡風也皏然淺白貌肺屬金其色白肺主氣在變動為咳風邪迫之故時咳短氣也晝則陽氣盛而能勝邪故瘥暮則氣衰故病甚也眉上乃闕庭之間肺之候也張兆璜問曰五臟之色如肺始言皏然白而復曰診在眉上其色白有似乎重見矣曰所謂皏然白者謂肺氣受風而臟氣之見於色也所謂診在眉上其色白者謂五臟之病色見於面也靈樞五色篇曰五色各有臟部有外部有內部也色從外部走內部者其病從外走內其色從內走外部者其病從內走外病生於內者先治其陰後治其陽反者益甚其病生於陽者先治其外後治其內反者益甚故先言五色而復言五色之見於面部者謂病之從內而外也聖人設教渾然後雖不言治而治法已在其中矣心風之狀多汗惡風焦絕善怒嚇赤色病甚則言不可快診在口其色赤心為火臟風淫則火盛故唇舌焦而津液絕也風化木木火交熾故善為怒嚇心主舌病甚則舌本強而言不可快心和則舌能知五味故診驗在口口者兼唇舌而言也肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青肝開竅於目而主泣故善悲本經曰心悲名曰志悲志與心精共腠於目是以俱悲故泣出也蓋言悲而後泣出也微蒼淡青色也足厥陰之脈循喉嚨之後上入頏顙風木合邪則火熱盛而嗌乾肝氣病故善怒也怒勝思故時憎女子目者肝之官也故診在目下脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃脾主肌肉四肢身體怠惰四肢不欲動脾氣病也足太陰之脈屬脾絡胃上膈挾咽連舌本經絡篇云是主脾所生病者食不下土位中央故所診在鼻兆璜曰五臟四時之風始於臟氣而後病於形身自內而外也夫邪干臟則死此病在臟氣而不傷於臟真也如風中五臟六腑之俞乃經絡受邪亦內干臟腑然身之中於風也不必動臟故邪入於陰經則溜於腑是以後只言胃風者乃經絡之邪總歸於胃陽明為萬物之所歸也腎風之狀多汗惡風面痝然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑痝音芒炲音臺風邪干腎則水氣上升故面痝然浮腫風行則水渙也腎主骨故脊痛不能正立炲煙煤黑色也腎主藏精少陰與陽明會於宗筋風傷腎氣故隱曲不利水氣上升故黑在肌上水乘土也應略曰診在眉間目上者肺肝之本部也心診在口脾診在鼻者母病而傳見於子位也腎病而見肌色黑者乘其所不勝也是以本篇五臟之診與靈樞經之五閱五色篇之法少有不同蓋言五臟之色有見於面邪之本位而又有乘傳之變者也胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大頸有風池風府乃經脈之要會故頸多汗胃腑受邪故飲食不下膈塞不通腹善滿也胃氣不足則身以前皆寒腹脹滿是以形寒則䐜脹飲冷則泄者胃氣虛傷也胃者肉其應腹者胃之郛故主形瘦而腹大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈頭乃諸陽之會因沐中風則頭首之皮腠疏而陽氣弛故多汗惡風也風者天之陽氣人之陽氣以應天之風氣諸陽之氣上出於頭故先一日則病甚頭痛不可以出戶內蓋風將發而氣先病也至其風發之日氣隨風散故其病少愈張兆璜曰風將發而所舍之風亦發故先一日病甚人氣之通於天也漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事飲酒者胃氣先行皮膚先充絡脈或因胃氣熱而腠理疏或絡脈滿而陰液泄故常多汗也酒性悍熱與風氣相搏故雖單衣而亦不可以常服酒入於胃熱聚於脾脾胃內熱故食則汗出甚則上搏於肺而身汗喘息惡風身常濕也津液內竭故口乾善渴陽氣外張故不能煩勞於事泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒帝曰善泄風之病風久在腠理而傷氣故多汗汗泄衣上漸漬滲泄玄府不閉也津液外泄故口中乾燥上漬其風者謂身半以上風濕相搏則陽氣受傷故不能煩勞其事若妄作勞則身體盡痛而發寒矣按偏風而下只論首風漏風泄風之狀蓋此三者皆在皮膚氣分風氣相搏而善行數變故曰肺風之狀腎風之狀首風之狀言風氣變動之病狀也如入於經脈在偏風則為半身不遂循經入腦則為腦風循系入頭則為目風眼寒不復再有變證故不復論也痹論篇第四十三黃帝問曰痹之安生岐伯對曰風寒濕三氣雜至合而為痹也痹音避痹者閉也邪閉而為痛也言風寒濕三氣錯雜而至相合而為痹其風氣勝者為行痹風者善行而數變故其痛流行而無定處寒氣勝者為痛痹寒為陰邪痛者陰也是以寒氣勝者為痛痹濕氣勝者為著痹也濕流關節故為留著之痹按靈樞經有風痹傷寒論有濕痹是感一氣而為痹也本篇論風寒濕三氣雜至合而為痹是三邪合而為痹也靈樞周痹篇曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是是寒痹先發而他痹復發也本篇論風氣勝者為行痹濕氣勝者為著痹是三氣雜合而以一氣勝者為主病也經論不同因證各別臨病之士各宜體認帝曰其有五者何也帝問三氣之外而又有五痹也上節論天之三邪此下論人之五氣岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹皮肉筋骨五臟之外合也五臟之氣合於四時五行故各以其時而受病同氣相感也帝曰內舍五臟六腑何氣使然岐伯曰五臟皆有合病久而不去者內舍於其合也肺合皮心合脈脾合肌肝合筋腎合骨邪之中人始傷皮肉筋骨久而不去則內舍於所合之臟而為臟腑之痹也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也所謂五臟之痹者各以其五臟所合之時重感於風寒濕之氣也蓋皮肉筋骨內合於五臟五臟之氣外合於四時始病在外之有形復傷在內之五氣外內形氣相合而邪舍於內矣所謂舍者有如館舍邪客留於其間者也邪搏於五臟之間干臟氣而不傷其臟真故曰舍曰客而上見其煩滿喘逆諸證如其入臟者則死矣張兆璜曰首言以冬遇此為骨痹者謂痹病之多深入也故先言骨而筋筋而脈脈而皮膚凡痹之客五臟者肺痹者煩滿喘而嘔此論五臟之氣受邪而形諸於病也肺主氣而司呼吸其脈起於中焦還循胃口上膈屬肺故痹則煩喘而嘔兆璜曰臟氣受邪則病在五臟五臟受病腹轉及於經脈形層心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐心主脈故痹閉而令脈不通邪搏心下鼓動而上干心臟則煩故煩則心下鼓也肺者心之蓋而心脈上通於肺故逆氣暴上則喘而嗌乾心主噫心氣上逆而出則善噫也夫水火之氣上下時交心氣厥逆於上則不能下交於腎腎氣虛故悲也兆璜曰心下鼓暴上氣謂邪氣上逆也厥氣上謂正氣厥逆也肝痹者夜臥則驚多飲數小便上為引如懷肝藏魂臥則神魂不安故發驚駭肝脈循陰股入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈循喉嚨入頏顙肝氣痹閉則木火鬱熱故在上則多飲在下則便數上引於中而有如懷妊之狀也腎痹者善脹尻以代踵脊以代頭尻苦高切音嵪腎者胃之關關門不利則胃氣不轉故善脹也脊椎盡處為尻腎主骨骨痿而不能行故尻以代踵陰病者不能仰故脊以代頭脾痹者四肢解惰發咳嘔汁上為大塞脾氣不能行於四肢故四肢解惰脾脈上膈挾咽氣痹不行故發咳也入胃之飲上輸於脾肺脾氣不能轉輸故嘔汁肺氣不能通調故上為大塞腸痹者數飲而出不得中氣喘爭時發飧泄腸痹者兼大小腸而言小腸為心之府而主小便邪痹於小腸則火熱鬱於上而為數飲下為小便不得出也大腸為肺之府而主大便邪痹於大腸故上則為中氣喘爭而下為飧泄也胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕胞者膀胱之室內居少腹邪閉在胞故少腹膀胱按之內痛水閉不行則蓄而為熱故若沃以湯且澀於小便也膀胱之脈從巔入腦腦滲則為涕上為清涕者太陽之氣痹閉於下不能循經而上升也愚按六腑之痹只言其三蓋營氣者胃腑之精氣也衛氣者陽明之悍氣也營衛相將出入於外內三焦之氣遊行於上下甲膽之氣先臟腑而升夫痹者閉也正氣運行邪不能留三腑之不病痹者意在斯與陰氣者靜則神藏躁則消亡此言臟氣不藏而邪痹於臟也陰氣者臟氣也神者五臟所藏之神也五臟為陰陰者主靜故靜則神氣藏而邪不能侵躁則神氣消亡而痹聚於臟矣飲食自倍腸胃乃傷此言腸胃傷而邪痹於腑也夫居處失宜則風寒濕氣中其俞矣然當節其飲食勿使邪氣內入如食飲應之邪即循俞而入各舍其腑矣淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絕痹聚在脾諸痹不已亦益內也其風氣勝者其人易已也此申明陰氣躁亡而痹聚於臟也淫氣者陰氣淫佚不靜藏也淫氣而致於喘息則肺氣不藏而痹聚在肺矣淫氣而致於憂思則腎氣不藏而痹聚在心矣淫氣而至於遺溺則腎氣不藏而痹聚在腎矣淫氣而致於陰血乏竭則肝氣不藏而痹聚在肝矣淫氣而致於肌肉焦絕則脾氣不藏而痹聚在脾矣是以在臟腑經俞諸痹留而不已亦進益於內而為臟腑之痹矣夫寒濕者天之陰邪傷人經俞筋骨風者天之陽邪傷人皮膚氣分是以三邪中於臟腑之俞而風氣勝者其性善行可從皮腠而散故其人易已也愚按下文云六腑亦各有俞蓋言五臟六腑俱各有俞如風寒濕氣中於五臟之俞而臟氣淫躁則邪循俞內入而各聚於臟矣中於六腑之俞而飲食自倍腸胃乃傷邪亦循俞而入各舍其腑矣上節所謂各以其時重感於風寒濕之氣而為五臟之痹者合五臟之氣而舍於內也此節論邪中臟腑之俞循俞而亦進益於內先言陰氣消亡痹聚在臟故後只言六腑亦各有俞云帝曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已此言五臟之痹循俞而入臟者死也夫風寒濕氣中其俞其臟氣實則邪不動臟若神氣消亡則痹聚在臟而死矣按邪從皮肉筋骨而內舍於五臟者此邪干臟氣而不傷於臟真故痹客於臟則為煩滿喘嘔脈不通心下鼓嗌乾善噫諸證其留連筋骨間而不內舍於其合者疼久其留皮膚間者隨氣而易散若中其俞則內通五臟兼之陰氣不藏則邪直入於臟而為不治之死證矣帝曰其客於六腑者何也岐伯曰此亦其食飲居處為其病本也此言六腑之痹乃循俞而內入者也夫居處失常則邪氣外客飲食不節則腸胃內傷故食飲居處為六腑之病本張兆璜曰痹聚在五臟者因其陰氣不藏神氣消亡痹舍於六腑者亦其飲食居處此節用三亦字俱當著眼六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也飲食入胃大小腸濟泌糟粕膀胱決瀆水濁蒸化精液營養經俞如居處失常而又食飲應之於內則經脈虛傷邪循俞而入舍其腑矣張兆璜曰邪中五臟之俞而陰氣淫躁應之邪中六腑之俞而食飲應之故曰六腑亦各有俞而食飲應之再按靈樞口問篇曰夫百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐夫風寒雨濕合而為痹矣居處失常則邪中臟腑之俞矣喜怒病臟驚恐傷陰則陰氣消亡矣飲食自倍則腸胃乃傷矣是以上古之人食飲有節起居有常不妄作勞和於陰陽故能形與神居度百歲乃去帝曰以針治之奈何岐伯曰五臟有俞六腑有合循脈之分各有所發各隨其過則病瘳也此論治臟腑之痹而各有法也夫營俞治經故痹在臟者當取之於俞合治內腑故痹在腑者取之於合也又當循形身經脈之分皮肉筋骨各有所發各隨其有過之處而取之則其病自瘳矣帝曰榮衛之氣亦令人痹乎岐伯曰榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也靈樞經云人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣其清者為榮濁者為衛榮行脈中衛行脈外榮氣篇曰榮氣之道內谷為實谷入於胃乃傳之肺流溢於中布散於外專精者行於經隧常營無已是水穀之精氣從肺氣而先和調於臟腑五臟六腑皆以受氣而乃能入於脈也入於脈故循脈上下復貫五臟絡六腑蓋言五臟六腑受穀精之氣營行於經脈經榮之氣復貫絡於臟腑互相資生而資養者也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於肓膜散於胸腹衛者水穀之悍氣其氣慓疾滑利故不能入於脈不入於脈故循於皮膚分肉之間分肉者肌肉之腠理理者皮膚臟腑之紋理也蓋在外則行於皮膚肌理之間在內則行於絡臟絡腑之募原募原者脂膜也亦有紋理之相通故曰皮膚臟腑之紋理也絡小腸之脂膜謂之肓是以在中焦則熏蒸於肓膜行於胸膈之上則散於心肺之募理行於腹中散於腸胃肝腎之募原是外內上下皮肉臟腑皆以受氣一日一夜五十而周於身逆其氣則病從其氣則愈不與風寒濕氣合故不為痹榮衛之氣榮行脈中衛行脈外營周不休五十而復大會陰陽相貫如環無端旋轉而不休息者也故逆其氣則病從其氣則愈不與風寒濕邪合而留連於皮膚脈絡之間故不為痹也蓋言痹在皮者肺氣之所主也痹在肌者脾氣之所主也痹在脈者心氣之所主也榮衛之氣雖在皮膚絡脈之間行而不留故不與邪合帝曰善痹或痛或不痛或不仁或寒或熱或燥或濕其故何也不仁不知痛癢也燥者謂無汗濕者多汗而濡濕也岐伯曰痛者寒氣多也有寒故痛也寒氣勝者為痛痹故痛者寒氣多也絡始篇曰病痛者陰也人有陰寒故痛也上寒字言天之寒邪下寒字言人之寒氣蓋天有陰陽人有陰陽如感天之陰寒而吾身之陽盛則寒可化而為熱如兩寒相搏凝聚而為痛痹矣其不痛不仁者病久入深榮衛之行澀經絡時疏故不通皮膚不營故為不仁通字當作痛病久入深者久而不去將內舍於其合也邪病久則榮衛之道傷而行澀邪入深則不痹閉於形身而經絡時疏故不痛也榮衛行澀則不能營養於皮膚故為不仁其寒者陽氣少陰氣多與病相益故寒也此言寒熱者由人身之陰陽氣化也人之陽氣少而陰氣多則與病相益其陰寒矣邪正惟陰故為寒也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱人之陽氣多而陰氣少邪得人之陽盛而病氣勝矣人之陽氣盛而遇天之陰邪則邪隨氣化而為痹熱矣張兆璜曰與病相益者言人之陰氣多而益其病氣之陰寒也病氣勝者言人之陽氣多而益其病氣之熱勝也此論天有陰陽之邪而人有寒熱之氣化其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也濕者天之陰邪也感天地之陰寒而吾身陰氣又盛兩氣相感故汗出而濡也兆璜曰陽熱盛者多汗出濡濕之汗又屬陰寒醫者審之帝曰夫痹之為病不痛何也岐伯曰痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也經雲氣傷痛此論邪痹經脈骨肉之有形而不傷其氣者則不痛也夫骨有骨氣脈有脈氣筋有筋氣肌有肌氣皮有皮氣皆五臟之氣而外合於形身如病形而不傷其氣則只見骨痹之身重脈痹之血凝不行筋痹之屈而不伸肉痹之肌肉不仁皮痹之皮毛寒冷故具此五者之形證而不痛也凡痹之類逢寒則蟲逢熱則縱帝曰善此承上文而言凡此五痹之類如逢吾身之陰寒則如蟲行皮膚之中逢吾身之陽熱則筋骨並皆放縱又非若病氣之有寒則痛陽氣多則為痹熱也此言形氣之病各有分別故帝嘉其善焉兆璜曰在外者皮膚為陽筋骨為陰如逢寒則陽亦陰寒故皮膚則蟲逢熱則陰亦陽熱故筋骨弛縱痿論篇第四十四黃帝問曰五臟使人痿何也痿者四肢無力委弱舉動不能若委棄不用之狀夫五臟各有所合痹從外而合病於內外所因也痿從內而合病於外內所因也故帝承上章而復問曰五臟使人痿何也岐伯對曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓夫形身之所以能舉止動靜者由臟氣之呴養於筋脈骨肉也是以臟病於內則形痿於外矣故肺熱葉焦則皮毛虛弱急薄著則生痿躄也肺屬金肺熱則金燥而葉焦矣肺主皮毛肺熱葉焦則皮毛虛薄矣夫食飲於胃其精液乃傳之肺肺朝百脈輸精於皮毛毛脈合精行氣於臟腑是五臟所生之精神氣血所主之皮肉筋骨皆由肺臟輸布之精液以資養皮膚薄著則精液不能轉輸是以五臟皆熱而生痿躄矣靈樞經云皮膚薄著毛腠夭焦著者皮毛燥著而無生轉之氣故曰著則生痿躄矣心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也心為火臟心氣熱則氣惟上炎心主脈故脈氣亦厥而上矣上則身半以下之脈虛而成脈痿也夫經脈者所以行氣血而營陰陽濡筋骨以利關節故經脈虛則樞折於下矣樞折即骨徭而不安於地骨徭者筋緩而不收故筋骨徭挈不收足脛緩縱而不能任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿膽者中精之府其應在筋是周身之筋膜由膽藏之精汁以營養膽附於肝肝氣熱則膽汁泄而口苦矣膽汁泄則筋膜無以營養而乾燥矣筋膜乾則攣急而發為筋痿也脾氣熱則胃干而渴肌肉不仁發為肉痿陽明燥金主氣從中見太陰之濕化是以脾氣熱則胃干而渴矣脾胃之氣並主肌肉陽明津液不生太陰之氣不至故肌肉不仁而發為肉痿也腎氣熱則腰脊不舉骨枯而髓減發為骨痿腎主藏精腎氣熱則津液燥竭矣腰者腎之府是以腰脊不能伸舉腎生骨髓在體為骨腎氣熱而精液竭則髓減骨枯而發為骨痿也帝曰何以得之岐伯曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也此申明五臟之熱而成痿者由肺熱葉焦之所致也臟真高於肺朝百脈而行氣於臟腑故為臟之長肺屬乾金而主天居心主之上而為心之華蓋有所失亡所求不得則心志靡寧而火氣炎上肺乃心之蓋金受火刑即發喘鳴而肺熱葉焦矣肺熱葉焦則津液無從輸布而五臟皆熱矣故曰五臟因肺熱葉焦而成痿躄者此之謂也躄者足痿而不能任地故曰謂下經本病篇有此語也悲哀太甚則胞絡絕胞絡絕則陽氣內動發則心下崩數溲血也此以下復論心肝脾腎各有所因而自成痿躄也胞絡者胞之大絡即衝脈也衝脈起於胞中為十二經脈之海心主血脈是以胞絡絕則心氣虛而內動矣陽氣心氣也心為陽中之太陽故曰陽氣未水之精為志火之精為神悲哀太甚則神志俱悲而上下之氣不交矣是以胞絡絕而陽氣內動心氣動則心下崩而數溲血矣故本病曰大經空虛發為肌痹傳為脈痿本病即本經第七十三篇之本病論大經胞之大絡也胞乃血室中焦之汁奉心化赤流溢於中從衝脈而上循背裡者貫於脈中循腹右上行者至胸中而散於脈外充膚熱肉生毫毛是胞絡之血半行於脈中半行於皮腠脈外之血少則為肌痹脈內之血少則為脈痿是溲崩之血從大經而下先傷皮膚氣分之血而復及於經脈之中故曰大經空虛發為肌痹傳為脈痿按皮膚之血臥則歸肝五臟生成篇曰人臥血歸於肝正此血也故臥出而風吹之血凝於膚者為痹再按男子絡唇口而生髭鬚女子月事以時下者肝經衝脈之血也是以崩溲或大吐衄而不致於死若心主脈中之血一息不運則機緘窮一毫不續則穹壞判矣思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫此論肝氣自傷而發為筋痿也肝者將軍之官謀慮出焉思想無窮所願不得則肝氣傷矣前陰者宗筋之所聚足厥陰之脈循陰股入毛中過陰器意淫於外則欲火內動入房太甚則宗筋縱弛是以發為陰痿及為白淫白淫者欲火盛而淫精自出也故下經曰筋痿者生於肝使內也下經即以下七十三篇之本病論今遺亡矣言本篇所論筋痿者又生於所願不遂而傷肝兼之使內入房之太甚也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地也有漸於濕者清濕地氣之中於下也以水為事者好飲水漿濕濁之留於中也若有濕濁之所留而居處又兼卑下外內相濕以致肌肉濡漬痹而不仁發為肉痿也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也此論勞倦熱渴而成骨痿也遠行勞倦則傷腎逢大熱則暑暍傷陰渴則陰液內竭是以陽熱之氣內伐其陰而熱合於腎矣腎者水臟水盛則能制火今陽盛陰消水不勝火以致骨枯髓虛足不任用於身而發為骨痿也帝曰何以別之岐伯曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁痿病之因皆緣五臟熱而精液竭不能營養於筋脈骨肉是以有因肺熱葉焦致五臟熱而成痿者有因悲思內傷勞倦外熱致精血竭而臟氣熱者皆當診之於形色也爪者筋之應齒者骨之餘帝曰如夫子言可矣論言治痿者獨取陽明何也論言即本病論中之言也帝以伯言痿病之因於臟熱當從五臟所合之皮肉筋骨以治之如夫子言可矣然論言治痿何獨取於陽明岐伯曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也陽明者水穀血氣之海五臟六腑皆受氣於陽明故為臟腑之海宗筋者前陰也前陰者宗筋之所聚太陰陽明之所合也諸筋皆屬於節主束骨而利機關宗筋為諸筋之會陽明所生之血氣為之潤養故諸痿獨取於陽明衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋溪谷者大小分肉腠理也衝脈起於胞中上循背裡為經絡之海其浮而外者滲灌於溪谷之間與陽明合於宗筋是以宦者去其宗筋則傷衝任血瀉不復而須不生陰陽總宗筋之會會於氣街而陽明為之長少陰太陰陽明衝任督脈總會於宗筋循腹上行而復會於氣街氣街者腹氣之街在衝脈於臍左右之動脈間乃陽明之所主故陽明為之主長主也皆屬於帶脈而絡於督脈帶脈起於季脅圍身一周如束帶熱三陰三陽十二經脈與奇經之任督沖維經循於上下皆屬帶脈之所約束督脈起於會陰分三歧為任沖而上行腹背是以衝任少陰陽明與督脈皆為連絡故陽明虛則宗筋縱陽明為水穀之海主潤宗筋陽明虛則宗筋縱宗筋縱弛不能束骨而利機關則成痿躄矣故諸痿獨取於陽明帶脈不引故足痿不用也陰陽經脈皆屬帶脈之所約束如帶脈不能延引則在下之筋脈縱弛而足痿不用矣帝曰治之奈何岐伯曰各補其滎而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣帝曰善伯言治痿之法雖取陽明而當兼取其五臟之滎俞也各補其營者補五臟之真氣也通其俞者通利五臟之熱也調其虛實者氣虛則補之熱盛則瀉之也和其順逆者和其氣之往來也筋脈骨肉內合五臟五臟之氣外應四時各以其四時受氣之月隨其淺深而取之其病已矣按診要經終篇曰正月二月人氣在肝三月四月人氣在脾五月六月人氣在頭七月八月人氣在肺九月十月人氣在心十一月十二月人氣在腎故春刺散俞夏刺絡俞秋刺皮膚冬刺俞竅春夏秋冬各有所刺謂各隨其五臟受氣之時月合其淺深而取之不必皮痿治皮而骨痿刺骨也厥論篇第四十五黃帝問曰厥之寒熱者何也厥逆也氣逆則亂故發為眩僕卒不知人此名為厥與中風不同有寒熱者有陰有陽也岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥陰陽二氣皆從下而上是以寒厥熱厥之因由陰陽之氣衰於下也帝曰熱厥之為熱也必起於足下者何也足下足心也熱為陽厥而反起於陰分故問之岐伯曰陽氣起於足五趾之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也足三陽之血氣出於足趾之端表者外側也三陰之脈集於足下而聚於足心若陽氣勝則陰氣虛而陽往乘之故熱厥起於足下也張兆璜曰足心足少陰經脈之所出陰陽類論曰三陽為表二陰為里蓋太陽為諸陽主氣少陰為諸陰主氣也帝曰寒厥之為寒也必從五趾而上於膝者何也上節論陽勝於陰則為熱厥而寒厥起於陰之本位故問之兆璜曰陰陽二氣陰為之主也岐伯曰陰氣起於五趾之裡集於膝下而聚於膝上故陰氣勝則從五趾至膝上寒其寒也不從外皆從內也足三陰之血氣起於五趾內側之端里者內側也集於膝下者三陰交於踝上也聚於膝上者三陰經脈皆循內股而上故其寒也不從外皆從內也兆璜曰陰陽二氣皆起於足是以傷寒病足經而不病手經也張應略曰陰陽六氣只合六經足之六經復上合於手者也帝曰寒厥何失而然也此下二節論寒厥熱厥之因寒厥因失其所藏之陽故曰失岐伯曰前陰者宗筋之所聚太陰陽明之所合也宗筋根起於胞中內連於腎臟陰陽二氣生於胃腑輸於太陰藏於腎臟太陰陽明合聚於宗筋者中焦之太陰陽明與下焦之少陰太陽中下相合而會合於前陰之間兆璜曰論寒厥曰太陰陽明之所合論熱厥曰脾主為胃行其津液是陰陽二氣本於先天之下焦而生於後天之中焦也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也此言寒厥之因因虛其所藏之陽而致之也夫秋冬之時陽氣收藏陰氣外盛此寒厥人者因恃其質壯過於作勞則下氣上爭不復藏於下矣陽氣上出則陰藏之精氣亦溢於下矣所謂煩勞則張精絕也邪氣者謂陰髒水寒之邪夫陽氣藏於陰臟精陽外出則陰寒之邪因從之而上矣氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也此言氣因於中焦水穀之所生然藉下焦之氣為陽明釜底之燃如秋冬之時過於作勞奪其陽氣爭擾於上陰寒之邪又因而從之則中焦所生之陽亦衰不能滲營於經絡矣中下之氣不能互相資生陽氣日損陰氣獨在故手足為之寒也兆璜曰滲者滲於脈外營者營於脈中營氣宗氣皆精陽之氣營行於脈中諸陽之氣淡滲於脈外非獨衛氣之行於脈外也帝曰熱厥何如而然也岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營於四肢也此言熱厥之因因傷其中焦所生之陰氣也靈樞經云飲酒者衛氣先行皮膚先充絡脈夫衛氣者水穀之悍氣也酒亦水穀悍熱之液故從衛氣先行於皮膚從皮膚而充於絡脈是不從脾氣而行於經脈故絡脈滿而經脈虛也夫飲入於胃其津液上輸於脾脾氣散精於肺通調於經脈四布於皮毛是從經脈而行於絡脈從絡脈而散於皮膚自內而外也酒入於胃先行於皮膚先充於絡脈是從皮膚而入於絡脈反從外而內矣不從脾氣通調於經脈則陰氣虛矣悍熱之氣反從外而內則陽氣入矣陽明乃燥熱之府藉太陰中見之陰化陰氣虛而陽熱之氣內入則胃氣不和矣胃不和則所生之精氣竭精氣竭則不能營於四肢而為熱厥矣此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也夫飲酒數醉則悍熱之氣反從外而內而酒氣聚於脾中矣若飽以入房則穀食留於胃中脾臟不能轉輸其精液而穀氣聚於脾中矣氣聚於中而不得散酒氣與穀氣交相侵搏則熱盛於中矣中土之熱灌於四旁故熱遍於身也入胃之飲食不能遊溢精氣下輸膀胱故內熱而溺赤也夫腎為水臟受水穀之精而藏之酒氣熱盛而慓悍則腎臟之精氣日衰陰氣衰於下而陽氣獨勝於中故手足為之熱也張兆璜曰寒厥因失其所藏之陽而致中氣日損熱厥因傷其所生之陰而致腎氣日衰當知中下二焦互相資生者也張應略曰上古之人食飲有節起居有常不妄作勞今時之人以酒為漿以妄為常醉以入房是人之所當調養者陰陽精氣耳苟得其養可同歸於生長之門苟失其養則為暴僕卒厥帝曰厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也暴不知人卒然昏瞶或僕撲也半日氣周之半一日氣行之周岐伯曰陰氣盛於上則下虛下虛則腹脹滿陰氣盛於上謂中焦之陽氣日損陰氣獨盛於上也陰盛於上則下焦之陽氣亦虛陽虛於下是以腹脹滿也陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也下氣謂下焦之元陽邪氣腎藏水寒之邪也陽氣盛於上謂陰氣虛而陽氣獨勝也陽盛於上則下氣重上下氣上乘則寒邪隨之而上逆逆則陽氣亂於上而卒不知人靈樞經曰清濁之氣亂於頭則為厥逆眩僕此論陰陽二氣之並逆也兆璜曰前論下氣上爭則中焦之陽氣日損陰氣虛中則下焦之腎氣日衰此復論陰氣盛於上則下氣亦虛陽氣盛於上則下氣重上又一轍也帝曰善願聞六經脈之厥狀病能也上節論陰陽二氣之厥故帝復問其經脈之厥狀焉病能者能為奇恆之病也夫奇恆之病不應四時多主厥逆是以六經之厥能為諸脈作病者皆屬奇恆因於論厥故列於厥論篇中原屬厥逆奇恆之病故先提曰病能而列於病能篇之前也岐伯曰巨陽之厥則腫首頭重足不能行發為眴僕巨陽太陽也足太陽脈起於目內眥上額交巔從巔入絡腦還出別下項循背挾脊抵腰中下貫臀入膕中循腨內出外踝之後是以厥逆於上則為首腫頭痛厥逆於下則為足不能行神氣昏亂則為眴僕太陽為諸陽主氣也此病在經而轉及於氣分故曰發陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見而妄言癲狂走呼妄言妄見陽明之脈病也其脈循腹裡屬胃絡脾經氣厥逆故腹滿胃不和不得臥也陽明乃燥熱之經其經氣上出於面故面赤而熱少陽之厥則暴聾頰腫而熱脅痛䯒不可以運足少陽之脈起於目銳眥從耳後入耳中下頰車循胸過季脅出膝外廉循足跗故逆則暴聾頰腫脅痛足䯒不可以運行太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥䐜音嗔引起也足太陰之脈入腹屬脾絡胃故厥則腹滿䐜脹食飲入胃脾為轉輸逆氣在脾故後便不利脾不轉運則胃亦不和是以食則嘔而不得臥也少陰之厥則口乾溺赤腹滿心痛足少陰之脈屬腎絡膀胱貫肝膈入肺中出絡心注胸中循喉嚨挾舌本經脈厥逆而陰液不能上資是以口乾心痛肺金不能通調於下故溺赤水火陰陽之氣上下不交故腹滿也厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫䯒內熱足厥陰之脈內抵少腹挾胃屬肝絡膽故厥則少腹腫痛而腹脹其下循陰股入毛中環陰器抵少腹是以涇溲不利陰縮而腫肝主筋膝者經之會經脈厥逆不能濡養筋骨故好臥而屈膝其脈起於大趾叢毛之際上循足䯒厥陰木火主氣滎俞厥逆故䯒內腫熱也陰陽二氣皆起於足故只論足之六經焉盛則瀉之虛則補之不盛不虛以經取之此厥在經脈故當隨經以治之如經氣盛者用針瀉而疏之經氣虛者以針補之不盛不虛即於本經以和調之名曰經刺太陰厥逆䯒急攣心痛引腹治主病者此復論三陰三陽之氣厥也夫手足三陰三陽之氣五臟六腑之所生也臟腑之氣逆於內則陰陽之氣厥於外矣故復論手足十二經氣之厥逆也中土之氣主溉四旁足太陰氣厥故䯒為之急攣食氣入胃濁氣歸心脾氣逆而不能轉輸其精氣是以心氣虛而痛引於腹也此是主脾所生之病故當治主病之脾氣焉按首言陽氣起於足五趾之表陰氣起於足五趾之裡是以先論足六經脈之厥狀次言陰陽二氣出中焦水穀之所生脾主為胃行其精液是太陰為之行氣於三陰陽明為之行氣於三陽五臟六腑皆受氣於陽明故復論手足三陰三陽之氣厥也少陰厥逆虛滿嘔變下泄清治主病者少陰之氣上與陽明相合而主化水穀少陰氣厥以致中焦虛滿而變為嘔逆上下水火之氣不交故下泄清冷也按嘔變當作變嘔靈樞經云苦走骨多食之令人變嘔言苦寒之味過傷少陰轉致中胃虛寒而變為嘔逆與此節大義相同且有聲無物曰嘔故不當作嘔出變異之物解厥陰厥逆攣腰痛虛滿前閉譫言治主病者攣者肝主筋也腰者肝之表也虛滿者食氣不能輸精於肝也前閉者肝主疏泄也肝主語譫語者肝氣鬱也三陰俱逆不得前後使人手足寒三日死三陰俱逆是陰與陽別矣不得前後者陰關於下也諸陽之氣皆生於陰三陰俱逆則生氣絕滅是以手足寒而三日死矣此厥在氣分故主三日死謂三陰之氣厥絕也若厥在經脈則為厥狀病能而不至於死矣太陽厥逆僵仆嘔血善衄治主病者太陽主諸陽之氣陽氣厥逆故僵仆也陽氣上逆則嘔血陽熱在上則衄血此太陽之氣厥逆於上以致迫血妄行少陽厥逆機關不利機關不利者腰不可以行項不可以顧少陽主樞是以少陽氣厥而機關為之不利也頸項者乃三陽陽維之會腰脊者身之大關節也故機關不利者腰不可以轉行項不可以回顧發腸癰不可治驚者死少陽相火主氣火逆於內故發為腸癰不可治者謂病在氣分而癰腫在內非針刺之可能治也若發驚者其毒氣干臟故死陽明厥逆喘咳身熱善驚衄嘔血陽明氣厥則喘上逆則咳也陽明之氣主肌肉故厥則身熱經云三陽發病主驚駭衄血嘔血者陽明乃悍熱之氣厥氣上逆則迫血妄行此病在氣而及於經血故皆曰善手太陰厥逆虛滿而咳善嘔沫治主病者手太陰厥逆肺氣逆也肺主氣故虛滿而咳不能通布水津故善嘔沫此是主肺所生之病故當治主病之肺氣焉夫陰陽之氣皆出於足此論臟腑之氣故並及於手焉手心主少陰厥逆心痛引喉身熱死不可治手心主者手厥陰包絡之氣也手少陰者心藏之氣也包絡為君主之相火二火併逆將自焚矣故為死不可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰治主病者手太陽所生病者耳聾小腸主液故逆則泣出也夫心主血脈小腸主液而為心之表小腸氣逆則津液不能營養於經脈是以項不可以顧腰不可以俯仰蓋腰項之間乃脈絡經俞之大會也手陽明少陽厥逆發喉痹嗌腫痓治主病者手陽明者肺之府也手少陽者手厥陰三焦也陽明主嗌肺主喉兼三焦之火氣並逆是以發喉痹而嗌腫也陽明乃燥熱之經三焦屬龍雷之火火熱並逆故發痓也張兆璜問曰手之六經獨心主少陰與陽明少陽合論者何也曰天之六氣化生地之五行地之五行以生人之五臟五臟配合五腑是隻五臟五腑以應五方五行五色五味五音五數也所謂六臟六腑者心主與三焦為表裡俱有名而無形合為六臟六腑復應天之六氣是以論手心主而兼於少陰論手陽明而合少陽也曰手厥陰為心臟之包絡固可合併而論手陽明與少陽並論者其義何居曰三焦者中瀆之府也中上二焦並出於胃口下焦別手陽明之迴腸而出故論手陽明而兼於少陽也病能論篇第四十六黃帝問曰人病胃脘癰者診當何如按以下四篇論奇恆之為病篇名病能者言奇病之不因於四時六氣而能為臟腑經脈作病也疏五過論曰上經下經揆度陰陽奇恆五中決以明堂審於終始可以橫行方盛衰論曰診有大方坐起有常出入有行以轉神明必清必靜上觀下觀司八正邪別五中部按脈動靜循尺滑澀寒溫之意視其大小合之病能逆從以得復知病名診可十全蓋言本經之上經論氣之通於天下經言病之變化臨病之士審證辨脈察色觀形分時候氣別正甄邪再當比類奇恆合之病能診可十全方為得道是以本卷一十五篇自熱病論至厥論論疾病之變化而以奇恆四篇續於其後謂疾病變化之外而又有奇恆之病診恆病之脈證又當合參之於病能庶不致有五過四失之誤首論胃脘癰者言榮衛血氣由陽明之所生血氣壅逆則為癰腫之病與外感四時六淫內傷五志七情之不同也張兆璜曰病能者言奇病之形能也岐伯對曰診此者當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛甚盛則熱胃脈者手太陰之右關脈也人迎者結喉兩旁之動脈也蓋胃氣逆則不能至於手太陰而胃脈沉細矣氣逆於胃則人迎甚盛人迎甚盛則熱聚於胃矣人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也人迎者胃之動脈也故胃氣逆則人迎脈盛熱聚於胃口而不行則留滯而為癰矣帝曰善人有臥而有所不安者何也岐伯曰臟有所傷及精有所之寄則安故人不能懸其病也此言胃不和而臥不安也夫五臟所以藏精者也精者胃腑水穀之所生而分走於五臟如臟有所傷乃精有所往而不受則為臥不安矣蓋五味入胃津液各走其道是胃腑所生之精能分寄於五臟則安逆留於胃即為臥不安之病上節論胃中氣逆則為脘癰此言胃腑精逆則臥有所不安是奇恆之道如璇璣玉衡神轉不回如回而不轉則失其相生之機如有所留阻則為癰逆之病故人不能少空懸其病也張兆璜曰夫百病之始生必起於燥濕寒暑風雨陰陽喜怒飲食居處而又有奇恆之病故人不能少懸其病玉師曰奇恆之病病經氣之厥逆血氣生於胃腑水穀之精故先論陽明精氣之逆帝曰人之不得偃臥者何也岐伯曰肺者臟之蓋也肺氣盛則脈大脈大則不得偃臥論在奇恆陰陽中此言肺氣逆而為病也臟真高於肺為五臟之華蓋朝百脈而輸精於臟腑肺氣逆則氣盛而脈大脈大則不得偃臥矣偃仰也奇恆陰陽中謂玉機諸論篇中言行奇恆之法以太陰始也張兆璜曰此處提奇恆二字帝曰有病厥者診右脈沉而緊左脈浮而遲不然病主安在此論腎氣逆而為病也夫左脈主血當沉右脈主氣當浮今脈不然其所主之病安在岐伯曰冬診之右脈固當沉緊此應四時左脈浮而遲此逆四時在左當主病在腎頗關在肺當腰痛也脈合四時故冬診之左右脈皆當沉緊今左脈反浮而遲是逆四時之氣矣腎主冬氣而又反浮在左故當主病在腎頗關涉於肺當為腰痛之病帝曰何以言之岐伯曰少陰脈貫腎絡肺今得肺脈腎為之病故腎為腰痛之病也行奇恆之法以太陰始五臟相通移皆有次是水穀所生之精氣先至於手太陰太陰肺金相生而順傳於腎腎當復傳之於肝今反見浮遲之肺脈是腎臟有病而氣反還逆之於母臟故當主腎病之腰痛而頗關涉之於肺也帝曰善有病頸癰者或石治之或針灸治之而皆已其真安在經曰腎移寒於肝癰腫少氣此言五臟相通雖順傳有次然不得相生之正氣而反受母臟之寒邪則為癰腫之病矣岐伯曰此同名異等者也等類也癰雖同名而為病之因各有其類夫癰氣之息者宜以針開除去之靈樞癰疽篇曰陰陽已張因息乃行又曰寒邪客於經絡之中則血泣血泣則不通故癰腫蓋言邪客於脈絡之中而為癰腫者宜用針開除以去之夫腎脈上貫肝膈腎與肝脈皆循喉嚨入頏顙故癰腫在頸此病因於腎也夫氣盛血聚者宜石而瀉之此所謂同病異治也肝藏之血行於皮膚氣分如腎藏之寒邪順傳於肝肝氣盛而血聚於皮膚之間而為癰腫者宜石而瀉之蓋石者砭其皮膚出血針者刺入經穴之中故病在脈絡者宜針病在皮膚者宜石是以同病異治而皆已也張兆璜曰陷下者又宜灸始言針灸而後只言針石者蓋此篇論五臟之相傳而腎藏之氣已傳於肝故只宜針宜石設或有回陷於腎者又當灸之此雖不明言蓋欲人意會讀者宜潛心參究不可輕忽一字帝曰有病怒狂者此病安生經曰肝移寒於心狂膈中又肝病者善怒此肝雖順傳於心而不得相生之正氣反受肝之寒邪寒凌心火故為怒狂岐伯曰生於陽也帝曰陽何以使人狂岐伯曰陽氣者因暴折而難決故善怒也病名曰陽厥折屈逆也決流行也本經曰所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出肝氣當治而未得故善怒善怒者名曰煎厥此言肝氣上逆則陽氣暴折而不得出陽氣難於流行則肝氣亦未得而治故善怒也帝曰何以治之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也心為陽中之太陽巨陽者心之標陽也少陽者肝之表氣也夫陽明乃胃之悍氣故獨動而不休巨陽少陽不動者也今不動之氣反動而大疾故使人怒狂也帝曰治之奈何岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食則已食氣入胃散精於肝食氣入胃濁氣歸心淫精於脈毛脈合精行氣於腑是食入於陰而長氣於陽也此言巨陽少陽受氣於心肝二臟之陰肝心之氣上逆以致巨陽少陽之動大疾故奪其食則陰氣衰而陽動息矣使之服以生鐵落為飲夫生鐵落者下氣疾也夫所謂怒狂者肝邪上乘於心鐵乃烏金能伐肝木故下肝氣之疾速也帝曰善有病身熱懈墮汗出如浴惡風少氣此為何病岐伯曰病名曰酒風此言脾氣逆而為病也夫飲酒數醉氣聚於脾中熱盛於中故熱遍於身而四肢懈墮也熱盛則生風風熱相搏是以汗出如浴而惡風少氣張兆璜曰飲酒者先充絡脈從絡脈而反逆於脾中在心主脈是從心氣之傳於脾也帝曰治之奈何岐伯曰以澤瀉術各十分麋銜五分合以三指撮為後飯酒氣聚於脾則不能上輸於肺而下輸膀胱矣易曰山澤通氣澤瀉服之能行水上如澤氣之上升為云而復下瀉為雨也術乃山之精得山土之氣能通散脾氣於四旁麋銜草有風不偃無風獨搖能去風除濕者也合三指撮者三乃木之生數取制化土氣之義後飯者復以穀氣助脾也夫奇恆之病行所不勝曰逆逆則死今論胃腑所生之精氣以太陰始而順傳於腎腎傳之肝肝傳之心心傳之脾是五臟相通移皆有次而又有不得偃臥腰痛頸癰諸病是四時六淫七情五志之外而有奇恆之逆傳奇恆之中而又有順傳之奇病故人不能虛懸其病也按本經八十一篇內論疾病者只二十有奇而論奇恆者有十篇當知人之生病也多起於厥逆所謂深之細者其中手如針也摩之切之聚者堅也搏者大也此論切求奇恆之脈法也夫胃腑五臟之病能者其氣逆者其脈沉細故所謂沉之而細者其應手如針之細而沉也再按而摩之切而求之如胃精之聚於胃脾氣之聚於脾者其脈堅牢而不鼓也又如肺氣之盛腎氣之上搏於肝肝氣之上搏於心者其脈應指而大也上經者言氣之通天也下經者言病之變化也金匱者決死生也上經者謂上古天真生氣通天至六節藏象藏氣法時諸篇論人之臟腑陰陽地之九州九野其氣皆通於天氣下經者謂通評虛實以下至於脈解諸篇論疾病之變化金匱者如金匱真言脈要精微平人氣象諸篇論脈理之要妙以決死生之分藏之金匱非其人勿教非其真勿授故曰金匱者所以決死生也按本經以七七四十九篇為上下經後附論刺論穴論五運六氣五過四失如易之以八八六十四卦分上下經而後附繫辭說卦諸篇之義張兆璜曰按新校正云晉皇甫士安序甲乙經云素問亦有亡失隋人全元起注本亦無第七卷唐時王冰以天元紀大論五運行論六微旨論氣交變論五常政論六元政紀論至真要論七篇乃陰陽大論之文取以補所亡之卷是以上經下經之說不合八十一篇之平分也揆度者切度之也奇恆者言奇病也揆度者切度奇恆之脈病奇恆者言奇病之異於恆常也所謂奇者使奇病不得以四時死也恆者得以四時死也所謂奇者病五臟之厥逆不得以四時之氣應之所謂恆者奇恆之勢乃六十首亦得以四時之氣而為死生之期所謂揆者方切求之也言切求其脈理也度者得其病處以四時度之也揆度奇恆所指不同故當切求其脈理而復度其病處如本篇論五臟之病能當摩之切之以脈求之如太陽之腫腰椎少陽之心脅痛陽明之振寒太陰之病脹又當得其病處而以四時度之奇病論篇第四十七黃帝問曰人有重身九月而喑此為何也論奇恆之府而為奇恆之病也五臟別論曰腦髓骨脈膽女子胞此六者名為奇恆之府是以本篇之所論有犯大寒內至骨髓上逆於腦之腦髓骨病脈解篇之脈病口苦之膽病九月而喑及母腹中受驚之女子胞病皆奇恆之府而為病也蓋此六者地氣之所生皆藏於陰而象於地與氣之通於天病之變化者之不同故所謂奇病也張兆璜曰一因子以病母一因母以病子妊娠子母性命相關岐伯對曰胞之絡脈絕也胞之絡脈胞絡之脈也絕謂阻隔不通也蓋妊至九月胞長已足設有礙於胞絡即使阻絕而不通帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言聲音之道在心主言在肺主聲然由腎間之動氣上出於舌而後能發其音聲故曰舌者音聲之機也胞之絡脈繫於腎足少陰之脈貫腎系舌本胞之絡脈阻絕則少陰之脈亦不通是以舌不能發機而為喑矣帝曰治之奈何岐伯曰無治也當十月復十月胎出則胞絡通而音聲復矣刺法曰無損不足益有餘以成其疹然後調之刺法謂針經內之法也疹病也言毋損其不足益其有餘使成其病而後復調治之所謂無損不足者身羸瘦無用鑱石也鑱謂針石砭石也針經曰形氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絕滅壯者不復矣是以身羸瘦者不可妄用針石此章重在有餘而兼引其不足無益其有餘者腹中有形而泄之泄之則精出而病獨擅中故曰疹成也泄謂用針瀉之針經曰刺之害中而不去則精泄精泄則病益甚而恇按腹中胞積皆為有形在女子胞則曰無益其有餘在息積曰不可灸刺在伏梁曰不可動之是腹中有形者皆不可刺泄刺雖中病而有形之物不去則反泄其精氣正氣出而邪病反獨擅於其中故為疹成也朱聖公曰女子胞腹中積皆為有餘帝曰病脅下滿氣逆二三歲不已是為何病岐伯曰病名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也此肺積之為病也肺主氣而司呼吸定息故肺之積曰息奔在本經曰息積積者漸積而成是以二三歲不已夫肝肺之積皆主脅下滿積在肝則妨於食此積在肺故不妨於食也此病腹中有形不可灸刺凡積當日用導引之功調和之藥二者並行斯病可愈若只用藥而不導引則藥不能以獨治也帝曰人有身體髀股䯒皆腫環臍而痛是為何病岐伯曰病名曰伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動之動之為水溺澀之病也此其氣積於大腸之外而為伏梁也大腸為肺之府氣逆不通是以身體髀股䯒皆腫此根因於風邪傷氣留溢於大腸之間而著於肓肓者即腸外之膏膜其原出於脖胦正在臍下故環臍而痛也不可動者不可妄攻以動之蓋風氣留溢於臍下與水髒水腑相連動之則風行水渙而為水病矣水逆於上則小便為之不利矣張兆璜曰奇恆之病多因於積聚厥逆前論腹中此論奇恆不可謂之重出而置之勿論應略曰腹積有五止論肺與大腸者謂病在氣也故在肺曰氣逆在大腸則曰其氣溢於大腸帝曰人有尺脈數甚筋急而見此為何病岐伯曰此所謂疹筋此論諸筋之為病也夫奇恆之勢診有十度度脈度臟度肉度筋度俞度陰陽氣如心脈滿大肝脈小急脈來懸鉤脈至如喘之類皆所以度脈也如肝滿腎滿肺滿則為腫肝氣予不足木葉落而死腎氣予不足去棗華而死皆所以度臟也如肌氣予不足膚脹身腫大肉陷下皆所以度肉也診筋之病所以度筋也如十二俞之予不足水凝而死所以度俞也如正月太陽三月厥陰五月陽明十月少陰所以度陰陽氣也皆為病之異於恆常者也夫內有陰陽外有陰陽在外者皮膚為陽筋骨為陰是以筋病急而尺脈數也是人腹必急白色黑色見則病甚諸筋之會聚於宗筋衝脈者主滲灌溪谷與陽明合於宗筋是以筋病而腹必急也夫十二經之筋病惟手太陰甚則成息賁脅急吐血是少陰筋病甚者死不治是以白色黑色見者則病甚也帝曰人有病頭痛以數歲不已此安得之名為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆帝曰善此論腦骨髓之為病也夫在地為水在天為寒寒生水水生咸咸生腎腎生骨髓故所犯大寒之氣而內至骨髓也諸髓皆屬於腦故以腦為主髓邪上逆則入於腦是以頭痛數歲不已齒乃骨之餘故齒亦痛也此下受之寒上逆行巔頂故名曰厥逆帝曰有病口甘者病名為何何以得之岐伯曰此五氣之溢也名曰脾癉五氣者土氣也土位中央在數為五在味為甘在臭為香在臟為脾在竅為口多食甘美則臭味留於脾中脾氣溢而證見於外竅也癉熱也按金匱要略曰一者經絡受邪入臟腑為內所因二者四肢九竅血脈相傳壅塞不通為外皮膚所中也三者房室金刃蟲獸所傷若人能養慎更能無犯王法禽獸災傷房室勿令竭乏服食節其冷熱苦酸辛甘如此人數食甘美而致口甘消渴者乃不內外因之病也故列於奇病之中夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴脾主為胃行其津液者也五味入口津液各走其道苦先入心酸先入肝甘先入脾辛先入肺咸先入腎此人必數食甘美而多肥美者香美肥者厚味也厚味令人內熱甘者主於留中津液不能輸布於五臟而獨留在脾脾氣上溢發為口甘內熱不清轉為消渴治之以蘭除陳氣也蘭香草陳氣積氣也蓋味有所積以臭行之從其類而治之也帝曰有病口苦取陽陵泉口苦者病名為何何以得之膽病者口苦陽陵泉膽之合穴也帝言有病口苦取陽陵泉而口苦者病名為何何以得之按靈樞經曰其寒熱者取陽陵泉夫寒熱實證也此係膽虛氣溢當取募俞不當取其合穴故口苦之不愈也岐伯曰病名曰膽癉夫肝者中之將也取決於膽咽為之使肝者將軍之官謀慮出焉膽者中正之官決斷出焉夫謀慮在肝決斷在膽故肝為中之將而取決於膽也肝脈挾胃貫膈循喉嚨入頏顙環唇內故咽為肝之外使是以肝病而亦證見於口也此人者數謀慮不決故膽虛氣上溢而口為之苦謀慮不決則肝氣鬱而膽氣虛矣膽之虛氣上溢而口為之苦矣上節論脾氣實此論膽氣虛虛實之氣皆能為熱而成癉治之以膽募俞治在陰陽十二官相使中王冰曰胸腹曰募背脊曰俞膽募在乳下二肋外期門下同身寸之五分俞在脊第十四椎兩旁相去脊中各一寸五分其所治之法在陰陽十二官相使中今經已亡愚謂七十二篇系刺法論抑或在此篇中今所補遺經二篇乃後人偽撰者也帝曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈微細如髮者此不足也其病安在名為何病此論陰陽二氣生於太陰陽明陰陽不和而為死證也夫水穀入胃脾主行其津液太陰為之行氣於三陰陽明為之行氣於三陽太陰不足則陽明甚盛太過不及則陰陽不和陰陽不和則表裡之氣皆絕矣夫入胃之飲上輸入脾脾氣散精上歸於肺通調水道下輸膀胱今太陰病而不能轉輸於上頗在肺而不能通調於下則病癃矣夫地氣升而為云天氣降而為雨今地氣不能上升而惟下泄是以一日數十溲此太陰之不足也陽明者表也身熱如炭陽明盛也陽明脈挾喉其腧在膺中頸膺如格胃氣強也陽明盛強則人迎躁急頗關在肺故喘息氣逆此陽明之有餘也陽明盛強則與脾陰相絕太陰不得受水穀之精是以脈微如發此太陰之不足也岐伯曰病在太陰其盛在胃頗在肺病名曰厥死不治此病在太陰與胃肺也夫陽明乃燥熱之經從中見太陰之濕化太陰不足則胃氣熱而人迎躁盛矣胃氣上逆頗關在肺而為喘息氣逆矣胃氣盛強不能遊溢精氣而太陰不足矣太陰不足則五臟六腑皆無所受氣而為厥逆之死證也兆璜曰傷寒論云胃氣生熱其陽則絕蓋胃氣生熱則陽明與太陰絕而太陰不足矣太陰不足則太陰與陽明絕而胃中燥盛矣陰陽表裡之相關也此所謂得五有餘二不足也帝曰何謂五有餘二不足岐伯曰所謂五有餘者五病氣之有餘也二不足者亦病氣之不足也此言有餘不足之皆為病也五有餘者謂身熱如炭頸膺如格人迎躁盛喘息而氣逆此五病氣之有餘也二不足者病癃一日數十溲太陰脈微細如髮亦病氣之不足也兆璜曰在陽明曰五病氣在太陰曰亦病氣是先因有餘而致病不足也今外得五有餘內得二不足此其身不表不里亦正死明矣陽明者表也外得五有餘不能行氣於表之三陽矣太陰主裡內得二不足不能行氣於裡之三陰矣此其身之表裡陰陽皆為斷絕亦正死也明矣帝曰人生而有病巔疾者病名曰何安所得之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為巔疾也此女子胞之為病也有所大驚則氣暴上而不下夫精以養胎而精氣並居者也母受驚而氣上則子之精氣亦逆故令子發為巔疾也愚謂巔亦作癲按嬰兒癲癇多因母腹中受驚所致然癲疾者逆氣之所生也故因氣上逆而發為癲疾兆璜曰胎中受病非止驚癇妊娠女子飲食起居大宜謹慎則生子聰俊無病長年帝曰有病痝然如有水狀切其脈大緊身無痛者形不瘦不能食食少名為何病痝然浮腫貌如有水狀者水氣上乘非有形之水也是少陰寒水主氣大則為風緊則為寒故其脈大緊也夫病風水者外證骨節疼痛此病在腎非外受之風邪故身無痛也水氣上乘故形不瘦風木水邪乘侮土氣故不能食即食而亦不能多也兆璜曰邪幹上焦則不能食在中焦則食少也岐伯曰病生在腎名為腎風腎為水臟水生風木此腎臟自生之風非外受之邪故曰病生在腎兆璜曰天有六淫人亦有六氣奇恆之病多不因於外邪腎風而不能食善驚驚已心氣痿者死帝曰善水者火之勝不能食者水邪直入於上焦也善驚者水氣搏於心下也夫心不受邪驚已而心氣痿者心受邪傷也大奇論篇第四十八此承上章記奇病之廣大肝滿腎滿肺滿皆實即為腫滿謂臟氣充滿也夫五臟者藏精氣而不瀉故滿而不實如滿而皆實是為太過當即為腫然此論臟氣實而為腫與氣傷痛形傷腫之因證不同也肺之雍喘而兩胠滿肝雍兩胠滿臥則驚不得小便腎雍腳下至少腹滿脛有大小髀䯒大跛易偏枯雍者謂臟氣滿而外壅於經絡也蓋滿在氣則腫在肌肉雍在經則隨經絡所循之處而為病也肺主呼吸其脈從肺系橫出腑下故喘而胠滿肝脈環陰器抵小腹屬肝絡膽上貫膈布脅肋故兩胠滿而不得小便臟氣雍滿臥則神魂不安故發驚也腎脈起於足下循內踝上腨內屬腎絡膀胱故自腳下至少腹滿腎主骨而寒水主氣故足脛有大小髀䯒大而跛變易為偏枯此論臟氣雍於經脈而為此諸病與邪在三焦之不得小便虛邪偏客於形身而發為偏枯之因證不同也心脈滿大癇瘛筋攣癇瘛抽掣也攣拘攣也心為火臟火熱太過是以脈大而癇瘛筋攣肝脈小急癇瘛筋攣肝主筋而主血小則為虛急則為寒此肝臟虛寒而不能榮養於筋故為攣瘛之病此論筋之為病有因心氣之有餘有因肝氣之不足與風傷筋脈筋脈乃應之為病不同也肝脈騖暴有所驚駭騖音務騖疾奔也又亂馳也言肝脈之來疾而暴亂者必有所驚駭故也此言因驚駭而致肝脈暴亂非東方肝木其病發驚駭也兆璜曰七情之中心肝主驚因驚駭而致肝脈騖暴者所謂病生於情也東方肝木其病發驚駭者所謂情生於病也脈不至若喑不治自已脈絡阻於下則音不出於上脈絡疏通其音自復故脈不至而喑者不須治之其病自已此係經脈所阻之病與邪搏於陰則為喑之不同也腎脈小急肝脈小急心脈小急不鼓皆為瘕小急虛寒之脈瘕聚也臟氣有所留聚故脈見小急而不鼓腎肝並沉為石水肝乃東方春生之木主透發冬令閉藏之氣如肝腎之脈並沉是二臟之氣皆閉逆於下而為石水矣石水者腎水也如石之沉腹滿而不喘並浮為風水並虛為死肝主風木腎主寒水如肝腎之脈並浮是二臟所主之氣皆發於外故名曰風水如浮而並虛是臟氣不藏而外脫故死此言肝腎之氣過於閉藏則沉而為水過於發越則浮而兼風皆本臟所主之氣而自以為水為風與本經之熱病論水熱穴論靈樞論疾診尺篇及金匱要略諸經皆論石水風水之不同也並小弦欲驚小者血氣皆少弦則為減為寒肝藏之氣生於腎脈並小弦是二臟之氣皆虛而欲發驚也前論肝雍之驚病有餘今弦小欲驚病不足皆本臟本氣之為病也上節言虛脫於外者死此言本虛於內者驚腎脈大急沉肝脈大急沉皆為疝大則為虛急則為寒沉為在下在裡故皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝心疝之有形在少腹其氣上搏於心故心脈搏而滑急也肺脈當浮而反沉搏是肺氣逆聚於內而為肺疝矣三陽急為瘕三陰急為疝此言疝瘕之病病三陰三陽之氣而見於脈也子繇曰瘕者假也假物而成有形疝字從山有艮止高起之象故病在三陽之氣者為瘕三陰之氣者為疝玉師曰瘕在腸胃之外故三陽急疝病五臟之氣故三陰急二陰急為癇厥二陽急為驚二陰少陰也癇厥者昏迷僕撲卒不知人此水氣乘心是以二陰脈急二陽陽明也陽明者土也土氣虛寒則陽明脈病故發驚也脾脈外鼓沉為腸澼久自已腸澼下痢也著至教論曰三陽者至陽也積並則為驚病起疾風至如礔礪九竅皆塞陽氣滂溢干嗌喉塞並於陰則上下無常薄為腸澼此三陽並至干薄臟陰乃奇恆之下痢與外受六淫之邪迫於經絡而為下利膿血者不同故病見於臟脈而各有死生之分脾為陰臟位居中央受三陽陽盛之氣迫而上行則其脈外鼓搏而下沉則為腸澼下痢蓋言陽氣上下之無常也脾為陰中之至陰故雖受陽熱之氣其病久而自已玉師曰疝瘕腸澼皆病在三陰三陽之氣分首節論陽熱之氣傷脾藏之津液而為腸澼次論陽熱之氣傷肝腎心藏之血而為腸澼下血後論三陽之氣甚而三陰之氣傷者死肝脈小緩為腸澼易治經云緩者多熱小者血氣皆少此陽熱之氣干薄臟陰致肝藏之血氣下泄而虛故其脈小緩也肝主藏血故雖受陽邪尚為易治腎脈小搏沉為腸澼下血腸澼下血者或下痢赤色或下血也腎主藏精為精血之原陽熱之氣下薄於腎故為腸澼下血陰血傷故脈小熱邪干腎故沉而搏也血溫身熱者死夫陰陽相和則生偏害則死三陽為陽三陰為陰氣為陽血為陰三陽之熱薄於陰血血受熱傷故血溫也身熱者三陽盛而三陰之氣絕也心肝澼亦下血二臟同病者可治此承上文而言陰血盛者雖受陽薄尚為可治蓋重陰血以待陽也夫心主生血肝主藏血是以心肝二臟受陽盛之氣而為腸澼者亦下血如二臟同病則陰血盛而可以對待陽邪故尚為可治之證其脈沉小澀為腸澼其身熱者死熱見七日死上節分血氣為陰陽此復以三陰三陽之氣論陰陽也脈小沉滯者三陰之氣為陽薄所傷也其身熱者陽盛而陰絕也七日死者六臟之陰氣終也按此係奇恆之病緣於陰陽不和非關外淫之氣醫者大宜體析如因表邪而發熱者其脈必浮或見滑大初起之時必骨痛頭疼或惡寒喘急表證始盛里證尚微蓋先表而後入於裡也此係三陽之氣直並於陰陰氣受傷是以脈小沉澀一起之時里證即急或噤口腹痛或下重痢甚或發驚昏沉或嗌乾喉塞身雖熱而熱微外證輕而裡急此三陽之氣疾起如風至如礔礪當急用抑陽養陰之藥以救援若見身有微熱而用表散之輕劑因脈小澀而用和調之緩方三日之後即成不救矣存德好生之士當合參諸經細心體認幸勿以人命為輕忽也張兆璜曰危險之證當用瞑眩之藥以急救若用平和湯而愈者原不死之病也服平和湯而後成不救者醫之罪也張應略曰當汗而急汗之正所以養陽也當急下而大下之正所以養陰也常須識此勿令誤也胃脈沉鼓澀胃外鼓大心脈小堅急皆膈偏枯此言榮衛血氣虛逆而成偏枯也夫經脈者所以行氣血而榮陰陽濡筋骨以利關節衛氣者所以溫分肉充皮膚肥腠理司開闔是故榮衛調則筋骨強健肌肉緻密如血氣虛逆則皮膚筋骨失其榮養而成偏枯之患矣榮衛之氣由陽明之所生血脈乃心臟之所主陽明氣血皆多其脈當浮大今脈沉而鼓動帶澀靈樞經曰澀為少氣傷寒論曰澀則無血是血氣虛於內矣推而外之胃外以候形身之中其脈鼓大大則為虛此血氣虛於外矣是以成膈偏枯膈者里之膈肉前連於胸旁連於脅後連於脊之十一椎蓋營衛血氣皆從此內膈而外達於形身營衛不足則膈氣虛矣膈氣虛是以胸脅脊背之間而成麻痹不仁之證故名曰膈偏枯也夫心主血脈之氣小則血氣皆少堅急為寒心氣虛寒則血脈不行筋骨無所榮養而亦成膈外之偏枯夫邪之偏中於身及風之傷人而成偏枯者乃外受之邪當主半身不遂此由在內所生之血氣虛逆故主於膈偏枯膈偏枯者只病在胸脅腰脊之間而不及周身之上下也男子發左女子發右左右者陰陽之道路也男子血氣從左而轉女子氣血從右而旋是以男子之病發於左而女子之病發於右也不喑舌轉可治三十日起夫營衛氣血雖生於陽明主於心臟然始於先天之腎中少陰之脈貫腎系舌本不喑舌轉是先天之根氣不傷故為可治偏枯而主三十日起者言其愈之速也其從者喑三歲起從順也謂男子發左女子發右陰陽血氣雖順而喑者至三歲之久而後能復也兆璜曰不喑舌轉先天之氣在也其從者喑後天之氣復也年不滿二十者三歲死年不滿二十者臟腑正盛血氣方殷而反有此衰敗之證比及三年五臟胃腑之氣漸次消滅而死矣兆璜曰如外感風邪者值此少壯之年更易愈矣此因於內損故名曰膈偏枯肺至而搏血衄身熱者死脈來懸鉤浮為常脈血衄血出於鼻也脈搏擊而血衄者經熱盛而迫血妄行血脫故身熱也脈來懸鉤者心之脈也浮者肺之脈也心主血脈肺主皮膚而開竅在鼻心脈來盛上乘於肺而致衄者此血衄之常脈也夫因外感風寒表陽盛而迫於經絡之衄者自愈若心脈盛而迫於皮膚之血以致衄者為常脈此表裡陰陽外內出入而皆為衄病之常若臟氣不守經血沸騰脈至而搏擊應手者此熱盛而血流妄行一絲不續則穹壞判矣玉師曰搏者陰陽相搏血衄身熱者血氣俱脫故死懸鉤浮脈乃血衄之常脈故不死不死者如奇恆之衄也脈至如喘名曰暴厥暴厥者不知與人言如喘者脈來滑急也此痰水上壅故脈來急滑名曰暴厥暴厥者一時昏厥而不能與人言脈至如數使人暴驚三四日自已夫有形之邪上乘則脈至如喘無形之氣上逆則脈至數疾邪薄心下故發驚也蓋心不受邪至三四日邪自下而驚厥之病自已非比外淫卒厥之難愈也脈至浮合浮合如數一息十至以上是經氣予不足也微見九十日死此論臟腑經俞之氣不足而各有死期也浮合者如浮波之合來去之無根也浮合如數而一息十至以上是經氣予之不足也微見此脈至九日十日之交而死蓋九者陽之終十者陰之盡此三陰三陽十二經脈之氣終也予與同夫五臟相通移皆有次臟腑之氣各傳與之如五臟有病而逆傳其所勝者死如順傳其所生而受所與之氣不足者亦死故曰氣予之不足也又五臟各以其時而主於手太陰者臟氣傳與之俞俞氣傳與之經脈氣與之絡絡與之肌此經脈之氣受五臟所與之氣不足故脈至如此虛數之極也士宗曰微對顯言微現此脈期以九十日而死若顯露之不逾時日矣後之交漆亦猶是也兆璜曰絡與之肌肌絡之氣外內相通故脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈至如火薪然是心精之予奪也草乾而死如火薪然者心氣不藏虛炎之極也精者五臟主藏精謂所與之氣精氣也曰奪曰虛曰不足者謂奪其所與之精氣以致虛而不足也草乾冬令之時當遇勝克之氣而死所謂脈至者概左右三部而言也玉師曰心脈如火薪肝脈如散葉胃脈如泥丸太陽如湧泉肌脈如頹土皆以五行之氣效象形容蓋此乃五臟虛敗之氣變見於脈非五臟之病脈也斯之謂奇恆之脈應略曰予者謂臟腑之氣傳與之脈也脈至如散葉是肝氣予虛也木葉落而死散葉飄零虛散之象肝木之氣虛故當至秋令之時而死脈至如省客省客者脈塞而鼓是腎氣予不足也懸去棗華而死脈塞而鼓謂脈始來充塞於指下旋即鼓動而去有如省問之客方及門而即去也懸隔也懸去棗華者謂相隔於棗華之時而死也張兆璜曰臟腑之氣外合五行之生克而草木之榮枯只以四時之氣候之火土之氣皆主於夏故曰懸去棗華者謂相去棗華之初夏而死於土令之長夏也應略曰脈始於腎故腎氣虛而脈至如省客脈至如丸泥是胃精予不足也榆莢落而死丸泥者如泥丸而不滑也胃為陽土位居中央其性柔其體圓故曰脈弱以滑是有腎氣蓋往來流利如珠曰滑如丸泥者無滑動之象胃將死敗之徵也榆莢至春而落木令之時也臟腑之氣生於胃腑水穀之精故曰精予不足脈至如橫格是膽氣予不足也禾熟而死膽屬甲子主一陽初生之氣膽氣升十一臟腑之氣皆升如橫格者有如橫拒而不得上下是膽氣虛而不能升也靈樞經曰其膽乃橫是膽氣橫而脈亦見其橫格也禾熟秋深之時也兆璜曰人生於寅天三生木故在人臟腑陰陽之生死應四時草木之榮枯按宋史錢乙傳曰一乳婦因悸而目張不得瞑乙曰此氣結而膽橫不下用青郁李酒飲之而愈脈至如弦縷是胞精予不足也病善言下霜而死不言可治弦縷者精血虛而如縷之細也胞精胞絡之精氣也胞絡者繫於腎少陰之脈貫腎系舌本善言者胞氣泄也駟見而隕霜九月之候也九月萬物盡衰則氣去陽而之陰應收藏之氣而反泄於外故死胞主藏精血故曰精予不足脈至如交漆交漆者左右旁至也微見三十日死此承上文而言衝任之脈絕也衝任起於胞中循腹上行為經血之海胞精不足衝任將絕矣交絞也如絞漆之左右旁流無中通一貫之象是循中而上之衝任絕矣精血為陰故至三十日而死三十日者月之終也兆璜曰衝任為經脈之原故亦曰微見吳氏曰微見始見也脈至如湧泉浮鼓肌中太陽氣予不足也少氣味韭英而死至如湧泉來盛而不返也浮鼓肌中無根外脫之象也太陽者巨陽也為諸陽主氣而生於膀胱之水中是以標陽而本寒夫水為陰火為陽陽為氣陰為味少氣味者少陽之標本皆虛也蓋言太陽之氣不足而水府未虛陽生於陰尚有根而可復如標本皆少不免於死亡矣韭乃肝之菜至春而英韭英之時更疏泄其本氣則死矣兆璜曰太陽為諸陽主氣故六氣之中獨舉太陽衝任為經血之海皆起於胞中故六腑之中特提胞脈膀胱者胞之室也脈至如頹土之狀按之不得是肌氣予不足也五色先見黑白壘發死頹土傾頹之頑土也脾主肌肉如頹土而按之不得者無來去上下之象是肌氣受所予之不足也土位中央而分王於四季當五色具見而先主黃若五色之中而先見黑是土敗而水氣乘之矣馬氏曰壘作藟葛之屬也葛色白而發於春白藟發時木氣旺而頹土之氣絕矣脈至如懸壅懸壅者浮揣切之益大是十二俞之予不足也水凝而死懸壅者如懸癰也揣度也先輕浮而度之再重按而切之其本益大有如癰之頭小而本大此臟腑十二俞氣之不足也夫經俞之氣晝夜環轉俞予之不足是以脈壅滯而有如癰之象也天寒地凍則經水凝泣壅滯之脈再為凝泣絕無生動之機矣脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熱寒熱獨並於腎也如此其人不得坐立春而死菀音郁偃仰也脈如仰起之刀口利銳而背堅厚是以浮之小急而按之堅大也夫五臟相通精氣各循序而傳予之腎為水臟又獨受五臟之精而藏之是以傳與之外而又有邪氣獨並於腎之奇病也有如此之脈病者其人當至立春而死按靈樞經曰腎是動病喝喝而喘坐而欲起其人不得坐者腎氣傷也冬令閉藏以奉春生之氣腎氣已傷再至春而泄之腎氣絕矣張兆璜曰菀熱久郁之氣寒熱新積之邪蓋久則寒亦化熱故曰菀熱按此與病能之義大略相同病能篇論五臟之邪氣循序相傳此論五臟之寒熱獨並於腎蓋精氣之有傳有並而邪亦隨之此論氣予不足中突提邪並一節經義微妙學者大宜體會張應略曰因精氣之傳予故邪亦從而傳之因腎藏五臟之精故寒熱亦獨並於腎脈至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死直值同如丸滑而不值手者圓活流利似於無形故按之不可得也大腸為肺之府而屬庚金其脈宜耎弱輕浮氣予不足故脈至若此棗葉生於夏火旺則金鑠矣脈至如華者令人善恐不欲坐臥行立常聽是小腸氣予不足也季秋而死脈至如華者如華之輕微也小腸為心之府而屬丙火其脈當來盛反如華者氣予不足也腑氣不足則臟氣亦虛神虛則恐懼自失神志不寧故坐臥不安也小腸之脈入耳中屬聽宮常有所聽者如耳作蟬鳴或如鐘磬聲皆虛證也遇金水生旺之時而死下經曰診合微之事通陰陽之變章五中之情定五度之事如此乃足以診夫五中之情決奇恆之病也五度之事度奇恆之脈也本篇先論奇恆之病後論奇恆之脈與經常之脈證大不相同故曰大奇論兆璜曰大奇脈解二篇皆無君臣問答之辭而曰論曰解者乃伯承上章解論奇恆之脈病也脈解篇第四十九太陽所謂腫腰脽痛者正月太陽寅寅太陽也正月陽氣出在上而陰氣盛陽未得自次也故腫腰脽痛也此篇論奇恆之勢乃六十首蓋以三陰三陽之氣各主六十日為首六六三百六十日以終一歲之周陰陽六氣各自盛衰而能為經脈作病故名之曰脈解篇然此篇之論與諸經之論陰陽各不相同乃解奇病之脈也太陽為諸陽主氣生於膀胱水中故以太陽之氣為歲首正月陽氣雖出於上而陰寒之氣尚盛陽氣未得次序而出故太陽所謂腫腰脽痛者因太陽之氣尚為陰氣所郁故腫腰脽痛也此論陽氣之微也兆璜問曰奇恆之勢六十首已釋於診要篇中但臟腑陰陽之氣與此篇各有異同請明示其旨曰診要篇中論五臟之氣各主六十日為首而取刺諸俞各有淺深之法所謂度臟度俞也此篇論三陰三陽之氣分主一歲各有盛衰而能為經脈作病所謂度陰陽氣度人脈也陰陽之道有名無形數之可十可百推之可萬可千明乎陰陽常變之理然後可與言醫病偏虛為跛者正月陽氣凍解地氣而出也所謂偏虛者冬寒頗有不足者故偏虛為跛也此言太陽之氣生於冬令水中寒水之氣有所不足以致太陽之氣亦虛而為偏枯跛足也夫正月陽氣解凍從地氣而上出則陽氣當自次而盛矣言有所謂偏虛而為跛者又緣冬令寒水之氣頗有不足以致所生之陽氣偏虛而為經脈作病上節論陽氣微而為時所遏抑此論根氣不足而所生之氣亦虛以下論陽氣之漸盛所謂強上引背者陽氣大上而爭故強上也強上引背者頭項強而引於肩背也太陽之脈上額交巔從巔別下項挾脊抵腰中陽氣大上而爭擾於上故使其強上也所謂耳鳴者陽氣萬物盛上而躍故耳鳴也此言陽氣之更盛也春三月所謂發陳天地俱生萬物以榮天地萬物之氣皆盛上而躍而人之陽氣亦虛於上是以經脈上壅而耳鳴也所謂甚則狂巔疾者陽盡在上而陰氣從下下虛上實故狂巔疾也此言陽氣之盛極於上也所謂狂癲疾者乃陽氣盡甚於上而陰氣從之於下不得與陽氣相和下虛上實故使狂癲疾也本經曰陽盛則狂又曰氣上不下頭痛癲疾以下論陽氣之從下而上自微而盛由盛而極太過不及與時消息而皆能為病所謂浮為聾者皆在氣也此申明經氣之有別也如陽氣盛上而所謂耳鳴者因氣而病經也若所謂浮為聾者皆在氣也按此篇名曰脈解而篇中上論三陰三陽之氣並不言及經脈蓋解釋經脈之氣三陰三陽之氣也經脈之病三陰三陽之氣所致也故曰所謂曰者言所謂有如是之病者乃陰陽氣之盛衰而證見於有形也若所謂浮為聾者皆在氣而不涉於經也兆璜曰曰所謂曰者者釋脈解篇之解字而言也所謂入中為喑者陽盛已衰故為喑也此言陽盛於外而復歸於陰也陰陽離合論曰天覆地載萬物方生未出地者命曰陰處名曰陰中之陰則出地者命曰陰中之陽陽予之正陰為之主是陽氣離陰而出於地盛極於外當復歸而與陰相合所謂入中為喑者陽盛已衰入中之氣不足則陰虛而為喑矣內奪而厥則為喑俳此腎虛也內奪者謂陽盛於外內奪其所藏之氣則腎虛矣俳當作痱痱之為病四肢不收蓋不能言而兼之四肢不收此腎虛厥逆之所致也兆璜曰陽受氣於四末陽盛已衰故四肢不收腎氣不足則為喑也少陰不至者厥也少陰之氣腎所主也承上文而言腎虛以致少陰之氣不至者則手足厥冷也兆璜曰少陰之氣陰中之生氣也陽盛已衰則腎虛腎虛則少陰之氣不至矣少陽所謂心脅痛者言少陽盛也盛者心之所表也九月陽氣盡而陰氣盛故心脅痛也按少陽之氣當主七月八月為首九月少陰心臟主氣少陽為君火之相故至九月而為心之表其氣更盛者也然此時天之陽氣盡歸於下而陰氣正盛君相之火為時所遏故心脅痛也兆璜曰少陰主心痛少陽主脅痛診要經終篇曰九月人氣在心所謂不可反側者陰氣藏物也物藏則不動故不可反側也九月之時萬物之氣俱收藏於陰物藏則不動矣是以少陽之氣亦不能樞轉故不可反側也上節論少陽正盛之氣為時氣所遏此言少陽之氣隨萬物收藏而不能轉運其樞所謂甚則躍者九月萬物盡虛草木畢落而墮則氣去陽而之陰氣盛而陽之下長故謂躍此言少陽之氣正盛不肯隨時而藏於陰也夫九月少陽為心之表其氣正盛然此時萬物草木盡皆衰落則人之氣亦當去陽而之陰矣但少陽之氣正盛陽氣入之於下而仍欲上長故病多跳躍也夫人之陰陽升降隨四時寒暑往來此氣獨與天地萬物之氣相忤故謂之奇兆璜曰所謂六十首者三陰三陽之氣各以六十者為首自微而盛盛而極極而衰非僅主六十日也故少陽之氣至九月而正盛陽明所謂洒洒振寒者陽明者午也五月盛陽之陰也陽盛而陰氣加之故洒洒振寒也陽明乃盛陽之氣故主五月為首五月陽盛而一陰始生故為盛陽之陰陽盛之氣為陰氣加之故洒洒振寒也所謂脛腫而股不收者是五月盛陽之陰也陽者衰於五月而一陰氣上與陽始爭故脛腫而股不收也五月陽氣始衰而下一陰始生而上陰與陽交爭以致經脈不和而為脛腫不收也所謂上喘而為水者陰氣下而復上上則邪客於臟腑間故為水也陰氣下而復上者謂冬至一陽初生陰氣下降至五月而陰氣復上也邪水邪也謂陰氣下歸於水臟至陰氣從上而漸盛則水邪隨氣而上升上客於臟腑之間故喘而為水也所謂胸痛少氣者水氣在臟腑也水者陰氣也陰氣在中故胸痛少氣也水火者陰陽之兆徵也在天成象在地成形故曰水者陰氣也上節論有形之水邪上客而為喘此論無形之水氣上乘而為胸痛少氣所謂甚則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相搏水火相惡故惕然而驚也所謂甚者謂陽氣下之甚陰氣上之甚也甚則陰陽相搏水火相惡而陽明之氣厥矣陽明氣厥則陽明之脈病矣陽明脈病則惡人與火聞木音則惕然而驚也所謂欲獨閉戶牖而處者陰陽相搏也陽盡而陰盛故欲獨閉戶牖而居此言陽氣盡歸於下陰氣獨盛於上故欲獨閉戶牖而居夫陽明之氣主五月為首五月之時陰氣始上陽氣始下至於甚時則當秋分之候矣甚至陽盡陰盛又當冬極之時矣是陽明之氣但以五月為首而非獨主於五月六月也六氣皆然所謂病至則欲乘高而歌棄衣而走者陰陽復爭而外並於陽故使之棄衣而走也此申明陰陽之氣有上下而復有表裡也陰陽復爭者謂陰陽之氣上下相搏而復交爭於外內也陰陽之氣外並於陽則陽盛而為病矣陽盛故使之乘高而歌棄衣而走也所謂客孫脈則頭痛鼻鼽腹腫者陽明並於上上者則其孫絡太陰也故頭痛鼻鼽腹腫也此承上章而復申明陰陽之氣上下升降內外出入行於脈外之氣分也氣分者皮膚肌腠之間上謂皮膚之上也夫諸脈之浮而常見者皆絡脈也足太陰之脈亦見於皮膚之上而無所隱是以陽明之氣並於上則迫於陽明之孫絡與太陰之經脈也迫於陽明之孫絡則頭痛鼻鼽迫於太陰之經脈則腹腫也太陰所謂病脹者太陰子也十一月萬物氣皆藏於中故曰病脹太陰為陰中之至陰故主陰盡之十一月也十一月萬物之氣皆藏於中故主病脹脹謂腹脹也兆璜曰十一月律起黃鐘為一歲之首行奇恆之法以太陰始故以太陰主子也所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也陽明者太陰之表也太陰為陰中之至陰陰極則復故上走於陽明陽明絡屬心故上走心為噫噫者噯氣也靈樞經云脾是動病腹脹善噫口問篇曰氣出於胃則為噫五氣論曰心為噫是太陰之氣從陽明而上出於心則為噫也所謂食則嘔者物盛滿而上嗌故嘔也十一月萬物氣皆藏於中則盛滿而上溢故嘔也經云足太陰獨受其濁太陰之清氣上出則為噫陰之濁氣上溢則為嘔也所謂得後與氣則快然如衰者十二月陰氣下衰而陽氣且出故曰得後與氣則快然如衰也得後者得後便也氣者轉失氣也十一月初生至十二月陽氣且出陰氣從下而衰所謂臟中之氣得以下行故快然如衰也夫土位中央上走心為噫者厥逆從上散也得後與氣者厥逆從下散也夫奇恆之陰陽各以六十日為首而始於太陰故論太陰之氣曰十一月十二月則餘氣可知兆璜曰太陽為諸陽主氣太陰乃陰中之至陰以正月起太陽十二月終太陰用周一歲之氣少陰所謂腰痛者少陰者腎也十月萬物陽氣皆傷故腰痛也少陰之氣主九月十月為首十月寒水用事故主於足少陰腎少陰之上君火主之故九月主手少陰心然陰陽六氣止合六經皆從下而生故不及於手惟少陰主水火陰陽之氣有標本寒熱之化故九月主手少陰而十月主足少陰也其餘臟有陰陽只論足而不論手張兆璜曰九月雖屬心火主氣然只論足少陽之表氣正盛其義微矣張應略曰身半以下地氣主之陰陽之氣皆從地而出故厥論曰陽氣起於足五趾之表陰氣起於足五趾之裡本輸篇曰六腑皆出足之三陽上合於手者也是以六氣止合足六經而不及於手所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也此言上下陰陽之氣不相交合而為病也少陰寒水在下君火之氣在上上下水火不交則諸陽之氣上浮而無所依從矣是以陽熱上逆而為嘔咳氣喘之病所謂色色不能久立久坐起則目䀮䀮無所見者萬物陰陽不定未有主也秋氣始至微霜始下而方殺萬物陰陽內奪故目䀮䀮無所見也此節論少陽主七八月為首因上章論少陽為心之表其氣正盛在九月故不復提少陽二字七月之交陰氣上升陽氣下降萬物陰陽不定而未有所主是以色色不能而亦未有定也秋氣始至則陽氣始下而未盛於內陰氣正出而陰氣內虛則陰陽之氣奪於內矣陰陽內奪故目䀮䀮無所見也高士宗曰色色猶種種也色色不能猶言種種不能自如也久立久坐而起則目䀮䀮無所見非色色不能之謂歟張兆璜問曰少陽主一陽初生之氣奚復始於秋曰少陽主初生之氣者乃三陽之次序也以七月為首者論陰陽之化運也是以少陽主甲子而復主於寅申在初生之氣其運風鼓其化鳴紊啟坼在相火主氣其運暑其化喧囂郁煩氣化在申其運涼其化霧露清切陰陽之道有常有變此論陰陽之變易者也所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出肝氣當治而未得故善怒善怒者名曰煎厥靈樞經曰少陽主氣秋時陽氣下降而不治於外則少陽之氣亦不得出故少氣也厥陰肝氣與少陽標本相合少陽之氣不得出則肝氣當治而亦未得矣肝氣內郁故善怒煎厥者焦煩顛倒也按陰陽系日月論曰戌者九月主左足之厥陰故至七八月少陽主氣而厥陰肝氣將當治矣張兆璜曰因首不言少陽故特提出肝字所謂恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入陰陽相搏故恐也秋時陽氣雖入而陰氣尚少故萬物雖衰而未盡去陰氣少則陰氣正出矣陽氣入則與所出之陰相搏矣陰陽相搏則少陽厥陰之氣皆傷肝氣虛則恐膽病者心下憺憺如人將捕之所謂惡聞食臭者胃無氣故惡聞食臭也秋深之時陽盡而陰盛是以胃無氣而惡聞食臭也論少陽而提胃氣者言奇恆所主之四時亦皆以胃氣為本也所謂面黑如地色者秋氣內奪故變於血也秋時陰氣正出則內奪其所藏之陰陰氣上乘故面黑如地色也所謂咳則有血者陽脈傷也陽氣未盛於上而脈滿滿則咳故血見於鼻也陽氣未盛於上者言至九月而少陽始盛也夫血隨氣行氣未盛而脈先滿則血留而上逆矣兆璜曰少陽主氣心主血脈少陽為心之表故脈滿當於陽氣盛時厥陰所謂㿗疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故為㿗疝少腹腫也厥陰木火主氣故主於三月四月之交三月陽盛之時而厥陰主氣故為陽中之陰邪謂陰氣也厥陰之氣在內而未得盡出故為㿗疝腹腫也張兆璜曰有因陽氣正出而為時氣所遏抑者有因時氣正盛而又當陰氣所主者當知奇恆之陰陽與四時相逆而為病所謂腰脊痛不可以俯仰者三月一振榮華萬物一俯而不仰也三月陽氣振發萬物榮華草木繁茂枝葉下垂一惟俯而不仰人為萬物之靈是以腰脊痛而亦不可以俯仰也所謂㿗癃疝膚脹者曰陰亦盛而脈脹不通故曰㿗癃疝也陰亦盛者厥陰之氣亦盛於外也陰盛而脈脹不通故㿗癃而膚脹也㿗癃疝者陰器腫而不得小便也按此篇系伯承上章解釋奇病之脈氣乃自相問答之辭故末節添一曰字以申明自相問答之意張兆璜曰曰所謂曰者者是設為之問辭下文是答辭故增一曰字以別之所謂甚則嗌乾熱中者陰陽相搏而熱故嗌乾也所謂甚者謂陽氣甚盛也厥陰之氣與甚陽相搏則陰亦為熱矣熱甚故嗌乾而熱中也夫人之臟腑陰陽與天地四時之氣寒暑往來交相順序惟奇恆之勢各以六十日為首與四時之氣相逆而為病故聖人持診之道先後陰陽而持之先診陰陽之序後診陰陽之奇審於終始通於常變診道乃具方可橫行
