body:
  text: 卷六刺要論篇第五十黃帝問曰願聞刺要岐伯對曰病有浮沉刺有淺深各至其理無過其道刺要者刺之要法也理者皮膚肌肉之紋理道者血氣循行之道路也蓋脈肉筋骨之間各有淺深之理路隨病之浮沉而取之無使其過與不及也過之則內傷不及則生外壅壅則邪從之刺過其道則內動五臟不及其理則妄傷其外而生壅壅則血氣不行而邪氣從之矣淺深不得反為大賊內動五臟後生大病不得其淺深之法反為大害矣皮傷則內動肺肉傷則內動脾後生溫瘧腹脹心痛之大病矣故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脈者有在筋者有在骨者有在髓者此論形層之有次第而針刺之有淺深也夫皮肉筋骨內合五臟腎主之骨而有髓之深肺主之皮而有毛之淺是針刺之道由極淺而至於深也腠理者皮膚肌肉之紋理從大小分肉而至於肌理皮毛之間皆三焦通會元真之處毫毛腠理者鬼門元府也謂氣之理路內通於臟腑外出於毫毛雖極淺而可以致氣者也盧良侯曰刺毫毛腠理無傷皮者即診要篇之所謂以布憿著之乃從單布上刺是也是故刺毫毛腠理無傷皮皮傷則內動肺肺動則秋病溫瘧泝泝然寒栗泝音素刺毫毛腠理刺之極淺者也肺主秋收之令秋時陽氣下降陰氣外出妄動其肺則收令化薄陰陽之氣反相得於外而為溫瘧矣逆流而上曰泝泝泝然者氣上逆而寒栗也動謂動其臟氣也刺皮無傷肉肉傷則內動脾脾動則七十二日四季之月病腹脹煩不嗜食肉為脾之合脾土寄王於四季月各一十八日共為七十二日妄動其脾則脾傷而不能運轉水穀是以所主之日病脹煩而不嗜食也刺肉無傷脈脈傷則內動心心動則夏病心痛脈在肉中肉有分理不知其道則傷脈矣脈乃心之合心主夏令故至夏病心痛刺脈無傷筋筋傷則內動肝肝動則春病熱而筋弛筋深於脈刺過其道則傷筋筋乃肝之合肝主春令故動肝則肝氣虛而春病熱筋傷則弛縱矣刺筋無傷骨骨傷則內動腎腎動則冬病脹腰痛筋生於骨骨深於筋矣骨為腎之合而主冬令動腎氣則所藏者少故當病虛脹而腰痛腰乃腎之府也夫五臟主藏者也經云有故無殞無故而動之則虛其所藏之氣故至其所主之時則病矣刺骨無傷髓髓傷則銷鑠䯒酸體解㑊然不去矣髓者骨之充刺骨太過則傷髓髓傷則銷鑠而䯒酸也解㑊懈惰也靈樞經云腦為髓之海髓海不足則腦轉耳鳴䯒酸眩冒目無所見懈怠安臥盧良侯曰骨穴多在節之交節交會處有髓道故刺太過則傷髓矣按針刺之要首忌太過故曰各至其理無過其道而此篇先論其太過焉刺齊論篇第五十一黃帝問曰願聞刺淺深之分齊者所以一之也言刺有淺深一定之分無使其太過不及岐伯對曰刺骨者無傷筋刺筋者無傷肉刺肉者無傷脈刺脈者無傷皮刺皮者無傷肉刺肉者無傷筋刺筋者無傷骨前四句言宜深者勿淺後三句言宜淺者勿深所謂各至其理無過其道帝曰余未知其所謂願聞其解岐伯曰刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脈者至脈而去不及肉也刺脈無傷皮者至皮而去不及脈也此申明刺宜深者勿淺而去也刺骨無傷筋者言其病在骨刺當及骨若針至筋而去不及於骨則反傷筋之氣而骨病不除是刺骨而反傷其筋矣蓋皮肉筋骨各有所主之氣故必當至其處而候其主病之氣焉盧良侯曰脈在肉中肉有溪谷脈有脈道理路各別者也所謂至脈而去不及肉者謂刺在皮膚絡脈之間不及里之筋骨非針從脈而再入於肉也是以略去刺脈無傷肉句者使後學之意會也所謂刺皮無傷肉者病在皮中針入皮中無傷肉也刺肉無傷筋者過肉中筋也刺筋無傷骨者過筋中骨也此之謂反也此言無過其道也病在皮針入皮中以候皮氣不至於肉則不傷其肉矣如病在肉針過肉而中筋則傷其筋矣此謂刺之反也盧良侯曰皮肉筋骨是屬一道而各有淺深之分絡脈經脈另屬一道而亦有淺深之分刺禁論篇第五十二黃帝問曰願聞禁數數幾也言所當禁刺之處有幾也岐伯對曰臟有要害不可不察五臟有緊要為害之處不可不細察焉肝生於左肺藏於右肝主東方乙木肺主西方辛金聖人南面而立前曰廣明後曰太衝左東而右西是以肝左而肺右也曰生曰藏者謂臟體藏於內臟氣之從左右而出於外也心部於表腎治於裡部分也心為陽臟而主火火性炎散故心氣分部於表腎為陰臟而主水水性寒凝故腎氣主治於裡張兆璜曰心部於表故出於七節之旁腎治於裡故止注於俞也脾為之使胃為之市脾主為胃行其津液以灌四旁故為之使胃為水穀之海無物不容故為之市膈肓之上中有父母肓音荒膈膈膜也內之膈肉前連於胸之鳩尾旁連於腹脅後連於脊之十一椎肓者即募原之屬其原出於臍下名曰脖胦夫陰陽者變化之父母水火者陰陽之兆徵中有父母者謂心為陽臟而居膈之上腎為陰臟而居肓之上膈肓之上其間有陰陽水火之神藏焉張兆璜曰肓膏肓也膏之原出於鳩尾肓之原出於脖胦是膏在上而肓在下也七節之旁中有小心七節之旁膈俞之間也小微也細也中有小心者謂心氣之出於其間極微極細不可逆刺以傷其心也蓋背為陽心為陽中之太陽是以臟腑之氣皆從膈而出惟心氣之上出於俞也從之有福逆之有咎從之者順其臟氣之所出神轉而不回者也逆之者逆其臟氣回還而有回則不轉之咎矣若刺傷其臟氣則有死亡之大患焉蓋腑臟之氣皆從內膈而出如逆刺其心氣則傷心逆刺其肝氣則傷肝非針之中心而中肝也故診要經終篇曰凡刺胸腹者必避五臟避五臟者知逆從也所謂從者膈與脾腎之處不知者反之所謂膈處者謂內膈前連胸脅之處及背之膈俞處也所謂脾處者膈肉之下連於腹脅處也所謂腎處者十四椎之間腎注之俞處也是肝膽之氣出於左脅肺臟之氣出於右間脾氣出於腹心氣出於俞腎氣之注於十四椎也故所謂從者知臟氣之從此而轉不知而反逆之則有死傷之咎矣張兆璜曰臟腑之經俞皆屬於背臟腑之氣從膈氣而轉故曰中膈者皆為傷中刺中心一日死其動為噫日為陽心為陽中之太陽故環轉一周而死動者傷其臟真而變動也心在氣為噫噫則心氣絶矣刺中肝五日死其動為語肝在志為語語則肝氣絶矣夫聲合五音五日者五音之數終也刺中腎六日死其動為嚏陰終於六六日者腎臟之陰氣終也夫腎為本肺為末其動為嚏者腎氣從上泄也刺中肺三日死其動為咳臟真高於肺主行營衛陰陽刺中肺故死於天地之生數也肺在氣為咳咳則肺氣絶矣刺中脾十日死其動為吞十日者陰數之極也吞吞咽也蓋脾主涎脾氣絶而不能灌溉於四旁故變動為吞也夫心為陽中之太陽肺為陽中之少陰肝為陰中之少陽三者皆為陽臟故死於一三五之奇腎為陰中之太陰脾為陰中之至陰故死於六十日之偶夫天為陽地為陰天主生地主成故陽髒死於生數之始終陰臟絶於成數之始終也刺中膽一日半死其動為嘔膽汁泄者嘔苦嘔則膽氣絶矣夫十一臟腑皆取決於膽是膽為臟腑陰陽生氣之始故中膽者一日半死蓋一者奇之始二者偶之基一日半者死於一二日之間也按陰陽終始之道有變有常理路不一學者當隨文體會觸處貫通不宜膠執於胸中而反謂經語之不合也盧良侯曰陰陽別論論五臟不得胃脘之陽而臟真漸絶故死之緩此篇論刺中五臟之真氣而真臟受傷故死之速刺跗上中大脈血出不止死此中傷胃氣而死也跗上足跗之上足陽明之衝陽處也大脈大絡也胃為臟腑氣血之生原血出不止原將絶矣刺面中溜脈不幸為盲此中傷小腸之脈而為盲也溜脈者脈之支別浮見於皮膚之間者也經曰中於陽則溜於經諸陽之會皆在於面謂邪中於面頰皮膚之陽從支絡而溜入於經故曰溜脈也手太陽之脈其支者循頸上頰至目內眥其支者別頰上䪼抵鼻至目內眥故中手太陽之支別而為盲也曰不幸者言刺浮淺之溜脈而猶有不幸之盲也夫刺避五臟者必以布憿著之乃從單布上刺如刺深而誤逆其臟氣者死刺脈而中大絡血出不止者死今刺浮淺之脈而猶有不幸之誤以戒用針者之慎毋太過也即有宜於深者其要害之處所當避忌勿妄忽也刺頭中腦戶入腦立死此言頭頸骨空之間而更不宜深刺也腦戶督脈穴名督脈從腦戶而上至於百會囟會乃頭骨兩分內通於腦若刺深而誤中於腦者立死刺舌下中脈太過血出不止為喑此刺任脈太過而為喑也舌下廉泉穴也靈樞經云會厭者音聲之戶也舌者音聲之機也會厭之脈上絡任脈是以刺任脈而血出不止則為喑刺足下布絡中脈血不出為腫此論瀉衝脈血不出而為腫也衝脈者經血之海邪入於經則血有餘而當瀉血不出則氣亦不行故為腫矣王冰曰布絡謂當內踝前足下空處布散之絡正當然谷穴分也絡中脈則衝脈也衝脈者並少陰之經下入內踝之後入足下也然刺之而血不出則任脈與衝脈氣並歸於然谷之中故為腫刺郤中大脈令人僕脫色郤同隙僕音付此刺膀胱之脈太過而為僕也郤浮郤也足太陽之脈循於腰者下貫臀至承扶浮郤委陽入膕中之委中所謂浮郤者其脈浮於分肉之隙間所當淺刺者也若刺之太過而中大脈則傷太陽之氣矣太陽為諸陽主氣陽氣暴厥則為僕撲氣傷則脫色也經云精明五色者氣之華也刺氣街中脈血不出為腫鼠僕氣街者謂脛氣之街經云氣在脛者止之於氣街與承山踝上以下氣街即足陽明之氣衝穴在鼠飈上一寸承山足太陽穴在腨下分肉間鼠僕謂腫於鼠飈僕參之間也鼠飈在橫骨盡處僕參在承山以下踝骨之間蓋氣街與承山之踝上以下相交故直及於踝以下之僕參也此言刺在上而證見於下經云上下之相通也刺脊間中髓為傴髓脊骨之髓傴僂也經云刺骨無傷髓刺脊骨之間深而中髓則髓銷鑠而為傴僂不伸之病刺乳上中乳房為腫根蝕蝕食同乳上之穴名曰乳中其內為乳房其下為乳根穴皆屬足陽明胃經刺乳上誤中乳房則腫其下為乳根者有如蟲食之痛癢也刺缺盆中內陷氣泄令人喘咳逆缺盆在喉旁兩橫骨陷中若缺盆然故以為名缺盆之中央任脈也在脈側之動脈足陽明也名曰人迎人迎之旁手陽明也名曰扶突刺缺盆中者刺手陽明大腸脈也手陽明之脈下入缺盆絡肺下屬大腸內陷氣泄者脈內陷而氣反泄於內也針經曰人之所以生成者血脈也故為之治針必大其身而圓其末令可以按脈勿陷以致其氣蓋刺之要氣至而有效若脈內陷而氣反下泄則為咳喘之逆證矣經云氣上衝胸喘不能久立病在大腸蓋大腸為肺之府也刺手魚腹內陷為腫魚腹在手大指下如魚腹之圓壯手太陰之魚際穴也肺主氣而與大腸為表裡脈內陷則血不得散氣不得出故為腫以上論手足頭項胸背皆有要害之處無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人此論要害之外而又有禁刺之人也飲酒大醉衛氣先充絡脈先行皮膚刺之則令人氣亂矣怒則氣上刺之則逆其氣矣大勞則陽氣外張刺之則泄其氣矣飲食未進則絡脈調勻新飽者穀氣盛滿營衛未舒也谷入於胃脈道乃行飢則脈道虛澀矣水入於經而血乃成渴則血液燥竭矣驚則氣亂必定其氣而後可刺之夫針刺之道通其經脈調其氣血是以神氣不定血氣不調者皆當避忌者也刺陰股中大脈血出不止死陰股足少陰經脈所循之處大脈大絡也夫血氣始於先天足少陰腎生於後天足陽明胃刺中大脈血出不止則血氣皆脫矣是以刺跗上與陰股誤中大絡而血不止者俱死謂其生始之原絶也愚按先輩注疏皆謂陰股為脾脈按傷寒論平脈篇曰少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥蓋謂少陰之虛氣奔逆於上上之陽熱乘虛而下歸於陰與陰相搏以致少陰之生氣不出而為尸厥也再按足少陰之脈出於然谷上股內後廉在足三陰之後循足內之魚腹股上故曰陰股盧良侯曰上節首言刺跗上中大脈血出不止死中以無刺大醉節問之而此節復首提曰刺陰股中大脈血出不止死節文先後序次皆有意存俱當著眼刺客主人內陷中脈為內當漏為聾客主人足少陽膽經脈也內陷中脈謂客主人內之脈也蓋手足少陽之脈盤錯於耳前目側浮淺之內而又有陷中之深脈也足少陽之脈有從耳後入耳中者手少陽之脈亦有從耳後入耳中出走耳前過客主人病則耳聾渾渾焞焞此言刺客主人太過則誤中內陷交過之脈而為耳內漏而聾也盧良侯曰浮淺者為絡脈深者為經脈而經脈之內又有深隧之大經所取之脈而內有交過之陷脈是以刺跗上陰股太過則中大經刺客主人太過則中交過之脈當知經脈之內而又有經脈之交錯也刺膝臏出液為跛臏膝蓋骨也膝乃筋之會液者所以灌精濡空竅者也液脫則筋無以濡養屈伸不利而為跛矣刺臂太陰脈出血多立死臂太陰肺脈也肺者主行營衛陰陽出血過多則營衛不續所以一息不運則穹壤判矣刺足少陰脈重虛出血為舌難以言足少陰腎脈也腎虛而復出其血是為重虛少陰之脈循喉嚨系舌本故難以言刺膺中陷中肺為喘逆仰息胸前之兩旁謂之膺足陽明之俞在膺中肺經之脈亦循膺中之雲門中府而出若刺膺中之脈陷而入深誤中肺脈則令人喘逆仰息蓋因無故而傷之也盧良侯曰此與客主人內陷中脈同義蓋謂經脈所循有淺深而同道者也刺肘中內陷氣歸之為不屈伸肘中手太陰天澤穴也內陷者不能瀉出其邪而致氣歸於內也氣不得出則血不得散故不能屈伸也按靈樞經云肺心有邪其血留於兩肘肝有邪其氣留於兩腋脾有邪其氣留於兩髀腎有邪其氣留於兩膕凡此八虛者皆機關之室真氣之所過血脈之所遊邪氣惡血故不可留住留住則傷絡脈骨節機關不得屈伸而病攣也楊君立曰絡脈者所以濡筋骨利關節者也刺陰股下三寸內陷令人遺溺陰股下三寸足少陰之絡也夫刺之要氣至而有效內陷者氣不至而反陷於內也腎開竅於二陰故令人遺溺盧良侯曰孫絡之脈別經者其血盛而當瀉者亦三百六十五穴會刺掖下脅間內陷令人咳肺脈從肺系橫出腋下刺肺脈而氣反內陷則氣上逆而為咳刺少腹中膀胱溺出令人少腹滿膀胱居少腹之內刺少腹而誤中膀胱則胞氣外泄故溺出而少腹虛滿也刺腨腸內陷為腫腨腸一名魚腹俗名腿肚如魚之腹故以為名張介賓曰肉厚氣深不易行散氣反內陷故為腫也刺匡上陷骨中脈為漏為盲匡目匡也陷骨中脈匡骨上之陷脈也經曰裹擷筋骨氣血之精而與脈併為系刺脈而傷其目系則淚流不止而為漏視無所見而為盲刺關節中液出不得屈伸關節者骨節交會之機關處也液者淖澤注於骨骨屬屈伸故液脫者骨肉屈伸不利按以上要害之處有誤中而立死者有刺之而計日死者有為跛為傴為喑為盲之痼疾者針刺之道本為救人而反殺人行針之時當戰戰競競如臨淵履冰慎勿以人命為輕忽也刺志論篇第五十三黃帝問曰願聞虛實之要岐伯對曰氣實形實氣虛形虛此其常也反此者病形歸氣氣生形形氣之宜相應也反此者謂氣盛身寒氣虛身熱皆為寒暑之所病谷盛氣盛谷虛氣虛此其常也反此者病人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣清者為營濁者為衛是以谷之多少與氣之盛虛宜相應也反此者謂谷入多而氣少谷不入而氣多亦為邪病之所致脈實血實脈虛血虛此其常也反此者病脈者血之府故虛實之宜相應也反此者或因飲中熱或風氣留於脈中亦因病之所致也夫志意者所以御精神收魂魄適寒溫和喜怒者也是以營衛調志意和則筋骨強健腠理致密精神專直身不受邪如形氣穀氣之相反血脈虛實之變常皆緣志意不和以致邪氣從之故名之曰刺志論帝曰如何而反岐伯曰氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也脈少血多此謂反也盛者實也少者虛也脈盛者脈大也脈少者脈小也按此節當有氣盛身寒此為反也八字或古文之簡脫與抑經語之錯綜耶氣盛身寒得之傷寒氣虛身熱得之傷暑此申明形氣虛實之相反者為邪氣之所傷也氣盛身寒者邪氣實也氣虛身熱者形氣虛也寒傷形故氣盛身寒暑傷氣故氣虛身熱谷入多而氣少者得之有所脫血淫居下也谷入少而氣多者邪在胃及與肺也夫腎為生氣之原胃為血氣之海谷入多而氣反少者得之有所脫血濕居下也蓋脫血者陰氣下泄濕居下則下焦受傷以致生原虧損而氣少病不在上故谷入多也夫上焦主納中焦主化邪在肺胃則不能納化水穀而谷入少矣谷入少而反氣多者生氣之原不傷也此言氣之發於下焦也盧良侯曰凡下病者下行極而上此言下焦受病不及中上故曰居脈小血多者飲中熱也脈大血少者脈有風氣水漿不入此之謂也經云水入於經而血乃成又曰中焦之汁奉心化赤而為血熱者心火之氣也飲中熱則飲皆化赤而為血故血多脈中之氣不盛故脈小也風氣乘於脈中故脈大水漿不入則血無所資生故血少也此言血之生於中焦也盧良侯曰經云淺深在志遠近若一又曰始淺刺以去陽分之邪再深刺之以去陰分之邪按此篇帝問虛實之要而伯所答者皆為邪病所傷蓋邪實則正虛矣然取邪氣之淺深在用志之專一故曰刺志論張兆璜曰邪氣去則正氣自復瀉實之中而有補虛在焉夫實者氣入也虛者氣出也夫虛者須其實氣入則實矣實者須其虛氣出則虛矣此言氣之開闔也氣實者熱也氣虛者寒也虛者補之針下熱則實矣實者瀉之針下寒則虛矣此言陰陽之氣至也入實者右手開針空也入虛者左手閉針空也針空者容針之空處也凡用針之法右手持針左手掐穴方其入針瀉實之時以右手開針空以瀉之方其入針補虛之時以左手閉針空以補之開針空則氣出閉針空則氣入所謂補瀉之時與氣開闔之相合也張兆璜曰開闔者三陽之氣發於下焦營衛者中焦水穀之所生也用針取氣在於營衛而此篇獨論氣出下焦血出中焦候下焦所生之氣出入開闔以行補瀉之法又一法也然三陽之氣發原於腎臟水腑腎主藏志故曰刺志論針解篇第五十四黃帝問曰願聞九針之解虛實之道按針經首篇論九針虛實之道而小針解有未盡之義故帝復有此問焉岐伯對曰刺虛則實之者針下熱也氣實乃熱也滿而泄之者針下寒也氣虛乃寒也菀陳則除之者出惡血也菀音郁所謂虛則實之者氣口虛而當補之也候其陽氣隆至針下既熱乃去針也蓋氣實乃熱也滿而泄之者氣口盛而當瀉之也候其陰氣隆至針下已寒乃去針也蓋氣虛乃寒也菀積也陳久也菀陳則除之者去血脈也蓋以惡血積久於脈絡之中所當除去之也邪勝則虛之者出針勿按言諸經有盛者皆當瀉其邪出針之時勿按其痏令邪氣之隨針而外泄也徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之徐而疾則虛者謂針已得氣乃徐出之針既出穴則速按之使正氣不泄而實此補虛之法也疾而徐則虛者言邪氣已至乃疾出之針既出穴則徐按之使邪實可泄而虛此瀉實之法也按此論與小針解不同小針解曰徐而疾則實者言徐內而疾出也疾而徐則虛者言疾內而徐出也蓋以針之出入分疾徐也本篇之所謂疾徐者論出針之疾徐按痏之疾徐也故名之曰針解者解小針解之未盡也夫刺之微在遲速疾徐而兩經各盡其妙所謂迎之隨之以意和之針道始備言實與虛者寒溫氣多少也言實與虛者謂針下寒而氣少者為虛邪氣已去也針下熱而氣多者為實正氣已復也若無若有者疾不可知也氣之虛實若有若無當靜守其氣疾則不可知也察後與先者知病先後也夫病有標本先病為本後病為標治有取標而得者有取本而得者故當知病之先後察其應後者後取之應先者先取之為虛與實者工勿失其法若得若失者離其法也虛則實之實則虛之補瀉之法當守而勿失若有得若有失者是失其法也虛實之要九針最妙者為其各有所宜也九針之用熱在頭身宜鑱針取分肉間氣宜圓針取氣出邪宜匙針刺癰熱出血宜鋒針刺大癰出膿熱宜鈹針調陰陽去癱痹宜圓利針去寒熱痛痹宜毫針取深邪遠痹宜長針人氣留於關節宜大針為其各有所宜也補瀉之時者與氣開闔相合也氣來謂之開可以迎而瀉之氣去謂之闔可以隨而補之補瀉之時與氣開闔相合故曰刺實者刺其來也刺虛者刺其去也凡針之名各不同形者針窮其所當補瀉也九針之名有鑱圓匙鋒之殊分九針之形有大小長短之不等各盡其所當補瀉之用而制之也刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也留針所以候氣也陰氣隆至針下寒也陽氣已退實者虛矣陽氣隆至針下熱也元氣已復虛者實矣俱當候其氣至而後乃可去針經氣已至慎守勿失者勿變更也針已得氣慎守而勿失勿使其氣有變更也深淺在志者知病之內外也志者心之所之也病在外者宜刺淺病在內者宜刺深當屬意病者知所取之處也近遠如一者深淺其候等也刺之或淺或深雖有遠近不同然俱以得氣為期故其候相等無二也如臨深淵者不敢惰也行針之際當謹慎之至手如握虎者欲其壯也持針如握虎欲其堅定而不怯也神無營於衆物者靜志觀病人無左右視也行針之道貴在守神靜志以觀病人以候其氣無左右視以惑亂其神志焉按小針解云上守神者守人之血氣有餘不足可補瀉也此篇先論守己之神以合彼之神所謂神乎神耳不聞昭然獨明若風吹雲義無邪下者欲端以正也下針之法義不容邪故當端以正必正其神者欲瞻病人目制其神令氣易行也正其神者定病人之神也瞻病人之目無使其邪視制彼之神氣專一令病者之氣易行也按以上諸節之上句與九針篇相同下句則與小針解各別蓋復解九針虛實之道以補未盡之義所謂三里者下膝三寸也所謂跗之者舉膝分易見也巨虛者蹺足䯒獨陷者下廉者陷下者也三里在膝下三寸跗之者足跗上之衝陽脈也下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉自三里循上廉下廉而至跗上衝陽之動脈皆屬足陽明胃經獨舉此胃經而言者言針之候氣候陽明所出之營衛也故針經曰用針之類在於調氣氣積於胃以通營衛又曰胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也迎而奪之而已矣如迎奪太過則反傷其性命是取氣在陽明而絶命亦在陽明矣故特舉此以令民之勿犯也盧良侯曰針經云迎之五里中道而止本經云三里在膝下三寸蓋三里五里皆陽明穴然當先定足經而上合於手也帝曰余聞九針上應天地四時陰陽願聞其方令可傳於後世以為常也岐伯曰夫一天二地三人四時五音六律七星八風九野身形亦應之針各有所宜故曰九針夫九針之應已詳悉於針經故帝曰余聞九針上應天地四時陰陽然應於人之身形及用針之法有未盡焉故曰願聞其方令可傳於後世以為常也是以伯所答者與針經之多有不同後之學者當合而參之針道始備斯可以為常法人皮應天一者天也天者陽也五臟之應天者肺肺者五臟六腑之蓋也皮者肺之合也人之陽也故人皮以應天人肉應地二者地也人之所以應土者肉也故人肉應地人脈應人三者人也人之所以成生者血脈也故人脈應人按此三者與針經之理論相同蓋天地人三者不易之道也人筋應時四時之氣皆歸始春筋乃春陽甲木之所生故人筋應時人聲應音人之發聲以備五音人陰陽合氣應律合氣者六臟六腑陰陽相合而為六也以六氣之相合而應六律盧良侯曰律呂應十二月六氣應十二經可分而可合者也合則為六故曰合氣應律人齒面目應星七者星也人面有七竅以應七星靈樞經曰天有列星人有牙齒人出入氣應風人氣之行於周身猶風之遍於六合人九竅三百六十五絡應野陰陽應象大論曰地有九野人有九竅九野者九州之分野也人之三百六十五絡猶地之百川流注通會於九州之間故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂各有所主也一至五針刺形層淺深之次序人之聲音由腎之所發故五針骨也陰陽二氣分而為三陰三陽故六針調陰陽氣陰精七損故當益之八風為邪故當除之節之交三百六十五會絡脈之滲灌諸節者也故九竅節氣閉者通之實者除而去之此之謂九針之各有所主也夫聖人起天地之數也一而九之故以立九野九而九之九九八十一以起黃鐘數焉蓋以針應數也是九針之道一中有九九九八十一以應律數若謂一針在皮六針調氣又不可與言針矣人心意應八風八風不常而心意之變動如之人氣應天天運不息而人氣之出入如之人發齒耳目五聲應五音六律發齒耳目共六齒又為六六之數而發之數不可數矣律呂之數推而廣之可千可萬而萬之外不可數矣此又反復言之者謂天地人之相應通變之無窮也人陰陽脈血氣應地地有十二經水人有十二經脈水循地行脈隨氣轉人肝目應之九肝開竅於目九竅之一也一之九者九而九之九九八十一也九竅三百六十五六節臟象論曰天以六六之節以成一歲人以九九制會計人亦有三百六士五節以為天地久矣是人之經脈有三百六十五穴孫絡有三百六十五穴溪谷之分亦有三百六十五穴節之交亦有三百六十五會皆外通於九竅內本於九臟者也人一以觀動靜天二以候五色七星應之以候發母澤五音一以候宮商角徵羽六律有餘不足應之二地一以候高下有餘九野一節俞應之以候閉節三人變一分人候齒泄多血少十分角之變五分以候緩急六分不足三分寒關節第九分四時人寒溫燥濕四時一應之以候相反一四方各作解王冰曰此一百二十四字蠹簡爛文義理殘缺莫可尋究而上古書姑且載之以佇後之具本也按王冰乃隋唐時人為唐太僕令注素問八十一篇年八十餘太宗幸其宅自唐至今千有餘歲一百二十四字中又亡一字矣盧良侯曰一百二十四字連九竅三百六十五七字在內然其間尚有成句可意會者惜乎蠹損之文不模傳也按此亦見太素卷十九楊注已謂章句難分長刺節論篇第五十五刺家不診聽病者言按針經刺節真邪篇曰刺有五節一曰振埃二曰發朦三曰去爪四曰徹衣五曰解惑此刺之大約針之極也神明之類也故曰刺家不診謂用針之妙神而明之不待診而後知之也按此篇無問答之辭而曰論者乃伯承上章復補論刺節篇之未盡而後人記之也故曰長刺節論玉師曰諸陽之氣在頭三陰之俞在背病者言頭痛則知病在陽而取之頭病者言發寒熱則知病在陰而取之背至如腹有積而取之腹筋攣痛而取之筋肌肉痛而刺其肌骨重酸而刺及骨皆隨病取刺之法不待診視而後知病之所在故曰刺家不診聽病者言此望切之外聞問之法也在頭頭疾痛為藏針之刺至骨病已上無傷骨肉及皮皮者道也此陽氣大逆故疾痛在頭也藏隱也謂隱針而藏刺之也蓋頭之皮肉最薄易至於骨故刺至骨而無傷骨淺之而又無傷皮蓋皮者針之道路也針必由皮而進淺則傷之深則傷骨在淺深之間則傷肉此言淺深在意而頭刺之更難也能難其所難則易其所易矣按靈樞刺節真邪篇首章言陽氣大逆上滿於胸中蓋陽氣從胸膈而上升或逆滿於胸中或上逆於巔頂故曰補靈樞之未盡而以下諸病大義相同陰刺入一旁四處治寒熱深專者刺大臟迫臟刺背背俞也刺之迫臟臟會腹中寒熱去而止與刺之要髮針而淺出血此論刺寒熱之法也治寒熱者陰刺之陰刺之法正入一旁入四若深而專者此病在臟當取大臟以治之刺大臟者當迫於臟而刺背蓋臟俞之在背也刺其俞而迫於臟則臟氣與針會而腹中之寒熱去矣與刺之要同法髮針而淺出其血焉按靈樞官針篇曰凡刺有十二節以應十二經五曰揚刺揚刺者正內一旁內四而浮之以治寒氣之博大者也十曰陰刺陰刺者左右率刺之以治寒厥中寒厥足踝後少陰也今此篇以陰刺而取少陰之俞用揚刺之法以治寒熱之病所謂寒與熱爭能合而調之又一法也揚君立曰此亦補十二節之未盡治腐腫者刺腐上視癰小大深淺刺刺大者多血小者深之必端內針為故止腐腫者謂腫中肉腐故為膿血者刺其腐上當視其癰腫之大小而淺深之腐腫之大者多膿血淺刺之而膿血易出也小者毒內陷而尚未外潰故當深之必端內針以取膿血蓋恐有壞良肉為此故當端內其針刺至血處而止又按刺節真邪篇曰刺大者用鋒針刺小者用圓利針與此論亦少有別病在少腹有積刺皮𩩻以下至少腹而止刺俠脊兩旁四椎間刺兩髂髎季脅肋間導腹中氣熱下已骼音格髎音醪此論刺少腹積之法也𩩻作盾肌厚也謂下至少腹間視皮之肌厚處即下針取之蓋腹內有積則外見於皮間故循於少腹之上下至少腹而止是其處也挾脊兩旁四椎間乃膏肓穴處肓之原在臍下也髂為腰骨兩髂髎季脅肋間乃足少陽經脈之所循蓋少腹之積邪在肝腎故取少陽之經導積熱從針下而出也病在少腹腹痛不得大小便病名曰疝得之寒刺少腹兩股間刺腰踝骨間刺而多之盡炅病已炅炯同此厥陰寒疝之為病也肝主疏泄肝氣逆故不得大小便也此為寒疝故少腹痛而上連於腹也少腹兩股及腰踝骨間為厥陰肝脈之所循刺而多留之俟其盡熱而病自已病在筋筋攣節痛不可以行名曰筋痹刺筋上為故刺分肉間不可中骨也病起筋炅病已止此論刺筋痹之法也諸筋皆屬於節故筋攣節痛病在筋者屈而不伸故不可行也名曰筋痹痹者閉也痛也故者因也為因於筋故當刺在筋筋在分肉間而生於骨故當從分肉內針而不可中骨也筋舒而病起筋熱而病已即當止其針病在肌膚肌膚盡痛名曰肌痹傷於寒濕刺大分小分多髮針而深之以熱為故無傷筋骨傷筋骨癰發若變諸分盡熱病已止此論刺肌痹之法也邪痹於肌是以肌肉盡痛此因傷於寒濕蓋寒勝為痛痹濕勝為著痹也宜刺大小分肉之間分肉之間有三百六十五穴會故當多髮針而深取之蓋溪骨屬骨故當深之而又無傷於筋骨也傷筋骨者則癰發而若有所變矣候其氣至而諸分肉盡熱則病已而可以止針矣按脈要精微篇帝曰諸癰腫筋攣骨痛此皆安生岐伯曰此寒氣之腫八風之變也如刺傷筋骨而筋骨腫痛有若風寒之變故曰癰發若變病在骨骨重不可舉骨髓痠痛寒氣至名曰骨痹深者刺無傷脈肉為故其道大分小分骨熱病已止此論刺骨痹之法也骨重難舉骨髓痠痛而寒氣至者腎主骨而寒水主氣也病在骨故當深刺之以候骨氣為因其針道在於大小分肉之間故當從其道而無傷脈肉也候骨氣至而針下熱病即已而可止其針病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分盡熱病已止夫邪並於陽則狂邪之中人始於皮膚肌肉留而不去則入於經脈在肌腠之陽邪而入於陽脈所謂重陽則狂矣血氣相乘是以在陽脈分肉之間俱且寒且熱也當先刺其脈使在脈陽實之邪已虛而復出於肌肉視其分肉盡熱是邪從肌肉而外散矣病初發歲一發不治月一發不治月四五發名曰癲病刺諸分諸脈其無寒者以針調之病已止此論刺癲疾之法也朱永年曰癲疾久逆之所生也故有病初發而歲一發者不亟治之則月一發矣又不治之則一月四五發矣當取諸分肉諸脈之有過者而刺之夫重陰則癲故當候其寒氣外至其無寒者以針調之盧良侯曰寒者須其熱熱者須其寒候邪正陰陽之變易也病在陽者候其熱病在熱者候其寒取邪氣之外出也此用針機變之妙不可不知病風且寒且熱炅汗出一日數過先刺諸分理絡脈汗出且寒且熱三日一刺百日而已風之傷人也或為寒熱腠理開則灑然寒閉則熱而悶故且寒且熱也如熱時汗出一日數遍者先刺諸分理絡脈如汗出而且寒且熱是寒熱之邪將與汗共並而出故當三日一刺至百日而病已矣蓋病而汗出者因邪氣相搏而汗出也刺而汗出者取汗而邪出也病大風骨節重墮眉隋名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針大風厲風也從肌肉而直傷於骨髓故骨節重在肌肉而傷衝任之血氣故鬚眉墮也因邪從肌肉而入故當先刺肌肉取汗出而至百日復刺骨髓取汗出而亦至百日凡二百日俟鬚眉生而止針夫風之在分理絡脈而為寒熱病者百日而已大風而深入骨髓者倍已蓋百日者氣數之大周也盧良侯曰刺骨無傷髓今厲毒入深而刺髓百日不致銷鑠所謂有故無殞在知病外內之不惑也此與風論之厲瘍因證少有差別
