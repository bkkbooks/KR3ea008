body:
  text: 卷八天元紀大論篇第六十六此篇總論五運主歲六氣司天皆本乎天之運化故曰天元紀大論黃帝問曰天有五行御五位以生寒暑燥濕風天有五行者丹黅蒼素元之五氣也五位五方之位地之五行也寒暑燥濕風火天之六氣也蓋言天之五氣經於十干之分十干之氣以化地之五行地之五行以生天之六氣人有五臟化五氣以生喜怒憂思恐五臟五行之所生也五氣五行之氣風熱濕燥寒也喜怒憂思恐五臟之神志也夫在天為氣在地成形形氣相感而萬物化生人本乎地之五行而成此形以有形之五臟化五氣生五志而復通乎天氣論言五運相襲而皆治之終期之日周而復始余已知之矣願聞其與三陰三陽之候奈何合之論謂六節臟象諸論也五運者甲己歲為土運乙庚歲為金運丙辛歲為水運丁壬歲為木運戊癸歲為火運三陰三陽者子午之歲少陰主之丑未之歲太陰主之寅申之歲少陽主之卯酉之歲陽明主之辰戌之歲太陽主之巳亥之歲厥陰治之帝言五運之氣遞相沿襲而一歲皆為之主治終期年之三百六十五日周而復始其與三陰三陽之主歲相合何以候之徐振公曰五運獨主一歲三陰三陽之主歲有司天在泉間氣客氣故曰五運相襲而皆治之鬼臾區稽首再拜對曰昭乎哉問也夫五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也可不通乎天之十干運化地之五行地之五行上呈三陰三陽之六氣故曰五運陰陽者天地之道也王冰曰道謂生化之道綱紀謂生長化收藏之綱紀也父母謂萬物形之先也本始謂生殺皆因而有之也夫有形稟氣而不為五運陰陽之所攝者未之有也所以造化不極為萬物生化之元始者何哉以其是神明之府故也然合散不測生化無窮非神明運為無能爾也故物生謂之化物極謂之變陰陽不測謂之神神用無方謂之聖六微旨大論曰物之生從於化物之極由乎變變化之相薄成敗之所由也五常政大論曰氣始而生化氣散而有形氣布而蕃育氣終而象變陰陽者天地之道也陰中有陽陽中有陰莫可窮測用施於四時變化乎萬物無可矩量者也孔子曰知變化之道者其知神之所為乎金西銘曰神以運用言聖以功業言夫變化之為用也用功用也言陰陽不測之變化在天地之間生成萬物功用最大金西銘曰用者神用之無方即所謂聖也在天為玄元幽遠也天道幽遠變化無窮在人為道道里路也凡日用事物之間莫不有天地自然之理在地為化化生化也化育萬物皆由地之生成化生五味五味五行之所生也萬物之有情有性者莫不具五運之氣味五運行論大曰化生氣道生智能循乎天理之自然則是非邪正自然分別而用無不周也張兆璜曰心之靈明曰智乃人之神明也玄生神王冰曰元遠幽深故生神也神之為用觸遇元通因物化成無不應也倪仲宣曰先從天而人人而地復從地而人人而天神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水故在天為氣在地成形形氣相感而化生萬物矣風寒熱燥濕天之陰陽也木火土金水地之陰陽也故在天為氣在地成形形氣相感而萬物化生然天地者萬物之上下也天覆地載萬物化生於其間左右者陰陽之道路也陰陽之氣左右旋轉之不息徐振公曰左右者間氣也水火者陰陽之徵兆也徵驗也兆見也天一生水地二生火火為陽水為陰言陰陽不可見而水火為陰陽之徵驗徐振公曰水火即陰陽也先天止有水火至後天而始備五行金木者生成之終始也木主春令其氣生長而生萬物金主秋令其氣收斂而成萬物故為生成之始終金西銘曰上下左右天地之六合也水火木金陰陽之四時也氣有多少形有盛衰上下相召而損益彰矣在天為氣而氣有多少在地成形而形有盛衰上下相感而太過不及之氣昭然彰著矣帝曰願聞五運之主時也何如時四時也謂木運主春火運主夏土運主長夏金運主秋水運主冬鬼臾區曰五氣運行各終期日非獨主時也言五運之氣各終期年之三百六十五日終而復始非獨主於時也徐振公曰五運主時乃四時寒熱溫涼之氣主歲者五行太過不及之年帝曰請聞其所謂也鬼臾區曰臣積考太始天元冊文曰太虛寥廓肇基化元天元冊乃太古之文所以紀天真元氣運行之書也太虛謂空元之境大氣之所充神明之官府也寥廓空大無際之謂肇始基立也化原造化之本原也萬物資始五運終天五運木火土金水運也終天者日日行一度五運各主一歲終周天之三百六十五度四分度之一也萬物藉化元而始生五行終天運而無已易曰大哉乾元萬物資始布氣真靈總統坤元真靈者人與萬物也總統坤元者地居天之中天包乎地之外也易曰至哉坤元萬物資生九星懸朗七曜周旋九星者天蓬天芮天衝天輔天禽天心天任天柱天英九星懸朗於天下應九州之分也七曜者日月五星虞書謂之七政周謂周天之度旋謂左循天度而行曰陰曰陽曰柔曰剛易曰立天之道曰陰與陽立地之道曰柔與剛幽顯既位寒暑弛張陽主晝陰主夜幽顯既位者陰陽定位也寒暑弛張者寒暑往來也易曰日月運行一寒一暑生生化化品物咸章易曰雲行雨施品物流形又曰天地絪縕萬物化醇此所以生生不息化化無窮而品物咸章矣臣斯十世此之謂也十世言自祖傳習至今於茲十世矣所謂積考太始天元冊文者此之謂也帝曰善何謂氣有多少形有盛衰鬼臾區曰陰陽之氣各有多少故曰三陰三陽也形有盛衰謂五行之治各有太過不及也太陽少陽少陰運行先天而主有餘陽明太陰厥陰運行後天而主不足此三陰三陽之氣有多少也形謂五行之有形也五形之治各有太過不及者謂五運之主歲如諸壬年之木運太過則諸丁年之木運不及矣諸戊年之火運太過諸癸年之火運不及矣諸甲年之土運太過諸己年之土運不及矣諸庚年之金運太過諸乙年之金運不及矣諸丙年之水運太過諸辛年之水運不及矣故其始也有餘而往不及隨之不足而往有餘從之知迎知隨氣可與期始者謂天干始於甲地支始於子如甲年之土運太過則乙年之金運不足隨之子年之少陰有餘則丑年之太陰不足隨之所謂有餘而往不足隨之也如乙年之金運不及則丙年之水運有餘從之丑年之太陰不足則寅年之少陽有餘從之所謂不足而往有餘從之也迎往也隨來也知歲運之往來則太過不及之氣可與之相期而定矣應天為天府承歲為歲直三合為治此承上下而言六十歲之中又有天符歲會三合主歲此為平氣之年無太過不及者也所謂天符者土運之歲上見太陰火運之歲上見少陽少陰金運之歲上見陽明木運之歲上見厥陰水運之歲上見太陽乃五運之氣與司天之氣相合故為天符直會也謂木運臨卯火運臨午土運臨四季金運臨酉水運臨子乃地支之主歲與五運之主歲五行之氣正值會合故曰歲合三合者謂司天之氣五運之氣主歲之氣三者相合又名太乙天符此皆平氣之年無太過不及者也俱詳注六微旨大論帝曰上下相召奈何鬼臾區曰寒暑燥濕風火天之陰陽也三陰三陽上奉之木火土金水火地之陰陽也生長化收藏下應之寒暑燥濕風火天之六氣也太陽之上寒氣主之少陰之上熱氣主之陽明之上燥氣主之太陰之上濕氣主之厥陰之上風氣主之少陽之上火氣主之是三陰三陽上奉天之六氣也木火土金水火地之五行也在春主木而主生在夏主火而主長長夏主土而主化在秋主金而主收在冬主水而主藏是以生長化收藏下應之蓋天之五氣運化地之五行地之五行上呈天之六氣是以上下相感召而三陰三陽之氣天地之所共有故下文曰天有陰陽地亦有陰陽倪仲宣曰木火火地之三陽也金水土地之三陰也二之氣君火三之氣相火地亦有三陰三陽之六氣故曰木火土金水火地之陰陽也天以陽生陰長地以陽殺陰藏歲半以上天氣主之是春夏者天之陰陽也故天以陽生陰長歲半以下地氣主之是秋冬者地之陰陽也故地以陽殺陰藏張玉師曰司天之氣主上半歲在泉之氣主下半歲故曰歲半以上天氣主之歲半以下地氣主之然司天之氣始於地之左在泉之氣本乎天之右天地之氣互相感召而共主一歲又非獨天主上半歲而地主下半歲也天有陰陽地亦有陰陽木火土金水火地之陰陽也生長化收藏故陽中有陰陰中有陽此申明地亦有三陰三陽之氣也風寒暑濕燥火三陰三陽上奉之是天有陰陽也木火土金水火生長化收藏下應之是地有陰陽也夫天為陽而天有三陰三陽之氣是陽中有陰也地為陰地有三陰三陽之氣是陰中有陽也玉師曰此二句啓下文之天五地六天六地五所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會應天之氣者丹黅蒼素元之氣也動而不息五歲而右遷者自甲而乙乙而丙丙而丁丁而戊五運之氣已終而復起五運也應地之氣者木火土金水火之氣也靜而守位六期而環會者自子而醜醜而寅六歲巳周至午歲而復起少陰也動靜相召上下相臨陰陽相錯而變由生也動靜相召者天地之氣相感也上下相臨者天之五氣下御地之五行地之木火土金水火上臨天之六氣是以天五地六天六地五陰陽交錯而變生三十年之一紀六十歲之一周也按天之五氣經於十干之分運化地之五行是天五地五也地之木火土金水火分主十二支之位子午少陰君火司天丑未太陰濕土司天寅申少陽相火司天卯酉陽明燥金司天辰戌太陽寒水司天巳亥厥陰風木司天是地六天六也是以上文云應天之氣五歲而右遷應地之氣六期而環會下文云周天氣者六期為一備終地紀者五歲為一周帝曰上下周紀其有數乎鬼臾區曰天以六為節地以五為制周天氣者六期為一備終地紀者五歲為一周君火以明相火以位上下周紀者天干地支五六相合凡三十歲為一紀六十歲為一周也天以六為節者以三陰三陽為節度也地以五為制者以五行之位為制度也周天氣者子屬少陰君火司天醜屬太陰濕土司天寅屬少陽相火司天卯屬陽明燥金司天辰屬太陽寒水司天巳屬厥陰風木司天六期為三陰三陽之一備終地紀者甲主土運乙主金運丙主水運丁主木運戊主火運五歲為五運之一周是以君火以明而在天相火以位而在下蓋言地以一火而成五行天以二火而成六氣也玉師曰地之十二支上應司天之氣天之十干下合地之五行五六相合而七百二十氣為一紀凡三十歲千四百四十氣凡六十歲而為一周不及太過斯皆見矣十五日為一氣五運六氣相合而主歲一歲凡二十四氣計七百二十氣為一紀紀小會也蓋以五六為三十六五亦為三十故以三十歲為一會自甲子而終於癸亥凡六十歲為一周其太過不及之氣於此皆可見矣帝曰夫子之言上終天氣下畢地紀可謂悉矣余願聞而藏之上以治民下以治身使百姓昭著上下和親德澤下流子孫無憂傳之後世無有終時可得聞乎此以下復申明五運六氣之主歲周而復始循環無端使天下萬世子孫黎民知天地陰陽之數不罹災眚之患此皆聖人憂民之心德澤下流之不窮也鬼臾區曰至數之機迫迮以微其來可見其往可追敬之者昌慢之者亡無道行私必得夭殃謹奉天道請言真要至數者太過不及之定數也機者先期而動也迫近迮起也言氣機之動甚微能追思已往之氣則其來者可知如敬畏者則災眚可避忽慢者必罹夭殃無道謂不修養生之道行私謂放縱嗜欲也真要至真之要道也帝曰善言始者必會於終善言近者必知其遠是則至數極而道不惑所謂明矣願夫子推而次之令有條理簡而不匱久而不絶易用難忘為之綱紀至數之要願盡聞之此言陰陽之道自始至終由近至遠簡而明易而難有條有理有紀有綱鬼臾區曰昭乎哉問明乎哉道如鼓之應桴響之應聲也言陰陽之道昭也明也能明乎斯道如桴鼓聲響未有不相應者矣臣聞之甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之運化運也甲己合化土乙庚合化金丙辛合化水丁壬合化木戊癸合化火統者五運相襲而皆治之也帝曰其於三陰三陽合之奈何鬼臾區曰子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也合者以五運而合六氣以天干而合地支也標高也子午為少陰君火君為尊故以少陰為始而標見於上厥陰為陰之盡故以厥陰為終陰極而一陽之子又復矣厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元風寒暑濕燥火在天之六氣也三陰三陽合於地之十二支而上奉天之六氣是以天氣為本而三陰三陽為標故下文曰本之下中之見也見之下氣之標也六元者謂天有此三陰三陽之六氣地亦有此三陰三陽之六氣天地渾元上下相召是以六氣司天而六氣在泉也帝曰光乎哉道明乎哉論請著之玉版藏之金匱署曰天元紀著之玉版藏之金匱垂永久示貴重也五運行大論篇第六十七此篇分論天之五氣地之五行布五方之政令化生五臟五體皆五者之運行故曰五運行論黃帝坐明堂始正天綱臨觀八極考建五常天綱天之度數也八極地之八方也五常五行政令之常也請天師而問之曰論言天地之動靜神明為之紀陰陽之升降寒暑彰其兆神明者日月鬥星也紀者以日月紀度星斗定位也寒暑者陰陽之徵兆也余聞五運之數於夫子夫子之所言正五氣之各主歲爾首甲定運余因論之鬼臾區曰土主甲己金主乙庚水主丙辛木主丁壬火主戊癸子午之上少陰主之丑未之上太陰主之寅申之上少陽主之卯酉之上陽明主之辰戌之上太陽主之巳亥之上厥陰主之不合陰陽其故何也余聞五運之數於夫子者言五運之氣以論於六節臟象論中矣余因論之鬼臾區復以五運六氣相合主歲而論者即上篇天元紀大論也不合陰陽者五運六氣之陰陽不相合也岐伯曰是明道也此天地之陰陽也夫數之可數者人中之陰陽也然所合數之可得者也夫陰陽者數之可十推之可百數之可千推之可萬天地陰陽者不可以數推以象之謂也三數字葉素三數字上聲伯言鬼臾區所論五運六氣相合而主治者是明天地陰陽之道也夫數之可數者人中之陰陽也所謂人中之陰陽者其生五其氣三三而成天三而成地三而成人三而三之合則為九九分為九野九野為九臟以應天六六之節此人中之陰陽與天地相合其所合之數可得而數者也若夫天地之陰陽者數之可十可百推之可萬可千難以數推止可以象推之象者即下文之丹黅蒼素元之天象南面北面之圖象是也帝曰願聞其所始也岐伯曰昭乎哉問也臣覽太始天元冊文丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氏昴畢玄天之氣經於張翼婁胃所謂戊己分者奎壁角軫則天地之門戶也夫候之所始道之所生不可不通也黅居吟切此言五行之化運始於五方之天象也丹赤色火之氣也牛女在癸度經於牛女戊分戊癸合而化火也黅黃色土之氣也心尾在甲度經於心尾己分甲己合而化土也蒼青色木之氣也危室在壬度柳鬼在丁度丁壬合而化木也素白色金之氣也亢氏在乙度昴畢在庚度乙庚合而化金也元黑色水之氣也張翼在丙度婁胃在辛度丙辛合而化水也戊己居中宮為天地之門戶遁甲經曰六戊為天門六己為地戶在奎壁角軫之分奎壁在乾方角軫在巽方此五氣化五行之始乃天地陰陽道之所生不可不通也張玉師曰在天絪縕之氣色故見丹黅素蒼元在地成五行之形則為青黃赤白黑矣帝曰善論言天地者萬物之上下左右者陰陽之道路未知其所謂也此復論六氣之上下左右也司天在上在泉在下萬物化生於其間故天地為萬物之上下左右者間氣也間氣者紀步故為陰陽之道路徐振公曰五六相合而後成歲故論五運篇中而兼論六氣岐伯曰所謂上下者歲上下見陰陽之所在也此言司天在泉之上下也如子午歲少陰在上則陽明在下矣丑未歲太陰在上則太陽在下矣寅申歲少陽在上則厥陰在下矣卯酉歲陽明在上則少陰在下矣辰戌歲太陽在上則太陰在下矣巳亥歲厥陰在上則少陽在下矣此三陰三陽上下之所在也左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而定其位言其見也此言在上之左右也在東為左在西為右諸凡也謂凡見厥陰在上則少陰在左太陽在右見少陰在上則太陰在左厥陰在右見太陰在上則少陽在左少陰在右見少陽在上則陽明在左太陰在右見陽明在上則太陽在左少陽在右見太陽在上則厥陰在左陽明在右蓋以圖像向南人面北以觀之言其所見之圖象而命其上下左右之定位也玉師曰上章以厥陰為終此論厥陰為始蓋陰陽之道自始至終終而復始帝曰何謂下岐伯曰厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也此言在下之左右也如巳亥歲厥陰在上則少陽在下矣而陽明在少陽之左太陰在少陽之右如子午歲少陰在上則陽明在下矣而太陽在陽明之左少陽在陽明之右如丑未歲太陰在上則太陽在下矣而厥陰在太陽之左陽明在太陽之右如寅申歲少陽在上則厥陰在下矣而少陰在厥陰之左太陽在厥陰之右如卯酉歲陽明在上則少陰在下矣而太陰在少陰之左厥陰在少陰之右如辰戌歲太陽在上則太陰在下矣而少陽在太陰之左少陰在太陰之右蓋以圖象向北人面南以觀之以所見之上下左右而命其位故曰言其見也詳後圖象金西銘曰上下之左右皆以東為左西為右故面南面北以觀之若止南面而觀如在下之氣左行則在上之氣右轉矣故下文曰上者右行下者左行上下相遘寒暑相臨氣相得則和不相得則病相臨者謂加臨之六氣也此總結上文而言司天在泉之氣則上下相遇左右間氣之氣則四時加臨如太陽寒水之氣加臨於上半歲則少陰少陽暑熱之氣加臨於下半歲矣如暑熱之氣加臨於上半歲則寒水之氣加臨於下半歲矣舉寒暑而六氣自序蓋以上下主歲上下左右六氣紀時如與時相得則和與時相逆則病矣帝曰氣相得而病者何也岐伯曰以下臨上不當位也此言加臨之六氣與主時之六氣有相得而不相得也氣相得者如少陰君火之氣與少陽相火之氣相合君臣之相得也君位在上臣位在下如君火加臨於相火之上為順相火加臨於君火之上是為下臨上不當其位也六微旨大論曰君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也蓋舉此君臣之上下加臨而言則六氣之順逆可類推矣帝曰動靜何如岐伯曰上者右行下者左行左右周天余而復會也此復申明司天在泉之氣六期而環會也動靜者天地之道也在上者司天在下者紀地如子年少陰在上則陽明在下矣周天之三百六十五日則在上者右行於太陰在下者左行於太陽也上下左右周司天之六歲尚餘午未申酉戌亥之六歲又環轉而復會也上節之所謂面南面北者蓋以左皆在東左皆在西此以圖象無分南北平以觀之是在下者左行則在上者右行矣總以六氣之圖推看帝曰余聞鬼臾區曰應地者靜今夫子乃言下者左行不知其所謂也願聞何以生之乎靜者地之體也生謂動之所生玉師曰動生於靜故曰生岐伯曰天地動靜五行遷復雖鬼臾區其上候而已猶不能遍明天地動靜謂司天在泉之氣繞地而環轉也五行遷復謂五運相襲周而復始也其上謂臾區其上至於十世止能占候其天之動象地之靜形猶不能遍明天地陰陽之運行也夫變化之用天垂象地成形七曜緯虛五行麗地地者所以載生成之形類也虛者所以列應天之精氣也形精之動猶根本之與枝葉也仰觀其象雖遠可知也此言地居天之中天包乎地之外是以在上之天氣右旋在地下之氣左轉也變化之用者謂天地陰陽之運動也在天無形而垂象在地有形而成形七曜日月五星也緯虛者經緯於太虛之間亦繞地而環轉也五行五方五氣之所生而成形者麗章著也地者所以載生成之物類也精者天乙所生之精水也應天之精氣者在天為氣在下為水水應天而天連水也形謂地之體靜而不動者也形精之動者謂地下在泉之氣旋轉猶根本不動而枝葉動搖然根氣又與枝葉之相通也仰觀其天象見日月五星之繞地右旋道雖深遠可得而知矣玉師曰用者動之體帝曰地之為下否乎岐伯曰地為人之下太虛之中者也帝曰馮乎岐伯曰大氣舉之也馮葉憑地之為下者謂天居上而地居下也太虛者虛元之氣也言地居太虛之中大氣舉之無所馮依者也渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見者一百八十二度半強地下亦然北極出地上三十六度南極入地下亦三十六度而嵩高正當天之中極是渾天之說本之素問者也夫素問乃三墳之一三墳者伏羲神農黃帝之書也故自易而下莫大乎素問今質諸千古以上之書而徵驗於千古之下是天地陰陽之道幽遠難明非天生之至聖孰能知之故學者能於此中用心參究則六十年之中萬物之變化民病之死生未有不如桴鼓聲響之相應也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之故風寒在下燥熱在上濕氣在中火遊行其間寒暑六入故令虛而生化也此言六氣之遊行於天地上下之間也風寒暑濕燥火在天無形之氣也干蒸動潤堅溫在地有形之徵也天包乎地是以在天之上在泉之下在地之中八極之外六合之內無所不至蓋言太虛之氣不唯包乎地之外而通貫乎地之中也寒水在下而風從地水中生故風寒在下燥乃乾金之氣熱乃太陽之火故燥熱在上土位中央故濕氣在中火乃太極中之元陽即天之陽氣故遊行於上下之間易曰日月運行一寒一暑寒暑往來而六者之氣皆入於地中故令有形之地受無形之虛氣而生化萬物也朱永年曰肝腎在下心肺居上土位中央三焦之火遊行於上下之間人與天地參也故燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固矣此復結上文六入之義帝曰天地之氣何以候之岐伯曰天地之氣勝復之作不形於診也脈法曰天地之變無以脈診此之謂也天地之氣者五運六氣也勝復之作者淫勝郁復也言氣運之變而為民病者非診候之可知也蓋每歲有司天之六氣有主歲之五運有間氣之加臨有四時之主氣人在天地氣交之中一氣不和即為民病是天地四時之氣而為民病者不能以脈診而別某氣之不和也再按平脈篇曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之蓋天地之氣淫勝則所不勝之氣鬱伏矣民感之而為病者亦鬱伏於內而不形於診也故欲知伏氣之病當以意候之候今月之內有何氣之不和則知民有伏氣之病矣鬱伏之氣復發而民病始作然後發見於脈故曰假令舊有伏氣當須脈之此與暴感風寒暑濕之邪而卒病傷寒中風即見於脈診者之不同故曰天地之氣無以脈診此之謂也帝曰間氣如何間氣者加臨之六氣也以上之左右下之左右兼於其間共為六氣故曰間氣每一氣加臨於四時之中各主六十日故曰間氣者紀步步者以六十日零八十七刻半為一步也岐伯曰隨氣所在期於左右六微旨論大曰天樞之上天氣主之天樞之下地氣主之又曰加者地氣也中者天氣也蓋以在下之氣左轉在上之氣右旋各主六十日以終一歲故曰隨氣所在期於左右謂隨在上在下之氣之所在而期於左右之旋轉也如子年少陰在上則陽明在下矣少陰在上則厥陰在左太陰在右陽明在下則太陽在左少陽在右蓋以地之左轉而主初氣故以太陽主正月朔日之寅初一刻為始次厥陰次少陰以司天之氣終三氣而主歲半以上次太陰次少陽次陽明以在泉之氣終六氣而主歲半以下各加臨六十日以終一歲也六氣環轉相同徐振公曰司天之氣始於地而終於天在泉之氣始於天而終於地此地天升降之妙用也帝曰期之奈何岐伯曰從其氣則和違其氣則病間氣者加臨之客氣也而一歲之中又有主時之六氣如主從其客則和主違其客則病矣如子午歲初之氣系太陽寒水加臨主氣系厥陰風木如寒勝其風為從風勝其寒則逆故下經曰主勝逆客勝從六氣皆然不當其位者病不當其位者即上文之所謂以下臨上也迭移其位者病如初之氣太陽寒水加臨而反熱三之氣少陰君火加臨而反寒本位之氣互相更迭氣之反也故為民病六氣皆然失守其位者危失守其位謂失守其所主之本位也如丑未歲太陰司天則初之客氣主氣並主厥陰風木而清肅之氣乘所不勝而侮之是金氣失守其位矣至五之氣陽明秋金主氣而本位反虛風木之子氣復讎火熱爍金則為病甚危所言侮反受邪此之謂也玉師曰金不失守其位則金氣不虛矣金氣不虛自有所生之水氣制火失守則母子皆虛故曰危尺寸反者死南政北政之歲有寸不應尺不應之分如應不應者而反應之是為尺寸相反陰陽交者死南政北政之歲有左右尺寸之不應蓋左為陽右為陰寸為陽尺為陰如陰陽交相應者死先立其年以知其氣左右應見然後乃可以言死生之逆順此總結六氣之加臨先立其主氣之年以知其司天在泉之氣則間氣之應見於左右或從或違然後乃可以言死生之順逆帝曰寒暑燥濕風火在人合之奈何其於萬物何以化生此節論天地之氣而合於人民萬物岐伯曰東方生風風生木木生酸酸生肝肝生筋筋生心五方生天之五氣五氣生地之五行五行生五味而生五臟五臟生外合之五體蓋人秉天地五方之氣味而生成者也其在天為玄在人為道在地為化化生五味道生智玄生神化生氣神在天為風在地為木在體為筋在氣為柔在臟為肝此言陰陽不測之變化運行於天地人之間為元為道為化為有形之五行五體五臟皆神用無方之妙用也柔者風木之氣柔耎也其性為暄其德為和其用為動其色為蒼其化為榮其蟲毛其政為散其令宣發其變摧拉其眚為隕其味為酸其志為怒怒傷肝悲勝怒風傷肝燥勝風酸傷筋辛勝酸性者五行之性也德化者氣之祥也政令者氣之章也變眚者氣之易也用者體之動也毛蟲木森森之氣也夫天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒憂思恐是人秉五氣五味所生而復傷於五氣五志猶水之所以載舟而亦所以覆舟也是以上古之人飲食有節起居有常順天地之變易以和調其陰陽故能苛疾不起而常保其天命今時之人能知歲運之變遷避勝復之災眚不唯可以治人而亦可以養生推而廣之可以救斯民於萬世功莫大焉南方生熱熱生火火生苦苦生心心生血血生脾其在天為熱在地為火在體為脈在氣為息在臟為心其性為暑其德為顯其用為躁其色為赤其化為茂其蟲羽其政為明其令鬱蒸其變炎爍其眚燔焫其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦息者火氣之蕃盛也顯明也燥火之動象也其蟲羽者火化之遊行於虛空上下也郁盛蒸熱也炎燥燔焫熱之極也極則變變則為災眚矣中央生濕濕生土土生甘甘生脾脾生肉肉生肺其在天為濕在地為土在體為肉在氣為充在臟為脾其性靜兼其德為濡其用為化其色為黃其化為盈其蟲倮其政為謐其令雲雨其變動注其眚淫潰其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘充者土氣充貫於四旁也靜者土之性兼者土王四季兼有寒熱溫涼之四氣也濡潤也化生萬物土之用也盈充滿也倮蟲肉體之蟲土所生也謐靜也雲雨者在地為土在天為濕濕氣上升而為云為雨也動不靜也動注淫潰濕之極也西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎其在天為燥在地為金在體為皮毛在氣為成在臟為肺其性為涼其德為清其用為固其色為白其化為斂其蟲介其政為徑其令霧露其變肅殺其眚蒼落其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛成者萬物感秋氣而成也固者堅金之用也斂收斂也介甲也外被介甲金之象也徑堅鋭也肅殺者物過盛而當殺於時為金又兵象也蒼老也落者肅殺盛而隕落也按在春曰風傷肝在夏曰熱傷氣在長夏曰濕傷肉在冬曰寒傷血謂四時之本氣自傷也在秋曰熱傷皮毛為所勝之氣傷也蓋言五臟之有受傷於四時之本氣者抑亦有受傷於所勝之氣者舉一臟之不同而可以類推於五臟也玉師曰秋承夏熱變炎爍為清涼如炎熱未靜則為熱氣所傷北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝其在天為寒在地為水在體為骨在氣為堅在臟為腎其性為凜其德為寒其用為其色為黑其化為肅其蟲麟其政為靜其令其變凝冽其眚冰雹其味為咸其志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸堅者寒氣之化也凜寒凜也肅靜也靜者水之政令也鱗蟲水所生也凝冽寒之極也冰雹水之變也按在春曰風傷肝在長夏曰濕傷肉是自傷其本體也在夏曰熱傷氣在冬曰寒傷血謂傷其所勝也亦舉二臟之不同而可類推於五臟耶玉師曰火熱為陽氣為陽寒水為陰血為陰亦陰陽之自傷也五氣更立各有所先非其位則邪當其位則正五氣五方之氣也更立四時之更換也各有所先者如春之風夏之熱秋之涼冬之寒各先應期而至也各當其所主之位四時之正氣也如冬時應寒而反熱夏時應熱而反寒非其所主之位則邪邪者為萬物之賊害也上節之不當其位謂客氣加臨之位此節之位謂四時主氣之位帝曰病生之變何如岐伯曰氣相得則微不相得則甚此論四時之氣而變生民病也如五氣各得其位其病則微不相得而非其本位則其病甚矣帝曰主歲如何岐伯曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之此復論五運主歲之有太過不及也如歲木太過則制己所勝之土氣而侮所不勝之金氣如不及則己所不勝之金氣侮我而乘之己所勝之土氣來輕我而侮之五運皆同周而復始侮反受邪侮而受邪寡於畏也帝曰善此言乘侮而反受其復也如歲木不及則所不勝之金氣侮而乘之而金反自虛其位矣至秋令之時金氣虛而反受水之子氣來復則火熱爍金所謂侮反受邪也侮而受邪因木氣不及而金氣又能制木寡於畏之故也此篇論五運之氣主歲主時而兼論六氣之上下左右蓋五六相合而後成歲也故篇名五運行而末結五運之太過不及五陽年主太過五陰年主不及少陰司天則陽明在泉少陰在上則左太陰右厥陰陽明在下則左太陽右少陽上下主歲左右主時六期環轉周而復始子午寅申辰戌為陽主太過丑未卯酉巳亥為陰主不及主時之氣謂之主氣加臨之氣謂之客氣主氣不移靜而守位加臨之氣隨司天在泉六氣環轉六氣主歲主時及間氣加臨之總圖司天在泉之氣主歲加臨之氣主時加臨為客氣六氣為主氣客勝為從主勝為逆歲運七篇總以前項圖象推之其五運六氣司天在泉間氣加臨主時主歲總括於中矣再以天時民病合而推之已瞭然在目不必多贅也六微旨大論篇第六十八此篇分論六節應天六節應地主歲主時及加臨之六氣故曰六微旨大論言陰陽之數其旨甚微黃帝問曰嗚呼遠哉天之道也如迎浮雲若視深淵視深淵尚可測迎浮雲莫知其極天之道者陰陽之道也言陰陽之道高遠而淵深也夫有形者尚可測在天之為氣者莫知其極也張玉師曰天包乎地六氣繞地環轉故不曰在地而曰在泉視深淵尚可測者喻六氣之在泉也夫子數言謹奉天道余聞而藏之心私異之不知其所謂也願夫子溢志盡言其事令終不滅久而不絶天之道可得聞乎岐伯稽首再拜對曰明乎哉問天之道也此因天之序盛衰之時也天之道者天之陰陽也因天之序者天以六為節因六氣而環序也盛衰者六氣之有太過不及也帝曰願聞天道六六之節盛衰何也岐伯曰上下有位左右有紀故少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此所謂氣之標蓋南面而待也故曰因天之序盛衰之時移光定位正立而待此之謂也六六者謂司天之三陰三陽上合天之六氣也上下有位者言少陰在上則陽明在下太陰在上則太陽在下少陽在上則厥陰在下陽明在上則少陰在下太陽在上則太陰在下厥陰在上則少陽在下六期環轉而各有上下之定位也左右有紀者如少陰在上則厥陰在左太陰在右太陰在上則少陰在左少陽在右少陽在上則太陽在左陽明在右陽明在上則少陽在左太陽在右太陽在上則陽明在左厥陰在右厥陰在上則太陽在左少陰在右各隨氣之在上而有左右之定紀也故少陽之右陽明治之陽明之右太陽治之蓋以右位之陰陽轉遷於上而主歲也氣之標者標見於上也夫天氣右旋故南面觀之而待其循序環轉也移光者日月運行也以日行一周天以定一氣之位正立正南面而立也少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也此言三陰三陽有六氣之化有上下之本標有中見之標本也風寒暑濕燥火天之陰陽也三陰三陽上奉之故以天氣為本而在上以三陰三陽之氣標見於下也本標不同氣應異象此言三陰三陽之六氣雖上下相應而各有不同也少陰標陰而本熱太陽標陽而本寒是本標之不同也少陰太陽從本從標太陰少陽從本陽明厥陰不從標本從乎中也故有從本而得者有從標而得者有從標本而得者有從中見而得者是氣應之異象也帝曰其有至而至有至而不至有至而太過何也岐伯曰至而至者和至而不至來氣不及也未至而至來氣有餘也此論三陰三陽之主歲而各有太過不及也至而至者此平氣之年無太過不及四時之氣應期而至氣之和平也如春應溫而寒夏應熱而尚溫此應至而不至來氣之不及也如未至春而先溫未至夏而先熱此未應至而先至來氣之有餘也按天元正紀大論曰凡此陽明太陰厥陰司天之政氣化運行後天太陽少陽少陰司天之政氣化運行先天蓋不及之歲則司天之氣後天時而至有餘之歲則司天之氣先天時而至又陽年主實陰年主虛其天符歲會之年是為平氣無太過不及者也帝曰至而不至未至而至如何岐伯曰應則順否則逆逆則變生變則病不及之歲應至而不至有餘之歲應未至而至是為應則順如不及之歲反未至而至有餘之歲反至而不至是為否則逆逆則變生變則為民之災病矣帝曰善請言其應岐伯曰物生其應也氣脈其應也請言其應者謂應太過不及之氣也物生其應者如厥陰司天毛蟲靜羽蟲育少陽司天草木早榮太陰司天萬物以榮此生物以應司天之候也氣脈其應者如太陽司天寒臨太虛陽氣不令陽明司天陽專其令炎暑大行太陰司天陰專其政陽氣退避又厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長此皆氣脈其應也帝曰善願聞地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之此論六節應地而主時也節度也氣位六氣所主之步位也顯明者寅正立春節候乃初之氣也顯明之右乃少陰君火之位主二之氣也退行一步者從右而退轉一位也君火之右乃少陽相火之位主三之氣也復行一步者復行一位也復行一位乃太陰濕土主四之氣也復行一位乃陽明燥金主五之氣也復行一位乃太陽寒水主六之氣也復行一位乃厥陰風木主初之氣也復行一位乃少陰君火之所主周而復始也金西銘曰君火為尊故以少陰為始相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之帝曰何也岐伯曰亢則害承乃制制則生化外列盛衰害則敗亂生化大病上節論六氣相生以主時此論六氣承製而生化蓋五行之中有生有化有制有克如無承製而亢極則為害有制克則生化矣治主也謂六氣定位而各有所主也承者謂承奉其上而制之也陰精者天乙所生之精水也如木位之下乃陽明燥金太陽寒水母子之氣以承之母氣制之則子氣生化其木矣如金位之下乃君相二火太陰濕土母子之氣承之母氣克之則子氣生化其金矣土位之下乃厥陰風木君相二火母子之氣以承之木製其土則火氣生化矣餘三氣相同是為制則生化也如火亢而無水以承之則火炎鑠金而水之生原絶矣無水以制火則火愈亢矣如水亢而無土以承之則水濫火滅而土之母氣絶矣無土以制水則水愈亢矣是以亢則為五行之賊害寒則生化承製之氣皆為敗亂而生化大病矣外列盛衰者謂外列主歲之氣有盛有衰如主歲之氣與主時之氣交相亢極則為害更甚故曰害則敗亂生化大病金西銘曰主歲之氣太過則己亢而侮所不勝如不及則為所勝之氣亢而侮之帝曰盛衰何如岐伯曰非其位則邪當其位則正邪則變甚正則微此承上文而言太過不及之歲而有盛衰之氣也非其位者謂氣來有餘則制己所勝而侮所不勝此歲氣之盛也氣來不及則己所不勝侮而乘之己所勝輕而侮之此歲氣之衰也此皆不守本位而交相乘侮則邪僻內生矣當其位者乃平氣之年無太過不及之乘侮而各當其本位此氣之正也邪則變甚正則變微張玉師曰地理之應論主時而及於主歲司天之氣以主歲而及於主時帝曰何謂當位岐伯曰木運臨卯火運臨午土運臨四季金運臨酉水運臨子所謂歲會氣之平也帝曰非其位何如岐伯曰歲不與會也此言平氣之歲而無盛衰也木運臨卯丁卯歲也火運臨午戊午歲也土運臨四季甲辰甲戌己丑己未歲也金運臨酉乙酉歲也水運臨子丙子歲也會合也以天干之化運與地支之主歲相合故為歲會此平氣之年也如非歲會之年則有太過不及之相承是為不當其位矣帝曰土運之歲上見太陰火運之歲上見少陽少陰金運之歲上見陽明木運之歲上見厥陰水運之歲上見太陽奈何岐伯曰天與之會也故天元冊曰天符此言司天之氣與五運之氣相合是為天符上見者謂司天之氣見於歲運之上也土運之歲上見太陰己丑己未歲也火運之歲上見少陽戊寅戊甲歲也上見少陰戊子戊午歲也金運之歲上見陽明乙卯乙酉歲也木運之歲上見厥陰丁巳丁亥歲也水運之歲上見太陽丙辰丙戌歲也此司天之氣與五運之氣相合故名曰天符天符歲會何如岐伯曰太乙天符之會也如天符與歲會相合是名太乙天符乃戊午己丑己未乙酉四歲此乃司天之氣五運之氣主歲之氣三者相合故又名曰三合帝曰其貴賤何如岐伯曰天符為執法歲會為行令太乙天符為貴人王冰曰執法猶相輔行令猶方伯貴人猶君主帝曰邪之中也奈何岐伯曰中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死王冰曰執法官人之準繩目為邪僻故病速而危方伯無執法之權故無速害而病能自持貴人義無凌犯故病則暴而死帝曰位之易也何如岐伯曰君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也地理之應六節乃主時之六氣不易之位也然又有加臨之六時隨司天在泉六期環轉故曰位之易也如少陰君火加臨於少陽相火之上是為君位臣則順如少陽相火加臨於少陰君火之上是為臣位君則逆所謂二火之順逆也徐振公曰類而推之餘四氣亦有母子之分如母加於子為順子加於母為逆張玉師曰此節起下文加臨之六氣帝曰善願聞其步何如岐伯曰所謂步者六十度而有奇故二十四步積盈百刻而成日也此論加臨之六氣也步位也以一氣各主六十日零八十七刻半故為六十度而有奇四歲之中共計二十四步每步氣盈八十七刻半共積盈二千一百刻以二千刻分為四歲之氣盈五日尚積盈一百刻而成有餘之一日也帝曰六氣應五行之變何如岐伯曰位有終始氣有初中上下不同求之亦異也此論加臨之六氣與主時之氣相應而各有不同也五行者謂厥陰風木主初氣君相二火主二氣三氣太陰濕土主四氣陽明燥金主五氣太陽寒水主六氣此主時之五行守定位而不移者也如加臨之六氣應主時之五行則更變不同矣位有終始者謂主時之六位始於厥陰終於太陽有一定之本位也氣有初中者謂加臨之六氣始於地之初氣而終於天之中氣也上下不同者謂客氣加於上主氣主於下應各不同是以求之亦異也帝曰求之奈何岐伯曰天氣始於甲地氣始於子子甲相合命曰歲立謹候其時氣可與期天干之氣始於甲地支之氣始於子子甲相合而歲立矣先立其歲以候其時則加臨之六氣可與之相期而定矣帝曰願聞其歲六氣始終早晏何如其歲者謂其一歲之中有加臨之六氣也始終者始於一刻終於八十七刻半也早晏者如卯子辰歲天氣始於一刻氣之早也如寅未亥歲天氣始於七十六刻氣之晏也岐伯曰明乎哉問也甲子之歲初之氣天數始於水下一刻終於八十七刻半二之氣始於八十七刻六分終於七十五刻三之氣始於七十六刻終於六十二刻半四之氣始於六十二刻六分終於五十刻五之氣始於五十一刻終於三十七刻半六之氣始於三十七刻六分終於二十五刻所謂初六天之數也天數者以一歲之日數應周天之三百六十五度四分度之一也初之氣始於寅正朔日子初之水下一刻終於六十日零八十七刻半六氣共計三百六十日零五百二十五刻是三百六十五日零二十五刻此初之六氣應天之數也乙丑歲初之氣天數始於二十六刻終於一十二刻半二之氣始於一十二刻六分終於水下百刻三之氣始於一刻終於八十七刻半四之氣始於八十七刻六分終於七十五刻五之氣始於七十六刻終於六十二刻半六之氣始於六十二刻六分終於五十刻所謂六二天之數也乙丑歲初之氣始於甲子歲三百六十六日之二十六刻終於六十一日之一十二刻半計六十日零八十一刻半六氣共計三百六十五日零三十五刻所謂六氣之二以應天之數也丙寅歲初之氣天數始於五十一刻終於三十七刻半二之氣始於三十七刻六分終於二十五刻三之氣始於二十六刻終於一十二刻半四之氣始於一十二刻六分終於水下百刻五之氣始於一刻終於八十七刻半六之氣始於八十七刻六分終於七十五刻所謂六三天之數也丙寅歲初之氣始於前二歲七百三十一日之五十一刻終之氣終於一千九十六日之七十五刻計三百六十五日零二十五刻所謂三歲之六氣也丁卯歲初之氣天數始於七十六刻終於六十二刻半二之氣始於六十二刻六分終於五十刻三之氣始於五十一刻終於二十七刻半四之氣始於三十七刻六分終於二十五刻五之氣始於二十六刻終於一十二刻半六之氣始於一十二刻六分終於水下百刻所謂六四天之數也次戊辰歲初之氣復始於一刻常如是而已周而復始丁卯歲初之氣始於一千九十六日之七十五刻終於一千四百六十一日之水下百刻是每年各三百六十五日零二十五刻四年共計一千四百六十日又積盈百刻而成一日也每年計朔虛六日氣盈五日零二十五刻二十歲中之氣盈朔虛共積餘二百二十五日是以三歲一閏五歲再閏十有九歲七閏而除三日之有奇也帝曰願聞其歲候何如岐伯曰悉乎哉問也日行一周天氣始於一刻日行再周天氣始於二十六刻日行三行天氣始於五十一刻日行四周天氣始於七十六刻日行五周天氣復始於一刻所謂一紀也上節論六氣之紀步此復論一歲之氣以應周天之數焉周天三百六十五度四分度之一日一日繞地一周而過一度每歲計三百六十五日零二十五刻是日行一歲一周天而復行於再周也四歲共積盈百刻而為一紀是故寅午戌歲氣會同卯未亥歲氣會同辰申子歲氣會同巳酉醜歲氣會同終而復始此言天數之與地支會同是以四歲而為一紀寅午戌歲皆主日行三周天氣始於五十一刻卯未亥歲皆主日行四周天氣始於七十六刻辰申子歲皆主日行一周天氣始於一刻巳酉醜歲皆主日行三周天數始二十六刻四會而地支巳周終而復始帝曰願聞其用也岐伯曰言天者求之本言地者求之位言人者求之氣交用者陰陽升降之為用也本者天以風寒暑濕燥火之六氣為本位者三陰三陽之步位也氣交者天地陰陽之氣上下出入之相交也帝曰何謂氣交岐伯曰上下之位氣交之中人之居也故曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之萬物由之此之謂也分葉問上下之位天地定位也天樞之上下者言天包乎地地居天之中也人與萬物生於天地氣交之中人氣從之而生長壯老已萬物由之而生長化收藏帝曰何謂初中岐伯曰初凡三十度而有奇中氣同法帝曰初中何也岐伯曰所以分天地也帝曰願卒聞之岐伯曰初者地氣也中者天氣也此申明天地陰陽之氣交也夫歲半之前天氣主之而司天之初氣又始於地之左歲半之後地氣主之而在泉之初氣又始於天之右是上下之相交也而一氣之內又有初中之分有奇者各主三十日零四十三刻七分五釐地主初氣天主中氣是一氣之中而又有天地陰陽之交會故曰陰中有陽陽中有陰張玉師曰司天在泉之氣皆始於地之初氣而終於天之中氣故曰初者地氣也又司天之氣始於地之左而地中有天在泉之氣始於司天之右而天中有地皆氣交之妙用帝曰其升降何如岐伯曰氣之升降天地之更用也帝曰願聞其用何如岐伯曰升已而降降者謂天降已而升升者謂地天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因而變作矣天氣主降然由升而降是所降之氣從地之升地氣主升然由降而升是所升之氣從天之降此天地更用之妙也天氣流於地地氣騰於天高天下地之氣交相感召因升而降因降而升升降相因而變化作矣帝曰善寒濕相遘燥熱相臨風火相值其有聞乎岐伯曰氣有勝復勝復之作有德有化有用有變變則邪氣居之此論六氣臨御於天地上下之間有勝復之作有德化之常有災眚之變人與萬物生於天地氣交之中莫不由陰陽出入之變化而為之生長老已能出於天地之外而不為造化之所終始者其惟真人乎遘謂六氣之遇合臨謂六氣之加臨值謂六氣之直歲勝復淫勝郁復也德化者氣之祥用者體之動變者復之紀邪者變易之氣也玉師曰此節統論六氣之旨至精微而至廣大帝曰何謂邪乎岐伯曰夫物之生從於化物之極由乎變變化之相薄成敗之所由也五常政大論曰氣始而生化氣終而象變是以生長收藏物之成也災眚變易物之敗也故人與萬物生長於陰陽變化之內而成敗倚伏於其中故氣有往復用有遲速四者之有而化而變風之來也氣有往復謂天地之氣有升有降也用有遲速謂陰陽出入有遲有速也風者天地之動氣能生長萬物而亦能害萬物者也玉師曰至而不至來氣之遲也未至而至來氣之速也遲速者謂陰陽六氣有太過不及之用故下文曰因盛衰之變耳帝曰遲速往復風所由生而化而變故因盛衰之變耳成敗倚伏遊乎中何也岐伯曰成敗倚伏生乎動動而不已則變作矣動者升降出入之不息也萬物之成敗由陰陽之變化是以成敗之機倚伏於變化之中帝曰有期乎岐伯曰不生不化靜之期也如不生不化靜而後已蓋言天地之氣動而不息者也帝曰不生化乎言有不生不化之期乎岐伯曰出入廢則神機化滅升降息則氣立孤危此復申明天地開闢而未有不運動生化者也出入闔闢也機樞機也神機者陰陽不測之變化也夫闔闢猶戶扇樞即轉牡蓋舍樞則不能闔闢舍闔闢則無從轉樞是以出入廢則神機之化滅矣升降寒暑之往來也夫陰陽升降皆出乎地天包乎地之外是以升降息在外之氣孤危孤則不生矣下經曰根於外者命曰氣化氣止則化絶根於中者命曰神機神去則機息故非出入則無以生長壯老已非升降則無以生長化收藏是以升降出入無器不用已死也生長壯老已指動物而言生長化收藏指植物而言凡有形者謂之器言人與萬物生於天地氣交之中有生長老已皆由乎升降出入之氣化是以無器不有此升降出入故器者生化之宇器散則分之生化息矣故無不出入無不升降凡有形之物無不感此天地四方之氣而生而化故器者乃生化之宇器散則陽歸於天陰歸於地而生化息矣故萬物無不有此升降出入亦由成敗而後已化有小大期有遠近此言天地之氣化動靜又有小大遠近之分焉如朝菌不知晦朔螻蛄不知春秋此化之小者也蓂靈大椿以千百歲為春千百歲為秋此化之大者也夫天地之氣陽動陰靜晝動夜靜此期之近者也天開於子地闢於醜天地開闢動而不息至戌亥而復天地渾元靜而不動此期之遠者也四者之有而貴常守反常則災害至矣故曰無形無患此之謂也言人生於天地之間有此升降出入之氣而貴常守此形常懷憂患如反常則災害並至故曰無形無患謂能出於天地之間脫履形骸之外而後能無患帝曰善有不生化乎岐伯曰悉乎哉問也與道合同惟真人也帝曰善言生於天地之間而不為造化之所囿者其惟真人乎真人者提挈天地把握陰陽壽敞天地之外而無有終時是不與天地之同動靜者也氣交變大論篇第六十九五運主歲有太過不及之氣交有勝復之變易故以名篇黃帝問曰五運更治上應天期陰陽往復寒暑迎隨真邪相薄內外分離六經波蕩五氣傾移太過不及專勝兼併願言其始而有常名可得聞乎五運更治者五運相襲而更治之也上應天期者每運主期年之三百六十五日上應周天之三百六十五度也陰陽往復者有餘而往不足隨之不足而往有餘隨之也迎隨往來也真邪相薄者有德化之祥有變易之氣也內外表裡也六經三陰三陽之六經五氣五臟之氣也此言民感勝復之氣而為病也專勝兼併者太過不及之歲所勝之氣專勝有勝復之氣兼併如委和之紀是謂勝生其果棗李其谷稷稻其味酸辛其色白蒼其畜火雞其音角商是也始者天氣始於甲地氣始於子子甲相合而歲運立矣岐伯稽首再拜對曰昭乎哉問也是明道也此上帝所貴先師傳之臣雖不敏往聞其旨言道由師傳不假自得帝曰余聞得其人不教是謂失道傳非其人慢泄天寶余誠菲德未足以受至道然而衆子哀其不終願夫子保於無窮流於無極余司其事則而行之奈何修道之謂教易曰苟非其人道不虛行垂教後世以保子孫黎民於無窮無極者大聖之業也事陰陽通變之事則法也岐伯曰請遂言之也上經曰夫道者上知天文下知地理中知人事可以常久此之謂也上經謂上世先師所傳之經能知天地人三才之道可通於無窮究於無極也帝曰何謂也岐伯曰本氣位也位天者天文也位地者地理也通於人氣之變化者人事也故太過者先天不及者後天所謂治化而人應之也氣位者五運六氣各有司天紀地主歲主時之定位也天位者在天之呈象也位地者地理之應六節也人居天地氣交之中隨四時陰陽之變化者人事也故運氣之太過者四時之氣先天時而至歲運之不及者四時之氣後天時而至此歲運之變化而人應之也金西銘曰蒼黅丹素元天之象也風寒暑濕燥火天之氣也帝曰五運之化太過何如岐伯曰歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹支滿上應歲星歲木太過則制勝其土氣故民應之而為脾病也飧泄食減腸鳴腹滿皆脾土之病脾主肌肉四肢故體重煩冤者土傷而不能制水水氣上乘於心也上應歲星光芒倍大歲星木星也木運太過諸壬歲也甚則忽忽善怒眩冒巔疾此言淫勝太甚則反自傷也善怒肝志之病也厥陰與督脈會於巔故眩冒巔疾化氣不政生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚衝陽絶者死不治上應太白星化氣土氣也風木太過是以化氣不能章其政令生氣木氣也風勝則動是以在上之雲物飛動在下之草木不寧反脅痛而吐甚者淫極而反招損也食氣入胃散精於肝肝氣虛逆故吐甚也衝陽胃脈也木淫而土氣已絶故為不治之死證上應太白星明太白金星也蓋歲運太過畏星失色而兼其母歲木太過則鎮星失色而火之熒惑亦無光矣熒惑失明故太白得見而復勝其木此交相承製自然之理也歲火太過炎暑流行金肺受邪民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱肩背熱上應熒惑星火勝則剋金故金肺受邪痎瘧暑熱病也壯火食氣故少氣肺受火熱故喘咳也肺朝百脈陽脈傷則血溢於上陰脈傷則血泄於下也肺乃水之生源嗌燥者火熱爍金也腎開竅於耳水源已竭則腎虛而耳聾矣中熱者熱淫於內也肩背者肺之俞也熒惑火星也火氣勝故上應熒惑光芒倍大火運太過諸戊運也甚則胸中痛脅支滿脅痛膺背肩胛間痛兩臂內痛身熱骨痛而為浸淫此亢極而心火自傷也膺胸之內心主之宮城也背為陽心為陽中之太陽故胸中膺背肩胛間痛手少陰心脈出脅下循臑內下肘中循臂內後兼是以脅支滿痛兩臂內痛身熱骨痛者火亢而水亦傷也浸淫火熱瘡也臟氣法時論曰心痛者胸中痛脅支滿脅下痛膺背肩胛間痛兩臂內痛金匱要略曰譬如浸淫瘡從口流向四肢者可治從四肢流來入口者不可治收氣不行長氣獨明雨水霜寒上應辰星此金氣鬱而水氣復也收氣金氣也長氣火氣也雨水霜寒寒水之氣復也上應辰星當明辰星水星也上臨少陰少陽火燔焫冰泉涸物焦槁上臨者司天之氣上臨歲運所謂天符之歲也戊子戊午歲上臨少陰戊寅戊申歲下臨少陽司天與歲運相合火氣更甚故水泉涸而物焦枯也按諸陽年主太過故止有戊子戊午戊寅戊申及丙辰丙戌有司天上臨與歲運相合其餘木金土歲無上臨也病反譫妄狂越喘咳息鳴下甚血溢泄不已太淵絶者死不治上應熒惑星病反者火亢極而反自傷也譫妄狂越熱極之變證也喘咳息鳴者火上炎而鑠金也心主血脈下甚則迫血下泄而不已也太淵肺金之俞穴也火亢極而金氣已絶故為不治之死證上應熒惑光芒倍大熒惑火星也歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤上應鎮星在地為土在天為濕故歲土太過雨濕流行六元正紀大論曰太陰所至為雲雨蓋濕土之氣上升而為云為雨也腹痛謂大腹小腹作痛乃腎臟之病土勝而水傷也臟氣法時論曰腎病者身重腎虛者大腹小腹痛清厥意不樂清冷厥逆也腎為生氣之原腎氣受邪故手足厥冷也意之所存謂之志腎藏志志不舒故意不樂也人之行動藉氣詬而血濡腎乃血氣之生原故體重煩冤者水不能濟火也歲土太過故上應鎮星增明鎮星土星也土運太過諸甲歲也甚則肌肉萎足萎不收行善瘈腳下痛飲發中滿食減四肢不舉變生得位肌肉四肢脾土之所主也飲者脾氣不能轉輸而為痰飲水飲也中滿食減土虛而不能主化也此淫勝太甚則反虛其本位而自傷也故於四季月之十八日土氣得位之時而反變生此病張玉師曰以中土而可類推於他臟如金病在秋水病在冬反病在於本位之時臟氣伏化氣獨治之泉湧河衍涸澤生魚風雨大至土崩潰鱗見於陸病腹滿溏泄腸鳴反下甚而太溪絶者死不治上應歲星臟氣水氣也化氣土氣也土勝則制水是以臟氣伏也泉湧可衍涸澤生魚濕淫太過也風雨大至木氣來復也土崩潰鱗見於陸土敗而水泛也腹滿溏泄腸鳴脾土之虛證也太溪腎脈也反下甚而太溪絶者土敗而水反下甚也水泛甚則腎氣絶矣上應歲星倍明木反勝也歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍耳無所聞肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹上應太白星歲金太過燥氣流行則肝木受病矣兩脅下少腹痛肝病也肝開竅於目故目痛眥瘍肝虛則耳無所聞也臟氣法時論曰肝病者兩脅下痛引少腹虛則目䀮䀮無所見耳無所聞體重者肅殺而甚無生動之氣也煩冤者肝氣逆而不舒也本經曰腎虛脾虛肝虛皆令人體重煩冤玉機真臟論曰肝脈不及則令人胸痛引背下則兩脅支滿太白金星也金氣勝故上應太白增光金運太過諸庚歲也張玉師曰上節之兩脅下少腹痛病肝臟之氣也下節復言兩脅滿且痛引少腹者病肝臟之經脈也蓋運氣與臟氣相合是以太過不及之氣先病臟氣而後及於經脈與四時所感風寒暑濕之邪先從皮毛而入於經脈從經脈而入於臟腑者之不同也甚則喘咳逆氣肩背痛尻陰股膝髀腨䯒足皆病上應熒惑星肅殺太甚則金氣自虛而火氣來復也喘咳逆氣肺病也肺俞在肩背故肩背痛尻陰股膝髀䯒皆病者金氣虛而下及於所生之水臟也夫金淫太過則反虛其本位金虛不能生水則火無所畏而得以復之矣故上應熒惑增光收氣峻生氣下草木斂蒼干凋隕病反暴痛胠脅不可反側咳逆甚而血溢太衝絶者死不治上應太白星收氣金氣也生氣木氣也收氣峻利而生氣下伏是以草木斂而蒼干凋落矣暴痛胠脅不可反側者肝膽病也肝脈貫肺中故咳逆甚肝主藏血故血溢也太衝肝之俞脈也金氣強甚上應太白增光按上節之所謂燥氣流行民病兩歲下少腹痛者謂歲運之太過於歲半以下故至夏而火氣得以復之此復言收氣峻病反暴痛胠脅者復淫勝於歲半以下也秋冬乃金水當令之時故至太衝脈絶五運之氣同義張玉師曰歲木太過無金氣之復則曰生氣獨治謂獨主其一歲也在歲金太過至秋而復勝故曰收氣峻在秋冬之時春陽之生氣已下故曰生氣下句法字法各有不同俱宜著眼歲水太過寒氣流行邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至上應辰星水運太過寒氣流行故邪害心火寒氣上乘迫其火氣外炎故身熱心煩心悸者水氣上凌於心也躁者火氣不交於陰也陰氣寒甚故厥逆於上上下中寒者三焦之火衰也心神不寧故譫妄也寒主冬令此歲氣流行故寒氣早至辰星水星也水氣太甚故上應辰星倍明歲水太過諸丙歲也甚則腹大脛腫喘咳寢汗出憎風大雨至埃霧朦郁上應鎮星此水淫甚而自傷所謂滿招損也臟氣法時論曰腎病者腹大脛腫喘咳寢汗出憎風蓋水邪泛溢土不能制之則腹大脛腫水氣上逆則喘咳也太陽之氣生於水中而主於膚表水泛則源竭太陽之氣無從資生表陽虛故汗出憎風也大雨至埃霧朦郁水淫而土氣復也六元正紀大論曰太陰所至為濕生終為注雨埃霧朦郁者土之濕氣上蒸也土氣復故上應鎮星倍明上臨太陽雨冰雪霜不時降濕氣變物病反滿腹腸鳴溏泄食不化渴而妄冒神門絶者死不治上應熒惑辰星上臨太陽者寒水司天之氣加臨於上乃丙辰丙戌二歲即天符歲也寒水交盛是以雨冰雪霜不時降冰雪者寒水之變易也雨水下降則土濕而物變民病腹滿腸鳴溏泄食不化者皆水泛土敗之證也脾土不能轉輸其津液故渴濕氣冒明故妄冒也神門心脈也水氣甚強故上應熒惑失色辰星倍明帝曰善其不及何如岐伯曰悉乎哉問也歲木不及燥乃大行生氣失應草木晚榮肅殺而甚則剛木闢著柔萎蒼干上應太白星歲氣不及則己所不勝侮而乘之是以主歲之木運不及則金之燥氣大行木之生氣失時而應是以草木晚榮闢刑也著著也肅殺之氣太甚故雖堅剛之木亦受其刑傷而柔萎者則蒼干矣金氣反勝故上應太白增光木運不及六丁歲也民病中清胠脅痛少腹痛腸鳴溏泄涼雨時至上應太白星其谷蒼中清者清涼之氣乘於中而中氣冷也脅痛少腹痛肝木病也食氣入胃散精於肝行氣於筋肝氣虛逆而更兼中清故腹鳴溏泄也金氣清涼故涼雨時至金能生水也金氣勝故上應太白光芒倍大夫五穀受在地五行之氣而生長化收藏者也木受金制故其谷色蒼上臨陽明生氣失政草木再榮化氣乃急上應太白鎮星其主蒼早陽明燥金臨於司天之上乃丁卯丁酉二歲所謂天刑歲也歲木不及而又上臨金氣是以木之生氣失政草木受金刑而再榮木不及則不能制土故化氣乃急金土之氣勝上應太白鎮星光明木受金制故主蒼色早見即制則生化之義按諸陰年主不及故止有丁卯丁酉及己巳己亥辛丑辛未歲其諸癸諸乙歲無曰天之合勝也張玉師曰化氣乃急故草木得以再榮復則炎暑流火濕性燥柔脆草木焦槁下體再生華實齊化病寒熱瘡瘍痱疹癰痤上應熒惑太白其谷白堅脆音翠痱音肺疹疹同痤才何切復者母鬱而子復也火大火流下也夏秋之交大火西流暑熱鑠金矣長夏濕土主氣因暑熱而濕性反燥故萬物柔脆草木焦槁火主長氣故下體再生夫夏主華而秋主成實火制其金是以華實齊化寒熱瘡瘍癰疹皆暑熱病也上應熒惑增光太白減耀其谷白堅堅實也蓋秋主收成因火制之故早實也白露早降收殺氣行寒雨害物蟲食甘黃脾土受邪赤氣後化心氣晚治上勝肺金白氣乃屈其谷不成咳而鼽上應熒惑太白星此復論上臨陽明之歲金氣用事故至夏秋之交白露早降收殺氣行而火覆在後也蓋不及之歲所勝之氣妄行而反自虛其位故復氣得以勝之今上臨陽明金氣原盛金氣盛則金之子氣亦能勝火木之子欲復之而金之子能勝之是以赤氣後化也寒雨寒水之氣金之子也長氣後發而收藏之令早行故萬物為之賊害而其谷不成也蟲感雨濕之氣而生夏秋之交土氣用事而反為寒雨所勝是以蟲食甘黃而脾土受邪也肺開竅於鼻故咳而鼽鼽者鼻流清涕也上應熒惑復耀太白減明張玉師曰陽明燥金司天則少陰君火主終之氣故赤氣後化而白氣始屈也其谷不成當與其谷白堅對看蓋火主長氣金主收成上節火制其金是以華實齊化其谷堅成此收殺氣盛寒雨早行而長氣後發四時失序故其谷不成也如雲其谷蒼其谷白堅其谷丹其谷黅其谷堅芒其谷秬其主黅谷皆當在成物上論如雲其谷不成元谷不成蒼谷乃損秀而不實其谷不登斯在敗上論也歲火不及寒乃大行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美上應辰星歲火不及水反勝之故寒乃大行而長政不用也夫萬物得長氣而榮美夏長之氣被寒折於上故物榮而下凝慘陰寒之氣也太陽之氣生於寒水之中如凝慘太甚則陽氣不生化矣萬物得陽氣而榮陽氣不化而榮美乃折矣上句言寒勝於上則長氣不能上榮下句言寒凝於下則陽氣不能施化於上水氣勝當上應辰星增耀歲火不及六癸歲也民病胸中痛脅支滿兩脅痛膺背肩髀間及兩臂內痛鬱冒朦昧心痛暴喑胸腹大脅下與腰背相引而痛甚則屈不能伸髖髀如別上應熒惑辰星其谷丹火運不及寒乃勝之則陽氣不能施化故為此諸痛所謂寒勝為痛痹也鬱冒朦昧寒濕之氣冒明也水寒乘心故心痛心主言故暴喑也夫太陽主諸陽之氣生於寒水之中寒淫太甚則生陽自虛屈不能伸者其病在筋太陽主筋陽氣虛不能養筋故也太陽氣之為病腰似折髀不可以曲膕如結踹如別是為踝厥上應熒惑失色辰星倍明火受其制故其谷丹復則埃郁大雨且至黑氣乃辱病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛暴攣痿痹足不任身上應鎮星辰星玄谷不成此水淫甚而土氣復也埃土郁蒸也濕土之氣鬱蒸於上是以大雨且至所謂地氣生而為云為雨也六元正紀大論曰太陰所至為濕生終為注雨黑氣水氣也辱下也土氣復而水氣乃伏也鶩溏腹滿足不任身皆寒濕之證蓋水寒太甚而又濕土復之故為此諸病也上應鎮星增明辰星減耀寒濕相勝而無燥熱之化是以元谷不成歲土不及風乃大行化氣不令草木茂榮飄揚而甚秀而不實上應歲星土運不及木反勝之故風乃大行而土之化氣不能章其政令也風主生物土主成物故草木雖茂榮而多不成實也上應歲星增光土運不及六己歲也民病飧泄霍亂體重腹痛筋骨徭復肌肉瞤酸善怒臟氣舉事蟄蟲早附咸病寒中上應歲星鎮星其谷黅瞤動也飧泄霍亂體重腹痛肌肉瞤酸皆風木傷土之病徭搖同根結篇曰所謂骨徭者搖故也筋骨搖動乃厥陰少陽之病風木太過故筋骨復搖而善怒也土氣不及則木無所制故臟氣舉事而蟄蟲早歸附也咸病寒中者水寒上乘而火土衰也上應歲星增光鎮星失色土受其制故其谷黅復則收政嚴峻名木蒼凋胸脅暴痛下引少腹善太息蟲食甘黃氣客於脾黅谷乃減民食少失味蒼谷乃損上應太白歲星土弱木亢金乃復之故收政嚴峻而名木蒼凋病胸脅暴痛下引少腹肝木之病也靈樞經曰膽病者善太息蓋木鬱則膽氣不舒故太息以伸出之蟲感寒濕之氣而生氣水氣也蟲食甘黃氣客於脾水侵土也蓋土運不及而臟氣舉事故金雖復之而子亦隨之金氣復則蒼谷乃損水氣勝則黅谷乃減民食少失味矣上應太白增光上臨厥陰流水不冰蟄蟲來見臟氣不用白乃不復上應歲星民乃康上臨厥陰己巳己亥歲也厥陰在上則少陽在下是以流水不冰蟄蟲不藏而臟氣不用謂歲半以下得少陽之火而冬令不寒也歲運之木雖不務其德而乘侮其土然值厥陰司天木氣不虛故白乃不復上應歲星增光按勝氣在於歲半以前復氣在於歲半以後秋冬之時木氣已平金氣不復故民乃得康矣當知勝氣妄行反自虛其本位而子母皆虛故復氣得以復之如本氣不虛則子氣亦實復氣亦畏其子而不敢復矣歲金不及炎火乃行生氣乃用長氣專勝庶物以茂燥爍以行上應熒惑星金運不及則所勝之火氣乃行金不能制木故木之生氣乃用火之長氣專勝生長之氣盛故庶物以茂火氣專勝故燥爍以行上應熒惑光芒倍大歲金不及六乙歲也民病肩背瞀重鼽嚏血便注下收氣乃後上應太白星其谷堅芒瞀音務嚏音啻肺俞在肩背故民病肩背低目俯首曰瞀經脈篇曰肺是動則病缺盆中痛甚則交兩手而瞀鼽嚏肺病也血便注下火迫血液下注也金受其制是以收氣至秋深而後乃行上應太白失色收氣乃後故其谷後成堅芒成實也復則寒雨暴至乃零冰雹霜雪殺物陰厥且格陽反上行頭腦戶痛延及腦頂發熱上應辰星丹谷不成民病口瘡甚則心痛金弱火亢水乃復之故寒雨暴至繼以冰雹殺物乃寒水之變也厥逆格招也秋冬之時陽氣應收藏於陰臟因寒氣厥逆且格陽於外致陽反上行而頭腦戶痛延及腦頂發熱上應辰星倍明水勝其長氣是以丹谷不成水寒之氣上乘迫其心火外炎故民病口瘡甚則心痛歲水不及濕乃大行長氣反用其化乃速暑雨數至上應鎮星數音朔水運不及土乃勝之故濕氣大行水弱而不能制火故長氣反用火土合化故土之化氣乃速而暑雨數至六元政紀大論曰太陰所至為化為雲雨上應鎮星倍明水運不及六癸歲也民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥腳下痛甚則跗腫臟氣不政腎氣不衡上應辰星其谷秬濕土太過傷及腎陰故為此諸病靈樞經曰陽氣有餘榮氣不行乃發為癰陰陽不通兩熱相搏乃化為膿又曰寒邪客於經絡之中不得復反則為癰腫此寒毒而無熱化故發為寒瘍流水而無膿也寒氣上凌故煩冤也水之臟氣不能章其政令水藏之腎氣不得平衡上應辰星失色秬黑黍也土製其水故秬谷得成上臨太陰則大寒數舉蟄蟲早藏地積堅冰陽光不治民病寒疾於下甚則腹滿浮腫上應鎮星其主黅谷司天之氣上臨太陰乃辛丑辛未歲也太陰濕土司天則太陽寒水在泉是以大寒數舉而蟄蟲早藏也寒氣數舉故陽光不治於上寒水在泉故民病寒疾於下甚則腹滿浮腫者濕淫太過而脾土受傷也上應鎮星增耀下主黅谷有成復則大風暴發草偃木零生長不鮮面色時變筋骨並闢肉瞤瘛目視䀮䀮物疏璺肌肉疹發氣並膈中痛於心腹黃氣乃損其谷不登上應歲星䀮葉荒璺音問水弱土勝木後復之故大風暴發草偃木落而生長不鮮澤也陽明屬土所主在面故面色時變闢刑傷也陽明主潤宗筋諸筋皆屬於骨陽明之中土氣傷是以筋骨並闢也瞤瘛動掣也䀮䀮者眼目不明因風勝而傷血也物裂曰璺物因風而破裂也疹疹也風氣入於膈中在上則痛於心在下則痛於腹也土主成物土氣傷故其谷不登上應歲星光芒倍大帝曰善願聞其時也謂四時亦有五運之勝復也至真要大論曰初氣終三氣天氣主之勝之常也四氣至終氣地氣主之復之常也蓋五運主歲所勝之氣在歲半以前所復之氣在歲半以後若夫四時之勝復隨所主之時以勝之亦隨所主之時以復之與歲運之不同故帝有此問岐伯曰悉哉問也木不及春有鳴條律暢之化則秋有霧露清涼之政春有慘淒殘賊之勝則夏有炎暑燔爍之復其眚東其臟肝其病內舍胠脅外在關節一歲之中有歲運之勝復有四時之勝復知歲與時而運始詳悉故伯曰悉哉問也木不及則金當勝之如春有鳴條律暢之化則秋有霧露清涼之政此各守四時之本位無勝無復氣之和者也如春有慘淒殘賊之勝則夏有炎暑燔爍之復其災眚當主於東方其臟在肝其病內舍胠脅肝之分也外在關節肝主筋也餘四時同義張玉師曰不及謂歲運之不及歲運不及必有勝有復如得時氣之和則無勝復矣火不及夏有炳明光顯之化則冬有嚴肅霜寒之政夏有慘淒凝冽之勝則不時有埃昏大雨之復其眚南其髒心其病內舍膺脅外在經絡水不勝火則火有明顯之德化矣無勝則無復冬得以章其寒肅之政令矣不時四時也埃昏大雨之復土覆水也其災眚當主在南方其臟為心其病內舍膺脅膺胸之內心之分也外在經絡心主血脈也土不及四維有埃云潤澤之化則春有鳴條鼓拆之政四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維其臟脾其病內舍心腹外在肌肉四肢埃云潤澤土之德化也鳴條鼓拆木之政令也此氣之和平無勝復也振拉飄騰木淫而勝土也肅殺霖霪秋金之復也土王四時故曰四維曰不時心者胃脘之分腹者脾土之郛郭也徐振公曰四維者乾坤艮巽之方蓋東南西北水火木金之正位土王四季月故在四維金不及夏有光顯鬱蒸之令則冬有嚴凝整肅之應夏有炎爍燔燎之變則秋有冰雹霜雪之復其眚西其臟肺病內舍膺脅肩背外在皮毛雹音薄光顯鬱蒸火之化也六元正紀大論曰少陽所至為火生終為蒸溽此德化之常也膺胸之內肺之分也脅內乃雲門天府之分肺脈之所出肩背肺俞之分皮毛肺所主也水不及四維有湍潤埃云之化則不時有和風生髮之應四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北其臟腎其病內舍腰脊骨髓外在溪谷踹膝水不及則土勝之湍潤埃云土之德化也和風生髮木之和氣也埃昏驟注土之淫勝也飄蕩振拉風木之復也腰脊者腎之府骨髓者腎所主溪谷者骨所屬踹膝者腎脈之所循也夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此長生化成收藏之理氣之常也失常則天地四塞矣夫五運陰陽之政令猶權衡之平高而亢者必有所抑因太過也卑而下者必有所舉因不及也德化者四時應之變易者隨時復之此生長化收藏之理四時之常氣也失常則天地四時之氣皆閉塞矣故曰天地之動靜神明為之紀陰陽之往復寒暑彰其兆此之謂也應天之氣動而不息應地之氣靜而守位神明者九星懸朗七曜周旋也此承上文而言盛衰勝復即天地之動靜生長化收藏即陰陽之往復動靜不可見有神明之紀可察陰陽不可測有寒暑之兆可知此天地陰陽之道也帝曰夫子之言五氣之變四時之應可謂悉矣夫氣之動亂觸遇而作發無常會卒然災合何以期之岐伯曰天地之動變固不常在而德化政令災變不同其候也帝曰何謂也岐伯曰東方生風風生木其德敷和其化生榮其政舒啓其令風其變振發其災散落南方生熱熱生火其德彰顯其化蕃茂其政明曜其令熱其變銷爍其災燔焫中央生濕濕生土其德溽蒸其化豐備其政安靜其令濕其變驟注其災霖潰西方生燥燥生金其德清潔其化緊斂其政徑切其令燥其變肅殺其災蒼隕北方生寒寒生水其德淒滄其化清謐其政凝肅其令寒其變凜冽其災冰雹霜雪是以察其動也有德有化有政有令有變有災而物由之而人應之也此節復論五運四時之氣有德化之常有災眚之變必察其動而後知之蓋言太過之歲有淫勝不及之歲有勝復此歲運之常可與之期者也然五運之氣生於五方五方之氣合於四時在歲運雖有淫勝郁復之變在四時又有德化政令之和與歲運不同其候也故必察其氣之動也是德是化是政是令是變是災萬物由之而或成或敗人應之而或病或康此氣運之有歲有時有常有變又不能於先期而必者也帝曰夫子之言歲候其太過不及而上應五星今夫德化政令災眚變易非常而有也卒然而動其亦為之變乎此承上文而言歲運之太過不及必上應五星今云德化政令災眚變易又非一定常有之氣如卒然而為德化政令卒然而為災眚變易其於五星亦為之變乎岐伯曰承天而行之故無妄動無不應也卒然而動者氣之交變也其不應焉故曰應常不應卒此之謂也此言五星之應歲運而不應時氣之卒變也承天者謂五運之氣上承天干之化運承天運而行之故無妄動無不上應於五星也卒然而動者乃四時氣交之變也其不上應於五星焉故曰應常不應卒此之謂也常者謂五運主歲有太過不及之氣有淫勝郁復之常卒者謂五方四時之氣卒然而為德化政令卒然而為災眚變易也張玉師曰四時之氣生於五方五方之氣在地五行之氣也因時氣而變歲氣者地氣之變易天氣也帝曰其應奈何岐伯曰各從其氣化也氣化者五運之化氣也甲己運化土乙庚運化金丙辛運化水丁壬運化木戊癸運化火五陽年主太過五陰年主不及而各上應乎天之五行帝曰其行之徐疾逆順何如謂五星之行徐行疾順行逆行也岐伯曰以道留久逆守而小是謂省下道五星所行之道路也留久稽留而延久也逆守逆而不進守其度也小者光芒不露也省下謂察其分野之下君民之有德有過也以道而去去而速來曲而過之是謂省遺過也謂既去而復速來委曲逡巡而過其度也省遺過謂省察有未盡而復省其所遺之過失也久留而環或離或附是謂議災與其德也久留者守其位而不去也環回環旋轉也或離或附欲去不去也議災與德者謂君民之有過者議降之以災有德者議降之以福也應近則小應遠則大應謂禍福之應遠近謂分野之遠近也芒而大倍常之一其化甚大常之二其眚即也小常之一其化減小常之二是謂臨視省下之過與其德也德者福之過者伐之芒五星之光芒也化謂淫勝郁復之氣化也如勝復之氣盛則上應之星光倍常而大勝復之氣減則上應之光芒倍常而小若光芒之大倍於平常之二其災眚即至也若小於平常之二倍是謂臨視謂臨上而視下省察其君民之有德者降之以福有過者伐之以災玉師曰居高視卑故臨視之星小常之二是以象之見也高而遠則小下而近則大故大則喜怒邇小則禍福遠星高而遠則星之象小星下而近則星之象大喜怒者星象之有喜有怒也君民有德星象喜之君民有過星象怒之禍福者所降之禍福也光芒倍大其眚即也留守而小欲君民之省過也首言星象之大小應分野之遠近次言星象之大小因勝復之甚減末言星象之大小應禍福之疾遲歲運太過則運星北越運星北越謂十二年天符之歲運氣之更盛者也運星主歲之星北越謂越出本度而近於北也北乃太乙所居之宮北越而與天樞相合故又名曰太乙天符運氣相得則各行其道運氣相得者謂木運臨卯火運臨午土運臨四季金運臨酉水運臨子此運氣與歲氣相得乃平氣之年是以運星各自行其本度而無侵凌之盛強故歲運太過畏星失色而兼其母不及則色兼其所不勝此承上文而言如歲運太過則主歲之星不守其度而侵侮其所不勝是以畏星失色也如歲木太過則歲星乘所不勝之土而鎮星失色矣如歲土太過則鎮星乘所不勝之水而辰星失色矣兼其母者謂畏星之母亦兼失其色蓋畏星之母即勝星之子謂亢則害而不能生化其子氣也如不及之歲則所不勝之星亦兼見其色如歲木不及則所勝之太白增光而所不勝之土氣無畏其鎮星亦兼見其色矣五運相同肖者瞿瞿莫知其妙閔閔之當孰者為良肖取法也瞿瞿卻顧貌謂取法星象之吉凶莫能知其微妙閔閔多憂也憂瞻星象喜怒燥澤之當當以孰法為良蓋甚言其星象之不易占也妄行無徵示畏侯王不求良法而妄言占象則所言之吉凶皆無徵驗矣反以禍福之說而示畏於侯王此言天官家之不學無術帝曰其災應何如岐伯曰亦各從其化也故時至有盛衰凌犯有逆順留守有多少形見有善惡宿屬有勝負徵應有吉凶矣災應謂五星之變下應民物之災眚各從其五運之氣化也五星之應時而至有盛有衰彼此凌犯有順有逆留守之日有多有少所見之象有喜潤之善有憂怒之惡五宿之屬有勝星之勝有畏星之負下應於君民有福德之吉有災病之凶帝曰其善惡何謂也岐伯曰有喜有怒有憂有喪有澤有燥此象之常也必謹察之王冰曰五星之見也從夜深見之人見之喜星之喜也見之畏星之怒也光色微曜乍明乍暗星之憂也光色迥然不彰不瑩不與衆同星之喪也光色圓明不盈不縮怡然瑩然星之喜也光色勃然臨人芒彩滿溢其象凜然星之怒也澤光潤也燥乾枯也班固曰五行精氣其成形在地則結為木火土金水其成象在天則木合歲星居東火合熒惑居南金合太白居西水合辰星居北土合鎮星居中央分旺四時則春木夏火秋金冬水各王七十二日土王四季辰戌丑未之月各十八日合之為三百六十日其為色也則木青火赤金白水黑土黃其為分野各有歸度旺相休廢其色不同旺則光芒相則內實休則光芒無角不動搖廢則光少色白園者喪赤園者兵青園者夏水黑園者疾多死黃園者吉白角者哭泣之聲赤角者犯我城黑角者水行窮兵太史公曰五星同色天下偃兵百姓安寧五穀蕃昌春風秋雨冬寒夏暑日不食朔月不食望是為有道之國必有聖人在乎其位也帝曰六者高下異乎岐伯曰象見高下其應一也故人亦應之此言六者之象雖高遠而小下近而大其應一也故人應之而為吉凶禍福亦無有分別也帝曰善其德化政令之動靜損益皆何如岐伯曰夫德化政令災變不能相加也王冰曰天地動靜陰陽往復以德報德以化報化政令災眚及動復亦然故曰不能相加也勝復盛衰不能相多也王冰曰勝盛復盛勝微復微故曰不能相多也往來大小不能相過也太過為大年不及為小年有餘而往不足隨之不足而往有餘從之故曰不能相過也用之升降不能相無也用謂陰陽氣之為用也天地陰陽之氣升已而降降已而升寒往則暑來暑往則寒來故曰不能相無也各從其動而復之耳謂勝復之往來陰陽之升降各從其氣之動而復之六微旨大論曰成敗倚伏生乎動動而不已則變作矣帝曰其病生何如岐伯曰德化者氣之祥政令者氣之章變易者復之紀災眚者傷之始此言病生於變易也歲氣之有德有化乃氣之和祥也有政有令乃氣之彰著也變易者報復之紀災眚者乃民病所傷之始氣相勝者和不相勝者病重感於邪則甚也氣謂變易之氣按六節臟象論曰變至則病所勝則微所不勝則甚因而重感於邪則死矣故非其時則微當其時則甚也蓋謂春時變長夏之氣長夏變冬氣冬變夏熱之氣夏變秋氣秋變春氣所謂得五行時之勝乃時氣相勝變氣故為和平如歲木不及歲金太過春時反變為肅殺如歲火不及歲水太過夏時而反寒氣流行是時氣與變氣不相勝則病矣故非其所勝之時則微當其所勝之時則甚也重感於邪者謂四時不正之邪也帝曰善所謂精光之論大聖之業宣明大道通於無窮究於無極也余聞之善言天者必應於人善言古者必驗於今善言氣者必彰於物善言應者同天地之化善言化言變者通神明之理非夫子孰能言至道歟精光之論論神明之理也大聖之業通於無窮者上以治民下以治身德澤下流傳之後世無有終時也易曰知變化之道者其知神之所為乎乃擇良兆而藏之靈室每旦讀之命曰氣交變非齊戒不敢發慎傳也靈室靈蘭祕室蓋天地陰陽之道上帝之貴也非齊戒不敢發敬謹之至恐傳非其人慢泄天寶也五常政大論篇第七十言五運有政令之常有常而後有變黃帝問曰太虛寥廓五運回薄衰盛不同損益相從願聞平氣何如而名何如而紀也太虛謂空冥之境寥廓幽遠也回薄旋轉也盛衰太過不及也有盛衰則損益相從矣平氣乃歲會之紀氣之平者也徐振公曰五運之始蒼黅丹素元之氣絪縕於大虛之間故曰太虛寥廓五運回薄岐伯對曰昭乎哉問也木曰敷和火曰升明土曰備化金曰審平水曰靜順此言五運之平氣而各有紀名也東方生風風生木木得其平則敷布陽和之氣以生萬物火性炎上其德顯明土主化物而周備於四方金主肅殺得其和平不妄刑也水體清靜性柔而順帝曰其不及奈何岐伯曰木曰委和火曰伏明土曰卑監金曰從革水曰涸流此言五運不及而各有紀名也木氣不及則不能敷布陽和而痿弱矣火氣不及則光明之令不升而下伏矣土氣不及則卑下堅守而不能周備於四方矣金性本剛不及則從火化而變革矣水氣不及則源流乾涸矣帝曰太過何謂岐伯曰木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍五運太過亦各有紀名也木氣有餘發生盛也赫曦光明顯盛之象敦厚阜高也金體堅剛用能成物衍滿而溢也帝曰三氣之紀願聞其候岐伯曰悉乎哉問也敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其類草木其政發散其候溫和其令風其臟肝肝其畏清其主目其谷麻其果李其實核其應春其蟲毛其畜犬其色蒼其養筋其病裡急支滿其味酸其音角其物中堅其數八紀年也三氣謂平氣之與太過不及也木之平運是為敷和木德周行則陽氣舒而陰氣布蓋生長化收藏之五氣先由生氣之宣布生氣和則五氣皆平矣端正直也隨柔順也曲直木之體用也生榮木之生化也類物類也發生散蔓木布之政也溫和春之候也在天之風氣木之號令也其在臟為肝畏清者木畏金也在竅為目在谷為麻麻體象木其色蒼也在果為李色青而味酸也核內有仁仁分兩片木之生原也毛蟲如草木之森叢而生於草木者也犬性勇往直前感春生怒發之氣也肝主筋故其養在筋裡急支滿肝之病也角木音也木生於水為堅多心故其物主中堅八者木之成數也升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其類火其政明曜其候炎暑其令熱其髒心心其畏寒其主舌其穀麥其果杏其實絡其應夏其蟲羽其畜馬其色赤其養血其病瞤瘛其味苦其音徵其物脈其數七火位南方故正陽而治火主陽氣故德施周普陽和之氣四布五化俱以均平皆感火之化也火氣炎上故其氣高火性動急故性速也燒炙曰燔灼火之用也萬物蕃茂夏長之化也凡在地之火皆與之同類明曜火布之政也炎暑夏之候也在地為熱火之令也在臟為心心其畏寒火畏水也心開竅於舌麥乃夏成之谷也杏色赤而味苦絡者果實之脈絡也羽蟲飛翔而上感火氣之生也馬屬午火之畜也心主血脈故其養在血瞤瘛動掣也經脈感火氣而縮急也徵火之音苦火之味脈物之脈絡也七火之成數也備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其類土其政安靜其候溽蒸其令濕其臟脾脾其畏風其主口其谷稷其果棗其實肉其應長夏其蟲倮其畜牛其色黃其養肉其病痞其味甘其音宮其物膚其數五協合也天主生地主成土氣和平合天之休美而化生萬物也土德流於四方而五化齊修矣平夷土之氣柔順土之性也高下者土之體或高或下或備其化土之用也豐厚滿溢濕土之化也五方五土與之同類安靜而化土之政也溽蒸長夏之候也在天為濕土之令也其在臟主脾畏風者木乃土之勝也脾開竅於口稷黅谷也棗色黃而味甘肉果實之肉也倮蟲肉體之蟲牛土之畜也脾主肌肉故其養在肉痞者脾病於中而上下之氣不交也宮音中土之音膚物之膚肉也五乃土之生數六元正紀大論曰土常以生也審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其類金其政徑肅其候清切其令燥其臟肺肺其畏熱其主鼻其谷稻其果桃其實殼其應秋其蟲介其畜雞其色白其養皮毛其病咳其味辛其音商其物外堅其數九金兵象也金氣和平故收而不爭天地之氣春生秋殺殺而無犯不殘害於物也金氣清肅故五化得之咸有宣明潔白金之氣也剛堅金之性也萬物散落金之用也其氣收斂秋之化也五金之類與之同類堅徑肅清金之政也清切秋之候也在天為燥金之令也其臟為肺肺畏熱者金畏火也肺開竅在鼻稻乃秋成之谷也桃色白而有毛肺之果也堅殼之實介甲之蟲皆感堅剛之氣而生也雞性善鬥感肅殺之氣也肺主皮毛故其養在皮毛咳者肺之病也商主西方之音辛乃金之味也其於萬物咸如實殼蟲介之外堅九乃金之成數也靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其類水其政流演其候凝肅其令寒其臟腎腎其畏濕其主二陰其谷豆其果栗其實濡其應冬其蟲鱗其畜彘其色黑其養骨髓其病厥其味鹹其音羽其物濡其數六水之平運是謂靜順夫萬物得生長之氣而茂盛水運和平故雖主臟而不害於物也整齊也平治而善下故五氣感之而咸整也天一生水故其氣高明水性就下故性下也沃灌溉也衍滿溢也萬物凝堅臟氣之化也大地之水與之同類流演不竭水之政也凝肅冬之候也在天為寒水之令也在臟為腎腎其畏濕水畏土也腎開竅於二陰豆乃水之谷也栗色黑味鹹腎之果也濡者實中之有津液者也鱗蟲水中之所生彘豕也腎主骨髓故其養在骨髓厥逆也蓋腎為生氣之原故病則手足厥冷也羽音屬水六乃水之成數也故生而勿殺長而勿罰化而勿制收而勿害藏而勿抑是謂平氣是以木運之歲得生氣而無金氣之肅殺火運之歲得長氣而無水氣之克罰土運之歲得化氣而無木氣之制勝金運之歲得收氣而無火氣之賊害木運之歲得臟氣而無土氣之遏抑是謂平氣之歲也委和之紀是謂勝生生氣不政化氣乃揚長氣自平收令乃早涼雨時降風雲並興草木晚榮蒼干凋落物秀而實膚肉內充其氣斂其用聚其動緛戾拘緩其發驚駭其臟肝其果棗李其實核殼其谷稷稻其味酸辛其色白蒼其畜犬雞其蟲毛介其主霧露淒滄其聲角商其病搖動注恐從金化也少角與判商同上角與正角同上商與正商同其病支廢癰腫瘡瘍其甘蟲邪傷肝也上宮與正宮同蕭飋肅殺則炎赫沸騰眚於三所謂復也其主飛蠹蛆雉乃為雷霆緛音軟戾音利飋音瑟木運不及是謂委和則所勝之氣勝其生氣矣金氣勝則木之生氣不能章其政令矣木政不章則土氣無畏而化氣乃揚木衰則火氣不盛故長氣自平金氣盛故收令乃早也涼為金化風為木化雲雨為土化此以木運不及故兼有金土之化也生氣不政故草木晚榮收令乃早故蒼干刑落化氣與秋成之氣專令是以物秀而實膚肉內充收斂金之氣也生聚木之用也動者病機動於內發者證發於外也緛短縮也戾了戾也拘拘急也緩不收也皆筋之為病也金匱真言曰東方肝木其病發驚駭其臟主肝其果之棗李實之核殼谷之稷稻味之酸辛色之蒼白畜之犬雞蟲之毛介聲之角商因木運不及故兼從金土之化也其主霧露淒滄金之勝也其病搖動注恐肝之病也此從金化故也判半也少角與判商同者總謂六丁年木運不及之歲也角乃木音木運不及故主少角金兼用事故半與商金同其化也上角與正角同者乃丁巳丁亥二歲上見厥陰司天歲木不及而得司天之助故與敷和之正角同也上商與正商同者乃丁卯丁酉二歲上臨陽明司天故曰上商木運不及半商同化而又值陽明司天則金全用事與審平之正商相同也故其病肢廢癰腫瘡瘍其甘蟲皆金氣盛而邪傷肝也上宮與正宮同者乃丁丑丁未二歲上臨太陰司天故曰上宮歲木不及化氣乃揚而又得司天之助是土得以自專與備化之紀相同故上宮與正宮同也蕭飋肅殺金淫甚也炎赫沸騰火來復也其災眚當主於東方之震位所謂復也蠹生於木飛乃火象言主復者乃木中所生之火也蛆乃蠅之子蛆入灰中脫化為蠅蠅喜暖惡寒晝飛夜伏雉為離禽皆火復之氣化也雷之迅者曰霆木鬱極而火繞之其氣則為雷霆故易曰震為雷伏明之紀是謂勝長長氣不宣臟氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化已老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其髒心其果栗桃其實絡濡其谷豆稻其味苦鹹其色玄丹其畜馬彘其蟲羽鱗其主冰雪霜寒其聲徵羽其病昏惑悲忘從水化也少徵與少羽同上商與正商同邪傷心也凝慘溧冽則暴雨霖霪眚於九其主驟注雷霆震驚沉霒淫雨霒音陰火運不及則水勝其長是以火之長氣不宣而火之臟氣反布火氣伏明則金無所畏故收氣得自主其政火不及則所生之土氣不盛是以化令平衡寒清數舉暑令乃薄水勝火也承土之化氣平衡故物得以生長氣不宣故生而不長生而不長故稚小即已成實遇長夏之化氣即老矣寒清數舉故陽氣屈伏臟氣用事故蟄蟲早藏其氣鬱水制其火也其用暴火性欲發也彰者火之政令也彰伏則變易而為寒矣故其發為痛蓋寒勝則痛也其臟主心其果之栗桃實之絡濡谷之豆稻味之苦鹹色之元丹畜之馬彘蟲之羽鱗聲之徵羽皆火運不及故兼從金水之化也冰雪霜寒水之變易也昏惑悲忘心神不足也因從水化而心火受虧也少徵與少羽同者總謂六癸歲也徵為火音火運不及故曰少徵水兼用事故少徵與小羽同其化也上商與正商同者乃癸卯癸酉二歲上臨陽明司天故曰上商金無所畏而又得司天之助是火運之紀而行審平之政故上商之歲與正商之氣同也金水兼勝邪傷心也凝慘栗冽寒淫甚也暴雨霖霪土來復也災眚當在離位之南方沉黔陰雲蔽日也驟注淫雨土之變也雷霆震驚火鬱發也卑監之紀是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而粃也其氣散其用靜定其動瘍湧分潰癰腫其發濡滯其臟脾其果李栗其實濡核其谷豆麻其味酸甘其色蒼黃其畜牛犬其蟲倮毛其主飄怒振發其聲宮角其病留滿痞塞從木化也少宮與少角同上宮與正宮同上角與正角同其病飧泄邪傷脾也振拉飄揚則蒼干散落其眚四維其主敗折虎狼清氣乃用生政乃辱土運不及則化氣乃減木反勝之是以化氣不能施其令而生政獨彰也木火相生故長氣整化氣不令故雨乃愆期土氣不及故收氣自平木水專令故風寒並興生氣章而長氣整故草木榮美化氣不令故雖秀而不實成而粃也發散木之氣靜定土之用也瘍湧諸證逆於肉理乃生癰腫也濡滯水乘土病也其臟在脾其果李栗其實濡核其谷豆麻其味酸甘其色蒼黃其畜牛犬其蟲倮毛其聲宮角因土運不及故兼從水木之化也飄怒振發木氣勝也留滿痞塞脾氣傷也少宮與少角同者總謂六巳歲也宮為土音土運不及是為少宮木兼用事故少宮與少角同其化也上宮與正宮同者乃己丑己未二歲上臨太陰濕土司天故曰上宮土運不及而得司天之助是少宮之紀行備化之氣故與正宮相同也上角與正角同者謂己巳己亥二歲上臨厥陰司天故曰上角少宮少角之紀而角得司天之助木反獨專故與正角之歲相同也其病飧泄邪傷脾也振拉飄揚木淫甚也蒼干凋落金復木也其災眚當在四維乃乾坤艮巽之方也散折金之用也虎狼西方之獸也辱屈也金氣復而生政始辱從革之紀是謂折收收氣乃後生氣乃揚長化合德火政乃宣庶物以蕃其氣揚其用躁切其動鏗禁瞀厥其發咳喘其臟肺其果李杏其實殼絡其谷麻麥其味苦辛其色白丹其畜雞羊其蟲介羽其主明曜炎爍其聲商徵其病嚏咳鼽衄從火化也少商與少徵同上商與正商同上角與正角同邪傷肺也炎光赫烈則冰雪霜雹眚於七其主鱗伏彘鼠臟氣早至乃生大寒金運不及則收政乃折矣收氣在後則木無所畏而生氣乃揚長化合德故庶物以蕃升揚火之氣也躁切金之用也金主聲鏗禁者聲不出也瞀肺是動病也厥氣上逆也咳喘火刑肺也其臟主肺其果之李杏實之殼絡谷之麻麥味之苦辛色之白丹畜之雞羊蟲之介羽聲之商徵皆金運不及而兼木火之化也明曜炎爍火之勝也嚏咳鼽衄金之病也少商與少徵同者總謂六乙歲也商主金音金運不及故為少商火兼用事故少徵同其化也上商與正商同者乃乙卯乙酉二歲上臨陽明司天故曰上商金運不及而得司天之助則金氣平而不為火勝與審平之氣相同故上商與正商同也上角與正角同者乃乙巳乙亥二歲上臨厥陰司天故曰上角生氣乃揚而又得司天之助故與正角之歲相同也水火相勝故邪傷肺也炎光赫烈火淫甚也冰雪霜雹水來復也其災眚是兌之西方其主鱗伏彘鼠皆水之蟲獸也臟氣早至故乃生大寒涸流之紀是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥槁其臟腎其果棗杏其實濡肉其谷黍稷其味甘鹹其色黅玄其畜彘牛其蟲鱗倮其主埃郁昏翳其聲羽宮其病痿厥堅下從土化也少羽與少宮同上宮與正宮同其病癃閟邪傷腎也埃昏驟雨則振拉摧拔眚於一其主毛顯狐貉變化不藏水寒不及陽反勝之水之藏令不舉土之化令乃昌水令不舉則火無所畏故長氣得以宣布陽熱反盛是以蟄蟲不藏土潤水泉減土勝水也草木條茂榮秀滿盈得長化之氣也濡滯土之氣也滲泄水之用也其動堅止土製水而成積也其發燥槁陰液虛也其臟為腎其果之棗杏實之濡肉谷之黍稷味之甘鹹色之黅元畜之彘牛蟲之鱗倮聲之羽宮因水運不及故兼從火土之化也埃郁昏翳土之勝也痿厥堅下腎之病也此水運不及而反從土化也少羽與少宮同者總謂六辛歲也羽為水音水運不及故曰少羽土兼用事故與少宮同化也上宮與正宮同者謂辛丑辛未二歲上臨太陰司天故曰上宮土兼用事而又得司天之助故少羽之紀反與正宮之歲相同也癃閟邪傷腎而腎氣不化也埃昏驟雨土淫甚也振拉摧拔木氣復也其災眚當在坎之北方毛乃叢聚之象感春森之氣而生狐貉以毛顯而為裘故其主狐貉爾雅曰狐祼獸也善變化管子曰狐白應陰陽之變故乘危而行不速而至暴瘧無德災反及之微者復微甚者復甚氣之常也此總結上文而言五運不及則所勝之氣乘危而行不速而至惟淫勝而無和祥之德以致子來復讎災反及之勝微則復微勝甚則復甚此勝復之常氣也發生之紀是謂啓陳土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啓坼其變振拉摧拔其谷麻稻其畜雞犬其果李桃其色青黃白其味酸甘辛其象春其經足厥陰少陽其臟肝脾其蟲毛介其物中堅外堅其病怒太角與上商同上徵則其氣逆其病吐利不務其德則收氣復秋氣徑切甚則肅殺清氣大至草木凋零邪乃傷肝歲木太過是謂發生啓開陳布也布散陽和發生萬物之象也土得其制化故主疏泄蒼氣木氣也厥陰之上風木治之是以陽和布化於上而陰氣乃隨於下也生氣有餘故萬物感之而榮茂芳美發散木之政也條舒陽和之令也掉眩巔疾風氣淫於上也鳴風木聲也靡散也啓坼即發陳之義應春之氣也振拉摧拔風之變易也其谷之麻稻畜之雞犬果之李桃色之青黃白味之酸甘辛蟲之毛介物之中堅外堅因木氣太盛彼此交相承製而生化也其象應春其經合於足厥陰肝足少陽膽其臟應於肝脾其病怒肝氣盛也太角與上商同者謂氣之太過自有承製有承製則有生化如太角之歲木運太過則金氣承之而所生之谷為稻麻所生之果為李桃其畜雞犬其蟲毛介皆感木金之氣而生化與上商之歲相同也蓋諸壬歲無陽明之上臨故曰太角與上商同如有陽明司天則當云上商與正角同蓋言雖無司天之上臨而有自然之承製也上徵者謂司天上臨少陰君火少陽相火乃壬子壬午壬寅壬申四歲木運有餘而上臨火氣子居母上則其氣逆逆於上則吐逆於下則利也木淫太過則金氣來復秋氣徑切甚則肅殺草木凋零邪乃傷肝赫曦之紀是謂蕃茂陰氣內化陽氣外榮炎暑施化物得以昌其化長其氣高其政動其令明顯其動炎灼妄擾其德暄暑鬱蒸其變炎烈沸騰其穀麥豆其畜羊彘其果杏栗其色赤白玄其味苦辛鹹其象夏其經手少陰太陽手厥陰少陽其髒心肺其蟲羽鱗其物脈濡其病笑瘧瘡瘍血流狂妄目赤上羽與正徵同其收齊其病痓上徵而收氣後也暴烈其政臟氣乃復時見凝慘甚則雨水霜雹切寒邪傷心也歲火太過是謂赫曦長氣盛故草木蕃茂少陰之上君火主之故陰氣內化陽氣外榮炎暑施化司夏令也物得以昌受長氣也夏主長故其化長火氣升故其氣高火性動故其政動火光明故其令明炎灼妄擾者手足燥擾也暄暑鬱蒸氣之和祥也炎烈沸騰極則變易也其谷之麥豆畜之羊彘果之杏栗蟲之羽鱗物之脈濡色之赤白玄味之苦辛鹹交相承製而生化也其象應夏其經合於手少陰心手太陽小腸手厥陰心包絡手少陽三焦四經其髒心者火臟也合於肺者即五臟生成篇之所謂肺之合皮也其榮毛也其主心也之義五臟皆然靈樞經曰心氣實則笑不休本經曰夏傷於暑秋必痎瘧瘡瘍血流狂妄目赤皆火熱之為病也上羽者上臨太陽寒水司天乃戊辰戊戌二歲火運太過得水制之則火氣已平故與升明正徵之相同也火氣平而金不受傷故其收氣得與生長化氣之相平也上羽之歲乃太陽司天痓者太陽之為病也上徵者上臨君相二火乃戊子戊午戊寅戊申四歲火熱更甚故收氣乃後暴烈其政火淫甚也水氣復之故時見凝慘甚則雨水冰雹而心乃受傷也敦阜之紀是謂廣化厚德清靜順長以盈至陰內實物化充成煙埃朦郁見於厚土大雨時行濕氣乃用燥政乃闢其化圓其氣豐其政靜其令周備其動濡積並稸其德柔潤重淖其變震驚飄驟崩潰其谷稷麻其畜牛犬其果棗李其色黅玄蒼其味甘鹹酸其象長夏其經足太陰陽明其臟脾腎其蟲倮毛其物肌核其病腹滿四肢不舉大風迅至邪傷脾也土運太過是謂敦阜土氣盛而化氣布於四方故為廣化厚德清靜土之體也順長以盈火土合化也太陰之上濕土主之故至陰內實物化充成蓋太陰為陰中之至陰陰氣內實而後化成萬物於外煙埃朦郁土之氣也厚土者見於山陵之間也大雨時行濕氣上蒸終為注雨也闢避也夏秋之交濕土主令濕氣盛是以秋之燥氣乃闢圓圓遍也豐盈充也靜者土之政周備土之令也稸聚也濕則濡滯而成積聚也柔潤重淖土之德也震驚崩潰氣之變也其谷之稷麻畜之牛犬蟲之倮毛果之棗李色之黅元蒼味之甘鹹酸皆交相承製而生化也其經合於足太陰脾足陽明胃其臟合於脾腎其腹滿四肢不舉水濕之為病也土氣太過風乃復之則脾反受傷矣堅成之紀是謂收引天氣潔地氣明陽氣隨陰治化燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令鋭切其動暴拆瘍疰其德霧露蕭飋其變肅殺凋零其谷稻黍其畜雞馬其果桃杏其色白青丹其味辛酸苦其象秋其經手太陰陽明其臟肺肝其蟲介羽其物殼絡其病喘喝胸憑仰息上徵與正商同其生齊其病咳政暴變則名木不榮柔脆焦首長氣斯救大火流炎爍且至蔓將槁邪傷肺也歲金太過名曰堅成秋令主收是謂收引天氣潔地氣明金氣清也陽明之上燥氣主之是以陰金治化於上而陽明之氣在下隨之秋主收成故燥行其政物以司成秋主收而長夏主化收氣早布是以化洽不終成者秋之化削者金之氣也肅者金之政鋭切金之令也暴拆筋受其傷瘍疰皮膚之疾也霧露蕭飋氣之祥也肅殺凋零氣之變也其谷之稻黍畜之雞馬果之桃杏蟲之介羽物之殼絡色之白青丹味之辛酸苦交相承製而生化也其象應秋其經合於手太陰肺手陽明大腸其臟合於肺肝其病喘喝胸憑仰息金氣太盛而肺氣實也上徵者上臨少陰少陽二火乃庚子庚午庚寅庚申四歲金氣太過得火制之金氣已平故與審平之正商相同也金氣平故木之生氣不屈得與四氣齊等其病咳火傷肺也肅殺太甚則草木受傷長氣來復以救之是以大火西流而肺反受傷也流衍之紀是謂封藏寒司物化天氣嚴凝藏政以布長令不揚其化凜其氣堅其政謐其令流注其動漂泄沃湧其德凝慘寒氛其變冰雪霜雹其谷豆稷其畜彘牛其果栗棗其色黑丹黅其味鹹苦甘其象冬其經足少陰太陽其臟腎心其蟲鱗倮其物濡滿其病脹上羽而長氣不化也政過則化氣大舉而埃昏氣交大雨時降邪傷腎也謐音密雹音薄水運太過是為流衍冬主閉藏故謂封藏寒氣司化故天氣嚴凝水政以布故火令不揚凜冽寒之化也堅凝寒之氣也謐安靜也流注水之性也漂泄沃湧水注之為病也凝慘寒氛寒氣之和者也冰雪霜雹寒極而變易也其谷之豆稷畜之彘牛果之栗棗蟲之鱗倮物之濡滿色之黑丹黅味之鹹苦甘皆交相承製而生化也其象應冬其經合於足少陰腎足太陽膀胱其臟合於腎心其病脹者水盛而乘土也上羽者謂上臨太陽寒水司天乃丙辰丙戌二歲水氣太盛故火氣不能施化也水政太過則土來復之埃昏濕氣上蒸也氣交者濕氣上升而為云天氣下降而為雨也大雨時降腎反受邪故曰不恆其德則所勝來復政恆其德則所勝同化此之謂也此總結五運之氣如恃強而不恆其德則所勝之氣來復所謂侮反受邪寡於畏也如政令和平各守其理則所勝之氣同化矣同化者即春有鳴條律暢之化則秋有霧露清涼之政是也按上章論五運之氣有餘而往不足隨之不足而往有餘從之太過不及為民病物變上應五星故曰氣交變大論此篇論五運主歲有平氣有太過有不及各主果谷蟲畜草木生物數聲色味生長收藏皆五行政令之常故曰五常政大論運氣七篇大略相同而各有條理學者各宜體認帝曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也夫天有陰陽地有陰陽故論天之五運而復論地之四方左寒右涼左熱右溫者從後天之卦象也蓋後天之卦離南坎北震東兌西以天地開闢而後有四方也岐伯曰陰陽之氣高下之理太少之異也陰陽之氣者謂四方有寒熱之氣高下之形者謂地土有高下之形太少者四象也因四方之氣象而各有異也東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼是以地有高下氣有溫涼高者氣寒下者氣熱精者即天乙所生之精水也天氣包乎下精氣通於天故陰陽應象大論曰天有精地有形蓋天為陽而精為陰陰陽上下之環轉也故精降於下則陽氣升於上是以右熱而左溫陰精奉於上則陽氣藏於下故左寒而右涼西北勢高東南地陷故高者氣寒下者氣熱故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常太少之異耳此復論精氣之從中而上下升降者也適從也適生於寒涼之方陰氣上奉則陽氣下藏故多脹所謂藏寒生滿病也之往也往處於溫熱之方陰氣下降則陽氣上升故多瘡所謂痛癢瘡瘍皆屬於火也故下之則陰精降而陽氣自升故脹者已汗乃陰液汗之則陰液升而陽氣自降故瘡者愈此精氣出入於肌腠之間上下升降一闔一開乃自然之常理人生於天地氣交之中有四方寒熱之異當從其氣而調之自然苛疾不起按精氣上下環轉包乎地之外也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之此精氣之貫乎中也以上二節當與五運行大論合參帝曰其於壽夭何如岐伯曰陰精所奉其人壽陽精所降其人夭陰精所奉之處則元氣固藏故人多壽陽精所降之方則元陽外泄故人多夭曰陰精曰陽精當知地有精而天有精蓋在地為陰在天則為陽也帝曰善其病也治之奈何岐伯曰西北之氣散而寒之東南之氣收而溫之所謂同病異治也西北氣寒寒固於外則熱鬱於內故宜散其外寒涼其內熱東南氣熱則陽氣外泄裡氣虛寒故宜收其元陽溫其中冷所謂為病雖同而治法則異也故曰氣寒氣涼治以寒涼行水漬之氣溫氣熱治以溫熱強其內守必同其氣可使平也假者反之西北之氣寒涼則人之陽熱遏鬱於內故當治以寒涼行水漬之者用湯液浸漬以取汗開其腠理以使陽氣通暢東南之氣溫熱則人之腠理開而陽氣外弛故當治以溫熱強其元陽固守於內是閉者開之開者閉之氣之升長者收而藏之氣之收藏者成而散之必使其氣之和同而始平也如西北之人病寒邪而假熱者又當治以溫熱如東南之人病熱邪而假寒者又當治以寒涼所謂假者反之張玉師曰上節論四方之正氣末句言四方之邪氣帝曰善一州之氣生化壽夭不同其故何也岐伯曰高下之理地勢使然也崇高則陰氣治之汙下則陽氣治之陽勝者先天陰勝者後天此地理之常生化之道也此復論一方之氣而亦有陰陽寒熱之不同也如山陵高阜之地則多陰寒汙下卑濕之地則多陽熱陽勝者四時之氣先天時而至陰勝者四時之氣後天時而至蓋寒暑往來皆從地之出也此地理高下後薄之分陰陽出入之常也生化之道者謂生長化收藏之氣陽氣治之氣多生長陰氣治之氣多收藏徐振公曰此節論中土而兼於四方帝曰其有壽夭乎岐伯曰高者其氣壽下者其氣夭地之小大異也小者小異大者大異高者其氣收藏故多壽下者其氣發越故多夭一州之氣有大小之異也高下之小者小異大者大異異謂壽夭之異故治病者必明天道地理陰陽更勝氣之先後人之壽夭生化之期乃可以知人之形氣矣天道者天之化運也地理者地之四方也陰陽更勝者五運六氣之有太過不及有淫勝郁復也氣之先後者太過者先天不及者後天汙下者先天高厚者後天也明人之壽夭氣之生化乃可以知人之形氣矣靈樞經曰形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭血氣經絡勝形則壽不勝形則夭形充而皮膚緩者則壽形充而皮膚急者則夭平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣帝曰善其歲有不病而臟氣不應不用者何也岐伯曰天氣制之氣有所從也此下三節論天有五運地有五方而又有司天在泉之六氣交相承製者也歲有不病者不因天之五運地之五方而為病也臟氣者五臟之氣應合五運五行不應不用者不應五運之用也此因司天之氣制之而人之臟氣從之也按司天在上在泉在下五運之氣運化於中此節論五運主歲有司天之氣以制之而反上從天化下節論司天在泉之氣主生育蟲類而五運有相勝制以致不育不成後節論五運之氣主生化蕃育而少陽在泉則寒毒不生陽明在泉則濕毒不生太陰在泉則燥毒不生乃上中下之交相貫通五六之互為承製理數之自然也帝曰願卒聞之岐伯曰少陽司天火氣下臨肺氣上從白起金用草木眚火見燔焫革金且耗大暑以行咳嚏鼽衄鼻窒口瘍寒熱胕腫按金平之紀其臟肺其色白其類金皆五運五行之用也上從者因司天之氣下臨畏其勝制而從之也蓋五運之氣根於中而運於外司天之氣位於上而臨於下肺氣上從白起金用皆上從司天之氣而不為五運之所用金用於上則草木眚於下金從火化則變革而且耗咳嚏鼽衄鼻窒皆肺病也尸瘍寒熱胕腫火熱證也此金之運氣而反從火化者也此論運氣上從天化與天刑歲運少有分別風行於地塵沙飛揚心痛胃脘痛厥逆膈不通其主暴速少陽司天則厥陰在泉故風行於地風勝則動故塵沙飛揚靈樞經曰厥陰心包絡所生病者心痛煩心胃脘痛者木剋土也土位中央中膈不通則上下厥逆也風氣迅速故其主暴速按此章重在天氣制之臟氣上從有司天則有在泉故兼論其在泉之氣陽明司天燥氣下臨肝氣上從蒼起木用而立土乃眚淒滄數至木伐草萎脅痛目赤掉振鼓栗筋痿不能久立立者木之體也蓋言五行之體在地而其用上從於天木從天化故下為土眚金氣下臨故木伐草萎脅痛目赤振掉筋痿皆肝木之病暴熱至土乃暑陽氣鬱發小便變寒熱如瘧甚則心痛火行於槁流水不冰蟄蟲乃見陽明司天則少陰君火在泉故暴熱至而土乃暑也郁長也陽熱甚故小便變而寒熱如瘧所謂夏傷於暑秋必痎瘧也心痛者火淫於內也槁草木枯槁也謂火行於草木枯槁之時故流水不冰而蟄蟲不藏也張玉師曰在泉之氣主歲半以後故先言長夏之土土而秋秋而冬也太陽司天寒氣下臨心氣上從而火且明丹起金乃眚寒清時舉勝則水冰火氣高明心熱煩嗌乾善渴鼽嚏喜悲數缺熱氣妄行寒乃復霜不時降善忘甚則心痛火者火之體明者火之用也寒氣下臨臟氣上從火性炎上水性潤下是以火性高明於上而水寒冰凝於下也夫在地為水在天為寒火氣妄行於上故霜寒以復之心熱煩嗌乾善渴火炎於上也肺者心之蓋鼽嚏善悲火熱爍金也火為陽水為陰數缺者陽引而上陰引而下也善忘者寒復而神氣傷也土乃潤水豐衍寒客至沉陰化濕氣變物水飲內稸中滿不食皮𤸷肉苛筋脈不利甚則胕腫身後癰𤸷音頑太陽司天則太陰濕土在泉故土乃潤水豐衍者土能制水也按辰戌之歲太陽司天則寒水之客氣加臨於三之氣濕土之主氣主於四之氣故曰寒客至沉陰化謂長夏之交水濕相合無火土之長化是以濕氣變物也稸積蓄𤸷痹也水飲中滿皮痹肉苛皆水濕之為病也身後癰者癰發於背也本經曰諸癰腫者寒氣之變也太陽寒水主氣而經脈循於背故為身後腫厥陰司天風氣下臨脾氣上從而土且隆黃起水乃眚土用革體重肌肉萎食減口爽風行太虛雲物搖動目轉耳鳴土平之紀其類土其臟脾其色黃土且隆者土體豐厚於下也黃起者土用上從於天也土從水化則受其勝制故土用變革而為體重食減之脾病也目轉耳鳴風淫於上也張玉師曰風行太虛土用革者謂風斯在上而土格於下也勝則水冰火氣高明者謂火氣上炎而水凝於下也蓋五行之體在地而五行之氣在天故雖司天下臨臟氣上從而五行又各有從上從下之性故有下臨上從之太過者有風下黃起之氣交者火縱其暴地乃暑大暑消鑠赤沃下蟄蟲數見流水不冰其發機速厥陰風木司天則少陽相火在泉木火相生故火縱其暴地乃暑者太陰濕土亦暑熱也赤沃下者雖沃若之木葉亦焦赤而下落矣至冬令嚴藏之時而蟄蟲不見流水不冰火性速而少陽主樞故其發機速玉師曰火從其暴地乃暑長夏之時也赤沃下秋令也蓋亦從夏而秋秋而冬也少陰司天熱氣下臨肺氣上從白起金用草木眚喘嘔寒熱嚏鼽衄鼻窒大暑流行甚則瘡瘍燔灼金爍石流草木眚大暑流行熱甚於春夏也金爍石流熱淫於秋冬也意言司天之氣雖主歲半以前而又統司一歲在泉之氣止司歲半以後故曰風行於地曰土乃暑曰濕氣變物皆從長夏而起運也地乃燥淒滄數至脅痛善太息肅殺行草木變少陰司天則陽明燥金在泉故地乃燥淒滄數至清肅之氣也脅痛善太息肝膽之病也肅殺行則草木變太陰司天濕氣下臨腎氣上從黑起水變埃冒雲雨胸中不利陰痿氣大衰而不起不用當其時反腰脽痛動轉不便也厥逆黑起水變用行而體變也埃冒雲雨濕土之氣化也胸中不利水氣上乘也陰痿者腎氣衰於下也夫陽氣生於腎陰而運用於膚表腎氣大衰故陽氣不起不用陽氣不起則手足為之厥逆當其冬令之時腎臟主氣而反腰脽痛動轉不便因腎氣上從而大衰於下也地乃藏陰大寒且至蟄蟲早附心下痞痛地裂冰堅少腹痛時害於食乘金則止水增味乃咸行水減也太陰司天則太陽寒水在泉故地乃藏陰而蟄蟲早附也心下痞者上下水火之氣不交也地裂冰堅者寒水之變易也少腹病者腎病於下也時害於食者水上乘土也夫腎為本肺為末皆積水也乘金則止者水氣上乘於肺則止耳夫心氣通於舌心和則知五味水增味乃咸者水盛而上乘於心也此水氣太過之為病故行水則病減也以上論五運之氣因天氣制之而五臟五行之氣反從之而上同天化也張介賓曰五行各有所制制氣相加則受制者不得不應應則反從其化而為用矣如熱甚者燥必隨之此金之從火也燥甚者風必隨之此木之從金也風甚者塵霾隨之此土之從木也濕蒸甚者霖注隨之此水之從土也陰凝甚者雷電隨之此火之從水也故易曰云從龍風從虎夫龍得東方木氣故云從之云者土氣也虎得西方金氣故風從之風者木氣也此承製相從之理不可不知帝曰歲有胎運不育治之不全何氣使然岐伯曰六氣五類有相勝制也同者盛之異者衰之此天地之道生化之常也此論司天在泉之六氣主胎育蟲類而五運有相勝制是以所主之不全也五類者五運之氣與五行生物之同類也如五運六氣之相同者則所主之生物蕃盛如五運六氣之相異者則所主之生物衰微此天地之道生化之常也玉師曰異則有勝制故主衰微故厥陰司天毛蟲靜羽蟲育介蟲不成厥陰司天則少陽在泉故主毛蟲靜而羽蟲育靜謂安靜而能長成育生育也介蟲不成謂癸巳癸亥歲受火運之勝制而金類之蟲不成也按毛蟲三百六十而麟為之長羽蟲三百六十而鳳為之長倮蟲三百六十而人為之長鱗蟲三百六十而龍為之長介蟲三百六十而龜為之長五類之蟲於天地之生物備矣玉師曰司天之氣主歲半以前故主靜而長成在泉之氣主歲半以後故始生育也在泉毛蟲育倮蟲耗羽蟲不育厥陰在泉故主毛蟲育木勝土故主倮蟲耗下文曰地氣制已勝是也羽蟲不成謂丙寅丙申歲受水運之勝制故火類之蟲不育少陰司天羽蟲靜介蟲育毛蟲不成少陰司天則陽明在泉故主羽蟲靜而介蟲育毛蟲不成謂庚子庚午歲受金運之勝制是以木類之蟲不成在泉羽蟲育介蟲耗不育少陰在泉故主羽蟲育地氣制己勝故主介蟲耗少陰在泉乃陽明司天之歲如癸卯癸酉歲受火運之勝制當至介蟲不育故曰介蟲耗不育蓋謂耗則所勝微不育則勝制甚故下文曰諸乘所不成之運則甚謂受五運之所乘制以致不育不成乃勝制之甚者也太陰司天倮蟲靜鱗蟲育羽蟲不成太陰司天則太陽在泉故主倮蟲靜而鱗蟲育如辛丑辛未歲受水運之勝制則火類之蟲不成在泉倮蟲育鱗蟲不成太陰在泉故主倮蟲育制己所勝當主鱗蟲耗如甲辰甲戌歲受土運之勝制當主鱗蟲不成按太陰濕土司天太陽寒水在泉寒濕相合而無生長之氣故不曰耗而總曰不成金西銘曰鱗蟲生育於歲半以前不能長成於歲半以後少陽司天羽蟲靜毛蟲育倮蟲不成少陽司天則厥陰在泉故主羽蟲靜而毛蟲育倮蟲不成者謂壬寅壬申歲受木運之勝制而土類不成也在泉羽蟲育介蟲耗毛蟲不育少陽在泉故主羽蟲育制己所勝故主介蟲耗如乙巳乙亥歲受金運之勝制則木類之蟲不育陽明司天介蟲靜羽蟲育介蟲不成陽明司天則少陰在泉故主介蟲靜而羽蟲育如癸卯癸酉歲受火運之勝制則金類之蟲不成在泉介蟲育毛蟲耗羽蟲不成陽明在泉故主介蟲育制己所勝故主毛蟲耗如逢丙子丙午歲受水運之勝制則火類之蟲不成太陽司天鱗蟲靜倮蟲育太陽司天則太陰在泉故主鱗蟲靜而倮蟲育在泉鱗蟲耗倮蟲不育太陽寒水在泉乃太陰濕土司天水濕合化則土不能制水矣耗散也鱗蟲耗者土崩潰而鱗見於陸也如丁丑丁未歲受木運之勝制則土類之蟲不成諸乘所不成之運則甚也此總結上文而言諸乘所不成之運氣則勝制之甚也金西銘曰經文止曰不成今師疏出運氣有相勝制恐與經義不合歟曰參究經旨貴在精微若云順文訓釋何異糠粕中塵垢誠觀厥陰司天則勝己之蟲不成少陰太陰司天則生我之蟲不成少陽司天則我生之蟲不成陽明司天則曰介蟲靜又曰介蟲不成奚既靜而又不成耶太陽司天不曰某蟲不成要知太陰少陰司天亦可以我生之蟲不成少陽司天亦可以生我之蟲不成陽明司天逢歲運之勝制故雖育而不成太陽司天或值天符之歲則無不成之蟲六氣之中皆可互相推轉書不盡言言不盡意當於錯綜中求之其義自得再按六元正紀大論曰五運之化或從天氣而逆地氣或從地氣而逆天氣如戊寅戊申歲以火運而值少陽司天是從天氣而逆地氣矣如癸巳癸亥歲以火運而值少陽在泉是從地氣而逆天氣矣從天氣則無有不成之蟲逆地氣則當介蟲不育從地氣則當羽蟲育逆天氣則當介蟲不成以五運之從逆合六十年推之五類之不育不成始備故氣主有所制歲立有所生氣主者謂五運為五氣之主歲立者謂歲半以前天氣主之歲半以後地氣主之司天在泉之六氣以立歲六氣有所生而五運有所制故有不育不成地氣制己勝天氣制勝己天制色地制形五類衰盛各隨其氣之所宜也故有胎孕不育治之不全此氣之常也地氣制己勝者如厥陰在泉倮蟲耗少陰在泉介蟲耗制己所勝之蟲類故曰地制形六元正紀大論曰天氣不足地氣隨之地氣不足天氣隨之運居於中而常先也是五運之氣運化於天地之中而常先勝於司天在泉之氣者也上文曰少陽司天火氣下臨白起金用陽明司天燥氣下臨蒼起白用是司天之氣又能制勝己之運氣而使白起丹起蒼起黃起故曰天制色此皆五運六氣之各有制各有勝各有生各有成五類衰盛各隨其氣之所宜故有胎孕不育治之不全此勝制之常也所謂中根也根於外者亦五故生化之別有五氣五味五色五類五宜也此言五運之氣根於中而生化氣味色類之於外也夫蒼黅丹素元之氣經於五方之分生化五行以應生長化收藏之五氣故所謂中根也猶根本之於枝葉根於中而生髮於外也根於外者謂天地陰陽之氣以生育草木昆蟲而草木昆蟲皆有五者之氣味色類仍本於五行之所生故曰生化之別有五氣五味也五類五宜者謂五類之蟲各有五行氣之所宜也玉師曰天之五氣生化五行地之五行復生三陰三陽之六氣是以司天在泉生育蟲類仍本於五氣之所化帝曰何謂也岐伯曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶故各有制各有勝各有生各有成故曰不知年之所加氣之同異不足以言生化此之謂也此復申明五運之氣運化於天地之中司天在泉之氣循行於天地之外各有制勝有生成交相承製者也神者陰陽不測之謂機者五運之旋機也神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水出入於天地之間而為生物之生長壯老已故曰根於中者命曰神機神去則機息矣氣立者謂天地陰陽之氣上下升降為萬物之生長化收藏故曰根於外者名曰氣立氣止則化絶矣此天地五行之氣升降出入動而不息各有勝制各有收成萬物由之人氣從之故不知五運六氣之臨御太過不及之異同不足以言生化矣按上文曰歲立此節曰氣立蓋謂司天在泉之氣以立歲也六氣包乎地之外而通貫於地之中故曰根於外帝曰氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也然而五味所資生化有薄厚成熟有少多終始不同其故何也岐伯曰地氣制之也非天不生地不長也此論五運之氣主生化萬物而受在泉之氣以制之非天地之不生長也氣謂五運之化氣氣始而生化者得生氣也氣散而有形者得長氣也氣布而蕃育者得化氣也氣終而象變者感收藏之氣物極而變成也此五運之氣主生長化收藏自始至終其致一也資助也夫化生五味五味所資者以五運所化之味而反資助其地氣也蓋言五運之氣主生化而因地氣以制之是以生化有厚薄成熟有多少也倪仲宣曰地氣制之謂在泉之六氣也天地之氣乃陰陽寒暑之氣故曰非天不生地不長也帝曰願聞其道岐伯曰寒熱燥濕不同其化也故少陽在泉寒毒不生其味辛其治苦酸其谷蒼丹寒熱燥濕乃司天在泉之六氣與五運不同其化是以五運所主之生化蕃育因地氣以制之致有厚薄多少也毒獨也謂獨寒獨熱之物類則有偏勝之毒氣矣少陽相火在泉故寒毒之類不生寒熱不同其化矣如辛巳辛亥歲寒水化運值少陽在泉地氣制之以致寒毒不生乃地氣制勝其化運也夫五色五味五運之所主也如少陽司天則白起金用是色從天制所謂天制色也少陽在泉其味辛是味從地制所謂地制形也此化運之色味因司天在泉之勝制畏而從之故曰五味所資謂化運之五味反資助其地氣也治主治也少陽在泉則厥陰司天故所主之苦酸其谷主蒼丹者成熟從天地之氣而不從運化也按審平之紀其色白其味辛如值少陽司天則白色反從天化少陽在泉則辛味反資地氣是天地之氣勝制其運氣也如厥陰司天介蟲不成厥陰在泉羽蟲不育是五運之氣勝制其司天在泉也故曰各有制各有勝各有生各有成謂五運六氣各有生成如逢勝制則不生不成矣陽明在泉濕毒不生其味酸其氣濕其治辛苦甘其谷丹素陽明燥金在泉是以濕毒之物類不生酸木味也敷和之紀其色蒼其味酸如值壬子壬午之歲陽明在泉地氣制之而木運之味反從地化故其味主酸夫陽明不從標本從中見太陰濕土之化故其氣主濕所主之味辛苦甘亦兼從土化也其谷主丹素者成熟從司天在泉之氣化下篇所謂歲谷是也太陽在泉熱毒不生其味苦其治淡咸其谷黅秬太陽寒水在泉故熱毒之類不生寒熱不同其化也如癸丑癸未歲火主化運火畏水制而火味反資從其地氣故其味苦淡附於甘故所主之味淡咸其谷主黃元者成熟厥陰在泉清毒不生其味甘其治酸苦其谷蒼赤其氣專其味正厥陰在泉則清毒不生土畏木製故其味甘其所主之味酸苦其谷主蒼赤者成熟專主也正中也謂厥陰不從標本從中見少陽之火化而在泉之氣味又從中見所主之苦熱故其氣專其味正玉師曰陽明所至為清徑厥陰從中見之火化是以清毒不生故下文曰氣專則辛化而俱治少陰在泉寒毒不生其味辛其治辛苦甘其谷白丹少陰君火在泉是以寒毒不生金畏火制故其味辛少陰在下則陽明在上陽明之上燥氣治之中見太陰陽明從中見濕土之化故所主之味辛苦甘兼從中見之土味也其谷主白丹者成熟太陰在泉燥毒不生其味鹹其氣熱其治甘鹹其谷黅秬太陰濕土在泉是以燥毒之物類不生水畏土製故其味鹹太陰在下則太陽在上故其氣熱謂太陽之從本從標味從地化而氣從天化也其所主之味甘鹹其谷主黅秬者成熟化淳則咸守氣專則辛化而俱治此復申明五味所資其化氣者因勝制而從之也化淳者謂陽明從中見濕土之化燥濕相合故其化淳一金從土化故味之咸者守而勿敢泛溢畏太陰之制也氣專者厥陰從中見少陽之主氣故味之辛者與甘酸苦味俱主之蓋辛受火制制則從火化也夫寒熱燥濕在泉之六氣也酸苦甘辛鹹五運之五味也以燥濕之化淳則咸守相火之氣專則辛化蓋因地氣制之而味歸氣化也玉師曰味歸氣化則從在泉之寒熱燥濕而生長化收藏之氣不能始終一致是以生化有厚薄成熟有多少故曰補上下者從之治上下者逆之以所在寒熱盛衰而調之故曰上取下取內取外取以求其過能毒者以厚藥不勝毒者以薄藥此之謂也上下謂司天在泉之氣補助從順也如少陽在泉則厥陰司天當用苦酸之味以補之蓋助其上下之氣也治平治也逆反也如司天之氣風淫所勝平以辛涼熱淫所勝平以鹹寒如諸氣在泉寒淫於內治以甘熱火淫於內治以鹹冷謂淫勝之氣又當反逆以平之故以所在之寒熱盛衰而調之謂盛則治之衰則補之則上下之氣和調矣夫司天在泉之氣升降於上下五運之氣出入於外內各求其有過者取而治之能勝其毒者治以厚藥不能勝毒者以薄藥此治歲運之法也徐振公曰能以大寒之藥治熱淫大熱之藥治熱病是能勝其毒者也氣反者病在上取之下病在下取之上病在右旁取之氣反者謂上下外內之病氣相反也如下勝而上反病者當取之下上勝而下反病者當取之上外勝而內反病者當取之外旁至真要大論曰上勝而下俱病者以地名之下勝而上俱病者以天名之即此義也治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之故消之削之吐之下之補之瀉之久新同法治熱以寒溫而行之者蓋寒性與熱氣不合故當溫而行之所謂寒因熱用熱因寒用其始則同其終則異可使破積可使潰堅可使氣和可使必已此反治之法也治溫以清冷而行之治清以溫熱而行之此正治之法也蓋竟以清冷治溫熱以溫熱治清冷所謂逆者正治是也消之削之內取外取也吐之下之上取下取也補之瀉之補上補下治上治下也久者謂伏氣之病新者感而即發也帝曰病在中而不實不堅且聚且散奈何岐伯曰悉乎哉問也無積者求其臟虛則補之藥以祛之食以隨之行水漬之和其中外可使畢已此論五運之氣為病而有治之之法也病在中者根於中也不實不堅且聚且散者神機之出入於外內也如敷和之紀其藏肝其病裡急支滿備化之紀其臟脾其病痞蓋五運之氣內合五臟故無積者當求其臟也臟氣虛則補之先用藥以祛其邪隨用食以養其正行水漬之以取汗和其中外使邪從外出可使畢已矣玉師曰積者邪積於五臟之間無積則邪干臟氣故當求其臟帝曰有毒無毒服有約乎岐伯曰病有久新方有大小有毒無毒固宜常制矣大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法食葉寺約規則也病有久新者謂病之能毒不能勝毒也方有大小者謂有可以厚藥止可以薄藥也毒者有大寒大熱及燥濕偏勝之毒氣故止可攻疾中病即止過則傷正矣是以大毒之藥治病病去其六即止後服常毒治病病去其七即止之小毒治病病去其八即止之即無毒之藥亦不可太過所謂久而增氣物化之常也氣增而久天之由也臟氣法時論曰毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣故以藥石治病穀肉食養使病盡去之又無使過之傷其正也如病不盡復以藥石治養如前法必先歲氣無伐天和無盛盛無虛虛而遺人夭殃無致邪無失正絶人長命必先知歲運之盛衰衰則補之盛則瀉之補則從之瀉則逆之無伐天運之中和無盛盛無虛虛而遺人夭殃邪則祛之正則養之無絶人長命帝曰其久病者有氣從不康病去而瘠奈何岐伯曰昭乎哉聖人之問也化不可代時不可違夫經絡以通血氣以從復其不足與衆齊同養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長命曰聖王故大要曰無代化無違時必養必和待其來復此之謂也帝曰善此論人之形體亦由氣運之所資養者也夫神去則機息氣止則化絶神氣之不可不調養也然而神氣猶主人形骸若器宇形與神俱而後可終其天年是形之不可不調養也氣從者謂神氣已調不康而瘠謂身不康而形尚瘦也化謂五運之化氣代更代也時謂六氣之主時違逆也如敷和之紀其藏肝其養筋升明之紀其藏心其養血備化之紀其藏脾其養肉審平之紀其藏肺其養皮毛靜順之紀其藏腎其養骨髓是形之皮肉筋骨皆由化運之所資養不可更代者也又如春氣養筋夏氣養血脈長夏氣養肌肉秋氣養皮毛冬氣養骨髓是形之皮肉筋骨又皆由四時氣之所養而時不可違也脈絡者所以行氣血而榮陰陽血者神氣也如經絡以通血氣以從復其神氣之不足而與無病者之相同是神氣已復但身不康健而形尚瘦瘠故當存養其神和調其氣靜以待時謹守其氣無使傾移其形得時化之養漸乃彰著矣此氣運養身之大要也愚謂伏羲神農黃帝乃治世之聖人出世之真人如曰養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長命曰聖王皆治世語蓋欲使世人順天地之和以養此身形神氣如曰上古有真人者中古有至人者蓋謂此真之易失而不易得也如曰聖人為無為之事樂恬憺之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也蓋謂治世之聖賢能修此身自能壽敝天地無有終時好道之士當知生此天地氣交之中宜順時調養此神氣苟此真不失亦能歸於真人若妄為世外之事猶恐墮落旁門六元正紀大論篇第七十一此篇論六氣主司天於上在泉於下五運六氣運化於中間氣紀步為加臨之六氣以主時五六相合以三十年為一紀再紀而為一周故名六元正紀大論黃帝問曰六化六變勝復淫治甘苦辛鹹酸淡先後余知之矣六化謂司天在泉各有六氣之化六變謂勝制之變也勝復者謂五運之氣亦復其歲有相勝制而治之不全也甘苦辛鹹酸淡謂五味所資生化有厚薄成熟有多少先後之各有制各有勝各有生各有成也此承上章而言司天在泉之氣勝制其五運五運之氣制勝其司天在泉今欲調之正味使氣運和平上下合德無相奪倫天地升降不失其宜五運宣行勿乖其政蓋盡人事以救天地之淫邪故謂之正紀大論夫五運之化或從五氣或逆天氣或從天氣而逆地氣或從地氣而逆天氣或相得或不相得余未能明其事欲通天之紀從地之理和其運調其化使上下合德無相奪倫天地升降不失其宜五運宣行勿乖其政調之正味從逆奈何五運謂五行之化運或從五氣者謂敷和升明審平靜順之紀五運和平與六氣無犯也或逆天氣者如丙子丙午歲火運司天而行水運甲辰甲戌歲水運司天而行土運也或從天氣或從地氣者太過而從天化者三不及而同天化者亦三太過而同地化者三不及而同地化者亦三凡此二十四歲與天地相符與地氣相合也或逆地氣或逆天氣者除天符歲會之年而與司天在泉之氣不相合也或相得或不相得者謂四時之氣如風溫春化同熱曛夏化同清露秋化同雲雨長夏化同冰雪冬化同此客氣與時氣之相得也如主氣不足客反勝之是客氣與時氣之不相得也通天之紀從地之理使上下合德無相奪倫者使司天在泉之氣上下和平也天地升降不失其宜者升已而降降已而升天地之更用無失其宜也和其運調其化使五運宣行勿乖其政者調和五運之氣宣行德化勿乖其政令也夫五運六氣有德化政令之和祥必有淫勝郁復之變易今欲使氣運和平須以五味折之資之益之抑之故曰調之正味蓋在天為氣在地為味以味而調其氣也從逆者謂資之益之者從之折之抑之者當逆取也張玉師曰以上五篇論天地氣運有自然之盛衰此下二篇論用人力以調其不和故此篇曰正紀下篇曰至真岐伯稽首再拜對曰昭乎哉問也此天地之綱紀變化之淵源非聖帝孰能窮其至理歟臣雖不敏請陳其道令終不滅久而不易五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也令善也謂能調其氣運得令終而無殄滅之患垂永久而無變易之災帝曰願夫子推而次之從其類序分其部主別其宗司昭其氣數明其政化可得聞乎岐伯曰先立其年以明其氣金木水火土運行之數寒暑燥濕風火臨御之化則天道可見民氣可調陰陽卷舒近而無惑數之可數者請遂言之類者甲己類天干子午類地支天干始於甲地支始於子各有其序所謂先立其年是也部主者厥陰之上風氣主之少陰之上熱氣主之以六氣為六部各主歲而主時也宗司者謂五運五行為運氣之宗主正化者熱化寒化雨化風化所謂以明其氣是也運行之數者五運相襲而皆治之終期之日周而復始臨御之化者六氣有司天之上臨有在泉之下御有四時之主氣有加臨之客氣也明其氣數則天道可見民氣可調陰陽卷舒近而無惑矣帝曰太陽之政奈何岐伯曰辰戌之紀也辰戌歲主太陽司天太陽司天太角化運太陰在泉壬辰壬戌壬為陽年歲木太過故主太角其運風其化鳴紊啓坼其變振拉摧拔其病眩掉目瞑紊音文坼音冊此節專論太角之化運後節始論司天在泉及間氣加臨之六氣鳴風木聲紊繁盛也啓坼木發而開坼也風木太過故其變振拉摧拔眩掉目瞑皆風木之為病倪仲宣曰五運內合五臟病在肝故證見於目後五運仿此太角初正少徵太宮少商太羽終靈樞經曰天地之間六合之內不離於五又曰五者音也音者冬夏之分分於子午陰與陽別寒與熱爭是五音主子午之二至卯酉之二分土位中宮而分王於四季故五音合五行之化運按木火土金水後天之五行也天地開闢而五方五時皆屬後天之氣故以太角木運為首為正次太徵次太宮太商太羽五運相襲終期之日周而復始此五音之主歲也初者歲之首終者歲之終以角下注初字羽下注終字者蓋每歲仍以角木主春徵火主夏商金主秋羽水主冬土居中宮而主長夏此五音之主時也故其運風其化鳴紊啓坼其運熱其化喧暑鬱燠此論主歲之運統司一歲之氣而四時又有春之溫夏之熱秋之涼冬之寒故曰風溫春化同熱曛夏化同燥清秋化同冰雪冬化同此主歲之氣與時氣之相得也如水運之歲至夏而熱火運之歲至冬而寒又如水運之歲至夏而寒火運之歲至冬而熱或從歲運或從四時此歲氣與時氣之不相得也甲丙戊庚壬五陽年主太乙丁己辛癸五陰年主少以丁壬木運為初正故以壬辰壬戌太陽司天之歲為運首次丁卯丁酉之少角壬寅壬申之太角自太而少少而太從壬而丁丁而壬皆以木運為首水運為末以主歲木運為初水運為終以主時張玉師曰司天在泉之六氣總歸於陰陽精氣似屬先天之水火五運之化始於丹黅蒼素元之氣經於五方之分蓋天地開闢而後分五方五時故五運屬後天之五行太陽太徵太陰戊辰戊戌同正徵戊癸化火戊為陽年主火運太過故為太徵火運太盛而寒水上臨火得承製則炎爍已平而無亢盛之害故與正徵之歲相同正徵之歲乃火運臨午所謂歲會氣之平也金西銘曰午屬少陰君火火運臨午是二火相合其熱更盛而反為平歲者何也曰此論地支之主歲與運氣相合故曰歲會非司天之上臨也歲有十二辰子午為經卯酉為緯陰中有陽陽中有陰主歲亦然故木運臨卯火運臨午金運臨酉水運臨子以運氣上臨於歲辰非司天上臨於運氣也午者盛陽之陰也陽盛而陰氣加之故為平歲如水運臨子陰盛而一陽承之皆得承製之為平也卯酉亦然其運熱其化暄暑鬱燠其變炎烈沸騰其病熱鬱熱者火之氣暄暑鬱燠火之化也火運太過故其變炎烈沸騰郁鬱蒸也火熱太過故為熱鬱之病玉師曰火運上臨太陽故熱鬱太徵戊少宮己太商庚少羽辛終少角丁初戊主火運太過故為太徵以太徵居上者尊主歲之氣也四時之氣始於角木故從丁之少角生戊火火生己土土生庚金金生辛水從少而太太而少自上而下下而復上也余運仿此太陽太宮太陰甲辰歲會甲戌歲會甲屬陽土故為太宮土運臨四季為歲會四季者辰戌丑未歲也其運陰埃其化柔潤重澤其變震驚飄驟其病濕下重雲雨昏瞑埃乃濕土之氣故其運陰埃後節曰其運陰雨柔潤重澤土之化也土運太過故其變震驚飄驟濕重脾病也太宮甲少商乙太羽丙終太角壬初少徵從壬之太角起初運以主春角生癸火火生甲土土生乙金金生丙水蓋從壬而癸復從癸而甲也太陽太商太陰庚辰庚戌其運涼其化霧露蕭飋其變肅殺凋零其病燥背瞀胸滿庚主金運太過故為太商商主秋金故其運涼其化蕭飋金氣太盛故其變肅殺凋零燥背胸滿皆肺部之病肺俞在肩背胸中乃肺之宮城瞀目垂貌經脈篇曰肺是動病甚則交兩手而瞀皆太盛而目傷也太商庚少羽辛終少角丁初太徵戊少宮己丁接上節所終之丙辛接下節初起之壬五運之十干皆連續不斷太陽太羽太陰丙辰丙戌天符辰戌太陽寒水司天丙乃水運與司天之氣相合故為天符其運寒其化凝慘栗冽其變冰雪霜雹其病大寒留於溪谷寒者水之氣凝慘栗冽水令之化也水運太過故其變冰雪霜雹變盛極而變易也腎主骨大寒留於溪谷者溪谷屬骨運氣與臟氣相合而為病也太羽丙終太角壬初少徵癸太宮甲少商乙主歲之氣太過者三年皆從壬起壬癸甲乙丙不及者三年皆從丁起丁戊己庚辛俱橫以觀之六歲一周而復起也主時之氣陽年從壬起初而終於丙陰年從丁起初而終於辛俱豎以觀之一太一少而遞相沿襲因以主歲之氣提出於上故止於角下注初羽下注終當知每歲皆應角木主春癥火主夏商金主秋羽水主冬若另立一主時之圖是皆以角為首也學者以意會之容易瞭然不必多贅圖象玉師曰司天之氣以間氣主時乃加臨之客氣也五運之氣以餘氣主時乃四時之主氣也凡此太陽司天之政氣化運行先天天氣肅地氣靜寒臨太虛陽氣不令水土合德上應辰星鎮星其谷玄黅其政肅其令徐寒政大舉澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢此統論六氣之主歲而主時也主歲者司天在泉主時者主氣客氣六氣雖各有分部而司天之氣又為一歲之主故曰凡此太陽司天之政氣化運行先天夫子午寅申辰戌為六陽年氣主太過丑未卯酉巳亥為六陰年氣主不及凡主歲主時之氣太過之年皆先天時而至不及之年皆後天時而至故曰運太過則其至先運不及則其至後太陽寒水司天故天氣肅太陰濕土在泉故地氣靜寒臨太虛故陽氣不能章其政令水土合德故上應辰星鎮星其谷主元黅者成熟感司天在泉之氣所謂歲谷是也肅者天之政徐者地之令也澤無陽焰者謂陰中之生陽為寒水所抑蓋二之氣乃少陰君火主氣因寒政大舉故必待時而後發待時者至五之氣少陰間氣司令而後發此言四時之主氣而為司天之所勝也少陽中治者少陽相火主三之氣而又為寒水加臨是以時雨乃涯此言四時之主氣而為加臨客氣之所勝也歲半之前天氣主之歲半之後地氣主之而加臨之三氣主寒水四之主氣屬太陰是以寒水之氣至三氣止而交於四氣之太陰也太陰所至為雲雨雨朝北極者在泉之氣運化於上也澤流萬物者濕土之氣周備於下也寒敷於上者太陽寒水之在上也雷動於下者少陰之火氣在太陰之右至五氣而始發也寒濕之氣持於氣交者上下交互也民病肉萎濡瀉諸證皆寒濕之氣發而為病也此節總論太陽司天太陰在泉有四時之主氣有加臨之客氣以五常政論之圖象推之六氣之次序瞭然在目矣初之氣地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍此分論加臨之間氣間氣者紀步而初氣始於少陽地氣遷者謂上年在泉之終氣而交於今歲司天之初氣也歲前之終氣乃少陰君火今歲之初氣乃少陽相火二火相交故氣大溫草乃早榮者長氣盛也春始交而大溫故民病厲溫病乃作為身熱頭痛嘔吐瘡瘍二之氣大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始二之氣陽明金氣加臨故大涼反至化炎熱為清涼於歲半之前故云反民乃慘者寒涼之氣在於氣交之中草乃遇寒者寒氣之在下也中下寒涼而上臨之火氣始抑蓋謂司天間氣皆從下而上也氣鬱中滿者陽氣遏抑於內也寒乃始者謂司天之寒氣自二之氣乃始此司天之氣又為間氣之所勝也三之氣天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死司天寒水之氣加臨於三氣故其時天政乃布而寒氣行雨乃降也夏時應熱而反為寒氣加臨故民病寒而內反熱也癰疽瞀悶皆火鬱之病勿治將自焚矣四之氣風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白加臨之氣乃厥陰風木四之主氣乃太陰濕土是以風濕交爭風化為雨者加臨之氣從時而化也夏秋之交濕土主氣故乃長乃化乃成蓋夏主長秋主成而長夏主化也民病大熱少氣者風熱之病也肉萎足痿者濕土之氣也注下赤白者濕熱之交感也按以上論司天之氣及主時之氣皆為加臨客氣之所勝此論加臨之風木又從濕土之氣化而為雨是主客之氣互相盛衰書不盡言言不盡意欲明歲運之精微又當隨時審氣隨氣論時若固執於文言何異按圖索驥也張玉師曰風木之氣旺於春今加臨於四氣是為秋金所制故從時氣之化五之氣陽復化草乃長乃化乃成民乃舒二氣之少陰君火為寒涼所加至五氣而復治故陽氣復化即所謂澤無陽焰火發待時而雷動於下也火氣復化故草乃長濕土之氣主歲半以下故乃化五之主氣系陽明秋金故乃成火鬱發之故民乃舒終之氣地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死在泉之氣臨於終氣故地氣正而濕令行陰凝太虛者太陰之氣運於上也埃昏郊野者濕土之化布於下也民乃慘淒者陰濕之氣行於中也易曰至哉坤元資生萬物土主化育倮蟲而人為倮蟲之長如寒風以至是土為風木反勝故主胎孕不成此謂非時之邪而勝主時之氣與至真要大論之濕司於地熱反勝之大義相同張玉師曰太陽終三之氣而雨乃降是司天寒水之降於下也太陰主終之氣而陰凝太虛是在泉濕氣之布於上也上下之氣互相交感者也故曰歲半之前天氣主之歲半之後地氣主之上下交互氣交主之歲紀畢矣當知司天之氣始於下而主於上在泉之氣始於上而主於下上者下行下者上行又非上者上而下者下也故歲宜苦以燥之溫之苦乃火味火能溫寒苦能勝濕凡此太陽司天之歲乃寒濕主氣故宜燥之以勝濕溫之以勝寒所謂調之正味而使上下合德也下文曰食宜同法必折其鬱氣先資其化源化源者謂五運為六氣之生源折其鬱氣者折其致郁之氣也如太徵之歲太陽司天則火運受郁矣太羽之歲太陰在泉則水運受郁矣故當燥之以折太陰之土氣溫之以折太陽之寒邪六氣同義玉師曰下文云五運之氣鬱極復歲即此郁也抑其運氣扶其不勝無使暴過而生其疾凡此太陽司天之歲運氣皆主太過故當抑其淫勝之氣而扶其所不勝如太角之歲風木淫勝則土受其制矣是當抑其風木之勝扶其土之不勝如太徵之歲火運太過則金氣受其制矣是當抑其火之太過扶其金之不勝所謂和其運調其化無致暴過而致生民疾也後少陽少陰歲相同食歲谷以全其真避虛邪以安其正歲谷者元黅之谷感司天在泉之氣而成熟食之以全天地之元真虛邪者謂反勝其間氣之邪如太陽司天之歲初之氣乃少陽相火而寒反勝之是寒邪淫勝其初氣矣二之氣乃陽明燥金而熱反勝之是熱邪淫制其二氣矣四之氣乃厥陰風木而清反勝之是燥邪制勝其四氣矣五之氣乃少陰君火而寒反勝之是熱邪制勝其五氣矣是謂四畏必謹察之故曰食間谷以闢虛邪邪去則正自安矣適氣同異多少制之同寒濕者燥熱化異寒濕者燥濕化故同者多之異者少之此論五運之氣與司天在泉各有同異而氣味之多少亦各有所制也適酌也酌其氣之同異而制之也同寒濕者謂太羽太宮主運是與司天在泉之寒濕相同故當多用燥熱之氣味以制化蓋用燥以制濕用熱以化寒也如太徵太角太商主運是與寒濕之氣各異又當少用燥濕之氣以化之蓋用濕以滋燥熱之氣用燥以制風木之邪同者氣盛故宜多之異者氣孤故少制之也用寒遠寒用涼遠涼用溫遠溫用熱遠熱食宜同法有假者反常反是者病所謂時也此論司天在泉及間氣加臨之六氣各有寒熱溫涼之宜而又當無犯者也如太陽司天是當用熱以溫之而初之氣乃少陽相火用事又當遠此少陽之熱而後可用熱也如少陰在泉是當用寒以清之而四之氣值太陽寒水用事又當遠此太陽之寒而後可用寒也溫涼同義藥食同法所謂時與六位是也有假者反常是謂邪氣反勝又不必遠寒而遠熱矣如太陽寒水司天初之氣乃少陽相火而天氣反寒是當用熱而不必遠熱矣如少陰君火在泉四之氣乃太陽寒水而天氣反熱是當用寒而不必遠寒矣所謂天氣反時則可依時是也反是者皆為民病所謂加臨之時氣也此篇論調其正味以和氣運之不和如以苦燥之溫之所以治司天在泉之太過也折其鬱氣者折司天在泉之勝氣也抑其運氣者抑運氣之太過也食歲谷以全其真者全天地之真氣也避虛邪以安其正者安紀步之正氣也適氣同異者酌五運六氣之異同也用寒遠寒用熱遠熱者調上下左右之六氣也假者反之逆治四時不正之氣也蓋天地陰陽之氣有德化之祥有政令之章有勝復之作有變易之災人居天地氣交之中能和其運調其化使上下合德無相奪倫五運宣行勿乖其政安其屈伏以平為期庶暴過不生苛疾不起此聖人隨時養生之大道也帝曰善陽明之政奈何岐伯曰卯酉之紀也卯酉陽明司天陽明少角少陰清熱勝復同丁主少角則木運不及故金之清氣勝之有勝必有復火來復之故為清熱勝復同者謂清熱之氣與風氣同其運也同正商歲木不及而上臨陽明所謂上商與正商同丁卯歲會木運臨卯是為歲會丁酉其運風清熱不及之運常兼勝復之氣風運氣也清勝氣也熱復氣也少運皆同少角初正太徵少宮太商少羽終歲以木為首故為初正從丁起少角丁生戊火火生己土土生庚金金生辛水而終陽明少徵少陰寒雨勝復同寒者寒水之氣雨者濕土之氣寒勝少徵土來復之同正商伏明之紀上商與正商同癸卯癸酉癸主少徵卯酉主陽明司天少陰在泉其運熱寒雨運氣為熱勝氣為寒復氣為雨少徵太宮少商太羽終太角初從壬起太角而生少徵之癸水水生甲土土生乙金金生丙水而終陽明少宮少陰風涼勝復同土運不及風反勝之清涼之金氣來復己卯己酉甲己化土甲主土運太過己主土運不及其運雨風涼太陰所至為雲雨雨乃土之運氣風為勝氣清為復氣因運氣不及故勝復之氣同其化少宮太商少羽終少角初太徵從丁而起少角丁生戊火火生己土土生庚金金生辛水而終陽明少商少陰熱寒勝復同熱勝少商寒氣來復同正商從革之紀上商與正商同乙卯天符乙主金運卯酉陽明燥金司天運氣與司天之氣相合是名天符乙酉歲會太乙天符金運臨酉是為歲會金運之歲上見陽明是為天符歲會合天符名曰太乙天符又名曰三合三合者司天運氣年辰三者之相合其運涼熱寒運氣為涼勝氣為熱復氣為寒少商太羽終太角初少徵太宮從太角起壬木而生徵徵生太宮宮生少商商生太羽而終陽明少羽少陰雨風勝復同雨乃勝氣風乃復氣辛卯少宮同辛主水運不及而土得以乘之故宮音半同其化按木運不及乃陽明之辛卯辛酉太陰之辛丑辛未厥陰之辛巳辛亥太陰司天之歲乃太陽在泉水得助而旺厥陰司天之歲木氣上臨土受木之制辛酉歲乃金水相生之年辰故只言辛卯歲也夫五音皆有不及而獨言宮音者以土位中宮而乘於四氣也故曰五運之氣根於中而運於外根於中者根於中宮之土而運化於四方也辛酉辛卯其運寒雨風寒為運氣雨為勝氣風乃復氣少羽終少角初太徵少宮太商提少角少羽於上者論主歲之氣也太少之歲皆以角為始而羽為終角下注初羽下注終者論主時之氣也一太一少皆以角為始而羽為終後四氣准此凡此陽明司天之政氣化運行後天卯酉主歲運不及凡司天在泉主氣客氣皆後天時而至天氣急地氣明陽明司天則少陰在泉金令在上故天氣徑急君火在下故地氣光明陽專其令炎暑大行物燥以堅陽明在上君火在下故陽熱盛而物燥堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤主時之初氣乃厥陰風木凡太過之歲客氣盛而多從客氣不及之歲客氣弱而兼從主氣是以淳風乃治從初氣風木之化也陽明燥金司天厥陰風木主氣故風燥橫運流於氣交橫者謂主客之氣交相縱橫氣交者終於歲半之前而交於歲半之後也二氣之主客乃君相二火三氣之主客乃陽明少陽故多陽少陰云趨雨府者土之濕氣蒸而為云天氣降而為雨蓋四之氣乃太陰濕土主氣太陽寒水加臨故曰云趨雨府濕化乃敷司天之燥金終三之氣而交於四氣之寒水濕土是以燥極而澤其谷白丹感司天在泉之氣而成熟者所謂歲谷是也間谷命太者間谷者感左右之間氣而成熟間氣者在司天在泉左右之四氣也如陽明在上則左太陽右少陽陽明主少而太陽少陽主太故曰間谷命太者蓋言在左右之太者為間谷也太陽之下是為厥陰少陽之下是為太陰感此四氣而成者是謂間谷只言在上之太而不言在下之二氣者蓋數之始起於上而終於下故舉此在上之太而在下之二氣可知矣以五常政大論之圓圖輪轉觀之則六氣之太少瞭然在目矣玉師曰不及之歲而曰間谷命太者則太過之歲又當云間谷命少者如太陽在上則左厥陰右陽明太陽主太而左右之厥陰陽明主少書不盡言學者當引而伸之其耗白甲品羽此言五類之蟲感司天在泉之氣而少有生育也耗少也散也曰白曰文曰品者謂感司天之氣不過文彩品格之蟲少有生育非若運化之蕃息也如金運之歲其蟲介概言三百六十之介蟲皆感金運而生今感司天之金氣止白甲者生而余色之介蟲不育也倪仲宣曰六氣只言少而不言太又不及於太陰何也曰太過者其氣暴不及者其氣徐如運氣太過有相勝制則胎孕不育治之不全故不言其太也又如厥陰陽明司天皆感生長收成之氣故胎運易於生成如太陰司天則寒水在泉水濕相合全無生長之氣則蟲類艱於孕育故不言及太陰也如上章論太陽在泉倮蟲不育太陰在泉鱗蟲不成即此意也此句蓋言五類之蟲皆感五運之氣而生如敷和之紀其蟲毛發生委和之紀其蟲毛介雖歲運有太過不及而皆生息蕃振如感司天之氣不過少有生育若運氣太過有相勝制並其不生不育矣故曰耗者言所育既少又不能生聚而耗散也此注當與上章歲有胎孕不育節合看金火合德上應太白熒惑其政切其令暴蟄蟲乃見流水不冰民病咳嗌塞寒熱發暴振栗癃閉金火合德上應太白熒惑光明清切者金之政急暴者火之令君火在泉是以蟄蟲不藏流水不冰民病嗌塞振栗諸證皆感燥熱之氣而為病也清先而徑毛蟲乃死熱後而暴介蟲乃殃清先而徑者言司天之氣盛於歲半以前熱後而暴謂在泉之氣淫於歲半以後毛蟲死介蟲殃者又受司天在泉之勝制而死也故曰各有勝各有制各有生各有成謂五運六氣各有生成各有勝制五運之勝能制其六氣而六氣之勝又能制其五運制則不生不育或不靜而死也故止於陽明節列此四句蓋欲使後學知運氣之互相勝制類而推之其發躁勝復之作擾而大亂清熱之氣持於氣交陽明少陰之氣皆主躁故其發躁如火勝金於歲半之前則水復火於歲半之後是以勝復作而歲時之氣大亂矣氣交者司天在泉之氣上下相交玉師曰持於氣交則無勝復初之氣地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏缺嘔小便黃赤甚則淋地氣遷者謂歲前在泉之終氣交更於今之初氣余運仿此夫卯酉歲初之客氣乃太陰濕土故陰凝而雨化下文曰厥陰所至為風生終為肅氣始肅者謂主時之初氣乃厥陰也陰凝於外則陽鬱於內故民病熱脹便赤諸證面目浮腫善眠者濕土之為病也鼽衄嚏缺嘔者風木之氣也二之氣陽乃布民乃舒物乃生榮厲大至民善暴死二之主客乃君相二火陽氣得以敷布故民乃舒物得長氣而生榮如厲大至則民善暴死蓋謂二火相交臣位君上故也三之氣天政布涼乃行燥熱交合燥極而澤民病寒熱司天之金氣加臨故天政布涼乃行三之主氣乃少陽相火故燥熱交合三氣終而交於四氣之寒水濕土故燥極而澤燥濕水火相交故民病寒熱四之氣寒雨降病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便四之加臨客氣乃太陽寒水主氣乃太陰濕土故寒雨降歲半以後乃少陰君火主氣反為寒濕相加故民病振栗譫妄嗌乾便血等證皆因寒凝於外火鬱於內故也經云諸禁鼓栗如喪神守皆屬於火及為心痛者乃寒邪內凌君火也經云邪在心則病心痛時眩僕又曰諸癰腫筋攣骨痛此寒氣之腫也五之氣春令反行草乃生榮民氣和厥陰風木加臨於五氣故春令反行草得生氣故乃生榮少陰之郁得木氣而舒達故民氣和終之氣陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫少陰君火之氣加臨於終氣故在泉之陽氣得以舒布而冬之時候反溫冬氣溫暖故蟄蟲不藏流水不冰地氣舒暢故民乃康平其有災眚當主病溫所謂冬溫病也冬溫之病與傷寒大異玉師曰冬傷於寒今感溫熱而為病故與傷寒異故食歲谷以安其氣食間谷以去其邪歲谷者白丹之谷感天地之氣而生氣者元真之氣也間谷者感間氣而生如初之氣宜食白黅二之氣宜食白丹四之氣宜食丹元五之氣宜食丹蒼之谷邪者反勝其間氣之邪歲宜以咸以苦以辛汗之清之散之宜咸以清君火之熱宜辛以潤陽明之燥宜苦以泄內郁之火汗之以解在外之寒清之以消內入之邪散之以解冬溫之氣安其運氣無使受邪運氣不及故宜安之無使邪勝折其鬱氣資其化源折其司天在泉之氣以資五運之化源以寒熱輕重少多其制同熱者多天化同清者多地化寒以清在地之火熱熱以制司天之燥金同者多之異者少之故以寒熱之輕重而少多其制如少徵少角之運同少陰之熱者多以天化之清涼以制之如少商少宮少羽之運同陽明之清者多以地化之火熱以制之天化者燥金之清涼地化者在泉之火熱按至真要大論曰風淫所勝平以清涼是風同熱化當以清涼平之用涼遠涼用熱遠熱用寒遠寒用溫遠溫食宜同法有假者反之此其道也反是者亂天地之經擾陰陽之紀也陽明清涼之氣司天是宜用溫熱矣如二之氣乃君相二火又當遠此六十日而用溫熱少陰君火之氣在泉是宜用寒涼矣如四之主客乃寒水濕土又當遠此六十日而後可用寒涼有假者謂四時之寒熱溫涼非司天在泉及間氣之正氣又當反逆以治之此調和天地陰陽之道也反此者亂司天在泉之經常擾間氣陰陽之紀步帝曰善少陽之政奈何岐伯曰寅申之紀也少陽太角厥陰壬寅壬申其運風鼓其化鳴紊啓坼其變振拉摧拔其病掉眩支脅驚駭壬主木運太過寅申少陽司天厥陰在泉運氣與太陽太角相同但其病少異蓋木與水土相合其病在血分木與風火相合其病在氣分本經曰諸風眩掉皆屬於肝又曰東方肝木其病發驚駭太角初正少徵太宮少商太羽終少陽太徵厥陰戊寅天符戊申天符戊主火運太過火運之歲上見少陽天與之會故天元冊曰天符其運暑其化暄囂鬱燠其變炎烈沸騰盛之極也其病上熱鬱血溢血泄心痛火運上臨少陽故為此諸病太徵少宮太商少羽終少角初少陽太宮厥陰甲寅甲申其運陰雨其化柔潤重澤其變震驚飄驟柔者土之德潤澤濕之化也太陰所至為雷霆驟注烈風氣變之常也其病體重胕腫痞飲感大宮之運而為脾病也按太過之運氣有三三五十五為民病少有異同蓋以司天在泉之氣化少異故耳學者以意會之太宮少商太羽終太角初少徵少陽太商厥陰庚寅庚申同正商歲金太過而司天之火制之則金氣已平故與正商之歲同其運涼其化霧露清切金氣和平故曰清切其變肅殺凋零其病肩背胸中肺脈出胸中俞在肩背太商少羽終少角初太徵少宮少陽太羽厥陰丙寅丙申其運寒肅其化凝慘栗冽其變冰雪霜雹皆太羽之運化其病寒浮腫寒水之病太羽終太角初少徵太宮少商凡此少陽司天之政氣化運行先天寅申歲主太過六氣皆先天時而至天氣正此申明天地陰陽之氣交相感召所謂上下交互氣交主之歲紀畢矣夫蒼黅丹素元之氣化生地之五行地之五行上呈天之六氣故曰寒暑燥濕風火天之陰陽也三陰三陽上奉之是三陰三陽在下而六氣之在上也是以少陽之上火氣治之中見厥陰厥陰之上風氣治之中見少陽正中也天氣正者謂少陽司天而氣化行於氣交之中蓋以三陰三陽在下故雖主司天而氣下行於中也下節厥陰司天而曰地氣正者謂少陽在泉之氣而亦行於中蓋少陽為厥陰之中見也再按厥陰不從標本從中見少陽之化故凡此厥陰之政諸同正歲氣化運行同天謂厥陰同少陽天氣正地氣正之諸歲而厥陰之氣運行同少陽天氣之在中蓋以少陽司天則厥陰在中少陽在泉則地氣在中少陽為厥陰之中見也厥陰在泉則地氣在中厥陰司天則天氣亦在中謂厥陰從中見少陽之化也能明乎司天在泉及左右間氣再於上下氣交中求之斯得運化之微妙地氣擾厥陰在泉故地氣擾下文曰厥陰所至為撓動為迎隨行令之常也風及暴舉木偃沙飛炎火乃流火風之氣也陰行陽化雨乃時應謂厥陰之氣上行而從少陽之化故雨乃時應蓋少陽所至為火生終為蒸溽此德化之常也火木同德上應熒惑歲星上應二星倍明其谷丹蒼感司天在泉之氣而成熟者其政嚴其令擾嚴者火之政擾者風之令也故風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起風熱參布者少陽厥陰之氣交相參合而布於氣交之中雲物沸騰者地氣上升也太陰橫流涼雨並起者蒸溽而為雨也按厥陰風木上從司天之化故太陰濕土從之即風氣下臨黃起土用之義畏其勝制而從之也民病寒中外發瘡瘍內為泄滿故聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變風熱之氣在外則寒濕之氣在內是以外發瘡瘍內為寒中泄滿故聖人遇此之候和其寒熱而不使外內交爭往復出入也如外內往復交作則為寒熱之瘧泄聾嘔吐者風熱之氣乘於內也上怫腫色變者寒濕之氣乘於外也初之氣地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡殺葉帥初之間氣乃少陰君火主氣乃厥陰風木是以風搖候溫草木得生長之氣而早榮也殺降也少陽司天而又值君火主氣故雖有時氣之寒來而不能殺二火之溫熱也血溢目赤咳逆膚瘡等證皆風火之為病也二之氣火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸脅不利頭痛身熱昏憒膿瘡二之客氣乃太陰濕土是以司天之火氣反郁而白埃四起云趨雨府皆濕土之氣化也厥陰風氣雖上從少陽而亦不能勝其雨濕風火氣盛得陰濕以和之故民乃康其有災眚則病熱鬱嘔吐昏憒膿瘡諸證皆因陰濕凝於外而火熱鬱於內也三之氣天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏缺喉痹目赤善暴死司天之氣上臨於三氣故天政布主時之氣亦屬少陽故炎暑至雨乃涯者太陰橫流也民病熱中血溢鼽衄嚏缺諸證感風火之氣也二火相交風熱並至故善暴死四之氣涼乃至炎暑間化白露降民氣和平其病滿身重加臨間氣乃陽明清涼之氣故涼乃至白露降少陽之火與風熱之氣交於氣交之中故炎暑間化風熱主歲而遇此清涼故民氣和平其病滿身重者感主時濕土之氣也五之氣陽乃去寒乃來雨乃降氣門乃閉剛木早凋民避寒邪君子周密五之間氣乃太陽寒水故陽熱去而寒乃來以秋冬之交而行閉藏之冬令故氣門乃閉宜周密以避寒邪曰聖人曰君子蓋言聖賢之隨時調養以和其氣是以暴過不生苛疾不起終之氣地氣正風乃至萬物反生霜霧以行其病關閉不禁心痛陽氣不藏而咳厥陰風木主終氣故風乃至地氣正者厥陰從中見少陽之化也萬物遇生氣而反生地氣反上升而霜霧以行以閉藏之時而反行發生之令故其病關閉不禁心痛者腎氣上乘於心也夫肺主氣而腎為生氣之原故腎為本肺為末陽氣至冬而歸藏於腎臟今反上乘於肺故咳抑其運氣贊所不勝必折其鬱氣先取化源暴過不生苛疾不起運氣太過故當抑之所不勝者如壬年角運太過則土氣不勝戊年火運太過則金氣不勝故宜抑其太過贊助其所不勝折其鬱氣者如庚寅庚申歲少陽司天則商運受郁矣甲寅甲申歲厥陰在泉則宮運受郁矣是當折其致郁之氣先取二運之化源折抑其太過贊助其不勝是以暴過不生苛疾不起暴者謂太宮太商之運氣主太過而反受其鬱故其過暴暴者為病甚故曰苛故歲宜鹹辛宜酸滲之泄之漬之發之宜咸以制少陽之火宜辛以勝風木之邪厥陰從少陽之火化是子泄其母氣矣故又宜用酸以補之漬者上古用湯液浸漬以取汗滲之泄之者以清火熱之在中漬之發之者以散風邪之外襲觀氣寒溫以調其過同風熱者多寒化異風熱者少寒化寒溫者謂五運之寒溫也如太角太徵之歲運氣與司天在泉之風熱相同者多用寒涼以清之如太宮太商太羽之歲運氣與司天在泉之氣異者則少之食藥同法用熱遠熱用溫遠溫用寒遠寒用涼遠涼食宜同法此其道也有假者反之反是者病之階也張玉師曰按太陽司天太陰在泉則先云用寒遠寒用涼遠涼少陽司天厥陰在泉則先云用熱遠熱用溫遠溫蓋言歲運寒熱之藥食當遠此司天在泉遠者勿犯也帝曰善太陰之政奈何岐伯曰丑未之紀也太陰少角太陽清熱勝復同少角主木運不及故清氣勝之有勝必有復故熱以復之清熱勝復之氣與本運同其化同正宮五常政大論曰委和之紀上宮與正宮同丁丑丁未其運風清熱風乃運氣清乃勝氣熱乃復氣三氣同其運愚按太過之運言病不及之運不言病蓋太過者暴不及者徐少角初正太徵少宮太商少羽終太陰少徵太陽寒雨勝復同火運不及寒反勝之土雨來復癸丑癸未其運熱寒雨少徵太宮少商太羽終太角初太陰少宮太陽風清勝復同注義同前同正宮五常政大論曰上宮與正宮同己丑太一天符己未太一天符土運臨四季是為歲會土運之歲上見太陰是為天符天符合歲會是為太一天符其運雨風清少宮太商少羽終少角初太徵太陰少商太陽熱寒勝復同乙丑乙未其運涼熱寒疏義同前少商太羽終太角初少徵太宮太陰少羽太陽雨風勝復同同正宮五常政大論云涸流之紀上宮與正宮同辛丑辛未其運寒雨風少羽終少角初太徵少宮太商凡此太陰司天之政氣化運行後天陰專其政陽氣退避大風時起天氣下降地氣上騰原野昏霿白埃四起云奔南極寒雨數至物成於草𦒳夏民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急濕寒合德黃黑埃昏流行氣交上應鎮星辰星其政肅其令寂其谷黅玄霿音蒙數葉朔草𦒳葉咨太陰司天寒水在泉故陰專其政陽氣退避土令不及風反勝之天地之寒濕氣交是以原野昏霿寒雨數至也草𦒳夏長夏之時秋之交也民病腹滿諸證皆感寒濕之氣而成寒濕合德是以黃黑埃昏流行氣交上應辰鎮二星明耀肅者土之政寂者水之令黅元之谷感司天在泉之氣而成故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行太陰之濕氣凝於上太陽之寒氣積於下寒水勝火則為冰雹即所謂火鬱之發山川冰雪是也陽氣在上為陰凝所勝則肅殺之氣乃行此言上下陰陽之氣也故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之此言五方之地土各有高下厚薄之不同也故歲氣有餘地土宜高厚歲氣不及地土宜卑下蓋太過之氣宜緩不及之氣宜先地土高厚氣緩於出地之下者氣易於升也氣有餘宜至之遲氣不及宜至之早此地利之有高下氣至之有早晏而民氣亦從之愚按此論上下陰陽之氣者謂天包乎地之外也地土之有高下者地居乎天之中也氣至之有早晏者氣貫乎地之內也人氣從之者人由乎氣交之中也此當與五常政大論合看間谷命其太也注見前初之氣地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘強關節不利身重筋痿初之主客皆風氣所司是以歲前之地氣遷冬令之寒乃去而春氣正風乃來生榮萬物民氣條舒主客之氣與司天之氣相薄故雨乃後至也民病血溢筋痿諸證皆感風濕之氣所致二之氣大火正物承化民乃和其病溫厲大行遠近咸若濕蒸相薄雨乃時降二之主客乃君相二火故大火盛火土合德故物承化民乃和濕熱氣盛是以溫厲大行土氣周備於四方故遠近咸若三之氣天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿司天之氣臨於三氣寒濕之氣行於氣交四之氣畏火臨溽蒸化地氣騰天氣痞隔寒風曉暮蒸熱相薄草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫四之客氣乃少陽相火寒水司地故畏火之加臨四之主氣乃太陰濕土濕熱相合則溽蒸化而地氣上騰陰濕之氣與火氣不相合是以天氣痞隔濕化不流於下則白露陰布以成秋令寒風太陽寒水之氣也民病滿脹等證乃寒濕熱三氣雜至合而為病也五之氣慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠五氣之主客皆陽明清涼之氣故其候寒冷收藏之令早行故君子周密陽明之氣主肌故病在皮腠終之氣寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕推於氣交而為疾也五之主客乃在泉寒水之氣故寒大舉寒濕之氣上下相交故濕大化霜積陰凝濕之化也冰堅陽伏寒之令也腎為冬藏而主骨關節禁固骨節不利也腰脽者腎之府也寒濕推於氣交謂天地之氣上下相推人在氣交之中而為病也此句照應前民氣亦從之句必折其鬱氣而取化源益其歲氣無使邪勝歲運不及故當益之邪氣者即己所不勝之氣也食歲谷以全其真食間谷以保其精真精者乃天乙所生之真元即精與氣耳故曰真曰精故歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令御甚寒從氣異同少多其判也同寒者以熱化同濕者以燥化異者少之同者多之苦乃火味故能燥濕而溫寒判者分也用涼遠涼用寒遠寒用溫遠溫用熱遠熱食宜同法假者反之此其道也反是者病也帝曰善少陰之政奈何岐伯曰子午之紀也少陰太角陽明壬子壬午其運風鼓其化鳴紊啓拆其變振拉摧拔其病支滿與諸太過角運相同太角初正少徵太宮少商太羽終少陰太徵陽明戊子天符火運之歲上見少陰戊午太一天符火運臨午火運之歲上見少陰其運炎暑其化暄曜鬱燠其變炎烈沸騰其病上熱血溢與前太徵運同太徵少宮太商少羽終少角初少陰太宮陽明甲子甲午其運陰雨其化柔順時雨其變震驚飄驟其病中滿身重與前太宮運同太宮少商太羽終太角初少徵少陰太商陽明庚子庚午同正商五常政大論曰堅成之紀上徵與正商同其運涼徑其化霧露蕭飋其變肅殺凋零其病下清運氣與諸太商同其病下清者感秋金之氣也太商少羽終少角初太徵少宮少陰太羽陽明丙子歲會水運臨子丙午其運寒其化凝慘溧冽其變冰雪霜雹其病寒下感寒水氣太羽終太角初少徵太宮少商凡此少陰司天之政氣化運行先天地氣肅天氣明寒交暑熱加燥云弛雨府濕化乃行時雨乃降金火合德上應熒惑太白其政明其令切其谷丹白水火寒熱持於氣交而為病始也太過之歲氣運皆先天時而至燥金在泉故地氣肅君火在天故天氣明歲前之終氣乃少陽相火今歲之初氣乃太陽寒水故為寒交暑而水火寒熱持於氣交而為病始也君火在上燥金在下故曰熱加燥云弛雨府濕化乃行時雨乃降即少陽臨土雨乃涯之義金火合德上應熒惑太白光明明者火之政切者金之令也其谷丹白感金火之氣而成熟者熱病生於上清病生於下寒熱凌犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上寒熱凌犯者司天在泉之氣交相犯而爭於中也咳喘血溢鼽嚏目赤眥瘍嗌乾腫上熱病生於上也血泄寒厥清病生於下也入胃心痛腰痛腹大寒熱交爭於中而為病也初之氣地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍初之客氣乃太陽寒水故歲前之燥熱將去而寒乃始蟄蟲復藏冰霜復結也初之時氣乃厥陰風木故風乃至陽春之氣鬱而民反周密太陽主筋而為腎之府故關節禁固而腰脽痛時交於二氣之君火故炎暑將至金西銘曰前後用二將字者謂寒熱之氣交也二之氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱二之主氣合司天之君火客氣乃厥陰風木故陽氣布而風乃行春氣始正萬物應生長之氣以榮按少陰之上君火主之少陰標陰而本熱二氣三氣皆君火司令而曰寒氣時至者少陰從本從標也寒熱氣交故民乃和其病淋目瞑者寒氣之為病也經云陽盛則瞋目陰盛則瞑目目赤者君火之氣也氣鬱於上而熱者寒氣上乘也三之氣天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤三之主氣乃君相二火故天政布大火行衆類得長氣而蕃鮮在下之寒氣時至故民病氣厥心痛蓋君火在上陰寒在下寒氣厥逆凌心則心痛而寒熱更作乘於肺則為咳喘蓋肺乃心之蓋而又下交於腎也迫其君火上炎則目赤四之氣溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發四之主客乃濕土主氣濕熱氣交故溽暑至大雨時行寒熱互至也民病嗌乾黃疸諸證皆感溫熱之氣五之氣畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫歲半以下及五之主氣皆屬陽明而少陽相火加之故畏長氣上臨間氣司令故暑反至陽乃化萬物得長氣而生榮涼熱之氣合化故民乃康其有災眚感溫熱而為溫病終之氣燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霿霧翳病生皮腠內合於脅下連少腹而作寒中地將易也終氣乃陽明燥金司令故燥令行氣交之餘熱內格而為咳喘血溢諸證寒水主時故寒氣數舉舍於皮腠而為病也夫地支始於子而對於午六氣已終則在泉之氣將易而交於丑未矣金西銘曰此句照應前二將字後之甲子甲午必抑其運氣資其歲勝折其鬱發先取化源無使暴過而生其病也運氣太過故當抑之而資其歲之所不勝郁發者謂五運之氣鬱極乃發也食歲谷以全真氣食間谷以闢虛邪虛邪不正之邪也能保其精則邪自闢矣歲宜咸以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之咸從水化故能耎堅以調和在上之君火甚則以苦發其火鬱金氣主收故宜酸收以安其下甚則以苦泄其燥適氣同異而多少之同天氣者以寒清化同地氣者以溫熱化同司天之熱氣宜以寒清同在泉之清涼者宜用溫熱用熱遠熱用涼遠涼用溫遠溫用寒遠寒食宜同法有假則反此其道也反是者病作矣帝曰善厥陰之政奈何岐伯曰巳亥之紀也厥陰少角少陽清熱勝復同同正角五常政大論曰委和之紀上角與正角同丁巳天符丁亥天符木運之歲上見厥陰其運風清熱少角初正太徵少宮太商少羽終厥陰少徵少陽寒雨勝復同癸巳癸亥其運熱寒雨少徵太宮少商太羽終太角初厥陰少宮少陽風清勝復同同正角五常政大論曰卑監之紀上角與正角同己巳己亥其運雨風清少宮太商少羽終少角初太徵厥陰少商少陽熱寒勝復同同正角五常政大論曰從革之紀上角與正角同乙巳乙亥其運涼熱寒少商乙太羽丙終太角壬初少徵癸太宮甲合前注會意厥陰少羽少陽雨風勝復同辛巳辛亥其運寒雨風雨風勝復之氣與風運同化皆非本年正化所謂邪化日也不及之運同少羽辛終少角丁初太徵戊少宮己太商庚始於丁而終於辛凡此厥陰司天之政氣化運行後天不及之歲氣運皆後天時而至諸同正歲氣化運氣同天此言厥陰少陽標本之相合也少陽司天則天氣正少陽在泉則地氣正謂厥陰同少陽之諸正歲如厥陰在泉則厥陰之氣同少陽司天之運行厥陰司天則少陽之氣同厥陰司天之運行故曰風生高遠炎熱從之蓋厥陰少陽標本相合而厥陰又從少陽之氣化也天氣擾地氣正風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其政撓其令速其谷蒼丹間谷言太者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不冰熱病行於上風病行於上風燥勝復形於中風性動搖故天氣擾少陽之氣運行於中故地氣正風氣在天故風生高遠少陽之氣上與厥陰相合故炎熱從之云趨雨府濕化乃行者從風火之勝制也風火同歸於正故曰同德上應歲星熒惑光明撓者風之政速者火之令也蒼丹之谷感司天在泉之氣而成熟者間谷者言左之少陰而下右之太陽而下感左右之間氣而成文角品羽感司天在泉之氣而生育者不過文品之毛蟲羽蟲又不能生聚而耗散也勝復更作者謂炎熱從之於上而復相乘於氣交之中也蟄蟲來見流水不冰相火之在泉也感風氣則病行於上感熱氣則病行於下風燥勝復相乘則形見於氣交之中愚謂行於上行於下又曰形於中而不曰病蓋謂風火之氣行於上下而復交於中也炎熱從之於上者子從母也勝復更作者厥陰之氣復下歸於正也故厥陰在泉則地氣正今厥陰司天而天氣亦正斯謂之諸同正歲初之氣寒始肅殺氣方至民病寒於右之下初之氣乃陽明清金司令故寒始肅而殺氣方至民病寒於右之下謂陽明之間氣在在泉少陽之右也二之氣寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中二之間氣乃太陽寒水是以寒不去而霜乃降二之主氣乃少陰君火而寒水加臨於上是以名草上焦而陽復化於下也民病熱中者君火之氣為寒氣鬱於內也三之氣天政布風乃時舉民病泣出耳鳴掉眩三之氣乃司天之風氣主令是以天政布風乃時舉民病泣出耳鳴掉眩乃風病行於上也四之氣溽暑濕熱相薄爭於左之上民病黃疸而為胕腫四之客氣乃少陰君火主氣乃太陰濕土是以溽暑濕熱相薄爭於左之上者謂少陰在司天厥陰之左也按厥陰司天之間氣始於下之陽明而交於太陽少陽在泉之間氣始於上之少陰而交於太陰故民病寒於右之下者蓋從下而上也爭於左之上者謂從上而下也是以間谷言太者言在上左右之少陰太陽而及於太陰陽明所謂數之始起於上而終於下也故曰食間谷以保其精謂保四氣主時之精氣也又曰食間谷以避虛邪謂避左右間氣之虛邪也蓋能保其精則能避其邪矣民病黃疸胕腫皆濕熱之為病五之氣燥濕更勝沉陰乃布寒氣及體風雨乃行五之客氣乃太陰濕土主氣乃陽明燥金是以燥濕更勝沉陰布而寒及體者二氣並主清寒也太陰所至終為雨陽明所主為淒鳴故風雨乃行終之氣畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲終之主氣乃太陽寒水而相火加臨於上故畏火司令客勝其主是以陽氣大化流水不冰少陽在泉之氣大發草感生長之氣而生人感溫暖之氣而舒其病溫厲者所謂冬溫病也必折其鬱氣資其化源贊其運氣無使邪勝化源者五運乃六氣之生源如少宮之運厥陰司天則土氣受郁矣少商之運少陽在泉則金氣受郁矣故當折其致郁之氣以資五運之化源以上六氣相同歲運不及故當贊助其運氣無使所不勝之邪勝之以上不及之三氣相同歲宜辛以調上以咸調下畏火之氣無妄犯之辛從金化以調風木之勝咸從水化以調火熱之淫厥陰不從標本從中見少陽之火化是一歲之中皆火司令故當畏火之氣無妄犯之用溫遠溫用熱遠熱用涼遠涼用寒遠寒食宜同法有假反常此之道也反是者病厥陰司氣以溫用溫無犯少陽司氣以熱用熱無犯食宜同法者藥食並宜也帝曰善夫子言可謂悉矣然何以明其應乎岐伯曰昭乎哉問也夫六氣者行有次止有位故常以正月朔日平旦視之睹其位而知其所在矣此言司天在泉之氣六期環轉而各有定位也行有次者少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之六氣終期而六期環會也止有位者上下有位左右有紀一氣各主六十日有奇也以正月朔日平旦視之者蓋以寅為歲之首朔為月之首寅為日之首而起初氣也睹其司天在泉之定位則知六氣之所在矣運有餘其至先運不及其至後此天之道氣之常也運非有餘非不足是謂正歲其至當其時也運謂六氣之化運如子午寅申辰戌六歲主有餘其主歲主時之氣皆先天時而至如丑未卯酉巳亥六歲主不及其主歲至時之氣皆後天時而至正歲謂歲會之紀非太過非不及其氣應時而至也帝曰勝復之氣其常在也災眚時至候也奈何岐伯曰非氣化者是謂災也此論五運之勝復而為災眚者何以候之非氣化者謂非運氣之化也如丁卯丁酉歲其運風清熱風乃少角之氣化其清熱乃勝復之氣此邪化也是謂災眚徐振公曰此篇論司天在上在泉在下而運化於中故此節論司天在泉之中而兼論其運氣帝曰天地之數終始奈何岐伯曰悉乎哉問也是明道也數之始起於上而終於下歲半之前天氣主之歲半之後地氣主之上下交互氣交主之歲紀畢矣故曰位時氣月可知乎所謂氣也天謂司天地謂在泉道謂天地陰陽之道數之始起於上者謂數之始於一而起於天一也終於下者謂天數之始於一而終於地六也歲半之前歲半之後者謂天地之氣上下有位也氣交者謂天地之氣上下相交也位謂司天在泉及左右間氣之六位氣月謂一氣之各主兩月也愚謂司天在泉之六氣總屬天一所生之真元真元者精氣也氣為陽精為陰一陰一陽化生太少之四象而共為六氣也天包乎地之外故不曰在地而曰在泉精通乎天之上故曰天有精也六氣循天而環轉故六期而環會復通貫乎地之中故上下交互也故曰食歲谷以全其真食間谷以保其精真者元真之氣精者天一之精是以上文曰此天之道氣之常也帝曰余司其事則而行之不合其數何也岐伯曰氣用有多少化洽有盛衰衰盛多少同其化也帝曰願聞同化何如岐伯曰風溫春化同熱曛昏火夏化同勝與復同燥清煙露秋化同雲雨昏瞑埃長夏化同寒氣霜雪冰冬化同此天地五運六氣之化更用盛衰之常也此論五運六氣有同化之盛衰是以有不合也不合其數者不合六氣之數也氣用有多少者謂六氣之用有有餘不足也化洽有盛衰者謂五運之化有太過不及也風熱寒燥者言陰陽之六氣也春夏秋冬者言角徵宮商羽主歲而主時也風溫春化同者厥陰與角運同化也熱曛夏化同者少陰少陽與徵運同化也勝與復同者謂五運之勝與復氣亦與六氣之相同也如清金勝角木其勝氣即與陽明同炎火復秋金其復氣即與少陰少陽同也此天地五運六氣之化更用盛衰之常是以有不合也如風溫之多合春化之盛是氣運同其化矣若六氣之少合五運之盛五運之衰合六氣之多此盛衰更用而不合矣此節論六氣主歲主時之多少又當審五運主歲主時之盛衰合而推之斯得氣運之微妙帝曰五運行同天化者命曰天符余知之矣願聞同地化者何謂也岐伯曰太過而同天化者三不及而同天化者亦三太過而同地化者三不及而同地化者亦三此凡二十四歲也帝曰願聞其所謂也岐伯曰甲辰甲戌太宮下加太陰壬寅壬申太角下加厥陰庚子庚午太商下加陽明如是者三此太過而同地化者三運合六氣計六歲癸巳癸亥少徵下加少陽辛丑辛未少羽下加太陽癸卯癸酉少徵下加少陰如是者三此不及而同地化者三運合六氣計六年戊子戊午太徵上臨少陰戊寅戊申太徵上臨少陽丙辰丙戌太羽上臨太陽如是者三此太過而同天化者三運合六氣計六年丁巳丁亥少角上臨厥陰乙卯乙酉少商上臨陽明己丑己未少宮上臨太陰如是者三此不及而同天化者三運合六氣計六年除此二十四歲則不加不臨也言此二十四歲則上下加臨餘三十六歲則不加不臨也帝曰加者何謂岐伯曰太過而加同天符不及而加同歲會也此言太過而同地化者與天符相同不及而同地化者與歲會相同帝曰臨者何謂岐伯曰太過不及皆曰天符而變行有多少病形有微甚生死有早晏耳言太過不及之十二歲皆曰天符然內有變行多少之分焉多少者即太過不及之變也太過者暴不及者徐暴者為病甚徐者為病持故有微甚死生之分焉按馬注引執法行令貴人而言然此節單論天符之有太過不及前篇分別天符歲會太一天符與此不相符合帝曰夫子言用寒遠寒用熱遠熱余未知其然也願聞何謂遠岐伯曰熱無犯熱寒無犯寒從者和逆者病不可不敬畏而遠之所謂時興六位也興起也此總言一歲之中有應時而起之六位各主六十日零八十七刻半各有寒熱溫涼之四氣皆宜遠而無犯之如初之氣天氣尚寒是宜用熱時值少陽相火司令又當遠此一位而無犯也如二之氣天氣已溫是宜用涼時值太陽寒水司令又當遠此一位而用涼也每歲之六氣皆然從則和逆則病不可不敬畏而遠之帝曰溫涼何如岐伯曰司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯間氣同其主無犯異其主則小犯之是謂四畏必謹察之此分論司天在泉及間氣之無犯也如少陰在上司氣以熱而用熱者又當遠此少陰之熱而無犯也如陽明在泉司氣以涼而用涼者又當遠此陽明之涼而無犯也餘氣皆然如間氣與司天在泉之主氣相同者不可犯與主氣異者則小犯之假如少陽司天初氣乃少陰君火是與司天之氣相同無犯其熱如少陰在泉四之氣乃太陽寒水是與主氣相異可少用熱而小犯之是謂寒熱溫涼之四畏不可不謹察也帝曰善其犯者何如岐伯曰天氣反時則可依時及勝其主則可犯以平為期而不可過是謂邪氣反勝者天氣反時者如司氣以熱而天氣反涼是當依時而用溫矣如司氣以熱而寒反勝之又可用熱而犯主氣之熱矣然只以氣平為期不可過用以傷司氣之元真是謂邪氣反勝者則可犯也故曰無失天信無逆氣宜無翼其勝無贊其復是謂至治天信謂氣之應時而至者無差失而妄犯之六氣各有所宜而不可逆有勝氣又宜折之而無翼其勝有復氣又當抑之而無贊其復調之正味使上下合德無相奪倫五運和平勿乖其政是謂主治帝曰善五運氣行主歲之紀其有常數乎岐伯曰臣請次之此章與上章大義相同前以太陽為始序三陽三陰之六氣以角運為初序角徵宮商羽之五音而年歲有所不齊也故今以天干始於甲地支始於子從甲子而至癸巳三十歲而為一紀復從甲午而至癸亥六十歲而為一周斯歲運始順故復次之甲子甲午歲上少陰火中太宮土運下陽明金熱化二天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之天干始於甲地支始於子故其數從生始雨化五此運居其中太過者其數成不及者其數生雨為土化土常以生故其數五燥化四乃己卯己酉也己主不及故其數生所謂正化日也無勝復之邪化故為正化所謂日者以一運統主一歲而五運又以角木為初羽水為終各分主七十二日有奇也其化上鹹寒中苦熱下酸熱所謂藥食宜也上謂司天下謂在泉中謂化運君火司天故宜鹹寒以制化太陰濕土運化於中故宜苦以燥濕熱以溫陰陽明清涼在泉故宜酸以助收熱以溫涼藥食並相宜也此即上章宜苦燥之溫之食宜同法之義餘歲俱仿此乙丑乙未歲上太陰土中少商金運下太陽水熱化寒化勝復同所謂邪氣化日也不及之運有勝復金運不及火熱勝之金之子寒水來復有勝復之邪氣故為邪化所謂日者謂勝氣在勝彼所主之七十二日復氣在復我所司之七十二日此即上章清熱勝復同其運風清熱之義余不及歲俱准此災七宮按九宮分野七乃兌宮金運不及為熱寒勝復故主災眚在於兌之西方上章以太過之歲而主民病此以不及之歲而言災眚蓋太過之氣暴不及之氣徐病甚而災微也濕化五乙主不及故其數生按乙運不及則丑未之司天在泉亦主不及氣運之同也清化四運不及故其數生余不及歲俱准此寒化六乃庚辰庚戌也庚主太過故其數成所謂正化日也濕化五清化四寒化六皆主正化無勝復之邪氣也五運之氣又各分主七十二日司天在泉之氣各主六十日而有奇其化上苦熱中酸和下甘熱所謂藥食宜也金氣主收故宜酸以收之和者謂五運之氣雖各主一歲而一歲之中又有生長化收藏之五運故又宜五味以和之甘為土味能制化寒水丙寅丙申歲上少陽相火中太羽水運下厥陰木火化二火臨於上水承製之故主不及寒化六運太過故其數成余太過運俱准此風化三乃辛巳辛亥也巳亥主不及故其數生所謂正化日也其化上鹹寒中鹹溫下辛溫所謂藥食宜也水運主咸而以咸助之後之化運多用和助之味所謂折其鬱氣資其化源也丁卯丁酉歲上陽明金中少角木運下少陰火清化熱化勝復同所謂邪氣化日也清主勝氣熱乃復氣災三宮三宮主震分野之東方也燥化九委和之紀上商與正商同故主成蓋木運不及金氣勝之今又燥化臨於上則金氣盛矣風化三熱化七壬子壬午也子午主太過故其數成所謂正化日也其化上苦小溫中辛和下鹹寒所謂藥食宜也戊辰戊戌歲上太陽水中太徵火運下太陰土寒化六辰戌主太過故其數成熱化七濕化五癸丑癸未也丑未主不及故其數生所謂正化日也其化上苦溫中甘和下甘溫藥食宜也己巳己亥歲上厥陰木中少宮土運下少陽相火風化清化勝復同所謂邪氣化日也災五宮乃中央土宮風化三巳亥主不及故其數生濕化五火化七乃戊寅戊申也寅申主太過故其數成所謂正化日也其化上辛涼中甘和下鹹寒所謂藥食宜也庚午庚子歲上少陰火中太商金運下陽明金熱化七子午主太過故其數成清化九金運太過燥化九乃乙卯乙酉也從革之紀上商與正商同故主成蓋金氣不及而得運化之助故與正商相同而盛也所謂正化日也其化上鹹寒中辛溫下酸溫所謂藥食宜也辛未辛丑歲上太陰土中少羽水運下太陽水雨化風化勝復同所謂邪氣化日也災一宮乃北方坎位雨化五丑未主不及故其數生寒化一在化運主不及故其數生在在泉乃丙辰丙戌也辰戌乃太陽之水合丙之化運而始生故其數一所謂正化日也其化上苦熱中苦和下苦熱所謂藥食宜也壬申壬寅歲上少陽相火中太角木運下厥陰木火化二壬申壬寅為同天符故其數生天主生也風化八在中運主角木太過故其數成在在泉乃丁巳丁亥也委和之紀上角與正角同故主成蓋木氣不及而得運化之助則木氣盛矣故其數八所謂正化日也其化上鹹寒中酸和下辛涼所謂藥食宜也癸酉癸卯歲上陽明金中少徵火運下少陰火寒化雨化勝復同所謂邪氣化日也災九宮乃南方離位燥化九伏明之紀上商與正商同故主成蓋火運不及收氣自政而又上臨於司天則其氣盛矣熱化二在中運主不及故其數二在在泉乃戊子戊午屬天符之歲故其數生蓋天生而地成也正化日也其化上苦小溫中鹹溫下鹹寒藥食宜也甲戌甲辰歲上太陽水中太宮土運下太陰土寒化六辰戌主太過故其數成按土盛而不勝水者乃歲會之年氣之平也故無勝復濕化五在中運土常以生在在泉乃己丑己未丑未主不及故其數生正化日也其化上苦熱中苦溫下苦溫藥食宜也乙亥乙巳歲上厥陰木中少商金運下少陽相火熱化寒化勝復同邪氣化日也災七宮風化八從革之紀上角與正角同故主成蓋金運不及生氣乃揚而又上臨於司天則木氣盛矣清化四火化二乃庚寅庚申也當主成數疑誤故闕正化度也度者謂所主之時度也其化上辛涼中酸和下鹹寒藥食宜也丙子丙午歲上少陰火中太羽水運下陽明金熱化二火司於上水承製之故主不及寒化六清化四乃辛卯辛酉也卯酉主不及故其數生正化度也其化上鹹寒中咸熱下酸溫藥食宜也丁丑丁未歲上太陰土中少角木運下太陽水清化熱化勝復同邪氣化度也災三宮雨化五丑未主不及故其數生風化三寒化一乃壬辰壬戌也辰戌之水合於水而始生故其數一按天一始生之水曰天癸然太陽之水上合丙之化氣壬之生氣而不與辛癸相合蓋辛與丙合壬與癸合也倪仲宣曰寒水在泉土製於上故主不及玉師曰土應勝水有木製其中正化度也其化上苦溫中辛溫下甘熱藥食宜也戊寅戊申歲上少陽相火中太徵火運下厥陰木火化七寅申太徵皆主火運太過故其數成風化三乃癸巳癸亥也巳亥主不及故其數生正化度也其化上鹹寒中甘和下辛涼藥食宜也己卯己酉歲上陽明金中少宮土運下少陰火風化清化勝復同邪氣化度也災五宮清化九金不及而土運生之故其氣盛雨化五熱化七乃甲子甲午也子午主太過故其數成正化度也其化上苦小溫中甘和下鹹寒藥食宜也庚辰庚戌歲上太陽水中太商金運下太陰土寒化一土製其水故主不及清化九雨化五乃乙丑乙未也丑未主不及故其數生正化度也其化上苦熱中辛溫下甘熱藥食宜也辛巳辛亥歲上厥陰木中少羽水運下少陽相火雨化風化勝復同邪氣化度也災一宮風化三巳亥主不及故其數生寒化一火化七乃丙寅丙申也寅申主太過故其數成正化度也其化上辛涼中苦和下鹹寒藥食宜也壬午壬子歲上少陰火中太角木運下陽明金熱化二受壬水之制故主不及風化八清化四乃丁卯丁酉也卯酉主不及故其數生正化度也其化上鹹寒中酸涼下酸溫藥食宜也癸未癸丑歲上太陰土中少徵火運下太陽水寒化雨化勝復同邪氣化度也災九宮雨化五丑未主不及故其數生火化二寒化一乃戊辰戊戌也水受土製故主不及正化度也其化上苦溫中鹹溫下甘熱藥食宜也甲申甲寅歲上少陽相火中太宮土運下厥陰木火化二寅申主太過其數成疑誤故闕雨化五風化八乃己巳己亥也上角與正角同故主成蓋卑監之紀化氣不令生政獨彰而又與巳亥相合則木氣盛矣故其數八正化度也其化上鹹寒中咸和下辛涼藥食宜也乙酉乙卯歲上陽明金中少商金運下少陰火熱化寒化勝復同邪氣化度也災七宮燥化四卯酉主不及故其數生清化四熱化二乃庚子庚午也同天符歲故其數生正化度也其化上苦小溫中苦和下鹹寒藥食宜也丙戌丙辰歲上太陽水中太羽水運下太陰土寒化六辰戌太羽皆主太過故其數成雨化五乃辛丑辛未也丑未主不及故其數生正化度也其化上苦熱中鹹溫下甘熱藥食宜也丁亥丁巳歲上厥陰木中少角木運下少陽相火清化熱化勝復同邪氣化度也災三宮風化三己亥少角皆主木運不及故其數生火化七乃壬寅壬申也寅申主太過故其數成正化度也其化上辛涼中辛和下鹹寒藥食宜也戊子戊午歲上少陰火中太徵火運下陽明金熱化七子午太徵皆主太過故其數成清化九乃癸卯癸酉也伏明之紀上商與正商同故主成蓋長氣不宣收氣自政而又與卯酉相合則金氣盛矣故其數九正化度也其化上鹹寒中甘寒下酸溫藥食宜也己丑己未歲上太陰土中少宮土運下太陽水風化清化勝復同邪氣化度也災五宮雨化五丑未少宮皆主不及故其數生寒化一乃甲辰甲戌也土盛則水衰故主不及正化度也其化上苦熱中甘和下甘熱藥食宜也庚寅庚申歲上少陽相火中太商金運下厥陰木火化七寅申主太過故其數成清化九風化三乃乙巳乙亥也巳亥主不及故其數生正化度也其化上鹹寒中辛溫下辛涼藥食宜也辛卯辛酉歲上陽明金中少羽水運下少陰火雨化風化勝復同邪氣化度也災一宮清化九涸流之紀少羽與少宮同故其數成蓋藏令不舉化氣乃昌土盛生金則金氣盛矣寒化一熱化七乃丙子丙午也子午主太過故其數成正化度也其化上苦小溫中苦和下鹹寒藥食宜也壬辰壬戌歲上太陽水中太角木運下太陰土寒化六辰戌主太過故其數成風化八雨化五乃丁丑丁未也丑未主不及故其數生正化度也其化上苦溫中酸溫下甘溫藥食宜也癸巳癸亥歲上厥陰木中少徵火運下少陽相火寒化雨化勝復同邪氣化度也災九宮風化八天干終於癸地支終於亥故其數成火化二在化運主少徵故其數二在在泉乃戊寅戊申也歲主天符故其數生正化度也其化上辛涼中咸和下鹹寒藥食宜也以上司天在泉之生數成數諸家以子醜申卯辰巳為對化從標主成午未寅酉戌亥為正化從本主生惟張介賓疑為不熱言內經諸篇並無正對之說止本篇後文云太過者其數成不及者其數生此但欲因生成之數以明氣化之微盛耳故其言生者不言成言成者不言生皆各有深義存焉似不可以強分也然欲明各年生成之義者當以上中下三氣合而觀之以察其盛衰之象庶得本經之義愚按本經之所分太過不及在天干以甲丙戊庚壬主太過乙丁己辛癸主不及在地支以子午寅申辰戌主太過卯酉巳亥丑未主不及今復以子午卯酉之中又分出太過不及是與經旨相違而不與蛇足矣且甲子為六十歲之首子既屬對化主成不當云熱化二矣次庚午為正化主生又不當為熱化七矣再按卯酉之對化五年乃九九九四九奚以卯之對化主四年而酉之正化止一年耶又如己亥之風化五年乃三八三三八再查寅申歲厥陰在泉之風化五年乃三八三八三十年合而論之當主生數五成數五又奚三居六而八居四耶此皆不明經義強為臆說貽誤後人愚仍以子午卯酉之太過不及兼以上中下之生克五運六氣之相資參疏於上其間或有未盡以待後賢參補可也凡此定期之紀勝復正化皆有常數不可不察故知其要者一言而終不知其要流散無窮此之謂也定期之紀謂天干始於甲地支始於子子甲相合三十歲而為一紀六十歲而成一周勝復者不及之年正化者太過之紀皆有經常不易之數要者總屬陰陽之盛衰耳帝曰善五運之氣亦復歲乎此論五運之化受司天在泉之勝制鬱極乃發以報復其歲氣故曰折其鬱氣資其化源蓋謂歲氣勝制其化運當以所勝之味折之而勿使其鬱復也如丁卯丁酉歲少商木運而上臨陽明則木氣鬱矣戊辰戊戌歲太徵火運而上臨太陽則火氣鬱矣己巳己亥歲少宮土運而上臨厥陰則土氣鬱矣庚子庚午歲太商金運而上臨少陰則金氣鬱矣辛丑辛未歲少羽水運而上臨太陰則水氣鬱矣庚寅庚申歲太商金運而相火司天則金氣鬱矣又如乙巳乙亥歲少商金運而相火在泉則金氣鬱矣壬子壬午歲太角木運而陽明在泉則木氣鬱矣癸丑癸未歲少徵火運而太陽在泉則火氣鬱矣甲寅甲申歲太宮土運而厥陰在泉則土氣鬱矣乙卯乙酉歲少商金運而君火在泉則金氣鬱矣丙辰丙戌歲太羽水運而太陰在泉則水氣鬱矣凡此十二運中有太有少並受司天在泉之鬱而後復故曰太過者暴不及者徐岐伯曰鬱極乃發待時而作也待時而作者土鬱發於四之氣金鬱發於五之氣水鬱發於二火前後火鬱發於四之氣惟木發而無時也帝曰請問其所謂也岐伯曰五常之氣太過不及其發異也帝曰願卒聞之岐伯曰太過者暴不及者徐暴者為病甚徐者為病持太過之運受郁其發暴不及之運受郁其發徐持者能主持而不甚也即所謂持於春持於秋之意帝曰太過不及其數何如岐伯曰太過者其數成不及者其數生土常以生也初生之氣微故主不及已成之數盛故主太過天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之五行之氣皆感天生地成地成天生此河圖數也土常以生者土位中央感天干而始化天地之氣皆本於五而終於九此洛書數也故曰天地之間不離於五人亦應之王龍溪曰五行有氣有質皆藉於土如天一生水水之氣也一得五而為六水之質始成洛書所陳九疇皆帝王治天下之大經大法每疇之首不過以數起之倪仲宣曰土位中央其數五合天之生數五得五而成十天地之數在五之中帝曰其發也何如岐伯曰土鬱之發岩谷震驚雷殷氣交埃昏黃黑化為白氣飄驟高深擊石飛空洪水乃從川流漫衍田牧土駒化氣乃敷善為時雨始生始長始化始成故民病心腹脹腸鳴而為數後甚則心痛脅䐜嘔吐霍亂飲發注下胕腫身重云奔雨府霞擁朝陽山澤埃昏其乃發也以其四氣云橫天山浮游生滅怫之先兆此言五郁之發有天地山川之變象有草木蟲獸之兆徵有民病之災眚有寒熱之變更觀其發而知其復也雷者火之氣三之氣主火四之氣主土故殷殷然之雷在土之下火土相合而發於三氣四氣之交白乃金之氣土舒而金化也高深高山深谷之間田牧土駒者蓋因洪水泛衍如駒之土塊散牧于田野之間始者謂土受天干之始化土氣復而生長化收藏之氣咸從土化也民病腹脹腸鳴諸證皆感土氣而發其氣四者發於夏秋之交四之氣也太陰所至為雲雨浮游朝生暮死感濕氣而化生濕土之氣上蒸而為云橫天山下化而浮游生滅此怫鬱欲發之先兆也怫郁也按此五郁之發與氣交變論之郁復不同氣交篇之復即上章之所謂清熱勝復同其運風清熱蓋因主歲之運不及所勝之氣勝之而子氣為母復仇乃運氣之自相勝復也此章之所謂復歲者即上文之所謂折其鬱氣資其化源蓋五運之氣居其中上受司天之勝下受在泉之制無分太過不及咸受其鬱而復發也故其所發者即所郁之本氣非子為母復也是以復氣與民病各有不同學者俱宜體析金鬱之發天潔地明風清氣切大涼乃舉草樹浮煙燥氣以行霿霧數起殺氣來至草木蒼干金乃有聲故民病咳逆心脅滿引少腹善暴痛不可反側嗌乾面塵色惡山澤焦枯土凝霜滷怫乃發也其氣五夜零白露林莽聲淒怫之兆也霿音蒙數葉朔明潔清切金之令也涼燥殺氣金之氣也此所郁之金氣復發而政令復行也咳逆嗌乾肺之病也靈樞經曰足少陽是動病心脅痛不能轉側甚則面有微塵體無膏澤又曰肝是動則病腰痛嗌乾面塵脫色蓋金氣復而肝木病也土凝霜滷者言土凝如霜之鹽即芒硝火硝是也其氣五者發於五之氣也夜雪白露言露濃之如雪林莽聲淒聲在樹間此秋聲也金之鬱氣欲發之先兆也水鬱之發陽氣乃闢陰氣暴舉大寒乃至川澤嚴凝寒氛結為霜雪甚則黃黑昏翳流行氣交乃為霜殺水乃見祥故民病寒客心痛腰脽痛大關節不利屈伸不便善厥逆痞堅腹滿陽光不治空積沉陰白埃昏瞑而乃發也其氣二火前後太虛深玄氣猶麻散微見而隱色黑微黃怫之先兆也闢避也氣交乃夏秋之交相火之後也霜殺寒結為霜而殺物也祥怪異也腰脽腎之府也關節屈伸乃筋骨之病腎主骨而筋屬於節也厥逆痞堅腹滿者陽氣下藏中氣塞也君火主二之氣相火主三之氣其氣發於二火之前後也氣猶麻散者寒凝之氣感火氣而欲散也木鬱之發太虛埃昏雲物以擾大風乃至屋發折木木有變故民病胃脘當心而痛上肢兩脅膈咽不通食飲不下甚則耳鳴眩轉目不識人善暴僵仆太虛蒼埃天山一色或氣濁色黃黑郁若橫云不起雨而乃發也其氣無常長川草偃柔葉呈陰松吟高山虎嘯岩岫怫之先兆也太虛埃昏木氣發而埃土飛揚雲物以擾風之動也屋發折木鬱怒之大發也民病胃脘咽膈食飲不下木勝而土傷也上肢兩脅耳鳴眩轉僕不識人風氣之為病也天山一色皆蒼色也濁色埃土昏翳也按土鬱曰黃黑埃郁水鬱曰黃黑昏翳木鬱曰黃黑郁若蓋言天元地黃天地之氣色交相拂鬱也橫云不起雨者風行天上密雲不雨也風乃天地四方之氣故所發無常松吟高山風之聲也虎嘯岩岫虎嘯則風生風從虎也此木鬱將發之先兆也火鬱之發太虛曛翳大明不彰炎火行大暑至山澤燔燎材木流津廣廈騰煙土浮霜滷止水乃減蔓草焦黃風行惑言濕化乃後故民病少氣瘡瘍癰腫脅腹胸背面目四肢䐜憤臚脹瘍痱嘔逆瘛瘲骨痛節乃有動注下溫瘧腹中暴痛血溢流注精液乃少目赤心熱甚則瞀悶懊憹善暴死刻終大溫汗濡玄府其乃發也其氣四動復則靜陽極反陰濕令乃化乃成華髮水凝山川冰雪焰陽午澤怫之先兆也大明日月之光明也火鬱發而曛翳於上則日月之明不彰土浮霜滷者水濕之氣受鬱熱上蒸而成如霜之滷也惑言者嘻嘻嗃嗃形容其風自火出也風火相合是以陰濕之氣在後乃化民病癰腫諸證皆火熱盛而精血傷也少氣者火為氣之賊也瞀悶肺氣病也火甚精傷故善暴死刻終者謂一氣分主六十日零八十七刻半如三氣之終而大溫將發於四之氣也元府汗空也動復則靜陽極反陰者少陰所至為熱生終為寒少陰之從本從標也濕令乃化乃成者少陽所至為火生終為蒸溽也水凝冰雪寒之勝也光華之氣發於水凝焰陽之熱生於午澤山澤通氣也此二火之氣受寒氣之鬱極而復將發也按五行之中有二火陽火以明而在天陰火以位而在地華髮水凝者陽火之將發也焰陽午澤者陰火之欲復也陽火由水中而生陰火從地澤而發有怫之應而後報也皆觀其極而乃發也木發無時水隨火也報復也如華髮水凝焰陽午澤怫之應也陽極反陰山川冰雪郁之極也風氣行於四時是以木發無時水發於二火前後故水隨火也按戊癸化火火生於水澤之中水火之相合也是以華髮水凝水隨火發謹候其時病可與期失時反歲五氣不行生化收藏政無恆也謹候其時則病可期而知亦可以先期而調之失時失五音六氣所主之時反歲逆司天在泉之歲氣不能使之上下合德無相奪倫五氣不行者不能使五運宣行致乖其生化收藏之常政矣帝曰水發而雹雪土發而飄驟木發而毀折金髮而清明火發而曛昧何氣使然岐伯曰氣有多少發有微甚微者當其氣甚者兼其下徵其下氣而見可知也此申明五運之郁受六氣之勝制也按六微旨大論曰願聞地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之相火之下水氣治之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之此言六氣之有定位各有承製之在下故曰徵其下氣而見可知言徵其六氣在下之承製則所見水發之雹雪土發之飄驟可知矣氣有多少者五運之氣有太過不及也發有徵甚者有徐有暴也當其氣者當其本氣而自發也兼其下者水發而兼土之雹雪土發而兼木之飄驟木發而兼金之毀折金髮而兼火之清明火發而兼水之曛昧蓋分別此章之復乃受六氣之郁非五運之自相勝復也帝曰善五氣之發不當位者何也岐伯曰命其差帝曰差有數乎岐伯曰後皆三十度而有奇也差音雌位謂五運所主之時命令也差參差也言五運之發不當其本位而發者乃所行之政令有差也如水位於冬而所發在於二火前之正月二月土位於長夏而所發在於四氣之七月八月金位於秋而所發在於五氣之九月十月火位於夏而所發在於四氣之七月八月皆後發三十日而有奇蓋鬱極而後乃發是以去本位之少遲帝曰氣至而先後者何岐伯曰運太過則其至先運不及則其至後此候之常也帝曰當時而至者何也岐伯曰非太過非不及則至當時非是者眚也此論五運主時之有太過不及也氣謂四時之氣運謂五運之化五運各主七十二日有奇運太過則其氣至先運不及則其氣至後此時候之常也非太過非不及則氣至當時非是者則生長化收藏之氣不應而為四時之災眚矣帝曰善氣有非時而化者何也岐伯曰太過者當其時不及者歸其己勝也此論六氣主時之有太過不及也六氣各主六十日有奇如清肅之氣行於春炎熱之氣行於秋凝寒之氣行於夏溽蒸之氣行於冬是謂非時而化蓋太過者當其時而各司寒熱溫涼之氣不及者歸其已勝己勝者謂歸於勝己之氣即非時之化也前章論五運六氣之主歲而有盛衰此復論五運六氣之主時而亦有太過不及帝曰四時之氣至有早晏高下左右其候何如岐伯曰行有逆順至有遲速故太過者化先天不及者化後天帝曰願聞其行何謂也岐伯曰春氣西行夏氣北行秋氣東行冬氣南行故春氣始於下秋氣始於上夏氣始於中冬氣始於標春氣始於左秋氣始於右冬氣始於後夏氣始於前此四時正化之常故至高之地冬氣常在至下之地春氣常在必謹察之帝曰善此論四時之氣而有太過不及也早晏者先天而至後天而至也順者春氣西行夏氣北行秋氣東行冬氣南行逆者反順為逆也春氣生於東故從東而西行夏氣發於南故從南而北行秋氣始於西故從西而東行冬氣本於北故從北而南行此四時之應四方也故春氣至下而升秋氣從上而降夏火之氣由中而布於四旁冬藏之氣從表而歸於內腑左東右西前離後坎此四時之有高下左右乃正化之常也故至高之地冬氣常在謂收藏之氣從高而下自外而內也至下之地春氣常在謂生長之氣自下而升從內而外也上節論五運六氣之太過不及以應四時之早晏此論四時氣之遲速以應五運六氣之盛衰黃帝問曰五運六氣之應見六化之正六變之紀何如岐伯對曰夫六氣正紀有化有變有勝有復有用有病不同其候帝欲何乎帝曰願盡聞之此論五運六氣之主時而各有德化政令勝復變病之常夫前章之所謂初之氣二之氣者論加臨之客氣乃六期環轉各有不同此復論四時之主氣有春之木夏之火秋之金冬之水各主七十二日有奇又有初氣之厥陰二氣之少陰三氣之少陽四氣之太陰五氣之陽明六氣之太陽各主六十日零八十七刻半此四時不易之氣有寒熱溫涼生長收藏之政令故曰常岐伯曰請遂言之夫氣之所至也厥陰所至為和平少陰所至為暄太陰所至為埃溽少陽所至為炎暑陽明所至為清徑太陽所至為寒氛時化之常也氣之所至謂四時有五運六氣之所至也春氣舒遲故為和平暄春晚也又溫暖也蓋少陰雖主君火而本寒故主於寒熱之交以司溫和之氣此節蓋以厥陰風木主春少陽炎暑主夏陽明清涼主秋太陽寒水主冬此四時氣化之常也故以太陰轉列於少陽之前者謂土氣分旺於四季先從春夏始也此首論六氣之中有五運五運之中有四時厥陰所至為風府為璺啓少陰所至為火府為舒榮太陰所至為雨府為員盈少陽所至為熱府為行出陽明所至為司殺府為庚蒼太陽所至為寒府為歸藏司化之常也璺音問府者各有所司也璺啓開坼也舒榮舒展而榮華也員盈周備也夏氣始於中行出者從中而出於外也庚更也草木至秋而更變也歸藏者萬物至冬而歸藏也此三陰三陽各有風寒濕熱之所司而為璺啓舒榮之化故為司化之常厥陰所至為生為風搖少陰所至為榮為形見太陰所至為化為雲雨少陽所至為長為蕃鮮陽明所至為收為霧露太陽所至為藏為周密氣化之常也生長化收藏五時之氣也風搖形見氣之化也故為氣化之常厥陰所至為風生終為肅少陰所至為熱生中為寒太陰所至為濕生終為注雨少陽所至為火生終為蒸溽陽明所至為燥生終為涼太陽所至為寒生中為溫德化之常也肅肅殺也風能生萬物而終為肅殺之氣蓋四時皆有風氣故能生長萬物而亦能收殺也少陰太陽為水火陰陽之主太陽標陽而本寒少陰標陰而本熱少陰之上熱氣治之中見太陽太陽之上寒氣治之中見少陰陰陽標本互換於中故中寒而中溫也太陰濕土之氣上蒸而為云為雨故終為注雨少陽相火生於地澤故終為溽蒸陽明燥金終為清涼生者謂六氣所生之德而為涼為肅德之化也厥陰所至為毛化少陰所至為羽化太陰所至為倮化少陽所至為羽化陽明所至為介化太陽所至為鱗化德化之常也五類之蟲感五運六氣而生育故為德化之常也厥陰所至為生化少陰所至為榮化太陰所至為濡化少陽所至為茂化陽明所至為堅化太陽所至為藏化布政之常也生茂堅藏乃六氣之政而宣布於四時厥陰所至為飄怒大涼少陰所至為太暄寒太陰所至為雷霆驟注列風少陽所至為飄風燔燎霜凝陽明所至為散落溫太陽所至為寒雪冰雹白埃氣變之常也飄怒風之變涼乃金氣承之大暄火之甚寒乃陰精承之雷霆驟注濕土之變極則風氣承之飄風者風自火出也燔燎炎之甚極則水氣承之散落肅殺之甚溫乃火氣承之寒雪冰雹寒之甚也極則土氣承之蓋氣極則變變則害承乃制厥陰所至為撓動為迎隨少陰所至為高明焰為曛太陰所至為沉陰為白埃為晦瞑少陰所至為光顯為彤雲為曛陽明所至為煙埃為霜為徑切為淒鳴太陽所至為剛固為堅芒為立令行之常也迎隨往來也彤雲者澤氣上蒸而為云也淒鳴金有聲也剛固堅芒乃寒凝冰堅之象此六氣之令行於四時之常也厥陰所至為裡急少陰所至為瘍疹身熱太陰所至為積飲痞隔少陽所至為嚏嘔為瘡瘍陽明所至為浮虛太陽所至為屈伸不利病之常也此春病之常也裡急逆氣上升也厥陰主春春氣始於下而上故為裡急陽明主秋秋氣始於上故為浮虛火生於木風火相煽故為身熱瘡瘍土位中央而分旺於四季故四時為痞稸中滿之病太陽主筋為風氣所傷故緛短而屈伸不利厥陰所至為支痛少陰所至為驚惑惡寒戰栗譫妄太陰所至為稸滿少陽所至為驚躁瞀昧暴病陽明所至為鼽尻陰股膝髀腨䯒足病太陽所至為腰痛病之常也稸音畜瞀音務尻音敲此夏病之常也厥陰所至為緛戾少陰所至為悲妄衄衊太陰所至為中滿霍亂吐下少陽所至為喉痹耳鳴嘔湧陽明所至為脅痛皴揭太陽所至為寢汗痙病之常也緛音軟戾葉利衊音蔑皴音逡此秋病之常也緛縮也戾了戾也即轉出小便之關戾厥陰主利前陰而脈絡陰器為燥金所傷故戾緛不利皴皺也以燥而遇燥故皮為皴揭厥陰所至為脅痛嘔泄少陰所至為語笑太陰所至為重胕腫少陽所至為暴注瞤瘛暴死陽明所至為鼽嚏太陽所至為流泄禁止病之常也此冬病之常也心主言而喜為心志君火為冬令之寒水所迫則心氣實而語笑不休以上四時諸病有因於六氣者有因於四時者學者引而伸之以意會之其義自得此論四時之五運六氣有德有化有政有令有變有病凡此十二變者報德以德報化以化報政以政報令以令氣高則高氣下則下氣後則後氣前則前氣中則中氣外則外位之常也報德以德報化以化者即所謂春有鳴條律暢之化則秋有霧露清涼之政蓋無勝則無復也氣高則高氣下則下者謂春氣始於下則五運六氣皆主厥陰之風木秋氣始於上則五運六氣皆屬陽明之燥金夏氣始於前則五運六氣皆主少陽之炎暑冬氣始於後則五運六氣皆屬太陽之凝寒此四時六氣皆有定位之常非若客氣之環轉也此復結上文之義故風勝則動火勝則腫燥勝則乾寒勝則浮濕勝則濡泄甚則水閉胕腫隨氣所在以言其變耳首問五運六氣之應而上章獨論六氣之變故復論其五運焉風熱燥寒四時之氣也以濕土而列於四時之後者謂土旺四季先春夏而後秋冬也隨氣所在者隨四時之氣而言五運之勝耳在者言風氣在春熱氣在夏燥氣在秋寒氣在冬濕氣在於四季各主七十二日有奇帝曰願聞其用也岐伯曰夫六氣之用各歸不勝而為化故太陰雨化施於太陽太陽寒化施於少陰少陰熱化施於陽明陽明燥化施於厥陰厥陰風化施於太陰各命其所在以徵之也此論五行勝化之為用也命其所在而徵之者太陰之氣在於長夏太陽之氣在於冬少陰之氣在於夏陽明之氣在於秋厥陰之氣在於春如冬有雨化以徵太陰之勝夏有寒化以徵太陽之勝此與春勝長夏長夏勝冬之義相同徐振公曰此即帝所問之有勝有復在六氣為勝復在四時為勝化帝曰自得其位何如岐伯曰自得其位常化也帝曰願聞所在也岐伯曰命其位而方月可知也自得其位者四時之六氣各自司其本位此時化之常也厥陰位於正月二月少陰位於三月四月各命其位而方之月則可知六氣之所在矣帝曰六位之氣盈虛何如岐伯曰太少異也太者之至徐而常少者暴而亡此言主時之六氣亦有盛有虛乃隨歲運之太少也歲運太過則六位之氣盈歲運不及則六位之氣虛蓋太過之氣來徐而長不及之氣來疾而短故曰少者暴而亡金西銘曰太過之氣先天時而至故徐而長不及之氣後天時而至故暴而短譬如人之後至則疾行而趨走矣帝曰天地之氣盈虛何如岐伯曰天氣不足地氣隨之地氣不足天氣從之運居其中而常先也惡所不勝歸所同和隨運歸從而生其病也故上勝則天氣降而下下勝則地氣遷而上多少而差其分微者小差甚者大差甚則位易氣交易則大變生而病作矣大要曰甚紀五分微紀七分其差可見此之謂也惡去聲差葉雌此論主時之六氣亦有天地盈虛之分而上下相勝也歲半以上天氣主之歲半以下地氣主之運居於天地之中常先天地之氣而為之勝故曰隨運歸從而生其病謂天地之氣歸從運氣而彼此相勝也氣交謂三氣四氣之交如天氣不足地氣隨之則四之土氣先交於三氣之火如地氣不足天氣隨之則三之火氣先交於四氣之土此火土子母相合謂之歸所同和乃勝之微者也微者小差小差者在天之紀仍居七分而三分交於地在地之紀仍居七分而三分交於天此上下氣交不為民病者也惡所不勝者惡己所不勝之氣也太陽寒化施於少陰陽明燥化施於厥陰此下勝則地氣遷而上厥陰風化施於太陰少陰火化施於陽明此上勝則天氣降而下乃勝之甚者也甚者大差大差者在天之紀居五分而五分直降於下在地之紀居五分而五分反遷於上故曰甚則位易氣交易則大變生而病作矣位易者謂越三氣四氣之位而初氣二氣行於五位六位五氣六氣行於初位二位此所不勝之氣勝之故曰惡所不勝越其位而加之故曰大變如歸所同和則不越位矣帝曰善論言熱無犯熱寒無犯寒余欲不遠寒不遠熱奈何岐伯曰悉乎哉問也發表不遠熱攻裡不遠寒帝曰不發不攻而犯寒犯熱何如岐伯曰寒熱內賊其病益甚帝曰願聞無病者何如岐伯曰無者生之有者甚之帝曰生者何如岐伯曰不遠熱則熱至不遠寒則寒至寒至則堅痞腹滿痛急下利之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘛腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閟之病生矣帝曰治之奈何岐伯曰時必順之犯者治以勝也此言主時之六氣亦當遠寒而遠熱者也按前章之所謂熱無犯熱寒無犯寒者論司天在泉及加臨之六氣此章論主時之六氣亦有寒熱溫涼之分故帝復有此問辛甘發散為陽故有病而應發散者即當遠熱而不遠熱矣酸苦湧泄為陰如有病而應攻裡者即當遠寒而不遠寒矣如雖病而不宜發表攻裡若妄犯之則寒熱內賊其病益甚若無病而不遠熱不遠寒者則堅痞腹滿身熱吐下之病生矣時謂四時治以勝者如犯熱則以所勝之寒治之如犯寒則以所勝之熱治之張玉師曰後之病生與前章之客氣總論亦可黃帝問曰婦人重身毒之何如岐伯曰有故無殞亦無殞也帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止過者死此言胎孕積聚亦有陰陽寒熱之分所當遠寒而遠熱者也重身謂妊娠而身重毒者大寒大熱之藥也娠婦始結胎之一月二月乃木氣司養三月四月主火五月六月主土七月八月主金九月十月主水至太陽而五行已周陰陽水火分而成後天之形身矣然未生之前五行之氣各有盛有虛有勝有郁宜以寒熱溫涼順逆而調之設或有病而欲不遠寒不遠熱亦無傷於胎氣所謂有故無殞然亦無過之而致殞也即如大積大聚乃屬臟腑之五行尚其可犯寒而犯熱者也若過犯之則死寒熱溫涼是謂四畏可不慎諸此節大有關於治道學者宜細心體會附論七月所生小兒能育而亦多長壽者蓋七月乃肺藏司養肺屬天而主氣主血天一生水感天地之氣而生故育九月十月乃少陰太陽所主皆感陰陽水火而生若夫八月乃陽明大腸主氣感陽明之府氣而生故雖生而不育帝曰善郁之甚者治之奈何岐伯曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之帝曰假者何如岐伯曰有假其氣則無禁也所謂主氣不足客氣勝也此言四時之郁而有調治之法也郁之甚者太陰施於太陽則水鬱矣太陽施於少陰則火鬱矣少陰施於陽明則金鬱矣陽明施於厥陰則木鬱矣厥陰施於太陰則土鬱矣調治之法木鬱則舒達之火鬱則發散之土鬱則疏奪之金鬱則泄利之水鬱則折流之然調其所勝之氣太過者折之以其畏而無復也所謂瀉之謂瀉其勝氣也假者非長夏勝冬冬勝夏夏勝秋秋勝春春勝長夏乃主氣不足客氣勝也如厥陰風木主春而值陽明金氣加臨君相二火主夏而值太陽寒水加臨長夏濕土主氣而值厥陰風木加臨陽明金氣主秋而值二火之氣加臨太陽寒水主冬而值太陰土氣加臨有假其氣竟以寒熱治客氣之勝而主氣之寒熱則無禁也按此篇所謂六元正紀大論者六氣謂之六元五運亦感天元而化首數章論六氣之主歲而五運化於其中各有盛有虛有勝有復末章論六氣之主時隨運歸從上下勝制有勝有鬱而無復善養生者皆當隨時調養以參天地之和施於天下流於無窮乃調變之大關目也帝曰至哉聖人之道天地大化運行之節臨御之紀陰陽之政寒暑之令非夫子孰能通之請藏之靈蘭之室署曰六元正紀非齊戒不敢示慎傳也刺法論篇第七十二佚本病論篇第七十三佚至真要大論篇第七十四此篇論六氣司天六氣在泉有正化有勝復有主客有邪勝至真者謂司天在泉之精氣乃天一之真元要者謂司歲備物以平治其民病無傷天地之至真乃養生之至要也黃帝問曰五氣交合盈虛更作余知之矣六氣分治司天地者其至何如此承上章而言五運六氣互相交合各有太過不及彼此勝制已詳論於前矣今欲分論六氣之司天在泉其氣至之何如也岐伯再拜對曰明乎哉問也天地之大紀人神之通應也王冰曰天地變化人神運為中外雖殊其通應則一也帝曰願聞上合昭昭下合冥冥奈何岐伯曰此道之所生工之所疑也昭昭合天道之明顯冥冥合在泉之幽深道之所生其生惟一工不知其要則流散無窮故多疑也帝曰願聞其道也岐伯曰厥陰司天其化以風少陰司天其化以熱太陰司天其化以濕少陽司天其化以火陽明司天其化以燥太陽司天其化以寒以所臨臟位命其病者也風寒暑濕燥火天之六氣也三陰三陽上奉之故六氣為司天之化臨臟位者天氣上臨而下合人之臟位隨六氣之所傷而命其病也按此篇重在司歲備物以五味六氣舉抑補瀉以平治天地之不和故首提其病焉帝曰地化奈何岐伯曰司天同候間氣皆然帝曰間氣何謂岐伯曰司左右者是謂間氣也帝曰何以異之岐伯曰主歲者紀歲間氣者紀步也此言六氣司天而環繞於地下故與司天同候從左右而環轉是以間氣皆然但司天在泉之氣紀歲間氣紀步之不同也帝曰善歲主奈何岐伯曰厥陰司天為風化在泉為酸化司氣為蒼化間氣為動化少陰司天為熱化在泉為苦化不司氣化居氣為灼化太陰司天為濕化在泉為甘化司氣為黅化間氣為柔化少陽司天為火化在泉為苦化司氣為丹化間氣為明化陽明司天為燥化在泉為辛化司氣為素化間氣為清化太陽司天為寒化在泉為咸化司氣為玄化間氣為藏化故治病者必明六化分治五味五色所生五臟所宜乃可以言盈虛病生之緒也主歲者謂六氣之各主一歲風寒暑濕燥火乃在天之六氣故為司天之化天元紀大論曰在地為化化生五味故在地為味化司氣者司五運之氣化五運者五行之氣也感天之蒼黅丹素元之五色而化生地之五行是以司氣為蒼為丹為黅為素為元君火以明而在天故不司在地之火化所謂居氣者言少陰不司氣化在六氣之中自有所居之上下即下章之南政居南北政居北也間氣之為動為灼為柔為明為清為藏者六氣之用也此論六氣之司天在泉及化運間氣之分治皆有盛有虛而為民病治病者或從歲氣或隨運氣以備物以所生之五味五色合五臟之所宜乃可以言五運六化之盈虛病生之端緒也帝曰厥陰在泉而酸化先余知之矣風化之行也何如岐伯曰風行於地所謂本也餘氣同法本乎天者天之氣也本乎地者地之氣也天地合氣六節分而萬物化生矣故曰謹候氣宜無失病機此之謂也此言司天在泉俱以六氣為本六氣繞地環轉而上下周行又非氣司天化而味主地化也六氣之本於上者即為天之氣本乎下者即為地之氣天地合氣六節分而萬物化生故謹候六氣之所宜無失五行之病機斯得至真之為道王子律曰四時六步皆有風氣帝曰其主病何如岐伯曰司歲備物則無遺主矣帝曰先歲物何也岐伯曰天地之專精也帝曰司歲者何如岐伯曰司氣者主歲同然有餘不足也帝曰非司歲物何謂也岐伯曰散也故質同而異等也氣味有薄厚性用有躁靜治保有多少力化有淺深此之謂也主病謂主治病之藥物司歲備物謂從六氣五運以備之如少陰少陽二火司歲則當收附子薑桂之熱物如陽明燥金司歲則當收桑皮蒼朮之燥物如厥陰風氣主歲則當收防風羌活之風物如太陽寒水司歲則當收芩通大黃之寒物如太陰土氣司歲則當收山藥黃精之類甘平甘溫之品及蒼丹黅素元之谷所謂藥食宜也此皆得天地之專精故先取歲物謂先備司歲之物即上章之所謂食歲谷以全其真蓋食天地之精以養吾身之真也司氣謂五運之氣五運雖與主歲相同然又有太過不及之分太過之歲則物力厚不及之歲則物力淺薄矣若非氣運司歲之物則氣散而力薄故形質雖同而氣味有淺深厚薄之異治保有多少者謂治病保真之藥食或宜多用而宜少用也按中古之世不能司歲備物用炮製以代天地之助如製附子曰炮製蒼朮桑皮曰炒蓋以火助火而以燥助燥也近有製附子水煮曰陰制制桑皮以蜜拌曰潤燥是猶用鷹犬而去其爪牙則驅之搏蹇兔而不能又安望韓盧之技哉帝曰歲主臟害何謂岐伯曰以所不勝命之則其要也此論五運之氣受司天在泉之勝制歲主者謂六氣之主歲臟五臟也蓋言五臟內屬五行而外合五運五運之氣受勝制之所傷則病入五臟而為害矣如少商金運而值二火司天少宮土運而值厥陰在泉此皆運氣之所不勝而受勝氣之所勝制故以所不勝命之則歲主臟害之要可知矣命名也帝曰治之奈何岐伯曰上淫於下所勝平之外淫於內所勝治之上淫於下者謂司天之氣淫勝其在下之運氣當以所勝平之如少商金運而火熱上臨宜平以鹹寒佐以苦甘外淫於內者在泉之氣淫勝其在內之五運當以所勝治之如少宮土運而風木下淫宜治以辛涼佐以苦甘按司天在泉之氣根於外五運之化根於中故曰外淫於內下章平天氣曰平治在泉曰治又諸氣在泉曰淫於內帝曰善平氣何如岐伯曰謹察陰陽所在而調之以平為期正者正治反者反治平氣謂無上下之勝制運氣之和平也甲丙戊庚壬為陽運乙丁己辛癸為陰運陰陽二運有太過不及之分故謹察陰陽所在而調之以平為期正者正治謂太過之歲當抑其勝氣扶其不勝反者反治謂不及之運為所不勝之氣反勝當反佐以取之帝曰夫子言察陰陽所在而調之論言人迎與寸口相應若引繩小大齊等命曰平陰之所在寸口何如岐伯曰視歲南北可知之矣帝曰願卒聞之此承上文以申明少陰之所在也五運之中少陰不司氣化隨六氣之陰陽而上下左右故曰陰之所在何如聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰之上名曰太陽蓋太衝坎位也廣明離位也少陰主天一之坎水而上為太陽之離火是以北政之歲隨三陰而在坎南政之歲從三陽而在離故有應不應之分焉所謂南北者陰陽也五運之中戊癸化火以戊癸年為南政甲乙丙丁己庚辛壬為北政五運之政有南有北少陰之氣有陰有陽是以隨之而上下也寸尺血脈也血乃中焦之汁流溢於下而為精奉心神化赤而為血故脈始於足少陰腎而主於手少陰心是以診寸尺之陰陽以徵少陰之上下岐伯曰北政之歲少陰在泉則寸口不應厥陰在泉則右不應太陰在泉則左不應南政之歲少陰司天則寸口不應厥陰司天則右不應太陰司天則左不應諸不應者反其診則見矣風寒暑濕燥火天之陰陽也三陰三陽上奉之以司主歲之六氣木火土金水火地之陰陽也以司五行之化運化運五歲而右遷而五行之中有二火故君火不司氣化然雖不主運而有所居之位焉少陰之上君火主之是少陰本於陰而主於陽是以南政之歲居陽北政之歲居於陰也司天在南在泉在北此天地之定位人面南而診之寸為陽而在南尺為陰而在北北政之歲少陰在泉則隨陰而居北是以寸口不應南政之歲少陰司天則對陰而居陽是以寸口不應不應者脈微而不應於診此論寸尺之陰陽南北也北政之歲厥陰在泉則少陰在左故右不應太陰在泉則少陰在右故左不應南政之歲厥陰司天則少陰在左故右不應太陰司天則少陰在右故左不應此論人迎寸口之左右也諸不應者謂左右之不應也反其診者以人面南面北而診之也蓋以圖象平置於几上以司天在南在泉在北北政之歲人面北以診之南政之歲人面南以診之則左右之不應可見矣夫天上地下天南地北此天地之定位也人面南而面北者人居天地氣交之中隨天地之氣而環轉也帝曰尺候何如岐伯曰北政之歲三陰在下則寸不應三陰在上則尺不應南政之歲三陰在天則寸不應三陰在泉則尺不應左右同故曰知其要者一言而終不知其要流散無窮此之謂也此總結上文之義故問尺而兼論其寸焉所謂三陰者以少陰居二陰之中上下者以天在上而泉在下也左右同者謂尺之左右不應與寸之左右不應同也故知其要者知少陰之不司氣化隨陰陽而居上居下也不知其要流散無窮者如疏注之議論紛紜而茫無歸著也朱衛公問曰假如甲子甲午歲君火司天而寸口不應是司天之少陰不應於脈耶曰五運六氣之道五運外合五行內合五臟五臟之氣見於六脈而後合於六氣是感五運之氣而見於寸尺也故曰天地之氣無以脈診蓋謂司天在泉之六氣不形於診也是以首提曰臟害當知臟害二字為照應寸尺而言帝曰善天地之氣內淫而病何如岐伯曰歲厥陰在泉風淫所勝則地氣不明平野昧草乃早秀民病灑灑振寒善伸數缺心痛支滿兩脅裡急飲食不下膈咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重此章論六氣在泉而為民病當以所勝之氣味治之厥陰在泉寅申歲也風淫於下則塵土飛揚故地氣不明平野昏昧草得生氣故早秀也按經脈篇云脾是動則病灑灑振寒善伸數缺脾氣病則飲食不下食則嘔腹脹善噫得後與氣則快然如衰身體俱重蓋木淫而土病也又厥陰肝脈上貫膈布脅肋故為心痛支滿等證歲少陰在泉熱淫所勝則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大蟄蟲不藏少陰在泉卯酉歲也少陰君火生於水中是以焰浮川澤少陰標陰而本火故陰處反明腹中常鳴者火氣奔動也氣上衝胸者火氣炎上也喘不能久立寒熱皮膚痛者火淫肺金也目瞑者熱甚陰虛畏陽光也齒痛䪼腫熱乘陽明也發熱如瘧者少陰標本之氣病也熱在下焦則少腹中痛熱在中焦則腹大也歲太陰在泉草乃早榮濕淫所勝則埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病見血少腹痛腫不得小便病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別太陰在泉辰戌歲也土為草木之所資生故草乃早榮黃乃土色黑乃水色土勝濕淫故黃反見黑五常政大論曰太陰司天濕氣下臨腎氣上從黑起水變皆土勝水應之義至陰之交乃三氣四氣之交土司令也飲積心痛寒濕上乘也按經脈篇自耳聾至喉痹乃三焦經病自陰病至不得小便以邪濕下流為腎臟受病自沖頭痛至腨如別乃膀胱經病蓋三焦為決瀆之官膀胱乃水津之府土氣淫勝而水髒水腑皆為病也歲少陽在泉火淫所勝則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便少陰同候少陽在泉巳亥歲也少陽之火地二所生故焰明郊野寒熱更至熱傷血分則注赤熱傷氣分則注白熱在下焦故少腹痛而溺赤血便者甚則血出於小便也少陰之火出自水少陽之火生於地皆有陰陽寒熱之分故與少陰同候歲陽明在泉燥淫所勝則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱陽明在泉子午歲也金氣淫於下則霿霧清瞑於上矣按經脈篇嘔苦善太息心脅痛不能轉側甚則面有微塵體無膏澤足外反熱乃足少陽病嗌乾面塵乃足厥陰病蓋金勝而肝膽病也歲太陽在泉寒淫所勝則凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫太陽在泉丑未歲也水寒淫勝故凝肅慘栗寒淫於下則膀胱與腎受之膀胱居於小腹故少腹痛腎主陰器故控引睪丸太陽之脈挾脊抵腰中故引腰脊腎脈絡心故上衝心痛心主血而寒氣逼之故血見按經脈篇嗌痛頷腫乃小腸經病小腸者心之府也亦水邪上侮火臟火腑而然帝曰善治之奈何岐伯曰諸氣在泉風淫於內治以辛涼佐以苦甘以甘緩之以辛散之風乃木氣金能勝之故治以辛涼過於辛恐反傷其氣故佐以苦甘苦勝辛而甘益氣也木性急故以甘緩之風邪勝故以辛散之臟氣法時論曰肝苦急急食甘以緩之肝欲散急食辛以散之熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之熱乃火氣水能勝之故宜治以鹹寒佐以苦甘甘勝咸所以防咸之過苦能泄所以去熱之實也酸乃木味火生於木以酸收之者收火歸原也熱鬱於內而不解者以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之濕乃陰土之氣故宜治以苦熱苦能勝濕熱以和陰也酸從木化故佐以酸淡以苦燥之者苦從火化也卦傳曰燥萬物者莫熯乎火以淡泄之者淡味滲泄為陽也火淫於內治以鹹冷佐以苦辛以酸收之以苦發之火淫於內故宜治以鹹冷苦能泄辛能散故當佐以苦辛以酸收之以苦發之與上文同義燥淫於內治以苦溫佐以甘辛以苦下之燥乃清涼之金氣故當治以苦溫燥則氣結於內故當佐以辛甘發散以苦下之寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之寒乃水氣土能勝水熱能勝寒故宜治以甘熱臟氣法時論曰腎苦燥急食辛以潤之腎欲堅急食苦以堅之以苦補之以咸瀉之帝曰善天氣之變何如岐伯曰厥陰司天風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上肢兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不去病本於脾衝陽絶死不治厥陰司天巳亥歲也風淫於上故太虛埃昏雲物擾亂寒生於春氣是以流水不冰按經脈篇舌本強食則嘔胃脘痛腹脹飲食不下溏瘕泄水閉皆脾經之病蓋風木淫勝故病本於脾蟄蟲藏於土中因風氣外淫故不去也衛陽足陽明胃脈在足跗上動脈應手胃氣已絶故死不治少陰司天熱淫所勝怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺尺澤絶死不治少陰司天子午歲也怫郁也蓋少陰之火發於陰中故為怫熱少陰太陽陰中有陽陽中有陰陰陽相從標本互換是以火熱甚而大雨至水寒極而運火炎民病胸中煩熱嗌乾右胠滿皮膚痛肺受火熱而津液不生也唾血血泄熱淫而迫血妄行也按經脈篇溺色變肩背臂腨痛煩心胸滿肺脹膨膨而喘咳皆肺經之病蓋火淫則金氣受傷故病本於肺尺澤在肘內廉大交中動脈應手肺之合穴脈也肺氣已絶故死不治太陰司天濕淫所勝則沉陰且布雨變枯槁胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎太溪絶死不治太陰司天丑未歲也濕淫於上是以沉陰且布草木枯槁得化氣之雨而變生胕腫陰痹皆感寒濕之氣病在陰者名曰痹故按之不得也腎主骨而膀胱為之府故腰脊頭項骨痛腎開竅於二陰故大便難也陰氣不用者不能上交於心也上下不交則上焦之火熱留於胃胃熱則消穀故善飢胃氣上逆故不欲食也咳唾有血者心火在上而不得上下之相濟也經脈篇曰腎是動病目䀮䀮無所見心如懸若飢蓋心腎不交故虛懸於上而若飢也此土淫勝水故病本於腎太溪腎之動脈在足內踝外踝骨上太溪脈不至則腎氣已絶故死不治少陽司天火淫所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺天府絶死不治少陽司天寅申歲也火淫所勝故金政不平少陽之火在天為暑故民病頭痛寒熱而瘧熱上皮膚色變黃赤火上淫於肺也肺者太陰皆積水也傳為水者逼其金水外溢故為腫滿之水病也仰息肺氣逆而不得偃息也泄注赤白瘡瘍唾血煩心火熱盛也鼽衄甚而及於肺也此火淫勝金故病本於肺天府肺脈在腋下三寸動脈應手肺氣已絶故死不治陽明司天燥淫所勝則木乃晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木斂生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛丈夫㿗疝婦人少腹痛目昧眥傷瘡痤癰蟄蟲來見病本於肝太衝絶死不治陽明司天卯酉歲也燥金淫勝於上則木受其制故草木生榮俱晚肝血傷而不能榮養筋骨故生內變左胠脅痛肝經病也感寒清而成瘧者秋成痎瘧也大涼革候者夏秋之交變炎暑而為清涼也腹中鳴注泄驚溏寒清於中也菀茂也名木斂於上而生菀於下草焦上首肅殺之氣淫於上也心脅暴痛不可反側嗌乾面塵㿗疝眥瘍皆肝經之病蓋金淫於上故病本於肝太衝在足大指本節後二寸動脈應手肝經之俞穴脈也肝氣已絶故死不治太陽司天寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩僕運火炎烈雨暴乃雹胸腹滿手熱肘攣掖腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心神門絶死不治所謂動氣知其臟也曰寒氣反至者謂太陽為諸陽之首即君火之陽也然本於在下之寒水今寒氣反從上而至是上下皆寒而太陽運居於中故曰運火炎烈夫寒臨於上如陽能勝之即所謂凡傷於寒則為病熱乃病反其本得標之病矣故治反其本得標之方此太陽從本從標寒熱更勝之氣也是以癰瘍嘔血鼽衄腹滿乃陽熱中盛之證如心痛眩僕面赤目黃色炲善噫乃寒凌心火逼其火熱上炎水火寒熱交爭而神門脈絶心氣滅矣神門心之俞穴在手掌後鋭骨端動脈應手故所謂候脈之動氣則知其五臟之存亡矣靈樞經曰邪在心心痛善悲時眩僕又曰上走心為噫帝曰善治之奈何此章論司天之六氣淫勝而以所勝之氣味平之岐伯曰司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之按在泉之氣曰淫於內而曰治司天之氣曰所勝而曰平蓋天氣在外而地氣在內也故曰治者治其內而使之外也曰平者平其上而使之下也是以在在泉曰以辛散之在司天曰以酸瀉之熱淫所勝平以鹹寒佐以苦甘以酸收之此與在泉之治法相同但少以苦發之蓋自下而上淫於內者宜從之而發散於外也濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦溫佐以甘辛以汗為故而止濕乃土之濕氣故上甚而熱者亦宜用辛溫發散以汗為故而止金匱要略曰腰以下腫當利小便腰以上腫當發汗乃愈此皆治水濕之要法火淫所勝平以酸冷佐以苦甘以酸收之以苦發之以酸復之熱淫同少陽之火乃地火也如平之而未平者淫於內也故當以苦發之此即三焦之元氣宜復以酸收之勿使其過於發散世夫少陰之熱君主之火也淫甚則外內相合亦當以苦發之燥淫所勝平以苦溫佐以酸辛以苦下之苦溫能勝清金辛能潤燥燥必內結故以酸苦泄之寒淫所勝平以辛熱佐以甘苦以咸瀉之夫淫於內則干涉於臟氣故上文曰以辛潤之以苦堅之此勝於外止宜平之瀉之而已帝曰善邪氣反勝治之奈何岐伯曰風司於地清反勝之治以酸溫左以苦甘以辛平之熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之濕司於地熱反勝之治以苦冷佐以在鹹甘以苦平之火司於地寒反勝之治以甘熱佐以苦辛以鹹平之燥司於地熱反勝之治以平寒佐以苦甘以辛平之以和為利寒司於地熱反勝之治以鹹冷佐以甘辛以苦平之邪氣反勝者不正之氣反勝在泉主歲之氣又當用勝邪之氣味以平治之上章曰天氣反時則可依時此之謂也帝曰其司天邪勝何如岐伯曰風化於天清反勝之治以酸溫佐以甘苦熱化於天寒反勝之治以甘溫佐以苦酸辛濕化於天熱反勝之治以苦寒佐以苦酸火化於天寒反勝之治以甘熱佐以苦辛燥化於天熱反勝之治以辛寒佐以苦甘寒化於天熱反勝之治以鹹冷佐以苦辛此論六氣司天邪氣反勝宜以所勝之氣味平之帝曰六氣相勝奈何岐伯曰厥陰之勝耳鳴頭眩憒憒欲吐胃膈如寒大風數舉倮蟲不滋胠脅氣並化而為熱小便黃赤胃脘當心而痛上肢兩脅腸鳴飧泄少腹痛注下赤白甚則嘔吐膈咽不通此論三陰三陽主歲之氣淫勝而為民病者宜以所勝之氣味平之耳鳴頭眩木淫於上也大風數舉淫於下而上也憒憒欲吐胃氣如寒胃土病也倮蟲不滋木製之也胠脅氣並肝氣聚也化而為熱小便黃赤木淫而生火也風木氣勝則脾胃受傷故風氣淫於上則胃脘當心而痛上肢兩脅甚則嘔吐膈咽不通淫而下則腸鳴飧泄少腹痛注下赤白所謂風之傷人也善淫而數變少陰之勝心下熱善飢臍下反動氣遊三焦炎暑至木乃津草乃萎嘔逆躁煩腹滿痛溏泄傳為赤沃心下熱善飢外淫之火交於內也臍下反動少陰之標陰發於下也氣遊三焦謂本標之氣遊於上下而交於中也炎暑至者與少陽氣交之時木乃津者得少陰陰水之所資養也草乃萎者受君相二火之暑熱也嘔逆陰氣上逆也煩躁陰陽寒熱之徵也復滿溏泄陰寒在下也傳為赤沃君火下淫也太陰之勝火氣內郁瘡瘍於中流散於外病在胠脅甚則心痛熱格頭痛喉痹項強獨勝則濕氣內郁寒迫下焦痛留頂互引眉間胃滿雨數至燥化乃見少腹滿腰脽重強內不便善注泄足下溫頭重足脛胕腫飲發於中胕腫於上陰濕之氣淫於外則火氣內郁而瘡瘍於中矣濕熱之氣流散於外則及於風木而病在胠脅甚則心痛者木甚而傳於火也熱格頭痛喉痹項強者風火之氣與濕氣相離從頸項而上於巔頂也此言太陰之氣火土相合而淫於歲半以前獨勝者陰濕之氣復勝於歲半以後也濕氣在中故內鬱而迫於下焦痛留頂而互引眉間者風火之氣留於巔頂傳於陽明之經而下及於胃滿也雨數至燥化乃見者至四氣五氣之交而後見此證也少腹滿腰脽重者濕氣下淫而及於腎也足下溫頭重者風火之氣復流於下也足脛胕腫者土淫而水泛也飲發於中胕腫於上者水邪之從下而中中而上也此節論土勝於四時從中而外外而上上而中中而下同四時之氣外內出入環轉一身大有關於病機學者宜體認無忽少陽之勝熱客於胃煩心心痛目赤欲嘔嘔酸善飢耳痛溺赤善驚譫妄暴熱消鑠草萎水涸介蟲乃屈少腹痛下沃赤白少陽之氣合於三焦故熱客於胃蓋三焦之原皆出於胃間也三焦與心主包絡相合故煩心心痛三焦之脈上入耳中絡目鋭眥故淫上則為耳痛目赤淫於中則為嘔飢淫於下則為溺赤少腹痛下沃赤白也善驚譫妄暴熱者陽明胃經熱也三焦之氣蒸津液化營血消鑠者熱盛而血液傷也草萎者暑熱在上也水涸者火氣在下也介蟲乃屈者暑熱在於氣交之中人與天地參也王子律曰少陰與少陽君相相合在少陰反提出三焦二字又曰炎暑至在少陽止微露其端皆經義微妙處陽明之勝清發於中左胠脅痛溏泄內為嗌塞外發㿗疝大涼肅殺華英改容毛蟲乃殃胸中不便嗌塞而咳金氣寒肅故清發於中金勝則木氣受虧故為脅痛㿗疝清氣在下則為溏泄在上則為嗌塞大涼肅殺淫勝極也是以華英改容毛蟲乃殃胸中不便嗌塞而咳者陽明燥金上及於肺同氣相感也太陽之勝凝栗溧至非時水冰羽乃後化痔瘧發寒厥入胃則內生心痛陰中乃瘍隱曲不利互引陰股筋肉拘苛血脈凝泣絡滿色變或為血泄皮膚痞腫腹滿食減熱反上行頭項囟頂腦戶中痛目如脫寒入下焦傳為濡瀉太陽寒水氣勝故凝溧且至非時水冰者勝氣在於歲半以前是以羽蟲後化也靈樞經曰足太陽是主筋所生病者為痔瘧者太陽寒熱之邪也厥逆而入於胃者水侮土也胃絡上通於心故心痛也陰中乃瘍是以隱曲不利而互引陰股足太陽主筋故筋肉拘苛也血脈凝泣絡滿色變或為血泄邪入於經也皮膚痞腫者太陽之氣主表也腹滿食減者水氣乘脾也熱反上行者太陽之氣隨經上入腦還出別下項太陽經脈起於目內眥故目如脫也寒入下焦者太陽標陽而本寒是以陽熱上行而陰寒下行也帝曰治之奈何岐伯曰厥陰之勝治以甘清佐以苦辛以酸瀉之少陰之勝治以辛寒佐以苦鹹以甘瀉之太陰之勝治以咸熱佐以辛甘以苦瀉之少陽之勝治以辛寒佐以甘鹹以甘瀉之陽明之勝治以酸溫佐以辛甘以苦泄之太陽之勝治以甘熱佐以辛酸以咸瀉之治諸勝氣寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者耎之脆者堅之衰者補之強者瀉之各安其氣則病氣衰去此治之大體也帝曰六氣之復何如岐伯曰悉乎哉問也厥陰之復少腹堅滿裡急暴痛偃木飛沙倮蟲不榮厥心痛汗發嘔吐飲食不入入而復出筋骨掉眩清厥甚則入脾食痹而吐衝陽絶死不治復者謂三陰三陽之氣受所勝之氣勝制鬱極而復發也少腹堅滿裡急暴痛厥陰之氣鬱而欲發也偃木飛沙鬱怒之氣大腹也倮蟲不榮風氣發而土氣衰也厥心痛者色蒼蒼如死狀終日不得太息此厥陰之氣干於心也汗發者風熱之陽加於陰也嘔吐飲食不入木淫而土敗也筋骨掉眩風氣盛也清厥者風淫於上陰氣下逆也痹者閉而痛也衝陽胃之動脈此風氣盛而土氣絶也按六氣之勝復與五運不同五運不及之歲有勝氣而子氣為母復仇六氣之勝復無分太過不及有勝則有復無勝則無復勝甚則復甚勝微則復微而所復之氣即是所郁之本氣復發非子復母仇也故曰厥陰之復少陰之復與氣交變章之論復不同也六微旨大論曰寒暑燥濕風火氣有勝復勝復之作有德有化有用有變蓋謂六氣主歲無論司天在泉如上下和平無有勝復此氣之德化也用者勝之始變者復之機此勝復而為民病也張介賓曰按前章天地淫勝只言司天六脈絶者不治而在泉未言此章於六氣之復者復言之正以明在泉之化蓋四氣盡終氣地氣主之復之常也少陰之復燠熱內作煩躁鼽嚏少腹絞痛火見燔焫嗌燥分注時止氣動於左上行於右咳皮膚痛暴喑心痛鬱冒不知人乃灑淅惡寒振栗譫妄寒已而熱渴而欲飲少氣骨痿隔腸不便外為浮腫噦噫赤氣後化流水不冰熱氣大行介蟲不復病痱疹瘡瘍癰疽痤痔甚則入肺咳而鼻淵天府絶死不治燠熱鬱熱也煩躁火煩則陰躁也鼽嚏燠熱上乘於肺也少腹絞痛少陰之陰氣發於下也火見燔焫君火之氣發於上也嗌燥火熱爍金也夫陰寒在腹則注泄得火熱之氣則注止少陰標本併發是以注泄分而時注時止也氣動於左者君火之氣發於左腎之水中上行於右者肺腎上下相交腎為本而肺為末也火淫肺金則咳而皮痛金主聲故暴喑也心痛者火氣自傷也鬱冒不知人者寒熱之氣亂於上也灑淅振栗者陰陽相搏也寒已而熱者少陰之陰寒從火化而為熱也是以渴而欲飲少氣骨痿蓋火盛則少氣熱盛則骨痿也隔腸小腸也噦者小腸之氣不通逆氣上走心而為噫也赤氣後化者覆在五氣終氣是以流水不冰痱疹瘡瘍乃熱傷氣血火熱鑠金故天府絶也太陰之復濕變乃舉體重中滿飲食不化陰氣上厥胸中不便飲發於中咳喘有聲大雨時行鱗見於陸頭頂痛重而掉瘛尤甚嘔而密默唾吐清液甚則入腎竅瀉無度太溪絶死不治氣極則變舉發也陰濕之氣盛是以體重中滿飲食不化胸中膻中也宗氣之所居陰氣上逆是以胸中不便咳喘有聲者飲乘於肺也太陰所至為濕生終為注雨鱗見於陸者土崩潰也頭項痛重而掉瘛尤甚者所謂因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿也嘔者濕乘陽明也密默者欲閉戶牖而獨居也脈解篇曰所謂欲獨閉戶牖而處者陰陽相薄也陽盡而陰盛故欲獨閉戶牖而居蓋陽明者表陽也太陰者三陰也陰變而乘於陽則陽欲盡而陰盛是以唾吐清液也甚則入腎下乘冬令之寒水也腎開竅於二陽故曰竅瀉夫太陰居中土而旺於四季是以勝氣勝於四時復氣在於歲半以後故止乘肺胃之秋金冬令之腎水也少陽之復大熱將至枯燥燔爇介蟲乃耗驚瘛咳衄心熱煩躁便數憎風厥氣上行面如浮埃目乃瞤瘛火氣內發上為口糜嘔逆血溢血泄發而為瘧惡寒鼓栗寒極反熱嗌絡焦槁渴飲水漿色變黃赤少氣脈萎化而為水傳為胕腫甚則入肺咳而血泄尺澤絶死不治少陽之火復發於秋冬之時是以枯燥燔爇介蟲乃耗謂木枯草焦而甲蟲耗散也驚瘛咳衄熱乘心肺也便數憎風表裡皆熱也面如浮埃面微有塵也手足少陽之脈皆上繫於目故目乃瞤瘛火氣內發者陰火發於內也上為口糜發於上焦也發於中焦則嘔逆發於下焦則血溢血泄也發而為瘧者少陽主樞是以寒熱陰陽外內出入寒極反熱從火化也嗌絡焦槁肺金傷也渴飲水漿陽明胃金燥也太陰濕土主四之氣色變黃赤者火土相合也少氣脈萎者氣血皆傷也化而為水傳為胕腫者從四氣五氣而直至於終之氣也陽明之復清氣大舉森木蒼干毛蟲乃厲病生胠脅氣歸於左善太息甚則心痛痞滿腹脹而泄嘔苦咳噦煩心病在膈中頭痛甚則入肝驚駭筋攣太衝絶死不治陽明之復發於本位主令之時是以清氣大舉森木蒼干毛蟲乃厲病生胠脅氣歸於左者金乘木也心痛痞滿腹脹而泄乘火土也膽病者善太息嘔苦木受金刑腑亦病也咳噦肺氣逆也咳噦煩心者病在膈中陽明之氣上逆也頭痛厥陰病也夫病生胠脅頭痛病在肝之經氣如入肝則干臟矣干臟者半死半生蓋邪雖薄臟而臟真不傷者生如太衝脈絶真元傷矣夫厥陰少陰少陽太陰之復發於五氣六氣之時陽明太陽之發報復歲半以前之氣是以木火土之皆病也太陽之復厥氣上行水凝雨冰羽蟲乃死心胃生寒胸膈不利心痛痞滿頭痛善悲時眩僕食減腰脽反痛屈伸不便地裂冰堅陽光不治少腹控睪引腰脊上衝心唾出清水及為噦噫甚則入心善忘善悲神門絶死不治厥氣上行者郁逆之氣上行而欲復歲半以前之氣也水凝水寒在下也雨冰寒氣在上也上下皆寒是以羽蟲乃死蓋寒淫而火滅也心胃生寒胸膈不利心痛痞滿頭痛善悲時眩僕者厥氣上行從下而中中而上也食減水乘土也腰脽反痛屈伸不利水淫而反自傷也陽光不治木火之氣衰也少腹控睪引腰脊上衝心者厥陰病也唾出清水及為噦噫從胃而上及於心也蓋亦報復歲半以前之木火土也王子律曰木火土三氣子母相合而勝歲半以後之氣是以復發而俱報之計遜公問曰少陰太陽有水火寒熱之併發奚少陰之復有寒氣而太陽之復無陽熱耶曰少陰之本火太陽之本寒報復之氣發於歲半以後乃涼寒之時是以少陰有寒而太陽無熱從時化也帝曰善治之奈何岐伯曰厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之辛苦發之以咸耎之太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之少陽之復治以鹹冷佐以苦辛以咸耎之以酸收之辛苦發之發不遠熱元犯溫涼少陰同法陽明之復治以辛溫佐以苦甘以苦泄之以苦下之以酸補之太陽之復治以咸熱佐以甘辛以苦堅之上章曰發表不遠熱攻裡不遠寒如少陽少陰之火鬱而不解是宜不遠熱而發散之然無犯其溫涼蓋四之氣宜涼五之氣宜溫至終之氣而後可用熱時氣之不可不從也陽明之復以苦泄之以苦下之者謂滲泄其小便下其大便也治諸勝復寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者耎之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也五味六氣之中辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅有補有瀉有逆有從各隨五行六氣而咸宜安其勝復之氣使之必清必靜則病氣衰而各歸其所主之本位此治之大體也帝曰善氣之上下何謂也岐伯曰身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半所謂天樞也此論人身之上下以應天地之上下也夫歲半以上天氣主之乃厥陰風木少陰君火少陽相火歲半以下地氣主之乃太陰濕土陽明燥金太陽寒水在人身厥陰風木之氣與督脈會於巔頂是木氣在於火氣之上矣君火之下包絡相火主氣是木火火之三氣在身半以上也脾土居陽明胃金之上陽明居太陽膀胱之上是土金水之三氣在身半以下也以木火土金水之名以命其上之三氣下之三氣以上下之三氣而命其在天在地之處以天地之處而言其三陰三陽之病則勝復之氣可知矣半者所謂天樞之分在臍旁二寸乃陽明之火名蓋以此而分形身之上下也夫所謂樞者上下交互而旋轉者也故在天地乃上下氣交之中名天樞在人身以身半之中名天樞也故上勝而下俱病者以地名之下勝而上俱病者以天名之此言上下之勝氣也如身半以上之木火氣勝而身半以下之土金水三氣俱病者以地名之謂病之在地也如身半以下之土金水勝而身半以上之木火氣病者以天名之謂病之在天也蓋以人身之上下以應天地之上下故以天地名之所謂勝至報氣屈伏而未發也復至則不以天地異名皆如復氣為法也此言上下之復氣也如勝至則報復之氣屈伏於本位而未發也復至則如復氣而為法不必以天地而名之如厥陰少陰少陽之復其氣發於四氣五氣之時陽明太陽之復其氣歸於初氣二氣之木火故不必以木火居歲半以上而以天名之金水主歲半以下而以地名之皆如復氣之所在而為成法也帝曰勝復之動時有常乎氣有必乎岐伯曰時有常位而氣無必也帝曰願聞其道也岐伯曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則痞帝問勝復之氣隨四時之有常位乎其氣之動隨四時之可必乎伯言木火土金水四時有定位而勝復之氣不隨所主之本位而發故氣不可必也蓋謂六氣各主一歲主歲之氣勝則春將至而即發是太陰陽明太陽之氣皆發於春夏矣如六氣之復乃鬱極而後發故發於歲半之後是厥陰少陰少陽之復皆發於秋冬矣故曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則否是以勝復之氣不隨四時之常位而不可必也帝曰善復已而勝何如岐伯曰勝至則復無常數也衰乃止耳復已而勝不復則害此傷生也此申明有勝則復展轉不已必待其勝氣衰而後乃止耳復已而勝者如火氣復而乘其金已則金氣又復勝之金氣復而侮其火已則火氣又復勝之所謂勝至則復無常數也如勝氣衰而後乃止耳故復氣已而受復之氣又復勝之如火氣復而勝其金則金氣又當復勝如不復勝此金為火氣所害而金之生氣傷矣故必待其勝衰而後平如有勝則有復也帝曰復而反病何也岐伯曰居非其位不相得也大復其勝則主勝之故反病也所謂火燥熱也復而反病者復氣之反病也如火氣復而乘於金位金氣復而乘於火位皆居非其位不相得也是以大復其勝則主勝之故反病也如火氣大復而乘於陽明則五位之主氣勝之如金氣大復而乘於少陰則二位之主氣勝之故復氣之反病也所謂火熱燥也餘氣皆然此即勝至而復勝衰則止之意蓋言勝復之氣宜於漸衰而不宜於復大也帝曰治之何如岐伯曰夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期此其道也微者隨之順其氣以調之也甚者制之制以所畏也和者平之平調其微邪暴者奪之瀉其強盛也但隨勝氣以治則屈伏之氣自安矣然不必問其勝復之展轉惟以氣平為期此其治勝復之道之帝曰善主客之勝復奈何岐伯曰客主之氣勝而無復也此論四時主氣客氣之勝復也按前篇論初之氣二之氣者乃加臨之客氣而為民病也後論厥陰所至為和平太陰所至為埃溽論主氣之有德化變病也此章復論主氣客氣有彼此相勝之順逆是以歲運七篇內有似乎重復而義無雷同學者當細心體析帝曰其逆從何如岐伯曰主勝逆客勝從天之道也客氣者乃司天在泉及左右之間氣在天之六氣也天包乎地之外從泉下而六氣環轉天之道也主氣者五方四時之定位地之道也坤順承天是以主勝為逆客勝為從順天之道也帝曰其生病何如岐伯曰厥陰司天客勝則耳鳴掉眩甚則咳主勝則胸脅痛舌難以言風木之客氣勝於上是以耳鳴掉眩厥陰肝木貫膈上注肺甚則咳者上淫之氣內入於經也主勝則胸脅痛肝經之脈布胸脅也厥陰少陽主筋二經之筋病則舌卷故難以言蓋客氣之從上而下主氣之從內而上也再按主歲之三氣乃厥陰風木君相二火胸脅痛者厥陰之初氣甚也舌難以言者二火之氣勝也少陰司天客勝則鼽嚏頸項強肩背瞀熱頭痛少氣發熱耳聾目瞑甚則胕腫血溢瘡瘍咳喘主勝則心熱煩躁甚則脅痛支滿少陰司天之初氣乃太陽寒水二之氣乃厥陰風木三之氣乃少陰君火鼽嚏耳聾目瞑厥陰之氣勝也頭項強肩背瞀熱頭痛甚則胕腫太陽寒水之氣勝也少氣發熱血溢瘡瘍咳喘君火之氣勝也初之主氣乃厥陰風木二之氣君火三之氣相火主勝則心熱煩躁者君相二火之氣勝也甚則脅痛支滿者厥陰之初氣勝也蓋君火司歲故先火勝而甚則及於厥陰按司天之氣客氣有三主氣有三在泉之氣客氣有三主氣有三主客之勝而為民病有以三氣分而論之者有合而論之者蓋書不盡言言不盡意神而明之存乎其人太陰司天客勝則首面腑腫呼吸氣喘主勝則胸腹滿食已而瞀客勝則首面胕腫濕淫於上也呼吸氣喘淫及於內也主勝則胸腹滿者初氣之木勝傷土也經云肺是動病甚則交兩手而瞀乃二氣三氣之火土炎而為肺病也按胕葉扶腫也上文曰胕腫於上此節曰首面胕腫非足跗之跗也少陽司天客勝則丹疹外發及為丹熛瘡瘍嘔逆喉痹頭痛嗌腫耳聾血溢內為瘛瘲主勝則胸滿咳仰息甚而有血手熱少陽司天初氣三氣乃君相二火二之氣乃太陰濕土丹疹即斑疹因火熱而發於外者也丹熛即赤遊發於外而欲遊於內者也嘔逆瘛瘲濕土之氣合於內也瘡瘍嗌腫諸證亦皆感濕熱而生蓋亦自上而下從外而內也肺乃心之蓋主勝則胸滿咳仰息者主氣之二火欲上炎而外出也仰息者肺病而不得偃息也甚而有血手熱者火發於外也君相二經之脈皆循於手故為手熱王子律曰止言火而不言初氣之風者蓋風自火出火隨風熾也陽明司天清復內余則咳衄嗌塞心膈中熱咳不止而白血出者死清復內余者清肅之客氣入於內而復有餘於內也咳衄嗌塞心膈中熱皆肺病也肺屬金而主天是以陽明司天之氣余於內而病在肺也白血出者血出於肺也陽明司天天之氣也臟屬陰而血為陰血出於肺則陽甚而陰絶矣此蓋言天為陽地為陰人居天地氣交之中腑為陽臟為陰氣為陽血為陰外為陽內為陰是以陽明之不言主客者謂陽明金氣司天則乾剛在上勝於內則與肺金相合故不言主客者論天之道也太陽司天客勝則胸中不利出清涕感寒則咳主勝則喉嗌中鳴太陽之氣在表而肺主皮毛是以受司天之客氣即為胸中不利出清涕而咳曰感寒則咳者謂太陽與寒水之有別也按水熱穴論曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其脈在肺皆積水也蓋水在地之下故曰至陰大地之下皆水故為盛水也與肺金之上下交通而皆積水者水上連乎天而天包乎下也是以主勝則喉嗌中鳴乃在下寒水之氣而上出於肺也此乃論主客之末章故以陽明太陽兼申明司天在泉之微妙厥陰在泉客勝則大關節不利內為痙強拘瘛外為不便主勝則筋骨徭並腰腹時痛徭同陶大關節者手足之十二節也厥陰在泉始之客氣乃陽明燥金厥陰主筋筋燥是以關節不利次之客氣乃太陽寒水太陽為諸陽主氣陽氣者柔則養筋寒氣淫於內則太陽受之故內為痙強拘瘛即痓證也終之客氣乃在泉之風木故外為不便不便者亦筋骨之不利也靈樞根結篇曰骨徭者筋緩而不收也所謂骨徭者搖故也在泉之主氣乃太陰濕土陽明燥金太陽寒水節骨徭並腰腹時痛者三氣之為病也少陰在泉客勝則腰痛尻股膝脾腨䯒足病瞀熱以酸胕腫不能久立溲便變主勝則厥氣上行心痛發熱膈中衆痹皆作發於胠脅魄汗不藏四逆而起四之客氣乃太陽寒水故為腰尻股䯒足病皆太陽之經證同氣相感也次之氣乃厥陰風木瞀熱以酸胕腫不能久立乃脾土之證蓋木淫而土病也終之客氣乃少陰君火主氣乃太陽寒水溲便變者水火相交火淫於下也主勝則厥氣上行心痛發熱者乃寒水之主氣上乘於在泉之君火也五之主氣乃陽明燥金客氣乃厥陰風木衆痹者各在其處更發更止更居更起以右應左以左應右膈中衆痹皆作發於胠脅乃陽明之氣乘於厥陰之經也四之主氣乃太陰濕土客氣乃太陽寒水魄汗表汗也汗乃陰液膀胱者津液之所藏四逆而起者土氣上逆也以土勝水是以津液不藏而汗出於表也再按衆痹似屬陽明十二經中惟手足陽明之脈左之右右之左而交於承漿故曰以右應左以左應右太陰在泉客勝則足痿下重便溲不時濕客下焦發而濡瀉及為腫隱曲之疾主勝則寒氣逆滿食飲不下甚則為疝足痿下重便溲不時者在泉之濕氣客於太陰之經而下及於內也濕客下焦發而濡瀉及為腫者因客淫於下而太陰之主氣自病也隱曲者乃男女之前陰處故曰隱曲謂隱藏委曲之處也終之主氣乃太陽寒水客氣乃司天之濕土是以主勝則寒氣逆滿蓋水淫而上乘於土故逆滿也四之主氣乃太陰濕土客氣乃厥陰風木食飲不下甚則為疝者濕氣上逆而病及於厥陰之經也五之主氣乃陽明秋金客氣乃少陰君火火能制金故不上勝也少陽在泉客勝則腰腹痛而反惡寒甚則下白溺白主勝則熱反上行而客於心心痛發熱格中而嘔少陰同候少陽在泉始之客氣乃少陰君火主氣乃太陰濕土次之客氣乃太陰濕土主氣乃陽明秋金終之客氣乃少陽相火主氣乃太陽寒水腰腹痛而反惡寒者客勝而太陽之主氣病也太陽之氣傷故惡寒也甚則溺白下白者病及於陽明太陰之主氣也蓋金主氣氣化則溺出溺白者氣不化而溺不清也下白者土氣傷而大便色白也因客勝而主氣反病故曰反主勝則熱反上行而客於心心痛發熱者君相二火之客氣反上行而自病也格中而嘔者太陰之客氣自病也因主勝而客反自病故曰反曰客曰少陰同候謂火性炎上故二火皆有反逆之自病也朱衛公曰水濕下逆是以二火反上炎而自焚徐東屏曰有客之勝氣病在於內者有主之勝氣病在上者有因客勝而主氣自病於下者有因主勝而客氣自病於上者是以此節又翻一論學者當引而伸之陽明在泉客勝則清氣動下少腹堅滿而數便瀉主勝則腰重腹痛少腹生寒下為鶩溏則寒厥於腸上衝胸中甚則喘不能久立清氣動下者清肅之天氣而動於下也少腹堅滿而數便瀉者太陽寒水之病也主勝則腰重腹痛少腹生寒者太陽水寒之氣發於下也下為鶩溏者水下泄也寒厥於腸上衝胸中甚則喘者寒氣逆乘陽明之大腸而上及於胸中之肺臟也靈樞經曰氣上衝胸喘不能久立邪在大腸大腸與肺胃相合而並主金氣此與陽明司天之大義相合太陽在泉寒復內余則腰尻痛屈伸不利股脛足膝中痛寒復內余者太陽寒水之客氣入於內而復內有餘也腰尻股脛足痛者太陽之經證也屈伸不利者太陽之主筋也按太陽者水中之陽天之氣也寒水者天一所生之水也水上通乎天天行於地下故曰司天曰在泉六氣隨天氣而繞地環轉故在陽明司天而曰清復內余在太陽在泉而曰寒復內余謂司天在泉之氣上下相通人居於天地氣交之中而上下之氣復有餘於人之內也故俱不言主氣客氣蓋司天在泉一氣貫通皆論天之道也張玉師曰按腰尻痛者病在血也屈伸不利病太陽之氣也股脛膝痛者病在血也天為陽地為陰天主氣地主脈論天地則天包乎地之外論人又氣居於血之中蓋言陰中有陽陽中有陰乃陰陽交互之妙用帝曰善治之奈何岐伯曰高者抑之下者舉之有餘折之不足補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之高者抑之謂主氣之逆於上也下者舉之謂客氣之乘於下也有餘者勝氣也不足者所不勝之氣而為病也佐以所利者利其所欲也如肝欲散急食辛以散之是以厥陰之勝佐以苦辛心欲耎急食鹹以耎之是以少陰之勝佐以苦鹹脾欲緩急食甘以緩之是以太陰之勝佐以辛甘肺欲收急欲酸以收之是以燥淫所勝佐以辛酸腎欲堅急食苦以堅之是以寒淫所勝佐以甘苦和其所宜者利其五味之所宜也如厥陰色青宜食甘少陰少陽色赤宜食酸太陰色黃宜食鹹陽明色白宜食苦太陽色黑宜食辛安其主客者使各守其本位也適其寒溫者治寒以熱治熱以寒治溫以涼治涼以溫也同者逆之謂氣之相得者宜逆治之如主客之同司火熱則當治以鹹寒如同司寒水則當治以辛熱溫涼亦然此逆治之法也異者從之謂不相得者當從治之如寒水司天加臨於二火主氣之上客勝當從二火之熱以治寒主勝當從司天之寒以治熱餘氣皆然此平治異者之法也帝曰治寒以熱治熱以寒氣相得者逆之不相得者從之余已知之矣其於正味何如此承上文而言四時主客之氣各有本位之正味也上章論主客之勝已論治於前故曰余已知之矣然本氣之自有盛衰其於補瀉之正味為何如岐伯曰木位之主其瀉以酸其補以辛木位之主厥陰所主之位也此乃四時不易之定位故曰位如未至所主之時而陽春之氣先至此氣之盛也宜瀉之以酸如至而未至此氣之衰也宜補之以辛蓋木性升酸則反其性而收之故為瀉辛則助其發生之氣故為補火位之主其瀉以甘其補以咸二之氣乃君火所主之位三之氣乃相火所主之位如未至三月而暄熱之氣先至未至五月而炎暑之氣先至此來氣有餘也宜瀉之以甘蓋從子而泄其母氣也如至而不至此氣之不及也宜補之以咸蓋以水濟火也王子律曰腎水不足則心懸如病飢水氣之不濟也土位之主其瀉以苦其補以甘土主於四之氣如主氣之時埃蒸注雨氣之盛也宜苦以泄之瀉其敦阜之氣如化氣不令風寒並與主氣之不足也宜補之以甘蓋氣不足者補之以味也金位之主其瀉以辛其補以酸五之氣也如未及時而清肅之氣早至此氣之盛也其瀉宜辛以辛散之也如至秋深而暑熱尚在氣之不及也其補宜酸以酸收之也水位之主其瀉以咸其補以苦終之氣也如未及時而天氣嚴寒冰雪霜雹氣之盛也宜瀉之以咸蓋咸能泄下從其類而瀉之也如已至而天氣尚溫此氣之不及也宜補之以苦蓋苦味陰寒而炎上作苦助太陽標本之味也所謂調之正味以平為期勿使四時不平之氣而為民病也厥陰之客以辛補之以酸瀉之以甘緩之此加臨之六氣而有太過不及之正味也六氣運行無有定位如賓客之外至故曰客常以正月朔日平旦視之如氣來不及宜補之以辛氣來有餘宜瀉之酸以甘緩之臟氣法時論曰肝苦急急食甘以緩之蓋主氣有餘則氣行於外客氣太過則氣乘於內故當兼用五臟所欲之味以調之少陰之客以咸補之以甘瀉之以咸收之咸當作酸臟氣法時論曰心苦緩急食酸以收之按論主氣先言瀉而後言補論客氣先曰補而後曰瀉蓋補瀉之道有宜補而不宜瀉者有宜瀉而不宜補者有宜先補而後瀉者有宜先瀉而後補者有宜補瀉之兼用者神而明之在乎其人太陰之客以甘補之以苦瀉之以甘緩之臟氣法時論曰脾欲緩急食甘以緩之少陽之客以咸補之以甘瀉之以咸耎之臟氣法時論曰心欲耎急食鹹以耎之蓋少陽乃心主之包絡也陽明之客以酸補之以辛瀉之以苦泄之臟氣法時論曰肺苦氣上逆急食苦以泄之太陽之客以苦補之以咸瀉之以苦堅之以辛潤之開發腠理致津液通氣也臟氣法時論曰腎欲堅急食苦以堅之腎苦燥急食辛以潤之開腠理致津液通氣也腠者三焦通會元真之處理者皮膚臟腑之紋理也夫水穀入於口津液各走其道故三焦出氣以溫肌肉充皮膚為其津蓋氣充肌腠津隨氣行辛味入胃能開腠理致津液而通氣故主潤帝曰善願聞陰陽之三也何謂岐伯曰氣有多少異用也此言陰陽之有太少則氣有盛衰而治有輕重矣陰陽之中有太陽少陽有太陰少陰則氣有多少異用也王子律曰三陰三陽有多氣少血者有多血少氣者有氣血皆多者是以用藥之有異也帝曰陽明何謂也岐伯曰兩陽合明也陰陽系日月論曰寅者正月之生陽也主左足之少陽未者六月主右足之少陽卯者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合於前故曰陽明夫陽明主陽盛之氣故多氣而多血帝曰厥陰何也岐伯曰兩陰交盡也前論曰申者七月之生陰也主右足之少陰醜者十二月主左足之少陰酉者八月主右足之太陰子者十一月主左足之太陰戌者九月主右足之厥陰亥者十月主左足之厥陰此兩陰交盡故曰厥陰夫厥陰主於陰盡而一陽始蒙氣之微者也故為陰中之少陽而少氣帝曰氣有多少病有盛衰治有緩急方有大小願聞其約奈何岐伯曰氣有高下病有遠近證有中外治有輕重適其至所為故也氣有高下者有天地人之九候也遠近者淺深上下也中外者表裡也輕重者大小其服也蓋適其至病之所在為故也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也大要者數之大要也夫數之始於一而成於三圓之象也以二偶而成六方之象也地數二木數三甲己合而土氣化也君二臣六乾坤位而八卦成也少則二之陰數之始也多則九之陽數之終也夫陰陽之道始於一而終於九者此洛書之數也禹疏九疇而洪水平箕子陳洪範而彝倫攸敘蓋洛書所陳九疇皆帝王修身治國平天下之大經大法本經八十一篇統論天地人三才之道皆有自然之數故曰大要玉師曰數之可千可萬總不出乎奇偶故曰近者奇之遠者偶之汗者不以奇下者不以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也奇偶者天地之數也近者謂病之在上而近故宜用奇方以治之天氣之在上也遠者謂病之在下而遠故宜用偶數以治之地氣之在下也汗乃陰液故宜用偶而不以奇蓋直從下而使之上猶地氣升而後能為云為雨也下者宜用奇而不以偶蓋從上而使之下從天氣之下降也補者補正氣之不足治者治邪氣之有餘在上者宜緩方在下者宜急方急則用氣味之厚者緩則用氣味之薄者蓋厚則沉重而易下薄則輕清而上浮奇偶緩急各適其上下遠近至其病之所在而已矣病所遠而中道氣味之者食而過之無越其制度也是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之此復申明氣味之由中而上下也病所遠者謂病之在上在下而遠於中胃者也中道氣味之者謂氣味之從中道而行於上下也故當以藥食並用而制度之如病之在上而遠於中者當先食而後藥病在下而遠於中者當先藥而後食以食之先後而使藥味之過於上下也是故上下之病近於中道而用奇方偶方者制小其服病遠於中而用奇方偶方者宜制大其服大服小服者謂分兩之輕重也大則宜於數少而分兩多蓋氣味專而能遠也小則宜於數多而分兩少蓋氣分則力薄而不能遠達矣此平上中下三氣之道也奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也所謂重方者謂奇偶之並用也反佐以取之謂春病用溫夏病用熱秋病用涼冬病用寒順四時寒熱溫涼之氣而反從治其病也上文之所謂上中下者以應司天在上在泉在下運化於中是平此三氣之道也此言奇偶寒熱溫涼者從天地四時之六氣也帝曰善病生於本余知之矣生於標者治之奈何岐伯曰病反其本得標之病治反其本得標之方此論三陰三陽之有本有標也病生於本者生於風寒熱濕燥火也生於標者生於三陰三陽之氣也如太陽為諸陽之首而本於寒水少陰為陰中之太陰而本於君火陽明乃陽盛之氣而本於清肅厥陰主陰極而本於風木之陽此陰陽之中又有標本之不同也病反其本者如病寒而反得太陽之熱化病熱而反見少陰之陰寒病在陽而反見清肅之虛寒病在陰而反得中見之火熱所謂病反其本得標之病也治反其本者如病本寒而化熱則反用涼藥以治熱如病本熱而化寒則反用熱藥以治寒如病在陽明而化虛冷則當溫補其中氣如病在厥陰而見火熱又當逆治其少陽所謂治反其本得標之方少陽少陰標本相同皆從陽熱陰濕而治帝曰善六氣之勝何以候之此論四時五行之氣內合五臟而外應於六脈也岐伯曰乘其至也清氣大來燥之勝也風木受邪肝病生焉熱氣大來火之勝也金燥受邪肺病生焉寒氣大來水之勝也火熱受邪心病生焉濕氣大來土之勝也寒水受邪腎病生焉風氣大來木之勝也土濕受邪脾病生焉所謂感邪而生病也風寒熱濕燥在天四時之五氣木火土金水在地四時之五行五氣之勝五行五行而病五臟是五臟之外合五行而五行之上呈五氣也乘年之虛則邪甚也失時之和亦邪甚也遇月之空亦邪甚也重感於邪則病危矣有勝之氣其必來復也乘年之虛者主歲之氣不及也如木運不及則清氣勝之火運不及則寒氣勝之土運不及則風氣勝之金運不及則熱氣勝之水運不及則濕氣勝之此歲運不及而四時之勝氣又乘而侮之失時之和者四時之氣衰也如春氣不足則秋氣勝之夏氣不足則冬氣勝之長夏之氣不足則春氣勝之秋氣不足則夏氣勝之冬氣不足則長夏之氣勝之遇月之空者月廓空之時也重感於邪者乘年之虛失時之和遇月之空是謂三虛而感於邪則病危矣有勝之氣其必來復者春有慘淒殘賊之勝則夏有炎暑燔爍之復夏有慘淒凝冽之勝則不時有埃昏大雨之復四維發振拉飄騰之變則秋有肅殺霖霪之復夏有炎爍燔燎之變則秋有冰雹霜雪之復四維發埃昏驟注之變則不時有飄蕩振拉之復此四時之勝而必有復也帝曰其脈至何如岐伯曰厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長此論六氣之應六脈也厥陰主木故其脈弦少陰主火故其脈鉤太陰主土故其脈沉少陽主火故大而浮陽明主金故短而澀太陽主水而為諸陽主氣故大而長計遜公問曰太陽主冬令之水則脈當沉今大而長不無與時氣相反耶曰所謂脈沉者腎臟之脈也太陽者巨陽也上合司天之氣下合在泉之水故其大而長者有上下相通之象此章論六氣之應六脈非五臟之合四時陰陽五行之道通變無窮不可執一而論至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者危此言弦鉤長短之脈當應六氣而至也如脈至而和則為平人脈至而甚則為病脈所至之脈與時相反者病及時而脈不至者病未及時而脈先至者病如三陰主時而得陽脈三陽主時而得陰脈者危帝曰六氣標本所從不同奈何岐伯曰氣有從本者有從標本者有不從標本者也帝曰願卒聞之岐伯曰少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也故從本者化生於本從標本者有標本之化從中者以中氣為化也風寒暑濕燥火六氣為本三陰三陽為標陰濕之土而標見太陰之陰初陽之火而標見少陽之陽是標之陰陽從本化生故太陰少陽從本少陰之本熱而標見少陰之陰太陽之本寒而標見太陽之陽陰中有陽陽中有陰有水火寒熱之化故少陰太陽從本從標陽明之上燥氣治之中見太陰厥陰之上風氣治之中見少陽蓋陽明司四時之秋令而太陰主四氣之清秋厥陰為兩陰交盡陰盡而一陽始生是以陽明厥陰從中見之化也帝曰脈從而病反者其診何如岐伯曰脈至而從按之不鼓諸陽皆然帝曰諸陰之反其脈何如岐伯曰脈至而從按之鼓甚而盛也此論脈病之有標本也脈從者陽病而得陽脈陰病而得陰脈也如太陽陽明之病其脈至而浮是脈之從也其病反陰寒者太陽之病從本化陽明之病從中見之陰化也故脈雖浮而按之不鼓也如少陰厥陰之病其脈至而沉是脈之從也其病反陽熱者少陰之病從標化厥陰之病從中見之火化也故脈雖沉而按之鼓甚也是脈有陰陽之化而病有標本之從也再按太陽病頭痛發熱煩渴不解此太陽之病本也如手足攣急或汗漏脈沉此太陽之病標也如少陰病脈沉者急溫之宜四逆湯此少陰之病標也如少陰病得之二三日口燥咽乾者急下之宜大承氣湯此少陰之病本也如陽明病發熱而渴大便燥結此陽明之病陽也如胃中虛冷水穀不別食谷欲嘔脈遲惡寒此陽明感中見陰濕之化也如厥陰病脈微手足厥冷此厥陰之病陰也如消渴氣上衝心心中疼熱此厥陰感中見少陽之火化也如太陰標陰而本濕故當治之以四逆輩少陽標陽而本火則宜散之以清涼治傷寒六經之病能於標本中求之思過半矣是故百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者逆正順也若順逆也故知標與本用之不殆明知逆順正行無間此之謂也不知是者不足以言診足以亂經故大要曰粗工嘻嘻以為可知言熱未已寒病復始同氣異形迷診亂經此之謂也夫百病之生總不出於六氣之化如感風寒暑濕燥火而為病者病天之六氣也天之六氣病在吾身而吾身中又有六氣之化如中風天之陽邪也病吾身之肌表則為發熱咳嚏在筋骨則為痛痹拘攣在腸胃則為下痢飧泄或為燥結閉癃或直中於內則為霍亂嘔逆或為厥冷陰寒此表裡陰陽之氣化也如感吾身之陽熱則為病熱感吾身之陰寒則為病寒感吾身之水濕則為痰喘感吾身之燥氣則為便難如中於腑則暴僕而卒不知人中於臟舌即難言而口唾涎沫又如傷寒天之陰邪也或中於陰或中於陽有中於陽而反病寒者有中於陰而反病熱者是吾身之陰中有陽陽中有陰標本陰陽之氣化也如感吾身中之水濕則為青龍五苓之證如感吾身中之燥熱又宜於白虎承氣諸湯此止受天之一邪而吾身中有表裡陰陽變化之不同也又如夏月之病有手足厥冷而成薑桂參附之證者蓋夏月之陽氣盡發越於外而裡氣本虛受天之風暑而反變為陰寒皆吾身之氣化非暑月之有傷寒也是以神巧之士知標本之病生則知有標本之氣化知標本之氣化則能用標本之治法矣故知標與本用之不殆明知順逆正行無間此之謂也逆者以寒治熱以熱治寒故曰逆正順也從者以熱治熱以寒治寒故曰若順逆也如陰陽寒熱之中又有病熱而反寒者如厥深熱亦深之類是也又有病寒而反熱者如揭去衣被欲入水中此孤陽外脫急救以參附之證粗工嘻嘻以為可知言熱未已寒病復始同氣異形迷診亂經此之謂也夫標本之道要而博小而大可以言一而知百病之害言標與本易而勿損察本與標氣可令調明知勝復為萬民式天之道畢矣此極言標本之用也言標本之道雖為要約而其用則廣博雖為微小而其用則弘大可以言一而知百病之害者惟知標本故也言標與本則施治平易而無傷損察本與標則六氣雖變可使均調明知標本勝復則足以為民式六氣在天之道畢矣帝曰勝復之變早晏何如岐伯曰夫所勝者勝至已病病已慍慍面復已萌也夫所復者勝盡而起得位而甚勝有微甚復有少多勝和而和勝虛而虛天之常也帝曰勝復之作動不當位或後時而至其故何也岐伯曰夫氣之生與其化衰盛異也寒暑溫涼盛衰之用其在四維故陽之動始於溫盛於暑陰之動始於清盛於寒春夏秋冬各差其分故大要曰彼春之暖為夏之暑彼秋之忿為冬之怒謹按四維斥候皆歸其終可見其始可知此之謂也帝曰差有數乎岐伯曰又凡三十度也此章言日月運行寒一暑四時之氣由微而盛由盛而微從維而正從正而維寒溫互換涼暑氣交勝復之氣有盛有衰隨時先後是以有早有晏也陽之動始於溫盛於暑陰之動始於清盛於寒是由微而甚也如春之沉夏之弦秋之數冬之澀是冬之餘氣尚交於春春之餘氣尚交於夏夏之餘氣尚交於秋秋之餘氣尚交於冬是由盛而微也所謂正者春夏秋冬之正方也維者春夏之交夏秋之交秋冬之交冬春之交四隅之四維也四時之氣從維而正復從正而維寒溫氣交涼暑更互環轉之不息也是以勝至已病病已慍慍而復已萌者謂復氣已發萌於勝氣之時也如春有悽慘殘賊之勝是金氣之勝木也夏有炎暑燔爍之復是火氣之復金也而火氣已萌於勝病慍慍之時是復氣之早發於本位之三十度也所復之氣俟勝盡而起至炎夏所主之本位而甚是勝氣早而復氣將來亦早也是以勝氣甚則復氣多勝氣微則復氣少勝氣和平而復亦和平勝氣虛衰而復亦虛衰此天道之常也如勝復之作動不當位後時而至者此勝復之晏也夫氣之生生於前之氣交如夏氣之生於季春也氣之化化於後之氣交如春氣之流於孟夏也勝復之氣有盛衰是以有早晏之異也蓋氣之盛者勝於本位以前所生之三十度氣之衰者流於本位以後所化之三十度故不當其位也如金氣衰而勝於春夏之交則復氣亦衰而復於夏秋之交矣是勝虛而虛後時而至也此四時之氣前後互交是以勝復之盛衰隨四時之氣交而或前或後也故曰盛衰之用其在四維又曰謹按四維斥候皆歸其終可見其始可知謂勝復之早晏皆歸於四維之斥候或早而在於始之前三十度或晏而在於終之後三十度也帝曰其脈應皆何如岐伯曰差同正法待時而去也此復以脈候而證明氣化之交通故曰是謂四塞謂春夏秋冬之氣不相交通則天地四時之氣皆閉塞矣正者四時之正位也言脈同四時之正法而前後相交待時而去者待終三十度而去也如春之沉尚屬冬之氣交終正月之三十日而春氣始獨司其令也脈要曰春不沉夏不弦冬不澀秋不數是謂四塞春不沉則冬氣不交於春夏不弦則春氣不交於夏秋不數則夏氣不交於秋冬不澀則秋氣不交於冬是四時之氣不相交通而閉塞矣沉甚曰病弦甚曰病澀甚曰病數甚曰病參見曰病復見曰病未去而去曰病去而不去曰病反者死故曰氣之相守司也如權衡之不得相失也夫陰陽之氣清靜則生化治動則苛疾起此之謂也四時之氣盛於主位之時而微於始生衰於交化是以甚則病也參見者謂春初之沉弦並見夏初之弦數並見也復見者已去而復見也未去而去者未及三十度而去也去而不去者已至三十日應去而不去也反者謂四時反見賊害之脈也故曰氣之相守司也如權衡之不得相失也言四時之氣守於本位司於氣交猶權衡之不相離也四時陰陽之氣清靜則生化治生化者生於前而化於後也動者氣之亂也帝曰幽明何如岐伯曰兩陰交盡故曰幽兩陽合明故曰明幽明之配寒暑之異也幽明者陰陽也兩陰交盡陰之極也故曰幽兩陽合明陽之極也故曰明陰極則陽生陽極則陰生寒往則暑來暑往則寒來故幽明之配寒暑之異也此復申明陽之動始於溫盛於暑陰之動始於清盛於寒四時之往來總屬陰陽寒暑之二氣耳帝曰分至如何岐伯曰氣至之謂至氣分之謂分至則氣同分則氣異所謂天地之正紀也氣至謂冬夏之二至氣分謂春秋之二分此承上文以申明彼春之暖為夏之暑彼秋之忿為冬之怒言二至之時總屬寒暑陰陽之二氣氣分之時則有溫涼之不同也帝曰夫子言春秋氣始於前冬夏氣始於後余已知之矣然六氣往復主歲不常也其補瀉奈何岐伯曰上下所主隨其攸利正其味則其要也左右同法大要曰少陽之主先甘後咸陽明之主先辛後酸太陽之主先咸後苦厥陰之主先酸后辛少陰之主先甘後咸太陰之主先苦後甘佐以所利資以所生是謂得氣春秋之氣始於前者言春在歲半以上之前秋在歲半以下之前夏冬之氣在二氣之後謂四時之主氣也六氣往復主歲不常者謂加臨之客氣六期環轉無有常位也此章論四時之主氣前後交通得氣之清靜者也若受客勝以動之又不能循序而苛疾起矣是以上下所主及左右之間氣當隨其攸利正其味以調之乃其要也大要宜先瀉而後補之蓋以佐主氣之所利資主氣之所生是謂得四時之氣生化而交通也按前章論客氣之補瀉先補而後瀉者在客之本氣而論也此復以先瀉而後補者為四時之主氣而言也歲運七篇聖人反復詳論曲盡婆心文有似乎雷同而旨義各別學者亦宜反復參閲不可以其近而忽之帝曰善夫百病之生也皆生於風寒暑濕燥火以之化之變也經言盛者瀉之虛者補之余錫以方士而方士用之尚未能十全余欲令要道必行桴鼓相應猶拔刺雪汗工巧神聖可得聞乎夫百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破散以上七篇統論五運六氣之邪皆外感天地之氣而為病然人身之中亦有五行六氣或喜怒暴發或居處失宜或食飲不節或卒恐暴驚皆能傷五臟之氣而為病是以此經言錫之方士而方士用之尚未能十全也要道者天地人三才之道也桴鼓相應者謂天地人之五行六氣如聲氣之感應也拔刺者謂天地陰陽之邪猶刺之從外入宜拔而去之雪汗者謂在內所生之病機使之如汗而發雪也天地人三才之道並用外內陰陽之法並施斯成工巧神聖之妙蓋天地之道勝復之作不形於診重在望聞內因之病偏於問切岐伯曰審察病機無失氣宜此之謂也病機者根於中而發於外者也氣宜者五臟五行之氣各有所宜也帝曰願聞病機何如岐伯曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣忿鬱皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心五臟內合五行五行內生六氣是以五臟之氣病於內而六氣之證見於外也諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸厥固泄皆屬於下者從上而下也諸痿喘嘔皆屬於上者從下而上也夫在上之陽氣下逆則為厥冷在下之陰氣上乘則為痿痹在上之水液下行則為固泄在下之水液上行則為喘嘔亦猶天地陰陽之氣上下相乘而水隨氣之上下也諸禁鼓栗如喪神守皆屬於火諸痙項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬於熱諸躁狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱此五臟之氣而發見於形氣也火者少陽包絡之相火熱者君火之氣也諸禁鼓栗熱極生寒也如喪神守相火甚而心神不安也風者木火之氣皆能生風反戾了戾也故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平此之謂也此言所發之病機各有五臟五行之所屬有者謂五臟之病氣有餘無者謂五臟之精氣不足盛者責其太甚虛者責其虛微如火熱之太過當責其無水也故必先使五臟之精氣皆勝而後疏其血氣令其調達致使五臟之氣平和此之謂神工也帝曰善五味陰陽之用何如岐伯曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也五味陰陽之用調五臟者有發有散有湧有泄六者之中或收或散或緩或急或燥或潤或耎或堅如肝苦急而欲散心苦緩而欲耎脾苦濕而欲緩肺苦逆而欲收腎苦燥而欲堅各隨其所利而行之調其五臟之氣而使之平也帝曰非調氣而得者治之奈何有毒無毒何先何後願聞其道岐伯曰有毒無毒所治為主適大小為制也帝曰請言其制岐伯曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也帝言上文論調五臟之氣而使之平然五臟之病又當以有毒無毒之藥治之或調或治何先何後願聞其道岐伯曰以有毒無毒所治病為主然適其方之大小為制也主病之謂君佐君之謂臣應臣之謂使蓋病之甚者制大其服病之微者制小其服能毒者制大其服不能毒者制小其服寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者溫之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故溫者補也蓋補藥多屬甘溫瀉藥多屬苦寒摩者上古多用膏摩而取汗浴者用湯液浸漬也薄迫也此皆治病之要法各適其事而用之帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事也逆者以寒治熱以熱治寒故為正治從者熱病從熱寒病從寒故為反治微者逆之甚者從之如病之過甚者從多不太甚者從少觀其從事之何如耳帝曰反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已熱因寒用寒因熱用者治熱以寒溫而行之治寒以熱涼而行之其始則同其終則異也塞因塞用通因通用者如諸嘔吐酸乃熱邪堅積於中而壅塞於上即從之而使之上湧所謂塞因塞用而可使破積也如暴注下迫乃熱邪堅積於中而通泄於下即從之而使之下泄所謂通因通用而可使潰堅也必伏其所主之病而先其所因則可使氣和而病可必已矣帝曰善氣調而得者何如岐伯曰逆之從之逆而從之從而逆之疏氣令調則其道也此論調氣之逆從也氣調而得者謂得其逆從之道而使其氣之調也如氣之從於上下者宜逆之逆於上下者宜從之蓋陽氣在上陰氣在下氣之從也陽氣下行陰氣上行氣之逆也是氣之不可不從而又不可不逆者也是以氣之從者逆而從之氣之逆者從而逆之令其陰陽之氣上下和調此逆從調氣之道也上節論治病之逆從此節論調氣之逆從徐東屏曰即此可以意會通塞之義不必過於遠求帝曰善病之中外何如夫病之有因於外邪者有因於內傷者有感於外邪而兼之內有病者有內有病機而又重感於外邪者歲運七篇統論外因之邪病此章復論內因之病機然又有外內之兼病者故帝復有此問焉岐伯曰從內之外者調其內從外之內者治其外從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內中外不相及則治主病從內之外者內因之病而發於外也故當調其內從外之內者外因之病而及於內也故當治其外從內之外而盛於外者此內因之病發於外而與外邪相合故盛於外也是當先調其內病而後治其外邪從外之內而盛於內者此外因之邪及於內而與內病相合故盛於內也又當先治其外邪而後調其內病此調治內外之要法也如止內有病而不感外邪或止感外邪而無內病中外不相及者則當治其主病焉王子律曰內因之病臟腑之氣病也故當調之外因之病六淫之邪也故曰治之帝曰善火熱復惡寒發熱有如瘧狀或一日發或間數日發其故何也岐伯曰勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相薄盛衰之節瘧亦同法此復論人身中之陰陽外內也火熱者因火熱而為病夫火熱傷氣此言病在氣而不在經也復惡寒發熱有如瘧狀者此陰陽外內之相乘也夫陽在外陰往乘之則惡寒陰在內陽往乘之則發熱也或一日發或間數日發者此陰陽勝復之氣會遇之時有多少也如陰氣多而陽氣少則火熱留於陰久故其發日遠如陽氣多而陰氣少則熱隨陽氣而常盛於外故其發日近此陰陽勝復之作盛衰之有節耳夫瘧者感外淫之邪病也此章論人身中之陰陽外內相乘與外因不相干涉蓋以證明上節之外內乃外因之外內因之內與此章之不同也故曰瘧亦同法言病邪之瘧亦如陰陽勝復之相薄陰乘陽而陽乘陰也帝曰論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治岐伯曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也此言用寒熱之不應者更有治之法也夫寒之而不寒者真陰之不足也熱之而不熱者真陽之不足也是以病不解而久用寒熱偏勝之病反生故當求其屬以衰之屬類也謂五臟同類之水火寒熱也取之陰取之陽者謂當補其陰而補其陽也夫以寒治熱以熱治寒此平治之法也補陰以勝熱補陽以勝寒乃反佐之道也帝曰善服寒而反熱服熱而反寒其故何也岐伯曰治其王氣是以反也帝曰不治王而然者何也岐伯曰悉乎哉問也不治五味屬也夫五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎入而增氣物化之常也氣增而久夭之由也王去聲此言氣味之不可偏用者也夫四時有寒熱溫涼之氣五臟有酸苦辛鹹之味五味四氣皆當和調而用之若偏用則有偏勝之患矣故偏用其寒則冬令之寒氣王矣是以服寒而反寒如偏用其熱則夏令之熱氣王矣是以服寒而反熱此用氣之偏而不和者也如偏用其苦則苦走心而火氣盛矣如偏用其咸則咸走腎而水氣盛矣此用味之偏而不調者也凡物之五味以化生五氣味久則增氣氣增則陰陽有偏勝偏絶之患矣蓋甚言其氣味之不可偏用者也徐東屏曰味久則增氣是寒熱之氣更不可偏用帝曰善方制君臣何謂也岐伯曰主病之謂君佐君之謂臣應臣之謂使非上下三品之謂也帝曰三品何謂岐伯曰所以明善惡之殊貫也善惡殊貫謂藥有有毒無毒之分按神農本草計三百六十種以上品一百二十種為君主養命以應天無毒多服久服不傷人欲益氣延年輕身神仙者本上品以中品一百二十種為臣主養性以應人有毒無毒斟酌其宜欲治病補虛羸者主中品以下品一百二十種為佐使以應地多毒不可久服欲除寒熱邪氣破積聚除痼疾者本下品本經所用氣味或用補以和調其血氣或用瀉以平治其淫邪是以主病之為君佐君之為臣應臣之為使非神農氏上下三品之謂也二帝各有其妙用焉帝曰善病之中外何如岐伯曰調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗之下之寒熱溫涼衰之以屬隨其攸利謹道如法萬舉萬全氣血正平長有天命帝曰善此總結外內之義按本篇前數章統論外淫之邪末章復論內因之病其間又有外內之交感者各有調治之法焉致於氣之寒熱溫涼味之鹹酸辛苦皆調以和平隨其攸利謹道如法萬舉萬全故能使血氣正平而長有天命也
