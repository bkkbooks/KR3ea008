body:
  text: 卷九著至教論篇第七十五道之大原出於天聖人以天道教化於人故篇名著至教黃帝坐明堂召雷公而問之曰子知醫之道乎王冰曰明堂布政之宮也八窗四達上圓下方在國之南故稱明堂夫求民之瘼恤民之隱大聖之用心故召引雷公問拯濟生靈之道愚按岐伯乃帝王之師故稱伯曰天師是以七十四篇皆咨訪於伯然帝之神靈敦敏具生知之質乃上古繼天立極傳道教化之至聖其訪咨於伯者蓋以證明斯道也是以末後七篇乃帝之所以復教化於臣僚閔士先曰首篇亦帝與伯論畢而即歸於帝論雷公對曰誦而頗能解解而未能別別而未能明明而未能彰足以治群僚不足知侯王由誦而解解而別別而明明而彰皆漸積日進之功蓋天縱之聖自能先知先覺以明此道在群僚之賢者非講習討論不能貫通於心故止可主於臣僚之位而不能至聖人之聰明睿智也願得受樹天之度四時陰陽合之別星辰與日月光以彰經術後世益明樹天之度者所謂立端於始表正於中蓋立端表以測天之四時陰陽星辰日月之度以著於經書乃傳於後世倪仲玉曰此即量天尺璇璣玉衡之類上通神農著至教疑於二皇二皇謂伏羲神農言能通天之道可以上通於神農以彰著至教而疑於二皇易系曰神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天佑之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤故曰疑於二皇者謂上合於伏羲神農取天地之道以垂教後世帝曰善無失之此皆陰陽表裡上下雌雄相輸應也而道上知天文下知地理中知人事可以常久以教衆庶亦不疑殆醫道論篇可傳後世可以為寶上下謂天運之環轉於上下以應人之腰以上為天腰以下為地表裡中外也即所謂根於中而運於外也雌雄陰陽之相合也言明乎陰陽之道則上知天文下知地理中知人事可以垂永久以教衆庶合於醫道論篇可傳於後世以為保命養生之大寶雷公曰請受道諷誦用解意言非生知之聖必諷誦講解而後能明此道帝曰子不聞陰陽傳乎曰不知乃上古傳論陰陽之書曰夫三陽天為業上下無常合而病至偏害陰陽三陽者至陽也至陽者天之陽也富有之謂業言天之大而無外也上下無常天行健也合而病至者以天之陰陽不和合於人之病至則有陰陽偏害之大患矣此言天為陽地為陰在上為陽泉下為陰日為陽夜為陰一晝一夜天道繞地一周陰陽相貫上下氣交晝夜環轉之不息而人亦應之氣為陽血為陰火為陽水為陰亦晝夜環轉之不息也一陰一陽雌雄相應少陰與太陽相合太陰與陽明相合厥陰與少陽相合故氣從太陰出注陽明陽明行於太陽太陽合於少陰少陰行於少陽少陽合於厥陰厥陰復出於太陰陰陽相貫如環無端若三陽並至則為偏害之患雷公曰三陽莫當請聞其解莫當者言人之陰氣不能當三陽之並至帝曰三陽獨至者是三陽並至並至如風雨上為巔疾下為漏泄獨至者三陽合併而為一陽也天之風氣為陽雨水為陰三陽並至則陽氣上行而為巔疾下行而為漏泄猶天之陽氣獨盛而在下之泉水竭也外無期內無正不中經紀診無上下以書別陰陽離合論曰陽豫之正陰為之主陰陽離合不相失也言三陽並至外無陰陽出入之可期內無生陽之陰正不中經脈之紀綱故不能以脈經上下篇之書別蓋言此在氣並而不形於血脈之診也玉師曰不形於診是以大奇篇之腸澼下血陽甚而脈反沉小滑澀雷公曰臣治疏愈說意而已治理數也言於天地陰陽之理甚疏止可聞其大意而已帝曰三陽者至陽也積並則為驚病起疾風至如礔礪九竅皆塞陽氣滂溢干嗌喉塞並於陰則上下無常薄為腸澼至陽者謂陽之至盛而無極有如天之疾風若礔礪之雷火驟至陽盛則為驚也九竅為水注之氣使九竅之水氣皆竭而陽氣溢於竅中夫肺屬天而主氣與腎水上下交通陽獨盛而水液竭故使嗌乾喉塞也並於陰則使陰氣之上下無常搏於陰液則為腸澼下痢蓋陽甚而血液將絶即所謂下為漏泄也此謂三陽直心坐不得起臥者便身全三陽之病三陽者太陽也太陽者巨陽也為諸陽主氣而與少陰標本相合故心為陽中之太陽是太陽之氣在表而合於天之氣在上而合於君火之陽直當也謂三陽並至正當於心是三陽之合併於太陽也夫三陽之離合也合則為一離則有三太陽為開陽明為闔少陽為樞起者太陽之主開也臥者陽明之主闔也坐者不起不臥少陽中樞之象也蓋言三陽之氣合則正當於心分出於形身則為坐不得起臥之象便身全三陽之病矣此申明三陽者乃二陽合併於太陽有離而有合也上節論三陽之氣滂溢於外竅而內薄於陰此言太陽之氣正當於心而分出於形身之外且以知天下何以別陰陽應四時合之五行天下者謂人居天之下何以別陰陽以應天之四時合地之五行閔士先曰此乃承上啓下之文雷公曰陽言不別陰言不理請起受解以為至道此言知天之道而後能理別陰陽至道即所謂至誠無息之道帝曰子若受傳不知合至道以惑師教語子至道之要病傷五臟筋骨以消子言不明不別是世主學盡矣合至道者謂人合天地之道也人之陰陽合天之四時水火人之五臟合天之五方五行五臟之氣外合於皮肉筋骨如病傷五臟則在外之筋骨以消是以不明別陰陽之氣五臟所合之皮肉筋骨則傳世之主學盡矣蓋言陰陽五行各有分別此論陰陽水火之氣而不病五臟之有形如所謂腎且絶是腎之水液陰氣並絶非臟傷之骨消也莫子瑜曰人有病氣而不病形者有病形而不病氣者有形氣之兼病者此二篇論病陰陽水火之氣故當以明別之腎且絶惋惋日暮從容不出人事不殷夫天一生水在上為天在下為泉天包乎地水通乎天陰陽相貫上下循環在人則太陽在上精水在下如三陽並至並於陰而上下無常薄為腸澼則腎之精氣且絶矣惋惋驚歎貌殷盛也古者日中為市人事正殷至日暮陽盡而陰受氣則萬民皆臥蓋言在天之道陽氣為陽精水為陰晝為陽夜為陰在人之道三陽為陽精液為陰晝出為陽夜入為陰蓋以比天之陰陽晝出夜臥陰陽和平可常保其天年若能和於陰陽調於四時亦可壽敝天地如有陽無陰有陰無陽且斃在旦夕又焉能如天之常地之久乎是以天下萬民應天之道至陽盡而陰受氣之時驚歎其日暮則從容不出人事不殷蓋以天之陰陽比類人之陰陽絶者絶而生者生在天之道不過陰陽亢極豈至於有陽無陰有晝無夜哉靈樞經曰日暮陽盡而陰受氣萬民皆臥平旦陰盡而陽受氣如是無已與天地同紀朱永年曰腎且絶三字當節斷示從容論篇第七十六得天之道出於自然不待勉強即孔氏之所謂從容中道聖人也故示以從容之道因以名篇黃帝燕坐召雷公而問之曰汝受術誦書者若能覽觀雜學及於比類通合道理為余言子所長五臟六腑膽胃大小腸脾胞膀胱腦髓涕唾哭泣悲哀水所從行此皆人之所生治之過矣子務明之可以十全即不能知為世所怨此篇論精水並至而陽氣傷也上章論陽氣盛而精水絶此篇論精水盛而陽氣傷陰陽水火之不可偏盛者也夫五臟主藏精者也腎為水臟受五臟之精而藏之故曰腎且絶腎雖藏精而為水臟然津液之生原出於胃腑水穀之精微脾主為胃行其津液大腸主津小腸主液膀胱者津液之所藏與腎臟雌雄相合通於腦髓出於上竅而為涕唾哭泣此人之津水所從行亦如天之精水在泉而上通於天也膽主藏津汁通於廉泉玉英廉泉玉英者津液之道也胞者水之所由泄也悲哀者謂心悲志悲故泣出也此言腎液之又上通於心而出於上竅也閔士先曰論陽氣則曰坐明堂論陰氣則曰燕坐史臣緒述亦有意存雷公曰臣請誦脈經上下篇甚衆多矣則無比類猶未能以十全又安足以明之帝曰子別試通五臟之過六腑之所不和針石之敗毒藥所宜湯液滋味具言其狀悉言以對請問不知雷公止知經脈之道而不知天之陰陽故帝即於有形之臟腑形骸而問之殊不知有形之中有無形之氣也莫子瑜曰針石治脈肉筋骨之有形湯液毒藥治在內之臟雷公曰肝虛腎虛脾虛皆令人體重煩冤當投毒藥刺灸砭石湯液或已或不已願聞其解帝曰公何年之長而問之少余真問以自謬也吾問子窈冥子言上下篇以對何也三臟之經脈外絡於形身上貫於心膈故皆令人體重煩冤然雷公止知經脈臟腑形骸而不知人合於天之道故責其年長而尚未知子以余真問臟腑腸胃之有形因以自謬耶然吾問子者窈冥也窈冥者天之道也子何以經脈之上下篇以對耶夫脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂也然從容得之若夫三髒土木水參居此童子之所知問之何也此言三臟之有氣也肝腎脾者太陰少陰厥陰之三陰也脾虛浮似肺者太陰之為開也腎小浮似脾者少陰之為樞也肝急沉散似腎厥陰之為闔也蓋因氣而見於脈此皆工之所時亂而不能知其因也然須從容得之從容者天之道也天道者陰陽之道也五臟者應地之五行也此言天道而不論地之五行若夫以五臟之五行而木火土參居於下此童子之所知又何問之有閔士先曰開於外故曰虛浮樞在中故曰小浮雷公曰於此有人頭痛筋攣骨重怯然少氣噦噫腹滿時驚不嗜臥此何臟之發也脈浮而弦切之石堅不知其解復問所以三臟者以知其比類也厥陰根起於大敦其經氣與督脈上會於巔頂而主筋頭痛筋攣厥陰經氣之為病也少陰根起於湧泉為生氣之原而主骨骨重少氣少陰經氣之為病也太陰根起於隱白與胃以膜相連噦噫腹滿時驚不嗜臥太陰經氣之為病也是以脈浮開脈也弦者樞脈也石堅闔脈也雷公不解其因故復問以三臟之脈證以知其比類於窈冥焉帝曰夫從容之謂也夫年長則求之於腑年少則求之於經年壯則求之於臟此言經脈之當求之於氣也夫從容者氣之謂也三陰者長女中女少女也太陰為長女故當求之於腑腑陽而主開也少陰為少女故當求之於經經氣內連臟腑外絡形身主外內出入之樞也厥陰處於兩陰中之交盡故為中女是以求之於臟臟陰而主闔也此因三陰之氣而見於證之頭痛筋攣脈之浮弦而石故當求之於三陰氣之開闔樞若只論其脈證非從容之謂也今子所言皆失八風菀熱五臟消鑠傳邪相受夫浮而弦者是腎不足也沉而石者是腎氣內著也怯然少氣者是水道不行形氣消索也咳嗽煩冤者是腎氣之逆也一人之氣病在一臟也若言三臟俱行不在法也此言三陰之氣離則為三合則為一一者精水之少陰也夫三陽之氣合併於太陽者天之陽也是以三陰之氣合併於少陰少陰者在下之精水也蓋合而為一陰一陽者天之道也離則為三陰三陽者人之道也人道通於天道皆可分而可合者也八風菀熱人之陽氣行於上下四旁也五臟消鑠傳邪相受謂五行之氣運於天地之中有相生而有勝克也夫浮而弦者此腎氣之出於肝脾而腎不足也沉而石者是肝脾之氣下歸於腎主腎氣內著也太在泉之水隨氣而運行於天表是以怯然少氣者乃水道不行故使形氣之消索也咳嗽煩冤者是腎氣之上逆於心肺也此五臟之三陰總歸於一氣一氣而復貫通於五臟者也知天道之氣交陰陽之離合而後能從容中道若言肝脾腎三臟俱行不在陰陽離合之法也閔士先曰消鑠形容水火之偏盛傳邪相受謂腎氣之傳於肝脾心肺肝脾之氣歸著於腎而腎受之也莫子瑜曰五臟之三陰根起於肝腎脾而合於手經之心肺故先言五臟而後言三臟雷公曰於此有人四肢懈惰喘咳血泄而愚診之以為傷肺切脈浮大而緊愚不敢治粗工下砭石病愈多出血血止身輕此何物也帝曰子所能治知亦衆多與此病失矣譬以鴻飛亦衝於天夫聖人之治病循法守度援物比類化之冥冥循上及下何必守經此承上文復申明腎之精水貫乎地中而上通於天也夫地居人之下大氣舉之無所憑依而水天運轉於地之外然復通貫於地之中上與天氣相交而為云為雨是以風勝則地動濕勝則地泥於此有人者言即於此腎臟而有人病四肢懈惰諸證也此何物者言如此之病當以何物比類也夫四肢懈惰脾土病也喘咳者水氣並於陽明也血泄者脈急血無所行也粗工之所用砭石而病愈者治在經脈也故子之所能亦多知治經脈之法若夫一臟之精氣貫通於中土上乘於肺金則子與此病之大義失之矣是以聖人之治病循陰陽之法度引物比類譬以鴻飛亦衝於天蓋鴻乃水鳥或漸於干或漸於陸而衝於天是鴻之有序而漸進於上猶在下之精水通貫於地中而上交於天猶人之腎精中貫於脾胃而上合於肺也故聖人察造化之冥冥循水天之上下又何必僅守其經乎玉師曰太陽之寒水與腎藏之精水合則為一行則分二道焉太陽之水隨天氣而運行於地之外乃津液隨氣行於膚表是也故曰水道不行形氣消索貫於中土而上交於心肺者腎藏之精水也水熱穴論曰其本在腎其末在肺皆積水者是也今夫脈浮大虛者是脾氣之外絶去胃外歸陽明也夫二火不勝三水是以脈亂而無常也四肢懈惰此脾精之不行也喘咳者是水氣並陽明也血泄者脈急血無所行也若夫以為傷肺者由失以狂也不引比類是知不明也夫肌肉腠理主氣分經脈之中主血分脾土之氣通會於肌腠陽明之氣循行於脈中脾氣外絶者不行於肌腠也脾與胃以膜相連雌雄相合去胃外歸陽明者去中胃而外歸陽明之經也二火者心之君火心主包絡之相火三水者太陰所至為濕生終為注雨是地之水濕也太陽之上寒水主之通天之寒水也腎為水臟天一之癸水也夫三水太盛則火不能勝之是以脈亂無常蓋心主血心主包絡主脈水並於脈中而君相之陽不能勝故脈亂而血妄行也故四肢懈惰者脾土之精氣不行於肌腠也喘咳者是下焦之水氣並於陽明之經也血泄者水氣並於脈中則脈急而無所循行故血妄行而下泄也若夫以為傷肺者由失其比類之義而以狂論也不援物比類是以知之不明也蓋言腎精之上交於肺者必由中土而上也今反乘於脈中故君相之火傷也上章論三陽並至而精水絶此言三水盛而火不能勝天地水火陰陽之氣宜和平而不宜偏勝者也夫傷肺者脾氣不守胃氣不清經氣不為使真臟壞決經脈旁絶五臟漏泄不衄則嘔此二者不相類也此申明水邪之直傷於肺者由土崩而水泛也脾氣不守土壞而不能制其水矣胃氣不清水邪之入於胃矣胃氣傷故經氣不為使真臟者脾腎之臟真也壞決者土壞而水決也胃主經脈水入於胃是以經脈旁絶五臟主藏精者也土分王於四臟土氣不守是以五臟之津液皆為之漏泄與傷寒論之所謂脾氣孤弱五液注下之義相同水在胃則嘔在肺則衄此水邪直傷於胃肺與鴻漸之循序而沖天者不相類也按下焦之精水上通於肺者失滲入於脾土土之濕氣上蒸而為云肺之天氣下降而為雨乃地天之交泰也上節論脾氣歸於陽明以致水隨氣而亦走經脈此言脾氣不守真臟壞決以致水邪直上二者皆失天地自然之道譬如天之無形地之無理白與黑相去遠矣是失吾過矣以子知之故不告子明引比類從容是以名曰診輕是謂至道也無形者氣也理者皮膚臟腑之紋理乃無形之氣通會於中有形之水滲灌於內猶地之有理路水氣通灌於中故掘地而得泉也是以人之形身譬如天有無形之氣地有無形之理水隨氣而滲灌於中復上交於天也乾為金白者金之色黑者水之色也吾以子知之故不告子子只以經脈之上下篇而論是與黑白之理相去遠矣與吾所論窈冥之道失之過矣今明引比類從容是謂至道其於經脈之論宜輕而重在天之大道是以名曰診輕按以上二篇論天地之道合人之水火陰陽以人之陰陽不和復證天地之道莫子瑜曰雷公首言誦經脈上下篇帝后復曰診輕一篇大義在此二句疏五過論篇第七十七五者在內五中之情而外見於色脈黃帝曰嗚呼遠哉閔閔乎若視深淵若迎浮雲視深淵尚可測迎浮雲莫知其際聖人之術為萬民式論裁志意必有法則循經守數按循醫事為萬民副故事有五過四德汝知之乎雷公避席再拜曰臣年幼小蒙愚以惑不聞五過與四德比類形名虛引其經心無以對此論診道亦當合於天道也夫人之氣為陽精水為陰衛為陽營血為陰陰陽和平而後血氣乃行經脈乃勻故當先度其志意之得失飲食居處陰陽喜怒然後察其色脈斯得萬舉萬全而無過失之咎視深淵尚可測迎浮雲莫知其極言天道之難明也惟聖人從容得之施於仁術垂於後世為萬民式副功也四德謂天之四時有生長收藏之德化如不知四時陰陽逆從之理是謂四失矣帝曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並醫工診之不在臟腑不變軀形診之而疑不知病名身體日減氣虛無精病深無氣灑灑然時驚病深者以其外耗於衛內奪於營良工所失不知病情此亦治之一過也此病生於志意而不因於外邪也夫嘗貴後賤嘗富後貧則傷其志意故雖不中邪而病從內生夫脾藏營營舍意腎藏精精舍志是以志意失而精營脫也五氣留連謂五臟之神氣留鬱於內而不能疏達並者謂並病於五臟也五臟之氣外合於皮肉筋骨是以身體日減氣虛無精病深無氣言氣生於精精生於氣精氣之並傷也灑灑消索貌蓋以為久嘗之富貴不意失之故時驚也此病不在臟腑不在軀形精氣日虛營衛日耗即有良工不知因名此治之一過也閔士先曰病在情志當以情志之法治之非藥石之可能愈凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣精氣竭絶形體毀沮暴怒傷陰暴喜傷陽厥氣上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也此病生於飲食居處陰陽喜怒而不因於外邪也夫味歸形氣歸精味傷形氣傷精熱傷氣寒傷形樂者必過於溫飽苦者必失於飢寒是以飲食失節寒溫失宜皆傷精氣精氣竭絶則形體毀沮矣喜怒不中則陰陽不和而厥氣上行脈滿去形蓋身半以上為陽身半以下為陰肌腠氣分為陽經脈血分為陰陰陽和平則營衛血氣上下循環外出內入如暴喜傷陽則氣並於陽而為厥逆暴怒傷陰則血並於陰而為脈滿蓋肌形之血氣並於脈中故謂脈滿去形也盛者瀉之不足者補之愚醫治之不知補瀉不知病情致使精華日脫陰陽寒熱之邪氣相併此治之二過也善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也此病生於厥逆而不因於邪也行奇恆之法以太陰始五臟相通移皆有次神轉而不回者也病則各逆傳其所勝回則不轉乃失其相生之機故善為脈者必以比類奇恆從容得之為工不知治之過也閔士先曰比類者言候五臟脈氣之順逆以比類奇恆之脈或順或逆也工以診脈之順逆不必比類奇恆故曰此診之不足貴診有三常必問貴賤封君敗傷及欲侯王故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也此言善診者當先察其精氣神而後切其血脈也封君敗傷故貴脫勢及欲侯王而不可得此憂患緣於內是以精神內傷靈樞經曰憂恐忿怒傷氣是三者皆不能守而失其常矣始富後貧則傷其志意志意者所以御精神收魂魄適寒溫和喜怒者也是故榮衛調志意和則筋骨健強腠理致密故傷其志意則精神不能內守外為筋骨攣躄之病榮衛不調腠理不密故外為柔弱而三者亦失其常矣嚴窮究也動神謂運動其神移者移精變氣也按上文曰五氣留連氣虛無精病深無氣又曰外耗於衛內奪於營是故貴脫勢始富後貧皆論傷於氣故此節止補出精神二字莫子瑜曰精氣神三者互相資生故上節論傷氣而精神自然並傷此言傷精神而氣亦在內凡診者必知終始有知餘緒切脈問名當合男女此陰陽偏盛之為病而不因於邪也靈樞終始篇曰謹奉天道請言終始終始者經脈為紀持其脈口人迎以知陰陽有餘不足平與不平天道畢矣所謂平人者不病不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末之寒溫之相守司也形肉血氣必相稱也是謂平人少氣者脈口人迎俱少而不稱尺寸也如是者則陰陽俱不足補陽則陰竭瀉陰則陽脫如是者可將以甘藥不可飲以至劑如此者弗灸不已者因而瀉之則五臟氣壞矣人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥陰一盛而躁在手心主脈口二盛病在足少陰二盛而躁在手少陰脈口三盛病在足太陰三盛而躁在手太陰脈口四盛且大且數者名曰溢陰溢陰為內關人迎與脈口俱盛四部以上命曰關格關格者與之短期故凡診者必知終始餘緒謂更知灸刺補瀉之緒端當合男女謂針刺之要男內女外堅拒勿出謹守勿內是謂得氣離絶菀結憂恐喜怒五臟空虛血氣離守不人能知何術之語菀音郁此言左右血氣之各有別也左為人迎而主血右為氣口而主氣離絶者言陰陽血氣各有左右之分別也是以血氣皆病則氣鬱於右而血結於左蓋因憂恐傷右部之肺腎喜怒傷左部之心肝以致五臟空虛血氣各離其所守之本位工不知人迎氣口有陰陽氣血之分又何術之語哉嘗富大傷斬筋絶脈身體復行令澤不息故傷敗結留薄歸陽膿積寒炅粗工治之亟刺陰陽身體解散四肢轉筋死日有期醫不能明不問所發唯言死日亦為粗工此治之五過也凡此五者皆受術不通人事不明也此言病在左而及於右令其血氣之相乘也天一生水腎水生肝木肝木生心火腎主藏精肝主藏血心主生血故左三部皆主血而為陰地二生火命門相火生脾土脾土生肺金火乃先天元氣脾胃主生氣肺主周身之氣故右三部主氣而為陽如病在陰者久則陰病極而歸於陽病在陽者久則陽病極而歸於陰故終始篇曰病先起於陰者先治其陰而後治其陽病先起於陽者先治其陽而後治其陰此左右陰陽之相乘而醫之又不可不知也如嘗富而一旦喪其資斧則大傷其神魂是以心主之脈肝主之筋有若斬絶此傷左之血脈也然右關之脾臟未傷故身體尚復能行令命也澤液也謂肺腎所主之精氣未傷而尚生長之不息也然病雖先起於陰久則將及於陽故傷敗心肝之血而結於左則留薄於氣分而復歸於陽左右血氣皆傷而膿積寒炅也靈樞經曰夫癰疽之生膿血之成也不從天下不從地出結微之所生也又曰寒氣化為熱熱勝則腐肉而為膿此因傷陰而流薄歸陽是以膿積於陰陽寒熱之間夫陰陽血氣俱傷補陽則陰竭瀉陰則陽脫如是者止可飲以甘藥而不宜灸刺粗工不知亟刺陰陽以致身體解散則脾氣傷矣四肢轉筋則胃氣絶矣夫脾胃者五臟之生原生氣已絶喪無日矣即有良醫不明陰陽相乘之道不問受病所發之因止知陰陽壞而與之死期此亦為粗工蓋不能審其因而施救治之法也凡此五者皆發於五中而不因於外感醫者當知天地陰陽之氣日用事物之常莫不各有當然之理順之則志意和調逆之則苛疾暴起此皆受術不通人事不明致有五者之責故曰聖人之治病也不知天地陰陽四時經紀五臟六腑雌雄表裡刺灸砭石毒藥所主從容人事以明經道貴賤貧富各異品理問年少長勇怯之理審於分部知病本始八正九候診必副矣此總結診脈之道當外合天地陰陽四時經紀內通五臟六腑雌雄表裡或宜於灸刺砭石或當用藥食所主從容人事以明經道審貴賤貧富之情察少長勇怯之理脈各有分部病發有原始候四時八正之氣明三部九候之理診道始備而必副矣治病之道氣內為寶循求其理與之不得過在表裡守數據治無失俞理能行此術終身不殆不知俞理五臟菀熱癰發六腑內葉訥菀音郁此論針刺之道當以內氣為寶循求其脈理求之不得其病在表裡之氣分矣針經曰在外者皮膚為陽筋骨為陰蓋針刺之道取皮脈肉筋骨之病而刺之故求之俞理不得其過在表裡之皮肉筋骨矣守數謂血氣之多少及刺淺深之數也針經曰刺之害中而不去則泄精不中而去則致氣泄精則病益甚而恇致氣則生癰瘍又曰疾淺針深內傷良肉皮膚為癰病深針淺病氣不瀉支大為膿夫在內者五臟為陰六腑為陽謂菀熱在內而癰發於在外之皮肉間也診病不審是謂失常謹守此治與經相明上經下經揆度陰陽奇恆五中決以明堂審於終始可以橫行診病不審謂不審病者之情故為失常上經言氣之通於天下經言病之變化揆者方切求之言切求其脈理也度者得其病處以四時度之也奇恆之病發於五中五臟之色見於明堂審其臟腑經脈之始三陰三陽已絶之終謹守此法則無往而非道矣徵四失論篇第七十八四失謂精神不專志意不理上章論不得病者之情此章論醫者失神志之專一故曰疏者謂疏得五中之情徵者懲創醫之四失黃帝在明堂雷公侍坐黃帝曰夫子所通書受事衆多矣試言得失之意所以得之所以失之雷公對曰循經受業皆言十全其時有過失者請聞其事解也謂持診之道謹守神志始得其情無有過失方為十全帝曰子年少智未及耶將言以雜合耶夫經脈十二絡脈三百六十五此皆人之所明知工之所循用也所以不十全者精神不專志意不理外內相失故時疑殆雜合言不專一也持診者當守其精神調其志意內得於心而外應於手如失此精神志意故時殆而不能十全診不知陰陽逆從之理此治之一失也陰陽之理有順有逆診者不知治之失也受師不卒妄作雜術謬言為道更名自功妄用砭石為遺身咎此治之二失也此言針砭之道必得師傳忌務雜術若自詡功能必遺身咎不適貧富貴賤之居坐之薄厚形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也用針之道當適人貧富貴賤之所居則知形志之苦樂矣薄厚謂肌肉之厚薄針經曰肌肉瘦者易於脫氣易損於血刺此者淺而疾之年質壯大血氣充盈皮革堅固因加以邪刺此者深而留之膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者熱粗理者寒此形之寒溫也又曰已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴已醉勿刺已刺勿醉故當適飲食之所宜勇者謂壯士真骨堅肉緩節監監然刺此者深而留之多益其數怯者謂嬰兒其肉脆血少氣弱刺此者以毫針淺刺而疾發日再可也比類者比類天地陰陽日月星辰之道不明此道足以自亂此治之三失也診病不問其始憂患飲食之失節起居之過度或傷於毒不失言此卒持寸口何病能中妄言作名為粗所窮此治之四失也持診之道不得人之志意苦樂飲食起居或名傷於五氣五味之毒不審問而失言此數者卒持寸口何病能中妄言作名醫反為粗工所窮此治之四失也是以世人之語者馳千里之外不明尺寸之論診無人事治數之道從容之葆言世人多誇大其語而不明寸尺之微失寸尺之毫釐而有千里之謬蓋人之日用事物飲食起居莫不有理如失其和平皆能為病診無人事之審是忽近而圖遠也葆寶同言治診之道惟天理人事之為葆也持其寸口診不中五脈百病所起始以自怨遺師其咎是故治不能循理棄術於市妄治時愈愚心自得上節言不審察病者之情此言不明五脈百病之診此皆受師不卒更自為功精神不轉志意不理如棄術於市招衆人之所怨惡也設妄治之而或有時愈庸愚之心以為自得此亦行險以僥幸耳豈真學問之功哉嗚呼窈窈冥冥孰知其道道之大者擬於天地配於四海汝不知道之諭受以明為晦此復結真道之合於天道也窈窈冥冥天之道也復嘆其診治之道若視深淵若迎浮雲視深淵尚可測迎浮雲莫知其極言道大之難明也四海謂地居水之中天運於地之外夫天有日月星辰之晦明人有晝夜出入之血氣如不受師之傳諭不明道之體原是以天道之明而為晦矣陰陽類論篇第七十九謂三陰三陽之各有類聚因以名篇孟春始至黃帝燕坐臨觀八極正八風之氣而問雷公曰陰陽之類經脈之道五中所主何臟最貴雷公對曰春甲乙青中主肝治七十二日是脈之主時臣以其臟最貴帝曰卻念上下經陰陽從容子所言貴最其下也此論經脈之道五中所主五臟之氣合於三陰三陽三陰三陽之氣上通於天道也夫天道者昭昭為陽冥冥為陰春夏為開秋冬為闔寒暑往來為樞其合於人也三陽為陽三陰為陰太陰太陽為開陽明厥陰為闔少陰少陽為樞肺主氣而上合昭昭腎主水而下合冥冥蓋在天四時之氣通於人之陰陽陰陽之氣內合五臟五臟之氣外見於經脈非經脈之主時也故帝貴其最下何臟最貴者意謂肺主氣腎主水以二臟合天道之最貴也雷公致齊七日旦復侍坐取七日來復天道運轉之義帝曰三陽為經二陽為維一陽為遊部此知五臟終始三陽者天之道也在天為至陽應於四時有春夏之開秋冬之闔寒暑往來之樞合之於人太陽主開而為經陽明主闔而為維少陽主樞而為遊部以此而知五臟之終始蓋因天之四時以應肝木之主歲首腎水之主歲終也夫經者徑也維者絡也周天二十八宿而一面七星四七二十八星房昴為緯虛張為經是故房至畢為陽昴至星為陰是天之陽而又分陰陽也太陽主開而為陽故三陽為經陽明主闔而為陰故二陽為維是人之陽而又分陰陽也遊部者遊行於外內陰陽之間外內皆有所居之部署三陽為表二陰為里一陰至絶作朔晦卻具合以正其理此論陽外而陰內陽生於陰也三陽者太陽也乃至陽之氣而主表二陰者少陰也乃至陰之氣而主裡一陰者厥陰也厥陰為陰中之少陽乃陰盡而陽生是以一陰至絶作晦朔觀之卻具合陽生於陰陰陽消長之理夫月始生則人之血氣始精衛氣始行月廓滿則血氣實肌肉堅月廓空則肌肉減經絡虛衛氣去形獨居是人之肌肉衛氣隨月之消長從陰而復生長於外也是以一陰絶而復生猶月之晦而始朔上節論陰陽之經緯以知五臟之始終此以月之晦朔以應人之表裡陰陽生長虛實蓋月行一月而一周天也閔士先曰太陽少陰乃陰陽水火之主故上章以三陽並於一陽一陽太陽也以三陰並於一陰一陰少陰也此節曰三陽為表二陰為里即是陽為表而陰為里陽從里陰之所生也雷公曰受業未能明帝曰所謂三陽者太陽為經三陽脈至手太陰弦浮而不沉決以度察以心合之陰陽之論此言太陽之氣在表而合於天在上而應於日與手太陰少陰之相合也手太陰者肺也肺主表而主天心乃君火之陽以應日太陽之氣生於水中肺主氣而發原於腎是以三陽脈至於手太陰則陰陽相合皆從陰而樞出於陽也弦者樞脈也浮而不沉者太陽太陰之主開也決判斷也以此而察度之以心合之正合於陰陽之類論蓋太陽主表肺主皮毛應天氣之包乎地之外是太陽與手太陰之同類也太陽之氣坎中之滿也少陰與太陽標本相合故心為陽中之太陽猶日之隨天氣而繞地環轉是太陽與手少陰之同類也故以此察其陰陽斷其行度正合於陰陽之論陰陽類論論天之道也所謂二陽者陽明也至手太陰弦而沉急不鼓炅至以病皆死此言二陽與手太陰少陰之不相類也二陽者陽明也陽明主闔至手太陰弦而沉急不鼓者太陰之開反從陽明之合不能鼓動而外出也是以炅至而為陽明太陰之病者皆死蓋太陰之氣主開而反沉是天氣之不運行矣陽明主清涼之金氣反為炅熱所傷是以二氣皆死乃陰陽類而不相合者也炅者日中之火氣也此言陽明之氣不與天氣相合而亦不與太陽之相合也一陽者少陽也至手太陰上連人迎弦急懸不絶此少陽之病也專陰則死此言一陽與手太陰之不相類也一陽者少陽也少陽主樞樞者從陰而出於陽從陽而入於陰外內出入之無息者也如至手太陰上連人迎弦急不絶者少陽惟從太陰之開而不能樞轉復入此少陽為太陰之所病也如專於陰而不能樞出於陽是少陽之氣絶於內矣閔士先曰手太陰主氣而上屬於天故止與太陽相合與腎臟膀胱之水相合與足太陰之地氣相合與餘氣則不相合矣三陰者六經之所主也交於太陰伏鼓不浮上空志心三陰者五臟六經之所主也五臟內合五行五行者木火土金水地之陰陽也太陰者脾土也三陰之氣交於太陰猶六氣之歸於地中燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固故脈伏鼓而不浮乃六氣伏鼓於地中而不浮於外是以上空志心謂不及於心腎也莫子瑜曰先天之氣從水火而化生五行是六氣乃心腎之所主因伏鼓於地中是以上空志心二陰至肺其氣歸膀胱外連脾胃此言二陰之氣上通於天下歸於泉中連於土也二陰者少陰也少陰主水二陰至肺者肺腎之相合也其氣歸膀胱者陰陽雌雄之相應也外連脾胃者水津通貫於地中也上節言太陰之土氣不及於心腎此言二陰之氣復通貫於地中蓋言少陰之氣與手足太陰足太陽陽明之相類也一陰獨至經絶氣浮不鼓鉤而滑一陰者厥陰也厥陰為陰中之生陽是以經絶者陰脈之伏於內也氣浮者生陽之氣浮於外也不鼓者厥陰之主闔也不鉤者厥陰主相火而非心火也滑者陰陽經氣外內出入之相搏也此承上文而言二陰之氣與肺臟脾胃膀胱相通是少陰之有類聚也厥陰乃陰中之少陽為一陰之獨使故曰一陰獨至謂一陰之無類聚也倪仲玉曰一陰與一陽相合此六脈者乍陰乍陽交屬相併繆通五臟合於陰陽先至為主後至為客六脈手足三陰之六脈也乍陰乍陽者謂陰中有陽或陰或陽之交至也交屬相併繆通五臟合於陰陽者謂六經之氣屬陰屬陽交相合並互通五臟五臟之氣合於五行之陰陽也然心腎二臟並主少陰脾肺二臟並主太陰肝與包絡並主厥陰原無手經足經之別不過以先至為主後至為客如心之陽脈先至即以心為主而腎為客腎之陰脈先至即以腎為主而心為客乍陰乍陽或先或後各有主客之類合也前三陽為經節論陽中有陰此論陰中有陽雷公曰臣悉盡意受傳經脈頌得從容之道以合從容不知陰陽不知雌雄言得從容之道以合於天道不復知有陰陽雌雄之類論也帝曰三陽為父二陽為衛一陽為紀三陰為母二陰為雌一陰為獨使此言三陰三陽之外內而合有雌雄之相類也三陽為父太陽之為乾也三陰為母太陰之為坤也二陽為衛陽明之氣主衛於外也二陰為雌少陰之為里也一陽為紀少陽為出入遊部之紀綱一陰為獨使謂厥陰為外內陰陽之獨使此蓋言三與三類二與二類一與一類各有內外雌雄之相合也莫子瑜曰少陰主水故為雌二陽一陰陽明主病不勝一陰脈耎而動九竅皆沉此承上文而言二陽為衛而主外又不同厥陰之主闔也二陽一陰者陽明與厥陰之類聚也二陽為衛是陽明主病當在外不勝一陰者不能勝厥陰之闔也脈耎而動者陽欲外出而無力也陽明主生津液九竅為水注之氣陽明不能外出是以九竅之氣皆沉閔士先曰陰陽之有開闔樞者乃陰中有陽陽中有陰開者類開闔者類闔也三陽為父三陰為母者謂陽主外而陰主內各有外內雌雄之相類也三陽一陰太陰脈勝一陰不能止內亂五臟外為驚駭此陰陽類而開闔之不合也三陽主開一陰主闔二氣類聚而太陰脈勝是一陰不能止其開則內亂五臟外為驚駭蓋三陰之氣繆通五臟陰不能內守而從陽外出是以五臟內亂經云東方肝木其病發驚駭上節論陰陽類而陽不勝其陰此論陰陽類而陰不勝其陽二陰二陽病在肺少陰脈沉勝肺傷脾外傷四肢此二陰二陽相類而為病也夫腎精之上通於肺者從脾土而上升若鴻漸之衝於天也二陰二陽相類而病在肺者腎水從陽明而直乘於肺是以肺反病也少陰脈沉是心腎不交矣水不濟火則火熱炎上而勝肺水不灌於土中則土燥而脾氣損傷外傷四肢蓋土受水津之濕而後能灌溉於四旁二陰二陽皆交至病在腎罵詈妄行巔疾為狂皆交至者言二陰二陽之經氣交屬相併而上至於陽明也病在腎者謂腎氣病而精液少其虛氣反上奔也病氣傳於陽明是以罵詈妄行巔疾為狂上節論精水行於脈外此論腎氣上逆於脈中二陰一陽病出於腎陰氣客遊於心脘下空竅堤閉塞不通四肢別離此言水從中土而上交於肺復隨天氣而運行於上下四旁二陰謂少陰所主之兩腎一陽乃腎臟所生之少陽空竅謂汗空乃肺主之毛竅如水不隨氣而運行於膚表則空竅閉塞不通矣堤所以防水者也水不滲入於土中之理路則堤閉塞不通而四肢不能受氣於中土矣此緣腎臟病而津液少不能滲灌於脾肺其虛氣反從少陽而客遊於心下也愚按隨太陽之氣而運行於膚表者膀胱之水也故表汗出於太陽膀胱者州都之官津液藏焉氣化則出是水液之運行於上受天氣而復降於下也又曰津液當還入胃中是津液生於胃腑水穀之精復還入胃中而上交於肺是汗液皆由氣化而出非止溲也其滲於中土而上交於肺者腎臟之精水也故曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也此少陰之水上交於手足之太陰而外通於皮腠也至於腎臟膀胱上與心交者乃標本相合上下之互交者也能明乎天地陰陽之道斯為神智上工若止求之脈證帝所謂粗工耳閔士先曰今之粗工尚不可得一陰一陽代絶此陰氣至心上下無常出入不知喉咽乾燥病在土脾此復申明腎水之上通脾肺者隨陰中之生陽而出也一陰厥陰也一陽少陽也乃陰中之生陽也若一陰一陽之氣代絶則水不能隨之上升止陰氣自至於心下上下無常者或上或下也古者以腹中和小便利為知出入不知謂脾肺燥而不能出灌於四肢不利於小便也是以水液不能上交於肺則喉咽乾燥矣不能滲灌於中土則土燥而脾病矣上節論陰氣隨少陽而客遊於心下此言少陽絶而陰氣自上至心皆主腎液不能通貫於脾肺二陽三陰至陰皆在陰不過陽陽氣不能止陰陰陽並絶浮為血瘕沉為膿胕此復結陰陽類而各司開闔也二陽者陽明之主闔也二陰者太陰之主開也脾為陰中之至陰至陰皆在者言脾胃之氣皆在於中而為開為闔者乃二陽三陰之氣也陰欲開而不能過於陽之闔陽欲闔而不能止其陰之開陰陽之氣不相和合而陽與陰絶陰與陽絶矣如脈浮則病在脾而為血瘕沉則病在胃而為膿胕蓋陰陽之氣不從而血為之病也陰陽皆壯下至陰陽上合昭昭下合冥冥診決死生之期遂合歲首此總結人氣之通於天道也陰陽皆壯者謂太陰之肺少陰之心太陽之陽皆壯盛於上而可上合昭昭之天下至陰陽者下至少陰之精太陽之水皆壯盛於下而可下合冥冥之泉以天之道診決死生之期遂合四時之歲首蓋言此遂可以肝脈應春也雷公曰請問短期黃帝不應不應者謂在經論中有之貴其卻念上下經而不博覽於群書也雷公復問黃帝曰在經論中雷公曰請聞短期經論乃上古所傳之經聞謂願聞經中所論之短期黃帝曰冬三月之病病合於陽者至春正月脈有死徵皆歸出春此以下論上合昭昭下合冥冥遂合四時以決死生之期冬三月之病水之為病也病合於陽者合病太陽之氣也至春正月有死徵之脈見皆歸於所出之春氣蓋春氣之本於冬而陽氣之生於水陽氣已病復從春氣外出故死冬三月之病在理已盡草與柳葉皆殺理謂土中之理路上文言水病之合於陽者隨太陽之氣而外轉者也此言在理已盡者謂水之從地理而上通於天也冬三月之病水之病也在理已盡者水竭而不能通於地理也故至草與柳葉所生之時而天地陰陽之氣皆殺夫春取榆柳之火柳得先春之氣者也草木得春氣而生人病感春氣者死春陰陽皆絶期在孟春陰陽之氣始於歲首故交春而陰陽皆絶期在孟春而死春三月之病曰陽殺春三月陽氣正盛病傷其氣故曰陽殺倪仲玉曰此殺字照應前之皆殺皆者謂陰陽之氣皆殺也陰陽皆絶斯在草乾陰陽者謂木火之陽厥陰少陰之所主皆絶者無生長之氣也故期在肅殺之時而死夏三月之病至陰不過十日陰謂歲半以下陽氣病傷故交陰即死陰陽交期在濂水在夏之陰陽交病病少陰之火也濂水水之清也在三秋之時秋三月之病三陽俱起不治自已秋三月乃陽明主令陽明者兩陽合明間於二陽之中三陽俱起是謂乾剛中正勿藥有喜陰陽交合者立不能坐坐不能起七月八月乃太陰主氣九月十月乃陽明主氣至秋令而陰陽交合者太陰陽明之合病也太陰欲開而不能勝陽明之闔陽明欲闔而不能止太陰之開是以立不能坐坐不能起三陽獨至期在石水二陰獨至期在盛水此總結太陽少陰為水火陰陽之主標本互合陰陽氣交如三陽獨至是有陽而無陰矣二陰獨至是惟陰而無陽矣石水堅冰之時孤陽而無陰氣之和又值水性堅凝故死盛水立春雨水之時獨陰而無陽氣之和又值春陽外泄故死也方盛衰論篇第八十春時之陽氣方盛陰氣方衰秋時之陰氣方盛陽氣方衰此天氣之盛衰也少者之氣方盛老者之氣方衰此人氣之盛衰也雷公請問氣之多少何者為逆何者為從氣之多少問陰陽之氣有多有少逆者謂四時老少之氣逆行從順也黃帝答曰陽從左陰從右老從上少從下是以春夏歸陽為生歸秋冬為死反之則歸秋冬為生是以氣多少逆皆為厥四時之氣春夏為陽秋冬為陰陽從左者謂春夏之氣從左而行於右陰從右者謂秋冬之氣從右而行於左老者之氣從上而下猶秋氣之從上而方衰於下少者之氣從下而上猶春氣之從下而方盛於上是以春夏之氣歸於陽之從左而右氣之順也故為生氣歸於秋冬之從右而左氣之逆也故為死氣反之謂秋冬之氣歸於陰之從右而左為生歸於春夏之從左而右為逆是以氣之無論多少逆者皆為厥也此節總提四時老少之氣而先論其天氣之順逆焉閔士先曰此與五常政大論春氣始於左秋氣始於右春氣始於下秋氣始於上同義問曰有餘者厥耶復問人氣之逆乃有餘者厥耶答曰一上不下寒厥到膝少者秋冬死老者秋冬生一者一陰之氣也一上不下寒厥到膝陰氣自下而上從井而至合也陰氣上行秋冬之令也故老者為順少者為逆此蓋以人之陰陽而應天地之四時也氣上不下頭痛巔疾氣者一陽之氣也氣上不下頭痛巔疾陽氣自下而直上於巔頂也愚謂此下當有少者春夏生老者春夏死句或簡脫耶按此二節論人之陰陽二氣自下而上以應天之四時年之老少重在不下二字蓋一日之中一時之間陰陽出入上下循環有四時老少之氣如上而不下則為厥逆矣豈果寒厥到膝而老者秋冬可生是以下文所云倪仲玉問曰論陰氣曰寒厥到膝論陽氣曰頭痛巔疾是陽氣之直上於巔頂而陰氣止至於膝耶曰非也陰陽二氣上下相同猶天之寒暑往來四時之收藏生長夫肌腠氣分為陽經脈血分為陰陰氣生於陽陽氣生於陰故曰所出為井者陽氣從陰而出於脈外之處為井也所入為合者陰氣從陽分而入於經脈之中亦從井至合而與營血相會故曰所入為合蓋自井至合則五行之氣已周復散行而上也試觀寒厥之病始於肘膝而不能回陽則漸至額顱皆冷此陰陽血氣生始出入之要道學者不可不細加參求求陽不得求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日夫老從上少從下此老幼百年之四時也陽從左陰從右此天地一歲之四時也朝則為春日中為夏日入為秋夜半為冬此一日之有四時也是老者一歲之中有春夏一日之中有春夏少者一歲之中有秋冬一日之中有秋冬能順一歲一日之四時則百歲之氣皆順矣豈老者止行秋冬之令而少者單行春夏乎此蓋以天之四時合人之陰陽以人之順逆應天之四時是以不明天地人參合之道求陽而不得其氣求陰而不能審其微以五部而候五時之氣若隔絶而無徵驗矣夫四時之氣生於五方人之形身乃神氣之屋宇若居曠野不知四時之氣也若伏空室不知人之陰陽也綿綿乎天道之細微也屬合也不知天道之微而欲合人之陰陽尚不能滿一日之四時而況能知有歲之陰陽乎是以少氣之厥形之於夢而合於四時更見其微渺之極也是以少氣之厥令人妄夢其極至迷少氣之厥氣虛而上逆也夢者魂魄神氣之所遊蕩是以上行其極而至迷迷者遠而迷也夫有餘之厥自下而上少氣之厥令人妄夢而合於四時是四時之氣合五臟之神五臟之陰陽下行至足陽氣起於足五趾之表陰氣起於足五趾之裡循足上行見於經脈應於四時三陽絶三陰微是為少氣絶者陽不與陰合也五臟之陰氣不得陽氣以和之則三陰微而五臟之氣少矣是以肺氣虛則使人夢見白物見人斬血藉藉得其時則夢見兵戰白物金之象也斬血刑傷也藉藉狼藉也得其時謂得其秋令之時則夢見兵戰蓋得時氣之助而金氣盛也此先言秋冬而後言春夏意謂天地之氣寒來則暑往暑往則寒來日月運行復婦二審復也腎氣虛則使人夢見舟船溺人得其時則夢伏水中若有畏恐海山有弱水雖芥羽亦沉溺夢見舟船溺人腎水之處弱也得冬令之水氣故夢伏水中若有畏恐腎志虛也肝氣虛則夢見菌香生草得其時則夢伏樹下不敢起菌香香菌之小者蓋雖有生氣而無根夢伏樹下得春令之木氣也不敢起者雖得時氣之助而亦不能勝心氣虛則夢救火陽物得其時則夢燔灼救火心氣虛也陽物龍也乃龍雷之火遊行也得其時氣之助則君相二火併炎故夢燔灼倪仲玉曰灼乃昭明之象君火也燒炙曰燔在地之火也脾氣虛則夢飲食不足得其時則夢築垣蓋屋凡此五臟氣虛陽氣有餘陰氣不足合之五診調之陰陽以在經脈脾氣虛則夢取故為飲食不足夢築垣蓋屋得時令之土氣也凡此五臟氣虛乃陽氣有餘陰氣不足當合之五診調之陰陽以在經脈而合於四時診有十度度人脈度臟度肉度筋度俞度陰陽氣盡人病自具脈動無常散陰頗陽脈脫不具診無常行診必上下度民君卿受師不卒使術不明不察逆從是為妄行持雌失雄棄陽附陰不知併合診故不明傳之後世反論自章此言持診之道四時五診之外而更有十度也度度量也十度者度人脈度臟度肉度筋度俞度陰陽氣度上下度民度君度卿也度人脈者度人合天地而成三部九候也度臟者度五臟之奇恆逆從也度肉者度人之形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭如病而形肉脫者死度筋者手足三陰三陽之筋各有所起經於形身病則宜用燔針劫刺也度俞者五臟五俞五五二十五俞六腑六俞六六三十六俞經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為俞所行為經所入為合二十七氣所行皆在五俞也度陰陽氣者度臟腑表裡陰陽之氣盡者謂盡此法而人病自具也脈動無常散在陰而又頗在陽此病在情志是以陰陽莫測脈脫不具必問而後得之度上下者度氣之通於天病之變化也度民者度其嘗富後貧暴樂暴苦也度君者度王公大人驕恣縱欲禁之則逆其志順之則加其病當告之以其敗語之以其善導之以其所便開之以其所苦人之情莫不惡死而樂生惡有不聽者乎度卿者度其嘗貴後賤封君敗傷故貴脫勢及欲侯王是以受師不卒使術不明不察逆從是為妄行持雌失雄棄陽附陰不知併合診故不明傳之後世反論自章雌雄謂陰陽之配合併合血氣之合併也至陰虛天氣絶至陽盛地氣不足水熱穴論曰腎者至陰也至陰者盛水也解精微論曰積水者至陰也至陰者腎之精也蓋在天為氣在下為水在氣為陽在腎為精氣生於水陽生於精是以至陰虛天氣絶至陽者天之陽也天地之氣日月運行寒暑往來交相和平者也如天氣盛則地氣不足矣按太陰陽明篇曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛故喉主天氣咽主地氣陽受風氣陰受濕氣是人之陰陽上下表裡氣血以配天地之陰陽者也陰陽並交至人之所行陰陽並交者陽氣先至陰氣後至陰陽並交者謂陰陽寒暑之交相出入也陽氣先至者謂四時之氣始於一陽初動邵子之詩曰冬至子之半天心無改移一陽初動處萬物未生時元酒味方淡太音聲正稀此言如不信更請問疱犧即此義也至人者和於陰陽調於四時呼吸精氣獨至守神而復歸於無極故曰陰陽並交至人之所行是以聖人持診之道先後陰陽而持之奇恆之勢乃六十首診微合之事追陰陽之變章五中之情其中之論取虛實之要定五度之事知此乃足以診先後陰陽而持之者按尺寸以候脈之來去也奇恆之勢各以六十為首即診要經終脈解諸篇所論是也合微之事者聲合五音色合五行脈合陰陽也陰陽之變者天地陰陽之氣有德化政令變易災眚也五中之情五內之情志也取虛實之要定五度之事者取虛實而定五度也五度者度神之有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足也又有五實死五虛死其時有生者如漿粥入胃泄注止則虛者活身汗得後利則實者活此皆聖人持診之要道不可不知也是以切陰不得陽診消亡得陽不得陰守學不湛知左不知右知右不知左知上不知下知先不知後故治不久知醜知善知病知不病知高知下知坐知起知行知止用之有紀診道乃具萬世不殆起所有餘知所不足湛音耽持診之道有陰陽逆從有左右前後上下之診論在脈要精微篇中湛甚也醜善脈證之有善惡也有餘之病則起而行不足之病多坐而臥知起之所為有餘則知所以不足蓋知此即可以知彼知一可以知十也度事上下脈事因格是以形弱氣虛死形氣有餘脈氣不足死脈氣有餘形氣不足生此言持診之道當兼度其形氣也事者謂其通變也上下者氣之通於天病之變化也格窮究也言當先度其上下之通變因而窮究其脈之通變是以形弱氣虛者死此又無論其脈之平與不平度其形氣而知其死矣形氣有餘脈氣不足者死脈氣有餘形氣不足者生是當以形證脈氣通變審之而後可必其死生也是以診有大方坐起有常出入有行以轉神明必清必靜上觀下觀司八正邪別五中部按脈動靜循尺滑澀寒溫之意視其大小合之病能逆從以得復知病名診可十全不失人情故診之或視息視意故不失條理道甚明察故能長久不知此道失經絶理亡言妄期此謂失道轉神明者運已之神以候彼之氣也上觀下觀者若視深淵若迎浮雲也八正者日月星辰四時之氣也別五中部先別五臟之脈也按脈動靜候其浮沉遲數也循尺滑澀寒溫之意謂脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀尺膚滑其淖澤者風也尺膚澀者風痹也尺膚熱甚脈甚躁者病溫也尺膚寒其脈小者泄少氣尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工也視其脈之大小合之病能病能者奇恆之病也逆從者神轉不回回則不轉也名之實也能正其診有十全參其人情矣視息者候呼吸之往來脈之去至也視意者閉戶塞牖系之病者數問其情以從其意得神者昌失神者亡亡言者亡妄之言不知診道妄與生死之期此失經絶理是謂失道矣解精微論篇第八十一精者天一所生之精微者天道之幽遠也此九九數終復歸於真元之論黃帝在明堂雷公請曰臣受業傳之行教以經論從容形法陰陽刺灸湯藥所資行治有賢不肖未必能十全若先言悲哀喜怒燥濕寒暑陰陽婦女請問其所以然者卑賤富貴人之形體所從群下通使臨事以適道術謹聞命矣請問有才愚僕漏之問不在經者欲問其狀帝曰大矣悲哀喜怒人之情也燥濕寒暑天之氣也陰陽者天之道也婦女者天癸之所生也此通天之道故極贊其大焉公請問哭泣而淚不出者若出而少涕其故何也帝曰在經有也靈樞經有悲哀涕泣之論復問不知水所從生涕所從出也帝曰若問此者無益於治也工之所知道之所生也精液下通於上應水之上通於天此通天之大道非止有裨於治也工止知涕泣之所由出而不知道之所由生夫心者五臟之專精也目者其竅也華色者其榮也是以人有德也則氣和於目有亡憂知於色五臟主藏精者也心者五臟六腑之主故為五臟之專精心開竅於目故目者心之竅五臟生成篇曰心之合脈也其榮色也其主腎也故華於色者心之榮也有德者見於色而知心氣之和也是以悲哀則泣下泣下水所由生水宗者積水也積水者至陰也至陰者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也悲哀則動其心志故泣下而水所由生水宗者宗脈之所聚上液之道也腎臟之精水由宗脈而上通於心上注於目故曰目者宗脈之所聚也如志不悲則精持於下輔之裹之水精不出於宗脈故水不行於上也此言精水之在下必動其腎志而後上行夫水之精為志火之精為神水火相感神志俱悲是以目之水生也故諺言曰心悲名曰志悲志與心精共湊於目也此言心腎相通神志交感心悲而未有不動其志者故諺有之曰心悲名曰志悲蓋心之所之謂之志心志之合一也心者五臟之專精故水精與心精共湊於目而為泣莫子瑜曰神志相合而精亦相合是以俱悲則神氣傳於心精上不傳於志而志獨悲故泣出也此言神生於精志生於心離中有虛坎中有滿水火上下之互交也靈樞經曰所生之來謂之精兩精相搏謂之神是神氣之生於精也故曰俱悲則神氣傳於心謂心臟所藏之神氣本於腎精之所生又曰心有所憶謂之意意之所存謂之志是志之生於心也故曰精上不傳於志謂精不上傳於志而志獨悲於上故泣出也上節言心悲名曰志悲此言志悲即是心悲心志之合一也閔士先曰動其心志則心精湊於目而為泣不待腎精之上傳也泣涕者腦也腦者陰也髓者骨之充也故腦滲為涕志者骨之主也是以水流而涕從之者其行類也此言涕之所從來者由腎精之上通於腦腦滲下而為涕也腦者陰髓也骨之精髓充於骨髓從骨空而上通於腦故腦滲之為涕也夫志者骨之主也是以水流而涕從之者其行與志悲而腎精出於目之為泣者相同類也夫涕之與泣者譬如人之兄弟急則俱死生則俱生其志以早悲是以涕泣俱出而橫行也夫人涕泣俱出而相從者所屬之類也涕泣皆出於腎水而分兩岐猶兄弟之生於一母而分伯仲也故腎死脈來辟辟如彈石之急則兄弟俱死生則俱生而出為涕淚也是以其志早悲則涕泣俱出而橫行也夫人涕泣俱出而相從者緣腎臟所屬之同類也玉師曰志悲則涕泣俱出志絶則神氣俱死蓋言神氣生於天乙之真而真元之不可損也雷公曰大矣雷公始悟人道之通於天道故復贊其大焉請問人哭泣而淚不出者若出而少涕不從之何也帝曰哭泣不出者哭不悲也不泣者神不慈也神不慈則志不悲陰陽相持泣安能獨來夫志悲者惋惋則沖陰沖陰則志去目志去則神不守精精神去目涕泣出也此復申明泣出於神而志涕出於志而神故神不慈則志不悲而精不出志動則神不守而涕泣俱來是神守則志守志動則神動也慈悲也陰陽相持謂水火之神志主持於內則精不出也惋惋驚動貌沖陰謂志上衝於腦也夫目繫上屬於腦故志上衝陰則志去走於目志去則神不獨守其精精神並去出於目而涕泣皆出也且子獨不誦不念夫經言乎厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也夫一水不勝五火故目眥肓此言神志相守水火相交者也經謂靈樞口問諸篇厥謂水火不相交而相逆也骨之精為瞳子腎之精氣不上貫於目故目無見也並者謂諸陽之氣合併於上諸陰之氣合併於下也心乃陽中之太陽而為五臟之專精故陽並於上不得陰氣以和之則火獨光於上也腎為水臟受藏五臟之精陰脈集於足下而聚於足心故陰並於下不得陽氣以和之則足寒足寒則臟寒生滿病也一水謂太陽之水五火五臟之陽氣也夫太陽之水隨氣而運行於膚表猶水之隨天氣而環轉於上下少陰之水火以應天之日月交相會合而不相離者也是以陰陽厥逆則目眥肓眥者謂太陽之兩睛明以應天之日月也張兆璜曰通篇論精神此後提出氣字夫五臟之精氣皆會於目氣並於上精並於下故為五火是以衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也此言人氣之與天氣相通也風者天之氣也陽氣者神氣也火氣者陽氣也謂神氣內守於精陽氣外通於目見風則氣隨風動而神不守精致精神共去於目而泣下也有以比之夫火疾風生乃能雨此之類也比者以天之精氣神而比類人之精氣神也風乃天之陽氣火之精為神雨乃水精之上通於天而復下降者也火疾風生乃能雨者謂氣生於神神生於精精隨神氣而運者也夫天之日月精水隨天氣而運行無息人之精神亦隨氣而環轉無端人之兩目應天之日月晝夜而開闔者也按本經八十一篇所論之道天地人所用之數三六九蓋人生於天地氣交之中通天之道應地之理地居人之下大氣舉之無所馮依是天包乎地之外而運行無息者也數之始於一而成於三三而兩之成六三而三之成九乃自從無極而生天地陰陽之數也聖人提挈天地把握陰陽呼吸精氣獨立守神能養精氣神以配天吸地之精氣神以自養至於不生不化與道合同出乎天地之外復歸於無極而無有終時是以立數萬余言後七篇單論天道以應人九九數終解明精氣神以復於天真蓋欲使天下後世子孫黎民不罹苛疾之患同歸生長之門聖人之教化大矣求道之士若能研窮此經存養真性皆可壽敝無窮超凡入聖
