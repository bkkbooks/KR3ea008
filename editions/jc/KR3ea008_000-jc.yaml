body:
  text: 跋黃帝素問九卷靈樞九卷總名內經為醫學之梯階方書之領袖漢後注家林立迄無一當李士材歷詆其失汪訒菴復踵其訛而是經益不明於天下矣長樂陳修園欲度迷津特開覺路爰於三字經中敘醫學源流以告人曰大作者推錢塘錢塘謂張隱菴高士宗也康熙間隱菴與眾弟子開講經論於侶山堂士宗繼之於是侶山堂有素靈集註直解傷寒印宗傷寒金匱集註直解侶山堂類辯針灸秘傳醫學真傳本草崇原等書夫素靈明體達用傷寒金匱以經為體以方為用隱菴因經方意義艱深而作集註士宗因集註意義艱深而作直解其餘各書猶黃鐘以下十一律藉寫黃鐘之蘊者爾傳至修園又有素靈集註節要外附十餘種語不躐等使讀者如食蔗漸入佳境而大旨悉本侶山堂明知非此不足以繼往開來黜浮崇實也乃講堂方被劫灰遺籍亦遭兵火他省除左菊農重鑴傷寒集註外尚有素靈出自坊間舛訛殊甚厥後僅於丁松生王耕眉兩處得見素靈集註素問直解原板既而姚受之褚敦伯亦各出家藏集註相示之四君者物色有年始猶舊物學者如知長沙論略俱發源於內經則力爭上游舍集註從何入手今集註尚存素靈兩冊由書局提調宋觀察屬章椿伯彙集參校請於衛大中丞發局刊行而後素與靈相得益彰凡陰陽氣血之生始出入臟腑經絡之交會貫通無不了如指掌矣隱菴之功豈在仲景下歟按侶山堂至乾隆時但缺針灸秘傳迄今止百餘年亡書過半倘天將大昌斯道俾得逐一搜羅校勘付梓以廣其傳則醫門之幸亦即天下蒼生之幸也夫光緒十三年七月淳安教諭錢塘仲學輅謹識
