body:
  text: 卷一上古天真論篇第一上古謂所生之來天真天乙始生之真元也首四篇論調精神氣血所生之來謂之精故首論精兩精相搏謂之神故次論神氣乃精水中之生陽故後論氣昔在黃帝生而神靈弱而能言幼而徇齊長而敦敏成而登天徇音循長上聲按史記黃帝姓公孫名軒轅有熊國君少典之子繼神農氏而有天下都軒轅之丘以土德王故號黃帝神靈智慧也徇順齊正敦信敏達也此節記聖德稟性之異發言之早方其幼也能順而正及其長也既敦且敏故其垂拱致治教化大行廣制度以利天下垂法象以教後世生知之聖人也後鑄鼎於鼎湖山鼎成而白日昇天此亦壽敝天地無有終時之真人也乃問於天師曰余聞上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時世異耶人將失之耶天師尊稱岐伯也天者謂能修其天真師乃先知先覺者也言道者上帝之所貴師所以傳道而設教故稱伯曰天師度越也度百歲者百二十歲也岐伯對曰上古之人其知道者法於陰陽和於術數上古太古也知道謂知修養之道也法取法也陰陽天地四時五行六氣也和調也術數者調養精氣之法也蓋陰陽者萬物之終始死生之本逆之則災害生從之則苛疾不起故能取法以和調是謂得道食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去靈樞決氣篇曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣飲食有節養其氣也生氣通天論曰起居如驚神氣乃浮起居有常養其神也煩勞則張精絕不妄作勞養其精也夫神氣去形獨居人乃死能調養其神氣故能與形俱存而盡終其天年今時之人不然也以酒為漿以妄為常醉以入房酒能傷脾脾氣傷則不能宣五穀味而生氣傷矣以妄為常傷其神矣醉以入房傷其精矣言今時之人不知道者縱嗜欲而傷其精氣神也以欲竭其精以耗散其真不知持滿不時御神樂色曰欲輕散曰耗真者元真之氣也不知持滿不慎謹也不時御神不能四時調御其神也言不知道者不能慎謹調養而喪其精氣神也務快其心逆於生樂起居無節故半百而衰也心藏神務快其心喪其神守矣樂則氣緩而更逆之傷其氣矣起居無節耗其精矣言今時之人惟務快樂不能積精全神是以半百而衰也夫上古聖人之教下也皆謂之虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來虛邪虛鄉不正之邪風也恬安靜也淡樸素也虛無不為物欲所蔽也言上古之人得聖人之教化內修養生之道外避賊害之邪所以年皆度百歲而動作不衰是以志閒而少欲心安而不懼形勞而不倦氣從以順各從其欲皆得所願恬淡無為是以志閒而少欲矣精神內守是以心安而不懼形勞而不倦矣真氣從之是以氣從以順矣五方之民衣食居處各從其欲是以皆得所願也故美其食任其服樂其俗高下不相慕其民故曰樸故者承上文而言按異法方宜論東方之民皆安其處美其食西方之民依山陵而居不衣而褐薦華食而肥脂北方之域其地高陵居風寒冰冽其民樂野處而乳食南方之域其地下水土弱其民嗜酸而食胕中央者其地平以濕其民食雜而不勞此五方之民隨天地萬物之所生山川地土之高下衣食居處各從其欲彼此不相愛慕故其民曰樸是以嗜欲不能勞其目淫邪不能惑其心此復言五方之民各有嗜欲淫邪而致病惟上古恬淡之世民皆安居樂俗而無外慕之思故雖有嗜欲淫邪不能傷其內也愚智賢不肖不懼於物故合於道上古之人無貴賤賢愚皆全德不危故不外懼於物而合於養生之道焉所以能年皆度百歲而動作不衰者以其德全不危也德者所得乎天之明德也全而不危者不為物欲所傷也莊子曰執道者德全德全者形全形全者聖人之道也帝曰人年老而無子者材力盡邪將天數然也陰陽者萬物之終始也此復論男女陰陽氣血有始有終有盛有衰各有自然之天數材力精力也岐伯曰女子七歲腎氣盛齒更髮長更平聲長上聲七為少陽之數女本陰體而得陽數者陰中有陽也人之初生先從腎始女子七歲腎氣方盛腎主骨齒者骨之餘故齒更血乃腎之液發乃血之餘故髮長也按陰陽之道孤陽不生獨陰不長陰中有陽陽中有陰是以天乙生水地二生火離為女坎為男皆陰陽互換之道故女得陽數而男得陰數也二七而天癸至任脈通太衝脈盛月事以時下故有子天癸天乙所生之癸水也衝脈任脈奇經脈也二脈並起於少腹之內胞中循腹上行為經血之海女子主育胞胎夫月為陰女為陰月一月而一周天有盈有虧故女子亦一月而經水應時下泄也虧即復生故於初生之時男女構精當為有子虛則易受故也三七腎氣平均故真牙生而長極長上聲腎氣者腎臟所生之氣也氣生於精故先天癸至而後腎氣平腎氣足故真牙生真牙者盡根牙也四七筋骨堅髮長極身體盛壯腎生骨髓髓生肝肝生筋母子之相生也女子四七精血盛極之時是以筋骨堅髮長極也血氣盛則充膚熱肉是以身體盛壯五七陽明脈衰面始焦發始墮陽明之脈榮於面循髮際故其衰也面焦發墮夫氣為陽血脈為陰故女子先衰於脈而男子先衰於氣也再按足陽明之脈並衝任挾臍上行衝任脈虛而陽明脈亦虛矣六七三陽脈衰於上面皆焦發始白三陽之脈盡上於頭三陽脈衰故面皆焦血脈華於色血脈衰故發白也七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也地道下部之脈道也三部九候論曰下部地足少陰也癸水藏於腎天癸竭是足少陰下部之脈道不通衝任虛是以形衰而無子也丈夫八歲腎氣實髮長齒更八為少陰之數男本陽體而得陰數者陽中有陰也二八腎氣盛天癸至精氣溢瀉陰陽和故能有子靈樞經曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脫血也衝任之脈不榮口唇故須不生焉是則男子之天癸溢於衝任充膚熱肉而生髭鬚女子之天癸溢於衝任充膚熱肉為經水下行而妊子也男子二八精氣滿溢陰陽和合瀉泄其精故能有子也三八腎氣平均筋骨勁強故真牙生而長極平足也均和也極止也故真牙生而筋骨所長以至於極矣四八筋骨隆盛肌肉滿壯四居八數之半是以隆盛之極五八腎氣衰發墮齒槁腎為生氣之原男子衰於氣故根氣先衰而發墮齒槁也六八陽氣衰竭於上面焦髮鬢頒白根氣先衰而標陽漸竭矣平脈篇曰寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長陽氣衰故顏色焦而髮鬢白也七八肝氣衰筋不能動天癸竭精少腎臟衰形體皆極肝乃腎之所生腎氣衰故漸及於肝矣肝生筋肝氣衰故筋不能運動腎主骨筋骨皆衰故形體疲極也八八則齒髮去數終衰極是以不惟頒白枯槁而更脫落矣腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉今五臟皆衰筋骨解墮天癸盡矣故髮鬢白身體重行步不正而無子耳此復申明先天之癸水又藉後天之津液所資益也腎者主水言腎臟之主藏精水也受五臟六腑之精而藏之者受後天水穀之精也蓋五味入胃各歸所喜津液各走其道腎為水臟受五臟之精而藏之腎之精液入心化赤而為血流溢於衝任為經血之海養肌肉生毫毛所謂流溢於中布散於外者是也故曰天癸者天乙所生之精也是以男子天癸至而精氣溢瀉腎之精化赤為血溢於衝任生髭鬚女子天癸至而月事以時下故精血皆謂之天癸也再按經云榮血之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外專精者行於經隧常榮無已男子八八女子七七天地之數終而天癸絕然行於經隧之榮血未竭也是以老年之人能飲食而脾胃健者尚能筋骨堅強氣血猶盛此篇論天癸絕而筋骨衰其後天水穀之精又不可執一而論也再按女子過七七而經淋不絕者此係行於經隧之血反從衝任而下是以面黃肌瘦骨憊筋柔當知經隧之血行於脈中衝任之血兼滲於脈外帝曰有其年已老而有子者何也岐伯曰此其天壽過度氣脈常通而腎氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣此復申明天地陰陽之數止盡終於七七八八也天壽過度先天所秉之精氣盛也氣脈常通後天之地道尚通也是以腎氣有餘而有子此雖有子然天地之精氣盡竭於七八之數者也帝曰夫道者年皆百數能有子乎岐伯曰夫道者能卻老而全形身年雖壽能生子也此承上文而言惟修道者能出於天地陰陽之數也黃帝曰余聞上古有真人者提挈天地把握陰陽呼吸精氣獨立守神肌肉若一故能壽敞天地無有終時此其道生上古真人者言所生之來自然合道而能全其天真之人也天真完固故能斡旋造化燮理陰陽吐納精氣與道獨存守神全形是以肌膚若冰雪綽約如處子壽過天地無有終極之時此由道之所生故無為而道自合也玉師曰天命之性復歸於無極是謂真人佛老以真空見性本經謂空中有真中古之時有至人者淳德全道和於陰陽調於四時去世離俗積精全神遊行天地之間視聽八達之外此蓋益其壽命而強者也亦歸於真人中古至人者謂有為以入道而能全所生之天真者也天真雖泄復能修德全道積精養神故令神氣充塞於天地之間耳目聰明於八達之外此蓋從修煉保固得來亦能復完天真而同歸大道夫真人者得先天之真者也至人者得後天一氣者也其趨則一故亦歸於真人其次有聖人者處天地之和從八風之理適嗜欲於世俗之間無恚嗔之心行不欲離於世被服章舉不欲觀於俗外不勞形於事內無思想之患以恬愉為務以自得為功形體不敝精神不散亦可以百數至人真人者去世離俗修道全真無妻室之愛無嗜欲之情所謂遊方之外高出人類者也聖人者處天地之內順八方之理教以人倫法於制度黻冕於朝堂之上不欲離於世俗章服無為而治不勞其形隨機而應不役其神此治世之聖人也亦可以優遊泮渙而長享百年矣其次有賢人者法則天地象似日月辨列星辰逆從陰陽分別四時將從上古合同於道亦可使益壽而有極時賢人者處塵俗之內鮮拘蔽之習取法天地如日月之光明推測象緯順逆二氣序別四時將與上古天真之聖同合於道亦可使益壽而至於壽敝天地之極此修道之賢人而由人以合天超凡以至聖者也此帝勉人修為而不得以凡庸自棄故移精變氣章曰去故就新乃得真人四氣調神大論篇第二神藏於五臟故宜四氣調之脾不主時旺於四季月春三月此謂發陳發啟也陳故也春陽上升發育萬物啟故從新故曰發陳天地俱生萬物以榮天地之氣俱主生髮而萬物亦以生榮夜臥早起廣步於庭夜臥早起發生氣也廣寬緩也所以運動生陽之氣被髮緩形以使志生東方風木之氣直上巔頂被髮者疏達肝木之氣也緩和緩也舉動舒徐以應春和之氣志者五臟之志也志意者所以御精神收魂魄適寒溫和喜怒者也是以四時皆當順其志焉生而勿殺予而勿奪賞而勿罰予與同皆所以養生髮之德也故君子啟蟄不殺方長不折此春氣之應養生之道也四時之令春生夏長秋收冬藏此春氣以應養生之道逆之則傷肝夏為寒變奉長者少逆謂逆其生髮之氣也肝屬木王於春春生之氣逆則傷肝肝傷則至夏為寒變之病因奉長者少故也蓋木傷而不能生火故於夏月火令之時反變而為寒病夏三月此為蕃秀蕃茂也陽氣浮長故為茂盛而華秀也天地氣交萬物華實夏至陰氣微上陽氣微下故為天地氣交陽氣施化陰氣結成成化相合故萬物華實也夜臥早起無厭於日夜臥早起養長之氣也無厭於長日氣不宜惰也使志無怒使華英成秀長夏火土用事怒則肝氣易逆脾土易傷故使志無怒而使華英成秀華者心之華言神氣也使氣得泄若所愛在外夏氣浮長故欲其疏泄氣泄則膚腠宣通時氣疏暢有若好樂之在外也此夏氣之應養長之道也長上聲凡此應夏氣者所以養長氣之道也逆之則傷心秋為痎瘧奉收者少冬至重病心屬火王於夏逆夏長之氣則傷心矣心傷至秋為痎瘧因奉收者少故也蓋夏之陽氣浮長於外至秋而收斂於內夏失其長秋何以收至秋時陰氣上升下焦所出之陰與上焦所逆之陽陰陽相搏而為寒熱之陰瘧也夫陽氣發原於下焦陰臟春生於上夏長於外秋收於內冬藏於下今夏逆於上秋無以收收機有礙則冬無所藏陽不歸原是根氣已損至冬時寒水當令無陽熱溫配故冬時為病甚危險也有云逆夏氣則暑氣傷心至秋成痎瘧此亦邪氣伏藏於上與陽氣不收之義相同但四時皆論臟氣自逆而不涉外淫之邪是不當獨以夏時為暑病也秋三月此為容平容盛也萬物皆盛實而平定也天氣以急地氣以明寒氣上升故天氣以急陽氣下降故地氣以明早臥早起與雞俱興雞鳴早而出塒晏與雞俱興與春夏之早起少遲所以養秋收之氣也使志安寧以緩秋刑陽和日退陰寒日生故使神志安寧以避肅殺之氣收斂神氣使秋氣平無外其志使肺氣清皆所以順秋收之氣而使肺金清淨也此秋氣之應養收之道也凡此應秋氣者所以養收氣之道也逆之則傷肺冬為飧泄奉臟者少飧音孫肺屬金王於秋逆秋收之氣則傷肺矣肺傷至冬為飧泄之病因奉藏者少故也蓋秋收而後冬藏陽藏於陰而為中焦釜底之燃以腐化水穀秋失其收則奉藏者少至冬寒水用事陽氣下虛則水穀不化而為飧泄矣冬三月此為閉藏萬物收藏閉塞而成冬也水冰地坼無擾乎陽坼音拆坼裂也陽氣收藏故不可煩擾以泄陽氣早臥晚起必待日光早臥晚起順養閉藏之氣必待日光避寒邪也使志若伏若匿若有私意若已有得若伏若匿使志無外也若有私意若已有得神氣內藏也夫腎藏志心藏神用三若字者言冬令雖主閉藏而心腎之氣時相交合故曰私者心有所私得也去寒就溫無泄皮膚使氣亟奪去寒就溫養標陽也膚腠者陽氣之所主也夫陽氣根於至陰發於膚表外不固密則裡氣亟起以外應故無泄皮膚之陽而使急奪其根氣也此言冬令雖主深藏而標陽更宜固密此冬氣之應養藏之道也凡此應冬氣者所以養藏氣之道也逆之則傷腎春為痿厥奉生者少腎屬水王於冬逆冬藏之氣則傷腎腎氣傷至春為痿厥之病因奉生者少故也蓋肝木生於冬水主春生之氣而養筋筋失其養則為痿生氣下逆則為厥天氣清淨光明者也上節論順四時之氣而調養其神然四時順序先由天氣之和如天地不和則四時之氣亦不正矣故以下復論天地之氣焉藏德不止故不下也上天之氣至清淨光明然明德惟藏而健運不息者也夫天氣下降地氣上升斯成地天之泰惟其運用不止故不必下而後謂之下也蓋言天氣布於六合九州化生萬物而體位仍尊高也天明則日月不明邪害空竅天氣至光明者也明德藏隱故晝明者日焉夜明者月焉若不藏而彰著於外是天明而日月不明矣天德不藏則虛其清淨高明之體而邪乘虛以害之故曰天運當以日光明陽因而上衛外者也如人之陽不固密於上不衛護於外則邪走空竅而為害矣此言天包乎地陽抱於陰然當藏隱固密而不宜外張下泄者也陽氣者閉塞地氣者冒明陽氣者天氣也此承上文而復言天德惟藏而無運用不息之機則地氣上乘而昏冒其光明矣上節言虛其藏德之體此節言失其不止之機雲霧不精則上應白露不下地氣升而為云為霧天氣降而為雨為露雲霧不精是地氣不升也地氣不升則天氣不降是以上應白露不下上節言天氣閉塞此節言地氣伏藏天地不交而為痞矣交通不表萬物命故不施不施則名木多死表外也揚也言天地之氣雖上下交通而不表彰於六合九州之外則萬物之命不能受其施化矣不施則名木多死蓋木為萬物之始生也上節言不交通於上下此節言不運用於四方惡氣不發風雨不節白露不下則菀稾不榮菀音郁菀茂木也稾禾稈也上節言天地之氣不施則名木多死此復言四時之氣不應則草木不榮蓋天地之氣不和而四時之氣亦不正矣惡氣忿怒之氣也脈要精微論曰彼秋之忿成冬之怒惡氣不發則失其勁肅嚴凜之令矣風雨不節則失其溫和明曜之政矣白露不下則無溽蒸濕澤之濡矣四時失序雖茂木嘉禾而亦不能榮秀也按歲運四之氣大暑立秋處暑白露乃太陰濕土主氣蓋濕熱之氣上蒸而後清涼之露下降故曰惡氣不發者言秋冬之令不時也風雨不節者言春夏之氣不正也白露不下者言長夏之氣不化也莫仲超曰菀郁也稾枯也言四時之氣不行則草木枯槁而不榮賊風數至暴雨數起天地四時不相保與道相失則未央絕滅數音朔賊風數至陽氣不正而太過也暴雨數起陰氣不正而偏勝也此總結上文而言天地四時不相保其陰陽和平而又失其修養之道則未久而有絕滅之患矣唯聖人從之故身無奇病萬物不失生氣不竭惟聖人能順天地四時之不和而修養其神氣故無奇暴之害夫萬物有自然之生氣雖遇不正之陰陽而不至於絕滅惟人為嗜欲所傷更逆其時則死聖人內修養生之道外順不正之時與萬物不失其自然而生氣不絕也朱濟公曰此即與萬物浮沉於生長之義此言萬物之有生氣後言萬物之有根本逆春氣則少陽不生肝氣內變逆夏氣則太陽不長心氣內洞逆秋氣則太陰不收肺氣焦滿逆冬氣則少陰不藏腎氣獨沉此論陰陽之氣隨時出入逆則四時所主之臟自病於內也少陽主春生之氣春氣逆則少陰不生致肝氣鬱而內變矣太陽主夏長之氣太陽不長則心氣虛而內洞矣太陽主秋收之氣太陰不收則肺葉熱焦而脹滿矣少陰主冬藏之氣少陰不藏則腎氣虛而獨沉矣首論所奉者少而所生之臟受病此論四時之氣逆而四時所主之藏氣亦自病焉濟公曰少陽主厥陰中見之化故少陽不生而肝氣內變心為陽中之太陽故太陽不長而心氣內虛夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根四時陰陽之氣生長收藏化育萬物故為萬物之根本春夏之時陽盛於外而虛於內秋冬之時陰盛於外而虛於內故聖人春夏養陽秋冬養陰以從其根而培養也楊君舉問曰上節言秋冬之時陰主收藏此復言秋冬之時陰盛於外陰陽之道有二義與曰天為陽地為陰天包乎地之外地居於天之中陰陽二氣皆從地而出復收藏於地中故曰未出地者名曰陰中之陰已出地者命曰陰中之陽所謂陰主收藏者收藏所出之陽氣也故與萬物沉浮於生長之門萬物有此根而後能生長聖人知培養其根本故能與萬物同歸於生長之門濟公曰陰陽出入故謂之門逆其根則伐其本壞其真矣根者如樹之有根本者如樹之有干真者如草木之有性命也逆春氣則少陽不生逆夏氣則太陽不長所謂逆其根矣逆春氣則奉長者少逆夏氣則奉收者少所謂逆其根則伐其本矣逆之則災害生逆之則死是謂壞其真矣故陰陽四時者萬物之終始也死生之本也逆之則災害生從之則苛疾不起是謂得道道者聖人行之愚者佩之言天地之陰陽四時化生萬物有始有終有生有死如逆之則災害生從之則苛疾不起是謂得陰陽順逆之道矣然不能出於死生之數惟聖人能修行其道積精全神而使壽敝天地無有終時愚者止於佩服而不能修為是知而不能行者不可謂得道之聖賢也從陰陽則生逆之則死從之則治逆之則亂反順為逆是謂內格上節言天地四時之陰陽有順逆死生之道此復言吾身中之陰陽亦有順逆死生之道焉蓋天地之陰陽不外乎四時五行而吾身之陰陽亦不外乎五行六氣是以順之則生逆之則死所謂順之者陰陽相合五氣相生東方肝木而生南方心火火生脾土土生肺金金生腎水水生肝木五臟相通移皆有次若反順為逆是謂內格內格者格拒其五臟相生之氣而反逆行也是故聖人不治已病治未病不治已亂治未亂此之謂也夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄錐不亦晚乎金匱玉函曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾蓋不使脾受逆氣而使肝氣仍復順行於心是反逆為順反亂為治也若五臟之氣已亂而五臟之病已成然後治之是猶渴而穿井戰而鑄兵無濟於事矣按此篇以天地之陰陽四時順養吾身中之陰陽五臟蓋五臟以應五行四時之氣者也經曰五臟相通移皆有次五臟有病則各傳其所勝故所謂從者四時五臟之氣相生而順行也逆者五臟四時之氣相勝而逆行也生氣通天論篇第三黃帝曰夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣凡人有生受氣於天故通乎天者乃所生之本天以陰陽五行化生萬物故生之本本乎陰陽也是以天地之間六合之內其地氣之九州人氣之九竅五臟十二節皆通乎天氣十二節者骨節也兩手兩足各三大節合小節之交共三百六十五會靈樞邪客曰地有九州人有九竅天有五音人有五臟歲有十二月人有十二節歲有三百六十五日人有三百六十節地有十二經水人有十二經脈蓋節乃神氣之所遊行故應天之歲月脈乃血液之所流注故應地之經水九竅乃藏氣之所出入五臟乃陰陽二氣之所舍藏故皆通乎天氣此篇論陰陽二氣與天氣相通故曰地之九州人之五臟天為陽是以先論陽而後論陰也朱濟公曰天乙生水氣乃坎中之滿也曰自古者言自上古天真所生之氣也本乎陰陽者天真之有陰有陽也其生五其氣三數犯此者則邪氣傷人此壽命之本也天之十干化生地之五行故曰其生五地之五行上應三陰三陽之氣故曰其氣三三陰者寒燥濕也三陽者風火暑也如不能調養而數犯此三陰三陽之氣者則邪氣傷人而為病矣夫人稟五行之氣而生犯此五行之氣而死有如水之所以載舟而亦能覆舟故曰此壽命之本也蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明生氣通乎天是以蒼天之氣清淨則人之志意亦治人能順此清淨之氣而吾身之陽氣外固雖有賊邪勿能為害此因四時之序而能調養者也故聖人傳運其精神餐服蒼天之清氣以通吾之神明失之則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也逆蒼天清淨之氣則九竅內閉肌肉外壅衛外之陽氣散解此不能順天之氣而自傷以致氣之消削蓋人氣通乎天逆天氣則人氣亦逆矣陽氣者若天與日失其所則折壽而不彰故天運當以日光明是故陽因而上衛外者也上節言順蒼天之氣以養吾身之陽此復言人之陽氣又當如天與日焉若失其所居之位所運之機則短折其壽而不能彰著矣夫天氣清淨光明者也然明德惟藏而健運不息故天運當以日光明天之藏德不下故人之陽氣亦因而居上天之交通表彰於六合九州之外故人之陽氣所以衛外者也因於寒欲如運樞起居如驚神氣乃浮夫陽氣生於至陰由樞轉而外出風寒之邪皆始傷皮毛氣分是故因於寒而吾身之陽氣當如運樞以外應陽氣司表邪客在門故起居如驚而神氣乃浮出以應之神氣神藏之陽氣也莫仲超曰此節運樞照應後之開闔太陽主表主開而本於下焦之寒水故欲從樞而後出又曰按傷寒始傷皮毛氣分得陽氣以化熱熱雖盛不死此能運樞而外應者也如太陽病發熱頭疼脈反沉當救其里此神氣不能運浮於外故急用乾薑附子以救在裡之陽氣而外出焉夫在天陰寒之邪藉吾身之陽氣以對待故因於寒者欲其陽氣如此而出所謂陽因於上衛外者也因於暑汗煩則喘喝靜則多言體若燔炭汗出而散天之陽邪傷人陽氣氣傷外弛故汗出也氣分之邪熱盛則迫及所生心主脈故心煩肺乃心之蓋故煩則喘喝也如不煩而靜此邪仍在氣分而氣傷神氣虛故多言也脈要精微論曰言而微終日乃復言者此奪氣也天之陽邪傷人陽氣兩陽相搏故體若燔炭陽熱之邪得吾身之陰液而解故汗出乃散也按傷寒論曰病常自汗出者此衛氣不和也復發其汗榮衛和則愈故因於暑而汗出者暑傷陽而衛氣不和也汗出而散者得榮衛和而汗出乃解也因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿緛音軟此言濕傷陽氣而見證之如此也陽氣者若天與日因而上者也傷於濕者下先受之除病者下行極而上陰濕之邪上干陽氣而冒明故首如裹也濕傷陽氣則因陽而化熱矣陽氣者柔則養筋陽氣傷而不能榮養於筋故大筋緛短小筋弛長蓋大筋連於骨節之內故鬱熱而緛短小筋絡於骨肉之外故因濕而弛長短則縮急而為拘攣長則放縱而為痿棄此言寒暑濕邪傷人陽氣者如此因於氣為腫四維相代陽氣乃竭此總結上文而言因外淫之邪有傷於氣則為腫矣陰陽別論曰結陽者腫四肢蓋陽氣傷而不能運行則榮血泣而為腫矣四維四肢也四肢為諸陽之本氣為邪傷是以四肢之陽交相代謝而陽氣乃竭也朱濟公曰四維四時也至真要大論曰謹按四維斥候皆歸其終可見其始可知蓋手足三陽之氣旺於四時有盛有衰如四時之代謝故曰四維相代也又問曰六淫之邪止言三氣者何也曰六氣生於五行暑熱總屬於火陽氣與衛氣各有分別風傷衛而兼傷陽故另提曰風客淫氣經曰燥勝則乾燥淫之邪傷人血液而不傷氣陽氣者煩勞則張精絕闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止汩音骨此言煩勞而傷其陽氣也按金匱要略云勞之為病其脈大手足煩春夏劇秋冬瘥陰寒精自出酸削不能行蓋陰陽之要陽密乃固煩勞則陽氣外張陰不得陽之溫固則精自出而絕於內矣秋冬之陽氣內而收藏夏則陽氣張浮於外故益虛而煎厥也精氣虛故目盲不可以視耳閉不可以聽也膀胱者州都之官精液藏焉而又屬太陽之腑太陽為諸陽主氣陽氣傷則壞其腑矣潰漏也言其州都之壞而不能藏精汩流貌言其陰寒精出而不可止也陽氣者大怒則形氣絕而血菀於上使人薄厥有傷於筋縱其若不容菀於遠切此因怒而傷其陽氣也陽氣者通會於皮膚腠理之間大怒則氣上逆而形中之氣絕其旋轉之機矣菀茂貌血隨氣行而茂於上矣薄迫也氣血並逆而使人迫厥也陽氣者柔主養筋血脈者所以濡筋骨利關節者也陽氣傷而血逆於上則有傷於筋矣筋傷而弛縱則四體有若不容我所用也前節論外因而傷其陽氣此因勞傷大怒而亦傷其陽氣焉汗出偏沮使人偏枯汗出見濕乃生痤疿高粱之變足生大丁受如持虛勞汗當風寒薄為皶郁乃痤沮音疽痤才何切坐平聲疿音費皶織加切音柞丁即疔沮濕也痤小癤也疿如疹之類皶面鼻赤瘰也此言陽氣者外衛於皮膚充塞於四體若天氣之運用於六合九州之外而為陰之固也如汗出而止半身沮濕者是陽氣虛而不能充身遍澤必有偏枯之患矣如汗出見濕濕熱鬱於皮膚之間則生痤疿矣高粱厚味也味厚傷形氣傷於味形氣傷則肌腠虛矣高粱所變之熱毒逆於肉理而多生大疔蓋膚腠虛而熱毒乘之有如持虛之器而受之也勞汗當風寒濕薄於皮膚之間則為皶為痤矣夫皶與痤疿乃血滯於膚表之輕證蓋言陽氣外衛於皮膚之間為邪所薄則淡滲於皮毛之血而為病矣故曰汗出偏沮使人偏枯者言陽氣之若天與日宜普遍於九州也乃生痤疿寒薄為皶者言陽氣之外衛而在於皮毛之間也高粱之變足生大疔者言陽氣之通會於腠理也朱濟公曰經云微者沖氣疏疏則其膚空又曰腠理者三焦通會元真之處夫形食味形氣虛則高粱之味毒乘之故曰受如持虛陽氣者精則養神柔則養筋承上文而言陽氣者內養五臟之神出而榮養筋骨非只通會於肌腠外衛於皮毛蓋有開有闔有出有入者也本經曰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生陽氣者水穀之精也故先養於五臟之神柔者少陽初生之氣也初出之微陽而榮養於筋是以少陽之生筋也莫子晉問曰首論神氣本於天真奚又屬五味之所生養曰精氣神皆有先天有後天先天之神氣又藉後天水穀之所資生而資養故曰兩精相搏謂之神兩精者天乙之精水穀之精也開闔不得寒氣從之乃生大僂陷脈為瘻留連肉腠俞氣化薄傳為善畏及為驚駭榮氣不從逆於肉理乃生癰腫開者一日而主外闔者暮而收引也如失其開闔之機則寒氣從而內薄矣背為陽陽虛則寒邪痹閉於背而形體為之俯僂金匱所謂痹俠背行是也如陽虛不能為榮血之衛邪陷於脈中而為瘻留連於肉腠之間金匱所謂馬刀俠癭是也如經俞之氣化虛薄則傳入於內而干及藏神矣心主脈神傷則恐懼自失肝主血故其病發驚駭也金匱要略云經絡受邪入臟腑為內所因邪入於經俞故內干臟氣也如邪逆於肉理氣分而陰陽不和則生癰腫經曰陽氣有餘榮氣不行乃發為癰陰陽不通兩熱相搏乃化為膿此言陽氣不固致邪薄於所養之筋而為僂內及於所養之神而為驚為畏重陽氣之外衛也濟公曰外衛者首重皮毛皮毛不固則入於肉理脈絡矣莫子晉曰高粱之變逆於肉理乃生大疔外淫之邪逆於肉理乃生癰腫皮毛肉理皆陽氣之所主故曰清淨則肉腠閉拒邪弗能害如肌腠固密即邪傷皮毛止不過痤疿之輕疾耳魄汗未盡形弱而氣爍穴俞以閉發為風瘧上二俞字並音輸此言表氣與邪氣並陷於肌腠之間而為瘧也肺主皮毛魄汗未盡表邪未去也形弱肌腠虛也腠理空疏則表陽邪氣同陷於其間寒邪在表則隨陽而化熱故氣爍也邪雖陷於肌腠而表氣不入於經是以穴俞以閉風瘧但熱不寒之瘧也表陽之邪與衛氣相遇則發熱也夫表氣者太陽之氣也肌腠之氣者五臟元真之氣也金匱要略曰腠者三焦通會元真之處又曰五臟元真通暢人即安和靈樞經曰三焦膀胱者腠理毫毛其應蓋三焦之氣通腠理太陽之氣主皮毛是以表氣邪氣陷入於肌腠則傷元真之氣而太陽之氣仍在外也如肌腠之邪留而不去則轉入於經俞蓋五臟經氣之相合也此節論表氣實而肌氣虛是以表氣同邪並陷於肌腠之間太陽之氣與五臟之經不相合故穴俞以閉也此注當與傷寒論註疏合看故風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也此重調養元真之氣而肌腠之宜閉密也夫寒暑始傷於皮毛風邪直透於肌腠風者善行而數變入於肌腠則及經脈或為熱中或為寒中或為偏枯或成積聚或入腑而生或干臟而死邪氣淫佚不可勝論故曰風者百病之始也人能順蒼天清淨之氣而調攝其元神則肉腠固密雖有大風苛毒勿之能害此因四時之序而能順養者也夫肌腠之氣乃五臟之元真故宜順四時五行之氣而調養要略云若使五臟元真通暢人即安和不使形體有衰病即無由入其腠理前節論寒暑濕邪傷其表陽故毋煩勞而傷其陽此論風邪直傷於肌腠又當固密其元真也故病久則傳化上下不並良醫勿為故陽蓄積病死而陽氣當隔隔者當瀉不亟正治粗乃敗之病久者邪留而不去也傳者始傷皮毛留而不去則入於肌腠留而不去則入於經脈衝俞留而不去則入於募原臟腑化者或化而為寒或化而為熱或化而為燥結或化而為濕瀉蓋天有六淫之邪而吾身有六氣之化也久而傳化則上下陰陽不相交併雖有良工勿能為已故病在陽分而蓄積至死者以其病久而傳化也故病在陽分而良工當亟助陽氣以隔拒其邪勿使其傳化隔者當瀉卻其邪更勿使其留而不去也若不急用此正治之法皆粗工之敗乃事也故陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄總結上文而言陽氣之有開有闔然又重其衛外而為固也靈樞經云春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生故旦慧日中人氣長長則勝邪夕則人氣始衰夜半人氣入臟是故暮而收斂其氣隔拒其邪無擾筋骨無煩勞也無見霧露宜清淨也若反此而欲如三時之動作則形體乃為邪所困薄矣氣門玄府也三時平旦日中日西也岐伯曰陰者藏精而起亟也陽者衛外而為固也生之本本於陰陽陽生於陰也故帝先論陽而伯復論其陰焉亟數也陰者主藏精而陰中之氣亟起以外應陽者主衛外而為陰之固也數音朔陰不勝其陽則脈流薄疾並乃狂氣為陽血脈為陰陽盛而陰不能勝之則脈行急迫也陽盛則狂陽甚而自亦為病故曰並乃狂陽不勝其陰則五臟氣爭九竅不通五臟為陰九竅為水注之氣乃精氣所注之門戶如陰甚而陽不能勝之則五臟之氣交爭於內而九竅為之不通蓋五臟之氣出而為陽在內為陰也夫臟為陰精血為陰氣為陽九竅為陽內為陰外為陽五臟主藏精者也膀胱者州都之官精液藏焉表陽之氣生於膀胱之精水肌腠之氣乃五臟之元真是陽氣生於陰精也故曰生之本本於陰陽陰者藏精而起亟也下經云陽予之正陰為之主蓋陽氣出而衛外內則歸陰一晝一夜有開有闔如四時寒暑之往來是為陰陽之和平也是以聖人陳陰陽筋脈和同骨髓堅固氣血皆從如是則內外調和邪不能害耳目聰明氣立如故陳敷布也陽氣者養筋陰氣者注脈少陽主骨少陰主髓氣為陽血為陰聖人能敷陳其陰陽和平而筋脈骨髓氣血皆和順堅固矣內為陰外為陽如是則外內之陰陽調和而邪勿能害精氣注於耳血氣注於目邪不外淫則陰氣內固是能耳目聰明氣立如故也本經曰根於中者命曰神機根於外者命曰氣立又曰出入廢則神機化滅升降息則氣立孤危惟聖人敷陳其陰陽使升降出入外內調和是以氣立如故也風客淫氣精乃亡邪傷肝也此復申明陽者衛外而為陰之固也風為陽邪客於膚表則淫傷於氣矣陽氣傷則陰寒精自出矣風木之邪內通肝氣肝主藏血肝氣受邪則傷其血矣此言陽為陰藏精血之固因而飽食筋脈橫解腸澼為痔因而大飲則氣逆因而強力腎氣乃傷高骨乃壞承上文而言陽氣傷而不能為陰之固致精血有傷而復飽食強力故見證之如此也夫肝主血而主筋食氣入胃散精於肝淫氣於筋邪傷肝而復飽食不能淫散其食氣而筋脈橫解於下矣食氣留滯則濕熱之氣澼積於陽明大腸而為痔蓋腸胃相通入胃之食不能上淫則反下泆矣夫飲入於胃脾為輸轉肺氣通調肺主周身之氣氣為邪傷而復大飲則水津不能四布而氣反逆矣夫精已亡而復強用其力是更傷其腎氣矣高骨腰高之骨腰者腎之府高骨壞而不能動搖腎將憊矣此言外淫之邪傷人陽氣復因飲食勞傷而更傷其陰也凡陰陽之要陽密乃固此總結上文之義而歸重於陽焉蓋陽密則邪不外淫而精不內亡矣無煩勞則陽不外張而精不內絕矣兩者不和若春無秋若冬無夏因而和之是為聖度此復言陰陽和平而後能升降出入如兩者不和有若乎惟生升而無收降惟閉藏而無浮長矣故必因而和之是謂聖人調養之法度此復結陽氣之有開有闔惟聖人能陳陰陽而內外調和也張二中曰丹書云一陰一陽謂之道偏陰偏陽謂之疾故聖人和合陰陽之道以平四時之氣者也故陽強不能密陰氣乃絕陽強邪客於陽而陽氣盛也陽病而不能為陰之固密則陰氣乃絕於內矣此復結風客淫氣精乃亡也陰平陽秘精神乃治陰陽離決精氣乃絕調養精氣神者當先平秘其陰陽惟聖人能敷陳其陰陽之和平也因於露風乃生寒熱是以春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必病溫露陰邪也風陽邪也寒陰病也熱陽病也言陰陽不能固密則在天陰陽之邪傷吾身之陰陽而為寒熱病矣是以有傷四時之陽邪而為陰病者傷四時之陰邪而為陽病者皆吾身中之陰陽上下出入而變化者也夫喉主天氣咽主地氣陽受風氣陰受濕氣傷於風者上先受之傷於濕者下先受之陽病者上行極而下是以春傷於風乃為洞泄陰病者下行極而上是以秋傷於濕上逆而咳此陰陽上下之相乘也夏傷於暑暑汗不泄炎氣伏藏秋時陰氣外出與熱相遇發為痎瘧冬傷於寒邪不即發寒氣伏藏春時陽氣外出邪隨氣而化熱發為溫病此陰陽出入之氣化也夫風為陽邪洞泄陰病也濕為陰邪喉咳陽病也暑為陽邪痎瘧陰瘧也寒為陰邪溫病熱病也此皆人身中之陰陽氣化也天有陰陽之邪人有陰陽之氣有病天之陰陽而為寒熱者有感人之氣化而為陰病陽病者邪正陰陽變化不測陰陽二氣可不和平而秘密與經曰地之濕氣感則害人皮肉筋骨上逆而咳論陰陽之氣也發為痿厥病有形之筋骨也楊君舉問曰秋主燥氣而曰秋傷於濕者何也曰長夏濕土主氣是以四之氣大暑立秋處暑白露乃太陰所主然六淫之邪止風寒暑濕傷人陽氣也四時之氣更傷五臟四時之氣風寒暑濕也言四時之邪非只病陰陽之氣化而更傷五臟之有形蓋病久則傳化也陰之所生本在五味陰之五宮傷在五味神氣生於陰精五臟之精生於五味是以首論氣而末論味焉臟象論曰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生本神篇曰五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣是以謹和五味長有天命蓋精神氣血皆由五味之所資生而資養者也五宮五臟神之所舍也傷在五味者味有所偏勝也莫仲超曰酸生肝苦生心甘生脾辛生肺咸生腎是陰之所生本在五味也是故味過於酸肝氣以津脾氣乃絕酸味入肝若過於酸則肝多津液津溢於肝則脾氣乃絕其轉輸矣味過於咸大骨氣勞短肌心氣抑大骨腰高之骨腎之府也過食鹹則傷腎故骨氣勞傷水邪盛則侮土故肌肉短縮水上凌心故心氣抑鬱也味過於甘心氣喘滿色黑腎氣不衡味過於甘則土氣實矣土實則心氣不能傳之於子故喘滿也腎主水其色黑土亢則傷腎故色黑而腎氣不平味過於苦脾氣不濡胃氣乃厚陽明絡屬心子母之氣相通也五味入胃苦先入心味過於苦則母氣盛而胃氣強胃強則與脾陰相絕矣脾不為胃轉輸其津液而脾氣不濡矣脾不轉輸故胃氣乃厚味過於辛筋脈沮弛精神乃央沮音咀沮遏抑也弛懈弛也金氣偏盛則肝氣受傷故筋脈弛懈也央殃同辛甚則燥津液不能相成而精神乃受其殃也是故謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命腎主藏精而主骨肝主藏血而主筋夫風客淫氣則邪傷肝而精乃亡謹和五味則骨正筋柔而腠理以密是陽氣生於陰精而為陰之外衛故曰陰者藏精而起亟也陽者衛外而為固也知陰陽外內之道無煩勞以傷其陽節五味以養其陰謹能調養如法則陰陽和平而長有天命矣金匱真言論篇第四金匱古帝王藏書之器此篇論經脈之道乃上帝之所貴藏之心意非其人弗教非其真弗授乃金匱中之真言不知道者不易得也黃帝問曰天有八風經有五風何謂八風八方之風經謂五臟之經俞五風五經之風也上章論陽氣此章論經脈故首提曰經有五風末結曰善為脈者岐伯對曰八風發邪以為經風觸五臟邪氣發病八風發邪謂八方不正之邪風發而為五經之風觸人五臟則邪氣在內而發病也蓋言在天則為八方之風在人則為五經五臟之風矣所謂得四時之勝者春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂四時之勝也所謂得四時之勝者如春時之西南風長夏之北風冬之南風夏之西風秋之東風此得四時所勝之氣而不為風所觸蓋五臟因時而旺能勝其所不勝也上節言八風發邪者發所勝之風而克賊所不勝之時也此言得四時之勝者得四時所勝之氣而能勝所不勝之邪風也以上皆論四時不正之風氣東風生於春病在肝俞在頸項南風生於夏病在心俞在胸脅西風生於秋病在肺俞在肩背北風生於冬病在腎俞在腰股中央為土病在脾俞在脊此言四時之正氣而亦能為五臟經俞作病也五運行大論曰東方生風風生木木生酸酸生肝蓋人稟五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟是以先言風氣之傷五臟而後言五臟之氣稟於五方五氣而生也俞者經氣之所注也首言八風發邪以為經風觸五臟發病者言天之陽邪始傷陽氣由氣而經由經而臟也此言東風生於春病在肝俞在頸項者言臟氣實則病氣臟氣虛則病臟是以下文反覆以申明之故春氣者病在頭所謂氣者言四時五臟之氣相為病也肝俞在頸項而春病在頭者春氣生升陽氣在上也故病在氣者病在頭病在經者別下項也是以下文之有病在氣者有病在經者有病在臟者有病鼽衄之在上者有病洞泄之在內者有病風瘧之在外內出入者分別臟氣經俞之有虛實也夏氣者病在臟夏時陽氣發越在外臟氣內虛故風氣乘虛而內薄秋氣者病在肩背秋氣降收不能主持於皮膚肌腠之間故風氣入於俞也冬氣者病在四肢四肢為諸陽之本冬氣內藏陽虛於外故病在四肢也以上論四時五臟之氣以下三故字皆頂上文東風生於春節而言故春善病鼽衄所謂善病者言五臟之經俞在外風傷肌腠則易入於經也鼽衄頭面之經證也者氣在頭故善病鼻衄仲夏善病胸脅心之經俞在胸脅也朱濟公問曰此言胸脅而無所見之證者何也曰上下三節反覆辨論臟氣經俞之有外內出入故曰有病在頭者有病在臟者有病在肩背胸脅者而皆不言病也至於鼽衄洞泄諸證言病在經而在頭者則有鼽衄之證在經而在腹者則為洞泄寒中然總不重在論病也長夏善病洞泄寒中夏時陽氣在外裡氣虛寒長者濕土主氣風入於經俞即內薄而為洞泄風木乘虛而勝土也脾為陰中之至陰不能化熱而為寒中也秋善病風瘧秋時陽氣內收陰氣外出瘧論云風氣留其處瘧氣隨經絡風入於經即欲內薄經脈之陰氣外出邪正相持故成風瘧也此言經絡受邪在外則為鼽衄痹厥在內則為洞泄寒中在外內之間邪正相搏則為風瘧也冬善病痹厥四肢為諸陽之本冬時陽氣下藏經氣外虛風入於經故手足痹厥也金匱要略曰但臂不遂者名曰痹厥者手足逆冷也以上論經絡為病故冬不按蹺春不鼽衄春不病頸項仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥飧泄而汗出也飧音孫此覆申明陽氣者衛外而為經俞之固也按蹺者按摩導引引陽氣之通暢於四肢也冬時陽氣伏藏若導引其四出則無以奉春生夏長之氣是以有鼽衄頭頸之經病矣春病在頭邪熱而迫於經者鼽衄別出下項則為頸項之病矣靈樞經曰是主心所生病者胸脅痛是主脾所生病者溏泄是主肺所生病者肩背痛所生者經脈為病也又曰病在陽者名曰風病在陰者名曰痹痹者風入於經俞也此復言陽氣固密者四時無經俞之病也復曰飧泄而汗出者言人能藏養元真之氣必不使邪傷經脈病在內而為飧泄也亦不使邪傷陽氣病在外而汗出也此復甚言其陽氣之不可傷也夫精者身之本也故藏於精者春不病溫夏暑汗不出者秋成風瘧此平人脈法也神氣血脈皆生於精故精乃生身之本能藏其精則血氣內固邪不外侵故春不溫病夏不浮長則暑氣伏藏至秋成風瘧陰陽開闔生長收藏此乃平人之脈法也夫血脈生於陰精此篇論經脈之道故曰精者身之本曰此平人之脈法故曰陰中有陰陽中有陽陰中有陰者陰氣在內也陽中有陽者陽氣在外也此陰陽開闔外內之道也平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之雞鳴至平旦陽氣始生應春升之氣故為陰中之陽平旦至日中陽氣正隆應夏長之氣故為陽中之陽日中至黃昏陽氣始衰應秋收之氣故為陽中之陰合夜至雞鳴陽氣在內應冬藏之氣故為陰中之陰故曰一日之中亦有四時人之陰陽出入一日之中而亦有四時也故平人之脈法亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟腑中陰陽則臟者為陰腑者為陽此篇始論經脈之道經脈內連臟腑外絡形身陰陽出入外內循環是以四時之生長收藏以應平人脈法人之形身臟腑以應天之陰陽夫人之始生也負陽而抱陰是以背為陽腹為陰督脈循於背總督一身之陽任脈循於腹統任一身之陰也夫外為陽而有腹背之陰陽者陽中有陰陽也內為陰而有臟腑之陰陽者陰中有陰陽也肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽經脈生於地之五行而上應天之六氣故凡論經脈先配合五臟五行而後論及於六腑所以欲知陰中之陰陽中之陽者何也為冬病在陰夏病在陽春病在陰秋病在陽皆視其所在為施針石也冬病在腎腎為陰中之陰故冬病在陰夏病在心心為陽中之陽故夏病在陽春病在肝肝為陰中之陽故春病在陰秋病在肺肺為陽中之陰故秋病在陽針石所以治經脈者也故當知陰中之陰陽中之陽皆視其五臟之經俞所在而施治之故背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也王氏曰心為陽臟位處上焦以陽居陽故謂陽中之陽肺為陰臟位處上焦以陰居陽故謂陽中之陰腎為陰臟位處下焦以陰居陰故謂陰中之陰肝為陽臟位處下焦以陽居陰故謂陰中之陽脾為陰臟位處中焦以太陰居陰故謂陰中之至陰靈樞經曰心為牡臟肺為牝臟腎為牝臟肝為牡臟脾為牝臟此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也雌雄臟腑也輸應交相授受也蓋臟腑之經脈互相連絡表裡外內循環無端與天之晝夜四時出入相應故以應天之陰陽也帝曰五臟應四時各有收受乎帝言人之五臟應天之陰陽四時而五臟亦能收五方之氣色受四時之陰陽乎岐伯曰有東方青色入通於肝開竅於目藏精於肝天之五方氣色入通於臟以養五臟之精肝之精氣開竅於目而復通乎天氣是天氣通乎人而人氣通乎天也其陰精藏於本臟本神篇曰五臟主藏精者也其病發驚駭春時陽氣上升故其病亦如氣之震發而為驚駭也其味酸其類草木木曰曲直曲直作酸肝屬木與地之草木同類其畜雞易曰巽為雞東方木畜也其穀麥麥為五穀之長故東方應之其應四時上為歲星木之精氣上為歲星十二年一周天以地之草木谷畜應天之四時上而為歲星也是以春氣在頭也春氣上升春風在上春病在頭者同氣相感也與別臟之因氣虛而病者不同故曰春氣在頭而不言病其音角木音也其應在春其數八木之成數也是以知病之在筋也肝主筋故病在筋夫五音五數應天之氣也皮肉筋骨應地之有形也以天之應而病有形之筋骨者天之陽氣通乎五臟之陰也是以東方文義與下文少有差別者言天地陰陽之氣互相交感也其下四方言天之氣色通乎臟而病五臟之氣地之五味五行五穀五畜以應皮肉脈骨之有形此皆陰陽變換之道其臭臊臊音騷臭氣也氣因木變則為臊月令作羶羶與臊同南方赤色入通於心開竅於耳藏精於心心屬火受南方之赤色入通於心而養精於內也邪氣臟腑篇曰十二經脈三百六十五絡其氣血皆上於面而走空竅其彆氣走於耳而為聽彆氣者心主之氣也此篇以心氣開竅於耳腎氣開竅於二陰者謂五臟之氣通於九竅九竅五臟皆通乎天氣也故病在五臟五臟者病五臟之氣也上文曰夏氣者病在臟五臟六腑心為之主故心氣病而及於五臟之氣也曰故者言天之氣色通於臟而為病亦在氣也其味苦其類火炎上作苦火之味也心氣通於南方故與五行之火同類其畜羊五常政大論曰其畜馬蓋以午未皆屬火也其谷黍黍糯小米也性溫而赤色故為心之谷其應四時上為熒惑星其應天之四時而上為熒惑熒惑火之精也七百四十日一周天是以知病之在脈也心主脈故病在脈脈以應地曰是以者以地之五味五行羊畜黍谷以應病之在脈也其音徵火音也其應在憂其數七火之成數也其臭焦氣因火變則為焦中央黃色入通於脾開竅於口藏精於脾土旺四季位居中央脾為土臟其氣相通黃者土之色口者脾之竅故病在舌本靈樞經曰脾者主為衛使之迎糧視唇舌好惡以知吉凶是脾氣之通於舌也其味甘其類土土受稼穡稼穡作甘脾屬土故與五行之土同類其畜牛牛色黃而屬土故為脾畜其谷稷色黃而味甘其應四時上為鎮星土之精氣上為鎮星二十八年一周天是以知病之在肉也脾主肌肉故知病在肉其音宮土音也五音以宮為主其數五五土之生數也土居五位之中故獨主於生數六元正紀大論曰土常以生也蓋土主化生萬物其臭香氣因土變則為香西方白色入通於肺開竅於鼻藏精於肺肺屬金故受西方之白色入通於肺鼻者肺之竅故病在肩秋氣者病在肩背其味辛其類金金曰從革從革作辛其畜馬乾為馬肺屬乾金而主天其谷稻稻色白而秋成故為肺之谷其應四時上為太白星金之精氣上為太白三百六十五日一周天是以知病之在皮毛也肺主皮毛故知病在皮毛其音商商主西方之音其數九金之成數也其臭腥氣因金變則為腥北方黑色入通於腎開竅於二陰藏精於腎腎屬水故受北方之黑色腎在下故開竅於二陰夫臟真藏於內而五臟之氣發於外見於色是以五方之色入通於臟以養五臟之精而臟氣復外通於九竅其真精藏於內也故病在溪肉之大會曰谷肉之小會曰溪下經云溪谷屬骨皆有所起溪乃小分之肉連於筋骨之間是腎主骨而溪乃骨氣所生之分肉也張兆璜曰溪者四肢之八溪也冬氣伏藏故溪為之病其味鹹其類水水曰潤下潤下作咸其畜彘彘豕也色黑而屬亥其谷豆豆色黑而性沉故為水之谷其應四時上為辰星水之精氣上為辰星百六十五日一周天是以知病之在骨也腎主骨故知病在骨下經云肝生筋心生血脾生肉肺生皮毛腎生骨是筋骨皮肉五臟之所生而為病也上經云春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢是頭臟肩背溪骨乃臟氣之為病也其音羽水之音也其數六水之成數也其臭腐氣因水變則為腐故善為脈者謹察五臟六腑一逆一從陰陽表裡雌雄之紀藏之心意合心於精此總結經脈之道生於五臟連於六腑外合於五方五行陰陽六氣表裡循環有順有逆善為脈者藏之心意合於精神得之於心應之於手不可以言語相傳故曰非其真勿授是謂得脈之道者也非其人勿教非其真勿授是謂得道色脈者上帝之所貴也故非學道之人勿教非真誠之人勿傳至真之言猶藏之金匱而庸人不易得也以上四篇論精神氣血然神氣血脈皆本於天乙之真精故論神則曰逆其根則伐其本壞其真論氣則曰自古通天者生之本論血脈則曰精者身之本此平人之脈法也
