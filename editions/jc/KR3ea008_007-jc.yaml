零一分也蓋以量盡處取穴而上下穴間有一分之餘也此分度腹穴之法也鳩尾在蔽骨下五分巨闕在鳩尾下一寸上脘在巨闕下一寸五分中脘在上脘下一寸建里在中脘下一寸下脘在建里下一寸上臍上二寸水分在下脘下一寸神闕在水分下一寸當臍之中央陰交在臍下一寸氣海在臍下一寸五分石門一名丹田在臍下二寸關元在臍下三寸中極在臍下四寸曲骨中極下一寸入橫骨毛際中五分故自胃之下脘至橫骨間止六寸半也此取腹穴之法上以蔽骨下以橫骨中以臍之中央為準各分而度之也下陰別一謂下兩陰之間別有一穴名曰會陰目下各一謂承泣二穴在目下七分乃任脈陽蹺胃經脈氣之會下唇一謂承漿穴在唇下陷中齗交一齗交穴一在唇內齒下齗縫中蓋上古以齗交有二督脈之齗交入上齒任脈之齗交入下齒也以上下之齗齒相交故名齗交以上共二十七穴尚少一穴愚謂脖胦乃臍下另有一穴非氣海也衝脈氣所發者二十二穴俠鳩尾外各半寸至齊寸一此言衝脈之穴俠鳩尾各開半寸下至臍間相去一寸而一穴也幽門二穴在巨厥旁各開五分通谷在幽門下一寸陰都在通谷下一寸石關在陰都下一寸商曲在石關下一寸肓俞在商曲下一寸俠齊下旁各五分至橫骨寸一腹脈法也此衝脈之俠臍下兩旁各開五分每穴相去一寸此取腹脈之法蓋腹穴無陷中可取正可以分寸度量上以蔽骨鳩尾中以臍中下以橫骨為準繩也中注在肓俞下一寸四滿下中注一寸氣穴一名胞門又名子戶下四滿一寸大赫一名陰關又名陰維在氣穴下一寸橫骨下大赫一寸在陰上橫骨中宛如偃月去腹中行一寸五分又按圖經內橫骨大赫氣穴皆相去中行寸半足少陰舌下厥陰毛中急脈各一足少陰舌下者謂腎脈之上通於心循喉嚨俠舌本而舌下有腎經之穴竅也足厥陰毛中急脈者謂肝經之脈起於大指叢毛之際而肝氣之弦急也本篇論手足三陽之脈氣所發者三百六十五穴以應周天之數而末言足少陰舌下厥陰毛中手足魚際謂內有五臟之脈五而陽中之有陰也然脈氣又皆本於五臟五行之所生而三陽之氣亦由於陰中之所出也張兆璜曰毛中言肝脈之始舌下言腎脈之終意言陽氣生於陰氣之始陽脈交於陰脈之終手少陰各一言三百六十五穴之中有心脈之穴二也陰陽蹺各一陰蹺謂交信二穴陽蹺謂跗陽二穴本篇雖論手足三陽之脈氣所發而內有衝任陰蹺五臟之陰脈焉手足諸魚際脈氣所發者魚際者謂手足之白肉隆起處有如魚腹而穴在其際也手之魚際肺之脈氣所發足之魚際脾之脈氣所發也凡三百六十五穴也手足三陽經脈氣所發者二百九十八穴督任衝脈所發者七十八穴五臟脈氣所發者十穴陰陽蹺四穴通共三百九十穴內太陽經內重督脈五穴重足少陽十穴手陽明內重大迎二穴手少陽內重懸釐二穴風池二穴天窗二穴顴髎二穴共重二十五穴除去所重實三百六十五穴也骨空論篇第六十黃帝問曰余聞風者百病之始也以針治之奈何按此篇論骨空而帝所問在風者謂治大風寒熱諸證皆取刺於骨空也夫人有三百六十五節節之交神氣之所遊行出入骨空者節之交會處也靈樞骨度篇曰先度其骨節之大小廣狹而脈度定矣是經脈之度數隨骨之長短骨節之空處即脈之穴會故曰所言節者神氣之所遊行出入非皮肉筋骨也岐伯對曰風從外入令人振寒汗出頭痛身重惡寒治在風府調其陰陽不足則補有餘則瀉風從外入者同氣客於皮膚之間也風為陽邪傷人陽氣故令人振寒汗出頭痛身重惡寒也調其陰陽和其血氣也正氣不足則補之邪氣有餘則瀉之此言風在皮膚之氣分而治在風府者風府乃督脈陽維之會也大風頸項痛刺風府風府在上椎此言風邪入於經者亦當治其風府也夫風傷衛衛氣一日一夜大會於風府是以大風之邪隨衛氣而直入於風府者致使其頭項痛也風府督脈之穴名上椎大椎也曰風府在上椎者謂經脈之穴在於骨空之間也大風汗出灸譩譆譩譆在背下俠脊旁三寸所厭之令病者呼譩譆譩譆應手汗為陰液大風汗出者陽氣傷而邪陷於經脈之下故當灸之譩譆足太陽經脈之穴在背骨六椎間旁開三寸所以手厭之令病者呼譩譆其脈應手蓋意為脾志喜為心志心有所憶謂之意意之所在神亦隨之夫血氣者神氣也節之交神氣之所遊行出入言脈氣之出於骨空者神氣之所注也從風憎風刺眉頭從風迎風也迎風憎風是邪在頭額間故當取眉間之骨穴失枕在肩上橫骨間失枕則為頸項強痛之患故當刺肩上橫骨間之穴夫髓乃骨之精腦為髓之海髓之上會於腦者由枕骨間之腦空而入故此節論失枕下節曰頭橫骨曰枕折使榆臂齊肘正灸脊中折者謂脊背磬折而不能伸舒也榆讀作搖謂搖其手臂下垂齊肘尖而正對於脊中以灸脊中之節穴䏚絡季脅引少腹而痛脹刺譩譆䏚絡季脅肋骨之盡處少陽厥陰之部署也痛引少腹者連及於膀胱也夫太陽為諸陽主氣故陽氣陷下者灸太陽之譩譆脅腹引痛者亦刺譩譆以疏泄蓋志意和則筋骨強健而邪病自解矣張兆璜曰心有所憶謂之意意之所在謂之志少陽主骨厥陰太陽主筋少厥屬木木生於水故痛引少腹腰痛不可以轉搖急引陰卵刺八髎與痛上八髎在腰尻分間腰痛不可以轉搖者腎將憊也急引陰卵連及於厥陰也亦當取足太陽之上髎次髎中髎下髎之八穴及與少陰厥陰本部之痛處蓋八髎在腰尻之骨間筋骨為病當從骨空之穴以刺之鼠瘻寒熱還刺寒府寒府在附膝外解榮取膝上外者使之拜取足心者使之跪鼠瘻寒熱病也其本在臟其末上出於頸腋之間夫天開於子足少陰者天乙所生之水臟也其本在臟者在少陰之腎臟也寒府者膀胱為腎臟寒水之府也病在臟而還取之府者謂陰藏之邪當從陽氣以疏泄也營營穴也謂所取寒府之穴在附於膝之外筋營間之委中穴也拜揖也取膝上外解之委中者使之拜則膝挺而後直其穴易取也如當再取腎臟之本經者使之跪跪則足折而湧泉之穴宛在於足心之橫紋間矣以上論大風寒熱諸證當取頭項脊背足膝之骨空者皆太陽之穴也任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目此言任脈之有骨空也任脈乃循於腹之肉穴然起於中極之下上毛際而交於橫骨循膺胸之鳩尾膻中天突而至於咽喉上頤循承漿而入絡於齒齦復循面入目下而絡於承泣是始終之有骨穴也衝脈者起於氣街並少陰之經俠齊上行至胸中而散氣街即氣衝系足陽明經穴在少腹毛中兩旁各二寸橫骨之兩端衝脈並足陽明少陰二經之間循腹上行俠臍左右各五分上至胸中而散再按衝任二脈皆起於胞中上循背裡為經絡之海其浮而外者起於竅沖循腹右上行至胸中而散淡滲於肌腠充膚熱肉生毫毛此衝脈之血氣行於脈外也今只言腹而不言背者謂衝脈之血氣散於脈外而充於骨空也故所謂骨空者謂經脈之氣注於節之交而為穴也至於骨空之血氣乃脈外之血氣也任脈為病男子內結七疝女子帶下瘕聚衝脈為病逆氣裡急督脈為病脊強反折此言衝任之脈循於腹故其病在腹督脈循於背故為病在背也七疝者其病各異其名不同瘕者假血液而時下汁沫聚者氣逆滯而為聚積也衝脈之血氣散於脈外之氣分故病則逆氣裡急督脈之脈循於背故病則脊強反折也蓋背為陽督脈循於背而總督一身之陽經云陽病者不能俯陰病者不能仰督脈者起於少腹以下骨中央女子入系廷孔其孔溺孔之端也此論督脈之循於骨空也下骨中央毛際下橫骨內之中央也廷孔陰戶也溺孔之端陰內之產門也此言督脈起於少腹之內故舉女子之產戶以明之當知男子之督脈亦起於少腹內宗筋之本處也故下文曰其男子循莖下至篡與女子等蓋此節舉女子則男子可知下節論男子則與女子等也其絡循陰器合篡間繞篡後別繞腎至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎篡初患切臀音屯篡間前後陰相交之處臀尻也言督脈之別絡前循陰器合篡間繞前後二陰之後又別絡者分而行之繞臀與足太陽之中絡者合少陰上股內後廉貫脊屬腎按足太陽之中絡者循髀樞絡股陽而下貫臀合足少陰自股內後廉貫脊屬腎而督脈之別繞臀者至少陰與太陽中絡所合之處相合而同上股貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾脊抵腰中下循膂絡腎此言督脈之循於背者乃從上而下也夫背為陽腹為陰督脈總督一身之陽故其脈之循於背者復從上而下若天氣之下降也蓋陽生於陰故其原出於前陰循腹而上至於目太陽主諸陽之氣其脈起於兩目之睛明穴而督脈亦與太陽之脈同上額交巔絡腦出項循脊而下此陽氣之環轉於上下前後猶天道之繞地而一周也其男子循莖下至篡與女子等其少腹直上者貫齊中央上貫心入喉上頤環唇上系兩目之下中央此言督脈之原起於少腹內分而兩歧一循陰莖下至篡而與女子等一從少腹直上貫臍入喉上頤環唇入齗交上齒縫中上繫於兩目之下中央會太陽於睛明穴此生病從少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾督脈生病治督脈治在骨上甚者在齊下營此言循於腹之督脈為病而取刺當在骨間蓋病雖在腹之陰而所治當從陽也其脈從少腹直上貫心故此生病從少腹上衝心而痛繞於前後二陰之篡間故病則不得前後而或為沖痛之疝督脈同衝任並起於胞間故在女子則為不孕如病在前後兩陰之間而男女皆為癃痔如在於廷孔陰莖之內則皆為遺溺如上入於喉則為咸嗌乾此在腹之督脈生病而所治當在骨上若病甚而不已者兼取於臍下之營營謂腹間之肉穴骨謂脊背之骨穴也其上氣有音者治其喉中央在缺盆中者其病上衝喉者治其漸漸者上俠頤也此言胸喉間之督脈為病者當取膺頤間之骨穴也其氣上逆而呼吸有音者治其喉中央在兩缺盆中者之天突穴也如病上衝喉者治其漸漸者謂督脈之入喉者上唇齒而漸分兩歧俠頤入目當於漸上俠頤之處而刺之蹇膝伸不屈治其楗此節論膝之為病而當治其機楗骸關之骨空也蹇膝者謂淹蹇而難於屈伸也下文曰輔骨上橫骨下為楗坐而膝痛治其機坐而膝痛者屈而不伸也故當治其機機關利則屈伸皆利矣夫屈而不伸者其病在筋伸而不屈者其病在骨膝者筋之會而諸筋皆屬於筋故特論其膝焉立而暑解治其骸關暑熱也膝解為骸關立而骨解中熱者取骸關以治之即膝解處也膝痛痛及拇指治其膕足之拇指厥陰肝經之井滎骸下為輔骨輔骨之上為膕中厥陰之脈上膕內廉故當治其膕坐而膝痛如物隱者治其關如物隱者邪留於骨節間也故當治其關關開則邪出矣膝痛不可屈伸治其背內膝痛不可屈伸筋骨皆病也當取背內太陽之經以治之太陽寒水主骨而陽氣養筋連䯒若折治陽明中俞髎膝痛而連䯒骨若折者治陽明之中俞髎謂三里穴也若別治巨陽少陰滎謂連䯒若折而有別治之法可取太陽少陰之滎穴蓋骨乃太陽少陰之所主也淫濼脛痠不能久立治少陽之維在外上五寸此又言少陽之主骨也少陽為樞樞折則骨繇而不安於地骨繇者節緩而不收故淫濼脛酸不能久立當治少陽之維在外踝上五寸之光明穴輔骨上橫骨下為楗俠髖為機膝解為骸關俠膝之骨為連骸骸下為輔輔上為膕膕上為關頭橫骨為枕楗與鍵同髖音寬骸音諧膕音國此承上文而言腰膝䯒骨之釋名也輔骨上為腰髖骨下為楗膝上為機膝蓋骨為解膝外為骸關關下為膕膕下為輔骨輔骨上為連骸連骸者是骸骨相連接處也夫腰脊者身之大關節也膝脛者人之管以趨翔也故獨舉腰膝而曰關曰楗曰機曰骸命名之義良有以也夫少陽少陰主骨而陰陽之氣皆從下而生則骨氣亦從下而上矣骨之精髓從枕骨之髓空而會於腦故論膝䯒之骨而曰頭橫骨為枕言骨氣之上下相通也水俞五十七穴者尻上五行行五伏兔上兩行行五左右各一行行五踝上各一行行六穴此言水俞五十七穴亦皆循於骨空也髓空在腦後三分在顱際銳骨之下一在齦基下一在項後中復骨下一在脊骨上空在風府上脊骨下空在尻骨下空本篇之所謂骨空者言經脈之循於骨空之間而為穴也然骨空間乃節之交精髓上下相通之處故復總論其通體骨節之空焉諸髓皆會於腦而為精髓之海故先言髓空在腦後銳骨之下謂腦髓相通之處在腦後銳骨之下有空也一在齦基下者謂腦前有空而通於齒根之上鼻頞之間故腦滲則為涕也一在項後中復骨下者在督脈之瘂門入系舌本謂腦之中通於舌下也一在脊骨上空在風府上者謂諸髓之從脊骨而上於風府從風府而入通於腦也所謂脊骨下空在尻骨下空者言脊髓之上通於腦而下通於尻臀之骨空也數髓空在面俠鼻數言素言面之俠鼻間而有數處之髓空也或骨空在口下當兩肩此言面骨之通於肩骨也言在面數處之骨空或有在口下而通於肩骨者兩髆骨空在髆中之陽此兩肩髆之通於兩臂也陽外側也臂骨空在臂陽去踝四寸兩空骨之間此言兩臂骨之相通也踝謂手踝去踝四寸兩骨空之間者謂髓在肱骨之中央上通於肩臂下通於手指者也股骨上空在股陽出上膝四寸股骨謂大腿之骨在膝上四寸是在骨之中央矣蓋言大骨之中空而髓充於內從兩頭之髓孔上通於腰尻下通於䯒骨故下文云扁骨無髓孔而中亦無空䯒骨空在輔骨之上端䯒骨小腿之骨空在輔骨之上上通於股骨下通於跗指之骨也股際骨空在毛中動下股際者謂兩大腿骨之上小腹下之橫骨在兩股骨之間毛中動脈之下尻骨空在髀骨之後相去四寸尻骨臀骨也髀骨在股骨之上少腹兩旁突起之大骨前下連於橫骨後連於尻骨扁骨有滲理湊無髓孔易髓無空此言扁骨之無髓空而亦無髓孔之易髓也髓孔者謂節之交有孔竅之相通易髓者謂通體大小之骨精髓互相資易者也扁骨肋骨也其骨扁而中實無空其節交之處亦無髓孔以易髓然於骨外之筋膜理腠間而津液亦互相灌滲是上下周身之骨度髓氣流通亦如經脈之環轉無端者也灸寒熱之法先灸項大椎以年為壯數次灸橛骨以年為壯數此言鼠瘻寒熱之病而有二十九穴之灸法也夫鼠瘻之本在於水臟其病出於三陽頸項之間故當先灸督脈之大椎次灸尾窮之橛骨蓋督脈之原在腎其脈在陽而骨穴亦皆屬於腎也以年為壯者謂子鼠為生肖之始十二歲一周周而復始也張兆璜曰上節論刺者瀉脈中之毒也此復論灸者起在下之本也視背俞陷者灸之太陽乃腎臟之寒府故視太陽經之背俞陷者灸之舉臂肩上陷者灸之此手陽明經之肩髃穴也在肩端兩骨間舉臂有空兩季脅之間灸之謂足少陽經之京門穴也在腰中季脅間乃腎之募莫仲超曰近時有灸肩井及經外穴之肘尖者亦皆取少陽之經外踝上絕骨之端灸之系足少陽經之陽輔穴也足小指次指間灸之系足少陽經之俠谿穴腨下陷脈灸之系足太陽經之承筋穴外踝後灸之系足太陽經之崑崙穴缺盆骨上切之堅痛如筋者灸之按靈樞經脈篇手太陽手足少陽陽明五脈皆入於缺盆兩骨之間故不必論其何經切之堅痛如筋者即灸之是鼠瘻之毒出於頸項三陽之脈其毒留之處則累累如連珠而所病之經脈亦堅硬如筋也膺中陷骨間灸之系任脈之天突穴乃陰維之會而任脈亦起於少陰胞中掌束骨下灸之系手少陽經之陽池穴齊下關元三寸灸之關元穴屬任脈在臍下三寸乃手太陽小腸之募三陰任脈之會毛際動脈灸之系足陽明經之氣衝穴膝下三寸分間灸之系足陽明經之三里穴足陽明跗上動脈灸之系足陽明經之衝陽穴巔上一灸之系督脈之百會穴以上共計二十九處後犬所齧之處謂三陽之皮部故曰灸之二壯此在三陽之氣分而不涉於經脈故不在於數內王芳侯曰此經脈之邪亦可從氣分而出犬所齧之處灸之三壯即以犬傷病法灸之齧音業此論鼠瘻之病本於水臟之陰而交於戌火之陽故為寒為熱也曰鼠曰犬者謂子之天乙水邪戌之包絡火邪相合而為患也犬所齧之處腿之魚腹間也魚腹之外側乃少陽之部署少陽之上相火主之少陽之氣上與包絡相合而為火也故當於犬所齧之處灸之即以犬傷病法灸之者蓋犬傷者亦發寒熱謂鼠瘻之寒熱有如蟲獸所傷之不內外因非外感之寒熱而欲治其表也即如開闔不得寒氣從之陷脈為瘻留連肉腠此屬外感風寒之瘻而與其本在臟者之因不同也再按靈樞經曰目中有赤脈上下貫瞳子見一脈一歲死夫瞳子水藏之精也脈者心包絡之所主也火為陽水為陰脈從上而下貫瞳子是為陰陽交者死不治是鼠瘻之毒為害最厲故當先於大椎橛骨肩骨胸膺二十九處灸三陽之經脈以起腎臟之毒復於犬所齧之處以絕心包絡之交焉倪沖之曰有一種腫痛潰爛者乃外感風寒之瘻此為易治如在頸腋之間累累如連珠不痛不腫者其本在臟後至破潰而見赤脈者死證也凡當灸二十九處傷食灸之此言鼠瘻之過於膺喉者再以傷食之法灸之夫鼠瘻之上出於頸項之間乃太陽少陽之部署如過於膺喉則及於陽明而為馬刀俠癭矣故又當以傷食之法而灸其膺胸焉張兆璜曰太陽少陽之氣發原於下焦水臟而陽明之氣出於中焦故凡當二十九處再以傷食之法灸其胃脘以清陽明之原不已者必視其經之過於陽者數刺其俞而藥之數音朔夫鼠瘻之本在於水之陰臟而其病上出於頸腋三陽之間今灸背俞腨中之太陽肩背兩脅之少陽膝下跗上之陽明而又如犬所齧之病及傷食之法灸之不已者此陰毒之氣盛也故當視其經之過於陽者之處數刺其俞而泄之使陰臟之毒與陽相絕而再飲以解毒之藥治其陰此治鼠瘻寒熱之全法也高士宗曰骨者腎所主也此篇論骨空故首論刺太陽而曰還刺寒府謂太陽乃腎臟寒水之府也次論衝任督脈者三脈皆發原於腎也次論通體之骨空髓空者腎生骨髓而髓乃腎之精也論刺灸鼠瘻寒熱者鼠瘻之毒本於腎臟也水熱穴論篇第六十一黃帝問曰少陰何以主腎腎何以主水此言腎為陰而陰主水也岐伯曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也此言水由地中生上升於天下歸於泉天氣與水氣上下相通故在地為水而在天為寒夫天為陽地為陰泉在地之下故為至陰而盛水盛者受盛而多也夫肺主天太陰之氣主濕土土氣上升於天而為云天氣下降而為水是水由天降云自地生故曰肺者太陰也謂天地之氣相合也少陰主水而司冬令其脈貫膈入肺中故其本在腎其末在肺上下皆積水也兆璜曰肺主氣而發原在腎是氣從下而生水亦從下而上下則為溲上則為汗留聚則溢於皮膚而為胕腫矣帝曰腎何以能聚水而生病岐伯曰腎者胃之關也關門不利故聚水而從其類也此言水由中焦入胃之飲而生從下焦決瀆而出故關門不利則聚水而從其類蓋腎者主水水不沾流則水亦類聚矣張兆璜曰關者關戾也即金匱之所謂了戾不利則不得溺上下溢於皮膚故為胕腫胕腫者聚水而生病也胕腫脹也皮膚者肺之合水聚於下則反溢於上故腫脹於皮膚之間蓋因水聚而生此病也張兆璜曰下文云外不得越於皮膚謂水溢於皮膚尚可從汗解故金匱要略云腰以下腫當利小便腰以上腫當發汗乃愈帝曰諸水皆生於腎乎岐伯曰腎者牝臟也地氣上者屬於腎而生水液也故曰至陰此復言水生於中焦之胃土然由下焦之氣上升以合化夫胃為陽腑腎為牝臟腎氣上交於陽明戊癸合化而後入胃之飲從地土之氣上輸於肺肺氣通調而下輸決瀆故曰地氣上者屬於腎而生水液也夫水在地之下地氣上者直從泉下之氣而生故曰至陰是地氣上通於天而水氣亦上通於天也以上論水液生始之原聚則為水為腫和則清中之濁者從決瀆而下行清中之清者為精為液為氣為血生肌肉而充皮膚濡筋骨而利關節莫不由此入胃之飲醫者知此能通調其生始出入之原不唯病之不生且使其形體不敝益壽延年斯可謂之國手勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水所謂玄府者汗空也上節論關門不利水聚於下溢於上而為胕腫此言勞動腎液上出為汗逢於風而閉溢於皮膚之間為胕腫當知胕腫之有二因也經云用力過度則傷腎又曰持重遠行汗出於腎蓋勇而勞甚則傷骨骨即為腎腎氣動則水液上升而為汗矣逢於風則內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水蓋因風而致水腫於皮膚間也玄府者乃汗所出之空孔又名鬼門蓋幽玄而不可見者也夫腎者主水受胃腑之津液而藏之腎之津液復還入胃中而資養其臟腑又入心為汗入肝為淚入肺為涕入脾為涎自入為唾是五液皆出於腎而五臟六腑之氣亦藉腎臟之津液以濡養故曰內不得入於臟腑此論水從上降而復從下升乃津液環轉之道醫者知此能積此精而還養五臟之神並可益壽延年帝曰水俞五十七處者是何主也岐伯曰腎俞五十七穴積陰之所聚也水所從出入也尻上五行行五者此腎俞故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥分為相輸俱受者水氣之所留也此言水隨經而上下也腎者至陰也穴者氣之所聚故腎五十七穴積陰之所聚也水隨此經俞而外內出入者也尻臀也尻上五行中行乃督脈之所循旁四行乃太陽之經脈蓋督脈起於至陰循陰器繞篡後別繞臀合少陰太陽貫脊入腎太陽為少陰之寒府是此五行乃水陰之所注故皆為腎俞是以病水則下為胕腫大腹上則為喘呼不得臥者此標本俱病蓋腎為本肺為標在肺則為喘呼在腎則為水腫肺為氣逆故不得臥也此水分為相輸而上下俱受病者蓋腎俞之循尻而下復循腹而上貫肺中水氣之留於經俞故也夫有形之血行於脈中無形之氣行於脈外是以有形之水行於無形之氣分無形之水氣行於有形之脈中水隨經而行於上下而水氣亦隨經而留於脈中也故胕腫大腹者水所從出入於外內喘呼不得臥者水氣上逆於脈中伏兔上各二行行五者此腎之街也三陰之所交結於腳也伏兔在膝上六寸起肉以左右各三指按膝上有肉起如兔之狀故以為名各二行者謂少陰之大絡與少陰之經左右各二共四行也行五者謂少陰經之陰谷築陰交信復溜及三陰之所交結之三陰交穴也街氣街也氣街者氣之徑路也經絡者經別之大絡也如經絡之氣結則別走於氣街故絡絕則經通此少陰之經同少陰之大絡下行於腳而交結於三陰故曰腎之街也按靈樞經黃帝問曰少陰之脈獨下行何也岐伯曰夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精其下者注少陰之大絡出於氣街循陰股內廉入膕中伏行䯒骨內下至內踝之後屬而別其下者並於少陰之經滲三陰此衝脈之注於少陰之大絡而交結三陰於足䯒之間故曰伏兔上各二行此腎之街也詳靈樞經集註踝上各一行行六者此腎脈之下行也名曰太衝此言少陰之本直起於至陰之下也踝上各一行者左右二足各一行也行六者謂照海水泉大鐘太谿然谷湧泉六穴也此腎脈之直下行於至陰也夫聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰根起於湧泉是泉在地之下從至陰而湧出故曰腎者至陰也至陰者盛水也凡五十七穴者皆臟之陰絡水之所客也凡此五十七穴皆水臟之陰絡水之所客也客者謂留舍於脈絡之間非入於脈中也帝曰春取絡脈分肉何也按靈樞四時氣篇內風水膚脹為五十七痏取皮膚之血者盡取之而首論四時各有淺深之所在帝復引經而問故曰春取絡脈分肉何也而伯復詳析其旨焉岐伯曰春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉間治主也東方生風風生木木生肝風木之氣其性急疾而直達於絡脈分肉之間其經脈之氣隨冬令伏藏久深而始出其在經之氣尚少故不能深入而取之經當淺取之絡脈分肉間也按針刺之道有皮肉筋骨之淺深病有浮沉刺有淺深此病之有淺深也四時各有所取四時之有淺深也故曰四時之氣各有所在灸刺之道得氣穴為定帝曰夏取盛經分腠何也岐伯曰夏者火始治心氣始長脈瘦氣弱陽氣留溢熱熏分腠內至於經故取盛經分腠絕膚而病去者邪居淺也所謂盛經者陽脈也南方生熱熱生火火生心而心主血脈心氣始長故脈氣尚瘦弱也其陽盛之氣留溢於外而外之暑熱熏蒸於分腠內至於經脈故當取之盛經分腠絕膚者謂絕其膚腠之邪不使內入於經脈蓋邪居膚腠之淺也陽脈謂浮見於皮膚之脈陽盛於外故曰盛經按此二節論取氣而不論脈帝曰秋取經俞何也岐伯曰秋者金始治肺將收殺金將勝火陽氣在合陰氣初勝濕氣及體陰氣未盛未能深入故取俞以瀉陰邪取合以虛陽邪陽氣始衰故取於合夫秋刑官也於時為金其令收降故肺氣將收而萬物當殺清肅之氣將勝炎熱陽氣始降而在所合之腑其臟陰之氣始升而初勝也夫立秋處暑乃太陰濕土主氣故濕氣及體其陰氣未盛故未能深入而取之當刺俞上以瀉太陰之濕取合穴以虛陽腑之邪以陽氣始衰故取之於合蓋秋時陽氣下降始歸於腑而後歸於陰也帝曰冬取井滎何也岐伯曰冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脈乃去故取井以下陰逆取滎以實陽氣故曰冬取井滎春不鼽衄此之謂也腎為水臟冬令閉藏陽氣已衰而陰寒之氣堅盛於外太陽之氣伏沉其陽脈亦乃去陽而歸伏於內矣故當取井以下陰逆之氣取滎以實沉伏之陽順時令也夫井木也木生於水故取井木以下陰氣勿使其發生而上逆也滎火也故取滎穴以實陽氣乃助其伏藏也蓋冬令閉藏以奉春生之氣故冬取井滎助藏太陽少陰之氣至春時陽氣外出衛固於表不使風邪有傷膚腠絡脈故春不鼽衄此之謂也以上論刺風水所取五十七俞而又有四時之分別也帝曰夫子言治熱病五十九俞餘論其意未能領別其處願聞其處因聞其意氣穴論中言熱俞有五十九穴故帝曰夫子言治熱病五十九穴餘論其意但未能別其處因聞其意者因其處而知其瀉熱之意也岐伯曰頭上五行行五者以越諸陽之熱逆也頭上五行每行有五穴俱在頭之巔頂諸陽之氣上升於頭故取刺以越諸陽之熱逆中行屬督脈之上星囟會前頂百會後頂五穴旁兩行系足太陽經之五處承光通天絡卻玉枕十穴又旁兩行系足少陽經之臨泣目窗正營承靈腦空十穴大杼膺俞缺盆背俞此八者以瀉胸中之熱也大杼穴在項大椎兩旁屬足太陽膀胱經膺俞一名中府在胸中行兩旁各開六寸屬手太陰肺經缺盆穴在肩上橫骨陷者中屬足陽明胃經背俞即風門穴在大椎下第二椎兩旁各開一寸五分屬足太陽膀胱經此八者在胸中前後之上以瀉胸中之熱氣街三里巨虛上下廉此八者以瀉胃中之熱也氣街在少腹下橫骨兩端動脈應手三里在膝下三寸䯒骨外大肉分間巨虛上廉在三里下三寸巨虛下廉在上廉下三寸並足陽明胃經刺之以瀉胃中之熱雲門髃骨委中髓空此八者以瀉四肢之熱也雲門在巨骨下胸中行兩旁相去各六寸屬手太陰肺經髃骨在肩端兩骨間屬手陽明大腸經委中在足膝後屈處膕中央約紋中動脈應手屬足太陽膀胱經髓空即橫骨穴所謂股際骨空在陰上曲骨旁屬足少陰腎經蓋手太陰與陽明為表裡足少陰與太陽為表裡手之太陰從腹走手手之陽明從手走頭足之少陰從足走腹足之太陽從頭走足並主血氣故此八者以瀉手足之熱也按王氏輩以督脈之腰俞為髓空是止七穴而非八矣王芳侯曰骨髓皆屬於腎五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也五臟俞各開中行一寸五分肺俞在三椎間心俞在五椎間肝俞在九椎間脾俞在十一椎間腎俞在十四椎間左右各五並屬足太陽膀胱經以瀉五臟之熱凡此五十九穴皆熱之左右而瀉之也帝曰人傷於寒而傳為熱何也岐伯曰夫寒甚則為熱也夫在地為水在天為寒寒極生熱是熱生於寒而寒生於水也故曰水熱穴論調經論篇第六十二黃帝問曰余聞刺法言有餘瀉之不足補之何謂有餘何謂不足岐伯對曰有餘有五不足亦有五帝欲何問帝曰願盡聞之岐伯曰神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足凡此十者其氣不等也其氣謂五者之氣皆有虛實之不等此篇論五臟所生之氣血神志而歸重於血氣故篇名調經論帝曰人有精氣津液四肢九竅五臟十六部三百六十五節乃生百病百病之生皆有虛實今夫子乃言有餘有五不足亦有五何以生之乎靈樞經云兩神相搏合而成形常先身生是謂精上焦開發宣五穀味充膚熏身澤毛若霧露之溉是謂氣腠理開發汗出溱溱是謂津谷入氣滿淖澤注於骨骨肉屈伸泄澤補益腦髓皮膚潤澤是謂液中焦受氣取汁變化而赤是謂血壅遏營氣令無所避是謂脈四肢為諸陽之本九竅為水注之氣五臟者所以藏精神血氣魂魄者也十六部者十六部之經脈也手足經脈十二蹺脈二督脈一任脈一共十六部脈亦計十六丈二尺而一周於身節之交三百六十五會神氣之所遊行出入乃百病之所從而生皆有虛有實岐伯曰皆生於五臟也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而此成形此言五者之氣皆生於五臟而五臟所藏之血氣神志以成此形志意通內連骨髓而成身形五臟志意者所以御精神收魂魄適寒溫和喜怒者也志意通內連骨髓而成身形五臟上節言有形之五臟以生無形之五志此言無形之五志以成有形之身形五志者心藏神肝藏魂肺藏魄脾藏意腎藏志也張兆璜曰陰陽者血氣之男女也神志者水火之精也人秉陰陽水火而成此形五臟之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉此言五臟之道又皆歸於經隧經隧者五臟之大絡以行血氣者也血氣不和百病乃變化而生是故調治之道亦守其經隧焉帝曰神有餘不足何如岐伯曰神有餘則笑不休神不足則悲神者心之所藏也心藏脈脈舍神心在志為喜在聲為笑故有餘則笑不休不足則金氣反勝而為悲陰陽應象論曰悲勝怒宣明五氣篇曰並於肺則悲是悲屬肺志血氣未並五臟安定邪客於形灑淅起於毫毛未入於經絡也故命曰神之微血氣未並則陰陽勻平五臟之道皆入於經隧以行血氣故血氣和則五臟安定矣邪客於形尚在於皮膚之間灑淅動形而未入於經絡此神氣為病之微者也張兆璜曰血氣相併則有虛有實邪入深而客於肌肉經脈亦有虛有實此血氣平而邪客之淺者也帝曰補瀉奈何岐伯曰神有餘則瀉其小絡之血出血勿之深斥無中其大經神氣乃平血者神氣也瀉其小絡之血出其血則有餘之神氣自平斥推也若深推而中其大經則反傷其血氣矣神不足者視其虛絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平心主血脈視其心之皮部有虛絡者按其穴而致其氣刺其絡而利其血無泄其血氣以通其經脈而神氣乃平矣愚按針刺之道通利經脈無泄其氣血即所以補虛也蓋血氣流通而形神自生矣人之為病因鬱滯而成虛者十居其半醫者但知補虛不知通利之中更有補虛之妙用帝曰刺微奈何岐伯曰按摩勿釋著針勿斥移氣於不足神氣乃得復言刺神之微者當按摩其處勿令釋手著針者如以布憿著之乃從單布上刺謂當刺之極淺而勿推內其針移其邪氣於不足而神氣乃自復矣帝曰善氣有餘不足奈何岐伯曰氣有餘則喘咳上氣不足則息利少氣肺主氣而司呼吸故有餘則喘咳上逆不足則呼吸不利而少氣也血氣未並五臟安定皮膚微病命曰白氣微泄肺合皮其色白微邪客於皮膚命曰白氣微泄謂微傷其肺氣也帝曰補瀉奈何岐伯曰氣有餘則瀉其經隧無傷其經無出其血無泄其氣不足則補其經隧無出其氣經隧大絡也五臟之所以出血氣者也故有餘則瀉其經隧之血氣而勿再傷其經脈之血氣也不足則補其經隧之血氣而無泄其經隧之氣焉帝曰刺微奈何岐伯曰按摩勿釋出針視之曰我將深之適人必革精氣自伏邪氣散亂無所休息氣泄腠理真氣乃相得出針出而淺之也視之視其淺深之義也曰我將深之適人之邪淺客於皮必與正氣相格庶邪散而正氣不泄故曰我將深之謂將持內之而使精氣自伏復放而出之令邪無散亂迎之隨之以意和之無所休息使邪氣泄於皮毛腠理而真氣乃相得復於肌表此用針淺深之妙法也帝曰善血有餘不足奈何岐伯曰血有餘則怒不足則恐肝志怒腎志恐故血有餘則肝氣盛而主怒不足則母氣衰而並於脾故恐莫仲超曰木氣不足則土氣盛土氣盛則並於所不勝之腎臟而為恐血氣未並五臟安定孫絡水溢則經有留血下文之所謂病在脈調之血者心包絡所主之血也此所謂血者肝臟之所主也肝藏之血本於衝脈衝脈起於胞中其浮而外者循腹上行散於皮膚肌肉之間充膚熱肉生毫毛臥則歸於肝臟寤則隨衛氣而行於脈外孫絡水溢者胞中之津水也水穀之津流溢於中奉心神化赤而為血故曰水入於經而血乃成夫經脈之血從經而脈脈而絡絡而孫脈外之血從皮膚而轉註於孫脈從孫絡而入於經俞此脈內脈外之血氣互相交通者也故曰孫絡水溢則經有留血此肝有微病致經水之溢於經也帝曰補瀉奈何岐伯曰血有餘則瀉其盛經出其血不足則視其虛經內針其脈中久留而視脈大疾出其針無令血泄盛經衝脈也衝脈為經絡之海故曰盛經虛經虛而不盛也久留候氣至也脈大氣至而血復也張兆璜曰凡病虛中有實實中有虛出針視之曰我將深之適人必革此瀉邪而兼補其正氣也久留而視脈大疾出其針此補虛而兼出其微邪也迎之隨之淺深在意斯盡調經之妙用二視字宜玩帝曰刺留血奈何岐伯曰視其血絡刺出其血無令惡血得入於經以成其疾經云經脈為里支而橫者為絡絡之別者為孫盛而血者疾誅之盛者瀉之蓋血在於絡是孫絡之水溢留於絡中而成敗惡之血矣此將入於經故當疾刺以瀉出之帝曰善形有餘不足奈何岐伯曰形有餘則腹脹涇溲不利不足則四肢不用腹乃脾土之郛郭故有餘則脹靈樞經云脾氣實則經溲不利蓋土氣盛實則剋制其水而不流脾主四肢故虛則不用血氣未並五臟安定肌肉蠕動命曰微風蠕葉軟蟲行動貌蓋風傷衛衛氣行於肌肉之間故蠕動也帝曰補瀉奈何岐伯曰形有餘則瀉其陽經不足則補其陽絡陽謂陽明也陽明與太陰為表裡蓋皮膚氣分為陽脾所主在肌肉故當從陽以補瀉瀉刺其經者從內而出於外也補刺其絡者從外而內於內也帝曰刺微奈何岐伯曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索微風傷衛衛氣行於脈外故當取之分肉而無傷其經絡所謂病在肉調之分肉也索散也盡也帝曰善志有餘不足奈何岐伯曰志有餘則腹脹飧泄不足則厥腎者胃之關也關門不利則聚水而為腹脹飧泄矣腎為生氣之原故不足則厥逆而冷血氣未並五臟安定骨節有動骨節有動者亦為微風所傷也故下文曰邪所以能立虛帝曰補瀉奈何岐伯曰志有餘則瀉然筋血者不足則補其血溜然謂然谷穴在足踝下之兩經間故曰然筋足少陰之滎穴也滎為火故有餘則當瀉其坎中之滿復溜足少陰之經穴也經屬金虛則補其母也帝曰刺未並奈何岐伯曰即取之無中其經邪所乃能立虛即取之者即於骨節有動之處而取之也邪所謂邪客而有動之所也此病在骨者調之骨故無中其經帝曰善余已聞虛實之形不知其何以生岐伯曰氣血以並陰陽相傾氣亂於衛血逆於經血氣離居一實一虛此言五者之有餘不足生於血氣之相併也血氣者陰陽也陰陽者皮膚氣分為陽經脈血分為陰表為陽里為陰身半以上為陽身半以下為陰氣亂於衛者血並於氣也血逆於經者氣並於血也血並於氣則血離其居氣並於血則氣離其居矣血離其居則血虛而氣實氣離其居則氣虛而血實故曰一實一虛蓋有者為實無者為虛也此節論血氣相併之總綱再按衛者水穀之悍氣也肺主之氣乃三陽之表氣肌腠之元真故曰氣亂於衛謂亂於衛之部署也下文曰取氣於衛病在氣調之衛皆屬此意蓋皮膚肌肉之腠理處皆衛氣遊行出入之所謂當取之於皮膚肌腠而無動其經脈也當知衛氣出於陽明日行於陽夜行於陰大會於風府遊行於外內者也太陽三焦之氣生於下焦水中從下而上自內而外主司於膚表通會於肌腠故曰三焦膀胱者腠理毫毛其應分別血氣生始出入之原乃上乘之學問學者當於針經乃本經針刺諸篇用心參究血並於陰氣並於陽故為驚狂此言血分氣分之為陰陽也脈外氣分為陽脈內血分為陰陰血滿之於外陽氣注於脈中是為陰陽勻平如血並居於陰則陰盛而血實心主血脈故陰盛則驚氣並於陽則陽盛而氣實陽盛則發狂也血並於陽氣並於陰乃為炅中此言外內之為陰陽也炅熱也血並於陽則陰虛而生內熱矣氣並於陰則陽氣內盛而為熱中矣故陰陽外內相併而總屬炅中血並於上氣並於下心煩惋善怒血並於下氣並於上亂而喜忘此分上下之為陰陽也血並上則脈氣實而心煩惋氣並於下則氣不舒而多怒也血並於下則血蓄於下而喜忘氣並於上則氣逆於上而為悗亂靈樞經曰清濁之氣相干亂於胸中是為大悗傷寒論曰其人喜忘者必有蓄血宜抵當湯下之按抵當湯證乃血蓄於氣分當知氣並於上非則並於脈外而兼併於脈中故曰清濁之氣相干血並於下非則並於脈中而兼併於脈外故其人喜忘經云上氣不足下氣有餘腸胃實而心氣虛虛則營衛留之於下久之不以時上故喜忘也帝曰血並於陰氣並於陽如是血氣離居何者為實何者為虛岐伯曰血氣者喜溫而惡寒寒則泣不能留溫則消而去之是故氣之所併為血虛血之所併為氣虛此復申明血氣各自並居而成虛也離分也泣澀也夫血滿於外氣注於陰是陰陽相合而為和平如血並於陰氣並於陽是血氣各自分其居矣故血氣喜其溫和相合而惡其寒澀獨居如血並於陰則寒泣而不能流行血不流行則氣不得以和之矣氣並於陽則氣溫而血消去氣熱消鑠則血不得以和之矣是故氣之所併為血虛血之所併為氣虛也張兆璜問曰血並於陰則氣亦並於陽矣故謂血氣離居似血氣皆當為實而以血併為氣虛氣併為血虛兩者皆虛何也曰血並於陰者血並而氣不並也血並於陰則陰盛而寒寒則血中之氣亦澀而不能流行矣氣並於陽者氣並而血不並也氣並於陽則陽盛而熱熱則氣分之血亦消爍而去矣故曰氣並則無血血並則無氣帝曰人之所有者血與氣耳今夫子乃言血併為虛氣併為虛是無實乎岐伯曰有者為實無者為虛故氣並則無血血並則無氣今血與氣相失故為虛焉此再申明血氣並而成虛者因無而為虛也如血並於陰則陰寒盛而血中之氣亦無矣如氣並於陽則陽熱盛而氣分之血亦消去矣故氣並則無血血並則無氣今血與氣相失而不能相和故皆為虛焉絡之與孫脈俱輸於經血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死此申明血氣共並之為實也絡者經脈之支別也孫脈者乃孫絡之脈別經者亦三百六十五脈內通於十二大絡外通於膚腠皮毛五臟之血氣從大絡而出於孫脈從孫脈而出於膚表表陽之氣從孫絡而入於大絡從大絡而注於經俞此外內交通血氣之徑路也是絡脈之血氣孫絡之氣血俱輸於經是血與氣共並於血分則為實也血之與氣並走於上則為大逆逆則暴死氣復反則生不反則死此血與氣共並於上則為實也王芳侯曰氣復反則生謂復歸於下也蓋陽氣生於下而升於上血氣並逆則氣機不轉而暴死反則旋轉而復生帝曰實者何道從來虛者何道從去虛實之要願聞其故道謂血氣出入之道路來則為實去則為虛有來有往則和平矣岐伯曰夫陰與陽皆有俞會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人此言血氣相通陰陽交互之為和平也俞者謂三百六十五俞穴乃血脈之所流注會者謂三百六十五會乃神氣之所遊行皆陰陽血氣之所輸會者也脈外之陽氣從孫脈而注於陰中在內之陰血從經俞而滿之脈外此陰陽相和是為勻平血氣相通以充其形則三部九候之脈上下若一是為平人矣夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒上節論陰陽不和血氣相併而有虛實之分此復論外因於風雨寒暑內因於飲食七情而亦有陰陽虛實之分焉外為陽內為陰故生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒朱永年曰風暑天之陽邪寒濕天之陰邪多陽者多喜多陰者多怒帝曰風雨之傷人奈何岐伯曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛此論外因之風雨寒暑而有虛有實也夫經脈為里支而橫者為絡絡之別者為孫風雨之傷人也先客於皮膚而次入於裡血氣與邪並客分腠之間其脈堅大故曰實此邪在於分腠之陽迫及於脈而為堅大未入於裡故按之則痛帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收肌肉堅緊榮血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛此言寒濕之傷人肌肉也夫表陽之氣主於皮膚寒濕之陰邪傷人陽氣是以皮膚不收陽氣不能外御致邪入於肌肉而肌肉堅緊也榮血泣而不行衛氣去於膚表故為虛也聶㒤同闢積也靈樞經曰血氣竭枯腸胃㒤闢蓋言此虛者虛於外而闢積於內也此表氣不足故按摩之則裡氣出以溫之故快然而不痛此二節論陽受之風雨寒濕陽氣主於膚表蓋以陽氣實者為實而陽氣虛者為虛也帝曰善陰之生實奈何岐伯曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣此論內因之虛實也夫內為陰外為陽身半以下為陰身半以上為陽喜怒之氣由衷而發故不節則陰氣上逆逆則下虛虛則陽氣相乘而下走之故為實矣帝曰陰之生虛奈何岐伯曰喜則氣下悲則氣消消則脈虛空因寒飲食寒氣熏滿則血泣氣去故曰虛矣心藏神喜則神氣散而下肺藏氣悲則傷肺而氣消神氣消而脈空虛者脈隨氣而消長也飲食於胃喜溫而惡寒兼之寒飲致寒氣熏滿於胸中則血泣而氣去蓋榮衛血氣皆陽明之所生也此二節論飲食居處陰陽喜怒皆生於陰故論在內之氣及經脈之為虛為實也帝曰經言陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒余已聞之矣不知其所由然也此承上文而復論表裡陰陽有寒熱虛實之別上節論陽在外而陰在內然表陽之氣有虛之寒里陰之氣有虛之熱故帝引經而復問焉岐伯曰陽受氣於上焦以溫皮膚分肉之間令寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒慄陽謂諸陽之氣經云上焦開發宣五穀味熏膚充身澤毛是謂氣是陽受氣於上焦以溫皮膚分肉假令寒氣客於外則上焦之氣不通而寒氣獨留故寒慄也朱永年曰凡傷於寒則為病熱得陽氣以化熱也寒慄而不能為熱者上焦之氣不通也帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱此言陰虛生內熱者因中土之受傷也夫飲食勞倦則傷脾脾主肌肉故形氣衰少也水穀入胃由脾氣之轉輸脾不運行則穀氣不盛矣上焦不能宣五穀之味下焦不能受水穀之津胃為陽熱之府氣留而不行則熱氣熏於胸中而為內熱矣金西銘曰上即風雨寒濕此即飲食居處帝曰陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱上焦為宗氣之海宗氣積於胸中上出於肺以司呼吸肺主氣而上合於皮毛是以上焦通利則充膚澤毛有若霧露之溉上焦不通則皮膚緻密腠理閉塞而玄府不通矣玄府毛竅之汗空也毫毛之腠理閉塞則衛氣不得泄越而為熱矣帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通其脈盛大以澀故中寒厥氣上逆下焦之陰氣厥逆於上也陰寒之氣積於胸中而不瀉則中上二焦之陽氣消而寒氣獨留於上寒則血凝泣而脈不通矣陰盛則脈大血凝泣故脈澀也陽熱去而寒獨留故中寒也王芳侯曰陰之生虛曰脈空虛陰盛生寒曰血脈凝泣蓋里為陰而血脈為陰也帝曰陰與陽並血氣以並病形以成刺之奈何岐伯曰刺此者取之經隧取血於榮取氣於衛用形哉因四時多少高下陰與陽並者謂表裡上下陰陽相併也血氣以並者血並於氣氣並於血也經隧大絡也蓋五臟之神志血氣生於胃腑水穀之精胃之所出氣血者經隧也經隧者五臟六腑之大絡也故當取之經隧以調其五臟焉夫取之經隧調其神也取之榮衛調其氣也用以也言又當以調其形形者皮膚肌肉哉者未盡之辭蓋言上守神粗守形神氣固當調而形之不可不用也因時氣之升降浮沉而用之以多少高下如曰以月生死為痏數此多少之謂也如春時俞在頸項夏時在胸脅秋時在肩背冬時在腰股高下之謂也張兆璜曰用取也形肉也心藏神肺藏氣肝藏血脾藏肉腎藏志而成此形既已調之神志氣血可不取之形哉多少高下皆取之於形故曰用形哉因四時多少高下帝曰血氣以並病形以成陰陽相傾補瀉奈何岐伯曰瀉實者氣盛乃內針針與氣俱內以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是謂大瀉必切而出大氣乃出內葉訥上節論先調其五臟之形神氣血此復論補瀉其虛實焉虛實者謂並者為實無者為虛邪氣盛則實精氣奪則虛氣盛者謂所並之氣所受之邪盛也蓋候病氣至而內針也針與氣俱內者隨正氣而深之也以開其門利其戶者開其門而伏其精氣於內也針與氣俱出者同病氣俱出也針經云客者邪氣也在門者邪循正氣之所出入也是以瀉邪當先歸伏其正氣而後引邪以出其門則精氣不傷而邪氣乃下故外門勿閉以出其邪搖大其針孔如利其所出之道路是謂大瀉切急也屈降也大氣大邪之氣也此論瀉邪之中而兼用內正之法帝曰補虛奈何岐伯曰持針勿置以定其意候呼內針氣入針出針空四塞精無從去方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動氣候時近氣不失遠氣乃來是謂追之空葉孔持針在手勿置之意外以定其迎隨之意候其呼出而內針氣出而針入針空勿搖使精氣無從而去候正氣方實而疾出其針使正氣內入而針即外出則熱邪不得還入於內內之氣門已閉則邪氣布散於外而精氣乃得存矣針下動氣候時而至使淺近之氣不散失於外深遠之氣來復於其間是謂追而濟之之法也此補正之中兼瀉散其邪蓋邪之所腠其正乃虛也張兆璜曰此先追實其正氣次散其邪再候其時而使精氣來復迎之隨之得出入補瀉之妙而後能調其經焉帝曰夫子言虛實者有十生於五臟五臟五脈耳夫十二經脈皆生其病今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之神志血氣肉五者各有虛實故虛實有十而皆生於五臟三百六十五節乃筋骨之會十二經脈支分三百六十五絡而皆絡於節節有病必被及於經脈蓋言筋骨血脈外內之相通耳岐伯曰五臟者故得六腑與為表裡經脈支節各生虛實其病所居隨而調之五臟者內合五行外合脈肉筋骨故得六腑與為表裡以應十二經脈故五者之虛實止歸於五臟若經絡支節各生其虛實則隨其病處而調之張兆璜曰以五臟合六腑以配十二經脈支分三百六十五絡與皮肉筋骨被及相連今各隨其病之所居而調之血氣脈肉筋骨是仍歸於五臟矣病在脈調之血病在血調之絡病在氣調之衛病在肉調之分肉病在筋調之筋病在骨調之骨此言六臟所主之氣血筋骨脈肉為病各隨其所在而調之病在心包絡所主之脈即調之脈在心臟所主之血即調之絡在肺臟所主之氣即調之於衛在脾臟所主之肉即調之分肉在肝臟所主之筋即調之筋在腎臟所主之骨即調之骨蓋五臟者五行之所生也故先言其五臟地之五行化生六氣六氣之中有二火一合心臟之陽火一合包絡之陰火共為六臟得六腑與為表裡以應十二筋脈以合血氣脈肉筋骨燔針劫刺其下及與急者病在骨焠針藥熨燔音煩焠葉翠入聲上章論五臟之氣不和以致外合之血氣筋骨為病各隨其處而調之今復論風雨寒濕為病於脈肉筋骨之間而各有取刺之法也按靈樞官針篇曰九曰焠刺焠刺者刺燔針則取痹也又曰刺寒痹之法刺布衣者以火焠之刺大人者以藥熨之蓋陽受之風雨寒濕客於脈肉筋骨之間皆能為痹故當以燔針劫刺其所病之下而及與筋痹之急者若病在骨又當用焠針及藥熨之按足太陽之筋病則項筋急名曰仲春痹足少陽之筋病則膕筋急名曰孟春痹足陽明之筋病則腹筋急名曰季春痹病手太陽則頸筋急病手少陰則反折筋急病手太陰則脅急或為轉筋或為反折或為瘈痙或為卵縮皆用燔針劫劫刺再按針經云內有陰陽外有陰陽在外者皮膚為陽筋骨為陰病在陽者名曰風病在陰者名曰痹然皮肉筋骨皆能為痹故曰燔針劫刺其下而復提出其筋與骨焉病不知所痛兩蹺為上痛而不知其所者當取之蹺脈也按兩蹺脈起於足踝上入陰上循胸裡故痛在蹺脈之上者不知痛處也身形有痛九候莫病則繆刺之此痹在於肌肉而不及於經脈者當繆刺之按繆刺篇曰凡痹往來行無常者在分肉間痛而刺之左刺右右刺左病已止不已復刺之如法痛在於左而右脈病者巨刺之此言病在於經別者當巨刺也繆刺篇曰邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先痛如此者必巨刺之巨大也九針論曰八曰長針取法於綦針長七寸主取深邪遠痹者也蓋經脈在裡而入深故當用長大之針以取之必謹察其九候針道備矣九候三部九候也九候外合九竅內合九臟循行於上中下之三部皆五臟所生之血氣也此篇首論五臟所藏之神志血氣有虛有實復總歸於血氣陰陽復調之於皮肉筋骨並取邪痹於身形蹺脈之間然必察其九候之脈而知病之所正調經之道於斯為備矣繆刺論篇第六十三黃帝問曰余聞繆刺未得其意何謂繆刺繆刺者謂病在左而取之右病在右而取之左如紕繆也岐伯對曰夫邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉此先言邪氣循序而入於經者則當治其經也夫經脈為里支而橫者為絡絡之別者為孫絡脈外見於皮部經脈內連於臟腑邪之始客於形也必先舍於皮毛留而不去則傳入於孫絡蓋從孫而絡絡而經也陰陽俱感者謂皮毛氣分為陽經絡血分為陰言五臟之血氣外充於形身有陰而有陽也夫十二經脈三陰者屬臟絡腑三陽者屬腑絡臟而云內連五臟散於腸胃者謂地之五行以生人之五臟三陰三陽之六氣亦由五行之所生故凡論經脈以五臟五行之氣為主而六腑為其合也極至也次處也此言邪入於經而至於五臟之次者不繆刺也今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也此言邪入於大絡者當繆刺也孫絡者孫脈也孫絡之脈別經者亦三百六十五脈並注於大絡大絡者臟腑之經隧也靈樞經曰胃之所出血氣者經隧也經隧者五臟六腑之大絡也閉塞不通者絡脈不通也絡脈閉塞則皮膚孫絡之邪不得入於經而流溢於大絡矣奇病者謂病氣在左而證見於右病氣在右而證見於左蓋大絡乃經脈之別陽走陰而陰走陽者也按此論乃大絡與皮膚孫絡相通胃腑所出之氣血從胃絡而注於臟腑之大絡從大絡而先行皮膚先充絡脈從絡脈而復入於經以養五臟氣此胃氣之所由出也至於水穀所生之津液以資養五臟之精者由脾臟之轉輸也是津液氣血皆由水穀之所生胃腑之所出而各有其道故曰孫絡三百六十五穴會以溢奇邪以通榮衛又曰肉分之間溪谷之會以行榮衛以會大氣大氣者宗氣也是胃腑之宗氣血氣有由經隧而先行於皮膚孫絡之間與榮衛交會者也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺左注右而右注左者因大絡之左右互交邪隨絡氣而流注也經經隧也言臟腑之大絡與胃之經隧相通而布於四末蓋四肢乃為諸陽之本陽明胃氣之所生也其氣無常處者布於四末而散於脈外不入於經俞故命曰繆刺經脈篇曰手太陰之別並太陰之經直入掌中手少陰之別循經入於心中蓋大絡俱並經而行故曰與經相干帝曰願聞繆刺以左取右以右取左奈何其與巨刺何以別之繆刺巨刺之病皆左右相注故問何以別之岐伯曰邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也故絡病者其痛與經脈繆處故命曰繆刺此言邪客於經者當巨刺也巨大也謂當以長針取之亦左取右而右取左也夫大絡之邪由孫絡之流注故可淺刺絡脈以取大絡之氣如邪在經者當巨刺以取之必中其經非絡脈之比也經謂十二經之別即靈樞經別篇之所謂足太陽之正與足少陰之正為一合足少陽之正與足厥陰之正為二合足陽明之正與足太陰之正為三合手太陽之正與手少陰之正為四合手少陽之正與手厥陰之正為五合手陽明之正與手太陰之正為六合是也此亦陰陽相貫左右相交是以左病則右盛右病則左盛亦有移易者謂有病在陽經而移入於陰經者有病在陰經而移入於陽經者故左病未已而右脈先病如此者必巨刺之必中其經非絡脈也絡脈者大絡也故絡病者其痛與經脈繆處故命曰繆刺按此節分別大絡與經脈各走其道不相交通然為病皆左注右而右注左俱宜繆刺者也故以巨刺之法少分別之故曰絡病者其痛與經脈繆處故命曰繆刺再按靈樞經有經脈篇論臟腑之十二經脈者也有經別篇即巨刺之經也有十五大絡即繆刺之絡也在十二經脈則曰盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之在十五大絡十二經別未論其繆刺巨刺之法故補論於諸刺篇之後名曰繆刺論當知靈素二經皆黃帝之典墳而素問多有補靈樞之未盡者聖人救世之婆心也愚謂血氣之生始經脈之貫通乃醫學之根本學者當合參靈樞細心體會不可以其刺而忽之張兆璜曰上古之法首重針砭次齊藥食故有譏丹溪為一代名流不按針刺針刺之道醫者不可不知帝曰願聞繆刺奈何取之何如岐伯曰邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然骨之前出血如食頃而已不已左取右右取左病新發者取五日已足少陰之絡名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊故邪客之令人卒心痛暴脹胸脅支滿無積者無盛血之結也當刺然骨之前出血如食頃而已不已當繆取之新病者刺五日病已邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺手中指次指爪甲上去端如韭葉各一痏壯者立已老者有頃已左取右右取左此新病數日已手少陽之別名曰外關去腕二寸外繞臂注胸中合心主夫手少陽乃三焦相火主氣注胸中而合於心主包絡故邪客之令人喉痹舌卷口乾心煩脈循臂故痛不能舉也當刺中指心包絡之中衝次指手少陽之關衝去爪甲如韭葉許各一痏壯者之氣盛故立已老者之氣衰故有頃此言手少陽三焦之主氣也如不已者乃左注右而右注左當繆刺之此為新病當數日已蓋言邪始客於皮毛孫絡而流溢於大絡者非久病也按靈樞經脈篇云六經絡手陽明少陽之大絡起於五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛是胃氣之行於經隧者布於四末行於皮膚而諸井穴乃經氣之所出故皆取刺其井焉邪客於足厥陰之絡令人卒疝暴痛刺足大指爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左足厥陰之絡名曰蠡溝去內踝五寸別走少陽其別者經莖上睪結於莖故邪客之令人卒疝暴痛以其絡上睪丸而結於陰莖也當取足大指之大敦在爪甲上與肉相交之處左右各一痏男子之血盛故立已女子之生不足於血故有頃此言厥陰肝經之主血也如不已再繆取之邪客於足太陽之絡令人頭項肩痛刺足小指爪甲上與肉交者各一痏立已不已刺外踝下三痏左取右右取左如食頃已足太陽之絡名曰飛揚去踝七寸別走少陰足太陽為諸陽主氣其氣上升於頭項故邪客於絡而致頭項肩痛也當取足小指之至陰穴左右各一痏如不已取外踝下之絡脈三痏以繆刺之邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已手陽明之絡名曰偏歷去腕三寸別入太陰故邪客之令人氣滿胸中喘息及支胠胸熱蓋手太陰主氣以司呼吸而脈循於胸中也故當取手大指之少商次指之商陽各一痏左取右右取左如食頃其病即已邪客於臂掌之間不可得屈刺其踝後先以指按之痛乃刺之以月生死為數月生一日一痏二日二痏十五日十五痏十六日十四痏臂掌之間手厥陰之絡也厥陰之絡名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡故當刺其腕踝之後循臂而上按其痛處乃刺之以月生死為數蓋手厥陰心主主血脈是謂得時而調之也月晦初生曰朔故一日為月生邪客於足陽蹺之脈令人目痛從內眥始刺外踝之下半寸所各二痏左刺右右刺左如行十里頃而已此言陽蹺之脈亦左右互交會於睛明所當繆刺者也陽蹺者足太陽之別起於足外踝下太陽之申脈穴當踝後繞跟以僕參為本上外踝三寸以跗陽為郄循股脅上肩髆上人迎挾口吻至目內眥會於足太陽之睛明穴故邪客之令人目痛從內眥始也當刺外踝下之僕參申脈左右各二痏如痛在左目者取之右痛在右目者取之左蓋蹺脈挾口吻左右互交而上於目內眥也按靈樞寒熱篇曰足太陽有通項入於腦者正屬目本名曰眼系乃別陰蹺陽蹺陰陽相交陽入陰陰入陽交於目銳眥是陰蹺陽蹺左右交轉於面故病在上者當繆取之下也人有所墮墜惡血留內腹中脹滿不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然谷之前血脈出血刺足跗上動脈不已刺三毛上各一痏見血立已左刺右右刺左善悲驚不樂刺如右方此言墮傷者亦當用繆刺之法也惡血留內則氣脈不通是以腹中滿脹肝主疏泄腎開竅於二陰故不得前後也先服利藥以去惡血所謂先治其標也夫墮墜者有傷筋骨筋即為肝骨即為腎是以上傷厥陰之脈下傷少陰之絡當刺足內踝下厥陰之中封然谷前少陰之絡脈血脈出血以調其經再刺足跗上陽明之動脈以消腹脹如不已再刺三毛上肝經之大敦蓋墮墜者傷筋骨與血肝主筋而主血也如悲驚不樂者亦刺如前法蓋墮傷血脈筋骨傷五臟外合之有形悲驚不樂傷五臟內藏之神志皆當以針調之張兆璜曰神有餘不足志有餘不足皆調之於經蓋言用針之神妙非則調之於有形也邪客於手陽明之絡令人耳聾時不聞音刺手大指次指爪甲上去端如韭葉各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也耳中生風者亦刺之如此數左刺右右刺左手陽明之絡其別者入耳合於宗脈故邪客之令人耳聾時不聞音謂有時聞而有時不聞也蓋邪客於絡絡脈閉塞則有時而不聞脈氣有時而通則有時而聞矣亦當取手太陰之少商手陽明之商陽蓋耳者宗脈之所聚也宗脈出於陽明而合於手太陰故刺之立聞如不已刺中指心主之中衝蓋十二經脈三百六十五絡皆上於面而走空竅心主脈而開竅於耳也其不時有聞者乃內傷之聾證非邪客於絡不可刺也耳中生風者耳鳴之如風生也此邪在於絡從外竅而欲出故刺之亦如此數凡痹往來行無常處者在分肉間痛而刺之以月生死為數用針者隨氣盛衰以為痏數針過其日數則脫氣不及日數則氣不瀉左刺右右刺左病已止不已復刺之如法月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之此言邪痹於肌腠之氣分者亦當以繆取也凡痹往來行無常處者邪隨氣轉謂之行痹故當於分肉間隨其痛處而取之夫月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以邪客於手厥陰心主之血分客於肌腠分肉之衛分皆當以月生死盈虧而加減之邪客於足陽明之經令人鼽衄上齒寒刺足中指次指爪甲上與肉交者各一痏左刺右右刺左此言經脈之有互交者亦當以繆取也經謂陽明之經脈也足陽明之脈起於鼻交頞中上入齒中環繞唇下左右相交於承漿故邪客陽明之經而令人鼽衄上齒寒者亦當以繆刺也足陽明之脈下入中指外間其支者別跗上入大指間出其端故當取中指間之內庭大指次指間之厲兌各一痏而繆刺之此言臟腑之經脈如左右互交而為病於相交之上者亦當左取右而右取左也邪客於足少陽之絡令人脅痛不得息咳而汗出刺足小指次指爪甲上與肉交者各一痏不得息立已汗出立止咳者溫衣飲食一日已左刺右右刺左病立已不已復刺如法足少陽之絡名曰光明去踝五寸別走厥陰下絡足跗一呼一吸曰息肺所司也足少陽厥陰之脈並循於脅厥陰之脈上主肺循喉嚨邪客於少陽之絡令人脅痛不得息者陽邪而走於陰絡病而及於脈蓋陰陽經脈之相通也足少陽所生病者汗出上逆於肺則咳也當刺足小指次指之竅陰穴蓋此穴在四指五指之間故各刺一痏其不得息汗出立已咳者邪干肺也故宜溫衣及溫暖飲食若形寒飲冷是為重傷矣邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上刺足下中央之脈各三痏凡六刺立已左刺右右刺左嗌中腫不能內唾時不能出唾者刺然骨之前出血立已左刺右右刺左內葉訥賁音奔此邪客於絡而並於經者亦當以繆取也足少陰之絡其別者並經上走於心包下其經脈貫肝膈循喉嚨其支者從肺出絡心注胸中邪客於絡而併入於經迫其心火上炎故令人嗌痛不可內食上逆於肝膈則無故善怒也賁者胃之賁門腎氣上通於胃故氣上走賁上宜刺足下中央之湧泉左右各三痏凡六刺立已如甚至嗌中腫而唾亦不能出內者此君相之火併熾也當刺然谷前之絡脈出血立已此邪客於絡而並於經經脈上絡於心絡脈上走於心包下先見經證故先刺經脈之湧泉後並見絡證故復刺然谷前之絡脈蓋大絡乃經脈之別血氣之相通者也邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息刺腰尻之解兩胂之上是腰俞以月死生為痏數髮針立已左刺右右刺左足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃王冰曰足太陰之絡從髀合陽明上貫尻骨中與厥陰少陽結於下髎而循尻骨內入腹故邪客之令人腰痛引少腹控肋䏚也絡循於腹故不可以仰息腰尻骨間曰解挾脊之肉曰胂腰尻之解兩胂之上是腰俞也以日生死為痏數髮針立已蓋脾主肌肉肌腠之間乃衛氣之出入故以月為痏數邪客於足太陽之絡令人拘攣背急引脅而痛刺之從項始數脊椎挾脊疾按之應手如痛刺之旁三痏立已此邪客於絡而入於經者即當取之經也夫筋攣背急引脅而痛足太陽之經證也故刺之當從項之大椎始數脊椎而下挾脊疾按之應手如痛即於脊骨之旁刺之三痏立已蓋十五大絡乃十二經脈之別交相貫通者也故邪客於絡而為絡病者則繆取之如邪客於絡轉入於經而為經病者即隨經脈之痛處而取之也邪客於足少陽之絡令人留於樞中痛髀不可舉刺樞中以毫針寒則久留針以月死生為數立已此言邪留其處而為痛者亦當隨其痛處而取之也樞中髀樞之中兩髀厭分中即環跳二穴毫針取法於毫毛長一寸六分主寒熱痛痹之在絡者故當以毫針刺樞中寒則久留針以待陽熱之氣至以月生死為數立已按邪舍於絡有隨絡氣而留行者則繆取之有客於絡而轉入於經者有客於絡而留其處者皆隨其痛處而刺之蓋邪氣之無經常也少陽主初生之氣故亦以月生死為痏數治諸經刺之所過者不病則繆刺之此復申明治諸經者亦有繆刺之法也經經別也足太陽之正別入膕中其一道下尻五寸別入於肛屬於胱胱散之腎足少陰之正至膕中別走太陽而合上至腎足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝足厥陰之正別跗上上至毛際合於少陽足陽明之正上至髀入於腹裡屬胃散之脾足太陰之正上至髀合於陽明手太陽之正指地別於肩解入腋走心系小腸手少陰之正別入淵腋兩筋之間屬於心上走喉嚨出於面合目內眥手太陽之正指天別於巔下走三焦散於胸中手心主之正別下淵腋三寸入胸中別屬三焦手陽明之正從手循膺乳下走大腸屬於肺上循喉嚨手太陰之正別入淵腋少陰之前入走肺散之太陽上出缺盆復合陽明此十二經之別脈亦陽走陰而陰走陽者也故治在諸經者巨刺之如邪在所過者不病是邪盛於左而病反在右邪在於右而病反在左或邪在於陽之經而移易於陰經者或在陰之經而移易於陽經者又當左取右而右取左也按以上十二經別亦皆繫於五臟是以下文論邪客於五臟之間引脈而痛者當繆取之也耳聾刺手陽明不已刺其通脈出耳前者此言經別之與經脈相通也夫十二經正乃十二經脈之別道路雖分其源流通貫故刺經不已當復刺其脈焉通脈出於耳前者謂手陽明之脈上出於耳前循禾髎迎香而通於足陽明胃脈者耳聾刺手陽明者承上文而言邪客於手陽明之經而病耳聾者則當治其經如不已此邪入於脈即取耳前之脈以刺之則其病立已矣齒齲刺手陽明不已刺其脈入齒中立已齲音區齒齲齒痛也此言邪客於手陽明之經別而為齒痛者則當取之經如不已此邪入於脈即刺其入齒中之脈舉一經而十二經可類推矣然獨提手陽明者何也手陽明之脈交人中而左之右右之左如病在耳而取之耳痛在齒而取之齒是隨其病之所在而取之若病在上而取之下又當以繆刺者也上章論大絡與經脈相通此論經別與經脈相通上章論邪客於足陽明之經下節論繆傳引上齒痛皆病在上而取之下所當繆刺此論邪在於手陽明之脈病在上而取之上者不必繆刺蓋手足陽明之經皆左右相交於人中承漿之間言繆刺之證不則大絡之奇病如十二經別足陽蹺之脈及手足陽明二經皆有繆刺之證當知繆刺者因經脈之左右互交而取之也邪客於五臟之間其病也脈引而痛時來時止視其病繆刺之於手足爪甲上視其脈出其血間日一刺一刺不已五刺已此邪客於五臟之間而病及於經別也蓋十二經別內散通於五臟外交絡於形身故邪在五臟之間其為病也引脈而痛者當取手足之井穴隨其所病之經而繆刺之時來時止者邪隨氣而或出或入也視其脈者視其皮部有血絡者即瀉出之間日一刺者邪客之深也五刺已者五臟之氣平也張兆璜曰以其時來時止始知邪客於五臟之間繆傳引上齒齒唇寒痛視其手背脈血者去之足陽明中指爪甲上一痏手大指次指爪甲上各一痏立已左取右右取左繆傳者謂手陽明之邪繆傳於足陽明之脈也足陽明之脈入上齒中還出夾足左右相交於承漿此邪客於手陽明之經別而繆傳於足陽明之脈致引入上齒而使齒唇寒痛當先視其手背之脈有留血者去之以瀉手陽明經別之邪取足陽明中指之內庭以瀉上齒之痛再刺手大指之少商手次指之商陽以瀉手陽明經別之本病此左右相交於承漿而取刺在下故當繆刺者也此章論十二經別與十二經脈相通而手之陽明又可通於足陽明者也邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若屍或曰屍厥刺其足大指內側爪甲上去端如韭葉後刺足心後刺足中指爪甲上各一痏後刺手大指內側去端如韭葉後刺手心主少陰銳骨之端各一痏立已不已似竹管吹其兩耳鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已此申明諸脈生始出入之原耳者宗脈之所聚也所謂宗脈者百脈之宗也百脈皆始於足少陰腎生於足陽明胃輸於足太陰脾主於手少陰心朝於手太陰肺是以五脈之氣皆會於耳中絡左角者肝主血而居左其氣直上於巔頂也五絡俱竭則榮衛不行故令人身脈振振而形無知也其狀若屍或曰屍厥蓋人之所以生動者藉氣呴而血濡血氣不行則其形若屍矣刺足大指足太陰之隱白刺足心足少陰之湧泉刺足中指足陽明之厲兌刺手大指手太陰之少商刺手心主手少陰之神門使血氣疏通其厥立已如不已用竹管吹其兩耳以通宗脈之氣鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之蓋發者血所生也充膚熱肉生毛髮之血肝所主也肝居左故鬄其左角之發以通榮血酒者熱谷之悍液也衛者水穀之悍氣也故飲酒者隨衛氣先行皮膚先充絡脈故飲以美酒一杯以通衛氣榮衛運行則其人立疏矣此節復結大絡之氣先行於皮膚先充絡脈是以皮膚孫絡之邪不入於經則流溢於大絡而生奇病也按神農本經發者血之餘服之仍自還神化蓋血者神氣也中焦之汁奉心神化赤而為血故服之有仍歸於神化之妙曰方寸者言其心所主也灌者欲其灌溉於四旁也夫醫者意也以意逆之思過半矣凡刺之數先視其經脈切而從之審其虛實而調之不調者經刺之有痛而經不病者繆刺之因視其皮部有血絡者盡取之此繆刺之數也此總結治法又當先治其經脈也數幾也言凡刺之有幾而各有所取也經脈者臟腑之十二經脈如江河之徑道也絡脈者如江河之支流孫絡者如支流之更有支流也經者經別也如江河之別道江從此而通於河河從此而通於江此陰陽相合之道路故又曰經正絡者大絡也如江河之外別有江河而外與經脈之孫絡相通然而總歸出於海海之所以行雲氣於天下者從大絡而充於皮膚海之潮汐從經脈而流溢於支絡是以始受之邪從皮膚而入於孫絡從孫絡而入於絡脈從絡脈而入於經脈極於五臟散於腸胃故當先治其經脈切而從之審其虛實而調之不調者以經刺之如身有痛而經脈不病者此流溢於大絡所當繆刺者也因視其皮部有血絡者盡取之此繆刺之數也王芳侯曰邪氣從外而入正氣從內而出知其所出之道路後能知邪入之淺深故為根本之學四時刺逆從論篇第六十四厥陰有餘病陰痹不足病生熱痹滑則病狐疝風澀則病少腹積氣此論六氣之內合於五臟也曰厥陰少陰太陽少陽論六氣之為病也曰皮肉筋骨脈者因六氣而及於五臟之外合也曰心肝脾肺腎者因六氣而及於五臟之次也有餘者多氣少血不足者血氣皆少滑者陽氣盛微有熱澀者多血少氣微有寒痹者閉也血氣留著於皮肉筋骨之間而為痛也氣病之謂疝血病之謂積蓋氣盛而生熱則為疝痛血多而凝泣故成積也厥陰者陰之極也陰極而陽生得中見少陽之火化故有寒有熱也厥陰主春生風木之氣故首論厥陰焉張兆璜問曰厥陰止曰寒熱而以少陽病筋病肝者何也曰此論病在六氣而及於五臟者也厥陰不從標本從乎中也從中者以中氣為化也少陰有餘病皮痹隱軫不足病肺痹滑則病肺風疝澀則病積溲血太陰有餘病肉痹寒中不足病脾痹滑則病痹風疝澀則病積心腹時滿陽明有餘病脈痹身時熱不足病心痹滑則病心風疝澀則病積時善驚太陽有餘病骨痹身重不足病腎痹滑則病腎風疝澀則病積善時巔疾少陽有餘病筋痹脅滿不足病肝痹滑則病肝風疝澀則病積時筋急目痛三陰三陽有多血少氣者有多氣少血者惟陽明血氣皆多蓋血氣之生於陽明也榮血行於脈中乃陽明水穀之精上歸於心淫精於脈脈氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑者在外之皮肉筋骨也腑精與神明相合而通於五臟氣復歸於權衡此脈氣之生始出入也是以陽明之有餘不足則為脈痹心痹心主脈而上歸於肺肺主皮毛毛脈合精於皮膚之間是以少陰之為皮痹肺痹也脈氣散於皮毛復從太陰所主之肉少陽所主之筋太陽所主之骨而內通於五臟是以有餘而在外則為肉痹筋痹骨痹不足而陷於內則為脾痹肝痹腎痹矣至氣有餘於內而為熱則為疝血有餘於內而為寒則為積矣故所謂風者熱所生也所謂身重者病在氣也所謂溲血腹滿善驚目痛者病在血也此三陰三陽所主之血氣生始出入各有太過不及之為病也愚按此章無問答之起句乃伯承上章而言是故春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中此承上文而言脈氣之隨四時生長收藏外出於皮膚內通於五臟環轉之無端也帝曰余願聞其故岐伯曰春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈夏者經滿氣溢入孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉守塞皮膚引急冬者蓋藏血氣在中內著骨髓通於五臟夫經脈為里支而橫者為絡絡之別者為孫是血氣之從經脈而外溢於孫絡從孫絡而充於皮膚從皮膚而復內溢於肌中從肌肉而著於骨髓通於五臟是脈氣之散於脈外而復內通於五臟也夫天為陽地為陰陰陽合而血氣始生腎主冬令之水而為生氣之原陽明乃血氣所生之府故曰谷入於胃脈道乃行水入於經而血乃成然藉腎中之生氣戊癸合化而後生此水穀之精微故天氣開地氣泄凍解冰釋水行經通腎臟之冬令已得春生之氣而人氣始在脈是人氣之通於天也故曰春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生日中人氣長夕則人氣收夜半人氣在臟人與天地參也愚按繆刺篇論衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平榮氣乃滿而經脈大盛是衛氣之通於脈內也此篇言血氣之從經而絡從絡而皮復從皮膚肌肉而內著骨髓通於五臟是榮血之行於脈外也當知榮行脈中衛行脈外者論通體之經脈也至於血氣之生始出入營於脈中滲於脈外充膚熱肉生毫毛內入於募原而通於臟腑表裡上下無處不周醫者能洞悉血氣之原流而後能導邪病之窾卻故帝曰經脈者人之所以生病之所以成人之所以治病之所以起學之所始工之所止也粗之所易上之所難也習上乘者可不於針刺諸篇用心求之是故邪氣者常隨四時之氣血而入客也至其變化不可為度然必從其經氣闢除其邪除其邪則亂氣不生邪氣者在天六淫之邪也四時之血氣者春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中也至其變化不可為度者謂天有六淫之邪而人有形層六氣之化也如邪留於外則為皮肉筋骨之痹合於內則為心肝脾肺之痹矣如留於氣分則為疝留於血分則為積矣如身中之陽盛則為熱虛寒則為寒矣此皆吾身中陰陽虛實之變化也然必從其四時之經氣闢除其邪則變亂之氣不生矣帝曰逆四時而生亂氣奈何岐伯曰春刺絡脈血氣外溢令人少氣春刺肌肉血氣環逆令人上氣春刺筋骨血氣內著令人腹脹此言血氣之隨時環轉自有出入之度不可使之妄行也夫刺者所以取氣也春氣在經脈而取之於絡脈則血氣外溢而令人少氣矣至於肌肉則血氣環逆而令人上氣矣環逆者逆其環轉也言血氣之從經而絡從絡而皮從皮膚而復環轉於肌中也至於筋骨則血氣內著而令人腹脹矣王芳侯曰此後添出筋字蓋以四時六氣而言則春主筋而少陽主筋以形層而言則皮而肉肉而筋筋而骨也夏刺經脈血氣乃竭令人解㑊夏刺肌肉血氣內卻令人善恐夏刺筋骨血氣上逆令人善怒夏氣盛長而血氣已外出於孫絡矣若再取之於經脈則血氣內竭而令人懈惰也血脈出於陽明外溢於肌腠夏氣在孫絡而使之溢於肌中則血氣虛卻於內矣陽明脈虛則恐如人將捕之夏氣浮長於上而反逆之使下則氣鬱不疏而使人善怒也上逆當作下逆秋刺經脈血氣上逆令人善忘秋刺絡脈氣不外行令人臥不欲動秋刺筋骨血氣內散令人寒慄秋令降收而反令其生長故使血氣上逆而令人善忘也血氣從絡脈而充於皮膚從皮膚而內溢於肌肉秋刺絡脈則血氣不外行於皮膚肌肉之間故令人臥不欲動蓋肌肉者脾所主也脾病者嗜臥不欲動夫秋令始降而反取之筋骨使血氣散於內而令人寒慄矣按秋氣在皮膚長夏之氣在肌肉長夏者夏秋之交也此篇論經脈之氣從經脈而外出於孫絡從孫絡而充於皮膚從皮膚而內溢於肌中從肌中而著於筋骨是皮膚尚屬出機至肌肉始屬迴轉之降令故此章以肌肉主秋令者從脈氣之環轉故也冬刺經脈血氣皆脫令人目不明冬刺絡脈內氣外泄留為大痹冬刺肌肉陽氣竭絕令人善忘冬主閉藏以奉春生之氣應藏而反泄之故使血氣皆脫於內而令人目不明蓋五臟之精皆注於目而為之睛冬者血氣在中內著骨髓通於五臟血氣內脫則五臟皆虛故令人目不明也冬刺絡脈則內氣外泄而留為大痹大痹者臟氣虛而邪氣痹於五臟也陽氣生於陰中出於肌腠至冬令之時復歸於陰藏冬刺肌肉是取所藏之氣於肌腠之外故使陽氣竭絕於內而令人善忘也凡此四時刺者大逆之病不可不從也反之則生亂氣相淫病焉凡逆刺其四時之經氣則變生大病故不可不從也亂氣變亂之氣也相淫者血氣淫泆也此言不從四時之氣則正氣變亂而為病也故刺不知四時之經病之所生以從為逆正氣內亂與精相薄此言邪氣者常隨四時之氣血而入客也故不知四時之經病之所生以從為逆使正氣內亂而邪與精相薄矣此篇重在六經之氣血還轉出入宜順而不宜逆故上節先論正氣為病此始論其邪下節復論其正氣必審九候正氣不亂精氣不轉此言知四時之逆從者必審察其九候也九候者有天有地有人在天主氣在地主血在人主脈知血氣經脈出入之源流則正氣不致內亂而精氣不逆回矣帝曰善刺五臟中心一日死其動為噫中肝五日死其動為語中肺三日死其動為咳中腎六日死其動為嚏欠中脾十日死其動為吞刺傷人五臟必死其動則依其臟之所變候知其死也刺五臟者謂刺傷其五臟之氣也蓋三陰三陽之六氣名合於皮肉筋骨脈脈肉筋骨內合於五臟如病肺痹肺風脾痹脾疝則當取氣於皮取氣於肉不可逆刺以傷其臟真故曰刺傷人五臟必死各依其藏之所變候而知其死期蓋刺五臟則動其臟氣動臟氣則變候見於外矣按五臟外合五時六經上應六氣診要經終篇以六氣應五臟而終於六經此篇以六經應四時而終於五臟診要篇以經脈之生於五臟而外合於六經此篇以經脈之本於六氣而內連於五臟蓋脈氣之循於皮肉筋骨內合五行外合六氣外內之交相生始出入者也是以一篇之章句雖同而旨意各別學者宜分析體會不可以其重而忽之張兆璜曰診要篇論逆刺其臟氣之所出而中傷五臟故曰凡刺胸腹者必避五臟此篇論刺六經之內入而中傷五臟故曰內通五臟刺五臟中心一日死謂刺外合之皮肉筋骨脈而不可中傷其臟也標本病傳論篇第六十五黃帝問曰病有標本刺有逆從奈何標本者六氣之化病傳者五臟相傳此篇承上章而言六氣為病有四時之順逆而又有標本之逆從五臟受傷有刺中之死期而又有病傳之日數是以靈樞原屬二篇本經合而為一蓋謂五臟六氣外內相合始病在六氣而不亟治之則傳入五臟而為不救之死證矣岐伯對曰凡刺之方必別陰陽前後相應逆從得施標本相移陰陽者三陰三陽之六氣也少陽標陽而本火太陰標陰而本濕少陰標陰而本熱太陽標陽而本寒陽明標陽而本燥厥陰標陰而本風少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也從本者化生於本從標本者有標本之化從中者以中氣為化也前後相應者有先病後病也逆從得施者有逆取而得者有從取而得者標本相移者有取標而得者有取本而得者故曰有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者故知逆與從正行無間知標本者萬舉萬當不知標本是謂妄行故曰者引至真要大論而言也有其在標而求之於標者謂病三陰三陽之六氣即於六經中求之以治標有其在本而求之於本者謂病風寒暑濕燥火六淫之邪即於六氣中求之以治本有其在本而求之於標者如寒傷太陽乃太陽之本病而反得標陽之熱化即求之於標而以涼藥治其標熱有其在標而求之於本者如病在少陰之標陰而反得君火之本熱即求之於本以急瀉其火故百病之起有生於本者有生於標者有取本而得者有取標而得者有逆取而得者有從取而得者逆取而得者謂寒者熱之熱者寒之結者散之散者收之留者攻之燥者濡之從取而得者謂熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已夫陰陽逆從標本之為道也小而大言一而知百病之害陰陽逆從者謂三陰三陽之氣有勝有復也王冰曰著之至也言別陰陽知逆順法明著見精微觀其所舉則小循其所利則大以斯明著故言一而知百病之害少而多淺而博可以言一而知百也王冰曰言少可以貫多舉淺可以料大者何法之明故非聖人之道孰能至於是耶故學之者猶可以言一而知百病也博大也以淺而知深察近而知遠言標與本易而勿及王冰曰雖事極深遠人非咫尺略以淺近而悉貫之然標本之道雖易可為言而世人識見無能及者治反為逆治得為從相反而治為逆治相得而治為從治相得者如熱與熱相得寒與寒相得也先病而後逆者治其本先逆而後病者治其本逆者勝克之氣也先病者謂吾身中先有其病也先逆先寒先熱者謂在天之六氣也先病而後逆者如吾身中先有脾土之病而後復感其風邪重傷脾土則當先治其脾土而後治其風邪如先感天之風邪克傷中土以致脾臟為病是當先治其風邪而後調其脾土故曰言標與本易而勿損察本與標氣可令調明知勝復為萬民式天之道畢矣先寒而後生病者治其本先病而後生寒者治其本先寒者寒淫所勝也以吾身感之而生病者是當治其寒邪如先病而後生寒者當治其身之本病而寒氣自解矣張兆璜曰先寒者客氣生寒者同氣先熱而後生病者治其本先熱而後生中滿者治其標先熱者熱淫所勝也以吾身感之而生病者是當治其本熱如吾身感之而生中滿者又當治其中滿蓋六淫之邪始傷六氣若致中滿則病氣入內故當治其內先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病泄者濕土之病也他病者如濕邪所勝民病心痛耳聾之類故當先治其虛泄必且調之脾土而後治其他病先病而後生中滿者治其標先中滿而後煩心者治其本人有客氣有同氣至真要大論曰諸脹腹大皆屬於熱如先病熱而後生中滿者是當治其中滿如先病中滿而濕熱之氣上乘於心以致心煩者亦當治其中滿而煩自解矣夫先熱而後生中滿者感天之熱淫而致生中滿也先病而後生中滿者病吾身中之熱而生中滿也故曰人有客氣有同氣客氣者謂在天之六氣同氣者謂吾身中亦有此六氣而與天氣之相同也小大不利治其標小大利治其本如中滿而大小便不利者當先利其二便如小大便利者仍治其中滿蓋邪氣入於腹內必從二便而出病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本有餘者邪氣之有餘不足者正氣之不足也邪氣者風寒暑濕燥火六淫之邪正氣者三陰三陽之六氣也六微旨大論曰少陽之上火氣治之陽明之上燥氣治之太陽之上寒氣治之厥陰之上風氣治之少陰之上熱氣治之太陰之上濕氣治之所謂本也本之下氣之標也此皆以風寒暑濕燥火六氣為本而以三陰三陽之六氣為標故病發而有餘者此風寒暑濕之本氣有餘故當先散其邪氣而後理其陰陽如病發而不足當先調其陰陽而後治其本氣蓋邪氣盛則實精氣奪則虛是以邪氣有餘者先散其邪氣精氣不足者先補其正虛此標本之大綱領也謹察間甚以意調之間者並行甚者獨行先小大不利而後生病者治其本間去聲此言標本之間而又當以意調其間甚也夫邪之所湊其正必虛間者謂邪正之有餘不足二者兼於其間故當並行其治蓋以散邪之中兼補其正補正之內兼散其邪如偏甚者則當獨行其法謂邪氣甚者竟瀉其邪正虛甚者竟補其正此為治之要道也如先大小便不利而後生病者當專治其小大二便又無論其邪正之間甚矣朱永年曰間甚之中又分緩急夫病傳者夫者承上接下之辭按靈樞病傳篇曰折毛髮理正氣橫傾淫邪泮衍血脈傳溜大氣入臟腹痛下淫可以致死不可以致生大氣者即在天之六氣淫勝而太過者也泮衍散蔓而盛也夫邪之中人必先始於皮毛次發於肉理次入於絡脈此淫甚之氣故始於皮毛而使毛折發於肉理而使正氣橫傾泮衍於脈中而使血氣流傳入於臟腑以成卒死之病夫所謂標本者感在天之六氣而病吾身中之陰陽即入於腹內以致中滿者在於募原腠理之氣分若淫邪泮衍於血脈之中則入臟腑為內所因矣故曰善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也心病先心痛一日而咳三日脅支痛五日閉塞不通身痛體重三日不已死冬夜半夏日中心先痛者病先發於心咳者一日而之肺脅支痛者三日而之肝閉塞不通身痛體重者五日而之脾此皆逆傳其所勝是以三日不已而死心為火臟冬之夜半者水勝而火滅也夏之日中者亢極而自焚矣肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死冬日入夏日出肺病喘咳者病先發於肺三日而之肝則脅支滿痛一日而之脾則身重體痛五日而之胃則脹再十日不已死夫冬氣收藏夏氣浮長日出氣始生日入氣收引肺主氣故終於氣之出入也繫辭曰日月運行一寒一暑故只言冬夏者重陰陽寒暑之氣也至如所傳之日數有一三五之奇有二六十之偶亦如六爻之有陰有陽也王子律曰日出為春日中為夏日入為秋夜半為冬以上有二節四時之氣已備肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊少腹痛脛痠三日不已死冬日入夏早食病先發於肝則頭目眩脅支滿三日而之脾則體重身痛五日而之胃則脹三日而之腎則腰脊少腹痛三日不已死夏早食者寅卯之時木氣絕而不生也冬日入者申酉之時金氣旺而木氣絕也脾病身痛體重一日而脹二日少腹腰脊痛脛痠三日背𦛗筋痛小便閉十日不已死冬人定夏晏食𦛗膂同病先發於脾則身痛體重二日而之胃則脹二日而之腎則少腹腰脊痛脛痠三日而之膀胱則背𦛗筋痛小便閉十日不已死馬蒔曰冬之人定在亥謂土敗而水勝也夏之晏食在寅木旺而土絕也王冰曰人定在申後二十五刻晏食在寅後二十五刻王子律曰膀胱之脈循於背足太陽主筋故背𦛗筋痛腎病少腹腰脊痛䯒痠三日背𦛗筋痛小便閉三日腹脹三日兩脅支痛三日不已死冬大晨夏晏晡病先發於腎則少腹腰脊痛三日而之膂膀胱則背𦛗筋痛小便閉三日而之胃則腹脹三日而之肝則兩脅支痛冬之大明在辰土旺而木滅也夏之晏晡在亥水絕而不能生也按靈樞病傳篇曰三日而上之心三日而之小腸是水乘其所勝之火臟火腑也此節與靈樞之不同者心乃君主之官原不受邪膀胱之氣上與陽明相合水邪上乘上焦不受則還轉於中焦而留於陽明矣陽明主秋金之令故復傳之肝木而死下二節大意相同王子律曰玉機真臟論曰腎因傳之心心即復反傳而行之肺此亦心不受邪而復傳之肺也胃病脹滿五日少腹腰脊痛䯒痠三日背𦛗筋痛小便閉五日身體重六日不已死冬夜半後夏日昳病先發於胃故脹滿五日而之腎則少腹腰脊痛脛痠三日而之膂膀胱則背𦛗筋痛小便閉五日而之脾則身體重再六日不已而死冬夜半後者土敗而水勝也夏日昳者乃陽明所主之時土絕而不能生也按靈樞經曰五日而上之心二日不已死此言五日身體重者亦心不受邪而還之脾水行乘土腑邪傳臟而死徐東屏曰一者數之始十者數之終陽數起於一陰數起於二三日死者死於生數之始也六日死者終於成數之始十日死者終於成數之終是有終其所始而終其所終者有死於其所不勝者有死於本氣生之時者此皆陰陽終始之微妙膀胱病小便閉五日少腹脹腰脊痛䯒痠一日腹脹一日身體痛二日不已死冬雞鳴夏下晡此亦腑邪傳臟水泛土敗而死病先發於膀胱則小便閉五日而之腎則少腹脹腰脊痛一日而之胃則腹脹一日而之脾則身體痛冬雞鳴在醜乃少陽太陽生氣之時氣絕而不能生也夏下晡乃陽明生氣之時陽明之氣亦絕矣董帷園曰風乃百病之長大氣風氣也風木之邪故獨乘胃土而行渙膀胱之水液諸病以次是相傳如是者皆有死期不可刺間一臟止及至三四臟者乃可刺也以上諸病如是相勝克而傳者皆有速死之期非刺之可能救也或間一臟相傳而止不復再傳別臟者乃可刺也假如心病傳肝肺病傳脾此乃子行乘母至肝臟脾臟而止不復再勝克相傳於他臟者可刺也假如心病傳脾肺病傳腎乃母行乘子得母藏之生氣不死之證也如心病傳腎肺病傳心肝臟傳肺此從所不勝來者為微邪乃可刺也金西銘曰五臟相傳止可間二臟三臟經言四臟者或臟傳之於腑而後傳於他臟腑亦可以名臟也
