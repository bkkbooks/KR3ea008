body:
  text: 卷七皮部論篇第五十六黃帝問曰余聞皮有分部脈有經紀筋有結絡骨有度量其所主病各異別其分部左右上下陰陽所在病之始終願聞其道此章論十二經之絡脈分絡於皮膚之間病之始生必先於皮毛入客於絡脈隨皮部所循之脈而傳入於經入舍於所主之臟腑如不入於絡則留於筋骨之間而為筋攣骨痛也分部分屬之部署也經徑也紀維也言脈絡有徑之經橫之維也結繫結也絡連絡也言筋之繫於分肉連於骨節也度量大小長短也邪在皮肉筋骨絡脈臟腑各有淺深或為筋攣骨痛肉鑠破䐃或入舍於臟腑而為臟腑之病也別其絡脈所分之上下左右十二經脈之陰陽所在而知病之始終也岐伯對曰欲知皮部以經脈為紀者諸經皆然夫徑而深者為經浮而見於皮者為絡紀記也欲知皮之分部當以所見之絡脈分之然又當以經脈為紀蓋絡乃經脈之支別如肺之經脈循於魚際尺澤臑腋之間即其間所見之絡脈乃肺之絡而絡外之皮即肺主之部矣視其色多青則寒黃赤則熱絡盛則入客於經經滿則入舍於肺臟十二經皆然陽明之陽名曰害蜚陽明之陽絡名曰害蜚蜚飛動也陽明者午也為盛陽之時如萬物之飛動陽盛而陰氣加之有害於飛故名曰害蜚上下同法視其部中有浮絡者皆陽明之絡也上下同法謂手足二經皆同此法部中皮之分部中也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經夫邪之中人始於皮膚次於絡脈留而不去則傳舍於經故視其皮部之浮絡多青則痛多黑則痹黃赤則熱多白則寒五色皆見則為寒熱絡盛而不瀉其邪則入客於經矣在陽明之部分則為陽明之病在少陽之部分則為少陽之病在三陰之部分則為三陰之病故列於首節而六經皆然陽主外陰主內此言經絡之分陰陽外內也經云內有陰陽外有陰陽在外者皮膚為陽筋骨為陰故見於皮膚間者為絡為陽而主外絡於筋骨間者為經為陰而主內蓋在陽者可從外解在陰者則內入而舍於臟腑矣按通評虛實論曰絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽蓋以絡為陽而經為陰也少陽之陽名曰樞持樞樞機也持主持也少陽主樞故名樞持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然此復論經氣之從內而外出也夫五臟內合五行地之陰陽也六經外合六氣天之陰陽也天之六氣下合地之五行地之五行上呈天之六氣是以在外六經之氣從陽而內在內經脈之氣從陰而外出於皮膚復從皮膚而入於肌肉筋骨以滲於臟腑募原之間而內通於五臟此論經脈之氣環轉無端蓋從內而外也詳本經四時刺逆從論太陽之陽名曰關樞關衛固也太陽主諸陽之氣而主表陽氣生於陰中樞轉而外出太陽之氣從內而出衛固於外故曰關樞上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經上下謂手足二經六氣止合六經足之六經上合於手故止曰上下同法而不言手之小腸足之膀胱也六經皆然少陰之陰名曰樞儒儒說文柔也王氏曰順也少陰為三陰開闔之樞而陰氣柔順故名樞儒上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨四時刺逆從論曰春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈夏者經滿氣溢入孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉塞皮膚引急冬者蓋藏血氣在中內著骨髓通於五臟此言經脈之氣從經脈而出於孫絡從孫絡而溢於皮膚復從皮膚而入於肌肉筋骨故曰其出者從陰內注於骨陰謂經脈也言脈氣之環轉從經而出復從外而內注於骨諸經皆然此論三陰而少陰又主冬主骨故復申明之王芳侯曰其入經也從陽部注於經論邪氣之從外而入其出者從陰內注於骨論正氣之從內而出心主之陰名害肩陰謂厥陰之絡也兩陰交盡故曰厥陰肩任也謂任一身之陰陰極而一陽加之故曰害肩上下同法視其部中曰有浮絡者皆心主之絡也絡盛則入客於經上謂手厥陰心主下謂足厥陰肝經此篇論絡脈經脈而手厥陰心主主脈故提手厥陰焉太陰之陰名曰關蟄蟄者陰藏蟄動之蟲蓋氣藏於陰而欲動蟄於外乃太陰關之故名關蟄夫內為陰外為陽也榮衛篇曰太陰主內太陽主外樞轉外出之陽而太陽關之故名關樞陰藏動蟄之氣而太陰關之故名關蟄兩陽合明故曰陽明兩陰交盡故曰厥陰以陽盛而一陰加之故曰害蜚陰極而一陽加之故曰害肩少陽主三陽之樞故曰樞持少陰主三陰之樞故曰樞儒以三陰三陽對待論之命名之義自得矣上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經凡十二經絡脈者皮之部也六臟六腑所合十二經之絡脈各分屬於皮之部署是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃此言邪入於經有不動臟而溜於腑者傳入於腑謂入於大腸小腸胃腑也廩積也夫經絡受邪則內干臟腑其臟氣實者不必動臟則溜於腑矣蓋陽明居中土為萬物之所歸邪入於胃則積於腸胃之間為賁響腹脹諸證邪之始入於皮也泝然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉鑠䐃破毛直而敗此論邪之有入於經絡而虛陷於內者有留於筋骨之間而為筋攣骨痛者蓋皮肉筋骨皆屬氣分絡脈經俞皆屬血分經絡內連臟腑是以經絡受邪入臟腑為內所因如不入於絡則留於皮肉筋骨之間為外皮膚所中也泝然寒慄逆起之貌邪盛於絡則變見青黃赤黑之色於皮部轉入於經則感臟腑之氣虛而陷下也如留於筋骨之間則為筋攣骨痛鑠肉破䐃毛直夭焦之敗證帝曰夫子言皮之十二部其生病皆何如岐伯曰皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也故皮者有分部不與而生大病也帝曰善此言邪入於經而內干臟腑也不與不及也言皮毛之表氣微虛以致邪入於經而為干臟之危病也經絡論篇第五十七黃帝問曰夫絡脈之見也其五色各異青黃赤白黑不同其故何也此承上章而復問也言絡脈之五色各異而為痛痹寒熱之證者其故何也岐伯對曰經有常色而絡無常變也言經脈有五行之常色絡脈則隨四時之變而無常色也帝曰經之常色何如岐伯曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色也此言經脈應五臟故有常色也經謂十二經脈五臟具五色亦皆應其經脈而為青黃赤白黑之常色也帝曰絡之陰陽亦應其經乎帝言經脈應五臟而成五色絡脈之陰陽亦當應其經矣岐伯曰陰絡之色應其經陽絡之色變無常隨四時而行也此言陰絡應經脈而成五色陽絡隨四時而成五色也陰絡者六陰經之絡應五臟之經各有常色而不變陽絡者六陽經之絡合六腑之陽隨四時之春青夏赤秋白冬黑併為變易者也此皆四時五行之常色謂之無病若四時之中五臟之絡見青黑為寒見黃赤則為熱矣王芳侯曰陽者天氣也主外陰者地氣也主內六腑為陽外應三陽之氣五臟為陰內合地之五行是以陽絡隨天之四時色變無常而內通於五臟五臟內應五行而外合於三陽臟腑陰陽又互相交合者也寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此皆常色謂之無病五色具見者謂之寒熱帝曰善此言色變之因於寒熱也泣同澀凝泣淖澤謂絡中之血氣此皆常色謂之無病八字當在隨四時而行也之下誤脫在此王芳侯曰內因之寒熱由陰而及陽外因之寒熱由陽以及陰是以病色之無分乎陽絡陰絡也氣穴論篇第五十八黃帝問曰余聞氣穴三百六十五以應一歲未知其所願卒聞之岐伯稽首再拜對曰窘乎哉問也其非聖帝孰能窮其道焉因請溢意盡言其處穴乃氣之所注故曰氣穴而不論及於經脈也所謂氣穴所在之處卒盡也針經曰天至高不可度地至廣不可量夫人生於天地之間六合之內此天之高地之廣也非人力之所能度量而至也若夫八尺之士皮肉在此外可度量切循而得之其死可解剖而視之其臟之堅脆腑之大小谷之多少脈之長短血之清濁氣之多少非聖者孰能窮其道是以岐伯稽首再拜曰窘乎哉問也莫仲超曰知血氣之生始經脈之貫通乃醫學之根本學者當於諸刺論中求之帝捧手逡巡而卻曰夫子之開余道也目未見其處耳未聞其數而目以明耳以聰矣逡巡退讓貌未睹未聞而耳聰目明者神志會通也岐伯曰此所謂聖人易語良馬易御也帝曰余非聖人之易語也世言真數開人意今余所訪問者真數發蒙解惑未足以論也然余願聞夫子溢志盡言其處令解其意請藏之金匱不敢復出真數者脈絡之穴數藏之金匱者謂非其人勿教非其真勿授乃金匱之真言上帝之所貴也岐伯再拜而起曰臣請言之背與心相控而痛所治天突與十椎及上紀上紀者胃脘也下紀者關元也心謂心胸也夫背為陽胸腹為陰督脈循於背總督一身之陽任脈循於腹統任一身之陰控引也背與心相控而痛者陰陽相引而為痛也此先論陰陽二氣總屬任督之所主而後論臟腑陰陽之氣各有所注之穴焉天突在結喉下中央乃陰維任脈之會十椎在大椎下第七椎乃督脈至陽之穴督脈陽維之會也蓋大椎上尚有三椎總數之為十椎也胃脘中脘也中脘者胃之募也王冰曰手太陽少陽足陽明三脈所生脈氣所發也關元在臍下三寸足三陰任脈之會此四穴者乃陰陽氣之交會也張兆璜曰先以胸背分陰陽後以上下分陰陽背胸邪系陰陽左右如此其病前後痛澀胸脅痛而不得息不得臥上氣短氣偏痛此釋上文而言背胸之邪繫於陰陽引及於左右偏痛亦如此蓋左為陽而右為陰也其病前後痛澀者背胸邪系陰陽也胸脈痛者其脈絡胸脅故左右如此也不得息不得臥上氣短氣者督脈上貫心膈入喉任脈入膻中上喉嚨也偏痛者其脈斜出尻絡脅上肩而斜下也脈滿起斜出尻脈絡胸脅支心貫膈上肩加天突斜下肩交十椎下此言陰陽系邪胸背相引由任督之相交任督之合又由督之大絡而交通於任脈也督之大絡名曰長強挾脊上項散頭上下當肩胛左右別走太陽入貫膂所謂大絡者若江河之外別有江河經脈滿則轉溢於大絡故督脈滿則斜出於尻脈蓋督脈之別斜出於尻絡胸脅也其絡支心貫膈上肩胛而與任脈交會於天突復斜下肩而與督脈交合於十椎下間故胸背相控而痛所治在天突與十椎間者乃大絡之通會處也張兆璜曰陽常有餘而陰常不足故不曰交而曰加者謂陽加於陰有陽施陰受之義也臟俞五十穴臟謂五臟俞經俞之穴也臟各有五五五二十有五左右合之共五十穴也五者井滎俞經合所出為井俱在手足趾上離爪甲一韭許所入為合皆在手足之肘膝間而不過肘膝五臟六腑皆然肝之井曰大敦滎曰行間俞曰太衝經曰中封合曰曲泉心之井曰少衝滎曰少府俞曰神門經曰靈道合曰少海脾之井曰隱白營曰大都俞曰太白經曰商邱合曰陰陵泉肺之井曰少商滎曰魚際俞曰太淵經曰經俞合曰尺澤腎之井曰湧泉滎曰然谷俞曰太谿經曰復溜合曰陰谷此五臟之五俞出於井木溜於滎火注於俞土行於經金入於合水也腑俞七十二穴六腑各有六六六三十六穴左右合之共七十二穴亦皆出於手足之指端入於肘膝之合穴六者井滎俞經原合也膽之井曰竅陰滎曰俠谿俞曰臨泣原曰丘墟經曰陽輔合曰陽陵泉胃之井曰厲兌滎曰內庭俞曰陷谷原曰衝陽經曰解谿合曰三里大腸之井曰商陽滎曰二間俞曰三間原曰合谷經曰陽谿合曰曲池小腸之井曰少澤滎曰前谷俞曰後谿原曰腕骨經曰陽谷合曰少海三焦之井曰關衝滎曰液門俞曰中渚原曰陽池經曰支溝合曰天井膀胱之井曰至陰滎曰通谷俞曰束骨原曰京骨經曰崑崙合曰委中此六腑之俞出於井金溜於滎水注於俞木行於原經火入於合土蓋天為陽地為陰腑為陽臟為陰故臟合地之五行腑合天之六氣六氣之中有二火是以多原穴也原者謂火之原生於陰中之少陽也張兆璜曰臟氣出於井木腑氣出於井金蓋春夏者天之陰陽也秋冬者地之陰陽也臟始於天之春木而終於冬令之水腑始於地之秋金而復交於春夏此皆臟腑陰陽更互之妙用故曰天有陰陽地亦有陰陽木火土金水地之陰陽也生長化收藏下應之故陽中有陰陰中有陽夫生長化收藏在天四時之氣也而五臟五行應之故曰陽中有陰陰中有陽熱俞五十九穴頭上五行行五五五二十五穴大杼膺俞缺盆背俞各二共八穴氣街三里巨虛上下廉各二共八穴雲門髃骨委中髓空各二共八穴五臟俞旁各五計十穴通共計五十九穴水俞五十七穴尻上五行行五五五共二十五穴伏兔上各二行行五五四共二十穴踝上各一行行六計十二穴通共五十七穴以上一百十六穴詳水熱穴論頭上五行行五五五二十五穴此節熱俞內穴重言之者謂熱俞即是氣穴可以取氣可以瀉熱亦可使熱邪隨氣而泄故下文曰熱俞在氣穴中𦛗兩旁各五凡十穴𦛗膂同在脊骨兩旁各開一寸五分足太陽膀胱經之五臟俞也肺俞在三椎間心俞在五椎間肝俞在九椎間脾俞在十一椎間腎俞在十四椎間大椎上兩旁各一凡二穴大椎兩旁足太陽膀胱經之大杼穴也脊骨之高起曰椎大椎上者謂大椎高起間之兩旁非椎之上節也王氏誤認為椎之上節故云甲乙經脈流注孔穴圖經並不載未詳何俞王芳侯曰兩旁各一凡此五字為首節之總綱故以後不言此五字者以每節咸准此也目瞳子浮白二穴瞳子髎在目銳眥浮白穴在耳後髮際內一寸左右各一凡四穴俱屬足少陽膽經兩髀厭分中二穴謂髀樞中環跳穴也屬足少陽膽經犢鼻二穴犢鼻穴在膝髕下䯒骨上俠解大筋陷中屬足陽明胃經耳中多所聞二穴一名聽宮在耳中珠子大如赤小豆屬手太陽小腸經眉本二穴攢竹穴在眉間陷中屬足太陽膀胱經完骨二穴完骨穴在耳後入髮際四分屬足少陽膽經項中央一穴風府穴在項後入髮際一寸大筋內宛宛中督脈陽維之會疾言其肉立起言休其肉立下枕骨二穴枕骨穴一名竅陰穴在完骨上枕骨下動搖有空屬足少陽膽經上關二穴一名客主人在耳前起骨上廉開口有空張口取之乃得屬足少陽膽經大迎二穴大迎穴在曲頷前一寸三分骨陷中動脈屬足陽明胃經下關二穴下關穴在上關下耳前動脈下廉合口有空開口則閉閉口有穴屬足陽明胃經天柱二穴天柱穴在俠項後髮際大筋外廉陷中屬足太陽膀胱經巨虛上下廉四穴巨虛上廉在三里下三寸舉足取之巨虛下廉在上廉下三寸蹲地舉足取之左右共四穴共屬足陽明胃經曲牙二穴即頰車穴一名機關在耳下曲頰端近前陷中開口有空屬足陽明胃經天突一穴天突穴在結喉下四寸宛宛中屬任脈天府二穴天府穴在腋下三寸臂臑內動脈陷中屬手太陰肺經天牖二穴天牖穴在頸筋間缺盆上天容後天柱前完骨下髮際上屬手少陽三焦經扶突二穴扶突穴在頸大筋間下一寸人迎後一寸半仰而取之屬手陽明大腸經天窗二穴一名窗籠在頸大筋間前曲頰下扶突後應手陷中屬手太陽小腸經肩解二穴即肩井穴在肩上陷中缺盆上大骨前一寸半以三指按取當中指下陷中屬足少陽膽經關元一穴在臍下三寸屬任脈委陽二穴委陽穴在承扶下一寸六分屈身取之屬足太陽膀胱經肩貞二穴肩貞穴在曲胛下兩骨解間肩髃後陷者中屬手太陽小腸經喑門一穴一名瘂門又名舌厭在項後風府後一寸入髮際五分項中央宛宛中入系舌本督脈陽維之會齊一穴臍中有神闕穴一名氣舍當臍中央禁刺屬任脈胸俞十二穴謂足少陰腎經之俞府彧中神藏靈墟神封步廊左右共十二穴各開中行二寸俞府在巨骨下璇璣旁二寸陷中下五穴遞相下同身寸一寸六分陷者中背俞二穴謂膈俞穴在大椎下第七椎間各開中行一寸五分膺俞十二穴胸之兩旁曰膺膺俞者謂手太陰之雲門中府足太陰之周榮胸鄉天溪食竇左右共十二穴雲門在巨骨下俠氣戶旁二寸陷中去胸中任脈兩旁橫開各六寸動脈應手中府下雲門一寸餘五穴遞相下同身寸之一寸六分陷者中分肉二穴一名陽輔穴在足外踝上四寸輔骨前絕骨之端屬足少陽膽經踝上橫二穴踝葉瓦去聲謂內踝上之交信穴去內踝上二寸少陰前太陰後筋骨間陰蹺之郄屬足少陰腎經外踝上跗陽穴去外踝上二寸太陽前少陽後筋骨間陽蹺之郄屬足太陽膀胱經左右共四穴陰陽蹺四穴陰蹺穴在足內踝下是謂照海陰蹺脈之所生陽蹺在足外踝下五分是謂申脈陽蹺脈之所生愚按脈度一十六丈二尺內兼任督蹺脈故氣穴亦如之蓋穴者脈氣之所注也水俞在諸分熱俞在氣穴寒熱俞在兩骸厭中二穴此言寒熱之邪皆從氣分而出夫百病之始生也皆生於風雨寒暑風暑天之陽熱雨水地之陰寒感天地之寒熱病吾身之陰陽是氣分之邪當從氣分而出故名之曰氣穴論謂以上三百六十五穴以應周天之氣數所以取氣所以瀉邪者也諸分者大小分肉之間皮膚肌腠之氣分也氣穴者榮衛血氣之所注也膝解為骸兩骸厭中二穴謂足少陽之陽陵泉也夫十一臟腑之氣皆取決於膽謂少陽主初生之氣也故寒熱獨取於兩骸厭中者謂在臟在腑其寒其熱之邪皆從少陽之氣以升散故邪氣臟腑病形篇曰其寒熱者取陽陵泉大禁二十五在天府下五寸此言有大禁之穴在天府下五寸乃手陽明大腸經之五里穴也靈樞本輸篇曰尺動脈在五里五腧之禁也玉版論曰迎之五里中道而止五至而已五往而臟之氣盡矣故五五二十五而竭其輸矣五往五刺也謂五臟各有五俞五俞五刺五五二十五刺則五臟之氣盡矣故曰大禁二十五謂禁二十五刺也此言三百六十五穴之血氣由五臟大絡之所注也凡三百六十五穴針之所由行也自天突十椎上紀關元至厭中二穴共計三百六十四穴然內多重複想有簡脫故不全耳帝曰余已知氣穴之處遊針之居願聞孫絡溪谷亦有所應乎居止也謂針所止之處也遊針者謂得針之道而以神遇之若遊刃然恢恢乎有餘地矣脈度篇曰經脈為里支而橫者為格絡之別者為孫盛而血者疾誅之盛者瀉之岐伯曰孫絡三百六十五穴會亦以應一歲以溢奇邪以通榮衛孫絡亦有三百六十五穴以應一歲之氣孫絡滿則流溢於大絡而生奇病蓋大絡之血氣外出於皮膚而與孫絡相遇是以脈外之衛脈內之榮相交通於孫絡皮膚之間榮衛稽留衛散榮溢氣竭血著外為發熱內為少氣疾瀉無怠以通榮衛見而瀉之無問所會孫絡外通於皮膚內連於經脈以通榮衛者也故邪客之則榮衛稽留榮衛不能相將而行則氣竭而血著矣邪氣在外則為發熱正氣稽留內為少氣當疾瀉無怠以通榮衛見其血留色變之處即刺泄之無問其穴會之所在也王芳侯曰按脈度篇云盛而血者疾誅之盛者瀉之虛者引藥以補之是病在絡脈者止用針瀉而不補故不必論其穴會也帝曰善願聞溪谷之會也岐伯曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣此言肌腠之間亦所以行榮衛者也夫肉有大分小分大分者如股肱之肉各有界畔小分者肌肉之內皆有紋理然理路雖分而交相會合是大分處即是大會處小分處即是小會處也分會之間以行榮衛之氣故名之曰溪谷易曰山澤通氣如山澤之氣從溪谷以相通大氣宗氣也愚按榮氣生於中焦水穀之精流溢於脈中布散於脈外專精者行於經隧經隧者胃之大絡與五臟六腑之大絡也是榮氣之有行於脈中有行於脈外有同宗氣出於胃之經隧注於臟腑之大絡而出於肌腠之間三者之氣交相會合故曰以行榮衛以會大氣是以上節論脈中之榮氣與衛氣交通於孫絡之間此論布散之榮氣與衛氣宗氣大會於分肉之外是衛氣之通於脈中而榮氣之行於脈外者也王芳侯曰皮膚有血當知脈外有榮衛氣先行皮膚先充絡脈是脈中之有衛故曰脈榮榮如蜘蛛絲者陽氣衰也邪溢氣壅脈熱肉敗榮衛不行必將為膿內銷骨髓外破大膕留於節湊必將為敗此邪客於溪谷之間而為熱也夫氣為陽邪留於肌腠之氣分邪正相搏則為病熱故有壅膿消破之敗證矣邪氣淫溢則正氣自壅溪谷之氣與脈相通是以脈熱於內而肉敗於外也榮衛不行則血氣留滯而為壅膿膕足之股肉也節湊筋骨相連之處邪留其間則筋骨必將為敗矣此論邪因氣以化熱故上言熱證而不曰熱邪下節論寒邪所客故曰積寒莫仲超曰經云溪谷屬骨蓋骨生筋而筋生肉故溪谷之邪留而不去必致節湊敗而骨髓銷積寒留舍榮衛不居卷內縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒流於溪谷也此寒邪留於溪谷之間而不為病熱者也積寒留舍致榮衛不能居其間寒邪凝滯又不得正氣以和之以致肉卷而筋縮也肋肘乃筋骨之機關故不得伸舒邪閉於外故內為骨痹榮衛內逆故外為不仁命曰不足蓋熱邪淫溢是屬有餘寒性凝澀故為不足此大寒之邪流於溪谷之間以致筋骨皆為病也張兆璜曰皮膚為之不仁緣榮衛不居於外不居於外者逆於脈內也故此節無脈病莫仲超曰居止也熱邪流行則榮衛不行寒邪留舍則榮衛不居邪正之不相合也溪谷三百六十五穴會亦應一歲其小痹淫溢循脈往來微針所及與法相同溪谷之間亦有三百六十五穴會以應一歲與孫絡之相同可以微針刺取以瀉其邪小痹者謂邪始入於皮膚未傷筋骨脈謂孫絡脈也邪在皮膚循脈往來見而瀉之與治孫絡之法相同而亦不必問其穴會之所在也此言邪之客於人也必先始於皮膚次於孫絡入於肌內以及於筋骨在淺之時微針所及易於散解無使其入深而為大痹也帝乃闢左右而起再拜曰今日發蒙解惑藏之金匱不敢復出乃藏之金蘭之室署曰氣穴所在色脈者上帝之所貴也故藏之金匱貯之金蘭之室焉張兆璜曰金蘭之室藏之於心也岐伯曰孫絡之脈別經者其血盛而當瀉者亦三百六十五脈並注於絡傳注十二脈絡非獨十四脈絡也此復申明孫絡之與大絡相通也夫經脈之支別曰絡脈絡脈之支別曰孫絡而孫絡之脈又有與經脈相別而與大絡相通者亦三百六十五脈並注於大絡復傳注於十二脈絡非獨十四脈絡也蓋言十四脈絡之外而又有十二脈絡十四脈絡者十二臟腑與任督之別共十四大絡也十二脈絡者十二臟腑之經正也是十二經正與十四大絡相通十四大絡復與三百六十五絡相通是以邪舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病故曰以溢奇邪以通榮衛內解瀉於中者十脈十脈者謂五臟之脈也此言孫絡三百六十五脈與十二脈絡十四大絡設有邪客於其間者當從五臟之經脈以瀉解之蓋諸絡之原本於五臟也故繆刺篇曰凡刺之數先治其經脈切而從之審其虛實而調之不調者經刺之有痛而經不病者繆刺之因視其皮部有血絡者盡取之張兆璜曰上節云以痹淫溢循脈往來微針所及末結曰內解於中者十脈是從外而循於內也繆刺篇曰先治其經脈因視其皮部有血絡者盡取之是從內而循於外也蓋邪之中人始於皮膚孫絡入於筋骨經脈有留舍於外者有流溢於內者有從淺而入深者有從里而復出之表者邪氣浮溢無有恆常是以經旨錯綜學者皆當體會氣府論篇第五十九足太陽脈氣所發者七十八穴脈者血氣之府穴者脈氣所發此篇無問答之辭而曰論者伯承上章復論三陽經脈氣所發者亦三百六十五穴以應周天之數蓋陽者天氣也主外陰者地氣也主內故只論手足之三陽而不及於陰也兩眉頭各一攢竹穴也入發至項三寸半旁五相去三寸馬蒔曰大杼風門二穴也入發至項者謂上入於髮際下至於項間相去三寸半許旁五者謂五行之兩旁也相去三寸半者大杼在大椎各開一寸五分風門在二椎間各開一寸五分也愚謂此二句照應末節手足諸魚際脈氣所發者句皆無各一二字蓋謂穴乃氣之所發經外亦可取穴不必拘於脈中故下文云其浮氣在皮中者五五二十五穴言太陽之氣浮於皮中而少陽督脈皆從太陽之氣而為太陽之穴矣其浮氣在皮中者凡五行行五五五二十五此言脈氣之相從也夫脈氣行於脈中三陽之氣行於脈外氣循脈而行脈隨氣而轉脈氣之相從也是以太陽之氣循脈上升於頭項而中行督脈之囟會前頂百會後頂長強五穴旁兩行太陽經之五處承光通天絡卻玉枕十穴又旁兩行少陽經之臨泣目窗正營承靈腦空十穴皆從太陽之氣而為太陽之脈氣所發是剛健柔順脈隨氣發者也後六經皆然張兆璜曰熱病論傷寒一日太陽受之其脈連於風府故頭項痛腰脊強此氣循脈而行也此篇曰其浮氣在皮中者五五二十五穴乃脈隨氣而發也陰陽血氣外內相將雌雄相應者也項中大筋兩旁各一謂天柱二穴也風府兩旁各一謂風池二穴也俠背以下至尻尾二十一節十五間各一五臟之俞各五六腑之俞各六自大椎至尾骶骨計二十一節其間十五椎旁各一穴謂肺俞厥陰俞心俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂內俞白環俞兩旁共計三十穴而五臟之俞各五六腑之俞各六皆在於其間張兆璜曰復提出臟俞腑俞者蓋謂三百六十五之脈氣所發皆本於五臟六腑故末節復補出五臟之脈氣委中以下至足小指旁各六俞謂委中崑崙京骨束骨通谷至陰各六俞共十二穴通計七十七穴外脫簡一穴足少陽脈氣所發者六十二穴兩角上各二謂天衝曲鬢左右各二共四穴也直目上髮際內各五謂臨泣目窗正營承靈腦空左右各五共十穴按太陽之氣上升於頭項少陽之氣上升於頭頰故此五脈從太陽之氣則為太陽之氣所發從少陽之脈則為少陽之脈氣所發也張兆璜曰太陽之氣在頭正中而下於後項少陽之氣在頭兩旁連於兩頰而下於兩肩陽明之氣在面而下於膺喉在經脈亦然而支別則互相交錯於耳鼻前後上下之間耳前角上各一謂頷厭二穴耳前角下各一謂懸釐二穴銳發下各一謂和髎二穴屬手少陽三焦經客主人各一一名上關在耳前起骨上廉耳後陷中各一謂翳風二穴屬手少陽三焦經下關各一下關二穴在客主人下耳前動脈下廉合口有空屬足陽明胃經耳下牙車之後各一謂頰車二穴屬足陽明胃經缺盆各一缺盆二穴在肩下橫骨陷者中屬足陽明胃經愚按邪氣臟腑篇曰諸陽之會皆在於頭面邪中於面則下陽明中於項則下太陽中於頰則下少陽中者謂始中於三陽之氣分下者謂下於三陽之脈中手足三陽之脈盤錯於頭面頸頰之間而手足三陽之氣分部於頭面項頰之上是以手少陽足陽明之脈交過於足少陽之部署而皆為足少陽之脈氣所發余經皆然掖下三寸脅下至胠入間各一掖下謂淵掖輒筋天池脅下至胠謂日月章門帶脈五樞維道居髎共九穴曰入間者自掖下三寸至季肋間凡入肋骨間也淵掖在掖下三寸宛宛中舉臂得之輒筋在期門下五分陷中第三肋間天池屬手厥陰心包絡經在掖下三寸乳後一寸日月在期門下五分章門系足厥陰肝經穴在季脅肋端臍上二寸兩旁開九寸側臥肘尖盡處是穴帶脈在季脅下一寸八分陷中五樞在帶脈下三寸維道在章門下五寸三分居髎在章門下八寸三分髀樞中旁各一謂環跳二穴側臥伸下足屈上足以右手摸穴左搖撼取之為得膝下以至足小指次指各六俞謂陽陵泉陽輔丘墟臨泣俠谿竅陰六穴陽陵泉在膝下一寸䯒外廉陷中端坐取之陽輔在足外踝上四寸輔骨前三分丘墟在足外踝下陷中臨泣在足小指次指本節後間陷中俠谿在足小指次指歧骨間本節前陷中竅陰在足小指次指之端去爪甲如韭葉足陽明脈氣所發者六十八穴額顱髮際旁各三謂懸顱陽白頭維左右各三共六穴也懸顱陽白系足少陽膽經頭維繫本經穴懸顱在曲角上陽白在眉上一寸直瞳子頭維在頭角入髮際本神旁一寸半神庭旁四寸半面鼽骨空各一謂四白穴在目下一寸直對瞳子下大迎之骨空各一大迎穴在曲頰前一寸三分骨陷中動脈人迎各一人迎穴在結喉兩旁一寸半大動脈應手缺盆外骨空各一謂天髎穴屬手少陽三焦經在肩缺盆上骨際陷中缺盆上起肉是穴膺中骨間各一謂膺窗氣戶庫房屋翳乳中乳根六穴曰各一者言膺中之骨間正諸穴之所在氣戶在柱骨下俞府兩旁各二寸陷中庫房在氣戶下一寸六分陷中屋翳在巨房下一寸六分陷中膺窗在屋翳下一寸六分陷中乳中當乳中是穴乳根在乳中下一寸六分陷中俠鳩尾之外當乳下三寸俠胃脘各五謂本經不容承滿梁門關門太乙五穴各去中行三寸不容在巨闕旁第四肋端下至下承滿梁門關門太乙上下相去各一寸俠齊廣三寸各三謂滑肉門天樞外陵三穴滑肉門在太乙下一寸去中行俠臍各三寸天樞在臍旁各開二寸陷中外陵在天樞